front:
  text: 梅村家藏藳卷弟四十文集十八
  hash: sha256:8485b099affc95e6eea4aeae809fe554f70bbef136eec41e78c4a76198dcf916
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_040-1a}
body:
  text: 記二講德書院記國家受天顯命丕冒九有重惟江南經賦奥區保釐得人實資材傑爰疇咨卿士玅選盈廷之俊而我蒲州韓公特膺簡卑以來敷惠澤於茲土其職任甚鉅先是江南逋額未登令下鉤考而中吳初議駐兵天子之命公若日方事之殷所亟兵賦良出於不獲巳閔念吾民疲蔡其悉乃心懷柔輯和俾克全濟公拜命蕆飭惟謹越視事再朞有詔蠲十五年以前舊賦又三閱月撤姑蘇駐防之兵還京師公奉揚德意送往勞來細大畢協吳民歡忻鳬藻拜首和門者日累萬人公推讓不居日此朝廷如天之賜撫臣何力之有父老懷不克展退而謀於諸生某等日其何以報公哉唯卽湖山綰轂之區創爲講院歲時嘉會來游來觀黃髮鯢齒循階及序相與論說尊君事上之禮庶無負公之教育亦公所以仰答朝廷之盛心也偉業忝荷帡幪樂聞斯舉爰從諸父老後拱揖而言日吾吳通都望國被海帶湖田有肥瘠湻鹵民有愿巧柔囂議曹書佐人競錐刀隧正閭師工爲螟􅬑豆區釡鍾收不中算更繇賦調輸或溢程文簿牛毛奇羡銖兩先負未集來逋摠至下雖累入吏固弗除非甚簡括曷繇丕誠於理軍府之立也無崇山廣澤雉兎麋鹿之區以供射獵無林麓洲渚灌栵􅍉菼之産以給薪樵無魚鹽鐡冶絲纊梓漆之利以澹軍實地揪而隘人稠以厖主客狎處愚黠異數一以爲網罝一以爲窟宅民是用重困吾公有憂之其始至也勸力田務東作數疆潦置町防申版圗息姦詭贍鰥寡戢豪右乃進其耆老而告焉日逋爾蠲日役爾均日訟爾平日荒爾恤天子命我弛征已責爾其量入修賦毋缺於租挈以負詔條天子命我赦過肆青爾其力農㥫行毋嚚於鬬諍以麗撻罰黃綬以下􅔯敓矯䖍我其爲爾案劾之掾史之屬貪惏放横我其爲爾殄殱之旣而日設兵所以衛民也儲偫委積必䂊必克脯資餼牽吿豐告備夫乃可以肅軍制則又日保民所以養兵也候奄致訓芻蕘不淫嗇夫設枑鼓􅢎時警夫乃可以帖民生於斯時也公之威德流聞逖邇鯨鯢收迹光于有截廷議戢矢櫜弓帥歸朝請士還卒伍惟是三軍啟行屝屨糇糧繄公是賴公乃收合艅艎傳飭津吏庶人一葦勿得苛留浹辰之間峩艑雲集赤泥連檣假諸鄰境黃頭鼓柁雇以官錢無不銜尾叩舷檥於水涘供張如法辦嚴有期大會射堂勞饗加禮巳而便時出舍飲餞都亭介駟千羣革車百乘門不轚互路絕囂呼屬城厨傳載燧先驅隸人牧圉陳芻置頓紼縭維之烝徒引筰爲粥於路役夫其休民於是乎爰居爰處爰笑爰語旣安旣樂或咢或歌始吳之人抱布貿絲見奪於市畜雞種黍被掠於鄙一童鞭驅斑白負擔抶而大訽呼聲嗸嗸與屠爭言飲羊無直椎破盧罌酒流溝中始吳之人投缿怨家吿緡惡子搔瓜漚麻㦸手致死負眊帶鈴突入搜牢斧斬門闕捽頭以去始吳之人倅馬就草騰入良苗敦丘甗山其顚濯濯櫟社弗享鳥亡其巢提旄挈俔負牆而號今也門唐个寢由公而復糞除宗祧塗堲垣屋父兄閭黨由公而親肥牡旨酒進醵西鄰田疇禾黍公爲膏雨斥彼蝗蝝穀我士女關梁塗術公爲安車踰度險阻卽此康衢民如棄嬰亡子匍匐失路公也父母提攜乳哺民如痀瘻尫㾐搔把塵垢公也俞跗洗沐營救膴膴其原畇畇其隰山靄而靑水環而碧陂塘煙火庶物蕃殖我行於野以嬉以敖魚泳禽飛卉夭木喬誰將風謡被之管簫誰翦蓬蒿望其羽旄乃取厲鍜乃勤畚挶乃陶瓴甓乃施樸斵圬人改塗工師度木三筵六尋講堂夏屋絃頌之館羽籥之房歌詩習禮矜佩鏘鏘槃辟雅儀讀法亮章忠順事長式訓無忘春秋都試嚴鼓在室熊旗豹侯張帷置帟負弩抱籣持幢夾㦸從公至止孔武有力厥初相國命世作輔故吏諸生熟於掌故謂公其來賴天之祐國計民瘼討求有素公今政成著於旗常允文允武令聞令望帝鑒其忠修我紀綱賜金進秩殿此大邦岳牧屏虞維舜之哲周宗燕喜吉甫陳力公在南國克釐庶績告於有衆小心翼翼再拜稽首歸上之德偉業以爲是舉也道合於忠孝和於人民宜伐貞珉刻茲令猷垂示來􅥴俾勿壤故不可以無記贈監察御史漢陽顧公開明祠堂記山東道御史漢陽顧公如華字西巘以國思贈其父開明先生諱應歷如其官漢陽之人相與追表其懿行而俎豆之學宮矣又明年西巘奉使吳中將歸而立廟於家修其敬宗收族之禮而麗牲之石不可無辭爰以命之偉業日吾先世故吳徙也練塘之丘隴訪求之不可復識豈無懿德繇當時鮮大書深刻以著之故世遠而莫之能考也今漢陽之顧占名數於汊川巳近百年吾子孫賴先人之名德以膺休命苟不表其所自鑱諸樂石俾歲時烝常有所觀感其何以告司祐而示來􅥴俾勿斁偉業受其請而書之日古者自諸侯以降卿大夫以及於士皆有田以供祀享牲牢籩豆歌鐘羽舞事爲之節文而定其度數其無廟者不過庶人祭於其寢而巳自井賦采地之制不行雖貴爲公卿不立廟以祀其祖父者固已多矣夫顧公亦猶行古之道也禮大夫三廟一昭一穆與始祖之廟而三始祖謂別子之始受爵者此在三世之後其子孫追而本之者也今顧氏以御史始貴而公首追封然則始受爵未有踰乎公者也可得云先禰後祖而必遠求之高圉亞圉也哉禮日支子不祭法當爲宗子立廟大夫供其牲物以從俾宗子主其事祝嘏之詞日孝子某爲介子其薦其常事此禮之嘗也開明先生有三子伯如芝仲如蘭而西巘其季也西巘爲余言先生下帷講授則長君爲之都講率諸弟以孝友有鄒魯之遺風自仲氏先亡流離世故渴而葬先生於祖墓仰見烽火燭天嘗懼祖宗之禋祀遂墜於地比家門通顯爲其先人立廟而伯兄已不及待矣每春秋時享執籩釋爵嗚咽而將事此仁人孝子之用心所謂禮之變而得其正者也又何疑焉先生於經史皆有論著其最嗜者蒙莊之學夫庚桑楚之居長壘山也其人相與尸而祝之社而稷之庚桑楚聞而不釋然日吾聞至人居環堵之室而百姓不知所往今以畏壘之細民而竊竊然欲俎豆予於賢人之間我其杓之人耶然則先生將糠粃塵垢乎當世之事又安在乎廟食之尊而必爲文以著之也余竊聞先生内行脩飭事兩尊人及其伯兄備極孝敬設義田以敦族死䘮必收飢荒必恤又推其恩以及里黨漢陽之人至今稱之彼其讀書行道厚自期待以有用於斯世旣屢困鎖院感憤抑塞蒙莊之學殆有托而逃焉者爾夫士之藴德抱義者不於其身則於其子孫然則西巘處䘮亂之後修箕裘而隆孝享其禆益於風教當何如耶余辱西巘之知追考公行事爲悉敢備著之於石而繫之以頌日惟顧之先出自吳系分族顯來赤烏練水靈異肇厥初中更播越譜牒亡百餘歲徒汊川居蜀江蜿蜒連湘巫奕世載德生醕儒執經屨滿羅生徒誕厥賢胤稱丈夫繡衣驄馬聲赫都攬轡𧖟叢及魚鳬嶽嶽光氣騰諫書按行兩浙民徯蘇溯源顧本常踟蹰箕裘慶澤追良謨立廟割牲薦清酤我將我享盥濯乎子孫宗老咸來俱授罍奠斚翼翼趨裳衣弁舄陟儼如鑱之金石庶不渝崇明平洋沙築海隄記自古人臣勲在專征以勞定國者非特戰勝攻取巳也無亦審地利凖水形築隄防端徑術俾我制其勝彼失其險夫然後百世賴焉如是卽天吳陽侯支祈罔象沉玉刑牲無不允格況於趨功樂事之人乎雖然江淮河濟障遏時聞涇渭淄澠堰埭未改而獨于海難言之也豈以沃焦窮髪浩汗無垠非人力所得而施者哉吾吳郡東南漸海崇明踰絕津堠而爲域諸沙邐迤者七百里平洋直亘其南實舊縣也故隸揚州綠陁崩不常乃遷新邑屬之吳而分其地以爲鄙煙火聚落千有餘家界以小洪闊遠難理浙中勾章諸島對峙若聚碁置塊海師張帆捩柁踔絕萬里亡命出没昇平時且以爲憂自逆氛大作鄭成功張名振鯨奔鰐噬連艫如雲嘗一闚金焦兵至佚去旣歸狡謀再逞謂平洋沙外接滄溟内連港泊有深岸可以下杙有遺秉可以因糧圖根株窟穴于其中而亟肄以疲我朝議移蘇州大帥於其邑以禦之固壘嚴兵亦未有以靖也會關中梁公有克復宣雲之功分閫江左著威名於蕪湖采石換任宛陵於順治十一年再被浙東之命未及行而大帥罷政鎭督府以公江湖忻代著有成績欲倚其才辦冦先用便宜俾之攝理八月之三日公渡海入其軍中申號令固封守甫十日而張名振以三千人犯堡鎭又十日以數萬人圍高橋洪土城公皆迎擊破之先後兩戰凡斬千有八百餘級生得二十餘人公諜知其恇擾將遁決計于十一月二十六日從小洪進兵身率步騎以火攻燒屯拔柵中軍李廷棟等蒙衝夾擊碎其五舟賊大潰走此平洋沙所繇復也公爲人沉勇有智畧在宣大之日馬上以鞭稍籌算能識其山川險易故所向有功其渡平洋也召諸將指示之曰從此去縣沙十五里常以潮之進退爲廣狹淺者淤絕淖泥深者渟泓水潦馬遇澝而駭人厲涉而艱我多留兵則不能少留兵則不足賊至發奔命赴之非長策也吾視其水勢非甚湍悍若下竹落捷石菑負薪捧土以塡之卽小洪可塞長隄可成冦至不得突而我騎逞于康莊之衢矣亟條上與行省諸大臣商其事時督府馬公鳴珮中丞張公中元謂公所建于地方計甚深出俸金贖鍰相佽助而邑宰陳侯愼克佐其勞將吏諸生嗇夫版尹詢謀僉同揆日戒衆鼛鼓方集恍惚若有神教之者見糠粃揚著水面如切繩墨輒循其迹用賦厥功畚挶旣下土縝而堅水迴而洑登登馮馮縮版斯就公喜日天所贊也躬親爲植量高庳揣厚薄度遠邇計徒庸屬役賦文已定而後授之有司與禆校曰庀汝而不在者且致其罰先是浙撫累檄趣公而堡鎭高橋洪二戰督府列上功次請必留公於江南有詔報可明年春天子命公以都督僉事充江南總兵官尋設水師一萬五千以屬之公仰思委任圖有以遂其前勞也在隄事不敢怠遑日營月畫築城以固屏障設戍以嚴徼巡列樹以表道途置亭以休逆旅凡可以左右于隄之功者次第修舉于是大陳兵卒五騎爲伍方駕齊轡自郊及牧以達于新隄邑之耆耋童孺來游來觀三里一休五里一頓無斷谿絕坂之艱無漸裳濡軌之苦皆驚顧歎喜以爲此造物者鞭山驅海以爲之非版築之所可及公廼思夫龍者實司溟渤効神靈不可莫之報也命作特廟以時祀享而隄之事畢潰于成是役也起於十一年甲午之臘月迄于十四年丁酉之三月其長也以里而栽其廣也以尋而度高則視廣而加贏焉薪茭土石捄築削屢之工十而居八垣墉瓴甓繕完修除之工十而居二皆如公所料之素今督府郎公廷佐自中事以觀厥成共茲規畫乃分條其經始月日并鋸牙奮鬛我張其罝彼入其穴桓桓將軍鸛鵝置陣陷井奚逃蔓草務盡秦鞭叱石錢弩爭潮蛟龍畏鐡螮蝀成橋精衛空銜爰居大駭水由地中劍倚天外囊沙非智蹈冰亦危甯煩息壤豈假蘆灰渦口隄高灅津流淺白馬波平黃牛道遠士女婆娑是用作歌黍禾谷口楊柳江沱臺駘障澤召伯樹埭如坻如矢億載勿壤湖州峴山九賢祠碑記并頌記曰凡釋奠必有合有國故則否國故者若唐虞之有伯夷后夔周之有周公有則自奠之無則合於鄰國此郡國得祀其先賢所自始也月令以孟春禱祀山川及古之卿士有益於人者漢元始四年舉此禮蜀郡以文翕九江以召父應詔書然則二千石之重凡有功德於民者可無祀哉湖州地稱西吳自周歴漢爲侯國孫吳寶鼎中立爲吳興郡郡置廢不一其改名湖州則隋仁夀二年始也當南渡六朝士大夫之過江者樂其山川吳興遂爲大府王逸少羲之謝文靖安皆起家郡守逸少遷㑹稽内史文靖至宰相柳文暢惲仕蕭梁加秘書監右衛將軍再爲吳守終於其官唐大歷十一年詔以顔眞卿爲刺史遷刑部尙書封魯國公以忠死杜樊川牧連爲黄池睦三州刺史其授湖州在會昌中以司勳員外郎乞外補也宋孫莘老覺從諫院出知廣德軍熙甯四年十一月改湖州終御史中丞蘇子瞻軾以翰林學士請外初判杭州改密又改徐元豐二年四月再移湖州到官未三月罷王龜齡十朋紹興廷對第一乾道中以侍御史改吏侍郎力辭請外任湖州先後凡歷四郡明陳筠塘幼學以萬歷三十二年守湖州巳去復留居六載遷副史以去此九賢之載在典册次第可攷者也峴山之有祠始於三賢三賢者有顔氏蘇氏王氏而他弗及峴山在襄陽羊叔子所遺愛今巋然於碧浪浮玉之間者此名顯山攷諸掌故避唐廟諱而改湖人之思太守者不啻叔子廼卽其地置祠樹之碑以彷彿襄人之意祠歲久敝撓居人友金甑炊焉則以名賢之俎豆辱於屠沽庖湢者有之矣本朝康熙中廣陵吳公諱綺字園次由工部郎守此郡見而歎日祀以揭䖍可若是其瀆耶亟命屬徒鳩工重作其事攷湖守之多賢闕而未備乃下教詢咨得王逸少而下賢守有六合前匭之藏主定爲九賢而書其官舍太守無位尊而有德斯土者乎日此祠爲賢守而作不得躋於其列禮也於是士庶歡欣戒期薦力築墉樹宇改簷易磩丹塗白盛有翼有嚴未浹旬而祠成妥神之房合食之几罔不鷁潔都人士秋月之望來游來觀進而言日我公剗暴去慝遠績前人而庇吾民今又搜揚廢墮克有此舉吾儕小人何可不昭所報相與謀作宮而肖公像焉旣兩祠儷美走望交集而峴山於是乎益勝越明年三月偉業於太守宗親爲睦用兄弟來繼舊好宴於茲山爲賦甘棠園次再拜辭日某不堪也誠得卑之一言願焜燿昔賢之令德以無忘景行某也實與有寵綏余乃不揣固陋泚筆作頌爰紀湖人千百年之命祀其辭日右軍淸鯁推遷仕進深源北伐憂時疆諍東土賑荒爲民請命省賦輕租名高計聽龍矯鴻驚八法之聖垂之千年傾心萬乘進忤懷祖退諧支遁棲遲名山服食養性謝傳沉敏雅量高風放情丘壑驟致三公顧命受遺輯穆元功宣武窺鼎苻秦連烽功濟蒼生鎭物雍容經遠無競善讓克終此邦去思西州是同播之絲竹東山故封柳氏將家玅解談義文暢好學多才多藝新詩斐然馬射無對尺牘素工圍碁尤最焦桐雅奏白蘋高會感懷父曲清商别製苕水洋洋彈琴而治載其清靜終古弗替魯公正直書法堅凝浯溪劖石忠孝收京弟兄死國家廟丹青射堂有碣抒虔庶無愧辭修孫山人墓記太白山人何以名日太白秦之望山人秦人嘗隱焉故名也或日山人不知何許人自謂孫姓名一元字太初莫能得其邑里或日太初安化王之苗裔則又并其姓名而疑之昔者東漢之季宦豎擅朝扶風梁鴻伯鸞挈其妻子出關適吳會爲人賃舂自給其卒也葬于吳妻子歸扶風閲千百年太初再以秦人人吳先後用隱遯終不歸葬然太初之出關踪跡遍衡湘泰岱間旣而買田吳興棲遲不去爲人渥顔飄鬚攜鐡笛鶴瓢以自隨費相國一見之南屏山寺爲歛容歎服其詩與李獻吉何仲默鄭善夫齊名何李未相見而特厚善夫晚廼與高士長興吳君珫紹興守安仁劉公麟按察使建業龍公䨘御史吳興陸公崑爲苕溪五隱劉公後官司空實誌君墓此豈鴻之變姓名雜傭保所知僅一皐伯通耶鴻以五噫之歌見猜時主故深自晦匿太初顧得隱居放言無所忌廼東漢逸民傳至今讀之猶識伯鸞爲扶風人而太初莫能詳其所自出彼其蟬蛻變化自全塵壒之表者詎偶然已乎太𥘉善飲好談論切名實醉則引人說時事搤腕慷慨友人方豪稱之日太初非隱者知兵曉吏事使之用於世不減王景畧其推之不無太過夫謂太初有用世才則可謂太初非一意於隱此不足以知太初也易日君子見幾而作不俟終日古之肥遯者先亂形之未成引領絕跡得以行其所志不幸濡忍一㡳於論胥求爲逄萌梅福難已在明之中葉武宗戲渝馳驅舉天下事委之嬖倖近習之手而宗藩草澤之禍大作賴孝皇餘烈未泯國以不亡其大勢去東漢之季蓋無幾矣劉公龍公輩引身以退太初一布衣棄家狂走其中豈復有所戀哉後百餘年雲間白石山人者復出當海内無事積薪厝火中外宴安山人得於其間交王公營聲譽自比於陶弘景戴安道爲通隱未幾椓人再竊柄黨禍兵禍紛紏於不可解山人僅而獲没不數年天下大亂賢人君子雖欲遠引高蹈龍不能濳鱗鳳不能戢翼毎罹於矰􅗤網羅之患唯有讀太初之書上下其盛衰而有感於前賢之不可及爲唏嘘太息巳耳太初絕婚宦自稱有羽化術晚娶於湖之張氏無子年三十七以没病革屬劉公以誌銘而日葬我必於道塲山之麓會鄭善夫來唁偕苕溪四隱者封哭而去今改卜竁於歸雲庵東則又學使者汪公相此土足安山人體魄且去舊冢不數武以無忘末命故與劉公謀而遷焉歸雲太初所掛瓢處善夫以是名其堂而墓星陊圯不存此若堂若斧者跛羊已牧於其上矣康熙紀元之七載太守吳公諱綺字園次政事之暇憩於茲山慨然日吾忝司牧而前賢之丘隴茀穢不治其謂之何乃命撥時度址而庀工焉余於太守兄弟也以春日來省視而山人之太白亭適潰於成爰戒期出郊酹酒于其墓墓遶長松數干株有殘碑三尺没草中字剝蝕不可讀余與圍次手捫摸得其中一二事敘致頗甚奇太初嘗大醉取幅巾掛樹抽碧玉導刻松身作嚴光徐穉陶濳數字已而就其根熟睡抵黃昏乃起夫山中諸松其合圍者率數百年太初之刻字其存與不存不可知若墓門之樹幸未翦伐太初魂魄必游於此無疑也嗚呼太初死人皆以爲仙去江山周光祿日太初固不死試與公等發其冡必空棺吳興同隱者則以太初學道未必得沖舉其人與文自不凡今歸雲僧猶藏劉陸諸君手跡皆追惟平生宿草猶哭之語二者言不同其愛太初一也嗟乎以是可以觀太初矣園次日是亭也都人士之出游者將以爲休憩之所子其爲我紀太初并識此山之勝吾將鑱諸石余日太初不名一德自同時之友且不能定其出處而余又烏乎言雖然以太初之爲人又得諸君子代之謀永久乃没未二百年非遇賢刺史如吳公者爲之謀修復則此荒基榛梗野鼠衝人而走者幾不辨其處然則作爲文字用詔來者俾此亭長守而勿替庸可已乎吳公以詩文重天下其出守是邦修前人之名跡而光大之無廢弗舉務大利益乎斯民是亭之作過之者將有脫屣富貴擺落塵坌之想於以弘長風流訓世勵俗不爲無助何可以不書吳公繇工部郎爲吳興守江南之揚州人共事者有郡丞大興于公琨通守靜樂姚公時亮是日同游者御史歙縣方漣吳公雯清司理長洲旣庭宋君實頴孝廉江甯仲調白君夢鼐崑山原一徐君乾學貴陽辰六越君闓而余則太倉吳偉業梅村也戊申三月廿六日記雲起樓記無錫吳侯爲治之三年政成化浹始用事於惠泉之山亭導壅去堙墄平甃潔因舊亭之制而易檐改塗焉未也斗折而上築樓三楹崇階廣阿有嚴有翼旣成侯親題其顔日雲起而張具以落之其明年余以宗人來謁偕都人士之萃止者登焉客有諗於余日子可得其說乎是樓也爲惠泉而作也易日并冽寒泉食詩日觱沸檻泉維其深矣心之憂矣匪自今矣夫泉者始而汎觴繼而澎濞其蓄也有本其行也有漸類夫幽人君子憂愁抑塞蟬蛻乎泥滓之中或乍伏乍鳴或一見一否潏潏然淈淈然鬰撓潎冽而不能以遽出豈獨其性然哉此亦水之勢也若夫應龍蚴蟉天際而雲從之絪緼乎無垠布濩乎無外其爲觀也大矣傳日泰山之雲膚寸而令不崇朝而雨天下斯侯之謂乎而吾何足以窺之余日是則然矣抑余更有進焉夫天地之道其猶鼓籥虛而不屈動而愈出自其有形者觀之雲有變化起滅焉泉有流行坎止焉自其無形者觀之洪纎高下混茫乎一氣而已今夫無錫望縣也地大氣浮鍾水豐物而侯以人事節宣其間政教之盛風俗之湻文章賓從之雅凡蒸動而丕變者皆雲也滋液而滲漉者皆泉也又烏得而分之乎吾聞諸侯之爲臺榭也大可以容宴豆高可以占嘉祥今以侯之晝考夕省劬勞庶政於不遑乃得高明爽塏之地以遂其優游伴奐雖以吾徒之顦顇而暫寄乎此樂其水泉之甘雲物之美若似乎其不忍去而況錫之人乎侯之所以嘉惠斯土者亦足以見矣是可書也侯諱興祚字伯成紹興之山陰人余則梅村居士偉業也康熙七年九月十七日記梅村家藏藳卷弟四十終

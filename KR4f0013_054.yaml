front:
  text: 梅村家藏藳卷弟五十四文集三十二
  hash: sha256:39077ec04b7755065e1046516e5929c51f08d590b052361517fa592fe11bc2ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_054-1a}
body:
  text: 書答土撫臺開劉河書伏惟老公祖台臺上籌國計下軫民生以水利為東南命脈慨然經畫復三江之故道定萬世之長策不遺葑菲俯詢芻蕘教下郡國士民相賀以為此夏忠靖周文襄復見於今日而東南之民休養生息之道當於是而始然而手書之下問者半月於茲矣生等不敢遽對則以興大役動大衆必詳稽典故旁咨父老察其形勢參之人情俾其功必成而無悔其事有利而無患然後敢以書獻生等婁人也於劉河事為近輒掇其大略惟老公祖裁擇焉夫劉河者婁江入海之口也禹貢日三江既入震澤底定震澤者太湖三江者淞江婁江東江也必三江入而震澤始可底定則以東南之水太湖不足以受之而用大海以為歸也案令甲三江淤塞起六郡人夫挑濬夫淞江婁江其地在蘇松兩郡而起六郡人夫者則以三江所受之水非一郡之水而三江所救之田亦非一郡之田也今劉河塞矣太倉嘉定沿河腴産皆化為石田焦土不可復耕則其患在兩邑為尤切然兩邑之所資者獨有灌溉耳若夫宣泄之不通其害之遠且大有百倍於灌溉者不可不察也今即以崑山常熟之近者觀之其田瀦為巨浸以彼隄堰墟垾之防非不力也塘浦涇􅅹之流非不疏也害且彌甚則以劉河之塞扼之於口也且非獨於此也前此冬月水涸今冬月水不涸矣前此一年旱一年水今連年大水矣湖汛溪泖泛漲之勢日增而其民不得已乃爭尺寸之地晝夜與水相持以益其怒萬一澤腹太滿挾五六月之淫潦衝嚙奔潰而去壞盧舍殺人民當有甚於今日者則漕賦於河而出民生於河而救故劉河之應開所當大聲疾呼不待再計而決者也雖然所以開之之道其難有五而小者不與焉一日議費夫以七十五里之河而人工物價又百倍於往年此其費非可以數計而臆度也國家以東南財賦重地誠慨然發帑金截部餉捐數十萬金錢於洪流之中而為生民建不世之績此在朝廷之仁恩公卿大臣之謀畫非草野之中所可揣摩而想望者也其次則責之六郡譬如一人之身血脈扞格不通必其頭目手足聯絡呼應而疾乃可治顧人情各私其已而又各為其鄉今以崑山齒櫛􅐡潦掃隨風潮上下是若有鬼神焉非全藉人力者也不則避其漲口別鑿東北一道入海勢必穿城堡犯村落置斗門築堤岸其事又至重不敢輕議也故曰度工之難也一曰派夫約略開挑之例以十五工開一方分段之例以十里分一段省計之例以一月開一程就一里祘之其廣十丈其深一丈五尺得二千七百方則四萬五百工也工程一月是每一夫分三十工矣統計一千四百夫一月可開一里積祘一月之中若開十里則當用一萬四千夫矣他若車戽有夫椿壩有夫搭廠主爨有夫一切轉移執事之人不在此數夫沿河之地至墝埆也其農民多逃散其屋舍多傾圮一旦聚幾萬人於其間商賈不通物價騰踴將何以支惟有貯粟數百石官為之主糶準其工力而給之以粟庶公私上下可以不困故曰派夫之難也一曰銷田向者以河為田而其民已受無窮之纍今者以田為河而其民又失有形之利則謂之何曰否否凡民之有蘆蕩者必其有老田者也河開則民之老田盡熟彼不喜田之熟而惜此塗蕩哉則又有疑之者曰蘆政自有專管衙門設令上請而所司堅持中撓則奈之何曰蘆稅之為民害在兩邑甚大也其兩邑之稅收之公家又甚少也且國家洽於生民而精明強固之治鼓舞乎羣吏合是五者論之其所謂度工派夫銷田定法者一指顧而有餘所難者不過議費耳今朝廷發政施仁詔書頻下海內喁喁黃童白叟皆引領而望以為可旦晚太平夫東南係天下之命而劉河又係東南之命當㝉籌之熟矣祖臺朝拜疏而夕報可也又何患六郡之人不踴躍恐後哉生等俟河工告成之日當磨巨石立之海上以昭國家之恩德且垂祖臺之功於萬世生等其與有榮焉致雲間同社諸子書偉業頓首世事隔闊書問缺然猥辱嘉招敦我朋好集南皮之冠蓋傾北海之樽罍欣此良辰幸陪末座祗奈鄙人固陋久謝知交方鑿壞而閉門將離羣而索處豈可玷名品藻濫迹追隨敢布短緘聊抒積愫夫張茂先名德至重羽翼六經陳元龍才氣無雙搜掦百代十年師友兩地人文壇坫斯存典刑具在漢室雖遷猶識鄭玄之子弟蕭梁已往尚留任昉之故人學擅淵源才經成就即使門戶凋零有同袁粲身名隱約不異揚雄而華轂之彥過白屋以下車蘭臺之英見布衣而握手道在是矣又何疑焉若夫曠代逸羣後來特達少年遇亂總角知名仲宣既才動中郎子瞻且文齊永叔當與耆舊共推此生庶幾聲華總歸吾輩焉能置璠璵而弗實棄騏驥而別乘哉况乎器識乃人倫所重而道義則友分宜先今有才具通明風裁朗拔方騰茂實雅負重名而能後已先人推賢樂善黃叔度汪洋莫及庶幾近之樂彥輔恬雅不羣於今復見於是積學通儒高才貴胄共相欽挹咸許襟期慨自雅道陵遲名流零落何圖今日再遇此賢有大道為公之心申久要不忘之誼誓諸曒日往蒞騂旄而其間有僑扎班荆蕭朱刎頸偶因汝穎之辨幾致洛蜀之爭勉進苦言同歸舊好夫意氣總千秋共許而才名均四海所知初既彼此齊驅今豈後先分歃願披悃愊盡釋猜嫌從此同心永消浮論此偉業翹首而觀聳心而聽者也諸君子以二陸名邦三江重望遠則野王讀書之處遺迹風流近則海叟避迹之鄉名賢唱和主持大雅奬識同人結集篇章勒成卷軸九峯之月觀風亭賞心樂事三泖之蓴羮鱸膾旨酒嘉賓真升平之勝集江左之巨觀矣偉業因風溯德臨紙懷人書不盡言可勝翹企致孚社諸子書偉業聞之天下才行器識之士其生同時學同方而比肩接踵於里閭族黨之間者其合志共術不問而知者也其有生同時學同方而相去或千里或五百里書幣之贈遺冠蓋之接見非有徵會期令可召而至也而近者雲合遠者聲應車馬滿道屣屐到門結縞紵之歡置文酒之會果何道而致然耶要亦因乎其地與其時而已今海內方定兵革已息而求之九州之內有方千里之境其士人習詩書其小民力耕作煙火晏然無鳴吠之警者未有如江之南北浙之東西者也屬當國家右文之治繇制藝取進者既自力於功名之途而故老遺黎優遊寬大亦得以考故實而徵文獻蓋地之晏安而時之極盛可謂兼之矣諸君子之為斯社所以樂升平之化而潤色其鴻庥也豈不美哉偉業雖窮老海濱幸不為名賢所棄敢不樂觀其成而病疹忽作逡巡不前恐仰負同盟諸公見顧之重故敢以書獻竊以士君子之為學將射策決科取世資而致大位耶抑修明先王之教而學為聖人之徒也夫誠射策決科則從事一卷之師不出堂戶之內為術足矣今諸君子湖江涉湖戒舟楫齎餱糧不避風雨重趼而至者庶幾求英博卓犖之士方雅正直之儒輸寫腹心講求德業則其論文取友之道未可一二盡也一日審學術自黃溍柳貫以經術倡起婺學而宋公濓用其師説首開一代之文治後二百餘年巨公碩儒後先輩出終未有駕文憲而出其上者蓋窮經適用甚矣實學之難也偉業嘗親見西銘先師手鈔注疏大全等書規模前賢欲得其條貫雖所志未就而遺書備乙夜之覽吾師不沒於地下矣今諸公遵傳注而奉功令務以表章六經斥奇邪而補闕失如此則西銘之遺緒將以再振偉業昔見之於師者今復見之於友所謂學術之宜審者此也一曰持品節先達如山陰檇李歸安練川吳門諸先生或講學而標正直之風或清操而篤匪躬之誼或三事公孤或承明侍從皆文章政事彪炳一時而遭患處變風霜不改今朝廷褒忠之典方下無非欲維持名教風勵人倫吾黨生於其鄉景行在望當於羣居論道之時求顚沛不失之義所謂品節之宜持者此也一曰考文藝弇州先生專主盛唐力還大雅其詩學之雄乎雲間諸子繼弇州而作者也龍眠西陵繼雲間而作者也風雅一道舍開明大曆其將誰歸至古文辭則規先秦者失之摸擬學六朝者失之輕靡震川毗陵扶衰起敝崇尚八家而鹿門分條晰委開示後學若集衆長而掩前哲其在虞山乎諸君子當察其源流刊其枝葉毋使才而礙法毋襲貌而遺情所謂文藝之宜考者此也一曰化意見語有之前事不忘後事之師也往者門戶之分始於講學而終於立社其於人心世道有裨者實賴江南兩浙十數大賢以身持之其後黨禍之成攻訐者固敢為小人而依附者亦未盡君子主其事者不得不返而自咎也夫盛者必衰盈者必昃苟於始事之初不能盡化同異則開端造隙何以持其後乎所願老成者援接英能繼起者搜揚耆碩或彼讚而此歎或前推而後挽勿以窮達而異轍勿以夷險而易心勿以門地自許而啓其驕矜勿以語言薄故而生其交構所謂意見之當化者此也偉業朴遫謭陋垂老無成實不足仰參末論祇以世故推遷早聞道於先生長者故敢竊其緒言用陳愊悃諸君子廣識博聞其必有以教我俾開其矇而震其瞆則偉業雖未接塵而遊班荆而語固已處壇坫之下托交款之末矣與宋尚木論詩書偉業頓首尚木兄足下捧讀來問極論作詩之法上溯四始旁究六代貫穿三唐搜揚二季追國初之元音還盛明乎大雅其於詩也可謂美且備矣弟何人斯敢置一喙耶弟材力蹇薄於此道未有證入自陳李云亡知交寥落君家兄弟謬愛遂使弟受過差之談要之古人不能庶幾萬一夫詩之工拙弟自知之恨其學之未能方欲捐棄筆墨屏迹乎深山無人之境原本造化窮極物理以幾幸其一得又安能以應酬涉獵申紙搦管之言遽為知已告哉雖然當今作者固不乏人而獨於論詩一道攻訐門戶排詆異同壞人心而亂風俗不能不為足下一言之夫詩之尊李杜文之尚韓歐此猶山之有泰華水之有江河無不仰止而取益焉所不待言者也使泰山之農人得拳石而寶之笑終南太乙為培塿河濱之漁父捧勺水而飮之目洞庭震澤為泛觴則庸人皆得而揶揄之矣今之學者何以異於是彼其於李杜之高深雄渾者未嘗望其崖略而剽舉一二近似以號於人日我盛唐我王李則何以服竟陵諸子之心哉竟陵之所主者不過高岑數家耳立論最偏取材甚狹其自為之詩既不足追其所見後之人復踵事增陋取侏􅍣木強者附而著之竟陵此猶齊人之待客使眇者迓眇者跛者迓跛者供婦人之一笑而已非有尋丈之壘五尺之矛足以致人之師而相遇於境上苟有徑敵必過而去之不足乎攻也吾祗患今之學盛唐者粗疏鹵莽不能標古人之赤幟特排突竟陵以為名高以彼而論孔子刪詩輒並舉而存之夫詩者本乎性情因乎事物政教流俗之遷改山川雲物之變幻交乎吾之前而吾自出其胸懷與之吞吐其出沒變化固不可一端而求也又何取乎訾人專已喋喋而呫呫哉足下天才橫發鴻富典贍楚鴻河宗子夀兄弟又繼起而似續之宋氏之書以懸國門而登明堂非弟之謭薄愚陋所能拜下風者也蒙手書下及既為選定足下之詩輒復陳其率略惟足下更有以教之幸甚上馬制府書恭維老公祖望重樞衡功高戡定經綸南土折衝沿海鎮全淮樞軸中原襟帶三江連七澤總半壁神州之管鎖領百城雄甸之金湯此真生民共覩其鴻烈而古今希見其壯猷也偉業竊伏草茅久叨覆庇仰請仁風匪朝伊夕顧未有咫尺之書一日之雅以見於左右而祖臺列之荐牘知已之感所當銘之終身不敢有忘者也但才力必須自量而官職非可濫叨偉業少年咯血久治不痊今夏舊患彌增支離牀褥腰腳攣瘇胸腹膨脹飮食難進骨瘦形枯發言喉喘起立足僵困劣之狀難以言悉豈有如此疾苦尚堪居官效力趨蹌執事者耶部覆確查鄉評品行學問實迹共見共聞者逐事詳列保舉到部偉業學行一無所取固不待言而患病則實迹也共見共聞者也伏乞祖臺即於確查之中將偉業患病緑由詳列到部偉業自辛未通籍後陳情者二請急者三歸卧凡踰十載其淸羸善病則今在京同鄉諸老共所矜諒撫按兩臺偉業已具揭請之矣而祖臺則舉主也方受德感知無可報塞苟不蚤以實情自言異日者郎欲竭蹶趨命而膏肓沉痼狼狽不前萬難上道有負祖臺之造就將朝廷責成保舉寧嚴無濫之意其謂之何為此懇陳萬祈垂鑒得餘生未填溝壑俟病痊之日九頓台階以謝祖臺生成之誼耳臨啓瞻切悚仄之至答黃總戎書某頓首竊伏草茅仰聆鴻問山川敻阻未及致書歸依之忱匪朝伊夕捧接瑤緘知老先生為某籌咨出處其誼甚殷而論甚切且傳述制臺老公祖屬望之厚見遇之隆勤拳款曲無以復加某謹拙自守之人也仰覩朝廷以寬厚德澤休養天下羣公師濟百辟賢能自幸以樗櫟之身涵濡聖化耕田鑿井詠歌太平本志所守止此而已弓旌俯賁猥及下走大札所及備悉殷勤偉業自揣平生於制臺公祖無一日之雅咫尺之書草野疏賤特加荐剡此大臣虛公之道誠不可及而老先生千里貽札加稱譽於從未謀面之人賢者氣誼之合不以遠近為親疏某何人斯敢當盛愛知已之德能無感哉比者請急陳詞正以部覆寧嚴無濫而賤體屢病難痊既蒙知愛敢不實情上告此逎所以感制臺之知恐有以負制臺之德而吐其衷曲以答生成也乃承意旨諄切自當靜聽部覆豈敢以私門病苦再四瀆陳但某之謹愼愚拙如先生所聞或以見知於三四大君子而其淸羸疲劣種種不堪亦素為三四大君子所亮且亦憐而念之矣量材授爵論其可否自在朝廷之用舍而不在某之出處若以著述為高行藏自卜則偉業惟有守分斂拙鼓腹嬉遊以樂升平之化耳於斯二者所不敢出也伏冀老先生進見制臺曲道某感德之念輸誠之懷容俟病痊躬謝并圖與先生面晤以申鄙忱臨楮不勝瞻切南中與志衍書過句曲望五門紫房石室之奇登鍾阜謁孝陵金支翠旗之氣講舍倚雞籠山俯瞰臺城飛甍馳道之觀回瞻帳殿馺娑駘蕩之盛拜表出龍光門列較以下仗刀立直望之如荼如墨如火羽林佽飛之容還過莫愁湖都人張水嬉采芙蓉荐魴鯉桂棹蘭槳之樂信江左之巨麗吾徒之勝事也志衍亦羡我有此遊乎淸涼寺無高座談經玄武湖無水犀耀甲功臣廟畫壁漫漶無陸探微顧野王添越公鄂公毛髮銅渾天儀款識皆蒙古色目人不得如徐鉉蕭子雲大小篆書太學經庫書簡脫落不及竟陵王子良鈔集經史百家諸生販繒賣漿者兒不及雷次宗伏挺教授生徒數百列肆橋門多籬壁間物無嵇叔夜酒杯徐景山酒鎗秦淮歌舫有屠沽氣不得碧玉吹簫桃葉持楫唱烏棲曲謝靈運劉孝標輩作醉人志衍聞之又爽然自失矣嗟乎涼秋獨夜危峯斷雲梧桐一聲猿鳥競嘯追念舊遊獨坐不樂世已抵隨和而吾猶戀腐鼠若弟者獨何以為心哉丈夫終脫朝服挂神虎門不能作老博士署紙尾也歸矣志衍掃草堂待我耳梅村家藏藳卷弟五十四終

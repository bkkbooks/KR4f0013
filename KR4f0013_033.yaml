front:
  text: 梅村家藏藳卷弟三十三文集十一序七
  hash: sha256:9ffeaede209e04d544ba77c542557c0d53cfa07fc9b4f9f703f53712f6ef2e1c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_033-1a}
body:
  text: 江南巡撫韓公奏議序御史中丞蒲坂韓公巡撫江南之五載天子洊錫公命進秩司空公自以幸得備位維是地方之得失閭閻之利病分條其所以與及所以革之狀當㝉幸聽其言得奉行弗墜以少逭於闕失其副封與草藳具在手自裒輯得若干卷授其部民吳偉業序之偉業讀而歎日上之加勞公與公之盡心厥職者其在斯乎其在斯乎昔我世祖章皇帝聽覽之暇命儒臣采經托傳以撰集羣書無亦以後之人制度文為鑒於前王之成訓罔或遺漏故不厭其多聞博物而義類之弘深也若奏對之體貴乎指事造實以通變而適用其理核其文顯一切傅會繁曲之辭屏使弗進偉業每南苑夜直見諸公坐而假寐漏下三十刻中書猶捧督撫所上章奏以參訂國書有微文之疑互相為之執筆倣徨春詳久而後定然則有事於敷陳者可不愼哉詩日維今之人不尚有舊書日乃身在外乃心罔不在王室當韓公之在京師宿衛忠正曉習文法佐木宰以贊邦治周官所云大事則從其長小事則專達其公之謂歟天子器其能擢自帷幄出典畿輔三命作牧四方具瞻公涖政浹旬固已赫然改觀矣無何有遷擢江南之命先是江南山越未平萑符數起閩海巨冦闌入內地以詿誤吏民當事者赤囊紛馳告變收捕之章又數從中下公至之日氛祲消而姦宄息不動聲色用拊循彈壓以為政向之所謂告急之書窮考之案則皆無之顧以東南區區一隅賦稅居天下之半秦楚滇南閩粵之餉檄使旁午奔命弗遑吳民戶賦而口斂鄉部書都鄙之版椽史掌邦國之二調發出納千條萬端郡邑守相日有要月有成趨辦不及即鐫譙隨之發代者拜除如流罷免者羈管不去雖有考課之法亦不得而施公能無燋心極慮以求當世之長䇿耶昔有宋安撫大臣設上佐以勾管機宜文字主者執凡治要而已今者職事巨細旬朔動以具聞其間詔條赦令計簿獄詞所當鈎稽而出入者節目繁夥不可億算唯公通達政體能周知乎輕重贏縮之數而操綱紀以御之如遊刃如治絲如燭照而觽解故有所建白區處詳當體例精密深嚴之地朝拜夕可所司莫得而駮難焉論者以此重其才服其略它人為之弗能及也已竊惟古來奏疏莫善於朝賈亦嘗建積粟鑄錢韓范歐陽本經術大儒在西夏河北所進劄子首以理財足國為務夫論事人主之前先使之知經制出入充然其有餘則仁義道德之有始可得而進自古然矣方今西北之土未盡墾山澤之産未盡出商賈并兼之利未盡講求以歸縣官舉天下之費畢出之於農故軍興孔亟水旱災荒則上與下焦然其並困我公以肺腑居重任憂公如家權時制宜用其徵發期會以仰副度支之急若夫定經賦寬民力為根本以兼為東南此萬世之謀不易之論未始不端言之也漢神爵之治尚綜核而致其隆於三代唐貞觀之政行仁義而收其效於富強聖主賢臣咨諏要道或課名實或布寬仁一張一弛同條共貫非巳事之極驗耶世祖所以大修吏治務合經意者蓋兼之也今天子寅恭祗畏廣詢博咨尤閔念我東南之民以訪求疾苦其久任公者將盡行公之言而公之言有非一時所能盡處腹心密勿之地入則造膝留身出則皂囊封上嘉謀嘉猷從容陳請必期實有所裨益此豈疏逖小臣芻蕘獻替者可得而比然則其嘉惠吳民雖古大臣之用心無以過之矣彼於文墨治辦之間謂公功著職修服其才而重其略不知此特庶務之可見者耳又烏足以窺公之大哉謹序江海膚功詩序古者克敵必示子孫故於人臣之有功者旗常以記之鐘鼎以銘之簡册丹青以載之鼓籥笙簧以歌之王命尸臣官此栒邑虎拜稽首天子萬年商周以前尚矣降此則輔氏之鐘魏顆所以獲杜回也邢國之鼎禮至所以掖國子也燕然北征竇車騎所以登山刻石也冀州安居皇甫義真所以定亂作歌也上之人載在盟府絃之樂官圖其勞於不朽為臣者則又受彝器而刻其辭用薦家廟傳後世永永矢報於勿忘嗚呼功名之際豈不盛哉今我西安梁公庸江寧一捷再造南土天子晉秩而寵異之且將定封焉吳之人以其憂兵閔亂賴公克底於寧也作歌詩數十章公日吾之功既在史氏矣惟士大夫贈我以言重於雕戈黼黻不可以不記乃執首簡命偉業日子為吾序之公秦人也車鄰駟鐡小戎無衣之詩其音亢切而僨厲清笳急笛驟而歌之介胃之士無不撫劍攬腕變色衝寇者此秦風之雄乎若夫三江五湖之間樓船羽蓋黃頭棹歌非猶夫扶風壯士之聲情慷慨也石城烏棲江南之弄非猶夫隴頭水關山月之激昻三歎也語日歌詩必類斯豈其類哉余則以為不然公之在軍中通詩書習禮樂有輕裘緩帶投壺雅歌之風及其孤軍決戰雖以吳人之不武驅之赴利決命爭首視五陵六郡之豪不是過焉又何有於土風而謂南音寬柔嘽緩不足乎聽耶然則吳士大夫之屬而和者用公之氣以講軍容而壯武節其辭皆發揚蹈厲請以奏之師中當古短簫鐃歌之曲可也公笑而頷曰善遂書之以為序鹽運分司張森嶽賑濟册序苟可以仁恩及物則智不必勤其官能不必舉其職推而行之罔或勿濟今夫鹽策者利之所自出專以佐國而足用非曉然有益於民者也周禮掌邦之委積治年之豐凶於荒政纖悉具備而山澤之利則盡推以豫民其設之官者制其政令而已無所謂征榷以取之也自管子相齊以為海王之國即水煮鹽宜管其權而盡歸之於上其説日豫之在君奪之在君使人長見豫之形而不見奪之理後世遵而行之豪強并兼擅利孔而撓上法者害固以浸除而諸君吾子之所食無不量其釡升而為之設衡立準其法至為苛細鹽策尚為有益於民否耶鹽策誠有有益於民者國家水旱之不時什一之征常恐不足於用惟鹽為天地所藏取之無害足以佐公家之急漢元封中置鹽官二十八郡齊居其六山東大水民餞流人轉徙賑恤以億萬計然而外奉軍旅內供興作得以不匱則鹽策為之饒也鹽策為之饒於國家愛濟元元之意未嘗不陰為之助獨為是官者不能顯以養民其顯以養民如吾友張君森嶽是已張君為青州鹽運分司青州者山東負海之地管子所謂渠展之鹽梁趙宋衛資以仰給者也為君計者鈎稽弊漏恤下惠商廣蓄積以備乏絶斯足以勤其官矣權時緩急搜逋舉羡俾朝家以全力為農民不加賦而用自給斯足以舉其職矣乃有進於是者歲比不登民之流離不能自存者僵仆滿道朝廷方發帑金遣使者賑救畿以南而張君能先民之急損資為粥於路又下勸分之令募豪長者相假貸願輸者具以其名聞奬勵有方賦恤有法所全活最衆是可為難也已夫張君嘗治一道以牧民有稱於時矣此其事辦之有餘余以為難者方君以鹽策為官能不拘拘於職守救災眚施德惠知所本務管子賢人也相齊之功霸以九世而君之所見似為過之誠可書也於是乎言海防魯公贈言序吳郡瀕海之邑其民有事於供億而驛騷弗寧者非甚良牧莫能恤也會稽魯公繇絲綸近臣出副二千石來蒞吾吳以防海為其職嘗與余論海事而籌之曰夫海上之築城堡立墩臺所以駐屯兵也除道成梁陳芻置頓則以備王人之銜命大帥之巡守惟恐賦斂之不時闕而為罪其於用民之力亦已極矣夫土功者王政之所不廢也吾誠以其時量功命日揣高卑度厚薄而為之則城可立臺可成而民不至於重困今屬役賦文之無方故其下未能授功而先為之擾又民欲成之而兵欲毁之彼律亭土堠之不修者非玩也其戍守者利於其墮而頻為之興築也若之何勿禁也先王之制凡承王命為過賓者牢禮餼獻飲食之數各以班位而為之等今庶具百物歲一賦之於民帷帟几席槽櫪砧事過則棄之而酒漿糗􅖲牲牢芻茭常以賓至之無時偫於無用為黠吏之所侵沒負販之細民徵索胸胸列肆晝閉既又計畝而定其徵是商與民交困也已語曰有優無匱吾誠先為之繕館舍庀器用而後令候人逝之於郊致館致餐拜而將幣官正奉符而閲其數胥徒執牘而書其物賓至如歸民用不擾若之何弗舉也余聞之歎曰善哉言乎夫為政之道撙節愛養息事寧人非狃一時之安而惰窳之也開敏強毅興事就功亦非輕百姓之力而程督之也語日不一勞者不永逸不暫費者不永寧若魯公所言規為措置慮始經久民不知役而時懊婪之斯非體國之長謀而使民之佚道乎魯公之駐節出治在乎海虞虞巖邑也其山有飛泉夾澗之奇其材有丹楓翠樾之美其田野有陂渠塘濼粳稻蒲螺之饒人民好嬉遊而不事作業美衣食而不知蓋藏因之以飢饉加之以誅求物力大詘水則浸以尚湖綰江海之衝而設重戍遊徼之騎旁午而狎至艅艎之舟邪許而畢集朝廷簡文臣以勾會其資給而整齊其法制於職秩為重公府初立庶事草創將吏有犒饋宴饗勞旋勤歸椽史有出納奇贏徵令考校它若僚采之聯事賓客之過從絡驛奔湊咸於是乎在苟非閈閎之高堂皇之峻唐階屏樹審術辦方則上無以發教令治文書下無以充揖讓洽笑語魯公有憂之且公之來也嘗諏於都人士曰學校者為政之本也古者行師在泮獻馘行飲至之禮今海上桴鼓無警而戌邏之卒有芻牧於孔子之宮者我備官而遽忘之耶乃即訓導沈君與謀以尊經閣傾圯日久不可莫之治也揆日戒徒畚挶既具翬革斯起易其黮䵝煥以丹青瞽宗瞿相顧瞻奕奕而公治事之堂亦適會於成諸生入學鼓篋得遊息講肆之所而海上突騎水犀諸軍負弩被甲而趨庭者見榱題輪奐有嚴有翼無大無小歡欣鳬藻凡此二役皆公於農事之隙斥羡金捐俸入以為之故鼛鼓弗戒而版築克就君子日魯公於為政知所重矣春秋於浚洙城防新延廄則非之於復閟宮作泮宮修御廩則善之誠繇此而推其於築城置堠平易道路儲偫餱糧皆當預之以時而定之以法俾其下居平無勞苦歎息之聲臨事無供頓顚踣之怨公之才實優為之而吾吳人之獲有休息其道端出乎此也沈君率其邑之士大夫徵余文為賀余因以前所聞於公者為之告而且深有所望焉聖恩剖石和尚語録序聖恩語録剖石大和尚所著其嗣法弟子黃龍朗梓而行焉者也當三峰舉揚臨濟宗旨剖公與黃龍並出其位下其後黃龍走之章門廬嶽顚崖絶巘之中而剖公輔其師故處修祖庭以化導我吳人者三十年此三十年間諸方信佛之流傳者不知幾何人而趺坐説法之書亦既溢名山而遍都市矣聖恩剖公黑白無不瞻仰所謂精進光明幢也而語録至今日始出蓋和尚以真實了義扶植吾宗不欲尋文覓句與世之名聞利養者同其演唱逮黃龍以故人還故山受記莂以去力請之方許行世顧猶刪而存之僅得四卷是編也所謂最後出而尊貴者歟偉業嘗從而問道者也遂不辭為之序日昔馬祖首以棒喝接人至臨濟而豎三玄三要宋洪覺範乃標舉以立綱宗是豈謂棒喝之不足而以玄要為門庭哉蓋自衣止不傳之後法派不得不分法派分則付囑不得不廣從上諸祖懼夫世之一知半解者藉口於單提直入顢頇儱侗無以考驗其淺深得失故設為權實照用料簡回互以策勵而勘辨之此所謂宗旨也以余所見當三峰之時海內知傳法為不易其從遊者皆人才英特語機迅利而猶盡力鉗錘未肯輕相印可今之豎拂拈錐者在在有之可謂盛矣吾不知明眼人辨驗其所開法於玄要賓主竟何如也夫風習所不能止者當折之以所服三峰之門推聖恩南嶽靈隱為三大老非復淺學初機所可幾及今以法印相承之耆宿其操持修證為最久而此書之出也若是其愼重然則有朝參承而暮撰述者能無瞿然其自失乎或日黃龍之在法昌也嘗坐禪山窟中虎飲於巖泉不為動大蛇上下其肩背而鼻觀自如此其力量有過人者和尚退然不出戶牖俾稱弟子而折輩行彼蓋以道故屈也其書具在吾又烏足以知之梅村家藏藳卷弟三十三終

front:
  text: 梅村家藏藳卷弟五十七文集三十五
  hash: sha256:c0c7ec9c97c29adb67eecbe90708a4ca9aad6f9d3ab471d8e967c2c3c084b397
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_057-1a}
body:
  text: 奏疏揭疏劾元臣疏奏為時艱亟藉元臣責重宜祛積習敬抒忠告仰乞聖裁事臣束髮登朝依光日月蒙恩考滿榮及所生頃者愼簡端良以臣備員輔導感激圖報矢竭愚誠竊效涓埃以當拜獻伏見我皇上敬天求治宵旰憂勞當茲國事艱難之時正藉元僚匡弼之益得其人則理不得其人則亂得其人而抱公絶私則理不得其人而背公行私則亂首臣張至發者遭逢隆遇致位孤卿今復總輯羣司具瞻朝㝉臣以為新猷方始治忽攸關其能回心易慮從善圖功改比周之積非謀公忠之實效臣之所厚幸也若復懷私徇庇固陋因循滋巧偽以為工視忠貞為罔益臣之所大恐也語曰前事不忘後事之師首臣今日之鑒取之去輔溫體仁足矣體仁學無經術則當講求仁義練達朝章體仁性習險詖則當矢志光明立身公正體仁比昵宵人則當嚴杜言翕訿之輩體仁護持悍黨則當力維忠孝之經專精神以圖平治毋如體仁之泄沓偷容畫可否以決危疑毋如體仁之遊移飾詐如此而聖恩庶可副衆望庶可塞也臣所憂者首臣積習未化故轍猶存臣讀其近日辨揭盛稱體仁之美一曰孤執一曰不欺夫體仁之當國也有唐世濟閔洪學蔡奕琛吳振纓胡鍾麟之徒參贊密謀有陳履謙張漢儒陸文聲之徒驅除異已何謂孤庇樞二則總理可不設而事敗乃設徇鳳撫則鎮可不移而事敗乃移何謂執皇上之決去體仁正為其善欺耳家窩巨盜産遍苕溪自詭曰淸孽子招權匪人入幕自詭曰謹何謂不欺然則首臣真以為孤執不欺乎夫使聊為嘗試之言實作更新之計滌心飾行以收後效臣何敢議如其不然則必因私踵陋盡襲前人之所為大臣公忠正真之風何時復見海內干戈盜賊之患何日就平為首臣者亦何以副聖恩而塞衆望耶臣念切憂時義存報主敢以懲前毖後之道首效針規首臣而虛懷樂善者不訝臣言之過也臣區區愚誠惟皇上鑒察臣不勝惶恐待命之至辭職疏奏為報國有心趨朝無力蒙恩負罪抱病懷慙謹請處分以肅官方事臣本庸虛材力淺短謬膺朝寵纍陟淸階恭遇皇上應籙御天大造區夏百僚卿士濟濟興朝黭陋小臣過蒙收採詔書下及乃忝今官扶服叩頭怔營戰灼伏念奬勸察臣於衆忌之會賜以保全碎首糜軀莫能禆報祇以微臣受生尫劣積疢纒綿重荷矜憐得寬休沐尚冀瘳損仰效馳驅不謂禍難殷流凶徒干紀痛深九服悲結萬方況在孤臣扣心飮血身雖在野官列近臣不能從難罪應萬死皇上警於有位宜肅刑章天澤沛然顧加優擢夫今日盈廷發謀羣帥戮力疇功論德啓邑承家而一二老臣猶以大讐未復國步方艱用舍勿輕是非當定三事以降母啓殿陛之爭五等初開宜重河山之賞況如臣者文史末流其於國家無禆塵露豈可取紊朝典忝竊金章也哉臣宜歸罪有司陳誠闕下請免其見職退就處分而自國難驚心舊疴彌劇病痁兩月復加下痢淸羸困弊幾不自支臣雖不才粗知大義當日冦變初聞九流失序若非皇上整齊萬品光啓中興則臣餘生巳填溝壑今日軀命咸荷生成君恩未報豈敢言病無如夙嬰沉痼雜患屯邅縱欲扶抱登途少明盡瘁而狼狽不前歎息而止每思國事涕泗橫流以急裝纍繭之誠抱偃息在牀之恨拊髀慷慨宵旦倣徨臣獨何人自隔興運先朝被遇愧納肝刎脰之忠新詔加恩失倍道兼行之赴伏惟聖斷先賜處分俾臣免於曠官安其素分仰祈覆載俯念蓋帷容臣在籍調理俟病痊之日泥首闕廷陳力謝罪庶幾犬馬之疾自放山林藜藿之忱長依日月稍堪鞭策終效涓埃感戀天恩無涯極矣臣不勝悚栗待命之至乞假省親疏奏為驚聞母病懇乞天恩暫假省親事微臣起家寒素臣母朱氏辛勤俯仰心力焦枯自臣未第巳成寢瘵及遭際國恩獲沾祿養得至今日咸荷生成其如崦嵫暮齒錮癖沉疴參术難支遂成風緩支離牀褥轉側需人微臣少病尫羸憂親彌劇先朝矜覽寬加休沐母子二人相須為命侍調藥餌頃刻難離此臣家門至情今在廷諸臣所共洞悉者也皇上中興御極微臣扶力趨朝恭逢覃慶新綸感戴皇恩極天隆地非臣頂踵所能報塞惟有勉修職事少答涓埃乃本月十六日接臣父手書言臣母久病之餘誤觸風寒飮食不進勢甚危急臣聞之心魂飛越涕泣憂思於二十日夜忽嘔血數升自恐顚蹶困踣曠官廢職公私兩愧負罪悚惶伏見皇上深仁錫類孝治宏開敢不􅅹陳至情仰告君父願乞聖恩暫假數月俟臣母調理少痊微臣即遄趨受事天地隆施無涯極矣臣無任激切待命之至為此具本謹具奏聞伏惟敕旨升任請養疏奏為微臣蒙恩升任抱病不能供職懇乞聖恩特準在籍調理事臣門寒人悴遭遇聖明纍拔淸階因忝今授誓心效職少答鴻私不謂母子同病情迫呼天負德曠官不勝惶悚微臣受生尫瘠善病虛羸往年給侍殿廷時憂隕越奉使中州在途忽聞臣母背疽危篤焦心灼骨晝夜兼程抵家之日幸而得救外證雖痊元神難復從此臣母不離伏枕而臣亦以憂勞兼至抱病困劣矣為此投誠君父拜表陳情天地陶成著於南雍供職所冀講授之暇養身事親仰答生成乃臣母沈痼纏綿微臣復淸羸憔悴幸蒙拔擢奉母東還義急王程心憂母恙以致夙疾再作百沴交侵春初嘔血數升精神耗消肌膚瘦削腰腳虛腫不成行立頭目昏眩輒致沉迷入夏以來寖增寖劇母子同患闔室驚危正爾倣徨再聞除目臣扶力叩頭感膺寵命自念叨竊踰涯非臣譾劣所能勝受因緣疾患仰負國恩皇上録舊興賢海內人才彈冠踴躍微臣心長力短實命不同稽以曠鰥宜從官罰若以臣供事微勞特準在籍調理微臣母子二人悉蒙恩造庶幾餘生不填溝壑留形天壤拜見闕廷生生世世感聖恩於無窮矣為此謹遣義男吳忠齎本奏聞臣無任悚息待命之至自陳不職疏奏為遵旨自陳不職恭候黜幽之典事臣繇辛未科進士厯升今職仰荷天恩準臣請假省母歸里以來感念生成誓圖報稱惟是母病未能即痊微臣積疴仍劇王程難赴方切屏營於本月初十日接讀邸抄吏部一本為特請鑒別事奉聖旨云云臣家居僻遠臥疾沉迷繕疏上聞巳遲月日心神戰灼益用悚惶切念臣志局凡近行能淺薄叨忝淸班實踰素分每弘止足輒荷推遷事先皇帝十有四年請急陳情纍塵聽覽沿資隨牒內愧夙心遭遇皇上中興優加齒召冀攄誠節扶力趨朝仰見聖明講學勤政重道親儒微臣幸列從官亦思自效奈學以病疏志因力奪無能拜獻上益高深重迫子情遽求休沐臣之庸劣從可見矣方今國事艱難至尊旰食一時宣力諸臣竭蹶馳驅共襄時急微臣職司淸切地實優間縱有供事微勞尚應捫心恧汗況其烏私孔亟樗質尫頽疾患纏綿精神越泄自揣疲曳難任衣冠金華侍從愧往哲之陳謨玉署含毫負兩朝之史職又何以追陪禁近之班坐貽維鵜之刺伏乞皇上俯鑒微忱語非矯飾敕下該部將臣罷黜以警有位庶幾微臣退安愚分免戾曠官高天厚地感聖恩於無窮矣臣無任惶悚待命之至揭辭薦揭揭為感恩揣分􅅹陳病苦以祈矜鑒事伏惟用人而拔幽滯者君父之恩量力而受爵祿者臣子之分偉業以草莽孤微江湖廢棄仰荷聖朝高厚覆載生成力田以供公稅鼓腹而歌太平者十年於茲矣恩詔舉地方人材督臺馬老公祖過加採擇以偉業姓名入告旋奉部覆行督撫按各臺老公祖確查鄉評品行學問實迹偉業行能庸陋學問迂疏無當於用所不必言而素嬰痼疾萬難服官苟不先事啓陳則私門疾苦何繇上連為此輒敢具聞偉業稟受尫羸素有咯血之證每一發舉嘔輒數升藥餌支持僅延殘喘不意今春舊疾大作竟成虛損胸膈脤滿腰腳虛寒自膝以下支離攣蹶老父病母年過七旬衰殘風燭相依為命日夜涕泣廣求醫卜豈知沉痼巳甚療治無功奄奄一息飮食短少待盡牀褥不能行立夫居官盡職必須精力強濟豈有患苦如此尚堪驅策偉業自辛未通籍後在京止有四載臥病乃踰十年其淸羸困劣當塗諸老見聞共悉方值聖治維新凡有心知咸思報稱偉業自甘沉痼斷非人情而真病真苦實實如此及今若不早言異日不能供職仰負朝廷為官擇人之德意有虛各臺以人事主之盛心此偉業之所大懼也伏祈祖臺將病苦實情開列到部庶幾於共聞共見寧嚴母濫之部覆功令允符而偉業貪觀聖化調理餘生仰誦九重之深仁拜感祖臺之至愛生生世世銜結於無窮矣謹揭與子暻疏吾少多疾病兩親護惜十五六不知門外事應童子試四舉而後入彀不意年踰二十遂掇大魁福過其分實切悚栗時有攻宜興座主借吾為射的者故榜下即多危疑賴烈皇帝保全給假歸娶先室郁氏三年入朝值烏程當國吾與楊伯祥諸君子正直激昂不入其黨烏程去武陵繼之蘄水又與吾不合種種受其摧挫先是吳下有陸文聲張漢儒之事吾以復社黨魁又代為營救世所指目淄川傳烏程衣鈦吾首疏攻之又因召對與濟寧楊鳬岫謀擊大姦史􅒇􅒇逮而陰毒遂中於吾吾去而封王豫中􅒇謀以成御史寶慈勇參武陵事主使坐吾賴􅒇死而後免既升南中少司成甫三日而黃石齋豫杖信至吾遣凃監生入都具槖饘凃上書觸聖怒嚴旨責問主使吾知其必及既與者七人而吾得免於是升宮允宮諭吾絶意仕進而天下亂矣南中立君吾入朝兩月固請病而歸改革後吾閉門不通人物然虛名在人每東南有一獄長慮收者在門及詩禍史禍惴惴莫保十年危疑稍定謂可養親終身不意薦剡牽連逼迫萬狀老親懼禍流涕催裝同事者有借吾為剡矢吾遂落彀中不能白衣而返矣先是吾臨行時以怫鬱大病入京師而又病蒙世祖皇帝撫慰備至吾以繼伯母之喪出都主上親賜丸藥今二十年來得安林泉者皆本朝之賜惟是吾以草茅諸生蒙先朝巍科拔擢世運既更分宜不仕而牽戀骨肉逡巡失身此吾萬古慚愧無面目以見烈皇帝及伯祥諸君子而為後世儒者所笑也吾歸里得見高堂可為無憾既奉先太夫人之諱而奏銷事起奏銷適吾素願獨以在籍部提牽纍幾至破家既免而又有海寧之獄吾之幸而脫者幾微耳無何陸鑾告訐吾之家門骨肉當至糜爛幸天子神聖燭姦反坐而諸君子營救之力亦多此吾祖宗之大幸而亦東南之大幸也吾五十無子已立三房姪為嗣五十三生子而後令歸宗吾生平無長物惟經營賁園約費萬金今三子頗有頭角若能效陳鄭纍世同居之義吾死且瞑目倘因門戶不一松菊荒涼則便為大不孝諸父尊親以此責之誓諸皎日可也吾於孝道不能克盡葬事又未完深負罪愆惟是待兩弟休戚一體及竭力以為朋友費盡苦心三弟尤宜以吾事為己事執友則托諸端士子俶可也吾於言動尺寸不敢有所踰越具在鄉黨聞見吾詩文外尚有流冦紀略一部為無錫常熟友人借去其半婁中尚有抄本須收葺完全及氏族地理二志以付三子此事周元恭主之吾同事諸君多不免而吾獨優遊晚節人皆以為後福而不知吾一生遭際萬事憂危無一刻不厯艱難無一境不嘗辛苦今心力俱枯一至於此職是故也歲月日更兒子又小恐無人識吾前事者故書其大略明吾為天下大苦人俾諸兒知之而已辛亥冬十一月二十八日書梅村家藏藳卷弟五十七終

front:
  text: 梅村家藏藳卷弟四十六文集二十四
  hash: sha256:9a88d63a7eb6bcc0e88adaba0646c11887cfa8e7e02353c25eacdf6881169a94
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_046-1a}
body:
  text: 墓志銘五朱昭芑墓志銘嗚呼史學之不明於天下也久矣兵火散亂書卷殘闕間留一二碩儒將以紹明絶學天必欲困苦之挫抑之甚至天閼其年俾所著書勿就若吾舅氏朱昭芭可不為之深痛乎君諱明鎬昭芭其字吳郡之太倉人曾祖諱顓祖諱鳳韶父諱廷璋於余外王父為從兄弟以武科領參遊借職君生而頴異十七補諸生與余兄志衍遊性強記天姿絶人吾師張西銘友人張受先讀其文願與交雨公之友滿天下顧推服為第一君之名日益重羔雁盈其門嘗偕侯廣成先生遊江右為葉公大木之粵東其他即交書走幣非所好弗屑就為制舉藝極工三試鎖院巳收矣復落會世變遂棄去與西銘門人周子俶齊名發憤攻古學世所稱朱周者也君每讀一書手自勘讐朱黃鈎貫上自年經月緯政因事革下至於方言物考音義章句無不通以訓故參以稗家攟托補綴穿窒疑定紕繆絲分縷析而後止長身修偉負意氣好持論恢奇多上下千百後若指諸掌聽者驚悚莫敢奪於國事雅有論述藏弆不以示人馬遷班范三史考核尚未竟魏晉以降貫穿詳洽所著唯書史異同新舊異同二書先成其餘日抄月撮日史典曰史幾曰史略曰史風曰史遊曰史嘉曰史藝曰史異曰史最曰史俳曰史鑒曰史粲曰史紏十有三種史糾特為可傳其論三國也謂陳夀有四闕不志厯學不傳列女不摉高士不採家乘在史法宜增其論南北朝也謂蜀魏吳晉之志入於宋書梁陳齊周之志入於隋書在史法宜改於唐書則歐陽主紀志及表宋主列傳一書之內矛盾異同仁宗命裴煜等五臣從容較勘不聞一言之釐正故修唐書者其病在分於宋史則孝宗本紀編年記事前後乖錯最為不倫諸臣列傳詮次繆亂凡有七失蓋元順帝求成書之速不三年而宋遼金三史告竣皆仰成於脫脫之手故修宋史者其病在易君之舉正辨駁皆此類也君事親孝家貧資束脯奉母撫幼弟以成立與人交推誠任素不侵然諾有古人之風自兩張繼沒志衍死事廣成一門屠酷君以窮諸生庀死喪支門戶傾身為之弗恤曹偶雜坐歌呼諧噱初不以方雅自高遇義所不可則正色譙讓質責其非雖豪右貴人無所鯁避蓋君天性強直斥臧否厚氣類始終不變所守晚節浮湛俗間推移玩物聊以耗壯心而消盛氣世或以疏通目之未為知君者矣居身清苦刻立其之江右也以試事請者齎數百金叱之去吳備兵使者鈎致之幕府中不肻干以私所居席門環堵卒之日其師吳魯岡友張無近門人王周臣醵錢始克以斂會弔者車數十乘皆知名士余與子俶哭之極哀屈指二十餘年知交澌滅唯君及吾等為三人每酒闌燈灺君輒悲余之遇而傷子俶之貧俯仰盛衰未嘗不咨嗟太息而不謂君又如此也君生於丁未十一月草三日卒於壬辰三月八日年四十有六配曹氏婉順有婦德先於君二十餘日無疾而逝年四十有三君之病也會曹之喪驚而哀遂以不治子四讜詡詔詒女一讜將以某月某日葬君於故里之某阡當君之未亡也詔書舉山林隱逸學官以其名聞君辭以書曰唐有李渤陽城宋有种放常秩元有葉李劉因六人之賢否不同要必有奇才異能足當國家異數某何所長敢與斯典君為人植忠孝持名節絶意仕進以死自守此其生平大指已君之所處卷懷自得天實縱以讀書論史之年可以無死而不料一病以殁君殁未兩月余之困苦乃百倍於君君平昔所以憂余者至今日始驗憤悶不自聊乃致抱殷憂之疾其不與君同遊者幾何而猶執筆以志君之墓嗚呼君既死誰復有知余者乎不覺噭然以哭為之銘曰嗟妖夢何明徴帝錫符會於辰詄蕩蕩開天門從羽旄紛上征後良史資傳聞生正直為明神刻茲石告子孫邵山人僧彌墓志銘嗚呼此吾故反長洲邵山人僧彌之墓僧彌之卒以某年月其葬也以某年月即其年以狀來乞銘則其長子豫也余諾其請且十年遭亂奔竄失其所為狀聞僧彌亡後家益貧流離轉徙訪求之弗得有僧道開者從僧彌受書畫者也今年春遇於嘉禾問之日豫客授步歸渡所過河遇風船覆溺死矣僧彌有幼子曰觀一足不良於行今出家於玄墓余聞之哭失聲無何道開亦死余以仲冬鍵戶讀書有跛僧者蹩躠而來日吾邵山人僧彌之幼子觀也視其貌良是坐與語口嚅淚噎不能詳十猶得二三云君諱彌憎彌其字清羸頎秀好學多才藝於詩宗陶韋於畫仿元宋於草書出入大小米而楷法逼虞禇稱絶工平生揮灑小幀尺幅人皆藏弆以為重或購之纍數十金而君用以搜金石訪蜼彜及圖章玩好諸物此外蕭然無辦題所居日頤堂置一榻其中以藥爐茗具自娛性舒緩有潔癖整拂巾屐經營几硯皆人世所不急而君為之煩數纎悉僮僕患苦妻子竊罵終其身不為改賓客到門謦咳雅步移時始出與人飲不半升頺然就睡雖坐有重客弗顧中年得下消疾覽方書多拘忌和柔燥濕飲啖多寡不能適其中以此益困殆其迂僻如此君受業於牧齋錢先生同里若文文肅姚文毅雅所推許居恆於人材消長之故扼􅒆抵掌慷慨極論及與余遇既憊且衰矣嘗共登雞籠山東望𤾂楚憂生傷亂泣下沾襟余乃知君非迂僻者也於戲道開死無有識君之遺事者矣君之相知莫過於余乃君既死且葬遲之十年之久其詩文書畫已零落殆盡而孤雛赤腳盤跚藍縷余傷心衋痛追憶其生平之一二以志之者蓋不忍負君併不忍負君之子豫也銘曰文字禪書畫史其死也不死其有子也無子嗚呼僧彌而止於此鄭孝子青山墓志銘孝子鄭姓諱之洪字青山吳郡人卒年四十有六再娶於顧繼室孝婦顧氏後君一年以殁同葬於長洲縣之武丘鄉其為孝子與孝婦以何徵曰孝子之父保御三山公諱欽諭實名之而信也傳曰生事之以禮死葬之以禮祭之以禮孝子有此三者故全也今鄭仲子之喪保御年七十餘矣惸惸然為其子承衾焉下繂焉既封而命其孤孫櫛以反虞來哭若死者有知拊心躃踊將無以即安地下矣於孝乎何有曰孝子之不克終其養天也緣孝子之心知其無所不盡緣孝子之父之心知其子之無所不盡也從而名之以孝所以慰其父而通乎孝子之窮通乎孝子之窮奈何保御之言日吾仲子之事我也屏氣而愈色視下而應唯寢處則扶以侍非吾遠出未嘗宿於內也夙興爓湯實巵敬進飲巳視沃盥吾飯亦飯齋亦齋吾止飲亦止飲其視吾疾藥必嘗衣不解帶母殁執喪致毁事後母如所生兄亡以其子子之遇寡嫂唯謹詩日孝子不匱永錫爾類仲子有焉顧著姓也孝婦婉嬺莊敬既饋而中外交賀通詩書工針管無違色無誶言無私蓄酒漿必潔溫凊以時妯娌稱其睦也僕御稱其仁也詩曰孔惠孔時維其盡之孝婦有焉嗚呼保御之稱其子者盡於此乎余於鄭中表也悉其內行知仲子之孝在乎保御之為善而先意承志之為大也保御為善奈何曰鄭氏之以術療人不收其直數十年矣里中食無糜者喪無槥者禍患之槖饘流離之丐貸精廬塔廟之營齋利生老人傾囊倒庋設法勸分搰搰然盡氣極力唯日不足而秉家之成外則仲子內則孝婦有無匱乏惟恐傷於心而逆於耳黽勉搘拄以助之施故保御無百畝之産而常具十人之饌雖輻輳旁年苦身為物而客過輒從容一笑為樂仲子則終日蹙然懼其親之勞而欲以身分之也吾吳徐宮詹勿齋楊孝廉維斗致命之後子孫朝夕不給保御以己女女維斗次子以仲子之女女勿齋孫傾身收恤勿吝保御開敏習於名義而仲子則真淳悃愊體親之心急人之難當飢忘食泣下沾膺傍觀或以為迂且怪而不知其天性至誠為不可及也已鄭氏自唐宋來世有清德吾同年士敬為保御再從弟相與立祠堂置講舍修復其祖所南先生之家法余每過其地羡兩君各有壯子持門戶得以餘年偕隱太息久之未幾士敬之少子之鑑卒其年秋仲子又卒嗚呼今天下為善者懼矣彼夫恣睢鍥薄者之富貴長子孫而行德於鄉死喪之問狎至即天道將何勸焉豈仲子平生弔災恤患倣徨隱惻其夙命實近而不覺逡巡感損歟抑其夫婦聞道有得臨終正定嗤世人之怛化而遽反其真歟若夫所南之心史堙沒於重淵絶地之中三百年而後出其高風灝氣旁礴太虛不屑其子孫以塵涬乎混濁君乃蟬蛻而從之遊也然則仲子之死賢於生也多巳又復奚憾乎為之銘曰君家三杏與君同齒君生亦生君死亦死人之云亡木猶如此山之崖水之涘墳三尺巋然時刻日月自今始為義門為孝子其留以俟後之良史矣穆苑先墓志銘嗚呼余尚忍銘我友苑先哉自余生十一始識君居同巷學同師出必偕宴必共如是者五十年君今舍我以去余之行事將誰咨衷懷將誰訴憂愁疾苦將誰與慰解異同闕失將誰與彌縫乎君為先大夫執經弟子余兄弟三人君所以為之者無有不盡余雖交滿天下其相知莫如君君之愛我念我嘗恐其顚連磨耗一旦不能久存而不虞君之先我亡也君亡之一日猶徒步訪余余適有百里行欲拉君與俱不果比聞君問亟歸而已不復見矣余尚忍執筆銘君墓哉君姓穆氏諱雲桂苑先其字也自其大父雲谷先生善醫好修錬吐納術年八十餘乃終里中稱為長者子三人君之父山谷其仲子也山谷與兄子少谷傳其祖父業而君習制舉義為諸生有名君初娶陸氏生一男殤繼室以徐氏能勤苦佐君君貧士庭戶灑掃治壺飱觴客終其身自奉甚適者則內助力也然君竟無子少谷諸孫濟濟而君僅同産一庶弟濟若弟事兄猶父君撫弟之子如已出居嘗與余語初不以無子為憂其內行可記者若此余之初就君齋讀書也有同時遊處者四人志術純祐為兄弟魯岡與之共事其輩行差少皆吳氏余宗也鄰舍生孫令修亦與焉自午未後十餘年余與四人者先後成進士而吾師張西銘先生方以復社傾東南君進而從之遊先生之幼弟日敉庵其遇君特厚同社中推朱子昭芑周子子俶皆與君交極深此吾黨友朋聚會之大略也君自少能文章有大志吾兩人以兒童時並驅齊名既同補諸生而愧先一第君之負氣屈強未肯讓余余亦事必推君刻意用科目相期過於諸同人遠甚及余還自京師君進取之意落然等輩皆貴耻復與後生相角逐摧撞息機一以寓之於酒余時見君引滿輒用友道相規君之自傷連蹇不得已而寄此者未嘗不感余厚意余亦為咨嗟惋惜不復言然君雖不遇吾等巳仕六七人者處於社局黨論之中日紛糾於不可解惟君性質識度以和平安雅為長察機宜中肻綮諸公往往從而決策與人交好推揚其能掩覆所短其或兩家齟齬則緩頰排解之是以西銘數老成士必首苑先志衍用意氣結客昭芑子俶多在坐方辨論蜂湧得苑先一言折衷則人人自失也令修官閩中君過建溪以送之因留噉荔枝商所以為治甌寧之政遂為八閩最余叨二陪雍君來訪雞籠講舍流連浹旬恣探冶城諸名勝與其賢者相結而後歸無何亂離大作吾等諸人皆引去謀與君偕隱海濱已而敉庵驟顯敉菴由睦之桐廬令入為給諫君為之上嚴灘者三過京師者再得以盡交浙東河北諸長者敉庵戅直好言事君引禍福與之爭即逆耳無少避諸公聞之皆曰穆君黃門之益友也晚而從純祜於汝南之確山純祜仕宦失志所守又山城殘破本不足以屈知己君特徇窮交之請雖至顚路道塗無所恨然亦自此東歸不復出矣君平生篤於師友忠於故舊周旋於患難死生屈指三四十年來為弟子則哭西銘為故人則哭志衍已又哭我昭芑志衍宦西川百口屠滅昭芭坎壈一生既高隱而遺書零落故尤為之加慟當令修之流離國難也塗炭南還親朋幾絶迹君握手迎勞流涕而問所苦所以具洗沐餽衣糧者殷勤甚備敉庵從右司諫改官甫還家而急徵遽至君於倉卒中策蹇先期北發傾身營護幾為宵人所禍既免口不欲自言其勞知交以此重之君為人豐頤強飯腰腹甚寬寡思慮節嗜欲無室家塵俗之纍安居養生法不止於中夀惟其歸自京師與汝南也一以禪誦參學為事燕樂歡笑屢不與與亦對酒不飲有強之者過數盞頽然就睡親舊或以為憂其沒也從所善學佛慈公浴於福城精舍引襪失衣輿歸遂不復言無子而貧敉庵經紀其喪始克殮少谷扶弟之子信炷委衰就位赴者皆長慟失聲嗟乎君早歲不得志於身名實藉二三友朋以自振既垂老而所知益落魯岡失明余與純祜令修日窮困而子俶屢上不第君每追溯往事相與閔默者久之然則君之讀書不效而逃於酒飲酒不樂而又逃禪惘惘失意以至於此者則吾等之故也豈不痛哉嗚呼余又何忍弗銘為之銘曰山也不可無雲士也不可無名我思伊人東海儒生或遊燕而去甌越或適蔡而過汝墳從容談笑急難解紛為魯仲連為樓君卿噫嘻後千百年兮庶斯義之不泯視我刻文處士近陽張公墓志銘宣城孝廉張君于寅諱皓以謁其師來吾婁持其先君之狀為請日其年踰二十舉於有司痛先人之不吾見則以先君之得余晚也先君年七十有三兄弟共八人而先君之沒兩幼弟踰數歲余自就外傳以及成童而先君固已老矣今日之狀則皆得之吾母與吾兄吾母之言曰自吾為汝家婦不及侍舅姑猶見汝伯父光州公光州之棄官歸也爾父飯必同盤而食家事先詻而後行曉起參問起居有疾跪進湯藥衣不解帶吾繼室也汝前母盧夫人舉汝兄四人女兄弟二人爾父教之皆有禮法性嚴治家如官府子孫有過加譙讓若無所容一門婚嫁盡衣冠之美吉凶儀範為時所稱甚嚴祀而重祭偕光州公立家廟春秋爼豆勿缺為世譜敘族姓辨長幼焉此皆內行吾知之餘以問而諸兄吾兄之言曰吾父居家雅自刻苦而輕財好施專於趨人之急不顧己私歲大眚指家囷米數百斛一朝減直賦與平民粥以饘餒者槥收道殣澤及枯骨矣宣有河當治使者下令勸里中則大輸之粟不以纍下貧里人至刻石為頌汝幼皆不及見也親舊有貧而鬻於人以為傭吾父遇之泣捐金言於主人而免之友人謁選得瓊州參軍不能治行以甌脫地質數百金以去從海外歸無一縑償而吾父還其質劑勿吝也人皆謂吾門必大即吾父亦嘗自謂吾有陰德子孫其有顯者乎晚年課諸子勤學望有所成立顧今猶困諸生不克竟先志是當在汝某遜謝且泣拜而識之嘻孝亷聞之乃母若兄而余聞之孝亷者如此翁諱國賓字用明號近陽隱士後泉公儀之子河南光州知州國卿之弟寧國宣城人也娶盧氏繼娶何氏有子八人其一早夭皆有聲庠序間孝廉君學器識業踔然絶世次第六乃何所出也孫男共得十五人曾孫男二人詳行狀中繩繩未艾於戲盛矣因歎自亂以來大江南北清門世胄不保其孥者亦數數矣皖口姑孰之間兵革雲擾翁之後獨亡恙且益見增熾何也其陰行誠大過人者里有豪飛而食人翁嘗面折之其人恚陰中翁不巳光州公請直其事翁卒不肻族亡賴子亦嘗詆諆翁翁竟無言亡賴子歸舍後暴死嚮非翁者獄矣翁生平善書策旁通巫咸許負琭珞形家名家者言圍棋居能品下及博簺皆工而貌若不知邑屢舉翁鄉飲酒輒閉門謝病不為赴年七十有三臨殁預定晷刻其高行通識如此以此必有後矣今諸君奉喪葬於敬亭之陽從先志也婁東某謬為銘銘曰善矣而不近名福矣而不履盈保艾爾後克昌克成鬛何高在敬亭再世後莫與京斯足紹壯武之子孫梅村家藏藳卷弟四十六終

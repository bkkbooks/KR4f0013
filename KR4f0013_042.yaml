  text: 梅村家藏藳卷弟四十二文集二十
  hash: sha256:44975c8524856947a89baa3b36a7d96631ecd516ba6844efae83dcfdae8902cb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_042-1a}
body:
  text: 神道碑銘二墓志銘一通議大夫兵部右侍郎永寧玉調張公神道碑銘世祖皇帝御極之十年兵部右侍郎張公鼎延夙夜左右執事有恪上憫其勤勞加恩賜金幣馳傳歸里公卿祖道於長安門外都人以為榮又六年公以病卒於永寧之故第其子兗州太守琯吏科都給事中璿泣而言曰維我國家天造之初卿二大僚不敢遽以骸骨為請有年至致事者輒留宿衛奉朝請於京師其蒙恩豫告有之自先臣始是不可以莫之紀也又三年兗州服闋補淮安守而命偉業書公墓隧之碑謹按張氏陜西同州人始祖仲文避兵徙洛之永寧仲文以下六世諱士益緣其子中丞公貴得封中丞公諱論仕至四川巡撫都御史以元配段夫人生公公舉萬曆壬戌進士起家行人考選兵科劾兵尚書霍維華以罪廷諍惠安伯張慶臻賄改敕書及宣大總督張曉巡撫張三杰失事狀所言皆施行當時推其讜直升兵科都給事中在明季啓禎之世藺州土司奢崇明反連結水西中丞初按蜀繼受任滇撫克遂前功先後收復四十七城拓地二千里五峯山桃紅􅄵之捷馘其渠魁卭筰蕩定論功為西南第一方中丞歸自按蜀以清卿居里負知兵名而公被擢在省垣將吏勇怯軍機進止皆其職所當執奏每在直中夜治文書參密畫旬日不敢洗沐其劾張慶臻也上怒慶臻勳舊掌京營行金主書竄易詔草文華召對事連長山相劉公鴻訓劉賢相其曲意慶臻有端受取事未得考實公雖紏擲慶臻無所避終不欲傅上怒致大臣辟故與御史吳玉持論並剴正而公微為持平在廷服其知國體後於平臺數被引見敷奏詳敏上以為能眷遇寖隆以中丞撫蜀子例不得居諌職請避歸忌者托其里居事蜚語聞左官薄謫而中丞亦功成納節矣流冦之渡河而南也首陷澠池盧氏次及永寧永山城不修礦盜亦動邑無真令民皆搖心中丞即巴渝之舊部遏宛雒之嚴衝誓衆登陴捐金犒土天寒露止離風雪皸瘃之患城全身瘁屬疾不起公時已從行人司副再遷為南京吏部驗封司郎中職事修舉駸駸且復嚮用既奔喪成服伏闕上書曰臣父出定蠻方還扞鄉里戮力兵間致於僵仆惟主上念葛亮之渡瀘以勞定國憐子囊之城郢沒不忘君庶俾先臣死骨不朽上省章嫌其稱譽過實下所司按核竟坐免官或以為用事者因微文修舊郤非盡出於上意也監軍道湯開遠好直諌嘗追訟公曰永寧鄉紳張論以死勤事不蒙優録并其子錮之熊耳以西塢壁以百數有不聞之解體乎閲七年李自成再起中州先破宜陽永寧而雒陽遂至不守公流離中條上形勢請於宜永之交如韓城三鄉者宿重兵守要害山道厄隘可以扼其吭而弗出且日臣為親受譴不獲復奉闕廷敢因耳目所及一陳滅賊之策永填溝壑終無所恨上亦韙之然竟弗召也嘗憤中樞失策流涕告所知曰嵩山綿亘三百里宜永當適中之地永有東西二崤之固尤足設險賊之出入秦豫磐牙穿穴於其中始先人守永即所以守雒守雒即所以守中原當時不圖其功覆用為罪山民憤歎人無鬬志賊勢披猖未必不繇於此嗟乎吾父子功罪巳矣如國事何哉當自成破永公守南城事急主僕匿於塪井賊燭以炬弗見投之以石弗傷越兩日有一嫗來汲僕謀於公緣綆先上方及幕賊㩦刃者至將加害嫗給言吾子也遂脫脫已嫗忽不見僕傳語其儕篝火井旁號公出之歸於溪源寨五日中夜心動跨驢急行天明而迹者至報日巳去乃免公有井異記著其事文多不載公之免也宗人多死兩子幸無恙避地河北懷縣間行歸營中丞窀穸於故山中賊騎充斥公晝伏林莽夜穿竁穴葬畢仰天慟日孤子自此可無憾矣汴梁之急也公建議秦兵雖奉詔來救賊鋭甚未可爭鋒可駐師鞏縣扼虎牢之險為持久及孫傳庭敗於柿圍歸秦掃衆復出關自謂必勝公獨貽書戒勿輕敵宜修復雒陽進戰退守出萬全之計乃吾謀適弗用而明亦已亡矣兩河並覆郡邑受偽署誅鋤大姓搜牢金帛公子弟被執彭考惴惴宗族之弗全會本朝受命大庇生民百度維新九品式敘公用薦徵拜吏部驗封司郎中由驗封改考功管大計是時天下新定長吏丞尉軍中以便宜除拜皆白版假守年勞治行椽史輒去其籍莫得勾稽公據典章核流品浮偽必黜貪殘必懲奏免千有餘人銓格以正甲戌分校禮闈所得士有至公輔者纍資晉太僕少卿換大理尋為正陟侍郎於工部為左於刑部兵部為右階通奉大夫再進秩一等禮遇視六卿蓋異數也其在大理刑部也屢決大獄亭疑奏讞依於仁恕仍抗章舉正職業申嚴律令不為煩苛大者定僕區之法寬株送之條盛夏請解出繫囚桀黠民妄指莊田詭勢自匿者必正其欺謾至今奉為潔令焉公為人曉習文法在事勤力鮮所回隱同列或語以受任日淺宜引嫌避可否公扼攬出涕曰其遭本鄉傾覆生類殄盡提㩦細弱歸命聖朝出虎口攀龍鱗際風雲脫湯火若不能出身自效裨益萬分何以見陳許汝頴之士乎其居心盡節如此中丞有別墅在金門山所産篔簹篠簜埒於江陵之橘成都之桑公之謝政歸田疇廬舍次第整比於其間立家廟設義莊以尊祖收族暇則偕鎖少參諸公為阡陌之遊作五老圖自為文記之有勸之復出者笑弗應二子中外並厯顯仕垂組揭節歸拜公於德里公與廉夫人慨然太息曰吾出眢井之中上見烽火接天下見積尸撑距當此時未識軀命所在詎意今日骨肉復完鳴騶夾道上先人之邱隴哉語曰知足不辱聖主之優老臣恩不可以忘也公兄弟三人季曰世延夫婦死於兵公撫其二孤瑊琿有恩紀廉夫人視遇如所生人以為難夫人事公母段太君以孝內治肅飭先於公二年以殁公字愼之別字玉調有文集二十餘􅽬墓在豐原之墟以廉夫人祔子三人長琯次璿也季琡殤女三人孫男一挺之孫女一餘詳在墓志偉業聞活千人者必有封中丞之討藺州與水西也不多殺戮以侈首功不附宦寺以趣賞率髳人僰部可撫者撫之巴童賨女無歸者歸之其仁恩結於蜀人猶宋之有張益州焉黃巾禍亂食祿之家多見屠滅張氏子孫獨完受其福嗚呼上下三十餘年觀公父子之際亦可以知天道矣初偉業之識淮安君於浙也因吾友張黃門敉庵以定交繼在京師得交吏垣君距今十有餘年矣淮安友道敦篤契分特深熟聞公家世行厯言之庶足考信茲以揭德樹阡為屬容敢用不文辭謹掇拾大者著之如右而系之以詩曰金門之竹有琅有玕上捎白雲下拂青鸞于焉宴衎于焉考槃河水漣漪二崤巑岏篤生中丞功著西土紹啓我公主闕是補諤諤在廷不茹不吐亂之始生載禦其侮皤皤黃髮有勞實多覆曰僭慝讒口則那心之憂矣涕泣滂沱人亦有言我罪伊何洛之竭矣乃穿我墉并之冽矣乃逃我躬誰其擠之我是用急誰其拯之使我心惻亂其有定天降厥祐王師徂征生民乃救帝思耆德召置左右豈不懷歸竭蹶恐後乃亞司空乃二司馬帝曰汝勞錫之休假綿綺于純黃金百冶公拜稽首歸永之野飲此旨酒瞻望北邙哀我人斯何辜流亡憖余一老歸焉永臧蒼蒼者天矢諸弗忘伐彼篔簹爰作笙篎嘒嘒管聲薦我蘋藻凡爾子孫不遐有詔神之聽之工祝致告維厥祖是承維先公是行鼐鼎及鼒刻茲令名如嵩與少不蹇不崩後千百年家以永存封中憲大夫按察司副使秦公神道碑銘惟無錫秦氏遠有世序自宋龍圖閣直學士少遊公十八世為明少保南京兵部尚書鳳山公諡端敏端敏之仲子姚安守諱汴汴生邑文學諱楷楷生湯溪令諱延默湯溪以吳孺人生府君諱重采字幼儀用子貴初封編修再封中憲大夫按察司副使元配華恭人生三子吾友輔念舉乙未禮闈第一臚傳賜及第厯今官府君之冡嗣也遡國家天造之初遭風雲致公輔者多在大河以北我東南之人由制科進者先後裒然為舉首然及其親之存者不過一二人而已當補念之首南宮薦也族子對巖太史名在其亞人咸謂世德所致且曰此兩人皆有親是時天子幸南苑親近儒臣數召問其父母幾何歲兄若弟幾何人補念進見便殿賜衣侍宴上慰勞之者尤渥府君從其家貽書教誡補念出以示其同官余從班行中具聞之又五年上擇侍從諸臣之才者試之以民事補念乃遷為監司為臬長於浙西江右府君一再就養於邸中兩地士民聞其緒言退而考其長之行事皆謂曰信府君沒凡所以昭德焯聞者有狀有誄有幽堂之銘補念偕其弟屬偉業書其墓碑余既辭不獲命則請書其孝友敦睦者曰君少孤説髦就位辟踊如成人母病籲天減已算以代母喪在殯火作搏顙號呼融風為之反伯兄有倍年之長旦晡問起居細大必咨請待報兄中歲多故諍訟則相救繇役則相助誅求則黽勉中分之疾病手自扶持口嘗藥以進居兄喪哀毁過禮上自世父下逮諸子旁及於姑姊甥舅其事長也肅而和慈幼也柔而正收族也信而睦一門中外貧者取給焉弱者取力焉怨者取平焉先君之師資執友平生之同學故人德施罔弗報也患難罔不恤也宗人之占藉宅邑者逋賦株纍不忍別白以移之禍也書其莊敬樂易者曰衣再浣食二簋而祭祀宴享必潔必豐飭傔從絶干謁而公正是非不阿不撓稱心直言忘形徒步無崖岸無齟齬無鈎距無町畦早罷其公車義好為小詞間出於博奕漫戲晚年善病舁小輿以節勞觀引滿以當醉油油然落落然也最君生平其闔門投轄留賓泥飲似陳孟公老疾俱至興懷名山似宗少文預終制營生壙歌呼其旁飾巾待盡似趙邠卿司空表聖雖然府君之可書者盡於此乎余於秦氏同官也得備徵所聞可書其細不書其大耶補念之在侍從也君以一儒者扼腕時事見奏對務依於深刻歎曰堯舜在上奈何稱説申韓補念之位執憲也前後多所平反用仁愛寬恕以為治有勸之立威嚴者君慨然曰吾父令湯溪清前宰帑金之獄全活者衆家門食報未必不繇於此吾子幸備官可誅殺立威名乎潯陽將以事方即訊聞君至操百鎰逆諸塗君正色叱之曰若直安所事行金曲則安可以私故大法若此者君之居心持已補念之涖政服官徵諸家乘有裨國故所以教忠而養志者胥於是乎在何可弗書書其卒生癸卯殁戊申僅過乎中夀也書其葬去赴告之六閲月其地侍郎灣也以華恭人從恭人蚤亡由安人以再受贈命其賢有德也具家傳故不書不勝書也書其子長江西按察使鉽即補念也寅仲也銶季也皆諸生孫八人曾孫三人孫以下何不名志詳故碑可得而略也然則碑之所宜詳者尤在補念之孝乎孝經之言曰揚名安親名揚矣親不安不可謂之孝也往者翰林官俸入不足資所給輒寬其休假湯沐以便於定省今令甲獨否故有掇上第備近臣為親者緣供億之闕憂其子為子者為門戶之艱念其親以地之遠而賦之急惟江南為特甚古制寬大臣有請外宋之館閣雖直學士以上猶乞一郡以養父母世祖之內外並任者實倣舊典責吏治兼體臣子以優其私竊聞輔念之迎養也將車都亭扶攜垂白長老聚觀郡邑畢至余在同官中為愾焉太息曰吾輩之事其親有一日之寵如秦君者乎故今日刻君之碑書吾友之孝而原本於君恩噫嘻此亦禮經意也為之銘曰奕奕淮海大放厥詞好是正直坎壈於時桓桓端敏大顯丕績耆定四方載諸典册維君也文不有其名維君也才不有其勳左絃右壺笑傲白雲永懷二人孝思無忝因心則愛篤我天顯動莫若敬居莫若儉講信修睦守道樂善帝曰鑒哉錫以圭璧薦之明堂籍用瑶席乃登法從乃作牧伯祿養鼎鍾休假浣滌趨庭義訓曰圖報國昔人所重惟兵與刑尚書秉鉞撻伐蠻荆好生不殺著有令聞今君之子執憲以正仁恕廉平全彼民命弗替引之長保餘慶有嶞者山有檻者泉春申溪澗泰伯土田新阡襲吉卜云萬年爰作斯廟升歌鼓瑟我牛我羊薦饗來格絃彼銘詩刻之樂石貽爾子孫昭示無極僉憲梁公西韓先生墓志銘偉業奉先大夫之喪在殯真定少宰梁公諱清遠排纘其尊人僉憲西韓先生行事來告日月日公薨月日公葬納竁之石未有刻文以纍子偉業為之噭然號日西韓吾友也聞朋友之喪禮宜為位哭今惸惸苴經之中弗獲以其服哭之又大功廢誦矧可銜哀執筆預知文字之役乎敢稽顙辭踰月方伯佟公再以少宰之意來速銘則又絫歔流涕曰孤子交於梁氏父子者二十年先大夫所具聞也梁氏方貴盛知交故吏滿天下少宰不以假名公卿手顧重趼三十里固以屬余其謂篤老故人知公之生平為悉也敢終用服為解乎乃反袂拭面刪取其辭而銘焉按狀公諱維樞字愼可别號西韓生真定人其先徙自蔚州七世至太宰貞敏公始大貞敏第四子封中書淡明公諱志以元配吳夫人生公公生而瓌異貞敏奇愛之既長負志節讀書不屑俗儒章句淡明公俾就家孰孰師避席謝非所能誨且日是其文殊類夢白夢白者高邑趙忠毅公隆萬中所推真定兩太宰也時以小選家居講道指授生徒公執經往侍遂為入室弟子每著書必命校讐丹黃接席得所詠韓河諸什撫卷歎曰風雅不墜復見之梁生矣其愛重如此學成至京師及應城楊忠烈之門楊一見嗟異日高邑誠知人乙卯京闈既雋諷誦自如罕接賀者趙公聞而嘉之日此吾所以取愼可也天啓初趙公枋用公以貞敏褒終之典未備上書闕下因趙公以遍贊賓客表章先烈討求國是愍綸下而公之聲名爛焉逆奄起詔獄自趙楊為黨魁首被禍趙白首會逮公傾身贍護唯謹趙公得減死出語人曰若愼可者斯可謂之義故矣楊鋃鐺膠致道出恆州公策蹇往迓大言檻車之旁曰公此行足以垂名竹帛死者公之本志豈足畏哉楊舉手日知子此來不徒師資之情昔人有言九死不悔此吾心也於時邏卒􅶃立人皆以耳目非是盍不為門戶計公不顧纍下春官第臺使者疏其才京朝官以詔書保舉久之用吏部銓考授內閣撰文中書舍人公大臣子孫生長畿輔朝章國故耳濡目染機密之地演綸畫敕胥倚辦於公上命草詔諭督師漏下二十刻中使闢殿門以待傳呼迫趣援毫立就宮省為之嗟伏應詔陳便宜多所指切進循良城守二書願頒諸選人為挈令章下所司踰年晉尚寶司丞副掌典籍事先是典籍一官非復祖宗舊制官資由他塗雜進久者子弟枝附盤互於其中當國者與外廷忤疑為煽動坐以漏泄省中語言之上杖殺之而改用公等一二正流擢自乙科特重其選公屏交遊避名勢雖為當途引用公務外弗肯與通乃同事者班在公右沽沾喜自詡相君之私人交關請謁向時得罪者親黨側目思報蜚語上聞中外皆知公薰蕕不相緣染而論者以官聯接迹讕語及之誣即白猶用其文罷公士論怫鬱未浹月起家擢任工部主事從尚書吳橋范文貞公請也范公憂神京孤注增樓櫓它戎器公襄其勞無何廟社淪胥嬰城被執誓以必死皇清定鼎即舊官録用奔淡明公喪歸而孝養吳夫人者八年用疏薦復出補營繕郎管理三山掌灰物之徵令以共邦用匠人之取厲碬冶氏之給薪蒸轉移執事之車牛僦費公一其數量課以員程蒸徒稱平乾清宫告成得文綺名馬之賜升山東按察司僉事整飭武德兵備武德多鳴􅐴暴客豪大姓為之窟穴莫能擒治公簡練營兵署其驍雄為右職責以討捕收府姦者置之法縛巨猾送都市戮之境內以清視事一年絶苞苴恤徭役督河漕之卒而牽挽時申逋逃之條而株送免惠政流聞會入賀遂乞養後五年而卒於家享年七十有四學者私諡為文孝先生稱本志序篤行也公於書酷嗜歐陽率更得其楷法世祖皇帝知其能命書數紙以進天語褒嘉傳為盛事所著玉劍尊聞及性譜曰箋內閣小識羣玉直譽等集數百卷公之在典籍嘗請下獻書之令以備典章缺失事不克就至今金銷石泐之餘考鉤黨之始終辨政本之功罪非公紀録孰可援據哉公生於丁亥八月之二十九日卒於壬寅年十月之六日元配王氏繼王氏再繼杜氏少宰貴於典得加恩二母元配王贈恭人而杜貤封亦如之有六子長少宰也次清泰諸生次清傳武進士侯補鑾儀衛次清尚清芳清烈與兄清泰皆早卒孫男七人允朴胄監允桓允栴皆諸生允榛允梧皆清遠出允杰諸生允構皆清傳出孫女五人曾孫男五人頤光卿光憲光蔭光誥光皆允朴出曾孫女三人少宰以某月日葬公於真定某鄉之某原禮也余與公定交於先朝比去京師十五年宿素已盡唯公迎閣握手高談盡日余疲薾不任趨拜而公善飲噉據鞍躍馬能勤於其官當是時公之諸子鳴騶夾道人或愛公勸其少自暇逸輒笑弗應間為余言年少時射麋擊兔於茂山之下韓河之濱極望平蕪登高長嘯慕袁絲鄭莊之為人又先業在雕橋莊有古柏四十圍趙忠毅嘗過而憩焉歲月不居身名晼晚每摩挲其下倣徨歎息不能去余因察公志氣魁岸沉塞類古勞人節士之風年雖遲暮宿心未摧每思出其所長自效於當世非苟以家門貴盛樗散自全者也彼愛公者烏足以知公心哉余投老荒江六年衰病坎壈倍於疇昔公家英嗣皆以公故辱知余余得棲遲閭里苟視先人之飯含者夫猶公賜也嗚呼其可無銘銘曰漢有平原觸忤宦豎急難相勉不憂不懼偉哉裴生為前孝廉徒步往送崤澠之間侃侃梁公嫓美前烈執義名賢古人之節嬰也存趙融乎訟楊同垂信史北州之良伯鸞五噫叔敬七序作為文章掌帝之制益耳有後河西以封一門萬石四世五公烈士暮年壯心伏櫪毋以老耄敢自暇佚恆山奕奕滹沱洋洋敦邱宰木赤壤黃腸我銘幽宫以報死友陵遷谷移斯言不朽左諭德濟寧楊公墓志銘故奉訓大夫左春坊左諭德兼翰林院侍講濟寧楊公以避地卒於毗陵東南二十里戚墅堰之方村其孤通睿奉其喪歸葬以狀來言曰先君之殁也遺命就葬江南而請子一言以銘其藏今諸孤奉母北還將卜諸先大參之兆而不得子一言是再違先君意也余受而哭之日余何忍銘吾友哉按狀公諱士聰字朝徹別號鳬岫中辛未進士選庶吉士癸酉授翰林院檢討甲戌奉命册封趙王王以疾請無拜公正色裁之卒如禮丁丑會試同考得春秋士二十三人明年皇太子出閣講學充校書官以職事紏中書黃應恩失當事意尋以經筵講官召對面論考選得失疏劾吏部尚書田唯嘉及其鄉人太僕卿史􅒇所為諸不法上用其語唯嘉黜免􅒇逮問未幾田史之黨復振公病請回籍辛巳史􅒇死獄中詔籍其家應恩前已他事論死乃思公言為可用壬午召見擢右春坊中允副考北闈得士百七十有一人癸未題補日講升左諭德管誥敕修大明會典甲申得旨宣慰襄藩賫手敕論左鎮入援會通州相出治軍請以公收山東義勇未及行冦陷京師公投愛女於井趣孔夫人與妾陽氏祝氏縊巳則仰藥自殺為防守者覺水灌之大吐復活孔懸絶蘇二妾與女死焉得間棄家南奔督輔請為監軍護諸鎮帥不果過江避兵武塘既而轉徙於丹陽金沙終歸毗陵鬱鬱不得志以死初余同館兄弟二十四人而豫章楊機部山右王二彌公與余四人者立朝相終始機部最伉直余與二彌好持論公謹質凝重多大節其以職事紏黃應恩也應恩者小人厯事久關通中外舊制詞臣於殿閣大學士為同官而中書特從史即積資至九卿不得鈞禮淄川相以外臣入廢掌故而應恩挾中官重示籠絡又助為調旨以此得相張心益驕無舊節公與語不合立具奏又移書淄川責數之而僉人盡目懾公矣田唯嘉者以吏侍郎取中旨進於相張為師生而史􅒇特虎而鷙父喪家居頤指諸大吏為威福天下莫敢言公於便殿白發其端退而上書條疏贓釁章十數上當是時先皇帝欲公盡言故下嚴旨屢詰辨苟一語參驗失實且收坐而公所彈奏又皆閣部大臣方任用領事其黨以聲勢權利相倚行金錢數十萬金吾大璫為耳目日夜思有以中公而公以一書生孤特寡助結怨要近危禍難測朝士自一二人外莫敢過其門大會廷中無有立而與之言者乃益慷慨發舒盡列其詆欺狀以進終使邪黨莫得榰梧顚倒錯愕咋舌喪氣自實而後止此固公質直忠孝上感主知而先皇帝之明不可及也已公之奔走漂泊憤悶發病病革而大呼先帝召對者三凡以感舊恩而必報之死也嗟乎當先帝親儒重學而同官三四人奉詔輔導太子其遭遇之隆可不謂盛歟逮乎天地裂交遊盡二彌前以病亡機部嬰城不屈而死唯公與余得相見於流離之中而復殁於窮村喪櫬未還妻子不立屈指二十四人零落亦無幾矣嗚呼可不歎哉公始祖諱林元季自北地遷濟林生惠惠生景高景高生鸞鸞生贈中大夫震震生贈中大夫思仁皆以大參崑源公洵貴贈如其官崑源公即公父也崑源公初娶周淑人蚤卒繼娶聶淑人生公公以甲子舉於鄉丁卯而大參公殁聶淑人亦亡不及見公成進士公每言及未嘗不涕泣也公初娶贈孺人黃氏繼娶封孺人孔氏實聖裔妾陽氏宛平人祝氏江都人以殉難故其葬也必以祔禮也男五人長通睿諸生黃出次通俊通久俱諸生次通俶孔出次通佺妾經氏出女一孫一璜通睿出孫女四人公詩文雅練章奏尤警核所著靜遠堂藳玉堂薈記戊寅紀事甲申核真略凡數千卷生於丁酉七月十四日卒於戊子七月十一日享年五十有二其卒也通佺甫二歲公命育之江南且指以托通睿曰靑山埋骨何必故士待此子成立以守吾墓今盡室北歸通􅐶必能奉經氏母撫幼弟以無忘父命嗚呼公雖即安先隴而臨殁遺言請以刻諸墓石以明公避地之志也為之銘曰直矣而不罹其禍忠矣而不遂其名其必死而不死也君父之德其不死而必死也臣子之心豈其道之將行而命之不辰唯夫不有其家不有其身以全吾貞用昭示乎後人梅村家藏藳卷弟四十二終

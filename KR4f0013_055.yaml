front:
  text: 梅村家藏藳卷弟五十五文集三十三制科一
  hash: sha256:f4d6ed33a9b41b2f2a78ef3857c91e8af3ed178f49f4930a23715774d687e689
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_055-1a}
body:
  text: 崇禎四年廷試策一道臣對臣聞帝王之臨御天下也必有克纘前猷之大典而後覲光揚烈可以立四方之綱必有聿修厥德之精意而後嗣服作求可以受萬年之祐何謂大典令緒之所昭典常之所繫咸收於若彛撫事之內而無不修明者是已何謂精意夙夜之罔懈羮壇之罔間畢挈於一心宥密之中而無不臨保者是已故總一統類而整齊萬民者法也命職而辨官修德而布政猷為無有不備而明作敦大剛柔尤有時措之宜經理宇內而垂訓百世者法也攘外以安內勸善而禁非治效無有不張而窮變通久節愛尤有恰符之窽古帝王所以祗遹前休率百職以勤事而致民生於康阜丕承篤敘命羣工以效力而躋斯世於雍熙用此道也是以奉制而定一尊上之所建立者秩然其不易而庶明勵翼用成其紀綱燕及之休法古而建長策前之所懋建者煥焉其重新而衆績咸修享其正直平康之化其道端有在於今日矣欽惟皇帝陛下剛健中正以時乘文武聖神而廣運建五有極四方遵彜訓之蕩平得一為貞百度歸紀綱之肅穆寶册衍青鏤之慶歌重暉重潤於無疆靈壇展蒼璧之虔凜曰旦曰明於有赫遜志務時敏愼修罔懈而緝熙之心法允符儉德懷永圖甘節以通而素朴之淳規久布金華晝接為明諧為董正宛然總章衢室之休風玉案時親乃啓沃乃論思信矣辟雍明堂之盛事征弗庭以靖衆運籌無煩十札白旄黃鉞敉寧已奏乎膚功沛大賚以安民蓄積爰備九年赤縣神州懷保遍施其膏澤固已四三王六五帝而超出於尋常萬萬矣乃猶不自滿假進臣等於廷俯垂清問首諏以治法兼舉夫治人次及於建官理財敦典庸禮詰戎禁暴通工柔遠之道而凡奬恬旌廉之典民賦屯鹽之政終至於兵餉撫賞與綜稽明罰之條無不備陳雖唐虞謨誥成周咨訪何以過焉臣圖事揆策雖無見事之明而畢智竭能可效一長之策敢悉其所知以為陛下獻焉臣聞之人主之立法也知明意美道高德厚設誠於內而制行之仁義禮樂皆其具也然非選溫良上德之士以因能而責治經常何自而修焉故必量材而授官録德而定位使上有以持其統下有以知所守則法度可明統紀可一皆從此始也人主之立法也事為之制曲為之防隨俗之宜而通變之政文章皆其效也然非舉通道進善之人以分職而效官典章何自而備焉故必因物以識物因人以知人使教化自內以達外道法自略以及詳則智者獻明能者效力皆從此始也故唐虞稽古建官惟百而凡邦土邦教之職司農司冦之官無不掌其賦入修其典禮詰其兵戎於以食足貨通而遠方來服此三代治人治法之明驗也漢唐設職浸失初制而凡錢穀之任有掌德刑之教有司無不制其出納修其彛常戢其兵革於以重本抑末而遐邇率俾此後世治法治人之明徵也洪惟我太祖高皇帝定一代之所尚而創制顯庸上追虞夏之模收庶績於咸熙而立綱陳紀遠邁漢唐之制陛下修舉而率行之此真建久安之勢而道德隆於百王成長治之體而淑問揚於疆外者也乃伏讀聖制有曰時遠則玩愒易生玩久則初意寢失而於下之風習邦之賦用養兵修備釐弊懲姦之事猶兢兢焉臣竊思之夫君之所以制下者格也極之積漸以課其功則幸心不作所以養奬恬之化者至矣而世習未變其何以勸焉惟以實試賢能為務而有一材者居一位有一能者服一事退讓所者久寧一勞者永逸而撫賞可無患也所謂綜稽者君操其名以責實臣治其職以赴功其為能吏者必有事以知其能其廉吏者必有事以知其廉天然後職任修而庶事康焉所謂明罰者制賞奪以勸其從嚴刑法以威其淫使從上化者既可治而不可亂其不率上教者亦自重而畏犯法夫然後上下順而風俗成焉故有體統以肅之於上而翼明佐治諸臣復有勱相之勞則四夷嚮風海內致附所謂求王道之端而正其本也有憲典以振之於先而大法小廉羣工皆有克勤之職則教化大行民生有濟所謂因風俗之變而用其權也抑臣更有進焉夫朝廷者天下之率也道德者政治之端也願陛下加之意而已昭前之光明而效其成制則有以祗承於厥休然至時勢所趨則不法其政不循其俗尤有善制之宜觀下之情性而治其大綱則有以加惠於庶類而至規條所繫則涖之以強斷之以剛尤有救時之術斯極治矣臣愚不識忌諱干冒宸嚴不勝戰栗隕越之至臣謹對梅村家藏藳卷弟五十五終

body:
  text: 五言古詩二十七首下相懷古驅車馬陵山落日見下相憶昔楚項王拔山氣何壯太息取祖龍大言竟非妄破釜救邯鄲功居入關上殺降復父讐不比諸矦將杯酒釋沛公殊有君人量胡為去咸陽遭人扼其吭亞父無諍言奇計非所望重瞳顧柔仁隆準至暴抗脫之掌握中骨肉俱無恙所以哭魯兄仍具威儀葬古來名與色英雄不能忘力戰兼悲歌西風起酸愴廢廟枕荒岡虞兮侍帷帳烏騅伏坐傍踣地哀鳴狀我來訪遺迹登高見芒碭長陵竟壞土萬事同惆悵夜宿阜昌我來古昌國望古思樂生總將六諸矦撫劍東專征下齊功不細奔趙事無成草沒黃金臺猶憶昭王迎涕泣辭伐燕氣誼良非輕此真天下士豈獨因知兵忠心激舊將誓死存聊城惜哉魯仲連排難徒高名勸使東遊齊毋乃傷縱橫贈家侍御雪航士生搶攘中非氣莫能濟徑節行胸懷高談豁心智吾家侍御公平生藴風義世難初橫流事定猶草昧召見邯鄲宮軍中獲能吏移牒拜諌官創業更新制長刀夾殿門令下誰敢議扣馬忽上陳挺身艱難際丈夫持國是僵仆無所避封事即留中天語加褒異受命巡山東恩威恤凋弊會討泰山賊無辜輒連治破械使之歸父老皆流涕征南甘矦軍豪奪武昌地可憐黃陵廟鈔略空村閉君來仗威名一言釋猜忌塢壁招殘民郊原戢遊騎從此巴丘兵始識長沙尉西望浚稽山黃河繞其背靑羌十七種驊騮飾女罽自古於金城互市有深意蜀賈蒙山茶兵火苦莫致將吏使之然憂將玉關廢奉詔淸河湟俾復商人利千車摘岷峨五花散涇渭至今青海頭共刻黃龍誓揭節還歸來公私積勞勩安卧無多談循資躡高位却拜極言疏手板指朝貴恩深因薄謪材大終難棄古之賢豪人深沉在晚歲斂盡萬里心日共殘編對學以閲世深官從讀書退以之輕軒冕蕭條自標置我來客京師一身以匏繫老大慚知交淒涼託兄弟臨風或長歌邀月非沉醉論世追黃虞刪詩及曹魏恐君故鄉思失我窮途慰家在五湖西扁舟入夢寐欲取石上泉洗濯塵中纍羣公方見推雅志安得遂朝罷看西山千峰落濃翠良友供盤桓淸秋足遊憩待豫同拂衣徐理歸田計題河渚圖送胡彥遠南歸馬背語江南春山吾負汝白雲能容人猿鳥不我與西泠有高士結廬在河渚讀書尚感激平生愼推許獨坐長微吟淸言出機杼秋風忽乘興千里長安旅同好四五人招尋忘出處寄迹依琳宮雙松得儔侶雖入侯王門不受公卿舉登高見遺廟頽垣竄鼯鼠悲歌因卧病歸心入春雨從此謝姓名問之了不語我為作此圖倣佛梅花墅蒼然開南軒飛泉落孤嶼想見君山中相思日延佇送何省齋哲人尚休官取志不在歲賢達恃少年輕心撥名勢神仙與酒色皆是供蟬蛻在已本歡娛富貴應難纍婆娑彼頽老匪止妻孥計棲棲守腐鼠自信無餘技嗟我豈其然今也迹相類同事有何郎英懷託深契三十拜侍中向人發長喟拂袖歸去來故園有松桂世網敢自由鄉心偶然遂樗散却見留送之以流涕我昔少壯時聲華振儕輩講舍雞籠巔賓朋屢高會總角能淸談君家好兄弟緩帶天地寬健筆江山麗憑闌見湓口傳烽響笳吹海寓方紛紜虛名束心意夜半話挂冠明日扁舟繫問余當時年三十甫過二採藥尋名山筋力正強濟濯足滄浪流白雲養身世長放萬里心拔腳風塵際昔為雲中鵠翩翻九臯唳今為轅下駒局促長楸轡楩柟蟠枯根天陰蟲蟻萃縱抱凌霄姿蕭條斧斤畏時命苟弗諧貧賤安可冀過盡九折艱咫尺俄失墜淒涼遊子裝訣絶衰親淚關山車馬煩雨雪衣裘敝長安十二衢畫戟朱扉衛冠蓋起雞鳴蹀􅞃名豪騎通籍平生交於今悉凋替磬折當塗前問語不敢對衰白齒坐愁逡巡與之避禁掖無立談獨行心且悸邂逅君登朝讀書入中祕父子被詔除一堂共昆季呼兒爭出拜索果牽衣戲回首十六年蹤迹猶堪記荏苒曾幾何萬事經興廢停觴重剪燭相對加噓唏我行感衰疾腰腳增疲曵可憐扶杖走尚逐名賢隊薄祿貪負間憂責仍不細扈從遊甘泉淅淅驚沙厲藉草貧無氊僕夫枕以塊霜風帽帶斜頭寒縮如蝟入門問妻孥呻吟在牀被幼女掩面啼燈靑照殘穗白楊何蕭蕭衝泥送歸槥爾死顧得還我留復誰為旁有親識人通都走聲利厚意解羈愁盛言推名位不悟聽者心怛若芒在背忽接山中書又責以宜退卿言仍復佳我命有所制總未涉世深止知乞身易悶即君過存高談豁蒙蔽苦樂來無方窮達總一致同是集蓼蟲以此識其味人生厭束縳擺落須才氣君初丞相家祖德簮纓繼吐納既風流姿容更瓌異披史妙縱橫論詩富裁製激昂承明廷面折公卿議文士寡先容疏通得交臂騶哄訪當關休沐杉齋閉良工鑄干將出匣蛟龍忌趨駕度太行躊躇棄騏驥矯矯朗陵公竟下考功第老夫迫枯朽抱膝端居睡雖稱茂陵病終乏鴟夷智遜子十倍才焉能一官棄早貴生道心中年負名義蹉跎甘皓首此則子所愧君今謝塵鞅輕裝去如駛雙槳石頭城木落征驂憩過我儒林館寒鴉噪平地函丈無復在依舊晴嵐翠明年春水滿客興煙波趣鶯啼笠澤船花發龍沙醉高堂剖符竹盡室千山內郡閣繞鳴灘日晡散人吏無書悼遷斥有夢傷迢遞嶺雁時獨飛楚天樹如薺雙眼渺荒江片帆忽而至家人迎棹立愛子趨庭慰誰云謫宦愁老覺君恩最共上欎孤臺側身望燕魏惆悵念故人沉吟不能置三載客他鄉一朝遽分袂勞生任潦倒失志同飄寄少壯今逍遙老大偏濡滯舉世縱相識出門竟誰詣太息行路難殷勤進規誨後會良可希尺書到猶未相去各一方天涯隔憔悴開篋視此詩恍恍不能寐送宛陵施愚山提學山東三首秦皇昔東巡作歌示來裔李斯留篆刻足共神仙配胡為秦岱巔蒼碑獨無字恃此謝六經免滋後賢議至今倉頡臺行人尚流涕君今懷古迹斯文起凋敝蟲魚雖改竄扶桑自天際千載靈光宮丹書閉房記兵火獨搜揚重見鍾離意其二魯儒好逢掖傴僂循墻恭長劍忽拄頤掉舌談天雄諸矦走書幣擁篲梧丘宮孟嘗一公子珠履傾關東後來北海相坐上猶遺風君愁吳􅚼士名在甘陵中無使稷下徒車馬矜雍容華士苟不戮橫議將安窮古道誠可作千里尊龜蒙其三伊昔嘉隆時文章尚丹艧矯矯濟南生突過黃初作百年少知已褒譏互參錯風習使之然詩書徇然諾凄涼白雲署前賢遂寥廓君初領法曹追蹤好棲託此行過厯下高風𬗟如昨太白遊山東後來訪廬霍獨愛宣州城江山足吟謔讀君官舍詩鄉心戀巖壑目斷敬亭雲口銜竹溪酌借問謫仙人何如謝康樂礬淸湖并序礬淸湖者西連陳湖南接陳墓其先褚氏之所居也礬淸者土人以水淸疑其下有礬石故名或曰范蠡去越取道於此湖名范遷以音近而訛世遠莫得而考也太湖居吾郡之北有大山衝擊風濤湍悍而陳湖諸水渟泓演迤居人狎而安焉煙村水市若鳬雁之著波面千百於其中土沃以厚畝收二鍾有魚蝦菱芡之利資船以出入科徭視他境差緩故其民日以饒不為盜吾宗之繇倩靑房公益兄弟居於此四世矣余以乙酉五月聞亂倉黃携百口投之中流風雨大作扁舟掀簸榜人不辨水門故處久之始達主人開門延宿雞黍酒漿將迎灑掃其居前榮後寢葭蘆掩映榆柳蕭疏月出柴門漁歌四起杳然不知有人世事矣是時姑蘇送欵兵至不戮一人消息流傳緩急互異湖中煙火晏然豫將卜築買田耦耕終老居兩月而陳墓之變作於是流離轉徙慬而後免事定將踐前約尋以世故牽挽流涕登車疾病顚連關河阻隔比三載得歸而靑房過訪草堂見豫髮白齒落深怪早衰又以其窮愁煢獨妻妾相繼下世因話昔年湖山兵火奔走提携心力枉枯骨肉安在太息者久之靑房亦以毀家紓役舊業蕩然水鳥樹林依稀如故而居停數椽斷甎零甓罔有存者人世盛衰聚散之故豈可問耶撫今追往詮次為五言長詩用識吾慨且以明舊德於不忘也吾宗老孫子住在礬淸湖湖水淸且漣其地皆膏腴堤栽百株柳池種干石魚教僮數鵝鴨繞屋開芙蕖有書足以讀有酒易以沽終老寡送迎頭髮可不梳相傳范少伯三徙由中吳一舸從此去在理或不誣嗟豫遇兵火百口如飛鳬避地何所投扁舟指菰蒲北風晚正急煙港生糢糊船小吹雨來衣薄無朝餔前村似將近路轉忽又無倉皇值漁火欲問心已孤俄見葭菼邊主人出門呼開柵引我船掃室容我徒我家兩衰親上奉高堂姑艱難總頭白動止需人扶妻妾病伶丁嘔吐當中途長女僅九齡餘泣猶􅈱呱入君所居室燈火映窗疏寬間分數寢嬉笑喧諸雛縳帚東西廂行李安從奴前窗張罣網後壁挂耒鋤苦辭村地僻客舍無精粗剪韭烹伏雌斫鱠炊雕胡牀頭出濁醪人倦消幾壺睡起日已高曉色開煙蕪漁灣一兩家點染江村圖沙嘴何人舟消息傳姑蘇或云江州下不比揚州屠早晚安集掾鞍馬來南都或云移民房插箭下嚴符囊槖歸他人婦女充軍俘里老獨晏然催辦今年租饁耕看賽社醵飲聽呼盧軍馬總不來里巷相為娛而我遊其間坦腹行徐徐見人盡恭敬不識誰賢愚魚蝦盈小市鳬雁充中厨月出浮溪光萬象疑沾濡放楫凌滄浪笑弄驪龍珠夷猶發浩唱禮法胡能拘東南雖板蕩此地其黃虞世事有反覆變亂興須臾草草十數人盟歃起里閭兔園一老生自詭讀穰苴漁翁爭坐席有力為專諸舴艋飾於皇簑笠裝犀渠大笑擲釣竿赤手搏於莬欲奪夫差宮坐擁專城居豫又出子門十步九崎嶇脫身自刃間性命輕錙銖我去子亦行後各還其廬官軍雖屢到尚未成丘墟生涯免溝壑身計謀樵漁買得百畝田從子遊長沮天意不我從世網將人驅親朋盡追送涕泣登堂姑艱難總頭白動止需人扶妻妾病伶丁嘔吐當中途長女僅九齡餘泣猶􅈱呱入君所居室燈火映窗疏寬間分數寢嬉笑喧諸雛縳帚東西廂行李安從奴前窗張罣網後壁挂耒鋤苦辭村地僻客舍無精粗剪韭烹伏雌斫鱠炊雕胡牀頭出濁醪人倦消幾壺睡起日已高曉色開煙蕪漁灣一兩家點染江村圖沙嘴何人舟消息傳姑蘇或云江州下不比揚州屠早晚安集掾鞍馬來南都或云移民房插箭下嚴符囊槖歸他人婦女充軍俘里老獨晏然催辦今年租饁耕看賽社醵飲聽呼盧軍馬總不來里巷相為娛而我遊其間坦腹行徐徐見人盡恭敬不識誰賢愚魚蝦盈小市鳬雁充中厨月出浮溪光萬象疑沾濡放楫凌滄浪笑弄驪龍珠夷猶發浩唱禮法胡能拘東南雖板蕩此地其黃虞世事有反覆變亂興須臾草草十數人盟歃起里閭兔園一老生自詭讀穰苴漁翁爭坐席有力為專諸舴艋飾於皇簑笠裝犀渠大笑擲釣竿赤手搏於莬欲奪夫差宮坐擁專城居豫又出子門十步九崎嶇脫身自刃間性命輕錙銖我去子亦行後各還其廬官軍雖屢到尚未成丘墟生涯免溝壑身計謀樵漁買得百畝田從子遊長沮天意不我從世網將人驅親朋盡追送涕泣登征車吾生罹干戈猶與骨肉俱一官受逼迫萬事堪欷歔倦策既歸來入室翻次且念我平生人慘憺留羅襦秋雨君叩門一見驚淸癯我苦不必言但坐觀髭鬚歲月曾幾何筋力遠不如遭亂若此衰豈得勝奔趨十年顧妻子心力都成虛分離有定分久暫理不殊翻笑危急時奔走徒區區君時聽我語顔色慘不舒亂世畏盛名薄俗容小儒生來遠朝市謂足逃沮洳長官誅求急姓氏屬里胥夜半聞叩門瓶盎少所儲豈不惜堂構其奈愁征輸庭樹好追涼剪伐存枯株池荷久不開歲久填泥淤廢宅鋤為田薺麥生階除當時棲息地零落今無餘生還愛節物高會逢茱萸好採籬下菊且讀囊中書中懷苛自得外物非吾須君觀鴟夷子眷戀傾城姝千金亦偶然奚足稱陶朱不如棄家去漁釣山之隅江湖至廣大何惜安微軀揮手謝時輩愼勿空躊蹰清涼山讃佛詩四首西北有高山云是文殊臺臺上明月池千葉金蓮開花花相映發葉葉同根栽王母携雙成緑蓋雲中來漢主坐法宮一見光徘徊結以同心合授以九子叉翠裝雕玉輦丹髹沉香齋護置琉璃屏立在女石階長恐乘風去舍我歸蓬萊從獵往上林小隊城南隈雪鷹異凡羽果馬殊羣林言過樂遊苑進及長楊街張宴奏絲桐新月穿宮槐攜手忽太息樂極生微哀千秋終寂寞此日誰追陪陛下壽萬年妾命如塵埃願共南山槨長奉西宮杯披香淖博士側聽私驚猜今日樂方樂斯語胡為哉待詔東方生執戟前詼諧薰罏拂黼帳白露零蒼苔吾王愼玉體對酒毋傷懷其二傷懷驚涼風深宮鳴蟋蟀嚴霜被瓊樹芙蓉凋素質可憐千里草萎落無顔色孔雀蒲桃錦親自紅女織殊方初云獻知破萬家室瑟瑟大秦珠珊瑚高八尺割之施精藍千佛莊嚴飾持來付一炬泉路誰能識紅顏尚焦土百萬無容惜小臣助長號賜衣或一襲只愁許史輩急淚難時得從官進哀誄黃紙鈔名入流涕盧郎才咨嗟謝生筆尚方列珍膳天厨供玉粒官家未解菜對案不能食黑衣召志公白馬馱羅什焚香內道場廣座楞伽譯資彼象教恩輕我人王力微聞金雞詔亦由玉妃出高原營寢廟近野開陵邑南望蒼舒墳掩面添悽惻戒言秣我馬遨遊凌八極其三入極何茫茫曰往淸涼山此山蓄靈異浩氣供屈盤能蓄太古雪一洗天地顔日馭有不到縹眇風雲寒世尊昔示現説法同阿難講樹聳千尺搖落靑琅玕諸天過峰頭絳節乘銀鸞一笑偶下謫脫却芙蓉冠遊戲登瓊樓窈窕垂雲鬟三世俄去來任作優曇看名山初望幸銜命釋道安預從最高頂灑掃七佛壇靈境乃杳絶捫葛勞躋攀路盡逢一峰傑閣圍朱闌中坐一天人吐氣如栴檀寄語漢皇帝何苦留人間煙嵐倐滅沒流水空潺湲回首長安城緇素慘不歡房星竟未動天降白玉棺惜哉善財洞未得誇迎鑾惟有大道心與石永不刋以此護金輪法海無波瀾其四嘗聞穆天子六飛騁萬里仙人觴瑤池白雲出杯底遠駕求長生逐日過濛泛盛姬病不救揮鞭哭弱水漢皇好神仙妻子思脫屣東巡并西幸離宫宿羅綺寵奪長門陳恩盛傾城李穠華即修夜痛入哀蟬誄苦無不死方得令昭陽起晚抱甘泉病遽下輪臺悔蕭蕭茂陵樹殘碑泣風雨天地有此山蒼崖閲興毀我佛施津梁層臺簇蓮蘂龍象居虛空下界聞鬪蟻乘時方救物生民難其巳淡泊心無為怡神在玉几長以兢業心了彼淸淨理羊車稀復幸牛山竊所鄙縱灑蒼梧淚莫賣西陵屨持此禮覺王賢聖總一軌道參無生妙功謝有為耻色空兩不住收拾宗風裏石公山真宰斷雲根奇物思所置養之以天池盆盎插靈異初為仙家菌百仞千倉閉釜鬲炊雲中杵臼鳴天際忽而遇嚴城猿猱不能縋遠窺樓櫓堅逼視戈矛利一關當其中飛鳥為之避仰睇微有光投足疑無地循級登層巔天風豁蒼翠疲喘千犀牛落落誰能制傴僂一老人獨立拊其背既若拱而揖又疑隱而睡此乃為石公三問不吾對歸雲洞歸雲何孱顔雕斫自大古千松互盤結託根無一土呀然丹崖開蒼茫百靈斧萬載長欹危撑拄良亦苦古佛自為相一身雜仰俯依稀莓苔中葉葉青蓮吐若以庋真詮足號藏書府仙翁刺船來坐擘麒麟脯鐡笛起中流進酒虬龍舞晚向洞中眠叱石開百武牀几與棋局一一陳廊廡朗然自茲去黃鵠瀟湘浦恐使吾徒窺還將白雲補林屋洞震澤初未定水石爭相攻神龍排杳冥蕩擊沉虛宮仙人資禹力洞府開洪濛惜哉石函書不救夫差窮大道既已泄國祚於焉終我行訪遺迹與極探虛空絶徑不可肥自視猶枯筇山神愛傴僂直立憂微躬以之生退怯匍匐羞兒童傳聞道險澀谽谺來天風松炬厭明滅乳竇驚靑紅洪崖應常來牀几陳從容何不回真馭日月行其中銀房閟幽異勿使吾徒同終當齎餱糧錬骨如飛鴻路穿三江底境與諸天通南浮瀟湘水西上峩眉峰歸來詫里人足比靈威翁送周子俶四首五載寄幽燕歸來問家室入門四壁在小婦當窗織恐其話飢寒且呼治酒食妻子識君心低頭惟默默嗟余忝鄰里欲語弗遑及聞君又行邁君歸曾幾日眷此父母邦過若遠鄉客丈夫志四海行矣須努力其二努力贏餱糧秋風即長路京口正用兵倉皇過瓜步扁舟戒行李六月黃河怒脫身萬仞淵此險何足數慷慨輕波濤長年豈知故中道感舊友良為詩書誤餘生嬰世網重來獻詞賦登高望烽火躊躇屢回顧其三回顧去鄉遠近及長安城禁門十二戟策馬聞雞鳴解褐初登朝日出趨承明慶雲生階墀天樂和且平立談計誠用萬里無專征忘形樂簡易任氣高縱橫常恐斗酒後脫略驚公卿一官了婚嫁可以謀歸耕其四歸耕東岡陂淸流貫羣木月明夜方靜高話溪堂宿破産求神仙丹砂徇微祿玉書晚應悟至道亡情欲一飯輒萬錢并日恆不足知交雖云厚距可先骨肉閲世經艱難息心謝榮辱平生著述事尚有殘編讀蕩子失意行贈李雲田君家楚山下門前溪水流願識賢與豪不羡公與矦動足有萬里妻子何能留丈夫重意氣耻為兒女柔中夜理瑤瑟思婦當高樓鶯花二三月送君下揚州小孤白浪惡腸斷征帆收長干嬌麗地一顧嘶驊騮菡萏亦已落蘭杜方經秋十月嚴風寒剪燭紉衣裘太行車輪摧落葉填霜溝君又自茲去匹馬將誰投趙女顏如花窈窕回明眸皎皎雙行躔巧笑搴羅幬男兒重紅粉妾夢輕浮漚今年附書至慰訊猶綢繆客囊無長物旅病才新瘳途窮徇知已進止詎自由狂走三十年布褐空蒙頭不如歸去來漁釣滄浪謳大兒誦文史小婦彈箜篌南村沽社酒西舍牽耕牛人生一蘧廬漂泊如飛鷗得意匪為樂失路寧關愁居為段干隱出作盧敖遊我欲竟此曲君笑登扁舟碧天浩無際極目徒悠悠丁未三月草四日從山後過湖宿福源精舍干林巳暝色一峰猶夕陽拾級身漸高樵徑何微茫回看斷山口樹杪浮湖光松子向前落道人開石房橘租養心性取足鬚眉蒼淸磬時一聲流水穿深篁我生亦何幸暫憩支公牀客夢入翠微人事良可忘草五日偕穆苑先孫浣心葉豫聞允女遊石公山盤龍石梁寂光歸雲諸勝大道無端倪真宰有融結兹山在天壤靈異蓄不泄萬竅凌虛無一柱支毫末疑豈愚公移愁為巨靈拔劉根作堂奧柳毅司扄鐍誰啓仙人閣繫我漁父枻刻鏤洪𪷟雲雕搜大荒雪或人而痀瘻或馬而蹄齧或負藏壑舟或截專車節或象神鼎鑄或類昆吾切地肺庖丁解月窟工倕伐石囷封餱糧天厨甃涓潔重隒纍瓿甑短柱增櫨梲瓜瓤觚稜剖木皮槎丫裂皚皚黃河水炎炎崑岡爇㟏岈舞辟邪舕舑張叨餮斗起聳雲關一道通箭筈碧藕玲瓏根文螺宛委穴丹梯躡而上欎欎虛皇闕突兀撑靑旻插地屏障列一身生羽翰百尺跨虹霓斷澗吟楓柟颯爽侵毛髮側窺漏日影了了澄潭徹雞聲出煙井乃與人境接回思頃所厯過眼才一瞥秦皇及漢武好大同蠓蠛齊諧不能志炙輠不能説酈桑二小儒注書事抄撮陋襲李斯碑闕補周王碣關同亦妙手惜未適吳越嵩華雖云高無以鬬巧拙時俗趁􅐾媚煙巒漫塗抹妄使傖父輩笑我驕蟻垤京江吸金焦漢水注大別流峙合而􅚈竒氣乃一發睥睨五嶽間誰與分優劣扶杖一村翁眼看話年月昔􅑮猶兒童今見已耄耋昨聞縣帖下搜索到魚鱉訝彼白鼉逃無乃靑草竭却留幽境在似為肥遁設當年綺里季卜居採薇蕨皓首走漢廷恨未與世絶若隨靈威去此處攬藤葛子房知難致欲薦且捫舌浮生每連蜷塵界儘空濶謀免妻孥愁計取山水悅入春桃李過韶景聽啼鴂籃輿纍親舊同載有二葉穆生老而健孫郎才且傑彼忘筋力勞我愛賓朋挈過湖曳輕帆入寺憩深樾老僧諧語笑妙理攻麯蘖曉起陳盤餐飽食非粗糲桑畦路宛宛筍屩行兀兀快意在此遊失記遺七人平湖鋪若茵磐石幾人歇蹲踞當其旁拒戶相支遏黝黑聲訇稜欲進遭嗔喝側肩僅容趾腹背供磨軋下踹蘚磴牢上覻崩崖豁攀躋差毫釐失足憂一蹶前奇慕先過後險欣仨脫歌呼雜齠稚嘻笑視履襪君看長安道高步多蹉跌散誕來江湖蒲伏羞干謁頭因石文低腰向山靈折四月將已近天時早炎熱揮汗何沾濡驚飈俄凛冽歸來北窗枕響入山溜徹不寐話夜涼連牀擁裘褐晚嵗艱出門端居意騷屑間蹤習羈旅逸興貪放達跌蕩馮夷宮遊戲天吳窟將毋神鬼怒亟遺風雨奪勝事滿現前得失歸勇怯衰老偕故人幸喜兹遊決他年子胥濤百里聞吒咄鱣鮪隨風雷頸鎖金牛掣鮫人拭牀几神女洗環玦硠磕打空灘澎湃濺飛沫噌吰無射鐘嘹喨𬎼賓鐡孤客為旁皇嫠婦為悽咽那知捩柁下我輩行車轍再拜告石公相􅑮慰飢渴既從人間世忍再洪波沒志怪作大言嗜奇私神物肯學楊焉鐫願受壺公訣縮之入懷袖弄之置盆鉢栽松龍氣上蓄水雲根活長留文士玩勿被山君竊嘗聞岣嶁峰科斗尊往牒剝蝕存盤螭捫索嗟完缺此山通巴陵下有神禹札後代文字衰致起龍蛇孽我有琅玕管上邐湘娥血濯足臨滄浪浩思吟不輟未堪追陽氷猶足誇李渤隱從煙霞閉出供時世閲刻之藏書巖千載應不滅遊石公歸是夜驟雨明晨微霽同諸君天王寺看牡丹煙嵐淡方霽沙暖得徐步訪寺苔徑微遠近人語誤道半逢一泉曲折隨所赴觸石松頂飛其白或如鷺尋源入杳冥壑絶橋屢渡中有二比丘種桃白雲護花將舞而笑石則落猶怒澆之以杯酒娟然若回顧此處疑仙源快意兼緇素苦辭山地薄縣官責常賦蔬果雖巳榮龍象如欲訴學道與養生得失從時務吾徒筋力衰萬事俱遲暮太息因歸來鐘聲發淸悟揖山樓名山誰逢迎遇人若俯仰心目無端倪默然與之往幽泉互相答飛鳥入空想傑閣生其間櫺軒爭一爽嘉樹為我圓坐久惜餘賞瞑靄忽而合明月出孤掌彈琴坐其中萬籟避淸響良夜此會難佳處莫能奬題江右非非子訪逍遙子圖我聞逍遙子養性白雲裏嘗欲往從之千峰隔秋水訪道者何人驢背浩歌起欲問其姓名不知誰者是呼之以非非應言聊唯唯道人豈老𣆀處士疑尹喜此方揚吟鞭彼且揮麈尾秋山發淸悟丹楓樹如薺谷口俄怒號隨風墮牀几大道本見前開落有如此富貴供掉頭妻孥供脫屣我當自茲去褰裳慕輕舉鹽官僧香海問詩於梅村村梅大發以詩謝之但訪梅花來今見梅花去何必為村翁重尋灌園處種梅三十年繞屋已千樹飢摘花蕊餐倦抱花影睡枯坐無一言自謂得花意師今遠來遊恰與春光遇索我囊中詩搔首不能對寄語謝故人幽香養衰廢溪頭三尺水好洗梅魂句直溪吏直溪雖鄉村故是尚書里短棹經其門呌聲忽盈耳一翁被束縛苦辭槖如洗吏指所居堂即貧誰信爾呼人好作計緩且受鞭箠穿漏四五間中巳無窗几屋梁紀月日仰視殊自耻昔也三年成今也一朝毀貽我風雨愁飽汝歌呼喜官逋依舊在府帖重追起旁人共欷􅒣感歎良有以東家瓦漸稀西舍墻半圮生涯分應盡遲速總一理居者今何栖去者將安徙明歲留空村極目惟流水臨頓兒臨頓誰家兒生小矜白晢阿爺負官錢棄置何倉卒紿我適誰家朱門臨廣陌囑儂且好住跳弄無知識獨怪臨去時摩首如憐惜三年教歌舞萬里離親戚絶伎逢侯王寵異施恩澤高堂紅氍毹華燈布瑤席授以紫檀槽吹以白玉笛文錦縫我衣珍珠裝我額瑟瑟珊瑚枝曲罷恣狼藉我本貧家子邂逅遭拋擲一身被驅使兩口無消息縱賞千黃金莫救餓死骨歡樂居宅鄉骨肉誠何益梅村家藏藁卷弟九終

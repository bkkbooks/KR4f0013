front:
  text: 梅村家藏藁卷弟十七詩後集九
  hash: sha256:2cef8cddcead7b961ccf335716469917fa3d51945dfcfd5adca70b9259df8422
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_017-1a}
body:
  text: 七言律詩七十四首庚子八月訪同年吳永調於錫山有感賦贈四首草載京華共酒尊十人今有幾人存京師知己為真率會今其零落已盡多愁我已嫌身世高卧君還長子孫土馬孤城喧渡口雲山老屋冷溪門相逢萬事從頭問樺燭三條照淚痕其二杖藜何必遠行遊抱膝看雲鶴氅裘天遣名山供户牖老逢佳節占風流干戈定後身還健花月間時我欲愁莫歎勝情無勝具亂峰深處著高樓永調有足疾其三黃花秋水五湖船客鬢蕭騷別幾年老去妻孥多下世窮來官長有誰賢酒杯驅使從無分書卷消磨絶可憐賸得當時舊松菊數間茅屋對晴川其四虛臺便闕信沉沉話及淸郎淚不禁到處風波寧敢恨僅存兄弟獨何心南州師友江天笛北固知交午夜砧從此溪山避矰繳暮雲黃葉閉門深送張玉甲憲長之官卭雅四首秋水連天棹五湖勞勞亭畔客心孤飄蓬宦迹空迢遞浩劫山川尚有無石鏡開花惟自照郫筒憶酒向誰沽蕭條大散關頭路匹馬西風入畫圖其二劒外新傳一道通十年羣盜漫稱雄橫刀割取靑神渡烈火燒殘白帝宮豈有山川歸李特猶能車馬識文翁誰將牛斗龍泉氣移在天彭井絡中張從江南學使者遷是職其三岷峨悽愴百蠻秋路折卭崍九坂愁城裏白雲從地出馬前黑水向人流松番將在看高卧雪嶺僧歸話遠遊欲問辟支諸佛土貝多羅樹即關頭雅州關外即烏思藏其四錦宮春色故依然料理蠶叢半壁天葛相祠堂彜有迹譙玄門户訪誰傳還家杜宇三更夢寄遠菖蒲十樣箋此去壯遊何所恨思君長問楚江船哭中書趙友沂兼東其尊甫洞門都憲長沙長子九江船御史臺西月正圓兩省親朋歡笑日一官詩酒亂離年朱樓有淚看楊柳白髮無家聽杜鵑太息賈生歸未得湘花湘草夕陽邊贈學易友人吳燕餘二首風雨菰蘆宿火紅胥靡憔悴過牆東吞爻夢逐虞生放端策占成屈子窮縱絶三編身世外橫添一畫是非中道人莫訝姚平笑六十應稱未濟翁其二注就梁丘早十年石壕呼怒蓽門前范升免後成何用寧越鞭來絶可憐人世催科逢此地吾生憂患在先天從今郫上田休種簾肆無家取百錢壽繼起和尚故山東望路微茫講樹秋風老著霜不羡紫衣誇妙相惟憑白足遍諸方隨雲舒卷身兼杖與月空明詩一囊台頂最高三萬丈道人心在赤城梁惠山二泉亭為無錫吳邑侯賦九龍山半二泉亭水遞名標陸羽經寺外流觴何處訪公餘飛舄偶來聽丹凝高閣空潭紫翠涇層巒萬樹靑治行吳公今第一此泉應足勝中泠贈張以韞來鶴詩草聖傳家久著聞斗看孤鶴下層雲路從蓬島三山遠影落琴川七水分自是昻藏矜鳳侣休教嫉妬報雞羣春風一樹梅花發耐守寒香孰似君過三峰蘗公話舊霜落千峰曵杖尋筍輿衝雨過高林埋書草沒松根史洗鉢泉流石磴琴萬事幾經黃葉夢三生難負碧潭心山童不省團圞話催打溪鐘夜未深永平田君宗周吳故學博也袁重其識之尤展成司李其地相見詢袁年百有二矣索詩紀異并簡展成北平車馬訪煙蘿記向夷齊廟下過百歲共看秦伏勝一經長在漢田何知交已料滄江少耆舊翻疑絶塞多聽罷袁絲數東望酒酣求作絳人歌顧西巘侍御同氿友聖虎丘即事四首注就逍遙賦大風彥先才調擅諸公晴川兩岸憑欄外雪嶺千尋攬轡中我昔楚江同宋玉君今吳市訪梁鴻芳洲杜若無能採慚愧當年過渚宮其二喻蜀書成楚大夫征帆萬里到江湖鄉心縹眇思黃鶴祖德風流話赤烏問俗駐車從父老尋山著屐共生徒君家自有丹靑筆衰白追陪入畫圖其三生公石畔廣場開短簿祠荒閉緑苔山榼偶攜羣吏散布帆無恙故人來爭傳五月登高會應改三江作賦臺自是野王思故里可知先賞陸機才其四一馬雙僮出野塘論文蕭寺坐匡牀花移堠鼓靑油舫月映行厨白石廊漫叟短歌傷老大散人長揖恕淸狂細將朋友從頭數落落申生鳬盟與沈郎贈松江郡侯張升衢從江寧遷任石城門外水東流簫鼓千人最上頭二陸鄉園江畔樹三張詞賦郡西樓油幢置酒蓴鱸夜畫舫鈎簾粳稻秋聞道靑溪行部近兒童欣喜使君遊贈松郡副守涪陵陳三石官董漕獨上高城回首難揚雄老去滯微官湖天搖落雲舒卷巫峽蕭森路折盤草載兵戈違故里千村輸挽向長安京江原是三巴水莫作郫筒萬里看贈松郡司李內江王擔四十月江天曉放衙茸城寒發錦城花金堤更植先人柳玉壘重看使者車父侍御治京口湖堤庾嶺霜柑書憶弟弟粵東令曲阿春釀夢思家侍御避亂僑居丹陽詩成別寫鵝溪絹聽壁風篁醉墨斜善寫竹贈彭郡丞益甫樓船落日紫貂輕坐嘯胡牀雁影橫雨過笛生黃歇浦花開夢繞發干城舊棠邑令龍蛇絹素爭搖筆善書松杏山河已息兵杏山人慷慨與君談舊事夜深欣共酒杯傾十月下浣偕九日過雲間公宴閬石蒼水齋中同文饒諸子二首百里溪山訪舊遊南皮賓客盛風流文章座上驚黃絹名字人間愧白頭董相園開三徑夜陸生臺在九峰秋酒酣莫話當年事門外滄江起暮愁其二霜落南樓笑語淸無端街鼓逼嚴城三江風月尊前醉一郡荆榛笛裏聲花滿應徐陪上宴歌殘嵇阮隔平生歸來枕底天涯夢喔喔荒雞已五更贈松江別駕日照安肇開秋盡西風鬢影蒼伏生經術蓋公堂雞聲日出秦祠遠鶴唳江空禹迹荒二水淄澠杯酒合三出樓觀畫圖裝歸來好啖安期棗不夜城頭是故鄉滇池鐃吹四首碧雞臺榭亂雲中舊是梁王避暑宮銅柱雨來千嶂洗鐡橋風定百蠻通朱鳶縣小輸賨布白象營高挂柘弓誰唱太平滇海曲檳榔花發去年紅其二苴蘭城闕鬱岧嶤貝葉金書使者朝海內徵輸歸六詔天邊動伐定三苗魚龍異樂軍中舞風月蠻姬馬上簫莫向昆明話疏鑿道人知巳劫灰消其三靄翠奢香祠總荒蘆笙吹徹瘴雲黃縱擒有策新疆定叛服何常舊史亡鬼國三年勞薄伐王師五月下殊方瀾滄肯為它人渡不許窺人有夜郎其四盤江西繞七星關可渡河邊萬仞山隴上舊傳收白帝南中今喜定烏蠻龍坑壯馬看馳驟雞足高僧任往還辛苦武侯停節處殘碑零落草班班儒將河朔功名指顧收身兼使相領諸侯按兵白道調神鶻挾妓靑山駕快牛論敵肯輸楊大眼知書不減范長頭它年信史推儒將馬矟淸談第一流俠少寶刀千直氣凌雲俠少新參龍武軍柳市博徒珠勒馬柏堂箏妓石華裙招權夜結金安上挾策朝干王長君堪笑年年祕書客白頭空守太玄文山居即事示王惟夏郁計登諸子灌木淸漳五畝居山菘簷果釣竿魚金龜典後頻賖酒麈尾燒來為著書對客好穿高齒屐出門常駕短轅車陸倕張率呼同載三月江南正祓除九峰詩九首鳯凰山碧樹丹山千仞岡夫差親獵雉媒場五茸風動琅玕實三泖雲流沆瀣漿鳥聽和鳴巢翡翠花舒錦翼照文章西施醉唱秦樓曲天半吹簫引鳳凰厙公山厙公石䃭掩莓苔千載陰符戰骨哀鐵斧任從田父識玉書休為道人開三分舊數江東望二俊終非馬上才恨殺圯橋多授受鬪它劉項至今來神山紫蓋靑童白鹿巾細林仙館鶴書頻洗來丹井千年藥蛻去靈蛇五色鱗洞起春雲招勝侶潭空秋月證前身赤松早見留侯志何况商顔避世人佘山溪堂剪燭話徵君通隱升平半席分茶笋香來朝命酒竹梧陰滿夜論文知交倒屣傾黃閣妻子誅茅住白雲處士盛名收不盡至今山屬佘將軍薛山薛公高卧始何年學士傳家有墓田枉自布衣登侍從長將雲壑讓神仙坐來石榻蒼苔冷採得溪毛碧藕鮮最愛玉屏山下路月明橋畔五湖船機山蒹葭滿目雁何依內史村邊弔陸機豪士十年貪隱遁通侯三世纍輕肥江山麗藻歸文賦京洛浮沉負釣磯白夾未還靑蓋遠辨亡書在故園非橫雲山橫雲插漢領諸峰雨過泉飛亂壑松赤壁豈徑新戰伐丹楓須記舊遊蹤祠荒故相江村鼓客散名園蘭若鐘莫信豢龍雲不去此山雲只為人龍山有龍母祠又陸雲故宅天馬山龍媒天馬出昆崙靑海長留汗血痕此地干將騰劍氣何來逸足鎖雲根石鯨潭影秋風動山有二石魚飛去鐵笛江聲夜雨昏鐡崖葬處芻秣可辭銜勒免空山長放主人恩小昆山積玉昆岡絶代無讀書臺上賦吳都君臣割據空祠廟家國經營入畫圖勢去河橋悲士馬詩成山館憶蓴鱸傷心白璧投何處汗簡淒涼陸大夫送贑州曾庭聞孝廉移家寧夏十年走馬向天涯回首關河數暮鴉大庾嶺頭初罷戰賀蘭山下不思家詩成磧裏因聞雁書到江南定落花夜半酒樓羌笛起軟裘衝雪踏鳴沙贈何匡山早年納節卧滄浪回首風塵鬢髮蒼陶令軍營姑孰口大兵收溧陽參其軍事謝公遊墅石門莊後僑寓溧陽太白所謂石門精舍即其地也山田種罷輸常稅海國歸來認故鄉何本疁城人今歸二月村居春雨足官梅花發為何郎題海虞孫子長七十夀圖春秋注就授生徒虞仲祠前一老夫烏几看雲吟菌閣布帆衝雨醉菱湖空山撫操彈三峽故國興懷賦兩都同輩半非身健在為誰寫入煉丹圖虞有徐神翁煉丹處觀蜀鵑啼劇有感四首并序蜀鵑啼者丘子嶴雪為吾兄成都令志衍作也志衍一官遠宦萬里嚴裝愛弟從行故人送別上遊梗塞盡室扶攜既舍氷而登山甫自滇而入蜀北都覆沒西土淪亡身殉封疆家罹鋒鏑嗚呼三十六口痛碧血之何存一百八盤招遊魂而莫返無兒可托有弟言歸竄身荆棘之林乞食猿猱之族望蠻煙而奔走脫賊刃以崎嶇恥趙禮之獨全赤眉何酷恨童烏之不免黃口奚辜爰將委巷之謳展作巴渝之舞庾子山之賦傷心時方板蕩袁山松之歌行路聞且唏獻余也老逐歡遊間逢浩唱在中年早傷於哀樂况昔夢重感乎交朋豈獨伍相窮來憐者有同聲之歎遂使雍門曲罷泫焉如亡邑之人瞻望兄兮猶來思悲翁而不見蘭堂客散金谷詩成非關聽伎之吟聊當懷人之什爾花發春江望眼空杜鵑聲切畫簾通親朋形影燈前月家國音書笛裏風百口悔教從鳥道一官催去墮蠶叢雪山盜賊今何處腸斷箜篌曲未終其二江關蕭瑟片帆留策馬俄成萬里遊失計未能全愛子端居何用覓封侯雲山已斷中宵夢絃管猶開舊日樓二月東風吹水調鶺鴒原上使人愁其三平生兄弟劇流連高會南樓盡少年往事酒杯來夢裏新聲歌板出花前靑城道士看遊戲白髮衰翁漫放顚雙淚正垂俄一笑認君真巳作神仙劇中志衍兵解仙去其四過盡蠻江與瘴河還家有弟脫兵戈狂從劇孟千場博老愛優旃一曲歌紅豆花開聲宛轉緑楊枝動舞婆娑不堪唱徹關山調血汚遊魂可奈何題華山蘗菴和尚畫像二首和尚熊姓字魚山直諫豫杖不死後入道清如黃鵠矯如龍浩劫長搘不壞松四國雞壇趨北面千年雪嶺啓南宗西銘復社漢月禪燈皆師令吳江時身所興起江湖夙世歸梅福經卷殘生繼戴顒諍論總銷隨諫草故人巳隱祝融峰繼公隱南嶽蘗公本師也其二西南天地歎無歸漂泊干戈愛息機黃蘗禪心淸磬冷白雲鄉樹遠帆微全生詔獄同官在指薑如農乞食江城故老稀松陵布衲綻來還自笑篋中血裹舊朝衣戊申上已過吳興家圍次太守招飲郡圃之愛山臺坐客十人同修禊事余分韻得苔字六客堂西禊飲臺亂山高會嘯歌開塔懸津樹雨中出鐘送浦帆天際來同輩酒狂眠怪石前賢墨妙洗蒼苔右軍勝集今誰繼仗有吾家季重才立夏日陪園次郡伯過孫山人太白亭落成置酒分韻得人字春盡山空鶴唳頻亂雲歸處鎖松筠江湖有道容奇士關隴無家出俊人招隱起亭吟社客散仙留冡醉眠身一瓢零落殘詩在誰伴先生理鈞緡得友人札詢近况詩以答之溪堂六月火雲愁支枕間窗話貴遊王令文章今日進丘公仕宦早年休道衰薄俗甘棲遁才退殘書勉勸讐京雒故人聞健飯黃塵騎馬夾城頭八風詩八首并序余消夏小園風塕然而四至雖冷泠可以析酲已疾而淒其怒號不能無爰居之思避其庶人之雌風乎聊廣其意作為此詩莊列寓言沈謝作賦庶以鳴候蟲而諧比竹若云俟諸輶軒則此不足採也其一東風汴水楊花撲面迎飄飄飛過雒陽城陶潛籬畔吹殘醉宋玉墻頭送落英油壁馬嘶羅袖舉緑塘波皺畫簾聲獨憐趙后身輕甚斜倚雕闌待月生其二南風玉尺披圖解愠篇相烏高指越裳天終南雲出松檜響雙闕雨飛鈴索懸師曠審音吹不競鍾儀懷土操誰傳九疑望斷黃陵廟曾共湘靈拂五絃其三西風落日巴山素女秋梧宮蕭瑟唱涼州白團掌內恩應棄絳蠟窗前淚未收隴坂征夫蘆管怨玉關思婦杵聲愁可堪益部龍驤鼓獵獵牙旗指石頭其四北風萬里扶搖過白登少卿書斷雁難憑蕭梢駿尾依宛馬颯爽雄姿刷代鷹野火燒原靑海雪驚沙擊面黑河氷愚公墐戶頭如蝟傳道君王獵霸陵其五東南風紫蓋黃旗半壁中斗牛斜直上遊通漫分漢沔魚龍陳須仗江湘烏鵲風捩柁引船濡口利禡牙揮扇赭圻功試看片刻周郎火一捲曹公戰艦空三國志周瑜傳注黃蓋取輕艦十舫載燥荻枯柴建旌旗于上時東南風急同時發火燒盡北船曹公退走其六西南風武帝雄圖卭筰開相如馳傳夜郎回巴童引節旌旄動𤏡馬隨車塵土來堯女尚應愁赭樹史記秦皇西南渡淮水浮江至湘山祠逢大風幾不得渡知是堯女使刑徒伐湘山樹赭其山楚王從此怕登臺小臣欲進乘槎賦萬里披襟好快哉其七東北風飛廉熛怒向人間徐福求仙恨未還萬乘雨休封禪樹史記封禪書始皇上太山遇暴風雨休于大樹下八神波斷羡門山史三神山在渤海中患且至則船引風而去始皇時方士皆以風為解八神皆在齊北成山斗入海最居齊東北隅蕭蕭班馬東巡海發發嚴旌北距關錯認祖龍噫氣盛蓬萊咫尺竟誰攀其八西北風沛宮親作大風歌往事彭城奈楚何身陷重圍逢晦冥天留數騎脫干戈史記項王圍漢王三匝大風從西北起折木發屋揚沙石窈冥晝晦楚軍亂乃得遁去威加河朔金方整地繞幽并殺氣多好祭蚩尤祔風伯飛揚長護漢山河贈同年嘉定王進士內三四首槎浦岡頭自種田居然生活勝焦先赤松採藥深山隱白鶴談經古寺禪孺仲清名交宦絶彥方高行里閭傳曲江細柳新蒲緑回首銅龍對䇿年其二翠竹黃花一草堂柴門月出課耕桑蘇林投老思遺事譙秀辭徵住故鄉強飯却扶芒屨健高歌脫帽酒杯狂莫嗟過眼年光易征調初嚴已十霜其三先生吟社夜留賓紫蟹黃雞甕面春萬事夢中稱幸叟一家榜下出間人內三及二子皆科第而不仕君房門第多遷改叔度才名固絶倫指上谷江夏靑史舊交餘我在北窗猶得岸烏巾其四晚歲風流孰似君烏衣子第總能文靑箱世業高門在白髮遺經半席分正禮雙龍方矯角釋奴千里又空羣外家流輩非容易肯信衰宗有右軍大中丞心康韓公九月還自淮南生日為壽閶闔淸秋爽氣來尚書新自上遊回八公草木登高宴九日茱萸置酒臺兵食從容經久計江淮安穩濟時才尊前好唱南山曲笳鼓西風笑語開贈李膚公五十先德傳家厯苦辛汗靑零落剩間身雲山笑傲容遺叟松菊招尋見故人猶有田園供伏臘豈無書卷慰沉淪只看五月開樽宴撥刺江魚入饌新庚戌梅信日雨過鄧尉哭剖石和尚遇大雪夜宿還元閣二首筍輿衝雨哭參寥宿鳥啾鳴萬象凋北寺九成新妙塔師修報恩塔𥘉成南湖千頃舊長橋雲堂過飯言猶在去歲與師同飯山閣雪夜挑燈夢未消最是曉鐘敲不寐半天松栝影蕭蕭其二投老相期共閉關師有招住山中之約影堂重到淚潺潺身居十地莊嚴上師初刻華藏圖道出三峰玄要間壤衲風光靑桂冷四宜堂叢桂最盛殘經燈火白雲間吾師未句分明在雪裏梅花雨後山感舊贈蕭明府余年三十有一以己卯七月奉命封延津孟津兩王於禹州過汴梁登梁孝王臺適學使者會課屬郡知名士於臺上因與其人咨訪古迹徘徊久之而後行逾三十三年雒陽蕭公涵三從道臣左官來治吾州拭目驚視云曾識余則蕭公乃臺上諸生中一人也感舊太息為賦此詩三十張旌過大梁繁臺憑眺遇蕭郎黃河有恨歸遺老朱邸何人問故王授簡肯忘羣彥會棄繻誰識少年裝長卿駟馬高車夢卧疾相逢話草堂送許堯文之官莆陽二首烏石煙巒列畫圖雙旌遙喜入名都路經鷓嶺還龍嶺符剖鴛湖更鯉湖訪舊草堂搜萬卷吟詩別墅補千株知君不淺絃歌興别有高樓起望壺其二榕陰五馬快驂驔親到遊洋古越南抹麗香分魚魫細荔支漿勝橘奴甘鮫宮月映浮春嶼蜃市煙消見夕嵐此去褰帷先問俗上溪秋色正堪探梅村家藏藁卷弟十七終

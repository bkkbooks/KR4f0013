body:
  text: 傳謝封翁傳定海慈孝村人人皆稱謝封翁翁諱瀚字愛夫別號泮池其先有令定海者遂家焉世以孝聞能修廬墓禮村以是得名其墓間夜輒聞呼謈聲肰若讞決者諺爲語曰謝家墳鬼開門元初年間毁墓石繕城闉村人以靈異故爭畚土掩覆故謝墳封鬛至今高丈二尺許云屢傳而有琛者以上饒令起家政治神明號曰謝城隍琛弟璵四傳而爲贈㕘政公大綸卽翁之父也時產已中落翁年十一二日見家不能炊遂緣江岸禱水神沙且没踵倏大蛤數斗湧出徐囊歸得餉父母蓋純孝所感也因謂其季曰需靑紫何時萬一吾父母枵羸至不及待何爾執不律吾行且逐烏兎走矣遂棄去制舉義脩業吳越間足繭起寸業遂稍起壹意奉父母歡季卽叅政公迺得卒其學成進士贈公性好晏處會嵗除鄰失火蕩其室亡有僦旁舍以居輒忽忽不樂翁迺收合煨燼慮材鳩傭落成而間燥贈公始喜然以亡樓居且未陽也翁偵知之復自爲臿築楯栭之屬以意審面已而南熏拂拂江山縈繞贈公登焉而樂樂而甚爲加餐也㕘政公旣宦游萬里外翁家居養母備極情志㕘政無内顧憂與翁没齒友愛視曩者青紫數言始終蓋無間云翁輕貲財排患難慕義若嗜欲里閈尊爲祭酒已伯子泰宗旣貴海巡使者及郡邑長吏爭迎致翁翁爲畫策輒有所興第無不砉然解者減苛徭定兵變語皆在誌中初翁以小賈役常熟迷失路夜昏黒矣有童子導至邸舍忽不見渡福山遇颶風海船將覆翁見帆柱脫急呼篙師理之遂得免又嘗痒瘍生於背有客過門手和蠟礬爲丸竟去不受謝其隱報類如此謂非慈孝所致哉翁故五子鄞人爲余言慈孝村有謝伯子者以進士出漳浦之門今隱居教授所著書且萬言時念家國師友之故輒發聲讀讀罷輒泣而骯髒無憀一發洩之於酒酒故不醉卽泰宗也余慕其名而無繇見會其季泰交以明經對策第一卒業北雍文辭卓犖余摸索喜甚以冠其軍及來謁余傫然篤行儒者也迺爲慈孝材八十三翁立傳焉國史氏曰余爲謝封翁傳傳不詳其它重稱慈孝村者蓋著所本也語云不知其父視其子余門下士泰交爲其父請傳跪門外者三日每見輒蒲伏堦下流涕不能起於乎至性感動卽若翁可知矣志衍傳志衍諱繼善姓吳氏志衍其字也余年十四識志衍志衍長於余三歲兩人深相得又六年而人撫純祜相與砥礪爲文章人撫志衍與余同魁庚午一經而純祜未十年成進士里中稱科名者推吳氏云當是時天如師以古學振東南海内能文家聞其風者靡然而至余羸病不能數對客過志衍則人人自得也志衍博聞辯智風流警速於書一覽輒記下筆灑灑數千言家本春秋治三傳通史漢諸大家繼又出入齊梁工詩歌善尺牘尤愛圖繪有元人風下至樗蒲六博彈琴蹴踘無不畢解性好客日具數人饌賓至者無貴賤必與均每三爵之後詞辨鋒起雜以諧謔輙屈其坐人余口不識杯鐺同其醉醒而志衍白擲劇飮與人決度不勝不止岸幘笑詠酣飮絶叫以爲常生平負志節急人患難其成進士也會里中兒刊章告密天如師爲所搆勢張甚志衍銳身爲營救卒以免大司馬鄴仙馮公聞而嚴重之願與交巳得慈谿令司馬其邑人益相爲引重而長安名公卿爭揖志衍矣母夫人䘮未之任家居侍太公疾視湯藥浣厠牏衣不解帶者數十日哭泣䘮葬備物盡志人稱曰孝事長兄待二弟友愛無間言伉爽曠達恥爲小節苛禮而父黨造門必躡履問起居中表故舊及所游門下士一旦請緩急未嘗以不足爲解而無纖毫德色家世素高貲坐是析箸假貨累千金意豁如也嘗游黄山淩躡險絶同游者不能從焉雅自負彊濟謂可就功業慨然曰今天下將亂大丈夫習勞苦任艱難爲國家馳驅奔走有如此游矣而其後乃得蜀之成都成都在萬里外又荆襄陷没江鄂道斷賓客逡巡勸少留志衍曰吾旣受成命矣人臣守官其敢以利害辭且今日何樂土之有志衍雖勇於蜀游乎顧置酒張樂召所與游人人道別雖握手極笑語而獨坐凝視椎牀彈指或親故問之則浮大白引滿欷歔不復言旣上道復改途出宜春道酉陽涉黔江南而入蜀卽日啟蜀王請發帑金爲備禦計當時蜀事已棘而藩府金繒積者數百萬王恡不應則貽余書曰事不可爲余必死於此詞甚酸愴云居五六月蜀問至成都陷余中夜蹶起曰志衍死矣欲爲位哭行自念盡室西川豈無一自脫得報親戚者越三年其弟事衍徒跣萬里望家而哭曰吾兄以甲申十一月二十五日遇害罵不絶口賊臠而割之一門四十餘人同日併命嗟乎何其酷也當夫燕京已没先皇帝崩問已至志衍慟哭上書卽藩邸亦心動而文武大吏無一人肯辦賊劍門䕫峽諸險皆已失守而後驅數千之卒阻五丈之城以當百萬之强寇雖智勇無所施護親藩竄山谷屏跡蠻獠間可以圖全而志衍喋血自誓與此城爲存亡終至骨肉葅醢妻兒横分以報所受豈不難哉初純祜之在永嘉也書問阻絶而事衍聞東南大亂亦長慟恐至則無歸及兩人先後到里門問宗人親戚尙無恙余向謂志衍卽尙存勢不能自拔今見兩兄弟流離辛苦終得相見抱持痛哭而志衍獨不幸以死死者人所不免而家室同盡齠穉無遺并其斷骸殘骼不得一棺之土故哭其䘮者爲尤痛焉嗟乎志衍之入蜀也天如師已前没未一歲而司馬馮公亦亡平昔志衍所與游零落殆盡禍與志衍同者亦比比而是也其宜死而不死如余與人撫則又窮愁疾病所去志衍者幾何而今日猶哭吾志衍志衍亦可以無憾矣志衍有子曰孫慈賊將憐而匿之後亦遇害純祜經紀其兄䘮以少子某爲之後志衍之死也友人季曾貫與同難其族人名漢者逸岀城箭及之顚而殞家人五郎者免矣奮曰吾主與主母死矣義不忍獨生乃慷慨屬詈而盡於主側嗚呼是皆可書也柳敬亭傳柳敬亭者掦之泰州人蓋曹姓年十五獷悍無賴名巳在捕中走之盱眙困甚挾稗官一册非所習也耳剽久妄以其意抵掌盱眙市則已傾其市人好博所得亦緣手盡有老人日爲醵百錢從寄食久之過江休大柳下生攀條泣然已撫其樹顧同行數十人日嘻吾今氏柳矣聞者以生多端或大笑以去後二十年金陵有善談論柳生衣冠懐之輻輳門車嘗接轂所到坐中皆驚有識之者此固嚮年過江時休樹下者也柳生之技其先後江湖間者廣陵張樵陳思姑蘇吳逸與柳生四入者各名其家柳生獨以能著或問生何師生曰吾無師也吾之師乃儒者雲間莫君後光莫君之言曰夫演義雖小技其以辨性情考方俗形容萬類不與儒者異道故取之欲其肆中之欲其微促而赴之欲其迅舒而繹之欲其安進而止之欲其留整而歸之欲其潔非天下至精者其孰與於斯矣柳生迺退就舍養氣定詞審音辨物以爲揣摩期月而後請莫君莫君曰子之說未也聞子說者驩咍嗢􅛐是得子之易也又期月曰子之說幾矣聞子說者危坐變色毛髮盡悚舌撟然不能下又期月莫君望見驚起曰子得之矣目之所視手之所倚足之所跂言未發而哀樂具乎其前此說之全矣於是聽者儻然若有見焉其竟也恤然若有亡焉莫君曰雖以行天下莫能難也已而柳生辭去之揚州之杭之吳吳最久之金陵所至與其豪長者相結人人䁥就生其處已也雖甚卑賤必折節下之卽通顯傲弄無所詘與人談初不甚諧謔徐舉一往事相酬答澹辭雅對一坐傾靡諸公以此重之亦不盡以其技彊也當是時士大夫避寇南下僑金陵者萬家大司馬吳橋范公以憂兵開府名好士相國何文端闔門避造請兩家引生爲上客客有謂生者日方海内無事生所談皆豪猾大俠草澤亡命吾等聞之笑謂必無是乃公故善誕耳孰圖今日不幸竟親見之乎生聞其語慨然屬與吳人張燕筑沈公憲俱張沈以歌生以談三人者酒酣悲吟擊節意悽悵傷懷凡北人流離在南者聞之無不流涕未幾而有左兵之事左兵者甯南伯良玉軍譟而南尋奉詔守楚駐皖城待發守皖者杜將軍弘域於生爲故人甯南嘗奏酒思得一異客杜旣已洩之矣會而人用軍事不相中念非生莫可解者乃檄生至進之左以爲此天下辯士欲以觀其能帳下用長刀遮客引就席坐客咸振慴失次生拜訖索酒談啁諧笑旁若無人者左大驚自以爲得生晚也居數日左沉吟不樂熟視生曰生揣我何念生曰得母以亡卒入皖而杜將軍不法治之乎左曰然生曰此非有君侯令杜將軍不敢以專也生請啣命矣馳一騎入杜將軍軍中斬數人乃定左幕府多儒生所爲文檄不甚中竅會生故不知書口畫便宜輒合左起卒伍少孤貧與母相失請貤封不能得其姓淚承睫不止生曰君侯不聞天子賜姓事乎此吾說書中故實也大喜立具奏左武人卽以爲知古今識大體矣阮司馬大鍼生舊識也與左郄而新用事生還南中請左曰見阮云何左無文書卽令口報阮以捐棄故嫌圖國事於司馬也生歸對如南甯指且約結還報及聞坂磯築城則頓足曰此示西備疑必起矣後果如其慮焉左䘮過龍江生祠哭已有迎且拜拜不肯起者則其愛將陳秀也秀嘗有急生活之具爲余言救秀狀始左病多恚怒而秀所犯重且必死生莫得搘梧乃設之以事曰今日飮酒不樂君侯有奇物玩好請一觀可乎左曰甚善出所畫已像二其一關隴破賊圖也覽鏡自照歎曰良玉天下健兒也而今衰指其次曰吾破賊後將入山此圖所以志也見衲而杖者數童子從其負瓢笠且近則秀也生佯不省而徐語爲誰左語之且告其罪生曰若負恩當死顧君侯以親信卽入山且令自從而殺之卽此圖爲不全矣左頷之其善用權譎爲人排患解紛率類此初生從武昌歸以客將新道軍所來朝貴皆傾動顧自安舊節起居故人無所改逮江上之變生所攜及留軍中者亡散累千金再貧困而意氣自如或問之曰吾在盱眙市上時夜寒借束藳卧扉履踵決行雨雪中竊不自料以至於此今雖復落尙足爲生且有吾技在甯渠憂貧乎迺復來吳中每被酒嘗爲人說故甯南時事則欷歔灑泣旣在軍中久其所談益習而無聊不平之氣無所用益發之於書故晩節尤進云舊史氏曰余從金陵識柳生同時有楊生季蘅故醫也亦客於左奏攝武昌守拜爲眞左因彊柳生以官笑弗就也楊今去官仍故業在南中亦縱橫士與余善張南垣傳張南垣名漣南垣其字華亭人徙秀州又爲秀州人少學畫好寫人像兼通山水遂以其意壘石故他藝不甚著其壘石最工在他人爲之莫能及也百餘年來爲此技者類學嶄巖嵌特好事之家羅取一二異石標之曰峯皆從他邑輦致決城闉壞道路人牛喘汗僅而得至絡以巨絙錮以鐵汁刑牲下拜􅥵顏刻字鉤塡空靑穹窿巖巖若在喬嶽其難也如此而其旁又架危梁梯鳥道遊之者鈎巾棘履拾給數折傴僂入深洞捫壁投罅瞪盻駭栗南垣過而笑曰是豈知爲山者耶今夫羣峯造天深巖蔽日此夫造物神靈之所爲非人力所得而致也况其地輒跨數百里而吾以盈丈之址五尺之溝尤而效之何異市人搏土以欺兒童哉惟夫平岡小坂陵阜陂陁版築之功可計日以就然後錯之以石碁置其間繚以短垣翳以密篠若似乎奇峯絶嶂纍纍乎牆外而人或見之也其石脈之所奔注伏而起宇而怒爲獅蹲爲獸攫口鼻含呀牙錯距躍決林莽犯軒楹而不去若似乎處大山之麓截谿斷谷私此數石者爲吾有也方塘石洫易以曲岸迴沙邃闥雕楹改爲靑扉白屋樹取其不凋者松杉檜栝雜植成林石取其易致者太湖堯峯隨意布置有林泉之美無登頓之勞不亦可乎華亭董宗伯玄宰陳徵君仲醕亟稱之曰江南諸山土中戴石黃一峯吳仲圭常言之此知夫畫脈者也羣公交書走幣歲無慮數十家有不能應者用爲大恨顧一見君驚喜歡笑如初君爲人肥而短黑性滑稽好舉里巷諸媟以爲撫掌之資或陳語舊聞反以此受人啁弄亦不顧也與人交好談人之善不擇高下能安異同以此游於江南諸郡者五十餘年自華亭秀州外於白門於金沙於海虞於婁東於鹿城所過必數月其所爲園則李工部之横雲虞觀察之預園王奉常之樂郊錢宗伯之拂水吳吏部之竹亭爲最著經營粉本高下濃淡早有成法初立土山樹石未添巖壑已具隨皴隨改煙雲渲染補入無痕卽一花一竹疏密欹斜妙得俯仰山未成先思著屋屋未就又思其中之所施設牕櫺几榻不事雕飾雅合自然主人解事者君不受促迫次第結搆其或任情自用不得已骫骳曲折後有過者輒歎息曰此必非南垣意也君爲此技旣久土石草樹咸能識其性情毎創手之日亂石林立或卧或倚君躊躇四顧正勢側峯横支𥪡理皆默識在心借成衆手常高坐一室與客談笑呼役夫曰某樹下某石可置某處目不轉視手不再指若金在冶不假斧鑿甚至施竿結頂懸而下縋尺寸勿爽覿者以此服其能矣人有學其術者以爲曲折變化此君生平之所長盡其心力以求彷彿初見或似久觀輒非而君獨規模大勢使人於數日之内尋丈之間落落難合及其旣就則天墮地出得未曾有曾於友人齋前作荆關老筆對峙平城已過五尋不作一折忽於其顚將數石盤互得勢則全體飛動蒼然不羣所謂他人爲之莫能及者蓋以此也君有四子能傳父術晚歲辭涿鹿相國之聘遣其仲子行退老於鴛湖之側結廬三楹余過之謂余曰自吾以此術游江以南也數十年來名園別墅易其故主者比比多矣蕩於兵火没於荆榛奇花異石他人輦取以去吾仍爲之營置者輒數見焉吾懼石之不足留吾名而欲得子文以傳之也余曰柳宗元爲梓人傳謂有得於經國治民之㫖今觀張君之術雖庖丁解牛公輸刻鵠無以復過其藝而合於道者歟君子不作無益穿池築臺春秋所戒而王公貴人歌舞般樂侈欲傷財獨此爲耳目之觀稍有合於淸淨且張君因深就高合自然惜人力此學愚公之術而變焉者也其可傳也巳作張南垣傳汪處士傳汪處士鳳齡字儀卿別字思穎其先出唐越國公華之後越國數十傳爲時揚公世居徽之唐模村當趙宋之季時揚以孝聞由唐模徙巖鎭是爲巖鎭汪氏時揚有十子其第四子允亮又十餘傳而得君君生而姿貌穎異目睛爛爛燭人始在髫鬌不苟嬉弄凝重如成人歲出就外傳彊記雒誦大有過於凡兒之所習操管爲文衮衮不能目休時師避席畏之曰非某所能教也旣長試有司輒不利或有勸之者曰丈夫拔足阡陌之中乘堅驅良足以爲豪耳儒者博而寡效勞而無功是安用此呫嗶者爲君慨然歎息曰吾新安非徽國文公父母之邦乎今紫陽書院先聖之微言諸儒之解詁具在奈何而不悅學乎且吾汪氏仕而顯賈而贏者世有其人矣苟富貴堙滅不稱何如吾爲一卷師而以兎園終老也聞者眙􅌓以去久之歙有大中丞方公者聘請高行爲弟子師里塾之士自衒鬻者以十數方公獨以望實細推擇曰必汪先生於是潔館舍具書幣以迎致之命其子若弟修北面之禮鄉人聚觀詫指曰吾今日始知學之爲益矣君爲人性至孝再刲股以療其親疾居䘮哀毁幾致滅性御史張公愼學行部至新安州郡上其事命大書孝行著棹楔以旌之邑宰聘飮於鄉復架崇奬君嘗謂人曰世謂儒者有名無情不足乎緩急此腐生孤陋者所爲非所以概吾道也夫君子先人後已重義輕利詎肯於死生然諾有二其心哉當明之未造新安穀歉人饑君推其資計賑贍里閭人有急難叩門傾囊倒􅍥應之惟恐不足甚至舉倍稱之息爲人解對後雖掉臂負之弗恤也新安之俗好以纎介自言鄰比漚麻之爭兄弟原田之訟經年所不能決君出一言爲之平處退而皆服居嘗引諸生讐問經義有暇則東阡西陌親友過從數舉長者之言提耳訓告其有懐詐面謾輒質責譙讓俾無所容性高整雖妻子不見有燕惰之色居處服飾務敦儉檏以爲時世先里人伏臘置酒三爵之後以嚴見憚少長無敢載號載呶者成相謂曰汪君在坐使人不樂不見又從而思之其取重若此初越國公以九子散居六邑其著者曰兖山邑南曰桃溪萬安曰登源太畈西門濳口黄坡無慮數十大族君皆能條舉枚數分其所自出而於巖鎭則婚必告䘮必賻祭享必會修收族之道焉有八子多以孝謹起家篤修行誼君教之曰陶朱公之傳不云乎年衰老而聽子孫吾以隱居廢治生諸子有志於四方甚善但能禮義自將不媿於儒術吾願足矣君生於萬曆癸巳年正月初五日卒於康熙丁未年臘月二十八日享年七十有五八子者秉乾秉中秉和秉厚秉星秉亮秉光秉貞皆克遵遺訓而秉乾僑寓吾州故知君言行爲詳君菆宫在其邑之南山其誌碣將以俟諸啟奠故不備載舊史氏吳偉業日黟歙居萬山中風氣完密世稱多篤厚長者當前朝成弘之時篁墩程先生好論次其郷人之可傳者以告世如孝義汪處土思義汪義士中和此兩君者苟以入獨行傳則良史所必採焉今思頴汪君先後一揆何汪氏之多賢哉往余在京師知方中丞護巖關其門下多文武智計之士迺爲子弟擇師得汪君由此觀之卽汪君可知矣登封三節婦傳河甫登封焦氏有三節婦曰周氏曰楊氏牛氏周氏者太僕寺少卿與嵩公次子文學之妻也文學蚤死孺人與側室李氏皆有遺腹免身皆男孺人曰吾之不早從地下者此爾今天幸俱有子吾將下報吾夫太僕公固止之亡何李以病逝孺人迺抱其孤泣曰天乎吾兩兒恐不能俱全若此子失所鬼而有知問李氏孤何在則將奚辭以對遂擇里媪乳已子而親抱李氏孤乳之太僕爲仰天出涕曰人情莫不愛其子此古人所難吾媳婦能行之兒爲不亡矣後二十年登封縣民有具節母事上直指使者使者爲請天子下其奏錫封表閭歲給餼米石河南人皆歎息曰周太君撫兩孤成立以膺此寵也蓋自文學没二十年而孺人始以節孝顯於朝又年而孺人没没後年而登封陷於寇其以節死者爲焦家婦楊氏牛氏河南人復皆歎息曰微周太君之教不及此楊氏者焦君陽長之婦周藩儀賓四聰公之女也旣歸陽長君事姑最恭謹而讀書識大體嘗手列女傳一編與姒牛氏講貫義㫖悉通曉登封旣圍急孺人知不免糿其中外衣以自固拜辭太君木主將引快侍婢止之曰吾城前受圍匝月不下今尙冀萬一得全且郎君不在主君旦暮城守盍俟休沐時一謀之乎楊孺人叱之曰吾奉先姑教訓若不死何面目見地下且玷太僕家風乎乃約牛氏同死指梧下井曰此吾兩人畢命處也卒俱死吳偉業曰余之中州嘗望見嵩嶽云其下必多偉人鉅卿負奇節立志摡者今觀焦太僕齟齬江陵屢躓復振一門之内男淸女貞周太君鳴鳩之仁柏舟之節而兩烈婦捐生殉義立志皎然豈山川之氣賦稟有素耶抑門内之訓浸漬涵育使然也初陽長走京師乞名公卿歌詠太君之節聞於天下可謂甚孝今兩烈婦之殉也適會搶攘無所表章以顯當世然觀陽長悼亡詩音節悲苦屬和者無不泣下嗚呼若兩烈婦者誠無愧於其姑矣故婁東舊史氏爲合傳焉湯節母趙氏傳節母趙姓河南睢州人其先許昌徙也世爲望族年十八歸同邑文學湯君諱祖契字孝先其子今爲國史院簡討諱斌則以孺人之節義聞於朝者也湯於睢陽亦望姓始祖以武功爵世授衞指揮僉事自孝先以上三世用儒術聞矣孝先之父曰亹齋居家有禮法孺人醮而廟見亹齋喜曰此必爲賢婦興吾家亹齋嘗大病孺人調匕箸奉湯藥偕孝先侍疾者四十日亹齋疾少間見其孫立於旁手摩𩕄頂淚泫然承睫曰吾子孝新婦賢殆將有後其在此子乎吾老不及見矣亹齋殁含殮以時具孺人皆先事縫紉附身附棺應手立辦親黨相顧而驚微孺人不能以䘮也歲大祲家益以貧落傅璣之飾鬻旣盡則𧖟績繼之堂上饘􅓞脩瀡弗缺於供私則嚥藜藿食糠覈勿使姑聞篝燈機杼課簡討以夜讀燭不至則誦古書俾闇而記之畧上口乃止蓋孺人少習孝經列女傳識其大義居常以訓飭子女欲親見諸躬行故其事舅姑服勞無倦臨患難立意皎然不挫所守誠天性然也河南方亂旱蝗不止孺人憂之爲長女營嫁簡討未應婚也則又爲營婚慨然謂孝先曰吾一子一女志願畢矣世事至此如姑年老何或問以身謀則笑勿應明年賊大至睢陽旁邑皆陷孺人閑定如平時戒左右莫驚吾姑也先是簡討讀書北恒山之麓事急馳歸守陴者勿納則循城而號之孺人曰來則俱死無益不可令湯氏無後戒勿復入城旣破孝先負其母竄蘆菼中僅而後免孺人召集家人從容慷慨自以累世高門今日義無全理且以姑老不得終事爲恨解衣帶自縊不絶再投於井眢井也家人縋而出之賊尋至環以白刃孺人大罵賊刃交於胷噀血不撓及旬而殮尸僵如生今建祠於故居之東知州事者春秋祭祀不絶云吳偉業曰節義之起也豈不以讀書知禮義哉婦人女子倉皇偪側勇於一決抑亦計無復之耳觀節母處危亂之中不以身累其夫不以死憂其親非其學問志行深有得於孝經女史能從容如是耶黃河潰決孺人之殯再没於水論者謂天道太酷嗟乎梁園之側洛水之旁其爲高墳巨碣者何限終委蔓草而號狐狸今節母之英靈昭爽翺翔乎星辰日月之際又何有於衣裳形魄之坏土而獨令其平生行事載之圖牒傳之丹靑俾知者播爲奇聞異蹟則世教有裨而於孺人讀書知禮之志亦可以無憾余故謹次所聞俾采風者識所攷焉吳淑人傳淑人姓吳氏贈亞中大夫席君右源之妻而故太僕寺少卿甯侯君之母也席與吳東山著姓右源又吳之所自出其父怡泉公生四子長矣而繼室以吳氏生右源與其兄左源爲幼子故少分焉淑人則其姑之再從女也父養心絶憐愛之有豪家求委禽焉勿與右源傫然貧者也一見獨偉之曰吾擇壻無踰此郎矣旣饋而怡泉已没事姑克以孝聞舍旁有隙地修𧖟桑植蔬果得一味之甘調糝而進之曰勿使吾夫有内顧憂也左源之配曰沈孺人先後相友愛二源兄弟同心足以發貧成業而兩婦桁無異衣廩無異粟箕箒不誶井臼必均黽勉有無辛勤共事者垂四十年右源之初謀廢舉也苦無以爲資淑人斥嫁時裝以佐什一家旣起至鉅萬矣右源中夜寢熟輒捫牀大呼曰安所得百金以爲積著計乎蓋其少更難雖贏得過當不忘所自始也以常情度之宜其重於棄財顧用好施聞郡國賑䘏貧弱甓治津梁其費動以千百計人或以謂淑人淑人慨然曰吾夫婦累積纖微以有今日匪由人力天所贊也苟爲善不卒何以克長久乎怡泉公著家居雜儀一卷最詳於内訓淑人自以不逮事吾舅常捧之而泣其庀家政也肅而寛廉而不劌知人善任得其才而用之奉事祖宗問遺親戚魚菽之祭必以敬腶修之將必以誠箴管縏袠罔勿飭也米鹽淩雜罔弗戒也機杍刀尺之聲聞於戸外篤老而猶不衰或以爲太自苦淑人曰先舅之墜言在吾敢違諸乎少卿事其母至孝中外事諮而後行賑荒之役跽而請命淑人曰此而父志也盡捐其篋衍所畜市千石以助之施齊魯及吳人受其賜者皆曰義母生我所司欲以其事上聞庶幾褒寵如古所謂女懷淸臺者淑人笑曰吾雖不知書如秦皇帝以萬乘禮一婺矛牙婦而其夫與子顧弗傳豈紀者畧之耶抑恩弗及也若此何足爲天下勸乎今吾子傾家佐軍璽書貤封三世奏英簜之節過家上冡其爲寵光也大矣又何必以老婦之義聞也其賢明識道理如此蓋年有九十而卒舊史氏曰余觀江以南惟新安善治生其丈夫轉轂四方女子持門戸中外咸有成法蓋吳之洞庭亦然過其地見重垣如城廳屏情肅終日行里中不見有游閒之跡笑語之聲詩曰不績其麻市也婆娑中古且以爲歎况今日而有此風不亦異乎迺聞席有賢母以九十之年執麻枲課紡績賦事而獻功不以盈滿少自暇豫昔魯敬姜有言瘠土之民莫不好義夫洞庭固沃土非瘠土也而喞士大夫之家禮法足以化其境内其有裨世道豈偶然哉是不可以莫之傳也作吳淑人傳施太夫人傳秦與施晉陽之望姓秦自方伯公以下先後通顯而施太僕爲名卿方伯公三傳爲文學水庵公太僕以季女女之余同年今令淸江大音所自出也禮爲人後者爲之子歸爲人後者爲之子婦其以支子出爲支子後婦姒婦也支子入爲大宗後婦冡婦也詩曰于以奠之宗室牖下誰其尸之有齊季女女子之嫁也教成之祭尙於大宗而况於從夫乎太夫人自太僕公曰吾季女自秦龍槐公曰吾冡婦文學爲徵仕公次子嗣於龍槐筐筥錡釜實先族人諸姑伯姊視我婦禮太夫人之處此也蓋難太夫人歸秦氏時龍槐公已前死新遭談孺人䘮踰年而成禮又以哭徵仕公髽而當戸用佐衰泣一年之中兩見素冠太夫人不旣蹙巳乎旣而視服膳迎顔旨嫓婉聽順以事吳孺人陳太孺人曰吾遭二䘮而事一姑其敢弗力吾不獲行冡婦禮而行冡孫婦禮猶余幸也已文學公好書多雅游皆海内知名士太夫人爲修脡具議酒食佐讀不輟書皆暗誦通大義相論難顧文學公體素羸不勝其志氣嘗勸以毋汲汲太自苦文學公好施不問貲算輒爲治絲穀計生產給眾指執作曰吾教儉且佐治也巳文學公中奪夫人傷之垂絶欲以死殉復重自抑以撫藐孤訖於成立服無華髢無飾發言則涕曰汝父無年嗛於一第汝其無荒於業以繼汝父之志乎庚午大音舉於鄉越六年成進士得官淸江而太夫人已前殁嗟乎何太君之集於荼蓼也太君以名公卿女入門下車就位縞泣一年而哭談孺人又一年而哭徵仕公又四年而哭陳太孺人又九年而哭吳孺人文學公棘人欒欒夫婦未嘗見齒以至於亡焉文學公卽世太君以一婦人抱弱子長者數歲少者不過五月㷀㷀二十餘年始得大音之一遇又不二年而卒不見其成進士鳴呼憂樂之際何其遠哉太君爲女者十五年爲婦者十六年爲母者二十六年其爲女也柔㦤爲則其爲婦也貞順有禮其爲母也敬儉弗忘語曰斥鹵無松拍又曰雲出於山而雨其山大音之恂恂忠孝非有得母氏之教乎噫是可紀也巳梅村家藏藳卷弟五十二終

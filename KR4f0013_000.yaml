front:
  text: 哀江南賦通天表愁殺前朝侍從臣苦被人呼吳祭酒自題園石作詩人湘江渺渺恨無窮回首蒼梧夕照中生恐移根難得地國香零落付秋風老去偏工幼婦辝請看獨坐撚吟髭鴻臚初唱面如玉恨小兒君年少時國初諸老盡傳神遂園禊飲余家舊藏陛交小照皆禹鴻臚葦國及新得之王麓臺汪也為先生寫此真休笑一錢都不值殘縑足抵夜光珍

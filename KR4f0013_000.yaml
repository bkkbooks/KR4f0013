body:
  text: 右吳梅村先生行看子為禹慎齋寫照顧元昭補景皆未署年月同時題詠亦無一存考先生殁于康熙十年辛亥壽六十有三禹生少後當是先生六十許時作也同治戊辰七月余購得得輒題四絶句徵同人和焉梁溪後學秦湘業并識樂府歌行氣最奇賁園秋色上吟髭睂間無限興亡恨祗有蒲團忍草知嘗向東風向畫蘭村梅句琴邊清泪墨花寒斜窺淺立姍姍意多恐飄零不忍看宗源瀚祭酒風流儼若存一業香草伴吟魂熙朝雨露無私澤空谷當年早受恩冷坐蒲團意可知乞歸詩在就徵時鐵崖異代容私淑合把朝衫換白衣辥時雨蕭瑟真憐庾子山空餘詞賦動江關白衣難結漁樵侣青瑣重登侍徔班吳地親朋趍日下淮王雞犬望雲間滋蘭樹蕙無露意憔悴聊看顔己巳夏五月施補華人言堯幽囚或言舜野死目斷蒼梧泪不止先生頭白髮垂耳遺骨千年蛻于此觀訪文學博詩梅村先生過曇陽妙畫尚通靈生綃尺幅橫依然沈家令愁絶庾蘭成鴻臚寫真葦潭沱若為情熏香供作黃金佛添取彈琴卞玉京淡如夫子命題駿公祭酒小景初秋苦勢不能長吟勉賦一章請正己巳秋七月三日袁昶呈稿生平愛誦梅村集煙墨縱橫老淚彈自有文章追庾信翻憐雞犬别劉安厰盆寥落空餘恨宫扇凄涼泜獨看艾灸睂頭瓜噴鼻襲錢應識此心難王麟書禹慎齋為梅村先生畫象同治間吾郡秦君淡如官杭州得之因徽時流題泳合所自作凡六家此本今歸上虞羅學部振玉比刻吳氏家藏稿成借橅卷專并録諸詩附後董康記梅村家藏稿吾友授經得諸都門廠肆斠刊既竟識其鈔刻源流增併卷數復以式通髻齔之嵗便誦吳都文獻之徵恆􅎋江左屬為偶語概厥平生先生以曠世逸才遭眀末造著西銘之籍夙冠淸流彈烏程之黨聿彰風節留都移宦養望人師太學上書訟冤朝士時則四凶柄國疉壞家居群冦滔天延及京邑薄日墮景莫挽虞淵之沈幽蘭坐燎遂入鼎湖之夢宗社既覆圖籙有歸而稽小腆之紀年非無烈士證南疆之逸史亦有頑民龍漢浩劫之經朱噣焉食螢火秋光之記碧血猶凝即至閩粵流離人懷毅魄匪獨江東餘閏身殉孱王類奮螳臂于生前或潔蟬蛻于物外靡不食甘薇蕨心苦卷施炳正氣而特書表骨香而署集芝焚蕙歎羽換宫移大患有身為親而屈母氏欷歔之語兒死誰依故人慷慨之吟詞悽絶命悔一錢之不值入九地而餘悲余情信芳人間何世蓋自呵壁問天以後見諸文字鬱為聲音者索偶搜逑無此奇痛而香草之拾始老宿以逮童蒙藻采所敷起宫閨以訖異域亦自有著作者無此風行焉嗟乎生也有涯情難遣此過􅎋墟而欲泣恐近婦人涉洞庭而無言獨思公子義熙巳易遐想羲皇淮南既仙猶存賔客望水天之杳渺間話滄桑覩册府之飄零抱殘灰燼山中終隱書傳入洛之交期海上乞師色動登臺之慟哭素心泉路死負侯嬴晞髮陽阿生慚皋羽河山有異曾無風景之殊陵谷己遷試續夢華之録初徵博士始改元和間坐宫人重談天寶下銅仙之􅖳淚親見駝街眺玉女之淸矑寓言驍箭倡家質子坐傷年鬢之秋窮巷空廬追憶宴遊之好固宜執圭憔悴病尚越吟援筆纏綿怨同蜀魄桑乾蓬轉擬嗣宗之詠懷麥秀黍離賦子期之思舊河梁五字降將彂之而慘顔雍門一彈孟嘗聽之而雪涕可謂掬傷心之抱奏亡國之音不無危苦之辝惟以悲哀為主者也若夫朱顔獨秀何殊鄴下之聲華白髮填詞亦類江關之蕭瑟論其身世則似蘭成事寫天家恍見草堂之忠愛箋成後學儼奉詩聖之馨香論其歌詠則似少陵莘莊結􅌟應標野史之名法曲淒涼無異蔡州之望論其心迹則似遺山寶繢品題雅合鷗波之論畫浮屠贈答差同天竺之求書論其文采則似松雪擬人必倫望古遙集詞客有哀時之作拾遺本良史之才中州深故國之思王孫稱遺臣之雋兼茲數者伊其戚矣雖梨洲舊説糾及無韻之文而長慶嗣音麗軼前人之製是以聲傳河滿播于禁中豔溢錙豪寵以宸翰以視漢帝讀子虗之賦恨不同時宋主興奇才之歎聞諸他日情事不侔契合則一鹿樵紀在知身後大獄之誣西齋書存儷蘇氏斜川之集斯則弔鄧尉詩人之墓足語吟魂披婁東耆舊之編無慚作者云爾宣統辛亥二月汾陽王式通序余老歸空門不復染指聲律而頗悟詩理以為詩之道有不學而能者有學而不能者有可學而能者有可學而不可能者有學而愈能者有愈學而愈不能者有天工焉有人事焉知其所以然而詩可以幾而學也間嘗趣舉其説而聞者莫吾信頃讀梅村先生詩集喟然歎日嗟乎此可以證明吾説矣夫所謂不學而能者三侯垓下滄浪山木如天鼓谷音稱心而衝口者是也所謂學而不能者賦名六合句取切偶如鳥空鼠唧循聲而屈步者是也此非所以論梅村之詩梅村之詩其殆可學而不可能者乎夫詩有聲焉宮商可叶也有律焉聲病可案也有體焉正變可稽也有材焉長楛可攻也斯所謂可學而能者也若其調之鏗然金舂而石戞也氣之熊然劍花而星芒也光之耿然春浮花而霞侵月也情之盎然草碧色而水緑波也戴容州有言藍田日暖良玉生煙可望而不可置於眉睫之間以此論梅村之詩可能乎不可能乎文繁勢變事近景遙或移形於跬步或縮地於千里泗水秋風則往歌而來哭寒燈擁髻則生死而死生可能乎不可能乎所謂可學而不可能者信矣而又非可以不學而能也以其識趣正定才力宏肆心地虛明天地之物象陰符之生殺古今之文心名理陶冶籠挫歸乎一氣而咸資以為詩善畫馬者日天間萬廄皆吾師也安有撑腸雹腹蟬吟蚓竅而謂之能詩者哉元黃金碧人其罏鞲皆成神丹而他人則為掇拾之長物么絃孤韻經其杼軸皆為活句而他人則為偷句之鈍賊參苓不能生死人朱鉛不能飾醜女故日有學而愈能有愈學而愈不能讀梅村詩者亦可以霍然而悟矣竊嘗謂詩人才子皆生自間氣天之所使以潤色斯世而本朝則多出詞林然自高青丘以降若李賓之楊用修者未易一二數也豐水有芭生材不盡而産梅村於隆平之後以錦繡為肝腸以珠玉為咳唾置諸西淸東序之間俾其鯨鏗春麗眉目一世幹材小生不自量度猥欲以煩聲促節流漂嘈囋爭馳尺幅之上豈不悖哉余故略舉學詩之説以引其端世之踸踔短垣呼囂相命者聞余言固將交綏引去而余以老髦才盡目瞪吻燥自詭於儛書焚筆者亦可以有辭也順治庚子十月朔虞山蒙叟錢謙益再拜謹序附録致梅村書謙益白荒村草具樵蘇不㸑昔賢峴山夜宿以乳羊博巿沽比之吾輩豈非華筵高會乎别後捧持大集坐卧吟嘯如渡大海久而得其津涉詞麗句淸層見疊出鴻章縟繡富有日新有事採剟者或能望洋而歎若其攢簇化工陶冶今古陽施陰設移步換形或歌或哭欲死欲生或跨夜而啼或當餐而歎則非精求於韓杜二家吸取其神髓而佽助之以眉山劍南斷斷乎不能窺其籬落識其阡陌也諷誦久之不禁技癢遂放筆為敘引非謂朴學謏聞足以遂盡來美亦聊於唱歎之餘少抒其領略使人知天人之際可學不可學之介出自心神本乎習氣真如內典所謂多生異熟不思議熏習者庶幾無幾幸其不能而鏃礪其可學為斯人少分針砭提醒眼目耳信心衝口便多與時人水火豫章徐巨源規切不肖為文晚年好罵此序一出恐世之詞人樹壇立坫者又將鉗我於巿矣不敢自祕輒繕寫求政唯篋而藏之不惟為魏公藏拙亦可謂免我於死也老人放言未知執事何以命之大集謹封題奉歸記室禪誦之睱未能釋然或鏤版或副墨早得賜教以慰湯飢是所顒望也煙老有嗜痂之癖或可傳示以博一笑太虛小阮褰帷虞山想當枉駕可圖接席江右豔曲盈緗溢縹西崑香奩塞破此世界矣老先生何以應之附及一笑不盡梅村家藏藁目録卷弟一前集一五言古詩贈蒼雪塗松晚發臨江參軍讀史雜詩四首避亂六首毛子晉齋中松鼠贈王鑑明五十吳門遇劉雪舫贈願雲師并序西田招隱詩四首哭志衍閬州行讀端淸鄭世子傳遇南廂園叟感賦詠史十二首卷弟二前集二七言古詩行路難十八首殿上行雒陽行畫蘭曲淸風使節圖悲滕城贈范司馬質公襄陽樂高麗行三松老人歌送志衍人蜀卷弟三前集三七言古詩永和宮詞琵琶行并序宮扇宣宗御用蟋蟀盆歌聽卞玉京彈琴歌南生魯六真圖歌并序後東臯草堂歌汲古閣歌東萊行鴛湖曲項黃中家觀法帖蕭史青門曲百花驄歌并序圓圓曲勾章並贈吳錦雯徐徐次桓歸胥江草堂送杜􅌢武蘆洲行捉船行馬草行題志衍所畫山水堇山兒卷弟四前集四五言古詩夜泊漢口送黃子羽之任四首穿山玄墓謁剖公過聞果師園居遊西灣送友人還楚送繼起和尚入天台早起五月尋山夜寒話雨瑜芬侍兒讀史雜感十六首溪橋夜話再簡子俶素馨感舊贈歌者兔缺織女感事贈蒼雪若鏡兩師謝蒼雪送李友梅還楚贈黃州杜退之王瓜豇豆莧送照如師初冬月夜過子俶園居柬許九日晚泊題心函上人方庵題敬上人代笠過甫屏訪無生上人簡武康薑明府二首曉妝贈徐子能二首初春夜坐奇懷室新霽喜孫令修至送王子彥遇舊友偶值呈座主李太虛八首嵗暮送穆大苑先四首曉發客路贈劉虛受二首苦雨海溢閬園詩十首并序課女嘉湖訪霍魯齋四首贈郡守李隆吉野望二首送張學博冬霽松花石嘲張南垣破山興福寺鶴如五十得廬山願雲師書園居卷弟五前集五七言律詩梅村懷楊機部軍前送黃石齋謫官送左子直子忠兄弟聖駕閲城登梁王吹臺過朱仙鎮送楊鳬岫白門遇北來友人甲申十月南中作有感感楊梅作王煙客西田賞菊二首和王太常西田雜興八首贈王子彥四首薑如須從越中寄詩次韻言懷啁周五子俶同許九日洞庭山館過甫里代具師答贈與友人談遺事追悼見人作布帽謁范少伯祠題登封兩烈婦詩鴛湖感舊武陵謁張石平登數峰閣見伐木者陳青雷半圃西冷閨詠四首并序海巿四首别丁飛濤兄弟贈馮子淵總戎追敘丁亥之秋賞菊友人齋説餅卷弟六前集六七言律詩庚寅元旦試筆并序穆大苑先桐廬歸贈李莪居御史贈陸孟鳬二首贈申少司農二首宴孫孝若山樓琴河感舊四首并序贈糧儲道步公辛卯元旦試筆雜感二十一首鄧元昭奉使江右題鴛湖閨詠四首并序過朱買臣墓題朱子葵鶴洲草堂題孫銘常送林衡者歸送文學雪夜苑先齋中二首癸己虎四首投贈督府馬公二首自嘆登上方有感鍾山城國學觀臺寺功臣廟玄武湖無題四首過朱君宣百草堂周有墨癖二首贈陽羡陳定生送李秀州卷弟七前集七五言排律絶晚眺海麥思陵長公主挽詩附補禊并序過朱買臣墓題朱子葵鶴洲草堂題孫銘常畫蘭送林衡者歸閩送文學博雪夜苑先齋中二首癸巳虎丘四首投贈督府馬公二首自嘆登上方橋有感鍾山臺城國學觀象臺雞鳴寺功臣廟玄武湖無題四首過朱君宣百草堂周櫟園有墨癖二首贈陽羡陳定生送李秀州卷弟七前集七五言排律聨句絶句晚眺海獅麥蠶思陵長公主挽詩附誄梅花庵話雨聯句子夜詞三首子夜歌十三首子夜歌六首采石磯新翻子夜歌四首卷弟八前集八七言絶句過魚山曹植墓二首項王廟虞美人釣臺贈妓郎圓偶成二首感舊汴梁二首題歸元恭像四首戲贈十首亂後過湖上聽朱樂隆歌六首觀棋六首并序贈寇白門六首題莊榿菴像四首楚雲八首并序山塘重贈楚雲四首題殷陟明仙夢圖卷弟九後集一五言古詩下相懷古夜宿阜昌贈家侍御雪航題河渚圖送何省齋送宛陵施愚山三首礬清湖并序淸涼山讚佛詩四首石公山歸雲洞林屋洞送周子俶四首蕩子失意行宿福源精舍遊石公山諸勝天王寺
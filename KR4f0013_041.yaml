  text: 梅村家藏藳卷弟四十一文集十九神道碑銘一
  hash: sha256:26b68a9a74a9b378528b54904a755940a99c170c74688bbf5b995eb121e0b440
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_041-1a}
body:
  text: 福建道御史忠毅李公神道碑銘天啟六年逆奄用事矯旨逮福建道御史江陰李公於其家下詔獄以死烈皇帝卽位大憝就戮首恤死難諸臣而李公贈通議大夫太僕寺卿封三代如其官予祭葬廕一子入太學又十七年爲弘光改元其子遜之伏闕以易名請廼俞禮官議謚忠毅而公褒忠之典始大備於是遜之謀葬公偕配錢淑人於赤岸里之諭塋而命偉業書其隧道之碑蓋距公之没二十有餘載矣公之没也年僅三十有四其同時死者徙者如高邑趙忠毅公無錫高忠憲公皆歷事先朝志存國本幸不卽塡滇溝壑得見少主老臣何惜餘年以上從神祖光廟在天之靈而下報同事諸人於地下惟公獨以始立之年有爲之才早負盛名未歷彊仕雖天地否塞竄逐流離天下猶望以黨禁終開足竟大用而横爲奸臣賊子所考陷畢命牢戸暴屍道傍眼鼻蟲出手足穿爛丙寅閏六月之三日獄中裂裳嚙血訣父手書自言三十餘歲便作一世人矣嗟乎當終軍賈誼之年而受陳蕃李固之禍百世而下讀公傳者未有不爲之太息而流涕也方公入爲御史哲皇帝沖年御服羣小欲矯弄威福日導主上以嬉游燕豫公慨然憂之其拜入臺第三疏所言數條皆軍國大務而末以逸遊爲戒固未嘗指斥某事也羣奄已大譁閣中日李御史何人教萬歲燈也不看福唐相緩之乃解公聞之益發舒於聖躬違豫則請止内操熱審推仁則請除立枷萬燝之斃杖也則疏理其冤王永光魏廣㣲之柄用也則疏紏其惡而最大者應山楊忠烈公劾逆璫二十四大罪公首疏繼之竟繇是得禍卒與忠烈先後死初楊忠奏入而璫擲地號哭遶床夜走公以爲此機不可失也故其疏日忠賢不去則皇上不安今日被論之忠賢不去則皇上尤不安蓋逆璫大罪釁結一朝發露地嫌怨集勢必自疑進將有參乘之萌退亦有覆宗之懼盍令羣臣固爭宰輔力持解其事權私家閑住俾嘗侍典兵之勢不成則司隸磔屍之誅可免宫府上下無害無猜不亦可乎凡公所言期濟國事不徒借刑餘沽摶擊已也而羣小嗾璫此左班官合謀剚刃耳於是殺公計決矣曹欽程之誣劾公也以推薦高忠憲公同餘姚黃公白安等指爲東林邪黨除名爲民未一歲織監李實疏緹騎逮問公入辭父母出見收者飲食言笑如平時里人巷哭攀車者萬人故吏奔問徒跣以千里其兄鴻臚公諱某者奔走塗炭親知義舊同心營免公獨自分必死過德州之日作書誡子訣絶後事抵京待命錦衣衞東司房銀璫繫頸從容索𥿄筆作季弟曠墓誌銘顧謂鴻臚公日兄歸事二親我有亡弟相隨九原耳已而許顯純拷掠楚毒坐贜酷比同事者已斃杖下惟黃公白安尙存遇害前三日黃公在別室以拳搥壁呌公字日仲達我已先去公應之日君行我亦至矣其處死生之際如此公爲人才智通敏議論廉悍處朝廷大事動中機宜有所條奏援筆立就忠烈忠憲兩公廼先後堂官也倚公如左右手當楊公避客草疏獨以其意㣲問公公力止之日公顧命大臣若一擊不中反爲所噬有傷國體某言官也請以身當之先是公在邸中疏璫十六大罪其藳爲兄鴻臚公所奪至是趨歸繕冩將上聞楊疏巳進廼止其事同宫皆知之而高公之掌院事也廉御史崔呈秀之貪拜命入都堂首指名按劾屬公爲奏崔聞之徴服叩頭祈哀公正色叱之此自有公論非某所得私也然則忠賢之殺公也人知其繼楊公以擊璫而不知先疏其十六罪羣小之殺公也人知有曹欽程魏廣微而不知有發蹤之崔呈秀也李氏家本河間之甯津始祖嘉那爲元初行軍大帥謚桓烈以戰功顯子霑柯漕運萬戸世守鎭江江隂等處元季有平江路同知死張士誠難諱諫者則其五世孫也累傳而爲贈太僕卿復庵公諱果實公祖封太僕卿見復公諱鵬沖實公父公諱應昇字仲達年二十有三舉丙辰進士第五人其文章有聲於時選得南康府推官決疑獄除苛稅政治第一修紫陽隄復白鹿書院分較江西省闈再聘廣東同考取士號得人所著詩文有招五草別匡草落落齋集若干卷生於萬曆癸巳十一月二十八日死於天啟丙寅閏六月初三日配錢淑人以弘光元年卒得年五十有五子一卽遜之邑廩生補廕公德州誡子書所謂九歲孤也今能讀父書修輯公遺文作年譜人稱其孝女一字禮部主事霞舟吳公之子裔之吳公諱鍾巒以宿儒教授里中公之師也臨難受托經紀終始公早貴摧折而霞舟棲遲晚達至崇禎甲戌始繇諸生舉進士嗚呼人世死生得䘮之故豈可閣哉予雖不獲交公而少讀公之文今識公之子覽其家傳輒爲隕涕廼詮次公生平以少俾國史之所未備爲銘曰我公之生夢日始升有龍無尾廼脫於淵叶䝟貐舚舕爲守大閽燁燁震電碎擊九門索彼天狼縛之虎賁短狐而冠上帝弄臣爰盜弓矢射我長庚我公之死白氣亘天叶月犯執法彗掃羽林黃霧野塞黑靑晝行䕫䰧吐火廼焚崑崙不周雖折泰階再平大江入海匡廬出雲赤岸故老白鹿諸生人思竇武家誦李膺陳屍北寺暴骨西亭三年血碧萬古汗青伍員祠廟楊震子孫幽宮宰木隆碣高墳凡百君子視我刻文太傅兵部尙書呂忠節公神道碑銘偉業待罪史館獲交於宿儒大僚仰見我神宗顯皇帝制科得士貽之子孫以保乂王家廼冦禍殷流淪胥莫救後生執筆輒敢擬議老成以吾所見聞學術醕正忠孝完人若江夏賀公雒陽呂公者斯可謂之無媿也已當思陵之季此二公者兩河去就三楚安危名藩乃磐石之宗元老實腹心之舊身搘狂冦家扞巖疆其効節同濓雒横經湖湘講學心惟致命道在成仁旣入水而不濡雖結纓而何懼其畢志同余欲訪求其軼事而世人罕有言之者悲周哀郢之作不可得而聞矣今年呂公之子兆琳繇淮右致書以公隧道之碑爲請嗚呼呂公之殁也太常大書其官博士詳誄其行雖陳鄭皆災榖雒交鬬而丹青彜鼎猶側出於横流刼火之中今已二十餘年吾黨徴柱下以遺編訪萇弘之青血欲以弔北邙而備南史不亦傷乎此吾所以撫公家乘歎窮而繼之以泣也呂氏宋文穆公之後河南之新安人祖諱鄉父諱孔學皆以公貴祖妣牛氏守節而孔學稱仁孝詔書兩旌其門孟淑人夢月入懷生公公諱維祺字介孺別號豫石萬曆癸丑進士位至南京兵部尙書居雒陽抗節死寇難事聞賜祭葬贈太子少保再贈太傅謚忠節其所歷官初除山東兗州推官舉最入吏部更主事者四司爲員外於考功於文選而驗封遷郎中熹宗朝以前乞省換補考功郎逆璫矯旨弗用思陵更化起家尙寶司卿改太常寺以少卿管四譯館尋陟爲正陞南京戸部侍郎領糧儲超拜兵部尙書中糾拾以免公死難在國史其餘服官立政講學著書他事多可紀而最著者有三日持大議裕大命立大經光廟上賓請見嗣君於慈慶宮門中貴導駕幸小南城抗言梓宮在殯大寳未登不宜動屬車輕萬乘正色當階伏出中止再疏調䕶起居戒近習不宜干政請選侍移宮按問諸醫侍疾無狀持大議也南司農旣多逋賦兼北部之所咨借不貲以出入本折多寡鉤考不及額者百二十萬有奇卽舉郡邑負課算之以當經費尙虧十有九萬京軍匈匈索餉憂在根本公迺疏十事二十四弊以聞於朝其不得已者請以上命塡補次與其屬講求區畫定期㑹之令以趣辦除導行之費以勸徵有司累息奸吏歛手又以圜府乃國息之本爲之禁放鑄淆雑而專行法錢權其子母以贍用行之三年粟積如坻貨流如泉裕大命也馮恭定之於關西鄒忠介之於江右曹自梁之於晉中同時講學公則以門推篤行居近先儒卽鄭氏之禮堂寫曽子之家策著孝經本義大全或問三十餘卷表獻諸朝請以之進經筵端豫教頒諸學宮爲永法芝生於庭十有八莖如顔本篇目之數建芝泉書院用彰厥瑞立大經也斯三者皆公經世猷畧爲學本原視夷險爲同歸通死生於一致故能處患難蹈白刃而無所悔也嗚呼若我公者豈偶然哉公之爲南司馬辦賊也上完江淮中顧宛雒家國綽有成算旣免歸寇禍大作新安城庳土惡災螟洊青窮民襁負無歸公乃調穀以賬凶飢捐金而就板築父仁孝公實贊成之日天下方亂吾父子幸有餘祿可賙鄉里庸足多吝當事者主撫議見河汝蕭條請斥空城以綏徠新附公則謂腹心要害勢難養虎移書力爭事乃中寢土寇王之典桀黠反覆公不動聲色徵而戮之餘黨莫敢動者戊寅秋李自成敗於潼關巳而復振蹂宜陽躪永甯熊耳以西屠屯壁以十數雒陽震恐福邸在城中積金錢綵物累鉅萬謹錄籥牡不問賊援兵之過者糗􅖲惡投之地訽曰王家擁金貲厭粱肉而令吾輩枵腹死寇乎公聞而憂之具以大計動王王弗省明年正月賊侵逼河南總兵王紹禹堅以其兵入城公門於北紹禹門於西副將羅岱之兵背西門而舍詭云逐賊實迎之返而合圍勢張甚守陴者無人色公疾呼家將縋下鬬殺十數人賊再用羅軍礟具來攻公鬚眉㦸張坐城頭叱左右弓弩亂發賊多死紹禹之兵視而嘻道上竊竊耳語旦暮以城下賊爇王府而分之羅軍招與同叛或得其語吿公且勸之去公歎曰我向固憂之今事巳去矣計安出雖然雒陽重地王神祖愛子猶有神靈此城必全萬一蹉跌吾奉身以死之臨難苟免豈儒者事耶越日王紹禹之兵乘夜揮刀殺守者懸布於堞賊乘之上城陷公北向慟哭子弟牽衣請避賊公曰我一死以上答所受内副所學於義得矣去將何之天明賊大至有起於賊中者曰公非賬饑呂尙書耶我能活公可乘間去公弗動其衆擁以下過福王於道已反接公奮其首顧王曰王綱常至重等死耳毋詘於賊辱國體賊渠見公於周公廟曰呂尙書日請兵餉殺我曹今定何如耶公瞋目駡曰吾天子大臣恨無兵以磔汝狗鼠今日之事唯有死耳死不愧天地不愧聖賢復何憾賊捽之地欲屈之公叱曰吾君在北北向再拜又西向拜父母申脰就刃容色自若是日也福王亦遇害嗚呼吾觀雒陽之亡公之死於王室菀枯之際恫乎有餘痛焉神祖在宥日久天府之藏不可以辜挍宮省舊吏皆云鄭貴妃緣愛子之故斥大半辦治國裝再撥莊田二萬頃鹽引數千綱收其贏以滋封殖他王莫埓自中原用兵思陵封樁匱詘推光廟天顯之愛不忍以憂叔父掌計老臣如呂公者身在雒陽熟知王宮緡錢藏鏹小發取其中可充軍興之半號咷呌呼懼傷親親之恩迺屏人極論開曉禍福王亦但頷之而巳捐私槖出家糧譬之捧土堙河萬分何濟老臣不惜以身率衆冀幸王聞之寤自輸以佐縣官而緘縢扄鐍卒棄之兇徒悍卒之手此公聞國言籍籍拊膺嚙指而歎王之失其會也孝經之三章不云乎高而不危所以長守貴也滿而不溢所以長守富也保社稷和民人是爲諸侯之孝漢文帝四子梁最親王竇太后少子居天下膏腴地珠玉寳器多於京師以史攷之亦可謂之驕且溢矣七國作難王恐上憂太后日夜泣梁將士力戰吳楚不敢過而西王之殁也得謚曰孝今夫神祖之所以愛王且厚王者樹億萬年維城之助也天下有急王屬尊地近能爲宗室倡首蓋當有聞而應者社稷安則王安兩宮在天之靈罔不安矣斯非諸侯之孝乎當自成之敗潼關所餘不過數十騎雒陽之變繇於内潰彼非能肉薄而攻也克東都據形勝發王中府金以號召饑民一朝響應百萬華夏因之土崩若使早從公言天下事必不至此䘮亂方多吾謀不用痛宗周之板蕩感大道之銷沈公於是灑熱血以濺孤城抱殘經而覲三后講舍則芝焚可歎故宮則麥秀堪哀天實爲之公其如天何哉公攷正六書多所論著他文及奏議無慮數百卷晚年乃著存古十二篇士戒七則其說歸乎敦本訓俗下至肴核衣履之微事爲之制人或疑公宜闊達濟變而規規小節得無非其急者余則謂數十年來士大夫極滋味盛倡樂以自奉子弟傔從通侻放横侵枉小民故螟特蟊賊􅔯敓姦軌相因而起公此書所以塞亂源而消害氣謂之捄世可也而豈區區者乎公司李兖州曉文法識利病折獄多所平反定保甲法蓮妖之變賴以無恐敭歷銓曹公廉不受私謁釐正選簿年稽月攷周忠介聯事郎署嘗亟稱之觸堂官忤政府據故事以面折臺諫偘偘克舉其職修南都二十六倉五塲清屯糧八十八萬汰冗軍補脫卒募趫敢之士簡其樓船甲仗自采石至瓜步爲江防蓋公之爲人内服儒宗外精吏職其吾行本之鄒魯而間出於范蠡之治越管子之治齊精彊廉辦自許爲有用之學不獨一經專門已也南侍郎陛辭上目而偉之旣受事得所上章皆精切於職掌一無骫骳上以此切責前計臣而見公分憂辦職公亦謂得行其志盡力以自効於上言者乃摭他事中公旣畏惡其能人皆數廢數起公獨一跌不復退居嵩山之陽者七年以遯世無悶爲學不欲與世之君子競其短長然自以遭不世之知顧用毁去毎生徒擁卷父老登陴之日其中有不舍然者故没身卒以忠顯嗟乎千載而下可以知公心矣余以詞林後進識賀公公粥粥謹厚未爲通人所許然不失爲醕儒以理學多所講貫今散佚弗傳武昌之變楚王委國儲百萬以資賊與雒陽事相類故牽連書之呂公仕宦參錯余未及見然在南中時遊公豐芭書院諸生多稱之流寇從澠池初渡淮泗宴然呂大司馬首以鳳陵單外爲憂勸上宿重兵爲衞人皆服其先見又雒陽未破苦言以借箸福邸而終不顯其謀賊去之後雒人士避亂渡江頗有言其事者余籍而記之二十年矣今呂公之子兆璜知解州而兆琳成進士於故家遺老訪購公之遺文淮安守吾友張公藍孺實公之壻手自讎校刻之於淮上余旣受而卒讀江村寒夜從廢簏敗紙中追理舊聞補公家傳所不載庶於國家存亡大故後人知所攷信非爲公一人已也公諭塋在新安之某原以郭夫人祔其月日譜系茲不載載其大者余以公在祀典配瞽宗作家廟諸生雅吹擊磬登歌進酒是不可以無辭乃系之以詩曰巖巖兮孔宮漆經將出兮壞壁笙鏞我公其來兮章甫以從奕奕兮周廟鴟鴞毁室兮斧斨載道我公其死兮四國是悼溘埃風兮上征御緱嶺兮王孫謁我后兮天門執覊靮兮微臣瞻虙妃兮在旁撫愛子兮沾巾辭九閽兮心惻降周覽兮下國骨藉藉兮無人擗宮牆兮叢棘噫嘻曾與閔其不見兮蹇吾法夫仲繇苟髮膚之罔愧兮知父母終不我尤位鷹揚之苗裔兮功不遂乎營丘庶斯文之弗墜兮吾奚負於宗周甘芝菌之萎絕兮忍化此蕭艾也眷靈泉之涓潔兮雖抱石其何悔也重日鼓塡塡兮血輪囷巫陽下招兮陰房靑北邙嶻岌兮碑出雲絏余馬兮河之滸酹椒漿兮進蘭脯刻貞珉兮誓終古少保大學士王文通公神道碑銘順治十六年二月丁卯上以故大學士王公守都察院左副都御史卒於其位爲之震悼而贈謚祭葬褒終之典畢備且命書其勳德於墓道之碑曰以昭朕篤念舊輔之意於永永勿忘其長子明德繕疏以謝退而屬偉業爲之辭偉業震恐曰紀事臣職也未有承制而用草莽固陋䙝王章而私令甲禮之所不敢出也明德固以請曰上命卽其家伐石樹表而螭首未有刻文匪惟抑没先人將以隕越鉅典不共是懼吾子其謂之何偉業旣辭不獲命謹按故光祿大夫左副都御史贈少保兼太子太保吏部尙書謚文通王公諱永吉字修之一字鐵山揚州高郵人也其先世徙自毘陵曾大父諱木大父諱煥父諱自學皆以公貴贈少保妣皆贈夫人公生而瓌異長身修髯具文武材畧由進士起家再爲縣令於大田於仁和一爲推官於饒州咸著異政從戸部郎備通州兵事有威名遂推以巡撫山東未一歲改薊門總督其時流寇已隳突河華滔天阻兵羣孽扇行所在蟻結燕齊雲朔魚爛土崩公受脤於倉卒之時投袂在敗亡之日猶能輯甯東夏擁䕶巖關障遏奔衝呌呼搘拄旣而有謀不用勢竟莫支變服閑行投死無二忠著於前史事隔於興運故不得備書其初入本朝一見授大理卿守法律持大體以刑不上大夫請郎吏之謫罰者得以贖論晉工侍郎用疏辭報罷再起戸侍郎上封事十條於蘆政馬草尤中肯綮又陳投充五大害謂其上干國法下失人心慷慨切至報可施行尋擢兵部尙書賑饑眞定卽道上拜都察院左都御史未至召入爲秘書院大學士其在兵部也絕請謁以嚴選格飭訓令以定兵制偘偘克舉其職且念土寇用反律而閭左剽刦不得與同科卽收考宜下刑曹非所司所當置獄其有無辜連染者請出之以息冤濫眞定爲州縣三十有二㐫災延蔓數百餘里公以上賑䘏恩甚厚不可委屬城長吏倍道兼馳所過人人慰勞老幼滿於車下興發成於手中得調度之宜有賙救之實又以其間訪官吏良猾風俗利病爲書奏之上久知公忠勤任事故有以大用公也公居平搤擥江南漕弊京通是其根株非大釐革不足與更始㑹緣兵部前事從内院出奪一官視通州倉公初不以左降有所弛易受命立馳至潞河訶輓卒以何不前對曰爲紅船紅船者楊村淤淺轉運之船也具得其稽索侵牟狀公笑曰吾分爲三番遞運則弊不得行矣已而果然嘗夜宿通惠河傳籌發運艘危坐㸐兩巨燭手漢書一册風雪繞其鬚髯達旦不寢人望之日高郵公眞勞臣也明年召入爲國史院大學士管吏部尙書事上時御南苑手脫所服冠以賜面命之公頓首出坐堂上進其屬問曰新舊人以名第需次者幾何人日千人矣掾中之以年勞在册者幾何人日倍之矣問其循序爲注𥙷曰員缺之汰也資歷之有不相當也卽如是有十年之人而不得官也問其設法爲疏通日叅罰之多也開復之不易也卽如是有十年之官而不得遷也公太息起日是安用我主爵者爲乃舉職掌所當釐正者分爲二十疏杜門請假繕寫十日而始成奏旣上見者咸服其精切蓋公天性彊于吏軄能斷大事處之不疑以吏部用人爲天下安危治亂之本上以協恭同事外以厭伏羣情綱紀畢張苞苴抑絕卽下至流品勾稽年贏月縮銓除移駁甲是乙非他人視之叢薈紛糾頭目眩瞶者無不吐決如流笑譚不倦而公亦自此漸以病矣公病而尙方賜藥物趣累詔不得已復出出而坐兄子科塲事責授太常少卿未幾卽進左副都御史有意復嚮用之而公竟病不起嗚呼斯可謂出身爲物以死勤事之君子巳公亦奚憾矣哉其或有不量公者曰古稱得士可以後亡公之初節不可爲不用也何以不能挽横流救末造乎是不然山東亡命蠭起如龍山滄浪淵諸賊天下之巨猾也公以一節挑三百騎未浹月而收縛散遣之殆盡亦足以見其畧矣京師倚邊腹建牙爲犄角舊制額兵十萬有無尙不能支乃抽調潰亡之後不復能軍廷議遂裁一督師一保督三巡撫二巡治六鎭帥而獨留薊督一官以任公予之以各路零星收拾之罷卒又闕其一年之餉而以當駸駸渡河百萬方張之流寇撩猛虎以空拳救燎原于杯水尙謂公力獨能辦之然乎否乎撤甯前併山海以爲搘梧根本之計此何等時也謀國者狐疑相杖公爭之數月猶不見從賊大同圍急而後遣之故公以單騎十日盡發關甯勁旅顚沛勤王去京師二百里而已無所及若夫公之南還也柄臣不過資其空名而未嘗假之實力然猶扼淮不可蹈海何之走單舸於颶風鰐浪之中幾至觸石横流妻孥破没而後束身歸命嗟乎世之不量公者固失之矣彼謂智者覩危知變轉敗爲功又豈所以知公也哉覊旅登朝非勳非舊遽受客卿之禮驟立羣僚之上苟非盡瘁竭誠何以報恩塞責又自悼推遷興毁耻以其餘生倖富貴庶幾乘機構㑹殫未死之力以救濟元元是以出入數年焦形極敝此固公之自待如此而其用心良已苦矣才大則磨斵自多名高而牴牾亦甚公於是乎術輔其資道全其用有寬厚愛人之德而議獄不厭其深詳有變通宜民之方而守官必主於繩墨其意在别嫌疑擿隱伏絕賓客棄親知取一切以自立於無過然後可以保持善類調䕶艱難負方圓並畫之才逼膏火自煎之勢靡事不爲繼之以死維當㝉以馭騏驥者利其銜策擇棟梁者善其斧斤顚倒詘信妙於駕御而勞臣中夀奪我股肱宜乎手詔爲之驚嗟而拊髀加之痛惜也偉業辱與公游每見其酒酣脫帽顧盻風生詼啁譚笑而語不及私簡易威儀而望之增悚輙驚以爲莫能測識及往問公疾公自言昔年經虎口葬魚腹瀕於死者數矣主上待我厚今犬馬氣衰便恐無緣酬答不覺涕泗横流故今日執筆表公心事以吿萬世其使王氏子孫知朝廷所以保全先臣蹈戴無極而後人之過此者得此碑於苔侵石泐之餘摩挲捫讀論公之心而參攷於紀載必有爲之彷徨而愾歎者斯於公亦可無負也已公生卒皆以已亥葬于其鄉之跱躇山而鄒趙兩夫人以詔祔子七人孫六人餘在誌傳中公嘗刲股肉以療親居䘮稱死孝而高郵大水捍災患有功皆其大節不可不紀嗚呼觀公於此二者則其爲君國以不有其身又可得而知也爲之銘曰於赫三事徽音不顯允文允武王臣蹇蹇迺吿圻父曰予腹心乃陟上宰左右一人錫之天閑爾亦千里駕我日車掉鞅不已維玉及瑶垂帶以朝耀首有飾翠帽豐貂雲臺是圗憂公見貌于思于思遇天一笑亥有二首辰在降婁害于股肱箕尾以游追命舊勞大書深刻史臣作歌爰紀袞職淮水方洚我公障之高城無恙我公相之卜茲墨食公其來思穹碑嶻嶻宰樹參差後千百年視此銘詩梅村家藏藳卷弟四十一終

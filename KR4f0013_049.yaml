front:
  text: 梅村家藏藳卷弟四十九文集二十七
  hash: sha256:be0a8261aaa2e55daad5ed834f8efe5fd614aa8b13d897485597de0ae42296a4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_049-1a}
body:
  text: 墓志銘八敕贈盧母羅淑人墓志銘淑人姓羅氏楚之蘄州人贈大中大夫鹽運使盧公首山諱如鼎之妻進士管江南漕務左參政綋之母也首山於癸未二月賊張獻忠攻蘄誓死設守得正而斃參政時計偕在都次子􅌧又先期遇害淑人哭號行求收公尸於骸骨撑拒之中以待參政之還憂勞成瘁不半載而卒得年六十有七蓋公之死即殉城也淑人之死則殉夫也可謂酷矣人猶為淑人厚幸曰未沒於兵又六年參政成進士聖朝推恩其母初以新泰令贈孺人再以桂林府同知贈宜人三以長蘆鹽運使贈淑人國家十數年間凡有覃慶大典參政母子未嘗不在褒寵中可謂榮矣人猶為淑人惋惜曰不及於祿偉業讀其家傳而歎曰天地慘黷生民糜爛閨門婦孺以一身搘拄於室家骨肉九鼎一絲之際豈不難哉當蘄之初被兵也首山之次子􅌧紱子晨初從子紳紳子震初皆死而紱妻楊氏震初妻袁氏死尤烈又一月而首山及參政之長子旦初同罹於難蘄黃既全楚之望盧氏尤稱忠孝義門推厥本源咸出公與淑人之教至於今曹江之水空流宋廟之火久熄有過中郎之閭而弔其禮宗者幾與共姬孝娥同其節概淑人生嘗荼苦沒被寵榮烏頭雙闕且與豐碑宰木照耀天壤此史氏所必載而私紀可以弗之詳乎按狀淑人之父繡軒公官藩府書記從荆邸自建昌遷於蘄因家焉盧氏參政之大父曰贈大中大夫南槐公兩家共里閈為世好繡軒任俠能文南槐之弟曰南林好碁酒尤相善南槐嘗遠遊而不在兩人共奕從者劍首山立於前南林撫之曰兄子也請君女以為婚羅公笑而應曰諾南槐至而弗改也南槐娶於宋有二子而母見背公生巳五年矣繼室以李氏無子視之如所生羅氏則為愛壻蚤失恃其周惜甚有恩紀參政言之輒出涕曰吾外王父之德猶吾王父也淑人年十九歸於公生長高門母朱又宗家女也裝送為盛淑人綦縞自甘紈縠弗御針管鞶帙糿治必工為人儉而莊柔而正通詩書能識其大義事高堂具有禮法南槐天性剛嚴寢門之內懾氣屏息李淑人雖賢乎後姑也舅氏之佐簉者又擬於女君勃稽語言易生嫌間伯兄長姒為之析産異居淑人則下氣怡色就養無方二十餘年能奉之以終始斯其孝可知巳羅氏之饔人膳羞脯醢倣王家食官之制南槐進而甘之舍是即投箸命微淑人知之中厨躬自割烹約水火之齊醬物珍物必致其美命媵者奉以饋曰此羅氏羹也淑人性不飮自奉粗飯無兼味有潔癖簠簋匕箸必手滌而几席振拂無纎塵身親井曰生殖漸充僮指百餘計口賦食嘗御之以寬終歲不聞疾言遽色而內外奉其規程莫敢陜輸嬉笑者其家法如此首山屢躓於鎖院淑人婉語相勞苦參政兄弟就外傅所以教督之有方嘗篝燈聽其夜讀至東漢宋弘傳舉弘糟粳貧賤之語以為訓又至寇準傳曰天下好用寇老兒為人當如此矣得參政丙子賢書信曰若它日所就詎至此旁人睨之殊無驚喜容退而皆服寇禍之作也首山自郊徙於城淑人方盥洗聞鬼哭愴然知不保城陷公被縛矣已而釋手執參政之子旦初昭初扶其母張淑人以免弟􅌧則與妻子偕沒淑人蒼黃散有外戚熊姓者導之使歸踰月寇復至公與於難二孫别而纍昭初乘間逢旦初遂不知生亡淑人僵立壞墻之旁同里顧氏妾者左右之還之以其衣遂與張淑人偕脫嗚呼此二者孰非天為之哉首山以二月二十二日殪又十日於江崖而得淑人哭而收之焚以殮亂故不成喪也參政間道西還遇其孥於湖涘之舟相扶歸辰山鄉莊而淑人亦以病八月之二十二日遂革其訣也猶以沒身子手為幸飯含之夕非淑人避兵時所攜帛中金則不能為椑參政言之輒噭然泣墓在蝦蟆湖之秀山原以視土門珠樹林首山藏骨處為別葬孔子曰衛人之祔也離之魯人之祔也合之季武子曰合葬非古也周公蓋祔君子之重其親有其禮無其時不能行也同穴之詩平世之所為作詎所論於流離板蕩哉夫升陘之復以失狐駘之弔以髽若首山公者所謂埋而置揭得土而巳此窮於禮者之禮也淑人則猶得斂以時服懸棺而封故其於公也有杞梁同絶之心而援蒼梧不從之義别志者蓋變文以起例所以著其孝而申其哀焉余嘗泛覽史傳每歎天下大亂女子之死節者其姓名最易為抑沒傳者蓋千不獲一惟子奉其母婦奉其姑幸而得免者其後門第光顯後人為之稱述或側見於孝義獨行世家列傳之中而貞姬節母遂以奕世不朽今觀淑人得全而楊氏袁氏因之併著於後蓋造物若留之俾生者絶而復續死者隱而得章必如此始可報首山於九原而啓參政於身後豈偶然哉余史官也又嘗使楚於楚事宜詳參政今宦於吳為亷吏為孝子傳曰非此母不生此子然則淑人之必傳於百世無疑也是何可不銘銘曰鉆鉧源泉兮其流發發爰采香草兮我心則悅石穴洲高兮銅零江小翠篠霜筠兮停雲縹眇若堂若斧兮出於湖墳三湘之哲兮八米之門釋奴龍子兮一日千里伊誰貽之兮母之懷矣蘄春大澤兮狐嗚篝火黃巾城下兮白骨道左父求死子兮婦求死夫毋使併沒兮天乎何辜我刻斯銘兮用昭愍綸誰曰不見兮後千百世其長存陳母夏安人墓志銘余嘗覽史傳慨自古危亂之際貞姬孝女泯滅於兵火者不可勝紀間有一二幸而全全而子孫備載其行迹俾後人因其事以追考其世則夫身殉而名不存者亦得附著焉以顯而此一二人者天若有意留之不使之併沒如涪州陳母夏安人非其彰彰者乎安人今松江郡丞陳君三石諱計長之配而用其子命世等之行狀為請三石余友也泣而言曰吾妻獲邀今天子之覃恩以得封而其卒也在已丑年之正月六日是為張獻忠破蜀後之五歲當吾提攜細弱奔走竄伏於窮山絶箐之中其得脫於萬一者翳安人黽勉搘持是賴今計長竊祿此方諸子克有寧宇而安人年已不待詩有之將恐將懼惟豫與女將安將樂女轉棄豫惟仁人君子賜之不朽之一言庶有以慰其無窮之悲乎余因諾其請為之銘按狀安入夏氏其先以宗人故冡宰諱邦謨為望姓而癸未進士員外郎諱國孝之孫女也父可淇諸生母趙氏嘗病已革安人刲股肉進以愈年十七歸於陳欒城令諱某郡丞君之大王父也欒城有母曰劉太恭人年八十餘矣蜀道遠而欒城初仕母老不能從行欒城之配曰文恭人請留安人長跽請曰吾舅萬里遠宦姑不行無以主內政太恭人晨昏定省則新婦事也蓋涕泣固請而後許久之劉太恭人以無疾逝先期君與其叔與兄以公事不得已於省會既聞訃而望國以哭則安人巳踊而成喪自餘閣之奠以及於浴衣含玉附身附棺終事畢舉欒城歸而詢諸左右長御知大小斂無遺憾者乃聚其弟若子以泣召安人前而勞之日若有大功於吾陳氏安人遜謝不敢當初君之舉賢書也少嘗上南宮一再不第歸同輩多卒業於京師往往得官自欒城亡後秦楚有冦難蜀道梗君猶豫不成行獨坐恆拊髀自歎安人寬譬之曰人生窮達會有命母在君奈何以身諸子曰君獨不為若等計耶君出而盛推讓李嗛言已不足共事者李亦知其意不復強而敬君長者謀以妻子托之安人與君參語許諾喜曰李公不負國而君可不負李公其勝於從李同死者多矣其後李公沒於兵而君以免室家完其第四子德世為雨然壻李氏弱息實賴君以存然後知安人之言不徒以為其諸子也嗟乎豈不賢且智哉安人之厝也以亂故禮不備三石之言又曰獻忠躪蜀棄胔之不葬者高於巴陵之堆吾妻得土為幸詎敢謀諸楄柎然以吾之流離白首諸子僑於異邦它日者歸掃先恭人之壟以為伉儷謀同穴期尚有待惟即菆宮告哀西望嗚咽於魂氣之無不之而已余曰我聞楚蜀間好為哀些之辭今陳氏之速銘也語多惻愴請變銘體而系之歌曰涪水潺湲兮涪山巑岏虎豹唁唁兮風雪孱顔從夫木末兮哺子草間黃雀啁啾分猿猱以攀丹楓隕葉兮血淚斑斑苟盡室之可免兮一身奚歎彼巴姬之何辜兮委骨江邊幸壞土之猶在兮從姑以安念夫君之遠道兮匹馬征鞍倘夢魂之可越兮寧愁間關亂曰已焉哉伏波駐兮銅柱灘銅柱灘即馬援􅄵之水安人葬處馬鬛封兮西風寒望不見兮涕汍瀾蓴羹兮郫筒鶴唳兮啼鵑􅥵赤甲兮片石刻銘辭兮干年白母陳孺人墓志銘金陵有二白日明經夢鼎孟新孝亷夢鼐仲調天下之賢士也二白之母曰陳孺人亦天下之賢母也孺人以月日卒二子以父奉亭君諱某之藏祔於大父卜某阡以别葬而屬志銘於余余與二白有三十年遊講之雅今年春仲調相遇於吳興古者朋友之親之喪遇諸道則為位哭余因以追敘三十年來死生契濶凡人子之憂及其母與母之不保其子者多有之矣以吾兩家遭時多難生事死葬僅而獲禮余衰且病猶得執筆志白母之墓不綦幸乎孺人之初亡也大司馬合肥龔公為之傳余與龔公交於二白者皆最深龔公已詳述孺人之內行余將何以加諸無巳請即其傳繹言之可乎孺人縣尉陳君忠藎之女忠藎官於閩而卒子幼自以長女代其弟奉母以奔父喪年二十而嬪於奉亭君奉亭之父曰敬亭諱某元配張孺人早亡孺人酒漿滫瀡盡婦禮惟以不逮事其姑為恨敬亭殁執舅之喪如其父事繼姑厲孺人姑有女出己奩為之嫁姑病奉湯藥滌厠牏以將護之厲孺人殁執繼姑之喪如其姑詩曰明發不寐有懷二人傳之所以稱其孝也奉亭好徇親友之急不以無為解孺人所生二男四女家又遭兩喪搘捂拮據匪朝伊夕有勸以家貧罷二子治制舉業者不肻聽曰子苟讀書知禮何憂貧盡斥簪珥以為束脯資詩曰何有何無黽勉求之傳之所以稱其勤也孺人訓子女以下逮僕御終其身無疾言遽容奉亭君病焚香告天日是有人父之責於其祖父願以妾代某之身奉亭竟不起孺人號呼欲以其身殉念孺子無以成立則茹齋修竺乾之教者四十年勉二子以力修乃父之志詩曰釐爾女士從以孫子傳之所以稱其義也余覽范史之傳黨人也先書黨人之母夫為人母未有不痛念其子者也子以義死其母許之且告以死而無憾若此者為黨人難為黨人之母亦難當阮懷寧由逆奄之餘孽乘國難以竊政修二白生夙昔執言之憾而下之獄孺人間二子之被收也色不變將誓以俱死而加慰勞焉然卒以免嗚呼宗社而既屋矣為僉壬者身敗名滅一二正流或以喪亂得全君子於斯時也未嘗不以黨人之已死者為悲而不敢以黨人之不死者為幸惟取賢母之夀考令終歸諸天道之可信而已白母之偕二子以免也踰七年而仲調舉於鄉又二年孟新貢入太學母年八十健飯向伊我母之望母曰無恙歸來在養其生也有基其死也有歸道時孔難罄無不宜若此母者垂百世其奚悲王母周太安人墓志銘先王制禮後之人有進而加隆者其惟母服乎禮家云父在篇母齊衰期者屈於其尊也今執母之喪不得以二尊之故稍有等殺雖然禮寧為其過無為其不及古者禮不足而哀有餘今之禮猶古之禮今之哀不及古之哀也古三月而葬父在而葬母者其父以妻之道行之為之子者衰服面深墨徒跣引匶扱袵雞斯以申削杖之痛若此者其服不同禮同孝之至也今之人於致哀之道其果能盡歟否歟如吾友刑部郎中海虞王君楚先葬其母周安人者斯可謂之能哀矣乎楚先與父餘姚公喜賡同舉進士楚先筮仕十餘年既以親老得請餘姚公方在養而安人見背楚先將以月日封北山之新阡在餘姚公則葬妻也楚先則葬母也君子竊於此觀禮焉禮先殯而後葬安人之葬也先期楚先奉匶車以祖載柳池牆翣四面有章屋帟加黼罔不盡節主人袒括髮拊心辟踊自家徂壙匍匐而號者數里內宗外姻四方之來觀者數百人皆為欷歔出涕且日王大夫之孝匪其母之賢不及此於是楚先奉餘姚公之命實來請銘偉業讀其狀有感曰河上之歌不云乎同病相憐此余與楚先之謂也夫悲者不可為絫歔憂者不可為歎息聞吾友之哭其母余能無􅏰然承睫以追痛吾母乎當世祖章皇帝之十載詔舉遺佚偉業與楚先為同徵是時吾母朱淑人年六十有九善病長恐不復相見吏趣上道急母子日涕泣目盡腫既抵京師與楚先言而嗚咽楚先亦泫然曰人孰無親即吾母未嘗不善病也余曰君父子同取甲第父處子出於道為宜君之母少於吾母者一紀及君仕宦之成將母未遲也此豈我所得而同耶歲月而往追惟友朋夙昔之語戚戚未嘗有忘今日者執筆志安人之葬不自知其傷心而䀌痛也安人七歲通孝經兼工鞶􅐆針管既長代其母以搘捂家政年十八歸於王事君舅震毅公君姑張孺人盡婦禮餘姚公出為叔氏後所後之母戴年少勵苦節安人左右就養能得其歡心餘姚公窮諸生也束修羊不足以具甘旨又不能謝賓客之過從朝夕所給咸出安人十指中撫育諸子辛勤教督有機杼佐讀之勞有粗糲不飽之苦既貴辟纑布素如平時斥衣食之餘以恤姻收族親舊之窮嫠者咸以為歸遇媵妾御臧獲皆有恩紀於里巷則給棺槥施醫藥五十年依佛氏之教焉其晚歲也訓楚先以居官淸謹不欲仲子之與物為競又使之乘時鼓勇以自進於功名其賢明識大體如此楚先迫念生平艱難黽勉之故而痛其母之即世故哭之尤加哀焉嗚呼吾父亦窮諸生也吾母之事大王父王母以孝而教三子以成立其仁勤莊儉之德實有類於安人而偉業之事其母有愧楚先固已多矣自古賢人未有不願其夫若子之富貴而富貴之無愧者尤難當吾父之有聲場屋屢試不收而祖母湯淑人已老家貧無以為養吾母為余言之而泣余幸弋一第竊喜有以慰母而終有憾於吾父之不遇也今王氏父子一朝並舉南宮薦安人之於其家也宗族親黨前為夀可以為貴盛矣人子之事其親孰有加於此者乎若夫遭逢世故進退維谷之日在楚先欲以完節卑餘姚公可出身為門戶計而余於大義不得援此以為解自恨於當世無毫髮裨補徒以羈愁病苦之餘纍吾母之倚閭長望而貽之以晨夕之憂然則余之有負子職者捫心慚汗終天而已矣沒齒而已矣以視安人母子詎可同日而語哉安人卒於康熙丁未四月十四日詎其生年丁酉八月十四日春秋七十有一子三人長澧即楚先也刑部郎中次渼丙午舉人次溍殤女四俱庶出楚先娶徐氏渼娶范氏孫九人奕棠雲槎澧出也世棐雲槃雲􅯆雲楘雲梁雲柳雲藻渼出也奕棠雲楘皆諸生孫女四曾孫男三安人之七十也楚先奉恩命以歸養再踰年而安人以卒嗟乎人子莫大乎親視飯含雖以余之不孝藉國恩以終事吾母庶幾稍有以自慰禮曰五十不致毁又日父在不為母滅性楚先之為孺子泣者亦可以有節而不至於毁瘠乎是亦母心之所以即安也巳為之銘曰哀也可以無容言也可以無文是少連之居喪而在乎虞仲之城翳賢母之善貽兮用不匱乎斯人烏目其嶞兮尚湖以淸我為此銘如燕雀之回翔兮鳥獸躑躅而啾鳴噫嘻乎悲哉石以永存潘孺人墓志銘吾友鄒訏士祗謨狀其母黨潘孺人之內行來告曰孺人姓潘氏常之宜興人翰林簡討孫衣月自式之元配也衣月將以月日葬其父母於龍蕩之新阡而用孺人袝吾子既許銘其大墓矣敢并以請且日孺人之父湖廣都司參軍文臺公祇謨之外王父也文臺以周孺人生二子三女既成立矣吾母則長女也周孺人晚又一舉得二女其一殤存者為最幼以此絶憐愛之當吾祖之以憲副治九江也吾父率吾母以從文臺公方隨牒官雅州道出九江周孺人攜女與俱生八年矣吾母見而留之曰蜀萬里遠宦雅州又處蠻箐中妹方在提抱請為母鞠之以待母歸可乎周孺人日吾哀此兒尤小不忍去左右雖然吾老恐不及見其成也事姊猶事母他日為我擇婚處於郡城以相近終且纍汝母笑而應曰諾越二年文臺公還自蜀抵荆州而周孺人卒又二年文臺公亦卒疾已革召吾母至榻前指女弟托之且理周孺人前語吾母唏噓受命以此孺人育於鄒氏又曰吾鄒與孫之先有道義之雅故世諦姻盟先姑之歸封簡討公而生五子也以衣月為長吾祖奇此甥而愛之曰它日且早貴孺人之依吾母以居也為人和而莊進止皆有禮節先姑之歸寧也與吾母相愛孺人以女之道事吾母即以姪之道事吾姑姑相謂曰長甥而所愛也盍以而妹為吾婦乎母若謙言不敢當者姑進曰君家兩尊人之命不云乎近伯姊為幸吾家雖貧如其近則莫豫若也已母乃訪於播氏而後從之婚之夕衣月來逆內外姻交賀喜其得所歸也吾母施襟結䄜持其手為之泣痛父母之不及見也既貴以覃恩與其姑並受封乃請於衣月願同過荆溪展父母之墓潘氏自戶部郎直軒公為馬鬛封而文臺夫婦從焉孺人之至也宗親會者車數十兩孺人翟茀副編環珮之音璆然里媪長老聚觀太息有泣下者吾母聞之喜且悲日吾可報江州之諾矣逾三年孺人以病殁於京師年僅二十有六生一子曰賢今長矣為諸生孺人之有京師行也别吾母如有慘戚不自持者既而訝曰得無有不祥乎其赴也吾母追念外家與先姑遇而哭之加慟今先姑亦已亡矣庶幾得子銘以兼慰吾母焉余曰婦人所難者貴而有子孺人有子與女矣其貴又早貴也而竟天殁不有命乎周孺人之殁荆州也載輤而歸孺人甫十齡委衰行哭道路皆哀之今孺人之葬有賢也為之主同姻畢至於終事亦未為不幸也訏士之來速銘也述衣月之言曰詩云百歲之後歸于其室吾有事四方而孺子也長姑就一壞以寧其體魄今日之禮吾知痛吾親焉爾顧於妻亦有傷心者惟其得祔於姑反哭於寢為無憾而已矣余為春秋之紀卒葬也內夫人外夫人皆書外夫人之喪或致或不致其葬也或日或不日則各就其赴告之詞以為詳略今吾於潘孺人之內行所不得而詳也而訏士為能文家且以骨肉故紀其事為甚備嗚呼狀則既以詳矣志又安得而略諸此余所以徇吾友請而合於春秋之意也為之銘曰蘭芝猗猗兮生於谷中孰滋而培之兮不必於其土孰萎而落之兮不必於其風惟榮華之長在兮芬芬襲襲於無窮噫嘻是為孺人之幽宮孫母金孺人墓志銘余嘗登虞山筍將而南見有城佳哉面勢爽塏左岡右阜拱伏碁置中為馬鬛封焉土赭而不㯺木榮而方遂纂堂三楹中唐置甓墉周以完詢之余門人孫孝維藩所以葬生母也前數武巨石斗辟下瞰百仞有介邱嶐起乎椒霜樹相錯如繡曰吾谷乃孫氏之世阡而茲山適攬其秀凡湖山丙舍之勝專之於孫氏矣孝維晨過我跽而謝曰夫子幸謁先孺人隴以不及從為戾某渴葬吾母懸繂之石未有刻辭敢請余曰諾按狀孺人金氏常熟人其承事方伯公也贊女君黃夫人羞醬於舅中大夫進止有禮退而齒同列鉛澤不華針管必飭酒漿是潔巾帨以時從宦粵邸而生子粵東多珠璣翡翠象犀荃葛孺人不以私其槖方伯公疾孝維甫羈貫嘗抱著膝方伯念困劣不能自還哀此見尤小撫之泣下孺人淚承睫銜悽用好言相寬不以孺子未立增其戀戀心方伯捐館舍冡嗣司李君持門戶遇異母弟有恩紀孝維修弟道甚恭友愛無間閨門雍睦由兩母氏之教焉孝維就外傅孺人訓以儉德庀治家政僮御絫息中外爭多其賢及病泣語孝維曰自汝君母黃夫人殁吾屬助簉者三人其有子而貴禮有從而致隆者也無子者不祔吾幸育汝願得身先驅螻蟻以下報黃夫人於地下俾知孺子有成惟汝大墓兆域未定吾瞑汝當規尋丈亟塴孝維涕洟受命余惟禮古不合葬孔子曰衛人之祔也離之魯人之祔也合之季武子曰周公蓋祔先是方伯公已營高敞於山之陰以形家言改卜而孝維承母意不及俟先君於窀穸乃距祖阡里而近貞龜稚食葬前之一夕孝維夢孺人趨而來曰某所有文杏焉可以馨吾骨矣旦而詢諸負土者則其處在宋元日故嘗植杏萬株為維摩講舍之西辟垣而宮以杏顔之今墟矣人猶有識者嗟乎孺人之靈其妥斯土也筮襲於夢異哉孝維丱歲從余遊實受命於其母雖無䦱門之語而長御傳道以孺子在幼惟長者扶而植之其諈諉甚至閲二十年余已成遲墓而孝維雅自樹立克襄大事可謂無負於母氏也已用徇其請而為之銘銘曰湖水漣兮楓葉丹淩風去兮乘雲還植文杏兮棲鳴鸞子干億兮仙根蟠刻茲石兮永不刋亡女權庴志嗚呼此我之仲女而陳之介婦卒也以難故斂於屋之小寢無主哭父撫之始受含乃即其地為菆宮俾朱書磚以識月日曰女生於京師在震而母郁淑人以哭下殤子遘疾彌月而瀕於殆其産也萬無母子俱全理屬有天幸無害竊心喜雖女絶憐愛之知星家曰是其長必貴十有一歲而郁淑人卒躃踊如成人祖父母手加鞠育婉嬺得意旨知詩書工針管遇姊妹以恩待上下有禮法陳海寧大姓也今相國初在翰林與余同官其生子女也又同歲相國之父中丞公以請婚年十八始禮成歸於相國子孝亷容永字直方時相國守司農卿而直方北闈得舉施襟之夕以高門勉之既饋而翁姑交賀曰此賢婦也司農再相未一歲用言者謫居瀋陽取最少子從其二在南獨留直方京師以絶塞遠饋衣藥通音問居中為調護余時卧疾遭緦麻慘戚戚不樂直方虛左邸迎以歸相國疽發背舍中兒多南下直方孱然膏粱少年也從一醫一童子出關踔千里絶迹無人地以省父余與之立馬門外女泣而送之已而相國召入京為宿衛視舊人在諸子法當從會余丁嗣母喪女執手訣曰兒從夫長作京師人矣父老病無意復出兒非有事不得還江南因慟哭嗚呼孰知其天死江南欲長作京師人何可得哉當相國再以它事下請室家人咸被繫直方在外舍未就執得以其身變服省視塗炭奔走見者殆不復識女盡心飲助具槖饘參消息寄帑主費所以搘拄萬端勞不見恤或反以之受譙讓無怨色獄旬月而後讞全家徙遼左用流人法不得為前日比獨子婦不在遣中相國命將幼稚歸寓書余曰吾子女不少患難苦辛惟有容兒夫婦耳嗟乎陳氏家方隆盛時子弟厚自封殖即難作而室中裝為在南者分持去相國母夫人於武林聞之曰四郎無私財若妻子何女歸舟中舉一男名之曰環志環召也抵家住空舍中支一鼎以㸑手脫傅璣珥市棗栗以上太母曰兒貧不能與伯叔姒比也直方右目眇於律廢疾者贖女時省余東滄聞之喜曰吾為貴家婦以有此苦若骨肉幸以完當僦居父舍傍紡枲作活也未幾海警急京江陷北信不至州人一日數驚女積憂勞久病咯血返而就醫郡城余憐其無依父子嘗相守二女甥四五歲頗慧黠長者教之禮佛祈直方早歸女凝視長吁曰汝父不還矣余訝問故曰吾舅姑已行若止一子以贖論易耳餘株送者盡室在南安坐無行色部檄屢不前事且有變變則禍重至渠何以獨免乎居兩月果有後命女病已憊聞之憂且悸嘔血數升遂以是卒當中氶初以婚請余難之曰物禁大盛陳氏世顯貴庸我耦乎其言二十五年而大驗女生於丁丑七月二十八日卒於庚子五月六日卒前二十四日而直方在京師與諸兄弟竟同遣云余曰陳氏之歸未有日其權厝也於法不當銘然不可以無識也變為招魂之詞以哀之曰木葉山兮雨冥冥蘆管吹兮悲風憀栗之中人伊巖關之嶻嶭兮虎豹以狺冰雪皚皚兮恨黑水之無津問華表之奚歸兮鶴告余以不聞生與死其終弗見兮噫乎寥廓於重雲越有岑兮江有滸魂歸來兮從汝母奠椒漿兮漬茲土依佛火兮救諸苦梅村家藏藳卷弟四十九終

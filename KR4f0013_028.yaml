body:
  text: 序二龔芝麓詩序大宗伯合肥龔先生裒其新舊所著詩手授丹徒薑子子翥曰子知吾詩者也亟圖所以廣其傳於是大行伯成吳侯方以為政餘間揚扢風雅謀諸顧子修遠陳子椒峰相與詮次而刻之吳中集成命其友婁東吳偉業辨簡端偉業伏而讀仰而思曰夫詩人之為道不徒以其才也有性情焉有學識焉其淺深正變之故不於斯三者考之不足以言詩之大也今以吾龔先生選詞之縟麗使事之精切遣調之雋逸取意之超詣其詩之工固已俊鶻之舉也扶搖一擊騏驥之奔也決驟千里先生之潛搜冥索出政事鞅掌之餘高詠長吟在賓客填咽之際嘗為余張樂置飮授簡各賦一章歌舞恢笑方雜沓於前而先生涉筆已得數𥿄坐者未散傳誦者蚤遍於遠近矣此先生之才也身為三公而修布衣之節交盡王侯而好山澤之遊故人老宿殷勤贈答北門之窶貧行道之飢渴未嘗不倣徨而慰勞也後生英俊弘奬風流考槃之寤歌彤管之悅懌未嘗不流連而奬許也自伐木之道衰而黽勉有無匍匐急難者吾不得而見之矣先生傾囊槖以恤窮交出氣力以援知己其惻怛真摯見之篇什者百世而下讀之應為感動而況於身受之者乎此先生之性情也板蕩極而楚騷乃興正始存而大雅復作以先生時世論之繇其前則愾我寤歎憂讒慝痛淪胥也繇其後則式燕以敖誦萬年治四國也舉申旦不寐之衷與夙夜在公之道上求之於古昔內審之於平生於是運會之升降人事之變遷物候之暄涼世途之得失盡取之以融釋其心神而磨淬其術業故其為詩也有感時侘傺之響而不改於和平有鋪揚鴻藻之辭而無心於靡麗秦風之篇曰蒹葭蒼蒼白露為霜士君子所以久而益堅者其砥礪必有道矣此先生之學識也余定交於先生者三十五年凡友朋之稱詩者以百數舉其最曰海虞錢宗伯牧齋萊陽宋少司寇九靑九靑鎖闈論文江行紀勝與吾輩三人同事於楚而牧齋晚年不自得適會先生謁告南還相與淋漓傾倒於白門金昌之間斯二者相知為深九靑好矜愼其詩嘗追擬少陵頗能得其一二日必課五言一首冀其學大有成就始肯出以示人乃不幸而以兵殁雖其斷篇零落百不一存余每與先生言而傷之牧齋深心學杜晚更放而之於香山劒南其投老諸什為尤工既手輯其全集又出餘力以博綜二百餘年之作其推揚幽隱為太過而矯時救俗以至排詆三四巨公即其中未必自許為定論也誠有見於後人之駁難必起而吾以議論與之上下庶幾疑信往復同敝天壤而牧齋之於詩也可以百世然後知昔人之詩其作之者傳論之者亦傳至磨滅如九靑雖相知有吾兩人無可加其稱述惟為之撫卷追歎而已余忝少長於先生既推服其才又熟於性情學識之有素故於論詩表而著之嗟乎先生之功於斯世甚大固無藉於詩以傳而詩之工已臻於至極余衰且憊庶幾厠名集中隨諸子之後它日有追數其交遊而及之者此余從伯成之請而序之之意也不然余之言豈足為先生重哉宋子建詩序往者爾叨二陪雍雲間宋子建偕其友來遊太學當是時江左全盛舒桐淮楚衣冠人士避寇南渡僑寓大航者且萬家秦淮燈火不絶歌舞之聲相聞子建雅結納擅聲譽天才富捷能為歌詩勝遊廣集名彥畢會每子建一篇出無不人人嗟服余講舍在雞籠山南遠晲覆舟近攬靈谷俯瞰玄武陵樹靑蔥觚稜紫氣皆浮光蕩日照耀乎吾堂之內有池十畝為亭五楹樹以桐梓杉櫧被以芙蕖菱芡凡四方賓客之過者圖書滿架笙鏞在列招延談詠殆無虗晷子建至則相與講德論藝命酒賦詩極晝夜勿倦蓋山川之勝文章之樂生平所未有也余既東還子建被薦入翰林無何天下大亂兩人者草間倫活家近也數有書問來今年夏子建裒其生平詩若詞屬余敘之附以楚鴻諸作楚鴻子建子也年十五六其為詩則已含咀漢魏規摹三唐即子建且當避之矣有弟曰漢鷺甫齔耳作徑尺大字體勢波磔鬱然騫騰宋氏之人才未有艾焉余於是不能無感也當子建初遊南中楚鴻方在襁褓而漢鷺未生曾幾何時而二子之聲名巳在人口雖其幼敏夙成余兩人則固已老矣況以兵火頻仍萬事遷改異日者楚鴻漢鷺續白門之遊問冶城之勝而六館之鐘鼓四庫之經書有不與齊宮梁苑共為銷沉者乎孔廟之松杉臺城之楊柳有不與兔葵燕麥付之榛莽者乎嗟乎次宗之學舍零落奚存伏挺之講堂蒿萊何處而烏衣子弟策馬靑溪樂遊少年維舟笛步則以供其徘徊憑眺流連吟詠而已然則余何以敘子建無已話舊京之遺事紀同事之故人庶令後生知所考述若夫文史風流賓朋唱和跨前哲而出新聲則君家父子間事豈余所能及哉書以示子建以余言為何如也程翼蒼詩序新安程翼蒼館丈以道尊於吾吳為士子師其所為詩和平溫厚歸於爾雅而他傺怨誹之音不作余讀而重焉昔金華宋文憲為文以送河南張翀翀之繇編修出為南陽教授也文憲始幸其遭繼重其職而終勉以不負天子作人立教之意雖其時設官之制容有不同而士君子隨地循分以自處於出入進退之間者其道不當如是耶成弘以降館閣之體益重其有高世之才負俗之纍不容於侍從者輒隱居自放作為歌詩以發其憂愁愜迫悶憤無聊之思余初入館中好訪求前輩故實有言正德中黃岡王稚欽綏德馬仲房為同年同館選後先同謫補外稚欽以通侻竟廢仲房終躋尊顯此二君者皆詩人也稚欽穎悟絶倫所為詩縱恣詼譎脫去繩束以慢侮當世仲房詩整練有法步伍秩然雖才不及稚欽而用意過之今其集具在讀其書論其世以考其人之得失不亦可乎此吾所以有重於翼蒼也士君子患其行之不高學之不贍而不患名位之不達入而為相如枚皋出而為賈生董相一而巳矣何必長楊載筆太液從遊而後可以傲當時稱作者哉程之先篁墩先生從數嵗召入史館賜上第亞春卿詩文考證古今精深典洽先朝所推宿儒巨公未能或之過也今國家以古法改定官制其從禁掖出者召還待以不次之位而翼蒼名譽日高異時吳中子弟論講舍之橫經記藍輿之負杖山巔水涯高談勝集且詫為盛事而詩歌之傳述從可知已雖然吾聞新都之勝黃海白嶽神仙之奧區其俯視蓬池道山碌碌尋丈而況於吾吳之培塿者乎翼蒼之芥視軒冕超然塵壒之表者誠有以也而吾又烏足以知之彭燕又偶存草序余同年彭燕又刻其詩偶存草以示余曰吾之詩以散佚不及存以避忌不敢存故所存止此以名吾篇也子為我序之余曰子之言偶存也而僅詩云乎哉嘗試與子屈指二十年來少同學長同師朝夕同遊處其人尚有存焉者乎又以之溯大江涉兩河燕齊秦楚之墟名儒碩友偉人畸士感義投分千里定交者其人果盡存焉否耶然則我與燕又特偶存之一二人耳而尚致慨於詩之存亡不亦末歟古來詩人處極盛之世應制雍容從軍慷慨登臨贈答文酒流連此縱志極意者所為詩也其次即仕宦偃蹇坎壈無聊發為微吟諷切當世知之者以為憐不知者亦無以為罪彼皆有詩之樂而無其纍者也豈吾與燕又所遇之時哉雖然當其勢位方隆聲名籍甚或傳寫於通國或藏庋於名山纍牘連章盈囊溢几可謂盛矣曾幾何時而蕩為雲煙散為灰燼名篇迥句尚有知者卷帙磨滅十不一傳然後知詩之存者以其時詩之所以存者其道固自有在也今燕又之詩雖出於亡失之餘而其言皆發乎性情繫乎風俗使後人讀其詩論其世深有得於比興之旨雖以之百世可也而偶存乎哉抑余竊有感焉雲間之以詩聞天下也三四君子實以力還大雅為己任遭逢世故投淵蹈海碎首流腸其英風毅魄流炳天壤可以弗憾獨其文章之在當世者猶冀後死之知已整齊而收輯之如燕又者是也而燕又自為之詩乃亦避忌散佚而不盡出則夫仁人誼士感時悼俗之章其零落於兵火者不知凡幾矣可勝歎耶余知燕又詩之必存且所存端不止此而顧有慨於斯道之湮沒因序是編也而及之俾知賢人君子流風餘韻傳於來世如是其難而後之讀詩者亦當知所愛惜也宋直方林屋詩草序往余在京師與陳夫樽遊休沐之暇相與論詩大樽必取直方為稱首且索余言為之序當是時大樽已成進士負盛名凡海內騷壇主盟大樽睥睨其間無所讓而獨推重直方不惜以身下之余乃以知直方之才而大樽友道為不可及也已於是天下言詩者輒首雲間而直方與大樽舒章齊名或曰陳李或曰陳宋蓋不敢有所軒輊也大樽既前死舒章得一官又不究其用直方乃以名位大發聞於時既躋顯要進卿二為天子之大臣矣復不幸蚤沒其少子舜納裒其父平生之作取首簡屬余余俯仰四十年執友零落殆盡愛舜納之才以為直方不死而自顧頽然不勝其衰且憊矣乃撫卷三歎而為之序曰吾讀小雅得朋友之道焉昔文武盛而伐木興周德衰而谷風作詩者所以垂教易俗而朋友故舊其厚與薄之遞降舉世之隆替繫焉尚論者可不思其故乎余嘗反復於東漢之季其賢而好士莫過於蔡伯喈孔文舉伯喈之愛王粲欲舉家之書籍悉以與之伯喈殁其撰集漢事遭亂弗存仲宣不聞有所搜葺也文舉誘掖後進賓客日盈其門巳而死於曹氏最後好其文而購之者乃在魏文帝其當時故人不過脂習一慟而已蓋古道之難如此詩有之風雨如晦雞鳴不已士君子處於搶攘之際其生而同心死而相恤西世而下未有及山巨源之於嵇中散也今以觀吾直方何其類巨源之風乎巨源位登三事年垂八十視直方過之其詩文詞賦足以比肩知已則直方所長特優巨源弗及也惟是讀感憤之詩追忘言之契後死而結集其文章既貴而贍護其妻子則巨源之於直方千載同符不期而合吾黨之放廢僅存比於向秀阮籍之徒者如余是也能不歎哉語曰鍾子期死伯牙終身不鼓琴直方之琴今已渢渢乎明堂淸廟之響矣若以語乎孔子之憂患左徒之離騷則撫絃下指終有所哽咽而未發是編也不復存其少作詎足以盡直方而直方所以原本詩人之忠厚不忘故舊者端在乎此直方於兄弟最友愛子建以明經高隱著書嘗擬唐人數百家未就而卒讓木為二千石於嶺表其近詩益進每郵筒寓余余雖老實籍君兄弟以不孤噫嘻此大樽所稱三宋也直方死友朋兄弟之道誰復有講求之者哉舜納工詩有俊才而年少余恐其略於舊聞故舉直方學行有關當世者著之家集蓋不止於詩亦不止為宋氏已也庶幾舜納知所勉焉宋尚木抱真堂詩序吾友雲間宋子尚木刻其抱真堂詩成君方官嶺表郵書數十里問序於余余讀而歎曰君子之於詩也知其人論其世固已參之性情考其為學而後論詩之道乃全夫尚木之稱詩四十年矣初與大宗伯宛平王公同起繼為同里大樽諸子所推重宛平之言曰尚木以膏粱少年匹馬入京師從有司之舉時椓人􆀶國柄君貰酒悲歌燕市中骯髒扼塞一發之於詩大樽之言曰尚木蚤嵗好為芳華綺麗之辭一變而感慨激楚再變而和平深婉歸之於忠愛又曰尚木為學最蚤取裁亦最正自吾論詩諸子多悔其少作壬申以前惟尚木之詩為可存噫嘻合兩君子之言可以論尚木之人與其世矣自文社起同志者負其才氣雄視海內君之格律日進不肯以毫未讓古人顧天性夷淡雅不欲標榜自喜同郡陳徵君仲醇緣持論不合受後進所擊排君用大體獨擁護老成議者乃止宋氏既右姓兄弟多讀書知名一門之內魚魚雅雅望而知為溫柔敦厚之風此則君所以為性情也君纍不得志於計偕六上始收不幸遂遭末造憂生傷亂踰十年始出既已簪筆侍從又不獲已從事於戎馬鉦鼓之間主者差其勞勩奏授一郡崎嶇嶺海燠烋其遺民刻廉自苦七年不得調當君之未出也嘗欲倣高氏品彚定先朝一代之作為正聲為大家續亡友之志以折衷正始初不以兵火少自假易及乎守劇郡處蠻徼故人之流離其土者收恤殷勤死喪匍匐雞鳴風雨未嘗旦夕有忘於懷此則君之所以為學也嗟乎大樽諸子已矣即宋氏之以詩鳴者隱莫如子建達莫如直方乃相繼凋謝君獨以其身為才人為宿素為廉吏為勞臣合觀前後篇什自非嵗月之深閲歷之久不足以詣此百世而下論次雲間之詩者或開其先或拄於後兼之者其在君乎往者余有書與君論詩期進於古之作者心壯志得不自知其難也比嵗以來窮愁憂患足以磨折其志氣自念平生操觚不至於抵滯今每申一𥿄怛焉心悸若將為時世之所指摘往往輟翰弗為君之去我也遠其郵書及之者將謂可與言詩也詎知其遇之窮而才之退哉雖然自君居嶺表余嘗往還雲間追數舊遊俯仰俱為陳迹然則江鄉百里之間固當以君為詩老其知而序之者亦無過於余而余又安能已於一言不附名於末簡也因君之請歷舉其讀書取友居身服官雖不足以盡君之詩乃君所以為詩者於是乎出序以歸之且為世之讀君詩者告焉傅錦泉文集序溫陵傅錦泉先生遭有明全盛於嘉靖二十九年舉禮部第一廷對抗直指切權要分宜相覽而惡之尋遣人招致出門下拒不可以此不得入史館除儀制司主事轉光祿丞改吏部稽勳郎與其長議不合拂衣歸築室巖山之側灌園著書年八十有六而卒先生於易為專家自辛卯登賢書庚戌始第進士沉酣於六藝百家之言者二十年制科之文盛為海內所傳誦平生所作序記碑銘若干卷古風近體諸詩若干首先生殁後四載同郡鏡山何公序而行之傅氏溫陵大族子孫相繼仕宦以十數今松江通守石漪君其從孫也自先生通籍之年數之甲子一再周矣家藏遺集往往散軼弗全通守之尊人搜羅放失刻之閩中通守又刻之吳下而屬偉業序簡端偉業讀而歎曰先生之學殆用晦者也自其初治制舉義根據經術不肯纎靡以投時好纍罷春官垂老始遇即以朴直失權貴人指等輩皆顯任而先生浮沉自如進不為利退不為名終身寥落而未嘗有一言不平以自詡復用雖其垂世不朽之文亦既窮年矻矻深況有得矣同時以古文擅聲譽主壇墠者為其鄉人先生落落其間不欲有所標榜也吾聞之古君子之善易者識進退得喪之道藏器斂德遁世不見知而不悔若先生者其庶幾乎余論次前朝當肅皇在御凡先後首南宮者十有五人僅袁文榮王文肅兩公至宰相次有尚書華亭陸文定侍郎海虞瞿文懿巡撫則毗陵唐應德平涼趙景仁太僕則樂安李懋欽此七公者最著應德以古文名其家饒經世大略後追諡襄文無論度越趙李自相國以下莫及也文定文懿用上第為天子之近臣景仁亦由庶常出補惟唐李初授部主事視傅先生差相類先生與李終不得在禁林應德景仁從諸曹郎召入為宮寮忤永嘉意因請朝東宮偕吉水羅達夫三人者同罷達夫終其身不出唐趙後由知兵用而唐遂勤其事以身殞肅皇好以操切任柄臣永嘉貴溪分宜三相輒假喜怒以排擯天下之賢士如達夫諸公是也獨應德晚年超授人謂其為分宜所知嗟乎佊苟貪富貴何不少年循資拱默以取公卿乃末路艱難沒身王事論者猶謂紓意時宰從而訾謷之過矣雖然襄文之學於地理扼塞兵機成敗無所不通雅自負經濟謂有用於世世遂得而羈縻之若傅先生者其才固不足以及襄文今就斯集讀之言皆歸於道德以躬行為本視世事粥粥然不欲顯短長之效即其齟齬分宜者非徵諸家乘後人之所稱述則亦無所表白此其用意深矣士君子當出處之間濳鱗戢翼圖之不蚤讀公集者未嘗不喟焉三歎也何鏡山之序公也曰公灌園巖野離支龍目來禽靑李皆身植而手蒔之日與兄弟四五人追隨遊賞世既棄公公亦果於去世竟以終其天年嗚呼何公此言所以見太平全盛士君子隱居讀書談道之樂而未免悵然於公之不遇也由今觀之如先生者何可得哉何可得哉傅石漪詩序余蚤嵗受知於溫陵周芮公先生先生以吏部郎典選相國東崖黃公時在左坊兩公者同里同籍有詩名余繇及門後進唱酬切劘於其間者四五年而後别去比亂離分隔余為詩以郵寄先生於閩中先生偕相國和之海內追數其交遊而相與為傳誦故溫陵之詩余平生之所習也南安傅公石漪以副二千石涖治雲間為政之餘揚仡風雅既搜葺其先集俾余序之矣再手裒所著詩若干首屬其友趙雙白魏惟度請余言辨簡端夫南安溫陵屬縣也傅氏為其邑望姓自其祖錦泉先生舉禮部第一著書名家百餘年來子孫之發聞者以十數石漪原本家學好與郡之先逹者遊其為詩也於體製風格既講求漸漬之有素又能標舉藴籍翦刻深至以自探性情之所獨得當其自閩而出也過吳會涉大江縱觀乎泰岱黃河之大京闕宮觀之盛其紀行也有作其述志也有感而後以職事來雲間雲間者湖山之奧區騷人雅士所奉為壇墠者也君至而日與薦紳大夫流連於觴酒文詠治郡齋以延名俊出俸錢以資宴遊四方無不傾慕其風流而推挹其雅尚所稱緑綺堂集者是巳君廳事之西為屋數楹每退食有暇彈琴讀書於其中而顔之曰緑綺夫琴者取其導堙宣鬱致化理於和平此循吏所以阜民庶而詩家所以叶神人也君之撫絃動指至於文王箕子之操得無有愾然太息如見其人者乎當溫陵全盛之時兩相同日拜命東崖之晚年失志感時悲吒寄之於詩歌者為多吾師吏部公近者道出吳門追話四十年停驂問政之所師弟登髙憑弔未嘗不汍瀾流涕也雙白惟度過我草堂屈指雲間一二君子異時仕宦閩浙江山吟眺賓從聲華今已不可復問矣君之增奇踵勝亟亟於是編之成庶幾流風餘韻綿延而不絶也噫嘻豈不重哉梅村家藏藳卷弟二十八終

front:
  text: 梅村家藏藳卷弟二十六文集四
  hash: sha256:1317e53685d0573cf360c2c63760ee0e6c820a67fc610dca14ebe5c3fe663c51
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_026-1a}
body:
  text: 雜文四跋王文肅公闈牘吾州為少保王文肅公故里其生平手迹丹鉛上下尺素往來巾箱萬言赫蹄數字人皆藏庋以為榮而南宮首舉之故牘最後始出公之孫煙客奉常亂後以數百千易諸老兵之手後生末學得端拜而諦觀焉偉業少時謁公祠堂見有觚稜重屋竦臨除道者為御書樓知公以元臣蒙眷神宗顯皇帝咨諏政事慰勞興居親灑宸翰以賜故相家尊而奉之天章五色日月昭而星雲爛焉神祖性好書文華講幄首以學二帝三王大經大法題諸戶牗字畫徑寸波磔天成館閣老臣曾經侍從者仰觀謨訓追話熙隆為之肅容歎息文肅明農七十杜門卻掃人稱其晨起焚香綈几臨摹黃庭一再過在政地郊廟大文皆出其手處兩宮之際擁護東朝皂囊削藳藏諸金匱石室多史册之所不載即此卷為公車拜獻鎖院風簷之所就至今想像其臨文下筆有穆然忠孝之思五十年訐謨定命早已發端於此固不止專門名家大科文字重洛肆而貴雞林也嗚呼君臣一德之會豈不盛哉奉常請宗伯錢先生牧齋為文特書之矣其所以屬偉業則又以同里科名相亞宜附姓氏於末簡偉業謭劣愧於公無能為役猶憶初塵榜墨主者録首義進御思陵覽至終篇而善之草茅少賤經術淺薄乃荷天語褒嘉登諸大雅士感知已况在至尊嗟乎自喪亂以來劫灰煨燼進士題名之碣類以填馬通而搘舂杵况於春官所藏殘篇斷楮其復有存焉者乎文肅獨以百年遺草與景鐘栒鼎巋然其並峙是不厪勳名建樹之不同即文章翰墨或存或否亦有物以司之不可得而強也奉常自言少侍其祖見此卷向云留嚴文靖所迄今六十年不知何以復出世之盛也名德相望好事收藏趙璧楚弓隱見於甘盤伊陟世族卿宗為之捧持愛護王氏子孫摩娑舊物其感三朝知顧之隆垂金石而不朽者亦深且遠矣偉業因備著其事隨宗伯後書之册授奉常俾以傳諸其家題龔司李虞山畫册異時為李官者挈凡舉要以察羣吏之得失舍此非其任也故能以間暇訪所過山川收其圖籍得風謡士俗之所宜以為政助今也錢穀徴令一切委之以責其成靡事不為日不暇給其有處繁劇而治以簡易出於簿書期會之外恢乎其有餘者詎不謂之賢哉語曰夫唯大雅卓然不羣若欈李龔公之治吾吳斯近之矣吾吳屬城海虞山水為尤勝公嘗行部過虞虞人德之盡圖其所遊厯而系之以詩屬偉業書其首簡夫虞山嶞山也峰巒澗壑楓柟松檜之奇載諸圖經而巫臣太公虞仲言偃為先聖前賢之遺迹其次則昭明之於文張顚之於書黃公望之於畫文采風流雖奕世猶可想見况乎拂水之下東臯之傍其臺榭陂池車馬賓客之盛吾與公所親見者今已不可復作惟文章風節之巋然者長與此山垂天壤而同敝嗟乎士君子服官行政可不興懷於後世之名哉邑之東北被海有故淮張時所置舊壘而白茆為周文襄海忠介之所疏鑿其故道已湮沒不存嘗試與公登高四望彼夫廬舍既已空陂渠既已涸津亭戍鼓之間作而哀雁跛羊村煙堠火時影見於雲霞草樹之際其民之負擔而疾馳扶杖而暫憩若皆有遑遑焉不得巳者又孰從而圖之乎自古達人君子惓惓於宦厯之山川良思嘉惠於土之人故流連而不能巳也若夫鞅掌而來傳舍而去問以某山某水而有不知彼自以勤於官矣獨不念江山景物之淸泠而韶麗者尚不能使之窅然自失以暫移其須臾之好又何有於尫癘疲瘵之斯民乃肻從而念之而愛之也耶噫嘻若龔公者斯可以風巳抑吾思夫山簡之襄陽王右軍之會稽居其位不得行其志習池蘭亭登臨興慨為詩文以發之然則龔公之撫是編而況吟者其愛利吾人之志果得而盡行之乎此乃圖之所不能載而詩之所不能傳者也余知公者於是乎言焉為柳敬亭陳乞引梅村日馮歡彈鋏而歌無家孟嘗君使人給其食用東方生公車索米紿侏儒啼泣遂得親幸賜帛百匹夫士誠自給則巳不然盍早自言不自言則雖有滑稽之才縱橫之辨而拓落窮餓憂愁啽塞吾知其必不濟矣當柳生客武昌時居寧南帳下遇諸帥椎牛大享從竈上騷除可食萬家軍中樗蒱官賭積錢隱人分其博進可富十世有司簿閲無名田膏腴水碓令賓客自古可得數十區江南絲穀果布江北魚鹽桐漆取軍府檄關市莫敢誰何所嬴得可十倍如是則柳生規陂池連車騎遊説諸侯稱富人矣今乃入無居出無僕衣其敝衣單步之吳中日詄啁諧笑為人撫掌之資而妻子羸餓不能名一錢柳生念久約無窮時來請余言言吾老矣不以此時蚤自言以祈所哀憐之交一旦衰病疲曳尚復誰攀乎余視柳生長身廣顙面著黑子鬚眉蒼然詞辨鋒出飲噉可五六升此其人非久窮困者今王公貴人已漸知柳生久之且復振振則再如客武昌時即余言為無用顧柳生故人遊不遂因而來過我吾貧落不能相存其所請不能又以難也且左寧南將百萬之衆一朝潰亡其有追敘舊恩反覆流涕俾寧南本志白於天下者柳生力夫大丈夫以壺飱一飯死生契闊沒齒勿忘况於鄉曲故舊為營莬裘其感慨之節又何如哉余故因其言為之請且以明生之不背德焉為周弘叔勸引蓋聞王象孤窮楊俊為之立屋韋泓喪亂應詹代以營居無不義切交朋道敦故舊吾友弘叔周君者巨族膏粱勝流華腴夙遭屯蹇屢迫艱難訪岷山之宅舊有一區過臨卭之家併無四壁傷哉黔婁之貧甚矣原思之病而人見其撤屋代炊輕廢先人之築得錢會戲終寡自振之方莫肯定居何須得食夫桓溫負進袁彥道為一擲成盧殷睿拙行謝微子令千金呌絶苟令故交念我何至旁鬼笑人即五木之漫投寧一枝之罔托乃忍視其寄宿鄉亭依栖客館牽小船而岸住就大樹以夜休已哉敢告同志共急故人早治一畝榛蕪為營三間齋室設茶寮而待客課菜圃以娛親但得蒲柳蕭疏可開北牖如遇醬醯調美足試南烹靑門白屋便成隱士之廬緑蟻紅梟仍結酒人之社如此則賃春廡下伯鸞自有淸高推宅舍南公瑾共稱長者矣葉公傳葉為楚同姓其先令尹子高食采南陽之葉娶於鬬生子以是年獲白公勝子高曰吾聞克敵以示有功因以勝名之子孫居宛葉之間皆勝後也南陽善賈習治生葉為豪宗顧好嬉戲蒱博又因母家鬬氏虎所乳以生負其氣橫行里中南陽人苦之楚滅漢有天下求子高之後復舊封降爵為子武帝好方技而葉子之友韋氏國氏壺氏各以藝進韋好談縱橫知兵官至大中正而國與壺特待詔為上所嬉弄然數召見得幸而葉不顯西晉時有善丹靑者過洛陽見通人達官湛湎於酒裸身散髮箕踞絶呌心好之歸而寫其形貌以為笑樂後人習其傳世監南陽酒稅元至正中有蟲食於子高廟槐之葉文為錢刀大小肉好纍纍若貫史蘇占之日吉視其繇楚莊王元年諸侯來賀之卦也葉莊之昭也而滅于秦秦水德也今白眚微赤氣效矣葉其興乎未幾果有兄弟數人即山鑄銅致緡錢數百萬遵元制入財助軍命以官為萬戶千戶百戶懸金牌以領其衆旌旗尚赤占風角神旗所嚮以順者取勝其法用四十人為率五分之而虛其一為策應其四隊有長有二而遍將軍百户者置五花陳為奇兵雖不勝其勞與克敵同賞凡用師之道有賞有罰有賀有弔有捉有放有比有滅而任用者日馬日槊馬以實營伍槊以驗鹵獲而功次則傳籌以為記有不信請如誓書然自元季以來兄弟日尋攻伐其所謂百萬千萬者徒以空名相署置而已最後有葉公子者浪迹吳越間吳越間推中人為之主而招集其富家傾囊倒庋窮日并夜以為高會入其坐者不復以少長貴賤為齒公子性儇巧能伺人之意色為向背其勢且盛者即手中無所有骫骳遷就務有以順適其意勢且衰雖揣摩偶得必多方以誤之俟其大困然後誘以小喜示之不測終不能償所失亡然而人冀萬一不敢有以怨也久之宛葉盜起其魁日獻曰闖公子之軍號適與之同有惎之者日公子雖楚人其徒皆山東輕俠亡命為盜而降者耳宜勿與通公子日不然吾之宗先朝有相國者與奄尹忤奄之私人取稗官家姓氏以指目善類凡百二十人為黨録而吾宗為之魁無漏脫者余以其名雖不倫差勝於刑餘小人不足以為辱故至今逡巡其號勿為改聊以為戲焉爾而諸君謂有信之乎且吾之道常以知足持重先負後尅顧根本而料折衝一損一益知進知退深有合於孫吳陶白之術若夫點者以為弊而愚者以為貪強者以為呌呶而怯者以為猶豫風俗性情使然豈吾過歟余見諸君過博進者家既不能揮斥金錢而所當之物日以苦惡無所用甚至以空文塞之令我負大信於主者而顧欲以妄言訾謷我此不足與遊趣鴐去於是諸子聞之無不爽然自失也或曰鬭子文之後居燕趙間好搏熊鬬虎豹葉子將去而從之或曰公子散其伴侶兄弟五人作五章之歌仍逃於酒二者皆未可信後竟隱不見云梅村家藏藳卷弟二十六終

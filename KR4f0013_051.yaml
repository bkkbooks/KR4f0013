front:
  text: 梅村家藏藳卷弟五十一文集二十九
  hash: sha256:a9cfe1d3b4ecd609ec479e415784b37a232087ff4d1effd32db7cc1d93aa7f99
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_051-1a}
body:
  text: 塔銘塔頌香山白馬寺巨冶禪師教公塔銘如來以虛無爲宗眞實爲義其有出世爲人興頺舉廢者揆之甚深微妙法機用相等我吳鄧尉聖恩寺剖公璧和尙建大法幢尊勝殊特所度弟子各坐道塲遠者台宕蘄黄之間精藍巨刹千里列望焉迺若巾瓶弗離鐘魚互答相去一牛鳴地無如穹窿之海雲香山之白馬海雲起自道衍少師白馬則始於支公其後有道淸禪師實萬峯之法嗣香山分鄧尉支隴而聖恩原本萬峯故命巨冶教公主之脩別院復祖庭也巨師旣委順觀化嗣法門人正道件繫行事奉剖公命以塔銘來請偉業皈依和尙仰見其擔荷大法囑累後人續佛慧命世相遷滅不常十餘年來得法上首大人示寂白馬則尤其龍象蹴踏所恃爲金湯者也烏可不勒梵行昭法派以垂示來茲乎師諱濟教巨冶其字毛姓也揚之泰州人父古莊公有壹行母沈氏生師苕䜿穎發氣骨不凡早歲厭薄塵勞父母見背捨家入道學於其族之爲浮屠道者西山寺深林茂叔父行也先朝神廟之世詔集有道高僧證戒於五臺江南觀法師者與焉膺紫衣之賜而茂公出其門師年十八薙染爲大僧從觀法師開講於天竺於雙徑廣通大藏尊經已而蟬蛻文句思證覺海聞三峯漢和尙唱臨濟宗旨於鄧尉杖䇿往游漢和尙者剖公之師海内所推爲三峯禪也和尙一見契合迎謂之日汝拚得五年住卽留單師應曰古人拚這一生何論五年遂留侍左右服勞執苦朝夕弗懈稟戒入堂爲悅衆上堂晚參和尙舉鵓鳩樹頭嗁語言下有省和尙誡以古德行解相應方堪入道師盡心供職一衆悅服漢公入滅剖公開堂之日舉爲監寺當是時鄧尉緇素坌集日有千人而經寮齋室規制未備師內營資糧外接賓客十年之間威儀肅給信施塡委湧閣飛樓宏敞嚴飭凡使三峯之道揚於天下者剖公之力師爲之也空有一徹照用兼收猛求向上一著朝咨夕叩旣接源流受信拂觀法師亦取所賜紫衣爲贈出主香山草翳木荒敝屋三楹不蔽風雨乃剪林莽乃刳巖巒度地鳩工簡材陶甓未幾而實坊矗起四方不祈而薦貨不命而獻力以潰於成師軌行方雅質性温醇與人言煦煦然誘接初機惟恐弗及撈籠薫染罔不嚮赴說法授戒千僧禮足拈錐䜿拂四衆趨風住香山之十有年爲辛丑八月二十八日報緣已盡沐浴更衣作偈示衆曰生年五十七大事今已畢推倒須彌山打破無生國泊然而逝得度弟子首戒雪卽正道也次曰法印宗曰天句玄曰千齡載曰化燈用曰二非共六人所著語錄二卷行世正道旣以師命繼白馬席爰率同衣於甲辰八月二十五日瘞靈骨於香山西麓遵遺意也當道淸開法之初有梅泉溝沸於山巓湮没已久師至而泉於舊處迸出甘冽異常流細而供不竭中峯蒼雪澈有細流引到泉盈壑空鉢持歸雪滿舟之句香山以爲勝事夫白馬始於支公以余所見若中峯蒼師者深究竺墳旁通孔籍亦近代之支公也道林偕王許爲山澤之遊百世而下風流可想蒼公没踰十載而中峯鞠爲茂草識者過之太息當今海內尊宿如鄧尉靈巖靈隱三四大老皆性相圓通了無窒礙後生淺聞薄植掠知見而護門庭世俗靡然不復知有天台賢首之㫖經臺講席抑没而弗振斯非末法之可憂者乎巨師之從剖公游也建傑閣以奉尊經實轉華嚴藏海而與蒼公有異常之契此其眞實妙義有不墮於空寂者矣是可銘也銘曰臨濟則一句分明之中有玄有要照用權實料簡囘互賓主厯然漢公所以尊奉源流又不得巳而至於辨難其一念總不出乎此師聞乃亟往而從焉當其時漢公開法於安隱矣師於座下首㕘本來面目偶窺鏡見影被同㕘驀背一推猛然有省然未敢以爲得也自以生逢明師聞至道苟不於向上一著關捩穿通將何以發明弘道之苦心而擔荷大法凡厯三峯玄墓者數年晝夜服勞飽㕘力叩一旦横楖栗下坡陀放眼虛空忽悟自家活計而臨濟全機大用當前畢現矣師面貌清稜口機迅利在函丈之前䜿義嶽嶽不下而漢公輒痛加錐劄故逆折之於疇人之中嘗以機語不契納履而去最後迺許爲鐵骨禪而謂吾宗必興於是子其師弟機緣如此三峯没同學潭吉忍公著五宗救於安隱而巳病師贊助之力居多書成而闡揚綱宗三峯道法始曉然於天下雖與當時辨難三峯者持論不無異同要其大措不過曰吾道應如是也昔嚴頭以德山不知末後句仰山謂翠巖不知祖師禪師友兄弟相資教益在世法爲鬬諍佛法則酬唱而已師何心焉於是師歸隱雲門山中御史大夫念臺劉公爲方外交請師出世於會稽之廣孝寺久之居杭之安隱顯甯已而去之江北其􅿺乎今人以分別覺路者日知解建立行業者曰有爲師之講求宗旨分條析理而未嘗落言詮入窠日得諸性相平等雖有千差萬别總歸一源故能破除心意識以超脫生死不可謂之知解也師願力廣大攝受經營能以無著心應一切物視飛樓湧殿食輪萬指與夫草舍單丁了無以異功德克就躧屣去之不可謂之有爲也若師者天所以搘拄末法爲道而生者哉得法弟子巨渤恆初主天甯先其師示寂次戒顯卽晦山今補位於靈隱者也次剖玉璞紫蓋衡三目淵若相有穆文晉今主吾鄉之法輪衲華通則爲吾鄉人相繼付囑者共六十七人當靈龕東歸徑山有以爲請諸弟子念師二十年拮据大功托於此山且枚筮之亦惟靈隱爲吉故用戊申八月二十六日入塔緇素畢會咸歎爲允晦山之來速銘也曰師初至山有二騰猿呈異而殿功創手一钁下得文喜故塔跡示後身人符音夢此二者狀失之畧不可以不書嗚呼法席有盛衰而大道偕此山無終極和尙在長寂光中與從上諸祖相印證固無假於斯文迺百世而下摩挲其日月而攷較其行履并吾與晦山爲出世之交亦得附佛法以垂永久則此碑之作又烏可以弗詳乎爲之銘曰表日以凋朱曹兩姓人屈指存者幾有一大比丘其名曰炤如住錫華雨庵精修木义行皎然紹靈運智永嗣右軍是爲魯川孫儒釋合而一少年好詩酒有聲諸生中南適閩與甌西過伊與雒長揖謁卿相高論傾賢豪相贈千黃金棄之若涕唾歸來槖如洗客至貧無氊趺坐惟一牀瞑目思萬里雒城佳麗地冠蓋羅王侯兜率天王宮雲霞結成綺黃流俄屈注平地起龍蛇千尺妙高臺遷變若泡影無諸越人市琥珀珊瑚珠白象旃檀香黃犀金孔翠劫火忽燒灼委落恆河沙七寳蘇迷山刹那成瓦礫微塵具世界世界爲微塵普視閣浮提嘗作寂滅想綠此棄妻子薙落爲浮屠梵夾手自詮薰心兼注耳惟有妙法華是爲經中王藏通別圓義開權而顯實無二亦無三融通歸一乘繕寫貝葉文六萬九千餘音演第五時光週三法界妙義已充足廣攝信解門稽首龍樹尊證入雜華海悉心念厥祖多聞大總持遺書雖散亡般若烱然在百年種佛智宗旨留家風重以文句身而修秘密印我初念舅氏逃入於苦空比悟淸淨因身心大饒益却恨煩惱障八萬塵勞纏浮名若空華世慧如利刃歸命大慈氏法乳甘醍醐佛恩與親恩昊天同罔極師其勤接引覺筏開迷津三世諸眷屬共成無上道梅村家藏藳卷弟五十一終

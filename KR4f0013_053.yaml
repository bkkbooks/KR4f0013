front:
  text: 梅村家藏藳卷弟五十三文集三十一
  hash: sha256:fb913aac243477e2796f32e6935a71cf7fb34cbc8e972341284adddbd0f38d05
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_053-1a}
body:
  text: 祭文銘贊祭李幼基文嗚呼人生憂樂豈不有命卜宅平臯長林掩映隱几靑山怡神選勝謂君為愁日余不信人生贏絀豈不由天美田上腴前陂後川滌場多黍伏臘豐年謂君為貧僉曰不然乃君端居咄咄仰屋臨食必歎生涯日促握手生平告余衷曲容有勿盡尚欺骨肉比君之亡匍匐往哭篋無長物庾無藏粟餘閣之奠飯含不足嗚呼君之居身聲色是屏衣不纎縠食不南烹素心別尚翰墨丹靑品題訪搆卷握千金君之讀書厭薄章句涉獵陳編脫略時製尺素翩翩周詳援據指事抒懷親疏各致太史之子中丞之孫溫醇孝謹不言躬行性弗接物與世無爭擇肉猶虎同惡如蠅投缿告緡操兵到門余忝姻盟道衰莫庇屈指親朋高門日替鬼瞰盜憎虛名是纍脫屣家園超然身世追隨浪迹聚首京華嗟余匏繫苦雪寒沙死喪疾病寥落天涯君頻枉顧載酒烹茶挑燈笑語足慰無家君以避仇思叨一命募民實邊入錢應令需次半綸恐荒三徑我勸子歸無與物競伯氏雍容家門貴盛名駒雖少可稱神駿接武諸兄後先超乘晚節林泉優遊霜鬢比余返轡邂逅歸舟西風搔首蕭索如秋湖田既薄粳稻雖收穀賤年飢政急人愁遭難破家况困誅求時會若此定復何尤一笑開尊申卿眉頭嗚呼匪朝伊夕接遲客裏言旋言歸於三十里其室則邇經過有幾昨來問疾披衣半起從子在前靑燈置几把臂涕洟謂托以死余撫而慰君言過矣努力加餐愼調藥餌豁達胸懷所苦良巳別未兩月遽至於此君之家法奕葉衣冠雖無末命屬有墜言子弟宗族奉以周旋世故雖非囊空則安朋友論定在於闔棺以此報君無負九原唯君一生門高責重身處膏粱不樂自奉晚值艱難傷心䀌痛五十之年焦勞一夢酹酒陳詞失聲長慟祭錢大鶴文哀哀與立竟死謂何匪姻之故涕泗如沱自我與子兩榜連翩我年草三君長三年我則朴􅉡口呐語喃羡爾雋妙角巾輕衫君為文章淸騫硉屼我雖居前悚忸放越君工樂律兼擅新詩謬相推許謂我為師惜哉年力志歇聲銷宮詞百首讀之蕭憀憶昔南都子官職方受知樞密經營設防雞籠雀桁屯營睥睨腕口祲氛壯思涌厲爰跨駿騎赤靺銀刀沿江上下君實人豪文雅從容好整以暇帳後淸歌石城子夜燈毬簫鼓百戲雜陳樓船桃葉飄瞥若神徹侯磨牙逞其狂猘君也掉頭解組以去我知君性直是愛間流連白社跌宕靑山笋屐花蘭舠月浦車子吹簫紅兒教舞郊居臨水山墅依田顧我而笑謂將終焉世論不然憂子遷謫邂逅當塗知已再入我病子行乃陟理丞間曹蕭抗亞次淸鄉天軸倒翻鼎湖髯絶吳橋攀弓文忠吭血吁嗟錢郎與衆陷賊抵隙脫峨間關逼仄自稱一鶴當罪萬死􅗮咯三升言猶在紙維南黨魁玉虎鈕柱周內厥獄惜客顧主鋃鐺甫脫宗社已非君尤偃蹇病瘵無肥執腕啞氣傷哉昔時覼縷愛息顧托奚辭三年於茲牽蘿綰蒂我女雖幼君男則慧今春赫蹄臂漏穿肉字畫滅沒余懷斛鹿轉瞬及夏寄􅏺相聞肺痿骨立浹旬不葷旋迫大漸拏舟恨後僅及玉含訣詞揑手老親在堂遺孤在疚我來撫慟君其鑒宥興福寺鐵爐銘州城之西興福禪寺者光宗皇帝在東朝時所賜建也今三十餘年矣邑賴其利年穀以時士庶乂安兵革勿優乃作為鐵爐答焉時山海梗閼鐵官勿效釜錡錢鎛貴同黃鐘而治人告功民樂其事以著國典則永且固以報佛恩則深以廣以保民生奠土域則凝重安定用垂萬祀於勿壞州人吳偉業為之銘曰天地久金火守音中宮量中豆非刑鼎非銘卣雲雷從魑魅走侈其腹弇其口蹲熊跗旋螭首鍑􅎦烹殳斨鬬造諸業空所有負大海包具藪壓鯨鯢不得吼月丙子歲己丑列斯銘示不杇柳敬亭贊頎而立黔而澤視若營似有得文士舌武士色為傖楚為諧給醜而婉者其貌佞而忠者其德初即之也如驚驟去之也如失人以為此柳可愛而吾笑為麻中之直斯真天下之辨士而諸侯之上客也歟梅村家藏藳卷弟五十三終

  text: 梅村家藏藳卷弟五十八詩話
  hash: sha256:43c95d701e6dca223f31dfaea659e1b2596de46dda9a21b1a30f34e29fd5068e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_058-1a}
body:
  text: 詩話梅村詩話朱玫字文玉別字九靑萊陽人年十九登乙丑進士繇吏給事中陞太常進戸侍以枚卜遇譴歸城陷不屈死其父尙寶卿繼登夢李北地生其家而得玫少而頴異爲詩學少陵愛蒼渾而斥婉麗然不無踳駁當其合處不減古人日課五言詩一首爲亞卿將大用年尙未四十集竟散佚不傳嘗與余同使楚楚嘉魚熊魚山竟陵鄭澹石俱九靑同年到武昌相訪鄭詩亦淸逸其贈什曰剖斗折衡爲文章天下婁東與萊陽謂吾兩人也九靑登黃鶴樓過小􅀌皆有作今失記惟憶其掖中言懐中一聯云朋友誰無生死問朝廷今作是非看時上方切治苞苴而金吾徼卒乘之反行其奸利貪吏放手無罰而寸蹏尺縑輙加逮治九靑之語蓋實錄也過南中有云草迷三國樹水改六朝山九靑曰天下之山未有不繇水改者其用意精刻如此陳子龍字臥子雲間華亭人繇丁丑進士考選兵給事中殉節死友人宋轅文收其遺藳今並存臥子􅀒曠世逸才年二十與臨川艾干子論文不合面斥之其四六跨徐庾論策視二蘇詩特高華雄渾睥睨一世好推崇右丞後又模擬太白而於少陵微有異同要亦倔强語非繇中也初與夏考功瑗公周文學勒卣徐孝廉闇公同起而李舒章特以詩故雁行號陳李詩繼得轅文又號三子詩然皆不及當是時幾社名聞天下臥子眼光奕奕意氣籠􅇁千人見者無不辟易登臨贈答淋漓慷慨雖百世後猶想見其人也嘗與余宿京邸夜半謂余曰卿詩絕似李頎又誦余雒陽行一篇謂爲合作余曰卿詩固佳何首爲第一臥子曰苑内起山名萬􅀊閤中新戲號千秋此余中聯得意語也祠官流涕松風路囘首長陵出塞年又李氏功名猶帶礪斷垣落日海雲黃此余結法可誦者也余贊歎久之晚􅀊與夏考功相期死國事考功先赴水死臥子爲書報考功於地下誓必相從文絶可觀而李舒章仕而北歸讀臥子王明君篇曰明妃慷􅁣自請行一代紅顔一擲輕則感􅁣流涕舒章久次諸生不遇流離世故僶勉一官反葬請急遇臥子於九峯山中期滿北發未渡江而臥子及禍舒章鬱鬱道死雲間有爲詩唁之者曰蘇李交情在五言未嘗不寄􅁣於此兩人也楊廷麟字伯祥別字機部臨江人爲文排宕峭刻在韓蘇間書法出入兩晉倣索靖體詩則好用奇思􅁄句不甚合律然秀異聳拔往往出人機部偕臥子同出吾師姜新建之門以文章氣節相砥礪旣過黃石齋先生於京邸一見道合􅀒􅀡節好强諌上書論閣部楊嗣昌失事罪得旨改兵部贊畫叅督師盧象昇軍事余贈之詩曰諸將自承中尉令孤臣誰給羽林兵蓋實事也盧與閣部議軍事不合遇機部相得甚已而中外異心兵􅀔日蹙盧自謂必死顧叅軍書生徒共死無益乃以計檄之去機部不知也機部到孫侍郎傅庭軍前六日而盧公於賈莊殉難乃求得其尸抱之痛哭盧公之死有馬士抱之傷不深機部詩曰死君旁者一掌牧通首俱妙而惜佚落不全又憶其渾河詩中聯曰春至軍中草木寃亦奇句機部自盧公死後其策益不用無聊生會詔詰督師死狀賈莊前數日督師誓必戰顧孤軍無援聞太監高起濳兵在近則大喜於眞定野廟中倚土銼作書約之合軍高竟拔營夜遯督師用無援故敗機部受詔􅀡以實對􅄌谿馮鄴仙得其書謂余曰此䟽入機部死矣爲定數語機部聞之則大恨先是嗣昌遣部役張姓者偵賈莊而其人談盧公死狀流涕動色嗣昌榜笞之楚毒倍至口無改辭曰死則死耳盧老爺忠臣吾儕小人敢欺天乎遂以考死於是機部貽書馮與余曰高監一段竟爲刪却後世謂伯祥不及一部役耶然機部竟以此得免余之詩又有曰憂深平勃軍南北䟽訟甘陳誼死生亦實事也巳而機部過宜興訪盧公子孫再放舟婁中與天如師及余會飮十日嘉定程孟陽爲畫髯叅軍圖錢牧齋作短歌余得臨江叅軍一章凡數十韻以文多忌不全錄其畧曰臨江髯㕘軍􅀒性何貞栗上書請賜對高語爭得失左右爲流汗天子知質􅀡公卿有闕遺廣坐憂指摘鷹隼伏指爪其氣常突兀同舍展歡謔失語輙面詰萬仞削蒼崖飛鳥不得立余與交十年弱節資扶植忠孝固平生吾徒在眞實去年東師來饑飽恣馳突桓桓盧尙書提兵戰疾力將相有纎介中外爲危慄君拜極言䟽夜半片􅁓出贊畫尙書郎遷官得左秩天子欲用人何必歷顯職受詞長安門走馬桑乾側但見塵滅没不知風惨慄四野多豺狼十日無消息蒼頭軍中來整暇見􅁓墨唯說尙書賢與語材挺特次見諸大帥驕懦固無匹逗撓失事機倐忽不相及變計趨之去􅀡云戰不得成敗不可知死生余所執余時讀其書對案不能食賈莊敗問至南望爲於邑忽得眞定書慰藉告親識云與孫侍郎會師有月日顧恨不同死痛憤塡􅅐臆先是在軍中我師已孔亟剽畧斬亂兵掩面對之泣我法爲三軍汝實饑寒極諸營􅀔潰亡羣公意敦逼公獨顧而笑我死則塞責老母隔山川無繇寄悽惻作書與兒子勿復收吾骨得歸或相見且復慰家室別我顧無言但云到順德犄角竟無人親軍惟數百是夜所乘馬嘶鳴氣蕭瑟椎鼓鼓聲衰拔刀刀芒􅉣公知爲我故悲歌壯心溢當爲諸將軍揮戈誓深入日暮箭鏃盡左右刀鋋集帳下勸之走叱謂吾死國官能制萬里年不及四十詔下詰死狀䟽成􅁓爲濕引義太激昻見者憂䜛疾公旣先我亡投迹復奚恤大節苟弗明後世謂吾筆此意通鬼神至尊從薄謫生還就耕釣志願自此畢匡廬何嶻嶪大江流不測君看磊落士艱難到蓬蓽猶見叅軍船再訪征東宅風雨懷友生江山爲社稷生死無愧辭大義照顔色余與機部相知最深於其爲叅軍周旋最久故於詩最眞論其事最當卽謂之詩史可勿愧機部後守贑州從城上投濠死集竟散佚不傳龔鼎孶字孝升廬州合肥人甲戌進士授蘄水知縣丙子余與九靑使楚而孝升分一經最得士相知爲深後考選給事中入淸爲僕少中間流離患難幾不免庚寅秋於臨淸舟中報余書曰庾樓之別垂十五年壬午以前猶得時通音驛運移癸甲大棟漸傾妄以狂愚奮身刀爼甫離獄戸頓見滄桑續命蛟宮偷延眎息墮坑落塹爲世慙人先生方霞引碧山之巓鴻舉靑雲之外西薇東菊萬仞難躋自顧平生曾邀盻飾相期何等差跌至今所以伏處蓬蒿欲有陳而未敢也停舫金閶竊幸龍門在望展晤有期而先生旣抱騎省之傷賤子亦迫王猷之棹何圖咫尺復成參商惟從同人處見先生尺幅寸幀片言􅃗字寶若明珠大貝火齊木難攬持芳華以當瞻侍耳客秋至白門拜發良書欣聞謦咳蹷然頑懦復起爲人感念疇曩􅊄焉雨泣自傷失路尙爲知已所收憐使得齒於舊遊之末中間情文温縟慰諭綢繆金錯玉盤美人之遺我厚矣伏􅀩不棄鄙陋垂間雕蟲先生留思文章超絕前􅁤馬班屈宋蔚有兼長爝火至微何敢妄希扶桑之耀且身旣敗矣焉用文之顧萬事瓦裂空言一綫猶冀後世原心宣鬱遣愁亦惟斯道往在燕邸與秋嶽舒章諸子各有扜寫篇軸遂繁近年以來蓬轉江湖仲宣登臨襟情難忍嗣宗懷抱歌哭無端未極斐然不無驅染然前則魂魄初召瑟旣苦而難調繼廼離索寡羣刀雖操而未善亟思大雅提振小巫九合葵丘舍公誰屬方當悉索敝賦奉鞭弭於中原不敢煩苞茅之討也此行粗了殘局卽歸臥松筠興會適來扁舟相就極論千古殫精百氏備孔門之游夏稱鄴下之應徐庶幾餘生不同草木先生著作雷霆天壤氣象名山其亦肯示雌霓於王筠授論衡於中郎否耶此書至余發之於相知讀者無不以爲徐庾復出也孝升於詩最秀穎高麗聲調遒􅂃有義山之風余嘗憶其潤州一首中聯曰亂後江聲猶北固坐中人影半南冠激昻慷􅁣猶是此書大意可爲三歎女道士卞玉京字雲裝白門人也善畫蘭能書好作小詩曾題扇送余兄志衍入蜀一絕云翦燭巴山別思遥送君蘭楫渡江皋願將一幅瀟湘種寄與春風問薛濤後往南中七年不得消息忽過尙湖寓一友家不出余在牧齋宗伯座談及故人牧齋云力能致之卽呼輿往迎續報至矣已而登樓托以妝點始見久之云痁疾驟發請以異日訪余山莊余詩云緣知薄倖逢應恨恰便多情喚却羞此當日情景實語也又過三月爲辛卯初春乃得扁舟見訪共載横塘始將前四詩書以贈之而牧齋讀余詩有感亦成四律其序曰余觀楊孟載論李義山無題詩以謂音調淸婉雖極其濃麗皆托於臣不忘君之意因以深悟風人之指若韓致光遭唐末造流離閩越縱浪香奩蓋亦起興比物申冩托寄非猶夫小夫浪子沈湎流連之云也頃讀梅村􅃩體詩聲律研秀風懷惻愴於歌禾賦麥之時爲題柳着桃之作彷徨吟賞竊有義山致光之遺感焉雨牕無俚援筆屬和秋蛩寒蟬吟噪啁唽豈堪與間關上下之音希風說響乎河上之歌聽者將同病相憐抑或以同牀各夢而輾爾一笑也詩絕佳以其談故朝事與玉京不甚切故不錄末簡又云小序引楊眉庵論義山臣不忘君語使騷人詞客見之不免有兎園學䆒之誚然他日黃閣易名都堂集議有彈駁文正二字出余此言爲證明可以杜後生三尺之喙亦省得梅老自下註腳其言如此玉京明慧絕倫書法逼眞黃庭琴亦妙得指法余有聽女道士彈琴歌及西江月醉春風塡詞皆爲玉京作未盡如牧齋所引楊孟載語也此老殆借余解嘲湯燕生字􅀇翼姑孰人赭山懷古二首云赤鑄山頭鳥不飛上皇曾此易靑衣無多侍從爭投甲有限生靈但掩扉五國城西邊月苦景陽樓下暮鐘微傷心莫唱淋鈴曲未得生從蜀道歸淚逐天風向北揮山僧指點舊重圍翠華東駐泉偏咽代馬南來草不肥野老久知今日事先臣猶䕶昔年非延秋門外王孫盡司馬元戎自錦衣二詩於乙酉五月事極切哀婉悽節使人不忍讀武塘夏雪子極稱之周鍾字介生以陷賊汚僞命自投南歸南中誣其賀賊表有堯舜湯武等語論斬西市其實乃張嶙然陜西賀表語非鍾筆也嶙然庚辰進士以西安知府降賊曾以語人曰偶爲此語不意爲政府皇上所見賞又自請清宮手棄太廟神主於外其死也叩頭流血口稱皇上臣該萬死蓋爲天所誅云鍾以文章􅀒海内重名不死殉節死固其罪獨爲黨人所殺誣以大逆則􅁈甚矣雲間李雯親見其事曾爲詩哭之曰亂世身名可自繇恨君不及鄭䖍州劇秦新論誰曾草月旦家評總世讐鍾兄曰鑣字仲馭亦􅀒重名相忌積不能平聞此言卽仲馭文致竟以他獄與鍾同死家評蓋指此也楊機部殉節後云巳無子康小范孝廉來吳門㩦機部在贑州詩十餘首并言其子尙在小范與機部同事兵敗被縛下獄瀕死而免吳門葉聖野贈之詩曰盧諶流落劉公死囘首章門一惘然亦俠烈士也余後訪機部子知在甯都山中甯都有彭同者爲機部門人以諸生特授職方郎監總兵順慶軍順慶之復甯都也在金王舉事時機部已前死矣已丑正月南贑總兵胡有陛破甯都職方曰吾以書生受思文不次之遇不可以不死與其妻皆自縊甯都被兵大掠機部之子亦在掠中職方之弟曰彭士望者亦機部門人訪知之以三百金贖得并求得其母子置一處此兩彭君者可謂不􅀒機部者也機部詩寄李尙書云朝聞驛使向江樓虎韔魚文耀列侯戎服畫綃南浦雨漢家雲䕶北陵秋崆峒山下看雙節天柱灘頭領八州今日傳呼新僕射臨淮依舊擁貂裘過惶恐灘云空山夕照深江樹明月灘聲下石城愁盡關河極北望如今虎豹正縱横鶴猿自在灘邊宿江漢飄零夢後還遂使南州爲異域知君何處塞函關丙戌元日云黃華嶺外瑞雲齊白鷺洲前戰馬嘶五道將軍臨􅀡北三江父老望征西春風斗帳降銅馬細雨戈船鬭水犀此日建昌二字疑應拜舞近臣還解賦鳬鷖又一首朝元帳下領高班稽首春風動百蠻九葉雲雷開萬國一時江漢擁三山宮中勝帖盤龍出杖裏勞樽藉草頒從此鎬京傳盛事年年虎豹渡天關丙戍九日云河西獵火照高樓五嶺風光異昔遊木葉看雲寒戍晚菊花宜雨漢宮秋山城野幔開三市江表輕裘署九州旦晚功成萸釀熟憑君一笑舊田疇又次首丘記其中聯云將軍諾嘯多文吏羣盜縱橫半舊臣機部詩學素抝折此竟高渾深麗軍中從容慷􅁣戎服賦詩具見整暇七年不見其學問之進益如此圓鑑靈隱僧故練川大家子也父兄死國事其哭江東詩曰平原曲罷人何在越絕書成事巳非人多稱之巳而被收亡命爲僧在揚州有過天甯寺見放馬歌最悲壯詩云法窟聊藏獅子花空王爲指金鞭影神駿惟應支遁看舊恩不願孫陽顧垂頭肯向朔風嘶烙印猶存漢家字寄兄研德云歸期此夜長難曉別夢如秋遠更淸竟以疾殁於靈隱友人周子俶舊與遊過其地爲詩弔之曰袁尹全家赴汨羅九閽夢夢訴如何只今靈隱猿三呌似聽天甯放馬歌又曰寺樓遥掛海門潮鷲嶺龍宮夜寂寥精衞不知何處去冷泉亭下獨吹簫黄媛介字皆令嘉興人儒家女也能詩善畫其夫楊興公聘後貧不能娶流落吳門媛介詩名日高有以千金聘爲名人妾者其兄堅持不肯余詩曰不知世有杜樊川指其事也媛介後客於牧齋柳夫人絳雲樓中樓燬於火牧齋亦牢落嘗爲媛介詩序有今昔之感吳巖子偕其女卞􅀇文皆有詩名媛介相得甚媛介和余詩曰月移明鏡照新妝閨閣淸吟已雁行花裏雙雙巢翡翠池中六六列鴛鴦黃梁熟去遲僊夢白雪傳來促和章一自蓬飛求避地詩成何處寄蕭娘罷吟紈扇禮金僊欲洗塵根返自然風掃桃花餘白石波呈荷葉露靑錢山中自􅀗燒丹井世上誰耕種玉田磊磊明珠天外落獨吟遥對月平川石移山去草堂虛謾理琴尊葺故居閒教癡兒頻䕶竹驚聞長者獨􅂞車牽蘿補屋思偏逸織錦成文意自如獨怪幽懷人不識目空禹穴舊藏書往來何處是僊壇飄忽􅂞風降紫鸞句落錦雲驚韻險思縈彩筆惜才難飛花滿徑春情淡新水平隄夜雨寒憶昔金閨曾比調莫愁城外小江干此詩出後屬和者衆妝點閨閣過於綺靡黃觀只獨爲詩非之以爲媛介德勝於貌有阿承醜女之名何得言過其實此言最爲雅正云林佳璣字衡者莆田人少遊黄忠烈之門以壬辰二月來婁東所著詩文詞數十卷詩蒼深秀渾古文雅健有法其行也余贈以詩有五月關山樹影圓送君吹􅅇柳陰船之句已而道阻再遊吾州則秋深木落鄉關烽火南望思親旅懷感咤有聽鐘嗚悲落葉之風焉其客中言懐四首曰南方方震蕩久堪悲海内親朋少兵間道路遲無衣霜落後不寐月明時孰伴城頭柝烏啼向北枝音書能不寄萬嶺鳥空囘壁壘連三楚乾坤動七哀高秋聊看菊夜月自空臺淚眼涓涓甚憑誰辨刼灰干戈傳更甚多病在長途幾月來霜雪家鄉問有無雲􅀌滄海碓身傍夕陽烏含愧看秋色蒼鷹得壯圖幾次逢親故途窮不敢言關梁􅂸一醉鳥雀總干村樹立淸商色江消野岸痕二毛潘岳見貧病媿私恩殺氣何時盡閩方亂不停荔支愁萬騎牛女怨雙星露白隨風柳猿啼滿石屏身經兵火慣長醉不須醒衡者詩文極多以閩南不辨四聲多抝體此四首駸駸江南風致矣蒼雪師雲南人與維揚汰如師生同年月日相去萬里而法門兄弟氣誼最得蒼住中峯汰住華山人以比無著天親焉汰公早世其徒道開能詩兼書畫後亦卒而蒼公年老有肺疾然好談詩以壬辰臘月過草堂謂余日今世狐禪盛行一大藏教將墜於地矣且無論義學卽求一詩人不可復得廼幸與子遇我襆被來不曾㩦詩卷當爲子誦之是夜風雨大作師語音傖重撼動四壁疾動喉間咯咯有聲已呼茶復話不爲倦漏下三鼓得數十篇視階下雨深二尺矣當其得意軒眉抵掌慷􅁣擊案自謂生平於此證入不二法門禪機詩學總一叅悟其詩之蒼深淸老沉著痛快當爲詩中第一不徒僧中第一也余憶其贈方密之中聯曰山中久不見神駿世上人多好畫龍贈陳百史五六聯句曰霜氣一湖飛遠夢月明今夜宿􅀌峯朝來無限塵中事囘首西山路幾重金山詩中兩聯曰古今僧住老日夜水朝東塔影中流火帆來四面風淸涼臺懷古曰薫風不見吹人醉春雪無聲到地消焚筆詩曰土冡不封毛盡秃鐵門斷限字原無欲來風雨千章掃望去蒼茫一管枯皆絕唱也師和余西田賞菊詩有獨擅秋容晚節全全字落韻和者甚多無出師上者其金陵懷古四首最爲時所傳師雖方外於興亡之際感􅁣泣下每見之詩歌嘗自詠云剪尺杖頭挑寶誌山河掌上見圖澄休將白帽街頭賣道術終爲未了僧益以見其志云瞿式耜字稼軒常熟人繇進士爲兵給事中好􅀡諌爲權相所訐與其師錢宗伯同罷歸築室於虞山之下曰東皋極遊觀之勝酷嗜石田翁畫購得數百卷爲耕石軒藏之未幾里中兒飛文誣染偕宗伯逮就獄余時在京師所謂東皋草堂歌者贈稼軒於請室也後數年余再至東皋則稼軒唱義粤西其子伯升門戸是懼故山别墅皆荒蕪斥賣無復向日之觀余爲作後東皋草堂歌蓋傷之也又二年知稼軒以相國留守桂林城陷不屈與張別山俱死別山者江陵人故相文忠公曾孫諱同敞爲督師司馬稼軒臨難遺表曰庚寅十一月初五日聞警開國公趙印選移營先去衞國公胡一靑甯遠伯王永祚綏甯伯蒲纓武陵侯楊國棟甯武伯馬養麟盡室而行惟督臣張同敞從江東泗水過江相期共死其赴義則閏十一月之十七日也纍囚一月兩人從容唱和稼軒得詩八首曰二祖江山人盡擲四年精血我偏傷又曰願作須臾階下鬼何妨慷􅁣殿中狂其末章曰年逾六十復奚求多難頻經渾不愁刦運千年彈指到綱常萬古一身留欲堅道力憑魔力何事俘囚學楚囚了却人間生死業黃冠莫擬故鄉遊別山和章有曰稜稜痩骨不成眠祖德君恩四十年腰􅂰尙存堪作鬼死生有數肯呼天又曰白刃臨頭唯一笑靑天在上任人狂又曰亡家骨肉多寃鬼多難師生共哭聲又曰此地骨原堪朽腐他年魂不待招尋二公死有舊給事中後出家號性因者收其骨義士楊碩父藏其藳稼軒孫昌文間關歸以其詩與表刻之吳中爲浩氣吟云別山死事最烈其未死也受考掠爾臂俱折目晴出語不爲撓稼軒有初六日紀事一詩曰文山當日猶長揖堪笑狂生禮太踈別山和曰臂先頭斷生堪賤身爲城亡計豈踈銜木焉知舌在否傷睛自笑眼多餘此其被刑時事也稼軒以義命自處從容整暇詩曰死豈求名地吾當立命觀又自艾曰七尺不隨城共殉羞顔何以見中湘蓋指何公騰蛟以殉難封中湘王也若兩公者眞可謂殺身成仁者矣錢宗伯爲詩哭之得百二十韻其敘浩氣吟文詞伉烈絕可傳稼軒在囚中亦有頻夢牧師之作蓋其師弟氣誼出入患難數十餘年雖末路頓殊而初心不異其見於詩文者如此余亦爲詩􅂘稼軒曰萬里從王擁節旄通侯靑史姓名高禁垣遺􅀡看封事絶徼􅀌忠誓佩刀元祐黨碑藏北寺辟疆山墅記東皋歸來耕石堂前夢書畫平生結聚勞其言通侯者蓋稼軒用翼戴功以留守大學士封臨桂伯也梅村家藏藳卷弟五十八終

front:
  text: 梅村家藏藳卷弟二十三文集一
  hash: sha256:5d4a7b2c006b1a6c69893e9fb5874ae428ee7aac6f19b03c4e758b01e94d6508
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_023-1a}
body:
  text: 雜文一尹氏論隱三年夏四月尹氏卒左傳日君氏卒君氏聲子也公羊榖梁傳曰譏世卿尹氏天子之大夫也夫隱生稱公死稱薨其攝位無明文歐陽修疑之胡居乎不備禮於其母也子以母貴母以子貴􅀮稱公而母不稱夫人􅀮公順其死父而欺其生母哉且隱二年十有二月乙卯夫人子氏薨公羊日隱之母也穀梁曰隱之妻也夫使爲母隱無二母也其爲隱之妻則母稱卒妻稱薨母稱氏妻稱夫人隱之大罪也春秋何以不書不書何以示訓左氏無傳杜氏曰此仲子也桓未爲君隱巳爲君隱桓之君其爲尊卑也微桓未爲君而終爲君其母卒先稱夫人以權可也隱旣爲君而將不終爲君其母卒稱夫人以權亦可也故尹氏爲聲子非也其日天子之大夫天子大夫尹氏吉甫後也吉甫有大功而賜氏族于周其後爲幽王三公以亂國政幽王之崩距平王庚戌崩五十餘嵗此尹氏者吉甫之孫師尹之子也其爲師尹之子名滅爵絶不可以世其爲吉甫之孫功在王室不可以不世春秋世􅀸則譏之常武之勲其謂何而忘之也日春秋之責尹氏世執朝政爲周亂階夫有甚甚之辭焉如是則必尹氏之族絶於隱三年之夏五月春秋告天王之甯而書之日亂人亡矣亂人亡矣迺五年傳稱王使尹氏助曲沃伐晉僖二十八年王命尹氏策命晉侯文十四年王使尹氏訟周公于晉成十六年十七年尹氏令諸侯伐鄭昭二十三年尹氏立王子朝二十六年以子朝弃楚前此有卿後此有􅀸此一􅀸者弗稱王命弗亂王室何獨取載于春秋也夫上書三月庚戌天王崩下書夏四月辛卯尹氏卒天王實以壬戌崩其去辛卯三十日爾春秋之義王后崩太子卒不赴則不書夫天崩地坼新王在疚東方之諸侯魯姑息實不至而復以一上大夫卒遣王人以赴吿乎然則尹氏何居日公之爲公子也與鄭人戰于狐壤止焉鄭人囚諸尹氏賂尹氏而禱於其主鍾巫遂以尹氏歸而立其主注日尹氏鄭大夫也公立而尹氏未有爵命疑其人以身爲鄭臣保隣國之公子而越在魯境公立之後耻邀天之功而受魯爵老而不仕以爲高于魯不惡于鄭其卒也公應臨其喪史臣書日以重之其例爲内大夫則非内大夫也例爲外大夫則外大夫不書卒且不終於鄭書鄭非所以爲訓也故去爵書氏示不臣報有功爾祭仲論竹林之論祭仲也曰祭仲措其君於人所甚貴以生其君故春秋以爲知權而賢之逢丑父措其君於人所甚賤以生其君春秋以爲不知權而簡之夫仲祭邑之封人也爲公娶鄧曼生昭公而有寵失正甚矣君薨太子立國人未附伸爲鄭國而往省于留之鄙邑又不戒備而見執于宋爲仲者死之已耳公羊傳曰祭仲不從其言則君必死國必亡夫鄭昭公之爲公子也敗北戎之師獲其二帥大良小良甲首三百宋人豈昭公敵哉其失國出奔繇乎祭仲也祭仲相先公執其國柄自左右親近以及管庫之士皆仲黨也祭仲以爲君則君而已矣祭仲以爲讐則仇而已矣昭公即位之日淺雍姞在内祭仲在外可奈何使祭仲見執辭以必死宋人挾厲公而求入焉國人憤祭仲之執而讐厲公吾未見宋人之師得焚渠門而入大逵也君何以必死國何以必亡祭仲不死突入忽出終至兄弟分國魯宋稱兵君幾以死而國幾以亡者祭仲之爲也然則仲舒以爲知權者何仲舒親見高后之世平勃以知免如公羊所言少遼緩之則少帝可故廢而代王可故立夫平勃亦幸成功耳假令少帝如子突有臣如雍糾絳侯能綰皇帝璽授之代王哉王僧辯奉淵明而廢方智當是時齊人克東關矣梁之從齊社稷之故也而陳覇先因之以爲國禍君子以罪僧辯若祭仲又何以處之哉逢丑父死以免君而見非祭仲生以逐君而見賢是春秋教亂之書也甚矣其謬也王室卿士論周平王以後􅀸士大夫克奬王室者惟富辰單旗好强諌王孫满饒智略劉康公論禮單襄公稱詩以諸侯之步言視聽諷諭乎天下而内史過内史叔興之屬災祥生死占其表應近乎文史卜視之間當是時諸侯之士勇者効其力智者通其謀䇿慮腷臆奔走乎當世而王朝􅀸大夫迺與之辯貌失而論服妖考咎徵而言鬼事不亦末乎然而以諸侯之􅁀戎車之强卿材之衆三川天下之衝諸侯之師免胄超乘日過乎其郊終詘然於二三􅀸士之言而不敢動則又何也夫侯不發幣於公􅀸而陪臣之聘享天王迺有私賄罪人不執歸於京師而上宰之爭政大國聽其獄詞周之衰也匪徒君之憂實甚士大夫蓋亦岌岌矣倉庚陽樊之鄙人耳登城之呼一奮其氣晉軍退舍豈赫赫宗周必無其人哉周士大夫之謀曰苟得其勢不煩干掫苟得其情不須强武人固有志盛於三軍而氣衰於脫劍賈勇於超距而流汗於樽酒禮使之然也詩曰人而無禮胡不遄死人而無禮不死何爲今吾觀列侯與大夫而皆知其及庶幾或有鬼神焉夫禮之可以服天下也又益之以死能無懼乎不然夫以王章之不修也侯度之不恪也受玉而容惰非若請隧之愆稱伐而語犯非若爭田之罪也爲彼而猶獲福爲此而遂及禍此不必然之說也周人之言方怪者自萇􅀪萇弘事周靈王諸侯不朝周周力少乃明鬼神事設射貍首貍首者諸侯之不來者依物怪欲以致諸侯諸侯不從而晉人執殺萇􅀪夫事鬼神依物怪欲决人死生而身且不免見殺則鬼事恢譎不經矣故禮不足治而事鬼神鬼神不足事不得已而仍救之以禮禮與鬼神雜用以治乎諸侯者衰周之道也記曰殷人先鬼而後禮先賞而後罰禮者所以賞而鬼者所以罰殷道然矣殷人尊神事鬼而後禮其衰也君臣以刑戮威侮諸侯慢於鬼神而殷亡周人尊神事鬼而先禮其衰也君臣以禍福諷告諸侯聽於鬼神而周弱雖然周士大夫猶能以動作威儀之則正告天下浸淫乎戰國縱横之士恫疑盧喝以邀諸侯其所謂鬼神則又遷爲七日之䕺神東國之桃梗迂罔嵬􅃈而不信而儀秦代厲之屬皆周人也嗚呼此亦禮之失也伍胥復讐論子胥之鞭平王尸也左氏不載其見於榖梁傳者日壞宗廟徙陳器撻平王之墓鄭康成曰鞭其君之尸夫撻墓之與鞭尸則有間矣雖然此吳之君臣爲之未有言子胥者也史記則以子胥求昭王不得乃掘楚平王墓出其尸鞭之三百越絶書則以子胥撡鞭捶笞平王之墓而數之吳越春秋則以伍胥掘平王之墓岀其尸左足踐腹右手抉其目以余論之此三書者未可以盡信也子胥之父誅於楚也挾弓持矢而去楚以伐楚之利干吳王僚公子光阻之公子光立是爲闔閭闔閭欲爲興師而復讐於楚子胥又自止之曰諸侯不爲匹夫興師逮楚釁而後動入郢之役子胥之父死十有七年平王之亡亦十有二年矣子胥之爲人深沉好謀彊􅃘有濟固非􅀒其勇氣逞於一决不顧其後者也伍參以邲之役食采於椒舉與鳴皆邑大夫而奢則太子太傅貴顯於楚者四世費無忌以同官之忮傾世臣而覆其宗平王聽用其語其子之不愛又何有於臣子胥之讐宜首無忌不專在平王也太子建廢非其罪竟死於鄭子胥所痛心疾首者不徒奢尙之死而在建之不得立蓋欲借兵於吳扶建之子勝立之楚以無忘乃父之志廢昭王誅其讒佞而存楚之社稷則子胥之忠孝可白而吳之覇業可成爲吳即其所以爲楚也彼肻以其名讓之申包胥哉乃吳師驟勝而驕楚舊臣伯嚭之徒在吳軍中用事傾其故國以奉其新主甚至廢毁宗廟瀆亂男女而秦人起於外夫概反於内不能定楚而歸大非子胥之心矣夫子胥固其兄尙所稱仁者智者也彼暹之十七年之久以待其必克縱不能復立故太子之子以得之闔廬亦宜按兵休甲持楚人之心無故戮辱先君之尸以怒楚楚之宿將舊臣將圜視而起矣此騎刼之所以敗於齊也而謂子胥仁且智者爲之耶且子胥之先自參以下四世皆葬於楚子胥之復讐以爲孝也獨不慮先人一坏土楚人尤而效之乎設令吳兵去楚昭王復國哭於共襄之廟收先王之遺骨而葬以衣冠然後盡發伍氏之丘隴而汚潴之以告諸侯子胥何以自立於天下乃紀載不聞其事是豈子胥能復奢尙之讐而楚昭不能復平王之讐雖吳强而楚弱必不得之數也或曰吳君臣以班處宫蓋有欲妻楚王之母者又何有於君之尸日吳蠻夷也其君臣逞其兇威而蹈於不義料子胥力諫而不從也吳越春秋乃曰子胥令闔閭妻昭王夫人子胥亦妻囊瓦司馬戍之妻夫費無忌殺伍胥而囊瓦殺之是有德於子胥者莫囊瓦若也而謂子胥爲之其說尙可信乎昭王之奔鄖也鄖公辛之弟懷將弑王日平王殺我父我殺其子不亦可乎辛日君討臣誰敢仇之君命天也若死天命將誰仇公羊曰父不受誅子復讐可也父受誅子復讐推及之道也夫無極之譛伍奢之􅁈其不受誅明矣非鄖公比也君子固以復仇許之矣然而吳師未入則楚吾讐也吳師旣入則楚又吾君也公羊傳曰復􅄷不除害其道以爲雖遇昭王猶將爲之請也夫不􅃘得生王之頭祭死父之壟而謂讐死君之骨以快生臣之忿哉然則爲此說者何居日夫差忘人之殺其父而赦勾踐不聽子胥之諫而賜之屬鏤以死後之紀事者甚子胥之復仇所以深著夫差之罪也不知夫差之所遇者敵國也讐也子胥之所遇者仇也故君也故君可仇而不可仇非可以一例論也爲人臣者不知春秋則有昧於復讐之義者矣吾故辯子胥之事以正告之焉宋魏兩彭城王論宋文帝弟曰義康封彭城王爲侍中錄尙書事進位大將軍領司徒魏孝文帝弟曰勰亦封彭城王加侍中除中書監假中軍大將軍領司徒此兩王者後均以事見殺余每讀其傳未嘗不三太息焉史稱宋文有盧勞疾義康盡心侍奉湯藥飮食非口所嘗不進或連日不寢彌日不解衣而孝文之不豫也勰泣諭上醫祈請懇至見者莫不嗚咽晝夜不離左右衣不解帶亂首垢面飮食必先嘗之而後手自進御嗟乎天子之子天子之弟明德懿親代不乏賢若夫修家人之禮講布衣之歡分形共氣友于骨肉三代而下未有及兩王者也義康性好吏職素無術學勰則敏而躭學雅好屬文此其識度豈可同日語哉且義康於内外衆事皆得專決施行植黨固權勢傾天下勰也入賛大政表解侍中出總六師苦辭軍要逮夫晏駕彌留親賢受託而涕泣陳議辭勤請免自古有親賢侍疾而大行遺詔許其冲退者乎若使義康處此劉湛孔􅉙秀之徒必向尙書儀曹索晉立康帝故事矣義康也誅則勰也宜免迺此兩王均以􅁈死則又何也義康旣闇大體兄弟至親不復存君臣形迹遂用及禍勰因長兄之重未􅃘骤離萬年之後固早慮及此而辭蟬捨冕難遂初懷騎虎握蛇終見猜忌雖其後高肇小人枉殺賢王事匪劉班釁殊殷鐵此與車子受禍本末較然顧當馬圏大漸魯陽發喪北海謂大得人情咸陽則料其爲變卽有孝文手詔而宣武之疑夫已甚矣此高肇之譛所以入也宋文猜忍無親推刄同氣鄭伯克段殆又甚焉孝文始終恩禮式好無尤而周公金縢奕世不免嗟乎嫌疑之際豈不難哉推而遠之且不可况居之者乎然義康竟廢爲庶人而勰殁謚武宣追尊文穆終有天下是其子孫元順有言積德必報是或然也梅村家藏藳卷弟二十三終

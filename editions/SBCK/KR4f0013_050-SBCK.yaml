front:
  text: 梅村家藏藳卷弟五十文集二十八
  hash: sha256:787c5937aa232c7926075b6b42ec66bead354d57b8e4fd2ab6b892b6fa210905
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_050-1a}
body:
  text: 墓表卓海幢墓表公諱禺姓卓氏字肖生別字海幢浙之瑞安人明建文時戸剖侍郎忠貞公諱敬靖難不屈死與方正學俱夷族其子孫有脫者流寓仁和從外家之姓曰宋氏萬曆中鴻臚寺鳴贊公諱文炎忠貞之七世孫也始以仕顯復其姓人迺知忠貞有後矣鴻臚娶於孫氏生公公之從兄弟曰爾康字去病日發之字左車俱以文章負重名知交傾東南而公亦雅著才望時人莫能定其􅄖劣蓋仁和之卓始大去病博學好屬文而左車才辯穎悟兼通佛理其所持說雖碩學名僧莫能屈公傾心好之日夜叩擊不倦乃同爲北游居京師五載屢試於鎖院輒不利歸而讀書武康山中益探究爲性命之學先是公弱冠便有得於姚江知行合一之㫖姚江重良知頗近佛氏之頓教而源流本殊後之門人推演其義以見吾道之大於是儒釋遂合公旣偕同志崇理學談仁義而好從博山雪嶠諸耆宿請質疑滯雖發自左車要本其師說然也公之爲學從本達用多所通涉詩詞書法無不精詣卽治生之術亦能盡其所長精彊有心計課役僮隸各得其宜􅀊所入數倍以高貲稱里中客謂左車日君與君之兄同講學而獨以貧者何也左車日白圭之治生也以爲知不足與權變勇不足以決斷仁不能以取子彊不能有所守雖學吾術終不告之夫知仁勇彊此儒者之事而貨殖用之則以擇人任時彊本力用非深於學者不能辨也今余之學不足以及余兄而余兄之爲善里中嘗斥千金修橋梁之圮壊者􅀊饑出囷粟所全活以百數彼其於吾儒義利之辨佛氏外命之說深有所得豈區區焉與廢箸鬻財者比耶旣而公之子辛彝用高第入爲秘書院編脩公貽書教誡之所以脩身心勤職業其道甚備嗟乎富而不溢貴而不驕左車之言益信而有徵矣夫忠貞之裔湮滅不可知者二百餘年而去病左車與公三人者始以文章發聞於世可謂盛矣而皆不能得一第去病左車竟淪没窮困以死論者且謂天道之不可信而公卒以其子貴享後福然則天之所以厚忠貞子孫者詎可量哉當方正學收族之日一二賢者竊其幼息以免忠貞遺孥得脫史雖不載其事保舍匿藏要自有人今正學之世未顯而卓氏遂昌亦可見忠臣之必有後足以慰諸人於地下矣嗚呼忠貞之德可以百世而公能上繼祖烈下啟來􅅌苟不書其行事以告天下則無以昭示乎後之人乃鑱諸墓石公二子長彝卽編脩君也次方淸庠生公以某年月日生以某年月日卒以某年月日借元配張孺人合葬墓在武康縣之河圖村婁東吳偉業述保御鄭三山墓表余嘗讀戴元滑嬰甯傳見其人粹然儒者又好爲名僧耆宿之游蓋自疵癘天札刀兵水火之並作善醫者非原本儒與禪講求乎天人性命之故俾人聞之者心正定煩惱破除則其藥石之所奏不足以發膏肓而理癥結求諸今人若保御三山鄭君斯近之矣鄭之先始於司空公爲宋天聖間名臣建炎南渡武顯大夫有扈蹕功賜田松陵子孫習外家李氏帶下醫遂以術著其别祖之顯者在宋日學士忠惠公丞相忠定公在元日所南高士君堂構於程朱之學和緩之技咸有師承相傳五百餘載爲士族爲名家君自少攻詩書鏃言行早孤居䘮能哀仲兄病刲肉以進人皆日鄭氏有子長身美鬚髯温良樂易一見知爲通人長者其於醫也發揮精微行之以誠心惻怛名乃益起千里之內鉅公貴游輜軿接跡書幣交錯於庭君造請問遺無虚日窶人踽叟僂行過者手注善藥以去視之必均性不喜入宫府有願交者必見重始終不干以私居常删食疏爲章程然中廚日具十人之饌高人勝流明燈接席評騭詩文書畫爲笑樂子弟守循牆之禮端拜詳視得義門之餘風修先祀以收族婚必告䘮必訃周恤具有恩紀宗人農部公庶子自其没後始生鞠育教誨之者備焉同里負重名者日楊徐兩先生身殞家破所知皆亡匿君非前有一言之托以已女女其子孫女女其孫處田宅謀膏火成就其門戸徐之長子孝廉屏跡山中不交人事嘗抱病且困君急拏舟往訪見突煙不起奄然壞絮弊簀中爲之泣手和藥解衣易粟割半氊充卧具孝廉乃張目能視起而錄其事日更生他若指囷賙寓公之急推宅慰謫宦之窮爲粥路人脫驂舊館不可悉數此其儒行之坊表者也君事雲棲蓮池和尙爲幅巾弟子於武林石公爲同㕘晚扣擊於張司農靜涵居士以研究法乘有弟曰士敬余同年生襲浮屠服以避世講道論藝學者奉爲經師人師君朝而率其孫櫛聽土敬演大易一章夕而偕士敬從靜涵受般若妙義所居杏圃西近永定舊刹名賢古德所遊處傷其蕪廢揮斥數百金擔荷修復偕曹村相國結同善之會誘掖勤懇施者坌集君嘗謂人上藥養性中藥養生醍醐以爲參苓楗椎以爲箴砭去其陰憂蠱惑之疾予以歡喜利益之方彼且涊然汗霍然巳我則不居功不尸利富者教以營像設飯伊蒲貧者教以掩骴骼恤鷇卵皆不期而至不速而成年七十餘矣三舂而眠雞鳴而起搰搰然若有不容自巳者畢餘景以護末法囘塵勞而入種智飾巾正定知命篤終末後證明歸諸解脫緇素合掌讚歎一以爲醫王一以爲長者此其禪觀之撈籠者也余每見世之士大夫困於更徭賦役之煩在杜門學佛者爲尤甚卽其親黨故人義相收恤者不能黽勉佽助而營齋利生恆詘於力之所弗及若其棄家室毁容貌雖或大人長德其徒相與敘統系爭壇墠以屈辱之庸兒俗媪見其疏經詮教規重矩疊苦難知而避之若浼不得與一知半解者同其利養是儒者窮儒而禪者尤窮醫獨出入儒與禪之間其地位可以權巧其交游可以牽勸故急難死生捐金援手伽藍塔廟鳩財庀工在今日唯醫之力饒爲之顧獨難乎其人君則其人與術相値而適會乎其時願力迺有所成就然則通儒與禪之窮者莫如里而門戸凋落子孫分適他國吉凶婚葬訖不相聞卽梅灣之一坏士使非有鄭氏者識其故處則蔦葛蒙薈狐兎竄窟遼墟深莽之間若堂若坻者忽焉過之且不知爲何人之墓而何以示子孫惟有刻詞於石表之於阡以明鄭氏之德而識余之愧俾後之人知宗法之宜修也吾姑後三年以卒有二子以其一從吳姓主梅灣之祭祔葬者爲繼伯母查氏而殤子諱􅃁在其左其陸氏從葬則吾姑生母也元配伯母孺人先伯祖幾年殁猶葬鹿城云誥封吳母孟恭人墓表古卿大夫之獲内助者匪僅國政於軍旅有裨益焉詩秦風之詠西伐也用武之道備矣終之以言念君子載寢載興厭厭良人秩秩德音君子讀而歎曰美哉此國之所岀興乎自昔運會之將至精明强固之氣不獨男子也閨門婦孺交相黾勉踴躍於軍興之會繇今觀之若吳母孟恭人者其事大有關於民生國故可以墓門之石弗之著乎吳氏山陰大司馬之族世爲著姓後遷遼之淸河恭人淸河指揮使德淸孟公之女其嬪於吳爲贈中憲大夫越川公諱某之􅃁婦今御史按察司使匪躬公諱執忠之伯成稽首曰子宗老也請以一言累子偉業熟於大司馬之後誼最深自少同舉進士􅀡史館晚而與伯成游伯成之母猶吾母何敢辭抑吾聞之先王爲治卿大夫妻若母之賢者必表著之以風勵天下今吳氏忝世臣而恭人備有㦤德當宁修開代之史偉業衰且廢曩者曾與觀乎故府今奮筆書之者詎獨爲其宗人已乎乃修不文之辭俾刻而表諸墓上梅村家藏藳卷弟五十終

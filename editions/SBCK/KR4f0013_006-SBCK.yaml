front:
  text: 梅村家藏藳卷弟六詩前集六
  hash: sha256:b25cd5152ac2c6ad1de3221f2d88e0646d2d43a9535319adaf5418f94db7784c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_006-1a}
body:
  text: 七言律詩七十二首庚寅元旦試筆已丑除夕夢杏花盛開桃李數株次第欲放予登小閣臨曲池有人索杏花詩彷彿禁中應制醒來追思陳事去予登第之􅀊已二十年矣二十年前供奉官而今白髮老江干靑樽酒盡貪孤夢紅杏花開滿禁闌西苑樓臺遺事在北門詞賦舊遊難高涼橋畔春如許嬴淂兒童走馬看穆大苑先卧病桐廬初歸喜贈富春山下趁歸風客病􅀌舟夜雨中千里故園惟舊友十年同學半衰翁藥罏媿我形容槁腹尺輸君飮噉工􅁍向淸秋共消損一樽無恙笑顔紅贈李莪居御史時督學江南中條山色絳帷開宛雒春風桃杏栽地近石經緣虎觀家傳漆卷本蘭臺花飛驛路生徒滿潮落江城鐘磬來置酒一帆黃浦月登臨早訪陸機才贈陸孟鳬七十二首楓葉蘆花霜滿林江湖蕭瑟鬢毛侵書生藤峽功名薄漁父桃源􅀊月深入市蹇驢晨賣藥閉門殘酒夜橫琴舊游烽火天涯夢銅鼓山高急暮砧陸爲潯州司李藤峽在潯州常熟有桃源澗其二講授山泉遶戸庭苧翁無事爲中泠偶支鶴俸分魚俸閒點茶經補水經千里程鄕浮大白一官勾漏養空靑歸來松菊荒涼甚買得雙峰縛草亭陸爲無錫學博故云講授贈申少司農靑門六十二首相門三㦸勝通侯兄弟衣冠盡貴游白下高名推謝朓黃初耆德重楊彪千山極目風塵暗一老狂歌天地秋還憶淮淝開制府江聲吹角古揚州其二脫􅁍朝衫上釣船餘生投老白雲邊買山向乞分司俸餉客還存博士錢世事烟霞娛晚􅀊黨人名字付殘編扁舟百斛烏程酒散髮江湖只醉眠宴孫孝若山樓賦贈千章喬木俯晴川高閣登臨雨後天明月笙歌紅燭院春山書畫綠楊船郗超好客眞名士蘇晉翻經正少年最是風流揮玉麈煙霞勝處著神仙琴河感舊四首井序楓林霜信放棹琴河忽聞秦淮卞生賽賽到自白下適逢紅葉余因客座偶話舊游主人命犢車以迎來持羽觴而待至停驂初報傳語更衣已託病痁遷延不出知其憔悴自傷亦將委身於人矣予本恨人傷心往事江頭燕子舊壘都非山上蘼蕪故人安在久絶鉛華之夢況當搖落之辰相遇則惟看楊柳我亦何堪爲別已屢見櫻桃君還未嫁聽琵琶而不響隔團扇以猶憐能無杜秋之感江州之泣也漫賦四章以誌其事白門楊柳好藏鴉誰道扁舟蕩槳斜金屋雲深吾谷樹玉杯春暖尙湖花見來學避低團扇近處疑嗔響鈿車卻悔石城吹􅅇夜靑驄容易别盧家其二油壁迎來是舊遊尊前不出背花愁緣知薄倖逢應恨恰便多情喚􅁍羞故向閒人偷玉筯浪傳好語到銀鈎五陵年少催歸去隔斷紅牆十二樓其三休將消息恨層城猶有羅敷未嫁情車過捲簾勞悵望夢來携袖費逢迎靑山憔悴􅀸憐我紅粉飄零我憶􅀸記得橫塘秋夜好玉􅁫恩重是前生其四長向東風問畫蘭玉人微歎倚闌干乍抛錦瑟描難就小疊瓊牋墨未乾弱葉懶舒添午倦嫩芽嬌染怯春寒書成粉箑憑誰寄多恐蕭郎不忍看贈糧儲道步公乾州人臨湘家世擁旌旄策馬西來劍珮高華嶽風雲開間氣乾陵草木壯神臯山公盡職封章切蕭相憂時饋運勞靑史通侯餘事在江南重見舊人豪辛卯元旦試筆除夕再夢杏花十年車馬盛長安仙仗傳籌曙色寒禁苑名花開萬樹上林奇果賜千官春風紫燕􅊠飛入曉日靑騘緩轡看舊事已非還入夢畫圖金粉碧闌干雜感二十一首聞道朝廷罷上都中原民困尙難蘇雪深六月天圍塞雨漲千村地入湖瀚海波濤飛戰艦禁城宮闕起浮圖關山到處愁征調願賜三軍所過租其二簫鼓中流進奉船司空停索導行錢八􅁞名繭盤花就千䌰奇文舞鳳旋袴褶射雕沙磧塞筐箱市馬玉門邊秋風砧杵催刀尺江左無衣已七年其三旌旗日落起征鴻蘆管淒涼雜部中鳷鵲廢宮南内月麒麟枯塜北邙風金縢兄弟山河固玉几君臣笑語空囘首蹛林秋祭遠枉抛心力度江東其四射柳山頭掣皁雕便門斜􅀡禁城遙畏吾文字翻唐史百濟衣􅃣奉漢朝西罽織鞍都護馬北珠裝帽侍中貂只今理學追姚許耆舊中原未寂寥其五居庸千尺薊門低八部雲屯散馬蹏日表土中通極北河源天上接安西金城將吏耕黃犢玉壘山川祭碧雞世會適逢須粉飾十年辛苦厭征鼙其六萬山中斷一關分絶塞東來鸛鵲羣少婦燕脂人似月通侯鞍馬客如雲玉河煙柳樓頭見鐡嶺風霜笛裏聞劉杜至今悲轉戰城南誰賽鄧將軍其七天水將軍被錦衣中原當日羽書飛花門報國終留恨石窌酬功事已非銅馬只今翻仗節玉關何事更重圍可憐西海城頭月􅀇菟征人戌不歸其八故京原廟􅀝諸峰走馬驚聞享殿鐘豈謂盡驅昭應鹿到來還問灞陵松十家冡戸除官道百􅀊村翁識御容記得奉天門獻捷亦將恩禮待和龍其九湘山木落楚江流塢壁風高蘆管愁東府一軍當夏口南人五道出壺頭鐵犀黑水樓船夜銅鼓丹崖戰馬秋西上祖生仍誓楫路旁還指舊通侯其十十載間關厯苦辛汨羅風雨泣孤臣王孫去國餘三戸公子從亡止五人報主有心爭赤壁借兵無力聽黃巾誰知招屈亭前水卻是當時白馬津其十一極目風塵哭杜鵑越王臺畔草芊芊時危文土皆成將事去孤臣且學仙銅柱漫標空到海珠崖難棄已無天黔公帶礪丹書在兵甲縱橫滿麓川其十二栢梁高宴會羣公擊柱橫刀禁殿中豐沛功名雄薊北燕齊賓客亂關東五王歸政推恩厚八使分符報命同垂老幸聞親治詔太平時節願年豐其十三中丞杖節換征袍馬槊邊州意氣高門下爪牙京兆掾帳前心膂杜陵豪里魁投缿充書佐家將探丸拜賊曹司隸皁囊彈治急悔將文墨誤弓刀其十四法從千官對􅀡廬殿中誰是夏無且議添常侍司宮尉詔設期門護屬車沙苑草荒秋射兔灤河花發曉觀魚三邊望幸多封事不見相如諌獵書其十五富良江上指雙旌報道中原到陸生猶有將軍居善闡誰云相國走占城黄龍誓在應輸貢白象營開任請兵南服祖宗威徳重王師三下遣西平其十六急峽天風捲怒濤穿雲棧石度秋毫雞豚絶壁人煙少珠玉空江鬼哭高縱火子村驅草木齎糧百日棄弓刀緜州郤報傳烽緊峒戸溪丁轉戰勞其十七禪智庵頭感廢興前知今有佛圖澄雕弓裂地看諸將蠅拂談時聽老僧定後江聲消白骨靜中劫火指寒燈陰風夜半揚州月相國魂歸哭孝陵其十八武安席上見雙鬟血淚靑娥陷賊還只爲君親來故國不因女子下雄關取兵遼海哥舒翰得婦江南謝阿蠻快馬健兒無限恨天教紅粉定燕山其十九蓬萊閣上海雲黃用火神機壁壘荒本爲流人營碣石豈知援卒起蕭牆戈船舊恨東征將牙纛新封右地王辛苦中丞西市骨空將熱血灑扶桑其二十雁門西去塞雲愁苜蓿千羣散紫騮築館柔然非戚里置亭張掖豈鴻溝先機拒戸須防虎故智蹊田恐奪牛都護莫誇勤遠略龍堆吹雪滿并州其二十一爲稼軒萬里從王擁節旄通侯靑史姓名高禁垣遺􅀡看封事絶徼孤忠誓偑刀元祐黨碑藏北寺辟疆山墅記東臯歸來畊石堂前夢書畫平生結聚勞鄧元昭奉使江右相遇吳門卻贈五湖春草隱征笳畫舫圖書泊晚沙人謂相如初奉使客傳高密且還家黑貂對雪潯陽樹綠酒看山茂苑花囘去石渠應賜馬玉河從獵雁飛斜題鴛湖閨詠四首石州螺黛點新妝小拂烏絲字幾行粉本留香泥蛺蝶錦囊添線繡鴛鴦秋風濤棄描長卷春日鳴箏製短章江夏只今標藝苑無雙才子埽眉娘其二休言金屋贮神仙獨掩羅裠淚􅊄然栗里縱無歸隱計鹿門猶有買文錢女兒浦口堪同住新婦磯頭擬種田夫壻長楊須執㦸不知世有杜樊川其三絳雲樓閣敞空虚女伴相依共索居學士每傳靑鳥使蕭娘同步紫鸞車新詞折柳還應就舊事焚魚總不如記向馬融譚漢史江南淪落老尙書其四誰吟紈扇繼詞壇白下相逢吳綵鸞才比左芬年更少壻求韓重過應難玉顔屢見鶯花度翠袖須愁煙雨寒往事只看子薄命致書知巳到長干補褉壬長上已蔣事彥篆鴻陸我謀於鴛湖禊飲余後三日始至同集有道開師朱子容沈孟陽徵詩以補禊事余分得知字春風好景定昆池散誕天涯卻誤期溱洧漫搴芳杜晚雒濱須泛羽觴遲右軍此會仍堪記白傅重游共阿誰故事禊堂看賜柳年來無復侍臣知過朱買臣墓在嘉興東塔雷音閣後卽廣福講院翁子窮經自不貧㑹稽連守拜爲眞是非難免三長史富貴徒誇一婦人小吏張湯看踞傲故交莊助歎沉淪行年五十功名晚何似空山長􅀒薪題朱子葵鶴洲草堂别業堂成綠野邊養雛丹頂已千年仙人收箭雲歸浦道士開籠月滿天竹下縞衣三徑石雪中淸唳五湖田裴翁舊宅松陰在不數孤山夜放船題孫銘常畫蘭誰將尺幅寫瀟湘窮谷無人吹氣香斜筆點芽依蘚石雙鈎分葉􅅖篔簹謝家樹好臨芳砌鄭女花堪照洞房我欲援琴歌九畹江潭搖落起微霜送林衡者歸閩五月關山樹影圓送君吹笛柳陰船征途鶗鴂愁中雨故國桄榔夢裏天夾漈草荒書滿屋連江人去雁飛田無諸臺上休南望海色秋風又一年送文學博以蒼公招同住中峰寺二公皆雲南人西風驅雁暮雲哀頭白衝寒到講臺莫問郷􅀜應路斷偶傳消息又東來一峰對月茅菴在二老論心石壁開揀取梅花枝上信明朝移向故園栽雪夜苑先齋中飲博達旦二首扶杖衝泥逐少年解衣箕踞酒壚邊愁燒絳蠟消千卷愛把靑樽擲萬錢痛飲不甘辭久病狂呼卻笑勝高眠丈夫失意須潦倒劇孟平生絶可憐其二相逢縱博且開顔興極歡呼不肻還别緒幾年當此夜狂名明日滿人間松窗燭影花前酒草閣雞聲雪裏山殘臈豈妨吾作樂儘教游戲一生閑癸已春日禊飲社集虎丘卽事四首楊柳絲絲遍禁煙筆牀書卷五湖船靑溪勝集仍遺老白帢高談盡少年筍屐鶯花看士女羽觴冠蓋會神仙茂先往事風流在重過蘭亭意惘然其二蘭臺家世本貽謀高會南皮話昔游執友淪亡驚􅀊月諸郞才調擅風流十年故國傷靑史四海新知笑白頭修禊只今添俯仰北風杯酒酹營丘其三訪友扁舟挂席輕棃花吹雨五茸城文章興廢關時代兄弟飄零爲甲兵茂苑聽鶯春社飲華亭聞鶴故園情衆中誰識陳驚座顧陸相看是老成其四絳帷當日重長楊都講還開舊草堂少弟詩篇標赤幟故人才筆繼靑箱抽毫共集梁園製布席爭飛曲水觴近得廬陵書信否􅀉懷子美在滄浪投贈督府馬公二首伏波家世本專征畫角油幢細柳營上相始興開北府通侯高密鎭西京江山傳箭旌旗色賓客圍棋劍履聲勞苦潯陽新駐節舳艫今喜下湓城其二十年重到石城頭細雨孤帆載客愁累檄久應趨幕府扁舟今始識君侯青山舊業安常稅白髮衰親畏遠遊慚愧推賢蕭相國邵平只合守􅀲丘自歎誤盡平生是一官棄家容易變名難松筠敢厭風霜苦魚鳥猶思天地寛鼓枻有心逃甫里推車何事出長干旁人休笑陶􅀪景神武當年早挂冠登上方橋有感橋時新修極雄壯望見天壇崩圯盡矣石梁天際偃長壕勢壓魚龍敢遁逃壯麗氣開浮廣術虛無根削插崩濤秋騰萬馬鞭梢整日出千軍輓餉勞囘首泰壇鐘磬遠江㧧空繞斷垣高鍾山王氣銷沉石子岡放鷹調馬蔣陵傍金棺移塔思原廟金棺爲誌公在鷄鳴寺玉匣藏衣記奉常太常有高廟衣冠楊柳重栽馳道改樓桃莫薦寢園荒時當四月聖公沒後無坏土姑孰江聲空夕陽臺城形勝當年百戰收子孫容易失神州金川事去家還在玉樹歌殘恨怎休徐鄧功勲誰甲第方黃骸骨總荒丘可憐一片秦淮月曾照降幡出石頭國學松柏曾垂講院隂後湖煙雨記登臨桓榮空有窮經志伏挺徒增感遇心四庫圖書勞訪問六堂􅃶管聽銷況白頭博士重來到極目蕭條淚滿襟觀象臺候日觀雲倚碧空一朝零落黍離同昔聞石鼔移天上元移石鼓于大都今見銅壺沒地中黃道只看標北極赤烏還復紀東風郭公枉自師周髀千尺荒臺等廢宮鷄鳴寺鷄鳴寺接講臺基扶杖重游涕淚垂學舍有人鋤野菜僧寮無主長棠梨雷何舊席今安在支許同㕘更阿誰惟有誌公留布帽高皇遺筆讀殘碑寺壁有石刻高廟御筆題贊誌公像功臣廟畫壁精靈間氣豪鄂公羽箭衛公刀丹靑賜額豐碑壯棨㦸傳家甲第高鹿走三山爭楚漢鷄鳴十廟失蕭曹英雄轉戰當年事采石悲風起怒濤􅀇武湖覆舟西望接陂陀千頃澄潭長緣莎六代樓船供士女百年版籍重山河湖置黃册庫禁人遊玩平川豈習昆明戰禁地須通太液波煙水不關興廢感夕陽聞已唱漁歌時已有漁舟非復昔日之禁矣無題四首繫艇垂楊暎綠潯玉人湘管畫簾深千絲碧藕玲瓏腕一卷芭蕉宛轉心題罷紅窗歌緩緩聽來靑鳥信沉沉天邊恰有黃姑恨吹入蕭郎此夜吟其二到處鸎花畫舫輕相逢只作看山行鏡因硯近螺頻換書爲香多蠧不成愧我白頭無冶習讓君紅粉有詩名飛瓊漫道人間識一夜天風返碧城其三錯認微之共牧之誤他舉舉與師師疏狂詩酒隨同伴細􅕹風光異舊時畫裏綠楊堪贈别曲中紅豆是相思年華老大心情減辜􅀒蕭娘數首詩其四鈿雀金蟬籠臂紗閙妝初不鬬鉛華藏鈎酒向劉郎賭刻燭詩從謝女誇天上異香須有種春來飛絮恨無家東風燕子知多少珍重雕闌白玉花過朱君宣百草堂觀劇肻將遊俠誤躬畊愛客邨居不入城亭占緣疇朝置酒船移紅燭夜鳴箏金齏研鱠霜螯美玉粒呼鷹雪爪輕主人好獵卻話少年逢社飲季心然諾是平生周櫟園有墨癖嘗蓄墨萬種􅀊除以酒澆之作祭墨詩友人王紫崖話其事澷賦二律含香詞賦擲金聲家住􅀇都對管城萬笏雅應推正􅀡一囊聊復貯縱横藏雖黯淡終能守用任欹斜不自平磨耗年光心力短只因躭誤褚先生其二山齋淸玩富琳琅似璧如圭萬墨莊口啜飲同高士癖頭濡書􅀋酒人狂但逢知已隨濃澹若論交情耐久長不用黃金費裝裹伴他銅雀近周郎贈陽羨陳定生溪山罨畫好歸畊櫻笋琴書足性情茶有一經眞處士橘無千絹舊淸卿故御史大夫子知交東冶傳鉤黨子弟南皮􅀒盛名郤話宋中登望遠天涯風雨得侯生定生偕侯朝宗在南中幾及鉤黨禍侯生歸德人送李秀州擢甫紹道楊柳春風起郡樓故人嚴助昔同游煙霞到處推仙吏棨㦸今看冠列侯長水圖書移遠棹大雷笳鼔對清秋閱兵海上應西望秦駐山高卽秀州梅村家藏藳卷弟六終

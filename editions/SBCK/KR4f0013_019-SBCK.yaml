front:
  text: 梅村家藏藁卷弟十九詩後集十一
  hash: sha256:d88fef9c376ecac20a99e079600b00f7cc20f517d6ad1b5cdf08997470e3ec01
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_019-1a}
body:
  text: 七言絶句七十一首下相極樂菴讀同年北使時詩卷蘭若停驂灑墨成過河持節事分明上林飛雁無還表頭白山僧話子􅀸過昌國樂生去國罷登壇長念昭王知已難流涕伐燕辭趙將􅃘教老死在邯鄲任丘囘首鄉關亂客愁滿身風雪宿任丘忽聞石調邊兒曲不作征人也淚流臨淸大雪白頭風雪上長安裋褐疲驢帽帶寛辜􅀒故園梅樹好南枝開放北枝寒阻雪關山雖勝路難堪纔上征鞍又解驂十丈黃塵千尺雪可知俱不似江南送王元照八首王善畫弇州先生曾孫偶來京師舊廉州太守也靑山補屋愛流泉畫裏移家就輞川添得一舟乘興上煙波隨處小游仙其二始興公子舊諸侯丹荔紅蕉嶺外游席帽京塵渾忘卻被人强喚作廉州其三報國松根廟市開公侯車馬􅃲如雷疲驢一笑且歸去刑部街前曾看來其四内府圖書不計錢漢家珠玉散雲煙而今零落無收處故國興亡巳十年其五布衣懶自入侯門手跡流傳姓氏存聞道相公談翰墨向人欲訪趙王孫其六朔風歸思滿蕭關筆墨荒寒點染間何似大癡三丈卷萬松殘雪富春山其七河北三公一􅁓書浪游何處曳長裾歸田舊業春山盡華子岡頭自釣魚其八五馬南來韋使君故人相見共論文酒闌面乞黃堂俸明日西山買白雲讀史偶述四十首射得紅毛􅊵似拳乳茶挏酒閤門前相公堂饌銀盤美熊白烹來正割鮮其二雪消春水積成渠芻藁如山道不除怪殺六街騶唱少只今驄馬避柴車其三新更小篆譯蟲魚乙夜横經在玉除訝道年來親政好近前一卷是尙書其四􅀡廬西近御書房插架牙籤舊錦囊燕寢不須龍鳯餙天然臺几曲迴廊其五閤門春帖􅀧霜毫玉尺量身賜錦袍聞道尙方裁製巧路人爭擁看枚臯其六龍媒剪拂上華茵嚴助丹靑拜詔新莫向天閑誇絶技白頭韓幹竟何人其七徐無城下遇神仙移得驪山近玉田賭射上林春宴罷諸王騎馬向湯泉其八新張錦幄間垂楊四角觚稜八寶裝藉地煖茵趺坐軟茸茸春草是留香其九騰黃赭白總追風八匹牽來禁苑中毛骨不殊聲價好但看騎上卽神龍其十側坐翻身馬上輕官家絶技羽林驚左枝忽發鳴􅐴箭仰視浮雲笑絶纓其十一柳陰觀射試期門撥去胡牀踞樹根徙倚日斜纔御輦天邊草木亦承恩其十二進呈文字費躊躇轉譯紛然混魯魚夜半相公還被詔御前帖子改翻書其十三新語初成左右驚一言萬嵗盡歡聲多應絳灌交歡久馬上先行薦陸生其十四東盡三韓北嫩江秋風傳箭海西降􅀇狐獵罷搜靑鼠射得頭鵞更一雙其十五五千鐵騎十三山太子河邊飲馬還前哨已踰歡喜嶺鼓聲西下震榆􅀜其十六松林路轉御河行寂寂空垣宿鳥驚七載金縢歸掌握百僚車馬會南城其十七海上奇毛固絶倫星眸玉爪岀精神蘆溝橋上秋風起一蔟紅塵鷹犬人其十八西洋館宇逼城陰巧暦通􅀇妙匠心異物每邀天一笑自鳴鐘應自鳴琴其十九迴龍觀裏海棠開禁地無人閉綠苔一自便門馳道啓穿宮走馬看花來其二十宣爐厰盒内香燒禁府圖書洞府簫故國滿前君莫問淒涼酒盞鬬成窑其二十一布棚攤子滿前門舊物官窑無一存王府近來新發出剔紅香盒豆青盆其二十二大將祁連起北邙黄腸不盧發丘郎平生賜物都燔盡千里名駒衣火光其二十三琉璃舊厰虎房西月斧修成五色泥遍插御花安鳳吻絳繩扶上廣寒梯其二十四平生馬草世人知垂老猶堪萬里馳卻怪杏山書到日三軍早哭道旁碑其二十五金魚池上定新巢楊柳靑靑已放梢幾度平津高閣上泰壇春望記南郊其二十六紛紛茗酪鬬如何􅀧就茶經定不磨移得江南來禁地迴龍小盞潑松蘿其二十七夜半齋壇唱步虛玉皇新築絳霄居吹笙盡是黃門侣別勅西淸註道書其二十八新題御墨賜孱顔紫禁城頭喚㬌山傳與外廷誇勝事蓬瀛小島在人間其二十九水雲榭上會神仙層閣黃龍十丈船三爵羣臣半霑醉榴花開宴自今年其三十蘭池落日馬蹄驚魚服揮鞭過柳城十萬羽林空夜直無人􅄃轡諌微行其三十一七寶琉璃影百層治漪月色漾寒氷詞臣主客詩圖進御帖親題萬夀燈燈成命編翰製詩聊勅賜燈名萬壽其三十二玉砌流泉繞碧渠晩涼紈扇軟金與采蓮艓子江南弄太液池頭看打魚其三十三龍文小印大如錢别署齋名自記年畫就煙雲塡寶篆欲將金粉護山川其三十四渭園千里送篔營嫩籜靑靑道正長夜半火來知走馬尙方藥物待新篁其三十五新設椒園内道塲雲堂齋供自焚香大官别有伊蒲饌親割鸞刀奉法王其三十六直廬起草擅能文被詔含毫寫右軍賜出黄驄銀鑿落天街徐踏墨池雲其三十七霜落期門喚打圍海靑帽煖去如飛鴐鵞信至纔遊幸不比和林避暑歸其三十八鵪鶉錦袋岀懷中玉粒交爭花毯紅何似平章荒葛嶺諸姬蟋蟀􅃲金籠其三十九綠翹聰慧換新妝比翼丹山小鳳皇巧舌能言金鎻愛賜緋妬殺雪衣娘廣東進朱鸚鵡足有四距其四十廣南異物進駝雞錦背雙峰一寸齊只道紫駝來絶塞雞林原在大荒西鷄高三尺花冠翠羽背有雙峰似駝之肉鞍也伍員投金瀨畔敢安居覆楚奔吳數上書手把屬鏤思往事九原歸去遇包胥偶見二首新更梳裹簇雙蛾窄地長衣抹錦靴總把珍珠渾裝郤奈他明鏡淚痕多其二惜解雙􅆞只爲君豐趺羞澁岀羅裙可憐鵶色新盤髻抹作巫山兩道雲題帖二首孝經圖像畫來工字格森嚴自魯公第一丹靑天子孝累朝家法賜東宮禁本有孝經圖周昉畫顔魯公書神廟時曾發内閣重裱今在吏部侍郎孫公北海處其二金元圖籍到如今半自宣和出禁林封記中山玉印在一般烽火竟銷沉甲申後質愼庫圖書百萬卷皆宣和所藏金自汴梁輦入燕者厯元及明初無恙徐中山下大都時封記尙在今皆失散不存南苑應制綠楊春繞栢梁臺羽蓋梢雲甲帳開知是至尊親講武日邊萬馬射生來題石田畫芭蕉二首一葉芳心任卷舒客愁郷夢待何如平生枉用蕂溪紙綠玉窗前好寫書其二不妨修竹共檀樂長對蕭蕭夜雨寒卻笑休文强多事後人仍作畫圖看口古欲買溪山不用錢倦來高枕白雲眠吾生此外無他願飲谷棲丘二十年題沙海客畫達摩面壁圖松風拂拂水泠泠叅得維摩止觀經從此西來眞實義埽除文字重丹靑題二禽圖舊巢雖去主人空剪雨捎風自在中卻笑雪衣食玉粒羽毛憔悴閉雕籠詠柳四首贈柳雲生走馬章臺酒半醒遠山眉黛自靑靑翰他張緒誇年少柳宿􅅖邊占小星柳星張三宿同度其二十五盈盈擅舞腰無言欲語不能描武昌二月新裁柳破得工夫鬬小喬時有喬姫亦擅名其三萬條拂面惹行塵選就輕盈御柳新枉自穆生空設醴可憐靑眼屬誰人穆君初與雲遇爲畫眉人所奪其四玉笛聲聲喚奈何柳花和淚落誰多㶚橋折贈頻囘首惆悵崔郎一曲歌崔郎主人歌童也送友人岀塞二首吳茲受松陵人魚海蕭條萬里霜西風一哭斷人腸勸君休望令支塞木葉山頭是故郷其二此去流人路幾千長虹亭外草連天不知黑水西風雪可有江南問渡船雜題白祫春衣繫隱囊少年吹笛事甯王武昌老者如相問翻得伊州曲幾行梅村家藏藁卷弟十九終

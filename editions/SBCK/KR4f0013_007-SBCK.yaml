front:
  text: 梅村家藏藁卷弟七詩前集七
  hash: sha256:f7548f0e616b1f74715a3b3e76b261c0e76bf3ce9ef83b41bcc3ec027ebe80f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_007-1a}
body:
  text: 五言排律五首聯句附晚眺萬壑亂煙霜浮圖别􅄅茫江山連楚蜀鐘磬怨齊梁原廟寒泉裏園陵秋草傍雁低連雨色鷺遠入湖光戲馬長千里歸人石子岡舟車走聲利衣食􅀒畊桑欲問淮南信砧聲繞夕陽海螄不肯依墻壁其如羅網偏文身疑蝌篆長髻學螺旋跼足蟠根固容頭掩的圓但能防尾擊誰敢陷中堅氣及先聲取髀存裏肉捐空虚寍棄擲辛苦是連蜷處世遭多口浮生悞一鮮白鹽看雨後紅釀向花邊入穴鉤難致呼門慘不前􅂞腸縈鎖甲髕脚怨刀錢海粟蝸廬滿蟲書蜃市懸知君爾雅熟爲譯小言篇麥􅁞月令初嘗麥豳風小索綯繭絲供􅀊早芒刺用心勞舊穀憂蛾賊先農攝馬曹三眠收滯穗五色薦溪毛簇箔同丘坻繰車借桔橰筐分南陌採縷細北宮繅奉種鶊鳴降輸魁蟹績高仙翁蜂化飯醉士蟻餔糟桑蝎僵應化氷蛆卧未逃婦驚將絡緯客咽半蠐螬纎手揉乾糒春綿滑冷淘非關蟲食稼恰並鳥含桃思陵長公主輓詩貴主徽音美前朝典命光鴻名垂遠近哀誄著興亡託體皇枝貴承休聖善祥母儀惟謹肅家法在矜莊上苑穠桃李瑤池小鳯凰鸞音靑繡屜魚笏皂羅囊沉燎熏爐細流蘇寶蓋香禊期陪祓水繭館助條桑綠綟芃蘭佩紅螭薤葉璋錫封需大國喚仗及􅂞廊受冊威儀定傳烽羽檄忙司輿停鹵簿掌瑞徹珩璜婺宿明河澹薇垣太白芒至尊憂咄吒仁壽涕彷徨酈邑年方幼瓊華齒正芳艱難愁付託顚沛懼參商文葆憐還戲勝衣泣未遑從容􅢻傅母倥急詢貂璫傳箭聞嚴鼔投籖見拊牀內人縫使甲中㫖票支糧使者塡平朔將軍帶護羌寍無一矢救足慰兩宮望盜賊狐篝火關山蟻潰防逍遙師逗撓奔突寇披猖牙纛看吹折梯衝舞莫當妖氛􅆞象闕殺氣滿陳倉天道眞蒙昧君心顧􅁣慷割慈全國體處變重宗潢胄子除華紱家丞具急裝敕須離禁闥手爲換衣裳社稷仇宜報君親語勿忘遇人耑退讓愼已舊行藏國母摩笄刺宮娥掩袂傷他年標信史同日見高皇元主甘從殉君王入未央抽刀凌左闔申脰就干將啑血彤闈地橫尸紫籞汪絶吭甦又咽􅉂睫倦微揚裹褥移私第霑胸進勺漿誓肌封斷骨茹戚吮殘創死早隨諸妹生猶望二王股肱羞魏相肺腑恨周昌賊遁仍函谷兵來豈建康六軍􅋇面慟四海遏音䘮故國新原廟羣臣舊奉常賵圭陳厭翟題湊載輼輬隧逼賢妃􅃁山疑望子岡銜哀存父老主察失元良訣絶均坏土飄零各異方衣冠嬴博葬風雨鶺鴒行浩刼歸空壤浮生寄渺茫玉眞圖下髮申伯勸承筐沅浦餘堯女營丘止孟姜君臣今世代甥舅卽蒸嘗湯沐鄉亭秩家門殿省郎淒涼脂粉磑零落綺羅箱宅枕平津巷街通少府墻晝間偕妯娌曉坐向姑嫜偶語追銅雀無聊問柏梁豫游推插柳勝蹟是梳妝菡蓞鴛鴦扇茱萸鸚鵡觴大庖南膳厰奇卉北花房暖閣葫蘆錦温泉荳蔻湯雕薪獅首炭甜食虎睛糖壯麗成焦土榛蕪拱白楊麋游鳷鵲觀苔沒鬬雞坊荀灌心惆悵秦休志激昂崩城身竟殞塡海願難償命也知奚憾天乎數不臧累歔床簀語卽窆寢園􅅖半體先從父遺骸始見娘黄泉母子痛白骨弟兄殤夙昔銅駝泣諸陵石馬荒三年修荇藻一飯奠嵩邙寒食重來路新阡宿草長溪田延黍稼隴笛卧牛羊朽壤穿螻蟻驚沙起鴰鶬病樗眠廢社衰葦折寒塘列刹皇姑寺馱經內道塲侍鬟稱練行小像刻沉香玉座懸朱帳金支渡法航少兒添畫燭保媪伴帷堂露濕丹楓泠星稀靑鳥翔幡旄晨隱隱鈴鑷夜將將控鶴攀龍馭驂麟謁帝閶靈妃歌縹緲神女笑徜徉苦霧迷槐市雌霓遶建章歸􅈶思五廟涉漠淚三湘柔福何慚宋平陽可佐唐虞淵瞻返日蒿里叫飛霜自古遭兵擾偏嗟擁樹妨魯元馳孔亟芉季􅀒倉黃漂泊悲臨海包含耻溧陽本朝端閫閾設制勝巖疆處順惇㳟儉時危植紀綱英聲超北地雅操邁東鄉新野墳松􅀡招祗祠柏蒼薤歌雖慘澹汗簡自輝煌謚號千秋定銘旌百禩彰秦簫吹斷續楚挽哭滄浪附松江張宸長平公主誄曰長平公主者明崇禎皇帝女周皇后產也甲申之􅀊淑齡一十有五皇帝命掌禮之官詔司儀之監妙選良家議將降主時有太僕公子都尉周君名世顯者將築平陽以館之開沁水以宅之貳室天家行有日矣夫何蛾賊鴟張逆臣不誠天子志殉宗社國母嬙嬪􅁣慷死焉公主時在穉齡御劍親揮傷頰斷腕頽然玉折霣矣蘭摧賊以貴主旣殞授屍國戚覆以錦茵載歸椒里越五宵旦宛轉復生泉途巳宮龍髯脫而劍遠蘭熏罷殿蕙性折而神枯順治二年上書今皇帝九死臣妾跼蹐高天髠緇空王庶申罔極上不許詔求元配命吾周君故劍是合土田邸第金錢牛車錫予有加稱偹物焉嗟夫乘䳨扇引定情于改朔之朝金犢車來降禮於故侯之第人非鶴市􅁣紫玉之重生鏡異鸞臺看樂昌之再合金枝秀發玉質含章逢德曜於皇家迓桓君于帝女然而心戀宮帷神傷輦路重雲畢陌何心金㮄之門飛霜榖林豈意玉簫之館弱不勝悲溘焉薨逝當扶桑上仙之日距穠李下嫁之年星燧初周芳華未歌嗚呼悲哉都尉君悼去鳳之不留嗟沉珠之在殯銀臺竊藥想奔月以何年金殿煎香思返魂而無術越明年三月之吉葬于彰義門之賜莊禮也小臣宸薄游京輦式覩遺容京兆雖阡誰披柘館祁連象塚祗叩松關凝傷逝于子荆朗香空設代悼亡於潘令遺掛猶存敢再拜爲之誄云明夢餘錄曰公主名徽娖又孫承澤春梅花菴話雨同林若撫聯句放䇿名園勝停驂客思淹雲鳳初涼欣颯爽入夜苦籤偉業有待聞乾􅍎無因見皎蟾鳳蒲荒迷鷺影花落泠魚噞鳥語枝頭咽蟲鳴葉底潜淸齋幽事足良會逸情兼業貧士藏書富高人取友嚴瞢騰長自卧剝啄遣童覘北郭余偕隱東山爾共瞻鳳生來門是德住處水名廉業觸地詞源湧推鋒筆陣銛萬言成寸晷一字􅀡三縑雜佩紉蘭茝名材貢􅂎柟三千登甲第四十到宮詹鳳仙樂淸商奏天厨法酒霑使車游宛雒樓艦出沱􅈞職亞成均掌官同秘院僉含毫芸閣草插架石渠籖業翰染丹靑障碁分黑白奩望崇敦雅素氣􅀡折王憸鳳道巳銘鐘鼎交仍隔釡鬵雲霄三省相虎豹九關閹業害物磨牙慘持拳炙手炎游夫空捭闔武士浪韜鈐鳳海㝢洪罏焰民生鼎沸燖天心何叵測宸極竟危阽業夏社松陰改周原麥秀漸詩書遭黨錮冠蓋受髠鉗鳳暴骨巖城陷燒屯甲士殱子民餘㸑僰尺土剩滇黔業越俗更裳珮秦風失帽幨短衣還戍削長帶孰蜚􅗒絶跡違朝市全身混里閻鳳拏舟浮磵曲扶扙度山崦菌閣迎寒葺茅亭帶雨苫業冥鴻思避弋老馬脫銜箝朋舊從頭數篇章信口占鳳境奇窮想入才退苦言砭大暦塲誰擅元和體獨纎聆音􅅓下里覩貌歎無鹽好句奚囊貯淸談麈尾拈飛觴邀阮籍䜿義問劉惔業情洽蠲苛禮形忘略小嫌詼諧文乞巧憔悴賦驅痁書擬中郎秘香憑小史掭搴蘭將滿握采菊不盈襜鳳紙帳蛛絲罥紗屏蝶粉黏試茶追陸羽退筆弔􅀩恬玩物高居澹安心老境甜食羹調芍藥釀法製莃薟黃擘團臍蟹霜批巨口鮎香流金杏酢脆入玉梅腌送酒橫波艶調箏素手摻新聲歌緩緩沉飲醉厭厭業梅老看圍屋花開待放􅉉道人君勿愧處士我何謙鳳綠印苔間屐靑飄柳外帘池流緣岸折峰􅀔出墻尖業興劇神偏王狂來語􅀋譫徘徊吟數過撚斷幾枯髯鳳五言絕句二十七首子夜詞三首人采蓮子靑妾采梧子黃置身宛轉中纎小歡所嘗其二憶歡教儂書少小推無力別郎欲郎憐修牋自雕飾其三夜涼入空房侍婢待除裝枕前鈎不下知未解衣裳子夜歌十三首歡是南山雲半作北山雨不比薰爐香􅆞綿入懷裏其二夜夜枕手眠笑脫黃金釧傾身畏君輕背轉流光面其三故使歡見儂儂道不相識曾記馬上郎挾彈門前立其四微笑佯牽伴低頭誤弄􅃶衆中誰賣眼又說是相憐其五雙􅆞五色縷與歡相連愛尙有宛轉絲織成合歡帶其六淺碧魚文纈輕紅杏子花比來妝束素加上木蘭紗其七儂如機上花春風吹不得剪刀太無頼斷我機中織其八紅羅複斗帳四角垂明珠明珠勝明月月落君躊蹰其九指冷玉簫寒袖長羅袂濕此夜坐匡床春風無氣力其十夜色吹衣袂新聲出絳紗相逢更相認銀燭上鉛華其十一舞罷私自憐腰肢日嫋嫋總角諸少年虧他只言好其十二玉枕湘文簟金爐鳳腦煙君來只病酒􅇳􅀒解香鈿其十三出門風露寒歡言此路去妾夢亦隨君與歡添半臂子夜歌六首代友人答閩妓白玉絳羅圍枝頭荔子垂待儂親用手緩緩褪紅衣其二郎來索糖霜莫持與郎喫郎要口頭甜不如自嘗蜜其三榕樹參天長郎栖在何處隨郎不見榕累儂望鄉樹其四綠葉吐紅苗紗窻月影高待郎郎不至落得美人蕉其五佛手慈悲樹相牽話生死爲郎數還期就中屈雙指其六橄欖兩頭纎終難一箇圓縱教皮肉盡腸肚自然堅采石磯石壁千尋險江流一矢爭曾聞飛將上落日弔開平新翻子夜歌四首歡今穿儂衣窄身添扣扣欲搔麻姑爪教歡作廣袖其二含香吐聖火碧縷生微煙知郎心腸熱口是金博山其三歡有頷下貂與儂覆廣額脫儂頭上珠爲歡嵌寶石其四龍團語羊酪相逢土風異爲歡手煎茶調和見歡意梅村家藏藁卷弟七終

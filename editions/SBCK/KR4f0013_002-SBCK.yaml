front:
  text: 梅村家藏藁卷弟二詩前集二
  hash: sha256:fb12b05108b4e09b688d65f2f00823faa25bff0eae5ceecef51932f7dd782b4d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_002-1a}
body:
  text: 七言古詩二十八首行路難一十八首奉君乘鸞明月之美扇耶谿赤堇之寳刀莞蒻桃笙之綺席陽阿激楚之洞簫丈夫得意早行樂歌舞任俠稱人豪舉杯一歌行路難酒䦨鐘歇風蕭蕭其二長安巧工製名燈七龍五鳯光層層中有青熒之朱火下有映徹之澄氷游魚揚鬐肆瀺灂飛鳥奮翼思鶱騰黒風吹来徧槐市狂花振落燒觚稜金吾之威不能禁鐵柱倒塌銅盤傾使人策馬不能去青燐鬼哭唯空城其三君不見無須将閭呌呼天賜錢請葬驪山邉父爲萬乘子黔首不得畊種咸陽田君不見金墉城頭髙百尺河間成都弄刀㦸草木萌芽殺長沙狂風烈烈吹枯骨人生骨肉那可保富貴榮華幾時好龍子作事非尋常奪棗争梨天下擾金床玉几不得眠一朝零落同秋草其四愁思忽不樂乃上咸陽橋盤螭蹲獸勢相齧谽呀口鼻吞崩濤當時平明出萬騎馬蹄蹀􅉜何逍遥長安冠蓋一朝改紫裘意氣非吾曹柴車辟易伏道畔舍人辭去妻孥嘲人生太行起面前何必褒斜棧閣﨑嶇髙其五君不見南山松柏何葱菁於世無害人無争斧聲丁丁滿崖谷不知其下何王陵玉箱夜出寳衣盡冬青葉落吹魚燈石馬無聲缺左耳豐碑倒拆纒枯藤當時公卿再拜下車過今朝蔓草居人畊其六漢家身毒鏡大如八銖錢蒲桃錦囊雖黯􅌿盤龍婉轉絲結連云是宣皇母后物摩挲愛惜宫中傳土花埋沒今千年對此撫几長嘆息金張許史皆徒然其七君不見黄河之水從天来一朝乃沒梁王臺梁王臺成髙崔嵬禁門平旦車如雷千尺金堤壊百里嚴城開君臣将相竟安在化爲白黿與黄能乃知水可亡人國昆明刦灰何如哉其八男兒讀書良不惡屈首殘編務穿鑿窮年矻矻竟無成徒使聲華受蕭索君不見王令文章今大進丘公官退才亦盡寂寂齋居自著書太􅀇竒字無人問其九伏軾説人主談笑稱上客一見賜黄金再見賜白璧夜半宫中獨召見母弟通侯皆避席上殿批逆鱗下殿犯貴戚犀首進䜛譖韓非受指摘夜走函谷闗逡巡不能出君不見范睢折脇懲前事身退功成歸蔡澤其十君不見鄭莊洗沐從知交傾身置驛長安郊又不見任君談辭接後進冠蓋從游數百乘人生盛名致賔客失勢人情諒非昔年少停車莫掃門故人行酒誰離席其十一直諌好言事召見拜司􅀠彈劾中黄門鯁切無所避天子初見容謂是敢言吏以兹増感激居官厲鋒氣奏對金商門縛下都船獄髠頭徙朔方衆怒猶不足私劍揣其喉赤車再收族横尸都亭前妻子不敢哭酒色作直都殺人藏頭畏尾徒碌碌其十二拔劍横左膝嗔目悲歌向坐客我初從軍縛袴褶手擊黄麞弓霹靂生来不識官家貴帯甲持兵但長揖驅馬来中原尚書奏功級前庭論爵賞後殿賜飲食烏瓛家兒坐我上壊坐爭言多酒失御史彈文讀且紏待罪驚憂不敢出還君綘衲兩當衫歸去射獵終南山其十三平生俠游尚輕利劇孟爲兄灌夫弟使酒罵坐人探丸斫俗吏流血都市中追兵數十騎借問追者誰云是㶚陵杜穉季抽矢弗射是故人兩馬相逢互交臂吾徒豈相厄便當從此逝泰山羊氏能藏跡北海孫公堪避世複壁埋名二十年赦書却下咸陽尉歸来故鄉無負郭破家結客成何濟其十四今我思出門圖作雒陽賈東游陳鄭北齊魯白璧一雙交王公明珠十斛買歌舞闗中軺車方算緡髙艑峩峩下荆楚道阻淮南兵貨折河東估朝爲猗頓暮黔婁乞食吹簫還故土其十五丈夫少年使絶域從行吏士交河卒布衣功拜甘泉侯獨䕶髙車四十國蒲萄美酒樽中醉汗血名駒帳前立富貴歸故郷上書乞骸骨漢使遮玉闗不遣将軍入軍中夜唱行路難條支海上秋風急其十六西莫過金牛闗懸崖鐵鎖猿猱攀南莫過惡道灘盤渦利石戈矛攢猩猩啼兮杜鵑呌落日青楓山鬼嘯篁竹深巖不見天我所悲兮在逺道其十七結帯理流蘇流蘇紛亂不能理當時羅帷鑒明月皎皎容華若桃李一自君出門深閨厭羅綺有人附書還君到長干里名都鶯花發皓齒知君眷眷嬋娟子太行之山黄河水君心不測竟如此寄君翡翠之鶼釵傅璣之墮珥勸君歸来且歡喜卧疾空床爲君起其十八吾将老焉惟糟丘裸身大笑輕王侯禮法之士憎如讐此中未得逍遥游不如飲一斗頽然便就醉執法在前無所畏君不見嵇生幽憤阮生哭箕踞狂呼不得意殿上行殿上雲旗天半出夾陛無聲手攀直有㫖傳呼召集賢左右公卿少顔色公卿繇來畏廷議上殿叩頭輒心悸吾丘發䇿詘平津未斥齊人慚汲尉先生侍從垂金魚退直且上庖西書況今慷慨復遑惜不爾何以乗朝車秦京盜賊雜風雨梁宋丘墟長沮洳降人數部花門留抽騎千人桂林戍至尊宵旰誰分憂挾彈求鳳髙墉謀老臣自詣都詔獄逐客新辭鳷鵲樓先生翻然氣塡臆口讀彈文叱安石期門將軍鬚㦸張側足聞之退股栗吾聞孝宗宰執何其賢劉公大夏戴公珊夾城日移對便殿造膝宻語爲艱難如今公卿習唯唯長跪不言而已矣黄絲厯亂朱絲直秋蟲跼曲秋雕起嗚呼拾遺指佞乃史臣優容愚戅天王仁雒陽行詔書早洗雒陽塵叔父如王有㡬人先帝玉符分愛子西京銅狄泣王孫白頭宫監鋤荆棘曽在華清内承直遭亂城頭烏夜啼四十年来事堪憶神皇倚瑟楚歌時百子池邉嫋栁絲早見鴻飛四海翼可憐花發萬年枝銅扉未啟牽衣諌銀箭初殘淚如霰㡬年不省公車章後来數罷昭陽宴骨肉終全異母恩功名徒付上書人貴彊無取諸侯相調䕶何闗老大臣萬嵗千秋相訣絶青雀投懐玉魚别昭丘煙草自蒼茫湯殿香泉暗嗚咽析圭分土上東門寳轂雕輪九陌塵驪山西去辭温室渭水東流别任城少室峰頭寫桐漆靈光殿就張琴瑟願王保此黄髪期誰料遭逢黒山賊嗟乎龍種誠足憐母愛子抱非徒然江夏漫栽修柏賦東阿徒詠豆萁篇我朝家法踰前制兩宫父子無遺議廷論繇来責佞夫國恩自是優如意萬家湯沐啓周京千騎旌旗給羽林總爲先朝憐白象豈知今日誤黄巾鄒枚客館傷狐兔燕趙歌樓散煙霧茂陵西築望思臺月落青楓不知路今皇興念繐帷哀流涕黄封手自裁殿内遂停三部伎宫中爲設八闗齋束薪流水王人戍太牢加璧通侯祭帝子魂歸南浦雲玉妃涙灑東平樹北風吹雨故宫寒重見新王受詔還唯有千尋舊松栝照人落落嵩髙山勿齋勅使益府予亦有大梁之役兩家子弟述先志揚祖徳其同此君嵗寒矣豫章夾日吟髙風嵗久蟠根造物功吾祖先朝豫州牧早年納節東溪翁舅家仲圭擅畫竹歸老山莊看亦足至今遺墨滿縹緗掛我青溪草堂曲此圖念出同年生當時意氣稱徐卿非買玉環思適鄭暫持翠節解司兵吾祖一麾方出守不獲諸公同載酒把臂曽看韋曲花贈行不及漳河栁誰人尺幅寫篔簹影入清郎四牡裝千里故園存苦節百年舊澤養新篁今皇命使臨江右絳旛人識中丞後江左龍孫篠簜長淇園鳯質琅玕痩嶰谷千尋鸞鳥呼彭城一派雨風多願将十丈鵝溪絹再作青青玉筍圖悲滕城悲滕城滕人牧羊川之濆雨工矯歩趨其羣河魚大上從風雲去山一尺雷殷殷寺前鐵鐸多死聲日暮雞犬慘不鳴城上掌事報二更鬼馬踏霧東南行鼓音隆隆非甲兵吁嗟龍伯何不仁大水湯湯滔吾民城中竽瑟不復陳縞帶之價髙錦純路骨藉藉無主名葬者死生俱未明悲滕城滕城訛言晝夜驚百尺危巖浮車輪海民投網獲金鐺巫兒赤章賽水神溝人匠氏修防門贈范司馬質公偕錢職方大鶴國家司馬推南中直節不撓三原公當時江東尚無事憂國惟聞劄子至一月不見王公書百僚爭問江東使前有三原今呉橋范公赤舄來東郊太尉五兵分二閫司戎三士領諸曹殿中錢郎最年少輕裘長􅥪秦淮道朝服常薰女史香從戎好側叅軍帽兩人置酒登新亭惆悵中原未釋兵盡道石城開北府何如漢水任南征錢郎意氣酣杯酒不憂賊來憂賊走鼓吹先移幕府山戈船早斷濡須日罷官爲失平津侯壯心空繁月氏頭八公草木軍容在六代煙霞詩卷收是時羽書正旁午尚書杖錢防江楚早嵗㑹提宣武軍舊人自效龍䮡伍麾下爭看金僕姑帳前立􅀡銀刀都諮謀雖少周公瑾跳盪猶有蕭摩訶尚書當念安危計感時又忤鸞臺議三公劍履且辭歸九河烽火家何處千人㑹役羽林軍短犢還過司馬問鄉夢自依宣德里郊居且卜石塘村落日簾帷呼碧玉琵琶莫唱歸飛曲丈夫四海猶比鄰何必思家數車轂醉後悲歌涕淚横北風吹雨人江聲白蘋騁望思公子黄菊登高憶故人錢郎拏舟再相見芙蓉堂下開懽讌去日將軍解佩刀重來歌妓低團扇仍道朝廷思令公璽書旦夕下山東過江願請三千騎奪取樓蘭不受封襄陽樂襄陽之樂乃在漢水廣峴山高英宗復辟襄王朝賜以二賦親含毫此賦不從人間來楚雲一片飛蕭韶大堤花檀溪竹襄王歸就章華宿高齋學士宜城酒江臯遊女銅鞮曲前有白尚書後有原侍郎虎符討賊臨襄江千里淸盪開鄖房節使不數杜常陽宗子足掩曹成王百餘年來亂再起青􅂁白馬來秦倉吾聞襄陽城北七十二峰削天半中有黑帝畤白玉爲階戺黄金爲宫觀㑹佐眞人起冀方今日王師下江漢江漢耀兵逍遙歌祝釐祠下諸軍過廟中燕王破陣樂襄陽小兒舞傞傞新都護稱相公知畧輻輳承明宫帶刀六郡良家從相公來車如風飛龍廐馬青絲􅎸襄王置酒雲臺中賊騎巳滿淸泥東嗟乎呼鷹臺畔生荆􅁄斬蛇渚内波濤立夜半城門門牡開蒲胥劍履知何及襄陽之樂乃在漢水廣峴山高故宫落日風蕭蕭高麗行安東都護營河朔特許高麗巿弓角野人七姓海西塵開城八道江南樂蔽關還蹙董山師拜表先陳瓦剌詞諸部皆分大傉薩國人共事莫離支承天門前常引見三年加勞中嘗宴折巾屈紒幕華樓龍笙狼筆來賓院漢城無復憂毛憐吹蘆箄篥檀君前三十六島島兵起先皇趣救車三千遼人頭裹夫餘布將軍履及楊花渡一戰功收合巿城萬家粟輓襄平路此事岀來四十年君倚漢使眞如天陳湯巳去定遠死一朝羽檄愁烽煙榆關早斷三韓道蒲海難通百濟船嗚呼東方君子不死國堪嗟漸漸玄莵麥豈甘侯印下勾驪終望王師右碣石三松老人歌三松老人七十一箬帽棕鞋神奕奕座上支頤避世翁少年走馬長安客長安此日車如風十八五人衣衫同賣術黄銀殷七七搊筝翠袖張紅紅西苑樓臺飛百尺洛陽賈人進花石宣政門開侯賜錢杜陵日暮分曹弈大艑十丈封黄羅彄環一寸如淸矑織罽先呈尚衣局飾璫共宴賣珠胡二月高梁走燕九小兒縁橦女射柳馬客虬鬚笑繫鞭蛾姬輔靨呼嘗酒賀老琵琶李暮笛與慶樓前初下直曲曲新聲我輩聞五侯宣索知何及玉河歸騎景陽鐘曵縞乘肥勝日中醉值金吾爭道過將軍司隸與錢通二十年來重到此不見當年遊使子南陌朝催間架錢西山夜拾囘中矢老夫濩落復何求寒笛江潭獨倚樓一身結客半天下萬里歸來空白頭送志衍入蜀去年秋山好君走燕雲道今年春山青君去錦官城秋山春山何處可爲别把酒欲問横塘月人影将分花影稀鐘聲初動簫聲咽我昔讀書君南樓夜寒擁被譚九州動足下床有萬里駑馬伏􅌴非吾儔當時東國賤男子傲岸平生已如此今朝乘傳下西川賨户巴人負弓矢黄牛喘怒潠銀濤崩剝蒼崕化迹勞石㫁忽穿風雨過山深日見魚龍髙江頭老槎偃千尺接手猿猱擲橡栗雲移㫁壁層波見月上危灘逺峯出縹緲樓臺白帝城月明吹角唱花卿棧連子午愁烽堠水落東南洗甲兵摩訶池上清明火蹲鴟山下巴渝舞豈有居人浣百花依然風俗輸銅鼓有日登臨感客游楚天飛夢入江樓五湖歸思蒼波濶十月懐人木末愁别時曽折閶門栁相思應寄郫筒酒末下鹽豉誰共嘗蜀中蒟醬君知否愧子王粲老江潭愁絶空山響杜鵑乞我瀼西園數畝依君好種灌溪田梅村家藏藁卷弟二終梅村先生年譜卷二十一年戊寅三十􅀊江右楊機部廷麟以翰林改官兵部主事贊畫督臣盧象昇軍事與楊鳬岫士􅃪謀劾吏部尙書田惟嘉太僕寺卿史􅒇諸不法事先生左諭德濟甯楊公墓誌銘丁丑㑹試同考得春秋士二十三人明年皇太子出閣講學充校書官以職事糾中書黃應恩失當事意尋以經筵講官召對面論考選得失疏劾吏部尙書田惟嘉及其鄉人史􅒇所爲諸不法上用其語惟嘉黜免􅒇逮問未幾田史之黨復振公病請囘籍辛巳史􅒇死獄中詔籍其家應恩前已他事論死乃思公言爲可用又公謹質凝重多大節其以職事糾黃應恩也應恩者小人厯事久關通中外舊制詞臣於殿閣大學士爲同官而中書特從史卽積資至九卿不得鈞禮淄川相以外臣入廢掌故而應恩挾中官重示籠絡又助爲調旨以此得相張心益驕無舊節公與語不合立具奏又移書淄川責數之而僉人盡目懾公矣田惟嘉者以吏侍郎取中旨進於相張爲師生而史􅒇特虎而鷙父䘮家居頤指諸大吏爲威福天下莫敢言公於便殿白發其端退而上書條疏贓釁章十數上三月二十四日召對進端本澄源之論湯太淑人八十稱觴李繼貞有吳母湯太夫人八十夀文載萍槎集十二年已卯三十一􅀊升甫京國子監司業李繼貞與門人吳禹玉書令長公南司成之推大爲扼腕要之饒山水多高賢宜詩酒有此三快三公不易矣今巳抵任否門下奉親之暇何以爲適園林窮勝事鐘鼓樂淸時此二語可以當之督師盧象昇卒先生詩話盧自謂必死顧參軍書生徒共死無益乃以計檄之去機部不知也機部到孫侍郎傳延軍前六日盧公於賈莊死難矣明史盧象昇傳揚廷麟上疏嗣昌怒奪象昇尙書巡撫張其平閉闉絕餉俄又以雲晉警趣出關王朴徑引兵去象昇提殘卒次宿南宮野外畿南三郡父老聞之咸叩軍門泣請移軍廣順無隻臂之援立而就死象昇流涕謝以事從中制食盡力窮旦夕死矣無徒累爾父老爲衆號泣各攜斗酒粟餉軍十二月十一日進師至鉅鹿賈莊起潛擁關甯兵在雞澤距賈莊五十里而近象昇遣廷麟徃乞援不應師至蒿水橋遇大淸兵象昇將中軍大威帥左國柱帥右遂戰夜半觱篥聲四起旦日騎數萬環之三匝象昇麾兵疾戰呼聲動天自辰至未礮盡矢窮奮身鬭殺後騎皆進手擊殺數十人身中四矢三刃遂仆掌牧楊陸凱懼衆之殘其屍而伏其上背􅀒二十四矢以死一軍盡覆大威國柱潰圍得脫明史楊廷麟傳十一年冬京師戒嚴廷麟上疏劾兵部尙書楊嗣昌言大臣以國爲戲嗣昌與高起潛方一藻倡和欵議武備頓忘督臣盧象昇以禍國責樞臣言之痛心夫南仲在内李綱無功潛善秉成宗澤隕命乞陛下赫然一怒明正向者主和之罪俾將士畏法無有二心嗣昌大恚詭薦廷麟知兵改兵部職方司主事贊畫象昇軍思義攷虞山蒙叟詩孤臂云何堪兩胸只墮西事不成東又不能曲突到焦頭五月邊書九月售薊督方一藻督監高起潛本兵楊嗣昌共謀輸平以緩國難五月通事人周元忠致信云欵若不成夏秋必有舉動十一年九月大淸兵入牆子嶺殺總督吳阿衡毁正關至營城石匣駐於牛蘭召宣大山西三總兵楊國柱王朴虎大威入衞三賜象昇尙方劍督天下兵楊嗣昌高起潛主和議象昇聞之頓足歎帝召問方畧象昇對曰臣主戰帝色變良久曰撫乃外廷議耳其出與嗣昌起潛議議不合事多爲嗣昌起潛撓疏請分兵則議宣大山西三帥屬象昇􅀜甯諸路屬起潛象昇名督天下兵實不及二萬漳浦黃公道周論楊嗣昌奪情事受廷杖先生遣太學生涂仲吉人都訟􅁈干上怒嚴旨責問主使先生幾不免奉使封延津孟津兩王於禹州過汴梁登孝王臺漳浦黃公南還先生與馮司馬遇之唐棲舟中出所註易授先生思義攷楊奪情爲大司馬已大拜至戊寅冬冦變衆懼不免而聖眷彌篤已卯暫削官階冠帶辦事隨卽賜復九月督師盪冦錫宴後殿賜御製詩以寵其行詩曰鹽梅今借作干城大將威嚴細柳營一埽冦氛從此靖還來教養遂民生李少司馬雜錄云看此詩氣象蕩平有機若使功成報命便與裴晉公何異惜乎虛此盛典也虞山蒙叟投筆集註云閣臣楊嗣昌素奉佛法旣出視師專意招降賊降者數十萬卽於附近安插未幾降者復反四面皆起王師如在重圍中矣嗣昌每日持誦華嚴謂此經可以消劫十三年庚辰三十二􅀊升中允諭德嗣父文玉公卒陳廷敬先生墓表升中允諭德丁嗣父艱服除會南中立君登朝一月歸臨江參軍先生詩話機部自盧公死後其策益不用無聊生詔詰督師死狀賈莊前數日督師誓必戰顧孤軍無援聞太監高起潛史云陳起潛兵在近則大喜於眞定野廟中倚土銼作書約之合軍高竟拔營夜遯督師用無援故敗機部受詔􅀡以實對􅄌谿馮鄴仙得其書謂余日此疏入機部死矣爲定數語機部聞之則大恨先是嗣昌遣部役張姓者史云俞振龍偵賈莊而其人譚虛公死狀流涕動色嗣昌榜笞之楚毒備至日無改辭曰死則死耳盧督師忠臣吾儕小人敢欺天乎遂以拷死於是機部貽書馮與余日高監一叚竟爲刪􅁍後世謂伯祥不及一部役耶然機部竟以此得免已而過宜興訪盧公子孫再放舟婁中與天如師及余會飮十日嘉定程孟陽爲畫髯參軍圖余得臨江參軍一章余與機部相知最深於其爲參軍周旋最久故於詩最眞論其事最當卽謂之詩史可勿愧機部後守贛州從城上投濠死機部隆武朝進兵部尙書東閣大學士開府南贛丙戌十月初四日死難十四年辛巳三十三􅀊李自成陷河南福王常洵遇害有汴梁二首五月哭張西銘師再訐復社命下南郭獨條對上獄乃解張采具陳復社本末疏載金鴻縣志靜志居詩話崇禎戊寅南國諸生顧杲等百四十人具防亂公揭請逐閹黨阮大鋮子方實居其首有云杲等讀聖人之書明討賊之義事出公論言與憤俱但知爲國除姦不惜以身賈禍大鋮飮恨刺骨而東林復社之讎在必報矣大鋮名在東林點將錄號没遮攔而閩人周之夔亦注名復社第一集阮露刃以殺東林周反戈以攻復社君子擇交不可不愼於始也陳鼎東林列傳蠅蚋錄出於温體仁蝗蝻錄出於阮大鋮又有續蠅蚋錄及蝗蝻錄乃復社諸君子也計二千五百五十五人惟兩陜愼中無人十五年壬午三十四􅀊春大淸兵克松山洪承疇降遂下錦州祖大夀以錦州降有松山哀七月田貴妃薨葬天夀山有永和宮詞十六年癸未三十五􅀊升庶子李自成破潼關督師孫傳廷戰死有雁門尙書行文祖堯來爲太倉州學正鼎革後棄官寓僧寺以靑烏術自給人皆知滇南先生爲古君子有文先生六十壽序送文學博以蒼公招同住中峯寺曇陽觀訪文學博介石兼讀蒼雪詩遺跡有感諸詩志衍之成都任有送志衍入蜀詩附先生詩話卞玉京題扇送余兄志衍入蜀云剪燭巴山別思遙送君蘭楫渡江皋願將一幅瀟湘種寄與春風問薛濤秋七月由崧襲封福王十二月文選司郎中吳昌時棄市吳江縣志吳昌時少受業於周忠毅宗建故與淸流通聲氣而爲人墨而狡旣通籍日奔走權要探刺機密以􅋑鬻市重周延儒之再起也昌時爲通關節及爲首輔其辛未取士馬世奇本延儒師力勸以正故初治事頗有賢聲而昌時則挾勢弄權大啟倖門延儒視師通州一晨而昌時之啟事八至帝密刺之知其交關狀而未發吏部舉行年例先擇選事故事副郎有調部者正郎不調部昌時欲持權使人誑冢宰鄭三俊曰昌時持正有風力主年例爲宜遂從儀制正郎調文選事爲破格人皆側目及舉行年例出異已者十人於外一時大譁旣而御史蔣拱宸劾昌時贜私巨萬多連延儒并言内通中官漏􅂥禁密事帝震怒御中左門親鞫之遂下獄論死且始有誅延儒意時魏藻德新入閣有寵謂其師薛國觀之死昌時實致之恨昌時甚因與陳濟甚排延儒掌錦衣衞者駱養性復騰蜚語帝遂命盡削延儒職勒其自盡而昌時棄市論者謂二人無逃刑帝能申法也雒陽行先生詩話陳卧子嘗與余宿京邸謂余曰卿詩絶似李頎又誦余雒陽行一篇謂爲合作大淸順治元年甲申明崇禎十七年三十六􅀊三月流冦陷京師莊烈帝崩於萬夀山先生里居聞信號痛欲自縊爲家人所覺朱太淑人抱持泣曰兒死其如老人何乃已明史周遇吉傳十七年二月太原陷遂陷忻州圍代州遇吉先在代遏其北犯乃憑城固守而潛出兵􅁬擊連數日殺賊無算會食盡援絶退保甯武賊亦踵至遇吉四面發大礮殺賊萬人設伏城内出弱卒誘賊入城殺數千人城圮復完者再傷其四驍將自成懼欲退其將曰我衆百倍於彼但用十攻一更番進蔑不勝矣城遂陷闔家盡死而大同總兵姜瓖表至自成大喜方宴其使者宣府總兵王承􅄻表亦至自成益喜遂決䇿長驅厯大同宣府抵居庸太監杜之秩總兵唐通復開門延之京師遂不守矣賊每語人曰他鎭復有周總兵吾安得至此楊士聰甲申核眞畧賊之陷二關而入也守甯武關者總兵周遇吉夫婦臨陣殲賊無數賊誘降不從力盡全家赴火賊屠其城歎曰使守將盡如周將軍吾何以得至此是日至宣府白廣恩官撫民與總兵姜瓖約降至居庸太監杜之秩與唐通俱降先生綏冦紀畧自成初盜福邸之貲以號召宛雒逮乎京師陷其下爭走金帛財物之府以分之彼飢寒乞活之人一旦見宮室帷帳珍怪重寶以千數志滿意得飮酒高會胠篋擔囊惟恐在後山海關總兵吳三桂奉詔入援聞燕京陷猶豫不進自成執其父襄令作書招之許以通侯之貴三桂欲降至灤州聞其妾陳沅爲賊所掠大憤急歸山海關乞降於我大淸有圓圓曲詩中有衝冠一怒爲紅顏句三桂賫重幣求去此詩先生弗許四月鳯陽總督馬士英等迎福王由崧入南京稱監國壬寅自立於南京國號宏光附唐孫華東江集談金陵舊事詩金陵昔䘮亂炎運值標季忽從大梁城倉皇走一騎偶竊藩邸璋自言某王嗣貴陽一奸人乘時思射利奇貨此可居何暇論眞僞卜者本王郎矯誣據神器遂修代來功超踰登相位權門輦金帛掖庭陳秘戲江表張黃旗王氣銷赤幟媮息僅一年傳聞有二異北來黃犢車天表自英粹雜問聚朝官膛目各相視遙識講臣面備言宮壼事諸臣媚新君誰肯辨儲貳爭效􅖿不疑競指成方遂泉鳩無主人束縛乃就吏復有故宮妃飛蓬亂雙髲自言䘮亂時仳離中道棄生子已勝衣壯髮猶可識不望昭陽恩不望金屋貯願一見大家瞑目甘入地上書欲自通沉沉九閽閟詔付掖庭獄見者爲垂淚不如厲王母銜憤早自刺祗緣當璧假翻招故劍忌誠恐相見非泄此蹤跡秘滅口計未􅃘對面諒餘愧鳥獸有伉儷豺虎知乳孶豈獨非人情捐棄恩與義嬴呂及牛馬秦晉潛改置皆從胎孕中長養崇非􅀋未聞妄男子潛盜出不意龍種乞爲奴孤假得暫恣茲實衆口傳曾見遺老記疑事終闕如庶聽來者議福世子之僞正史不載錄之以廣異聞分江北爲四鎭以黃得功劉澤清劉良佐高傑領之史可法開府揚州按東華錄有攝政王遣南來副將韓拱薇等致明大學士史可法書宏光甲申九月十五日史可法答攝政王書五月大淸定鼎燕京十月張獻忠破成都志衍一門三十六口俱被害有志衍傳觀蜀鵑啼劇題志衍山水詩姜埰謫戌宣州衛有東萊行明史姜埰傳埰杖已死弟垓口溺灌之乃蘇盡力營護後聞鄉邑破父殉難一門死者二十餘人垓請代兄繫獄釋埰歸葬不許卽日奔䘮奉母南走蘇州又垓爲行人見署中題名碑崔呈秀阮大鋮與魏大中並列立拜疏請去二人名及大鋮得志滋欲殺垓甚垓變姓名逃之甯波國亡乃解先生有姜如須從越中寄詩次韻王士正感舊集小傳崇禎壬午埰擢禮科給事中五月中條上三十疏以言事觸首輔怒與行人司副熊開元同下北鎭撫司獄備極考掠幾死者數矣甲申正月謫戌宣州衞聞京師陷思陵殉社稷痛哭而南之戌所未至以金陵赦留吳門不肯歸以馬阮用事避地徽州祝髮黃山自號敬亭山人戊子奉母歸萊陽山東巡撫重其名遣使招之先生故墜馬以折股紿使者而夜馳還江南自號宣州老兵欲結廬敬亭未果病亟遺命葬宣城戌所口吟易簀歌一章以卒盛敬成仁譜崇禎癸未大兵入關山東雲擾萊陽諸生姜瀉里字爾岷偕其季子坡及工部侍郎宋玫玫宗人吏部稽勛司郎中應亨俱以罷任家居經畫守禦兵薄城下坡發一礮中其帥首少􅁍亡何夜襲城兩家皆驅家僮巷戰刃中瀉里背見殺坡抱父屍大罵兵臠之執玫應亨相對拷掠不屈死按瀉里埰父左懋第充通問使有下相極樂庵讀同年北使時詩卷明史左懋第傳懋第初授韓城知縣有異政考選戸科給事中福王立爲應天巡撫甲申大學士高宏圖議遣使通好於我而難其人懋第請行八月渡淮十月朔次張家灣止許百人入都懋第縗服以往館於鴻臚寺以不得赴梓宮卽於館所遙祭是月二十八日遣還尋自滄洲追還改館太醫院葛芝卧龍山人集侍郎奉使在北覊太醫院也部曲有盜餉潛通者侍郎怒杖殺之其黨因告侍郎有異圖攝政王陳兵入院令曰薙頭者生不薙者死侍郎叱曰頭可去髪不可去同行數十人不屈者參贊兵部陳用極游擊王一斌都司張良佐王廷佐劉統五人而已因趣下刑部鋃鐺數重七日不動遂執以如王所王愈欲降之則令侍郎之兄道意不得因請死王猶豫未决侍郎舊曰男兒死耳何疑爲拽出順城門將就縛飛騎至曰降者王矣侍郎曰甯爲上國鬼不願爾封王也六人以次受戮用極與侍郎屍􅀡立不仆忽驚風四起斷蓬飛入天際觀者爲之流涕罷市二年乙酉三十七􅀊南京召拜少詹事二月王師南下揚州史可法嬰城固守攻益急可法十餘疏告急宏光以演劇不省援兵不至刺血作書别其母妻王師以飛礟擊城西南隅陷可法死之有揚州詩五月初九日王師渡江福王由崧奔太平南都亡禇人穫堅瓠集乙酉五月王師下江南吾蘇帖然順從六月十三日忽有湖賊揭竿殺安撫黃家鼒城中鼎沸賴大兵繼至得甯劉澤淸降我朝惡其反覆磔誅之有臨淮老妓行王士正南征紀畧淮安頗稱鞏固甲申五月澤淸實來盤踞與田仰日肆歡飮大兵南下有問其如何禦者曰吾擁立福王以來供我休息八月大興土木造室宇極其壯麗􅆫擬王居休息淮上觚賸澤淸建閫淮陰興屯置榷富亞郿塢而漁色不已天旅南下托以左兵犯順率旅勤王撤戌離汛大掠南行遇王師於蕪湖謀入海不得倉猝迎降鄭芝龍黄道周等奉唐王聿鍵稱監國六月自立於福州號隆武楊文驄之閩有送友人從軍閩中讀友人舊題走馬詩於郵壁漫次其韻成仁譜楊文驄字龍友貴州貴陽縣人崇禎辛未進士以職方郞中監鎭江軍乙酉夏鎭江潰六月安撫黄家鼒至蘇州文驄結陳情等攻殺之尋入浙至閩拜兵部侍郎丙戌福州陷率川兵搏戰不克死九月執由崧以歸於京師先生應南京詹事之召甫兩月奕琛夤緣馬士英復柄用修舊郤先逮吳御史适次擬先生先生知事不可爲又與馬阮不合乃謝歸明史奸臣傳朝政濁亂賄賂公行四方警報狎至士英身掌中樞一無籌畫日以鋤正人引􅇯黨爲務時有狂僧大悲出語不􅀋爲總督京營戎政趙之龍所捕大鋮欲假以誅東林及素不合者因造十八羅漢五十三參之目書史可法高宏圖姜日廣等姓名内大悲袖中海内人望無不備列獄詞詭秘朝士皆自危而士英不欲興大獄乃止夏允彝幸存錄馬士英入政府方快於逐姜劉而用阮大鋮不復顧大柄之委去也大鋮一出凡海内人望無不羅織巧詆貪夫壬人無不湔洗拔用先生冒辟􅆠五十夀序往者天下多故江左尙晏然一時高才子弟才地自許者相遇於南中刻壇墠立名氏陽羨陳定生歸德侯朝宗與辟􅆠爲三人皆貴公子又有皖人者流寓南中故奄黨也通賓客畜聲伎欲以氣力傾東南申酉之亂彼以攀附驟枋用興大獄以修舊郄定生爲所得幾塡牢戸朝宗遁之故鄣山中南中人多爲辟疆耳目者跳而免尋以大亂奉其父憲副嵩少公歸隱如皋之水繪園誓志不出先生吳母徐大夫人夀序當幼洪爲給諫余亦官南中以母老歸養請急東還聞幼洪之及也余自知不免雖然不敢以告吾母也無何江南大亂余奉母奔竄山中幼洪亦自獄所脫歸母子相見倉皇避兵皆慬而後免今太夫人康彊夀考諸子拜堂下進七十之觴而吾母亦健飯無恙兩家母子同以危苦得全此非天爲之耶五月十七日州役皂隸輿厮等毆張南郭以積米未明爲詞劉河兵以數月乏糧擁至城勢張甚十九日滿城民夜皆聞鬼哭二十日士民訛言大兵已至蘇州居民驚徙城市一空知州朱喬秀吝而懦卒當時危惟擁貲闔門爲走計六月初二日盜庫帑逸初四日州亂焚搶蜂起先生避亂礬淸湖有攀淸湖讀史雜感避亂詩思義攷朱昭􅉮明鎬小山雜著乙酉閏六月一日夜將半訛言忽起傳有㓂警余披衣起露立庭中見天上小星散落如雪洪範曰庶民惟星其隕如星乎十六日望夜月食之旣衆星流移縱横絡繹各有芒角占曰百姓流徙之象吳人輕名節而重毫髪始則望風納款繼乃愛惜顚毛遂各稱兵旅拒崑山咫尺音問不通鄉城唇齒辨髮相戮枯守城中正如坐井七月初四日屠嘉定初六日屠崑山十二日屠常熟吳郡縣七州一崇明懸處海外六邑五受傷夷惟一州爲魯靈光之獨存自雜弁恣意淫刑悍卒踴躍奪劫鄉城哽咽互召敵仇譬之蟹然去其郭索之物惟餘頑然一腹究復何濟七月初七日屠嘉定左通政侯峒曾死之子元演元潔從死觀政進士黄湻燿自縊於眞濟寺弟淵耀從死孝廉張錫眉縊於文廟學正龔用圓投井死初六日屠崑山原任總兵王南陽貢生朱集璜死之孝廉徐開元妻自縊長子次子不忍其母痛哭駡軍大怒縛置庭柱亂鏃射殺二子善屬文有美才崑山被屠者幾及八萬人俘婦女無算其軍士大約黄靖南降卒也淫殺十倍北軍十二月屠常熟是日前荆門以義陽王爲名需索大戸士女逃竄城郭爲空以故軍至無大獲所屠者單戸而已三縣合計所屠之戸不下二十萬人凡厚貲强有力者先遯荒野遇害間有一二大率中人下戸居多語云千金之子不死於市信哉八月初三日李成棟統軍屠太倉各鎭李成棟移師至松江府松江水師敗北提督京口水營總兵王蜚吳淞總兵吳志葵􅀍擒王蜚死之破府城屠四五萬人俘婦女畧同吳郡吏部考功司主事夏允彝沉河死守金山衞指揮侯懷玉死之六月大兵入浙有堇山見詩楊陸榮三藩紀事本末乙酉官兵旣入浙縱肆淫畧總鎭聞梟示十數人令搜各船所掠婦人給還本夫兵士畏法遂以所掠沈之江中又乙酉六月我貝勒留兵二千駐吳閶大軍悉趨杭州掠嘉興而過時潞王常淓在杭撫按請命奉書迎降而嘉興士紳屠象美等復集兵據城守大兵還攻半月而破閏六月祖母湯大淑人卒三年丙戌三十八􅀊瞿式耜等以桂王由榔監國於肇慶號永厯志衍之弟事衍自蜀中徒跣逃歸有哭志衍詩秋王煙客時敏治西田於歸涇之上去城西十有二里是爲十四都搆農慶堂稻香菴霞外閣錦鏡亭西廬語稼軒逢渠處巢安等室約張南垣疊山種樹錢虞山作記先生爲作歸村躬耕記琵琶行西田詩和王太常西田襍興福建道監察御史贈太僕寺卿諡忠毅李公神道碑銘四年丁亥三十九嵗正月大兵克肇慶桂王奔桂林尋奔全州以式耜留守桂林元配郁淑人卒楊繼生任太倉學正有閬州行贈楊學博爾緒顧勗齊壬夏雜抄楊先生秉鐸吾婁妻女在蜀遭亂巳無可奈何矣會吾婁盛泰昭釋􅄄秦之畧陽令楊以盃酒餞之曰倘至彼中得吾家消息片鴻寸鯉勿靳也盛赴任一載偶以事出見婦人負血書匍匐道左物色之卽楊内閫也乃假以一椽飛書廣文婦嚙二指以血作字并斷指裹來楊得之慟卽以二百金授使俾就舟東下會南宮期近楊束裝目北至京口有北舟歘南偶觸詢之則楊夫人舟自陜來也相別十餘年流落萬死天作之合異哉方出門時女猶襁褓今巳覔婿同來如一家游越有謁范少伯祠登數峯閣禮浙中死事六君子鴛湖曲鴛湖感舊王煙客招往西田賞菊有詩梅村先生年譜卷二終

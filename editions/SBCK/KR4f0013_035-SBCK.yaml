front:
  text: 梅村家藏藳卷弟三十五文集十三序九
  hash: sha256:c77a152a2a9d8cf3c2361ab789d1bf7f1fba8447a1d09a107e97a2b91b9ee5ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_035-1a}
body:
  text: 送胡彦遠南歸序武林有横山江氏兄弟隱於橫山者二十年天下言隱居善避兵者無如橫山矣巳而武林亂橫山先受兵余疑焉或日江氏固高貲有圖書玩好朋友聲酒之樂富於居山者也余迺歎曰江氏之及也宜哉今年春遇詩人胡彦遠於長安毎酒酣詫客曰吾家在武林之河渚巒迴澗複人跡罕至煙汀霧樹視之旣盡杳若萬里吾父子葺茆屋以居杜門著書不見兵革顧以貧故無以贍老親不得巳走京師從故人索河北一書今將涉漳河過邢臺沂淮而南歸吾所居河渚誓不復出矣夫以彦遠之詩與其人使有山田數十畝營灌自給可以勿游旣游矣卽久留邸中曳裾公卿之門亦可以無困迺彦遠自以居山久一旦來京師策秃尾驢障便面行泥淖中鬱鬱不得意發病思歸歸而便道謁西諸侯西諸侯恐無能識彦遠者其游也乃所以益其貧耳雖然吾以知彦遠居山之安也織簾砍屧緯谷蓋與天下絶矣獨念通都廣邑之内名山大河之間人才輩出耆舊猶存今以絶意仕宦不得復與之游則何以論道取友感發其志氣於是累趼重繭襆被而來將繇此入白門過廣陵一覩中原之盛而恐其糧盡以返也余聞其言壯之往者在長安石齋曾以易傳授余及豫章楊機部未及竟石齋用言事得罪相送出都城機部􅁣然日絶學當傳大賢難遇余兩人盍棄所居官從石齋讀書鶴鳴山中十年不出余心是其語兩人者逡巡未得去今機部後先授命余靦顔苟活先生之學遂以失傳嗟乎吾聞之古人有辭親遠遊負笈求師三年不得見者矣有解去印綬不通官閥北面稱弟子者矣此機部與余所不能爲者而衡者爲之衡者行序其稿爲贈所以明余之惰著衡者之勤以見閩士多賢而石齋先生之學猶存於天下也衡者名佳璣興化之莆田人爲人質樸修志行詩文雅健有師法其叔父小眉公以前進士隱居著述衡者能世其家風云贈琴者王生序往時余兄志衍好琴琴之道非心手專一勿能工也志衍能詩文善書畫奕棋居能品又爲投壺蹴踘諸戲其於琴弗肯竟學顧好與其工者游有王生者以此抜進能爲新聲當是時志衍方貴盛賓客日十數人談論方起絲管間作行酒歌呼投壺叫絶志衍分身其間恢啁抵掌以爲樂笑已而王生攜其琴至撫絃布指則主人焚香啜茗正容端膝四座閴寂無人聲余於是歎琴德之妙王生之功并以服吾志衍也不數年志衍官蜀之成都闔門遇寇難以死王生者無所遇其道益窮衣其敝衣日抱琴行道中余與當時賓客遇亂各散去無一人能收王生者蓋志衍之亡六七年矣今年夏復與王生遇談志衍舊事則大哭哭已爲余鼓一再弄凄然以清悄然以悲聽之如見志衍也昔孟嘗君廣厦邃房淫聲麗色撞鐘舞女乎其前而雍門高爲之鼓琴也能使如破國亡邑之人流涕泣下今以吾志衍才氣之雄交遊之衆可不謂盛歟一旦骸骨破碎門戸磨滅欲如雍門所云千秋萬世之後嬰兒竪子躑躅而歌於其墓上噫何可得哉然則王生之爲此曲也其爲峨眉之高乎其爲瞿塘之深乎其爲杜鵑之嗁猿狖之吟乎其爲山鬼之連蜷而偃蹇乎其爲秋風之慄慄中人肌膚乎蓋坐客憯懍振悚變色而三歎又從而歌之日葛蔓蔓乎雨冥冥楓林黑兮陰火青望故鄉而不見語白骨乎空城顧愛子之罔托兮嗟賓御之無人則坐客無不矯首西望欷歔而於邑也抑吾又聞之琴者所以理性怡心導情宣鬰今聆王生之撡不言哀而哀得母張急調下非中和之響耶是不然夫人心有煩􅁈菀結不能自達者驟聞幽眇之音愀愴之調一彈再歌涕淚横集則仰首出氣足以釋然於胸懷且以文王之忠焉而幽囚伯奇之孝焉而讒死孔子之聖焉而見逐顔回之賢焉而早天在深於琴者言之雖以志衍之罹極禍揆之義命可以無憾况於吾輩爲破國亡邑之人者耶王生推琴而起日善遂書其語爲贈王生名愚吳郡人贈照如師序儒者之道與佛教同爲盛衰往者唐宋大儒專斥浮圖氏而名僧大德咸出於其時蓋儒術與佛教同盛此古人所以不可及也今之爲浮圖學者大率重宗而絀教其弊也黑白互異南北相訾賢人君子欲立說以勝之而其道不足以相服卒舉天下愚智盡歸之宗門可謂盛矣而名山老衲乃有没法淪墮之恨此所謂儒術敝而佛教與之同衰其可歎也已以余所聞神宗皇帝時士大夫以讀書講學相高吾州先達如管東溟曹魯川兩先生研綜六經穿穴訓詁而又能得佛法大旨於教律論藏皆有所叅究爲一時緇素之所諮仰蓋唐宋之講學儒釋分而我明之講學儒釋合後來憨山􅘟池諸大法師皆能融釋書傳歸之教乘未必非兩公有以發之也余生也晩於兩公不及見而魯川之壻爲余外王父少時從母黨竊觀其書多至百餘卷魯川三子其季日毅叔毅叔之子日元孟父子爲儒者能世其家學今年夏余園居讀書元孟瓢笠叩門日吾出家於郡城之文殊庵僧臘已十年矣此卽所謂炤如師也東溟之後日乾山手定法華疏鈔自爲諸生四方講席見推爲耆宿今亦出家於吳郡嗟乎余於是知兩先生之教且復盛也夫炤如乾山儒者也儒者之學通明廣達條析科僕講求微宻皆厯有援證彼夫自尊其學空疎而滅裂者其說自足以勝之說足以勝之矣苟非能外死生去利欲則何以折方􅂁圓領者之徒而使之震奉吾教所謂其道不足以相服蓋以此也今炤如乾山受信具修戒律勤苦專慤在疇人之中最爲精進而始舉其先世之書闡揚條貫用以尊道而訓俗然則儒教敝佛教衰庶乎其有望者其在斯乎炤師年六十徵余文爲夀夫浮圖氏以天地萬物爲空幻年祀久遠本非所計而獨於道之盛衰不可不以身爲擔荷故書是以貽之王石谷贈行詩序士之負絶藝者中有神解而外與物化非至精者不能幾也然而爲之難知之亦難何以言之夫善琴者不必於其音也善奕者不必於其博也善射者不必於其鵠善御者不必於其馬也善書畫者不必於其毫素也孔子曰用志不分乃疑於神神者芒忽無形變化無端長與造物者游而髣髴其所由始吾乃目將營之足將從之若是乎其專且壹也雖有好惡利害非譽巧拙不得而人焉久之如有得也窅然若䘮其故吾而忻然與其道相接如此謂之藝成藝旣成居有以得於已出可以無待於人苟或嗜我抜貪我名而不窺我用志之所存雖投之以千金之璧􅁍行擁彗而前者弗顧也以其不足乎知我也故曰爲之難知之亦難海虞王子石谷者善畫其畫也無地􅀔而尊不蓄積而富非宿素而老處於蓬茅沮洳之間一日而傾天下遼廓乎三百年諸家之所莫及噫嘻亦異哉余問之日子惡乎操術而至於是耶石谷日吾行若遺坐若忘晝不食夜不寐頤探冥索以與古人相遇於微眇之中凡厯三五年而所學始大就嗟乎石谷之於斯事也可謂治之之勤悟之之深者矣當其初起惟吾州兩王公知之旣而少司農周櫟園先生知之兩王公先達盛名極意推挽而機園方爲江左重臣手筆致問降已折節若惟恐其不易致者石谷爲之辦裝而未及發會先生用職事􅀍案劾或止之日此豈公論書畫時耶石谷日公知我者不可以不往旣至先生流連傾倒不自知其身之在憂患也亡何先生解天下聞而兩賢之石谷不以先生多故而濡滯其行先生不以失志而稍廢待士之禮相與作歌詩紀其事嗚呼古之所謂知巳者其在斯乎其在斯乎余嘗有感於莊周列禦冦之說技之工者進乎道巧之至者全乎天舉夫庖丁之刀宜僚之丸飛衞之矢匠石之斤與宋元君之畫史䑛筆和墨解衣盤礴者其道相合而韓退之之論張旭草書以爲喜怒窮窘憂悲愉怢怨恨思慕無聊不平皆於草書焉發之蓋書畫之道本乎性適乎情通乎天地萬物其不可端倪也如此今以王子之有得而又與櫟園遊也櫟園旣備嘗其平生之遭晚而深思篤好於畫將取其二十年來嶔􅏟磈壘可􅁨可愕暄涼顯晦代更乎前者托諸丹青粉繪爲銷歸石谷可得其意而奮筆追之以視夫川巖之險易煙雲之起滅草木之開落而榮悴人事變異物情顚倒皆是理也然則王子之於畫不更進而其爲知巳也又何如哉余旣交於櫟園而其識石谷也不在兩王公之後喜是編之成足以著兩人之深相知也於是乎言孫孝維贈言序昔之所謂世家者非獨以其膴厚也蓋有文辭之事焉自春秋范文子以立言爲三不朽兩漢名儒元功之後位不至而名過其父兄者有之晉魏以降崔盧王謝家擅雕龍人人有集爲當世文人所推奬貴游子弟不惟膏梁帬屐之是好而沾沾於知我之一言其得之若拱璧被之若文繡傳日非文辭不爲功誠信然哉余於海虞孫孝維所衰贈言讀之而歎日此可以觀孝維之所尙矣夫當今之稱世家者孰踰孝維乎方伯公二龍齊驅宣猷岳牧法曹高第治行清能生有父兄之資長無門戸之累養閑守素儁譽日高杜欽之優游恬尙王湛之晦德浮沉也別墅攬招眞諸勝丙舍極楓林之美同里宗工在望賓客如歸孝維於其間延接青雲名士白社高人流連欣賞扁舟乘興訪兄三衢郡閣放浪於仙巖繡峰何點之定林寺陶峴之西塞山也生平嗜書畫奇玩斥城南數頃田易置樽彝敦卣所居夾牕助明點染楮墨設水遞開荼寮石鼎松風旗鎗碗具皆有才以使之趙明誠之好古博物陸鴻漸之品泉鬬茗也家蓄清商一部有雅流老輩爲之審音分􅞟比度轉喉入破得杳眇之致而過江一生載酒齎琵琶至朗彈開元法曲淒清惋壯坐者爲之泣下桓野王之柯亭􅅇宗少文之金石弄也孫氏舊以文雄里中其先處士西川公學詩於長洲沈啟南偕皇甫兄弟相善太學滄浪生能詩喜客父子顯聞孝維繼起而世其家風服高曾之規矩見聞薰習尤崇尙文辭之事宜乎知我者形諸賦詠以爲美談動盈卷帙固其風流俊爽有以傾一時苟非至篤好亦何能致若是之多乎然則今之立言者考論世家徴諸文獻必之孫氏而其所以可久者不徒在膴厚而尤在此也余故備著之以諗世之知孝維者焉是爲序梅村家藏藳卷弟三十五終

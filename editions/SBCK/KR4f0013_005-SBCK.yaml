front:
  text: 梅村家藏藳卷弟五詩前集五
  hash: sha256:907f189feb35d51b04e8603696720663d8fe4934ed9d7d2df8162c264677a54c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_005-1a}
body:
  text: 七言律詩五十四首梅村枳籬茅舍掩蒼苔乞竹分花手自栽不好詣人貪客過慣遲作答愛書來閒窗聽雨攤詩卷獨樹看雲上嘯臺桑落洒香盧橘美釣船斜繫草堂開懷楊機部軍前同時遷吏獨從征人道戎旃譴責輕諸將自承中尉令孤臣誰給羽林兵憂深平勃軍南北疏訟甘陳誼死生猶有内䜛君不顧亦知無語學公􅀸送黄石齋謫官舊學能先天下憂東西國計在登樓十年流涕孤臣事一夜秋風病客舟地近詩書防黨禁山高星漢動邊愁匡廬講室雲封處莫問長江日夜流送左子􅀡子忠兄弟還桐城君家先德重西京别我臨江涕淚橫趙氏有孤仍世族衞公無謚在諸卿時未賜諡看碑太學傷鈎黨置洒新亭望息兵莫歎祀宮豺虎迹浮丘山下草初生聖駕閱城恭遇口占柳陌天閑獅子花春風吹角畫輪車雲開羽葆三干仗日出樓臺十萬家天子玉弓穿塞雁黃門金彈落宮鴉北軍不用歸都尉閱武堂前是正衙登梁王吹臺登臺雅吹列僊聞客散梁園祗夕曛天子旌旗憐少帝諸王兵甲屬將軍兩河詞賦淩寒雪千騎歌鐘入暮雲我亦倦游稱病免洛陽西去不逢君過朱仙鎭謁武穆廟少保功名絳節遙山川遺恨未能消故京陵樹猶西向南渡江聲自北朝父子十年摧勁敵士民三鎭痛天驕嗟君此地營軍險祠廟丹靑空寂寥送楊鳬岫蕭瑟江湖逐客船亂離兄弟夕陽邊蕪城是處逢寒食苦葉如人渡汶川囘首風塵生􅂎􅁄傷心矰􅗤在鷹鸇曾經召見多封事一病猶緣明主憐白門遇北來友人風塵滿目石城頭樽酒相看話客愁庾信有書談北土杜林無恙問西州恩深故國頻囘首詔到中原盡涕流江左卽今歌舞盛寢園蕭瑟薊門秋甲申十月南中作六師長奉翠華歡王氣東南自鬱盤起殿榜還標太極御舩名亦號長安孫吳船名湖吞鐵鎻三山動旗遶金莖萬馬看開府揚州眞漢相軍書十道取材官有感已聞羽檄移靑海是處山川困白登征北功惟修塢壁防秋策在打河冰風沙刁斗三千帳雨雪荆榛十四陵囘首神州漫流涕酹杯江水話中興感楊梅作石槨山頭好結鄰壽陽妝束紫綸巾子雲二姓慚梅尉虢國同心泣采蘋露冷玉盤傷碩果風來珠實墮芳茵杜鵑嗁就楊修恨碧血離離向故人王煙客招往西田同黃二攝六王大子彥及家舅氏朱昭􅉮李爾公賓侯兄弟賞菊二首九秋風物令公香文肅嗜菊此其遺愛三徑滋培處士莊花似賜緋兼賜紫人曾衣白對衣黃未堪醉酒師彭澤欲借飡英問首陽轉眼東籬有何意莊嚴金色是空王其二不扶自􅀡疎還密已折仍開瘦更妍最愛蕭齋臨素壁好因高燭耀華鈿坐來豔質同杯泛老去孤根僅瓦全蒔者以瓦束土苦向鄰家怨移植寄人蘺下受人憐和王太常西田雜興八首一卧溪雲相見稀繫船枯柳叩斜扉橋通小市魚蝦賤水遶孤邨烟火微到處琴書㩦自近驟來賓客看人圍畫將松雪花溪卷補入西田老衲衣其二積暑空庭鳥雀稀泉聲入竹冷巖扉芒鞋藤杖將迎少蠏舍魚莊生事微病酒客㩦茶荈到罷棋人簇畫圖圍日斜淸簟追涼好移榻梧陰見解衣其三苦竹黃蘆宿火稀渡頭人歇望歸扉偶添小閣林巒秀漸見歸帆烟靄微蔬圃草深鳬䧹亂水亭橋沒芰荷圍夜涼捲幔深更話已御秋來白袷衣其四竹䲧花潭過客稀灌畦纔罷掩松扉道人石上支頤久漁父磯頭欸乃微潮沒秋田孤鶩遠閣含山雨斷虹圍亭臯木落黃州夢江海翩躚一羽衣其五亂後歸來桑柘稀牽船補屋就柴扉游魚自見江湖濶野雀何知身體微聽說詩書田父喜偶譚城市醉人圍昨朝換去機頭布已見新縫短後衣其六勝情今日似君稀鷺立灘頭隱釣扉屋置茶寮圖陸羽軒開畫壁祀探微蕭齋散帙知躭癖高座談經早解圍手植松枝當麈尾雲林居士水田衣其七相逢道舊故交稀偶過鄰翁話掩扉陶氏先疇思士行謝家遺緒羡􅀪微城中賜第書千卷祠下豐碑柳十圍今日亂離牢落甚秋風禾􅁰淚沾衣其八春曉臺前春思稀故園蘿薜繞山扉僮畊十畝桑麻熟僧住一龕鐘磬微題就詩篇纔滿壁種來松栝巳成圍而今􅁍向西田老換石栽花典敝衣贈王子彥五十四首二十登車侈壯游軟塵京雒紫驊騮九成宮體銀鈎就萬卷樓居玉軸收家有樓名萬卷縱解摴蒲非漫戲卽看哺醊亦風流筍輿芒屩春山路故舊相逢總白頭其二舊業城西二頃田著書聞已續長編兩賢門第知應補十上才名祗自憐投老漫裁居士服畏人還趁孝廉船只因梅信歸來晚手植松枝暗記年其三懶將身世近浮名殘客繇來厭送迎獨處意非關水石逢人口不識杯鐺衣幍藴藉多風貎硯几清嚴見性情子弟皆賢賓從好似君纔勿媿平生其四雖云文籍與儒林獨行居然擅古今五簋留賓高土約百金投客故人心尊彛布列圖書貴花木蕭疎池館深晚向鹿門思采藥漢濱漁父共浮沈姜如須從越中寄詩次韻漂泊江湖魯兩生亂離牢落暮雲平秦餘祀日刋黃縣越絶編年紀赤城南菊逢人懷故國西窗聽雨話陪京不堪兄弟頻囘首落木蕭蕭非世情言懐苦留蹤跡住塵寰學道無人且閉關只爲魯連甯蹈海誰云介子不焚山枯桐半死心還􅀡斷石經移蘚自斑欲就君平問消息風波幾得釣船還周五子俶讀書愛客白擲劇飲又善音律好方伎爲此詩以調之大隱先生賦索居比來詩酒復何如馬融絳帳仍吹笛劉向黃金止讀書窮賴文章供飲博興因賓客賣田廬莫臨廣武頻長歎醉後疎狂病未除同許九日顧伊人洞庭山館聽雨曉閣登臨意渺然蘆花蕭瑟五湖天雲深古洞藏書卷木落空山奏管􅁌魚市有租堪載酒橘官無俸且高眠莫愁一夜西窗雨笠澤烟波好放船過甫里謁願公因遇雲門具和尙晴湖百頃寺門橋梵唱魚龍影動搖三要宗風標漢月具公之師同論三􅀇三要四明春雪送江潮具公越人高原落木天邊斷獨夜寒鐘句裏銷布襪靑鞋故山去扁舟蘆荻冷蕭蕭時應佛日請將行代具師答贈微言將絶在江南一杖穿雲過石龕早得此賢開講席便圖作佛住精藍松枝竪義無人㑹貝葉翻經好共參麈尾執來三十載相逢誰似使君談與友人談遺事曾侍驪山清道塵六師講武小平津雲旄大纛星辰動天策中權虎豹陳一自羽書飛紫塞長教征鼓恨黃巾孤臣流涕靑門外徒使田横客笑人追悼秋風蕭索響空幃酒醒更殘淚滿衣辛苦共嘗偏早去亂離知否得同歸君親有媿吾還在生死無端事總非最是傷心看穉女一窗燈火照鳴機見人作布帽盡道溪翁禮數寛頺然脫幘任衰殘花枝莫上山公帽竹籜知非劉氏冠顧我科頭施屋好對人狂笑絶纓難卽今自有遺風在遼海還家管幼安謁范少伯祠在金明寺中有陶朱公里四字石碑􅋈棹滄江學釣魚五湖何必計然書山川禹穴思文種烽火蘇臺弔伍胥浪擲紅顏終是恨拜辭烏喙待何如􅁍嗟愛子猶難免覇越平吳事總虛題登封兩烈婦井梧遺恨詩焦太僕孫婦楊氏牛氏少室山頭二女峰斷猿哀雁暮雲重早題蘚石留貞史却寫椒漿事禮宗恨血千年埋慘淡寒泉三尺炤從容碧梧夜落秋階冷環珮歸來聽曉鐘鴛湖感舊予曾過吳來之竹亭湖墅出家樂張飲後來之以事見法重游感賦此詩落日晴湖放檝􅂞故人曾此共登臺風流頓盡溪山改富貴何常簫管哀燕去妓堂荒蔓合雨侵鈴閣野棠開停橈却望煙深處記得當年載酒來武林謁同門張石平河南人官糧儲觀察湖山曉日鳴笳吹楊柳春風駐羽幢二室才名官萬石兩河財賦導三江舊時笑我連珠勒多難逢君倒玉缸十載弟兄無限意夜深聽雨話西窗登數峰閣禮浙中死事六君子鴻寶倪公茗柯淩公巢軒周公四名施公磊齋吳公賓日陳公四山風急萬松秋遺廟西泠枕碧流故國衣冠懷舊友孤忠日月表層樓赤虹劍血埋燕市白馬銀濤走越州盛事若修陪祀典漢家園寢在昭丘見伐木者鎌斧行人半在腰蒼皮素節委山椒鬼神無語空祠廢鸛雀還歸故壘搖深愧百年多雨露須知千尺本雲霄莫矜小草偏生意烈火平原總寂寥陳靑雷以半圃索題走筆戲贈半間茅屋半牀書半賦閑游半索居領略溪山應不盡平分風月復何如黠癡互有纔忘世廉讓中間好結廬自是圖全非易事與君隨意狎樵漁西冷閨詠四首并序石城卞君者系出田居隱偕􅁞室巖子著同聲之賦􅀇文詠嬌女之篇辭旨幽閑才情明慧寫柔思於􅁍扇選麗句以當窗足使蘇蕙扶輪左芬失步矣故里秦淮早駕木蘭之檝僑居明聖重來油壁之車風景依然湖山非故趙明誠金石之錄卷軸亡存蔡中郎虀臼之詞紙筆猶在予覽其篇什擷彼風華體寄七言詩成四律愧非劉柳聞白雪之歌謬學徐陵叙玉臺之詠已爾落日輕風雁影斜蜀箋書字報秦嘉絳紗弟子稱都講碧玉才人本內家神女新詞塡杜若如來半偈繡蓮花妝成小閣薰香坐不向城南鬭鈿車其二睛樓初日照芙蕖姑射仙人賦子虛紫府高閑詩博士靑山遺逸女尙書賣珠補屋花應滿刻竹成篇錦不如自寫雒神題小像一簾秋水鏡湖居其三五銖衣怯鳯凰雛珠玉爲心冰雪膚綠屩侍兒春祓禊紅牙小妹夜樗蒲瓊窗日暖櫻桃賦粉箑風輕蛺蝶圖頻斂翠蛾人不識自將書札問麻姑其四石城楊柳碧城鸞謝女詩篇張女彈鸚鵡歌調銀管細琅玕字刻玉􅁫寒雙聲宛轉連珠格八體濃纖倒薤看閒整筆牀攤素卷棠棃花發倚闌干海市四首次張石平觀察韻仙人太乙祀東萊不信蓬瀛此地開虹跨斷崖通羽蓋魚吞倒景出樓臺碧城煙合靑蔥樹赤岸霞蒸絳雪堆聞道秦皇近南幸舳艫千里射蛟囘其二灝氣空濛萬象來非煙非霧化人裁僊家囷爲休糧閉河伯宮因娶婦開金馬衣冠蒼水使石鯨風雨濯龍臺鑿空博望頻囘首天漢乘槎未易才其三東南天地望中收神鬼蒼茫百尺樓秦畤長松移絶島梁園修竹隱滄洲雲如車蓋旌旗繞峰近香爐烟靄浮􅁍笑燕齊迂怪士祇知碣石有丹丘其四激浪崩雲壓五湖天風吹斷海城孤干門聽擊馮夷鼔六博看投玉女壺蒲􅁼草荒春徙帳滄􅈚月冷夜探珠誰知曼衍魚龍戯翠蓋金支滿具區別丁飛濤兄弟把君詩卷過扁舟置酒離亭感舊游三陸雲間空想像二丁鄴下自風流湖山意氣歸詞苑兄弟文章入選樓爲道故人相送遠藕花蕭瑟野塘秋贈馮子淵總戎令公專閫擁旌旄鵰鶚秋風賜錦袍十二銀箏歌芍藥三千練甲醉葡萄若耶溪劍凝寒水秦望樓船壓怒濤自是相門雙㦸重野王父子行能高丁亥之秋王烟客招予西田賞菊踰月蒼雪師亦至今年予旣卧病同游者多以事阻追敘舊約爲之􅁣然因賦此詩露白霜高九月天匡牀卧疾憶西田黃雞紫蟹堪携酒紅樹靑山好放船秔稻將登農父喜茱萸遍揷故人憐舊游多病難重省記别蒼公又二年友人齋設餅舎北溪南樹影斜主人留客醉黃花水溲非用淘槐葉蜜餌寍關煮蕨芽閣老膏環常對酒徵君寒具好烹茶食經二事皆堪註休說公羊賣餅家梅村家藏藳卷弟五終

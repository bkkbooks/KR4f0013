front:
  text: 梅村家藏藳卷弟三十一文集九序五
  hash: sha256:3f5b43ca71d1ce2ba80cd0a253d930b3ada7301930b6f8871b35628a3b16bebc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_031-1a}
body:
  text: 周子俶東岡藳序子俶之爲余友也海内莫不聞海内之知余者無不識子俶其識子俶者無不以其交於余也子俶少於余數嵗實兄事余余兩人生同時居同里長同學其文章議論卓然見於當世者人盡知之其合乎性情浹乎道義則恐人未盡知之也子俶之行也余可以無言乎余好覈人物持臧否不能與時俯仰子俶多通而少可性不喜俗儒此其志行同也余坦懷期物不立町畦遇有急難先人後己子俶與人交輸心寫腹不侵然諾其節㮣同也余不問生產通籍二十年􅇴落猶諸生子俶家貧好客室中有圖書千卷無擔石之儲妻子不立其窮困同也余憂時感命坎壈無聊生子俶自以有才不遇醉後酒悲輒據地而哭其侘傺同也其閒有不同者子俶尙黃老面余好佛子俶好飲而余口不識杯鐺廼至辨駮疑滯論難鋒起紛然爭馳久而皆服蓋余兩人互有短長終歸於同者則又如此而余今日畢志家園杜絕人事子俶入京師游太學交王公大人以成名若有異乎兩人之踪跡者余則曰不然夫君子之道可以出而不出可以處而不處皆非也余受遇當年濫叨宮相子俶少而遭亂門戸未顯余稟受羸弱積疢沈綿子俶精力强濟􅀒當世之具子俶而不出則又誰出哉余所患者獨居端憂知交零落止一子俶今又捨我而去則余之德業何所勸過失何所規乎余之窮愁不益深而病苦不益甚乎而余又何以送子俶子俶刻其詩文以問世子俶之才天下所共知天下知子俶爲余之友則其詩若文可以無用余言也亦書其平生之交以告之而已余澹生海月集序金陵余澹生好游游亦不岀江淮吳越然所過必與其地之土大夫流連酬答得詩盈帙以去今年夏從婁縣過海居半月乃還岀其詩海月集示余曰此吾今嵗紀游作也蓋取謝康樂繇赤岸到海所爲挂席拾海月者以名其篇而屬余爲之序余應之曰余君好游古之好游者莫康樂若也今余君之游果能如康樂否耶雖然康樂不知有游者也康樂祖父爲晉室功臣通侯貴重劉宋易姓心念故國憤憤不得意以自放乎山澤之游其本志如此史謂其欲叅權要恨不見收肆意遨遊無復期度廼沈約誣詆前賢以自文其過要未爲知康樂者也獨是志與時違才非世用康樂何不蚤棄侯封絕人事以介於孤峰疊嶂之間而廼鑿山浚湖伐木開徑義故門生隨從數百善游者固如是耶彼蓋􅀒曠代逸才不屑當世淩雲霞弄泉石庶幾古人入山採藥長往不返之風而又以門第之重聲名之高僶勉蜷終莫能躧屣去之也不得已而傲世輕物縱誕詭越以自發其無聊之氣若康樂者所謂有志而未聞道不足以語乎游者也嗟乎世之季也士大夫或沉湎麯蘖或游戲倡樂以自晦而輒以取敗若夫涉名山遊五岳可謂與人無患與世無爭矣然亦必貧賤之士不爲當時所指目者而後能後之君子所以惜康樂之不幸不專咎其過也今我澹生隱鱗戢羽無門戸之遺累榮去羡無裘馬之習其詩之繁富佚蕩甚有似於康樂也而性度既殊境㑹復異故能以其才處平紛亂之㑹優游勿仕卷懷自得雖至乎海濱蕭瑟無人之境葦萑之與居魚蝦之與游而聽潮聲觀日岀徜徉肆覽不廢詠歌彼蓋視人世之險戲得喪變幻而荒忽皆海也吾之劉覽遊渉吐納而容受皆觀於海也而月又安往而不在乎予見世之論海月者類托浮圖心地空明之說至於詩人遊土則僅措之以流連光景而不闇於大道今澹生别我而西也泝西冷上會稽於康樂所挂席而游者將得而親覽焉吾知其必有得也於其游也爲序其詩以問之許堯文詩小引堯文將往廬陵岀一編示余則其在樟亭由拳流連登眺之作而溯進入都懷人贈答居其半焉堯文之才開敏樂易於讀書能采掇其菁華而岀之以杼軸故其詩妍秀深美聲病穩貼雖專門名家莫或過之余與堯文少同里長同學老而灌園連牆比屋槐柳之陰相映草堂燈火相望於池塘林木之間余樵蘇不給而堯文時出斗酒吹洞簫歌呼相應和今將舍我而遠去余撫是編而沈吟若有不釋然者夫廬陵天下之名郡也昔者有先正文章節義著在累朝之册今干戈久息賢人君子接踵而起者流風餘習居然可見堯文過匡山涉馬當以達乎此也江山登臨賓客交游之盛收覽以滋詩笈者且盈緗溢縹膾炙天下此豈吾窮谷之叟抱甕作息帶索而行吟者能窺測其涯涘乎抑吾聞之舊國舊都望之暢然當堯文在樟亭由拳相去不過數舍今江天寥廓之外其於故園竹梧杉檜滋生而拱把芙蕖芍藥芳郁而紛披未嘗不如杜氏之四松陶家之五柳彷徨兩想像也閭井日已荒親友日已耗雖衰遲如余者間與江右士大夫追舊游而話宿好未嘗不如漢濱之老人凔浪之漁父寤寐而興懷也然則其見之於詩者又烏得而已耶他日政成垂組揭節以還鄉里余且盡出其田夫野老之作以是正於堯文得毋從而嗤之曰固哉是夫之爲詩也身窮才退足不出里巷何足與於此乎亦相與爲一笑而已於其行也遂書之以贈趙孟遷詩序孟遷酒人也而長於詩孟遷則曰吾詩人也詩非酒不豪非酒不恣非酒不足以盡其淋漓戃怳奔莽誕宕之致吾取其詩讀之若是乎深有得於酒者或曰孟遷嘗與軍當横刀㑹飮時高吟瞠目老兵詈坐今雖袴褶不完蹩蹩焉爲道旁所摧笑然孟遷不以屑也每痛飲大嚼裸祖呌咷摇頭而歌四座盡驚意氣自若此其爲人憂患哀怒機利變巧不入其􅅐中而皆逃之於酒托之於詩者耶孟遷乎吾烏足以知之永愁篇序取意繇拳分流長水豈非樓名煙雨賦就裁雲湖號鴛鴦詞工織錦耶黃媛介者體自高門夙親柔翰横塘楊柳春盡聞鶯練浦芙蕖月明搗素照影靈光之并􅁓染胭脂看花會景之園香分芍藥固已妍思落於紈扇麗詠溢於縹囊矣逮夫親故凋亡家門況瘁感襄城之荀灌痛越水之曹娥恨碎首以無從顧投身其奚益蔡琰則惟稱亡父馬倫則自道家君隕涕何言傷心而已從此女兒鄕裏恨結羅衣乃聞新婦山頭妝開石鏡惟長楊曾經獻賦而深柳可以讀書所居深柳讀書堂􅀧硯㡳之靑螺足添眉黛記詩中之紅豆便入吹簫共傳得婦傾城翻爲名士却令家人竊視笑似諸生所􅂝唯書卷自隨相見乃鉛華不御發其舊篋爰出新篇卽其春日之詩別倣元和之體可爲妙製允矣妍辭僕也昔見濟尼蚤聞謝藴今知徐淑得配秦嘉是用覽彼篇章加之詮次庶幾東海重聞桃李之歌不數西崑止載蘼蕪之賦爾陸子詠月詩題詞九月旣望梅村藝瓜初罷濁酒自寛維時夜景融融廣除槭槭木葉微墮寒䧹方來歎素質之易􅃜濯淸暉而良苦停杯問影滅燭憐光忽海上孤鶴之飛得雲間士龍之句觀其遷詞宛轉旣好若彈丸體物風流復團如紈扇狀微雲之􅀧綴􅀋秋水之淪漣於焉托旨造端興懷逞藻著玉山之賦摛桂樹之篇卽事皆工緣情匪一若夫西園夜未南内人稀修竹檀欒寒蕪平楚孤舟而四顧無鄰空庭則所思若夢況乎匡山落馭鄴下開筵照子建於高樓動遠公之淸麈而更殘流水岀峨嵋兮半輪塞外長風度玉門者萬里陸子此卷無不體極風騷致兼哀樂昔之作者何足數哉余也端憂多暇摇落爲期嘗撫烏􅍎以驚棲時對玄霜而泣下投贈華章滌開鄙緒似狂同郭翰忽覩銀河亦才愧虞羲敢抽王管惟有乞光泛灩追景徘徊願逐以入懷詎攬之盈手也朱生題詞梅村曰優孟􅀒薪之歌延年遺世之曲古昔伶人抱器類岀新聲自茲以降雖令􅀛年擫管賀老調絲而假手詞流率非已製若朱生者可謂近之矣嗟乎家同履道屈殷胄之風流才似方囘經右軍之賞接況乎今日莫唱渭城念舊人知復存亡在老兵何分得失茍爲曹公之鼓吏孰非田橫之門人卽復科頭胡粉入蒼鶻之羣猶賢乎帖巾反衣學高麗之舞也余雖閉戸守􅀇推欲導情宣鬱忽聞水調驟唱揚州似聆老管重吟隴上武昌老人吹笛少年曾爭曹王連州刺史題詩時輩咸輕米叟率爾援筆遂書簡端非曰安仁之識石家又豈長吉之贈申子惟是危樓長嘯和老嫗之吹箎濁酒素箏引率騶而對飮以自釋其聊蕭而已梅村家藏藳卷弟三十一終

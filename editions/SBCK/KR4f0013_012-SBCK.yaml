front:
  text: 梅村家藏藁卷弟十二詩後集四
  hash: sha256:807e89d656c40167582779b628d1f83efc4cb7e4167f8eb376b4fa4b910d4a43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_012-1a}
body:
  text: 五言律詩八十九首高郵道中四首野宿菰蒲晩荒陂積雨痕湖長城入岸塔動樹浮村漁出沙成路僧歸月在門牽船上瓜埭吹火映籬根其二十里藕塘西浮圖插碧虛霜淸見江楚山斷入淮徐水驛難逢樹溪橋易換魚客程愁幾日已覺久無書其三曾設經年戍殘民早不堪柳營當午道水柵算丁男雪滿防旗暗風傳戰鼓酣淮張空幕府樓艦隔江南其四甓社重來到人家出遠林種荷泥補屋放鴨柳成陰蝦菜春江酒煙簑暮雨砧曹生留畫水三十六陂深高郵有曹生畫水壁米元章極稱之其地有三十六陂淸江閘岸束穿流怒帆遲幾日程石高三板浸鼓急萬夫爭善事監河吏愁逢橫海兵時有事兩粤兵過海上我非名利客􅀊晩肅宵征過姜給事如農侍從知名早蕭條淮海東思親當道梗如農迎母會膠萊有兵亂哭弟在途窮如須避地沒於吳下骨肉悲歌裏君臣信史中翩翩同㮄客相對作衰翁遠路遠路猶兵後寒程况病餘裝綿妻子線致藥友人書晚渡河津馬晨氷驛舍車蕭條故園樹多􅀒向山廬過東平故壘重鎭銅龍第雄邊珠虎牌柳穿驍騎箭花落美人􅁫有客謀亡海無書勸正淮將軍留戰骨狼藉雒陽街旅泊書懷已遇江南雪須防濟北氷扁舟寒對酒獨客夜挑燈流落書千卷淸羸米半升徵車何用急慚媿是無能黃河金龍口決河從北入海淸江宿遷水􅀔稍緩皆起新沙白浪日崔嵬魚龍亦壯哉河聲天上改地脉水中來潮落神鴉廟沙平戲馬臺滄桑今古事戰鼓不須哀桃源縣在黃河南去淮陽八十里豈有秦人住何來浪得名山中難避地河上得孤城桃柳誰曾植桑麻近可耕君看問津處烽火只縱橫膠州時有兵變將已三年憊兵須六郡豪一時緣調遣平昔濫旌旄後顧憂輜重前軍敢遁逃只今宜早擊都護莫辭勞白洋河在淮安西北膠州叛兵從此過河時已收縛膠海愁難定孫恩戰艦多卻聞挑白馬此處渡黃河一戰收豺虎千軍唱槖駝淮西兒女笑􅈚渤亦安波過古城謁三義廟去桃源八十里爲石崇鎭下邳所築非三國時古城也土人以傳訛立廟傳奇有桃源結義耳食附㑹幾以爲眞矣廟貌高原古村巫薦白蘋河山雖兩地兄弟只三人舊俗傳香火殘碑誤鬼神普天皆漢土何必史書眞項王廟在宿遷項王下相人卽其地也救趙非無算坑秦亦有名情深存魯沛氣盛失韓彭垓下騅難逝江東劍不成淒涼思晝錦遺恨在彭城南旺謁分水龍王廟鱗甲往來中靈奇奪禹功平分泰山雨兩使濟河風岸似黃牛斷流疑白馬通始知靑海上不必盡朝東送天台何石湖之官臨晉兼簡蒲州道嚴方公山色界諸盤河流天際看孤城當古渡絶岸入王官社鼓堯祠近鄉書禹穴難若逢嚴夫子爲報故人安送紀伯紫往太原四首不識盧從事能添幕府雄河穿高闕塞山壓晉陽宮霜磧三關樹秋原萬馬風相依劉越石淸嘯戍樓中其二羡殺狂書記翩翩􅀒令名軍知長揖貴客傲敝裘輕酒肆傳呼醉毬塲倒屣迎須看雁門守不及洛陽生其三客舍同三子春風去住愁那知爲此别五月又并州榆筴催征騎榴花落御溝知君分手意端不爲封侯三子韓聖秋胡彦遠及伯紫也時彦遠已先行其四佐府偏多暇從容岸幘時詩成千騎待檄就百城知從獵貪呼妓行邊快賭棊歸將出塞曲唱與五陵兒送友人往眞定五月常山去滹沱雨過淸賣漿無舊隱挾瑟有新聲曳履叢臺客投戈熊耳兵如逢趙公子須重魯連生送純祜兄浙中藩幕四首散吏仍爲客輕帆好過家但逢新種柳莫話久看花黃閣交須舊靑山道未賒獨嗟兄弟遠辛苦滯京華其二一第添憔悴似君遭遇稀杜門先業廢乞祿壯心違歌管移山棹湖光上客衣浪遊裝苟足叩我故園扉其三亦有湖山興棲遲減宦情官非遷吏傲客豈故侯輕粉壁僧寮畫煙堤妓舫聲從容趨府罷斗酒聽流鶯其四忽忽思陳事全家客剡中江山連暮雨身世隔殘虹高館燃官燭淸猿呌曉風一竿秋色裏踪跡媿漁翁曹秋岳龔芝麓分韻三首贈趙友沂得江州書三字䇿馬高原去煙鴻仰視雙疏鐘穿落木殘日動寒江浪跡愁偏劇孤懷俠未降舊交相見罷沽酒話南窗其二誰識三公子蕭條下澤車門高輕仕宦才大狎樵漁黃葉窮幽興靑山出異書不須身貴早千騎上頭居其三已歸仍是客不遇卻難留更作異鄉別倍添游子愁風霜違北土兵甲阻西州一雁低飛急關河萬里秋病中別孚令弟十首昨􅀊衝寒別蕭條北固樓關山重落木風雪又歸舟地僻城鴉亂天長塞雁愁客程良不易何日到揚州其二秋盡霜鐘急歸帆畏收風家貧殘雪裏門閉亂山中客睡愁難熟鄉書喜漸通長年沽市酒宿火夜推篷其三十日長安住何曾把酒尊病憐兄彊飯窮代女營婚別我還歸去憐渠始出門往來幾半載辛苦不須論其四消息憑誰寄羈愁祇自哀逾時游子信到日老人開久病吾猶在長途汝卻囘白頭驚起問新喜出京來其五早達成何濟遭時信眇歡客游三月病世路一生難憂患中年集形容老輩看相逢俱壯盛五十未爲官其六此意無人識惟應父子知老猶經世亂健反覺兒衰萬事愁何益浮名悔已遲北來三十口盡室更依誰其七似我眞成誤歸從汝仲兄教兒勤識字事母學躬耕州郡羞干請門庭簡送迎古人親在日絕意在虛名其八老母營齋誦家貧只此心飯僧餘白㲲裝佛少黃金骨肉情難盡關山思不禁楞嚴經讀罷無語淚痕深其九寡妹無家苦抛離又一年老親頻念此別語倍澘然性弱孤難立門衰產易捐獨留兄弟在中外幾人憐其十穉子稱奇俊迎門笑語忙挽鬚憐尙幼摩頂喜堪狂小輩推能慧新年料已長吾家三萬卷付託在兒郎再寄三弟二首拙宦眞無計歸謀數口資海田人戰後山稻雨來時官稅催應早鄉租送易遲荷鋤西舍􅅱憐我問歸期其二五畝山園勝春來客喚茶籬荒謀補竹溪泠課栽花石迸牆根動松欹屋脚斜東莊租茍足修葺好歸家送王元照行止頻難定裝輕忽戒途望人離樹立征棹入雲呼野色平沙雁朝光斷岸蘆此中蕭瑟意非爾不能圖送孫令修游眞定窮達非吾事霜林萬象凋北風吹大道别酒置河橋急雪􅅆征雁低雲壓怒雕曾爲燕趙客寥落在今朝送周子俶張靑琱往河南學使者幕六首不第仍難去棲遲幕府游幾人推記室自古在中州置酒龍門夜論文虎觀秋得依張壯武揮塵盡風流其二少室多奇士君尋到幾峰山深惟杖䇿雲盡卻聞鐘文字眞詮近鬚眉道氣濃相貽書一卷歸敕葛陂龍子俶好道其三二陸來江左三張入雒中賦誇梁苑雪歌起鄴臺風傖父休輕笑吳儂雅自雄短衣頻貰酒射獵過城東其四誰失中原計經過廢壘高秋風向廣武夜雨宿成臯此地關河險曾傳將士勞當時軍祭酒何不用吾曹其五極目銅駝陌宮牆噪晚鴉北邙空有骨南渡更無家靑史憐如意蒼生遇永嘉傷心譚往事愁見雒陽花其六河流天地盡白日待銷沉不謂斯文喪終存萬古心典墳留太學鐘鼓起華林淸雒安瀾後遺編定可尋送湘陰沈旭輪謫判深州四首謫宦經年待蹉跎􅁰此州猶然領從事未得比諸侯旅食沾微祿官途託浪游卻嫌持手板㕔壁姓名留其二月出瀟湘水思家正􅄅然不知西去信可上北來船故舊憐除目妻孥笑俸錢免教烽火隔飄泊楚江邊其三此亦堪爲政無因笑傲輕爾能高治行世止薄科名煙井流移復春苗斥鹵耕古來稱一尉何必尙專城其四豈不貪高卧其如世路非故園先業在多難幾時歸遇事愁宮長逢人羡布衣君看洞庭雁日夜向南飛送王子彥南歸四首得失歸時輩如君總不然共知三徑志早定十年前身業先疇廢家風素德傳蕭條書一卷重上故鄉船其二一第雖無意名塲技有餘解頤匡鼎說運腕率更書材已遭時棄官猶辱詔除白頭纔一命需次復何如子彦已謁選得官需次未授其三錯受塵途誤栖栖早半生中年存舊業雅志畢躬耕憂患妨高卧衰遲累遠行與君嗟失路不獨爲無成其四客裏逢中表登臨酒一杯好將身計拙留使後人材燈火鄉園近風塵笑語開相攜孫入抱解喚阿翁來子彦近得孫余之外孫也代州萬里無征戍三關卻晏然河來非漢境雪積自堯年將老空屯卧僧高絶漠還中原偏戰鬬此地不爲邊送穆苑先南還四首遍欲商身計相逢話始眞幸留殘􅀊伴忍作獨歸人年逼愁中老家安夢裏貧與君謀共隱爲報故園春其二驟見疑還喜堪當我半歸路從今日近信果向來稀同事交方散殘編道已非老親看慰甚坐久更沾衣其三舍弟今年別臨分恰杪秋苦將前日淚重向故人流海國愁安枕鄉田喜薄收相期裁數紙春雨便歸舟其四庭樹書來長空堦落葉黃酒乘今夜月夢遶一林霜客過探松塢童饑偃石牀因君謝猿鶴開我北山堂送何蓉菴出守贑州四首想見征途便還家正早秋江聲連賜第帆影上浮丘兒女貪成長親朋感去留無將故鄉夢不及石城頭其二郡閣登臨逈江湖已解兵百灘爭二水一嶺背孤城石落蛟還鬬天淸雁自橫新來賢太守官柳戰塲生其三三載爲郎久棲遲共一貧師恩衰境􅀒友道客途眞世德推醇謹鄉心入隱淪蕭條何水部未肻受風塵其四弱息憐還幼扶持有大家高門雖宦迹遠嫁况天涯小字裁魚素長亭響鹿車白頭雙淚在相送日將斜猿得食驚心裏逢人屢顧中側身探老樹長臂引秋風傲弄忘形便羈棲抵掌工怱如思父子囘呌故山空槖駝獨任三軍苦安西萬里行鑄銅疑鶴頸和角廢驢鳴山􅀒祁連重泉知鄯善淸可憐終後載汗血擅功名象神象何年至傳聞自戰塲齒能齊玉德性不受金創白足跏趺坐黃門拜舞行越人歸駕馭未許鼻亭狂牛瑩角偏轅快奔蹄伏軛窮賣刀耕隴上執靷犒軍中游刃庖丁技扶犂田父功君王思繭栗座右置豳風時頒戒殺牛文蒲萄百斛明珠富淸陰翠幕張曉懸愁欲墜露摘愛先嘗色映金盤果香流玉椀漿不勞葱嶺使常得進君王石榴五月華林宴榴花入眼來百株當戸牖萬火照樓臺絳帳垂羅袖紅房出粉腮江南逢巧笑齲齒向人開江甫石榴多裂江北獨否蘋婆漢苑收名果如君滿玉盤幾年沙海使移入上林看對酒花仍豔經霜實未殘茂陵消渴甚飽食勝加餐文官果近世誰來尙何因擅此名小心氷骨細虛體綠袍輕味以經嘗淡香從入手淸時珍誇衆口殽核太縱橫氷淸濁看都淨長安喚買氷見來消易待欲問價偏增潔自盤中顯涼因酒後勝若求調燮理坐上去靑蝇南苑春蒐應制詔閱期門旅鐃歌起上林風雲開步伍草木壯登臨天子三驅禮將軍百戰心割觧親讌罷吿語主恩深送田髴淵孝廉南還四首客路論投分三年便已深每尋蕭寺約共話故園心遠水明浮棹疏村響急砧㶚亭橋畔柳恰爲兩人陰其二窮老無相識如君得數過祗貪懷抱盡其奈别離多晝靜堪攤卷江寛足放歌勝游佳絶處囘首隔關河其三拂袖非長䇿蹉跎爲老親還家仍作客不仕卻依人勝識酧知已奇懷荅鬼神鏡湖千丈月莫染雒陽塵其四浪迹存吾道風流獨有君羣公雖走幣狂客自掄文樽酒堪呼月雙峰看出雲可憐滄海上宋玉正參軍偶見挾彈打文鵞翻身馬注坡輕鞭過易水大雪滿滹沱錦㡌垂靑鼠銀罌出紫駝少時從出塞十五便橫戈送詹司理之官濟南詹楚人余所得士匹馬指營邱風淸肅爽鳩齊言盈萬戸楚客長諸侯梅發江關信松高日觀秋故人慚鮑叔相送話東游幼女抱去纔周晬應難記別時信來偏早慧似解識京師書到遲囘問人前含吐詞可憐汝母病臨絶話相思送程太史翼蒼謫姑蘇學博道重何妨謫官輕卻便歸程門晴雪逈吳市暮山微舊俗􅁌歌在前賢文字非卽今崇政殿寥落侍臣衣送郭宮賛次庵謫宦山西薄宦知何恨秋風刷羽毛因沾太行雪憶賜未央􅂁問俗壺關老籌邊馬邑豪爭傳郭有道名姓壓詞曹送純祐兄之官確山四首五十猶卑宦栖栖在此行官從鵞炙貴客向馬蹄輕風俗高持論山川喜罷兵淸時人物重縣小足知名其二絶有明湖勝靑山屬蔡州曾爲釣臺客今作朗陵侯定訪袁安卧須從叔度游政閒人吏散㕔壁掃丹丘其三懸瓠城西路關山雪夜刀至今勞戰伐何日剪蓬蒿地瘠軍租少官輕客將豪相逢蔡父老閒說漢功曹其四落日龍陂望西風動黍禾歸人淮右近名士汝南多河上孤城逈天中萬馬過一官凋療後兄弟意如何梅村家藏藁卷弟十二終

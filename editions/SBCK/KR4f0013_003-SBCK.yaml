front:
  text: 梅村家藏藁卷弟三詩前集三
  hash: sha256:022e8dbbda78233f5e8fca6e81e53d49b199e169d056793f1301d8e665e7b19d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_003-1a}
body:
  text: 七言古詩二十三首永和宮詞揚州明月杜陵花夾道香塵迎麗華舊宅江都飛燕井新侯闗内武安家雅歩纎腰初召入鈿合金釵定情日豐容盛鬋固無雙蹴踘彈碁復第一上林花鳥寫生綃禁本鍾王㸃素毫楊栁風㣲春試馬梧桐露冷暮吹簫君王宵旰無歡思宫門夜半傳封事玉几金牀少晏眠陳娥衛􅃩誰頻侍貴妃明慧獨承恩宜笑宜愁慰至尊皓齒不呈㣲索問蛾眉欲蹙又温存本朝家法脩清讌房帷久絶珍竒薦敕使惟追陽羡茶内人數減昭陽膳維揚服製擅江南小閣爐烟沉水含私買瓊花新様錦自修水遞進黄柑中宫謂得君王意銀鐶不妬温成貴早日艱難䕶大家比来歡笑同良娣奉使龍樓賈佩蘭往還偶失兩宫歡雖云樊嫕能辭令欲得昭儀喜怒難緑綈小字書成印瓊函自署充華進請罪長教聖主憐含辭欲得君王愠君王内顧惜傾城故劍還存敵體恩手詔玉人䝉詰問自来階下拭啼痕外家官拜金吾尉平生游俠多輕利縛客因催博進錢當筵便殺彈筝伎班姬才調左姬賢霍氏驕奢竇氏専涕泣㣲聞椒殿詔笑譚豪奪灞陵田有司奏削将軍俸貴人冷落宫車夢永巷傳聞去玩花景和門裏誰陪從天顔不懌侍人愁后促黄門召共游初勸官家佯不應玉車早到殿西頭兩王最小牽衣戲長者讀書少者弟聞道羣臣譽定陶獨将多病憐如意豈有神君語帳中漫云王母降離宫巫陽莫救蒼舒恨金鎖彫殘玉筯紅從此君王慘不樂叢臺置酒風蕭索已報河南失數州況經少子傷零落貴妃痩損坐匡床慵髻啼眉掩洞房豆䓻湯溫冰簟冷荔枝漿熱玉魚凉病不禁秋淚沾臆裴囘自絶君王膝苔沒長門有夢歸花飛寒食應相憶玉匣珠襦啟便房薤歌無異葬同昌君王欲製哀蟬賦誄筆詞臣有謝莊頭白宫娥暗嚬蹙庸知朝露非爲福宫草明年戰血腥當時莫向西陵哭窮泉相見痛倉黄還向官家問永王幸免玉環逢喪亂不須銅雀怨興亡自古豪華如轉轂武安若在憂家族愛子雖添北渚愁外家已葬驪山足夜雨椒房隂火青杜鵑啼血濯龍門漢家伏后知同恨止少當年一貴人碧殿淒涼新木拱行人尚識昭儀塚麥飯冬青問茂陵斜陽蔓草埋殘壠昭邱松檟北風哀南内春深擁夜来莫奏霓裳天寳曲景陽宫井落秋槐琵琶行并序去梅村一里爲王太常烟客南園今春梅花盛開予偶歩到此忽聞琵琶聲出於短垣叢竹間循牆側聽當其妙處不覺拊掌主人開門延客問向誰彈則通州白在湄子彧如父子善琵琶好爲新聲須臾花下置酒白生爲予朗彈一曲廼先帝十七年以来事敘述亂離豪嘈凄切坐客有舊中常侍姚公避地流落江南因言先帝在玉熈宫中梨園子弟奏水嬉過錦諸戲内才人於暖閣齎鏤金曲柄琵琶彈清商雜調自河南㓂亂天顔常慘然不悦無復有此樂矣相與哽咽者久之於是作長句紀其事凡六百二言仍命之曰琵琶行琵琶急響多秦聲對山慷慨稱入神同時渼陂亦第一兩人失志遭遷謫絶調王康並盛名崑崙摩詰無顔色百餘年來操南風竹枝水調謳吳儂里人度曲魏良輔髙士填詞梁伯龍北調猶存止􅁌索朔管胡琴相間作盡失傳頭誤後生誰知却唱江南樂今春偶歩城南斜王家池館彈琵琶悄聽失聲呌竒絶主人招客同看花爲問按歌人姓白家住通州好尋覓袴褶新更囘鶻裝虬鬚錯認龜茲客偶因同坐話先皇手把檀槽涙數行抱向人前訴遺事其時月黒花茫茫初撥鵾􅁌秋雨滴刀劍相磨轂相撃驚沙拂面鼓沈沈砉然一聲飛霹靂南山石裂黄河傾馬蹄迸散車徒行鐵鳯銅盤柱摧塌四條􅁌上烟塵生忽焉摧藏若枯木寂寞空城烏啄肉轆轤夜半轉吚啞嗚咽無聲貴人哭碎珮叢鈴㫁續風冰泉凍壑瀉淙淙明珠瑟瑟抛殘盡却在輕籠慢撚中斜抹輕挑中一摘漻慄颼飀憯肌骨銜枚鐵騎飲桑乾白草黄沙夜吹笛可憐風雪滿闗山烏鵲南飛行路難􅆐嘯鼯啼山鬼語瞿塘千尺響鳴灘坐中有客淚如霰先朝舊􅀡乾清殿穿宫近侍拜長秋咬春燕九陪游燕先皇駕幸玉熙宮鳯紙僉名喚樂工苑内水嬉金傀儡殿頭過錦玉玲瓏一自中原盛豺虎煖閣才人撤歌舞挿栁停搊素手筝燒燈罷擊花奴鼓我亦承明侍至尊止聞古樂奏雲門段師淪落延年死不見君王賜予恩一人勞悴深宫裏賊騎西来趨易水萬嵗山前鼙鼓鳴九龍池畔悲笳起換羽移宫總㫁腸江村花落聽霓裳龜年哽咽歌長恨力士淒涼説上皇前輩風流最堪羡明時遷客猶嗟怨即今相對苦南冠昇平樂事難重見白生爾盡一杯酒繇来此伎推能手岐王席散少陵窮五陵召客君知否獨有風塵潦倒人偶逢絲竹便沽巾江湖滿地南鄉子鐵笛哀歌何處尋宫扇宣皇清暑幸離宫碧檻青疏十二重七寳鑄銅薫鴨貴千金甆翠鬬雞紅玳瑁簾開南内宴沈香匣啟西川扇蟬翼描来雲母輕冰紈製就天孫􅃩丹霞滃起駕雲軿王母雙成絳節還玉管鳯銜花萬夀銀濤龍蹴海三山芙蓉水殿琉璃徹内家尚苦櫻桃熱九華初御詠招凉落葉廻風若霜雪峩眉萬里尚方船雉尾千秋奏御箋公主合歡嬌翡翠昭容反影鬬嬋娟遭逢召見南薫殿思陵日昃猶揮汗天語親傳賜近臣先生進講豳風倦黄羅帕捧出雕䦨畫箑丹青掌上看俸薄買嫌燈市價恩深攜謝閤門班自離卷握秋風急蹇驢便面誰人識聞道烽烟蔽錦城齊紈楚竹無顔色石榴噴火照皇都再哭蒼梧媿左徒舊内謾懸長命縷新宫徒貼辟兵符雨夜牀頭搜廢篋摩挲老眼王家物半面猶存蛺蝶圖空箱尚記霓裳疊蠧粉黄侵瓊樹花麯塵香損紫鸞車珠衣五翟悲秦女玉墜雙魚泣漢家莫歎君恩長㫁絶比来舒卷仍鮮潔乍可􅁭披宋玉風不堪袖掩班姬月宣宗御用戧金蟋蟀盆歌宣宗在御昇平初便殿進覽豳風圖煖閣才人籠蟋蟀晝長無事爲歡娛定州花甆賜湯沐玉粒瓊漿供飲啄戧金髹漆隠雙龍果厰雕盆錦香褥佽飛著翅逞腰身玉砌軒鬐試一鳴性不近人須耿介才堪却敵在僄輕君王暇豫留深意棘門霸上皆兒戲鬬雞走狗謾成功今日親觀戰場利坦顙長身張兩翼鋸牙植股鬚如㦸漢家十二羽林郎蟲達封侯功第一臨淮真龍起風雲二豪螟蛉張與陳草間竊伏竟何用竈下厮飬非吾羣大将中山獨持重却月城開立不動兩目相當振臂呼先聲作勢多操縱應機變化若有神僄突彷彿常開平黄鬚鱻卑見股栗垂頭折足亡精魂獨身跳免追且急拉折攀翻只一擲蠮螉塞外蠕蠕走使氣窮搜更深入當前㧞栅賭先登奪采爭籌爲主人自分一身甘瓦注不知重賞用黄金君王笑謂當如此楚漢雌雄何足齒莫􅅓超距浪輕生横草功名須致死二百年来無英雄故宫瓦礫吟秋風一寸山河鬭蠻觸五千甲士化沙蟲灌莽㣲軀亦何有捉生誤落兒童手蟻賊穿墉負敗胔戰骨雖香嗟速朽凉秋九月長安城黑鷹指爪愁雙睛錦韋玉縧競馳逐頭鵞宴上爭輸贏鬬鴨欄空舞馬死開元萬事堪傷心秘閣圖書遇兵火厰盒宣窑賤如土名都百嵗少人傳貴戚千金向誰賭樂安孫郎好古癖剔紅填漆收藏得我来山館見雕盆蟋蟀秋聲増歎息嗚呼漆城蕩蕩空無人哀螿切切啼王孫貧士征夫盡流涕惜哉不遇飛将軍聽女道士卞玉京彈琴歌鴐鵞逢天風北向驚飛鳴飛鳴入夜急側聽彈琴聲借問彈者誰云是當年卞玉京玉京與我南中遇家近大功坊底路小院青樓大道邉對門却是中山住中山有女嬌無雙清眸皓齒垂明璫曽因内宴直歌舞坐中瞥見塗鴉黄問年十六尚未嫁知音識曲彈清商歸來女伴洗紅妝枉将絶技矜平康如此纔足當侯王萬事倉皇在南渡大家幾日能枝梧詔書忽下選蛾眉細馬輕車不知數中山好女光徘徊一時粉黛無人顧􅃩色知爲天下傳髙門愁被旁人妬盡道當前黄屋尊誰知轉盼紅顔誤南内方看起桂宫北兵早報臨瓜歩聞道君王走玉驄犢車不用聘昭容幸遲身入陳宫裏却早名填代籍中依稀記得祁與阮同時亦中三宫選可憐俱未識君王軍府抄名被驅遣漫詠臨春瓊樹篇玉顔零落委花鈿當時錯怨韓擒虎張孔承恩已十年但教一日見天子玉兒甘爲東昏死羊車望幸阿誰知青塚淒涼竟如此我向花間拂素琴一彈三歎爲傷心暗将别鵠離鸞引寫入悲風怨雨吟昨夜城頭吹篳篥教坊也被傳呼急碧玉班中怕㸃留樂營門外盧家泣私更裝束出江邉恰遇丹陽下渚船翦就黄絁貪入道攜来綠綺訴嬋娟此地繇来盛歌舞子弟三班十番鼓月明絃索更無聲山塘寂寞遭兵苦十年同伴兩三人沙董朱顔盡黄土貴戚深閨陌上塵吾輩漂零何足數坐客聞言起歎嗟江山蕭瑟隠悲笳莫将蔡女邉頭曲落盡吳王苑裏花南生魯六真圖歌并引山東南生魯官浙之觀察命謝彬畫已像而劉復補山水凡六圖其一坐方褥聽兩姬搊筝吹洞簫其一焚香彈琴流泉瀉堦下旁一姬聽倦倚石一㑹兩少年蹴踘戲毬擲空中勢欲落一圖書滿牀公左顧笑有髫而秀者端拱榻前若受書狀則公子也餘二圖則畫藤橋横㫁壑中非人境公黄冠椶拂掉首不顧一則深巖枯木有頭陀趺坐披布衲即公也予爲作六真圖歌鑱之石土覽者可以知其志矣明湖夜雨天涯客握手停杯話疇昔人生竟作畫圖看拂卷生綃開數尺長身玉立于思翁美人促柱彈春風一聲兩聲玉簫急吹落碧桃無數紅旁有一姝嬌倚扇聽君手拂湘妃怨抱琴危坐鬚飄然知入清徽廣陵散出門逐伴車如風築毬會飲長安中歸来閉門閒課子石榻焚香列圖史我笑此翁何太竒彈琴蹴踘皆能爲讀書終老豈長策乘雲果欲鞭龍螭神仙吾輩盡可學六慱吹笙游戲作不信晩年圖作佛趺坐蒲團貪睡著丈夫雄心竟若此世事悠悠何足齒興来展翫自掀髯椶拂藤鞋自茲始劉君水石謝君圖解衣盤礴工揣摩平生嗜好經想像須臾㸃出雙清矑置身其間真快樂聲酒琴書資笑謔縱然仙佛兩無成如此溪山良不惡吾聞宗少文曽寫尚子平阮生長嘯逢蘇門祖孫妙筆多天真君不見興宗年少香山老不及丹青似舊人後東臯草堂歌君家東臯枕山麓百頃流泉浸花竹石田書畫數百卷酷嗜平生手藏錄隠囊麈尾寄蕭齋鴻鵠髙飛鷹隼猜白社青山舊居在黄門北寺捕車來有詔憐君放君去重到故鄉棲隠處短策仍看屋後山扁舟却繋門前樹此時鈎黨雖縱横終是君王折檻臣放逐縱縁當事意江湖還頼主人恩一朝龍去辭鄉國萬里烽烟歸未得可憐雙㦸中丞家門帖淒凉題賣宅有子單居持户難呼門吏怒索家錢窮搜廢篋應無計棄擲城南五尺山任移花藥鄰家植未剪松杉僧舍得漁舟網集習家池官道人牽到公石石礎雖留不記亭槿籬還在半無門欹橋已㫁連僵栁醉壁誰扶倚痩藤尚有荒祠叢廢棘豐碑草没猶堪識堦前田父早歌呼陌上行人増歎息我初扶杖過君家開尊九月逢黄花秋日溪山好圖畫石田真蹟深咨嗟傳聞此圖再易主同時賓客知存幾又見溪山改舊觀雕欄碧檻今已矣摇落深知宋玉愁衡陽雁㫁楚天秋斜暉有恨家何在極浦無言水自流我来草堂何處宿挑燈夜把長歌續十年舊事總成悲再賦閒愁不堪讀魏寢梁園事已空杜鵑寂寞怨西風平泉獨樂荒榛裏寒雨孤村聽瞑鐘汲古閣歌人家有汲古閣毛晉字子晉常熟嘉隆以後藏書家天下毘陵與瑯琊整齊舊聞收放失後来好事知誰及比聞充棟虞山翁里中又得小毛公搜求遺逸懸金購繕寫精能鏤板工繇来斯事推趙宋歐虞楷法看飛動集賢院印校讐精太清樓本裝潢重損齋手䟦爲披圖蘇氏題觀在直廬館閣百家分四庫巾箱一幅盡三都本朝儒臣典制作累代縹緗輸秘閣徐廣雖編石室書孝徵好竊華林略兩京太學藏經史奉詔重脩賜金紫髙齋學士費餐錢故事還如寫黄紙釋典流傳自洛陽中官經厰䕶焚香諸州各請名山藏總目難窺内道塲南湖主人爲嘆息十年心力恣收拾史家編輯過神堯律論流通到羅什當時海内多風塵石經馬矢髙丘陵已壊書囊縳作袴復驚木冊摧爲薪君家髙閣偏無恙主人留宿傾家釀醉來燒燭夜攤書雙眼摩挲覺神王古人闗書借三館羡君自致五千卷又云獻書輒拜官羡君帶索躬耕田伏生藏壁遭書禁中郎秘惜矜談進君獲竒書好示人雞林巨賈争摹印讀書到死苦不足小學雕蟲置廢簏君今萬卷盡刋訛邢家小兒徒碌碌客来詩酒話生平家近湖山擁百城不數當年清閠閣亂離踪跡似雲林東萊行須兄弟作也爲姜如農如漢皇策士天人畢二月東巡臨碣石獻賦凌雲魯兩生家近蓬萊看日出仲孺召入明光宫􅀘過拾遺稱侍中叔子輶軒四方使一門二妙傾山東同時里人官侍從左徒宋玉君王重就中最數司空賢三十孤卿需大用君家兄弟俱承恩感時危涕長安門侍中叩閣數彊諫上書對仗彈平津天顔不懌要人怨衛尉捉頭捽下殿中㫖傳呼赤棒來血裹朝衫路人㸔愛弟棄官相追從避兵盡室來江東本爲逐臣溝壑裏却因奉母亂離中三年流落江湖夢茂陵荒草西風慟頭顱雖在故人憐髀肉猶爲舊君痛我來扶杖過山頭把酒論文遇子由異地客愁君更逺中原同調幾人留司空平昔躭佳句千首詩成罷官去戰鼓東來白骨寒二勞山月魂何處左氏勲名照汗青過江忠孝數中丞孺卿也向龍沙死柴市何人哭子卿只君兄弟天涯客漂零尚是烟霜隔思歸詩寄廣陵潮憶弟書来虎丘石囘首風塵涕涙流故鄉蕭瑟海天秋田横島在魚龍冷欒大城荒草木愁當日竹宫從萬騎祀日歌風何意氣㫁碑年月記乾封柏梁侍從誰承制魯連蹈海非求名鴟夷一舸甯逃生丈夫淪落有時命豈復悠悠行路心我亦滄浪釣船繫明日隨君買山住鴛湖曲亭作爲竹鴛鴦湖畔草黏天二月春深好放船桞葉亂飄千尺雨桃花斜帶一溪煙煙雨迷離不知處舊堤却認門前樹樹上流鶯三兩聲十年此地扁舟住主人愛客錦筵開水閣風吹笑語來畫鼔隊催桃葉伎玉簫聲出柘枝臺輕靴窄䄂嬌妝束脆管繁弦競追逐雲鬟子弟按霓裳雪面参軍舞鸜鵒酒盡移船曲榭西滿湖燈火醉人歸朝來别奏新翻曲更出紅妝向栁堤歡樂朝朝兼暮暮七貴三公何足數十幅蒲帆㡬尺風吹君􅀡上長安路長安富貴玉驄嬌侍女薰香護早朝分付南湖舊花栁好留烟月伴歸橈那知轉眼浮生夢蕭蕭口影悲風動中散彈琴竟未終山公啟事成何用東市朝衣一旦休北邙坏土亦難留白楊尚作他人樹紅粉知非舊日樓烽火名園竄狐􅈷畫閣偷窺老兵怒甯使當時沒縣官不堪朝市都非故我來倚棹向湖邉烟雨臺空倍惘然芳草乍疑歌扇緑落英錯認舞衣鮮人生苦樂皆陳迹年去年来堪痛惜聞笛休嗟石季倫銜杯且效陶彭澤君不見白浪掀天一葉危收竿還怕轉船遲世人無限風波苦輸與江湖釣叟知項黄中家觀萬嵗通天法帖王氏勲名自始興後人書法擅精能江東將相傳家在翰墨風流天下稱前有瑯琊今檇李項氏由来堪竝美襄毅旂常戰伐高墨林書畫聲名起當時海内號收藏秘閣圖書玉軸裝近代丹青推董巨名家毫素重鍾王鍾王妙蹟流傳舊貞觀在御窮搜購盡隨萬乘入昭陵人間一字無遺漏碑石猶存腕鋒出風摧雨剝苔文脫棗木鐫來波磔非牋麻搨就戈鋩失君家此書何處傳云是萬嵗通天年則天酷嗜二王法詔求手迹千金懸從官方慶拜表進臣祖羲獻與僧䖍生平行草數十紙龍蛇盤蹙開天顔賜官五階帛百疋仍勅能手䨇鉤填裝成用寳進御府不知何事流人間我思羲之負逺略北伐貽書料强弱惜哉徒令書畫傳誓墓功名氣蕭索江東無事富山水興來灑筆臨池樂足知文采頼昇平父子優游擅家學只今海内無高門稽山越水烽烟作春風掛席由拳城夜雨君齋話疇昨嗚呼吾友雅州公舒毫落紙前人同一官烏撒沒坏土萬巻青箱付朔風少伯湖頭鼙鼔動尚書第内烟塵空可憐累代圖書盡斷楮殘編墨林印此巻仍逃刼火中老眼縱横㸔筆陣君真襄毅之子孫相逄意氣何相親卽看書畫與金石詔求不屑辭家貧嗟乎世間竒物戀故主留取縹緗傲絶倫蕭史青門曲蕭史青門望明月碧鸞尾掃銀河濶好畤池臺白草荒扶風邸舎黄塵没當年故后媫妤家槐市無人噪晩鴉却憶沁園公主第春鶯嗁殺上陽花嗚呼先皇寡兄弟天家貴主稱同氣奉車都尉誰最賢鞏公才地如王濟被服依然儒者風讀書妙得公卿譽大内傾宫嫁樂安光宗少女宜加意正值官家從代來王姬禮數從優異先是朝廷啟未央天人寜徳降劉郎道路爭傳長公主夫壻豪華勢莫當百兩車來填紫陌千金榼送出雕房紅窗小院調鸚鵡翠館繁筝呌鳯凰白首傅璣阿母飾綠鞲大䄂騎奴裝灼灼夭桃共穠李兩家姊妹驕紈綺九子鸞雛鬬玉􅁫􅁫工百萬恣求取屋裏熏爐滃若雲門前鈿轂流如水外家肺腑數尊親神廟榮昌主尚存話到孝純能識面抱來太子輒呼名六宫都講家人禮四節頻加戚里恩同謝面脂龍徳殿共乘油壁月華門萬事榮華有消歇樂安一病音容沒莞蒻桃笙朝露空温明秘器空堂設玉房珍玩宫中賜遺言上獻依常制却添駙馬不勝情至尊覽表爲流涕金冊珠衣進太妃鏡奩鈿合還夫婿此時同產更無人寍徳來朝笑語真憂及四方宵旰甚自家兄妹話艱辛明年鐵騎燒宫闕君后倉黄相訣絶仙人樓上看灰飛織女橋邊聽流血慷慨難從鞏公死亂離怕與劉郎别扶攜夫婦出兵間改朔移朝至今活粉碓脂田縣吏收妝樓舞閣豪家奪曽見天街羡璧人今朝破㡌迎風雪賣珠易米返柴門貴主凄凉向誰説苦憶先皇涕淚漣長平嬌小最堪憐青萍血碧它生果紫玉魂歸異代緣盡歎周郎曽入選俄驚秦女遽登仙青青寒食東風栁彰義門邊冷墓田昨夜西窗仍夢見樂安小妹重歡讌先后傳呼喚捲簾貴妃笑折櫻桃倦玉階露冷出宫門御溝春水流花片花落囘頭往事非更殘燈灺淚沾衣休言傅粉何平叔莫見焚香衛少兒何處笙歌臨大道誰家陵墓對斜暉只看天上瓊樓夜烏鵲年年它自飛百花驄歌百花驄者北方之奇駟也有少年將以七百金購之騎遇漢壽亭侯祠伏地且僵願以馬輸祠中乃起澌鳴入廡下泥馬忽自敗遂立其處頭脊凥脽如一日中堦下齕水草巳植立如初明年大亂因失所有客有傳其事者爲作此歌紀異也漢家龍媒失御策紫陌青門少行跡長楸脫㘘走荆州逸足翻空爭赤壁英雄一去時世改驊騮慘淡無顔色空留匹練守虚廊雨鬛風鬢騎不得誰似征西幕府雄千金買馬䕶名驄銀騅亂點桃花雪玉鐙長嘶柳葉風不向山前齕水草却來江上乘騕褭路岀龍沙講武塲雙鍵結束兒郎好漢壽祠前看射鶻彎弓仰笑霜蹏蹶廐僕圉人起歎嗟踠足垂頭口流沫將軍四願忽躊蹰此馬或遭鬼神奪但留駿骨在人間願納堦墀馬倐活直入當軒立不去蹄噭恰當鬼馬處赤汗沾胸似戰歸青絲絡頸如人御一時喧動劉繇城狐鳴魚腹三軍驚釃酒共推銅馬卽推牛大㑹下江兵湓口潯陽聴鼙鼓前驅巳逼濡須䲧盡道章門屬華歆卽看建業愁黄祖鬱孤臺畔解征較內顧逡巡十八灘嶺表鑄銅馳檄遠祁山刻木餉軍難可憐萬馬俱神駿伏􅌴啣恩常陷陣于禁城中召北軍糜芳帳下輸南郡不信烏騅负主人十年鞭策苦風塵玉關巳破嫖姚死躑躅重來被錦茵獨有花驄偏掉鞅哀鳴踣地英姿爽江城春草捲黄沙夜半忽隨風雨往興亡自古堪嗟惜吞呉遣恨終何益汗血千年䠞蹋聲麒麟地上無人識君不見苜蓿西風石馬秋茂陵煙樹自修修英雄淚盡當陽坂髀肉空銷劉豫州圓圓曲鼎湖當日棄人間破敵收京下玉關慟哭六軍俱縞素衝冠一怒爲紅顔紅顔流落非吾戀逆賊天亡自荒讌電埽黄巾定黑山哭罷君親再相見相見初經田竇家侯門歌舞出如花許將戚里箜篌伎等取將軍油壁車家本姑蘇浣花里圓圓小字嬌羅綺夢向夫差苑裡遊宫娥擁入君王起前身合是採蓮人門前一片横塘水横塘雙槳去如飛何處豪家强載歸此際豈知非薄命此時只有淚沾衣薰天意氣連宫掖明眸皓齒無人惜奪歸永巷閉良家教就新聲傾坐客坐客飛觴紅日暮一曲哀􅃶向誰訴白晢通侯最少年揀取花枝屢迴顧早攜嬌鳥出樊籠待得銀河幾時渡恨殺軍書底死催苦留後約將人誤相約恩深相見難一朝蟻賊滿長安可憐思婦樓頭栁認作天邊粉絮看遍索綠珠圍内第强呼綘樹出雕欄若非壯士全師勝爭得蛾眉匹馬還蛾眉馬上傳呼進雲鬟不整驚魂定爉炬迎來在戰塲嗁妝滿面殘紅印專征簫鼓向秦川金牛道上車千乘斜谷雲深起畫樓散關月落開妝鏡傳來消息滿江鄉烏桕紅經十度霜教曲妓師憐尚在浣紗女伴憶同行舊巢共是啣泥燕飛上枝頭變鳳凰長向尊前悲老大有人夫壻擅侯王當時祗受聲名累貴戚名豪競延致一斛明珠萬斛愁關山漂泊腰肢細錯怨狂風颺落花無邊春色來天地嘗聞傾國與傾城翻使周郎受重名妻子豈應關大計英雄無奈是多情全家白骨成灰土一代紅妝照汗青君不見館娃初起鴛鴦宿越女如花看不足香逕塵生烏自嗁屧廊人去苔空綠換羽移宫萬里愁珠歌翠舞古梁州爲君别唱吳宫曲漢水東南日夜流勾章井神魚映日天門高思牢弩射錢塘潮母龍挾子飛不得黑風吹斷黿鼉橋只看文甃勾章井金鰲背上穿淸泠三軍鹵飲感甘泉十丈飛流牽素綆面面琉璃砌碧欄貝宫天際倚簾看馬秦山接桃花島吕宋帆移枳子灣海色曈曈照深殿紅桑日起觚稜炫金井杯承帝子漿玉顔影人昭陽扇聞道君王去射蛟樓船十萬水犀豪那知一夜宫中火倒映三山五色濤蒼鯨掣鎻電光紫擊浪嘘雲食龍子轆轤聲旣銀瓶墜遶殿虹蜆美人死㫋禮紫竹慈雲夢實陀山近鷰旌送香水流來菩薩泉白象迎歸善財洞不羨蓬灜作水仙神樓十二竟茫然桑田休道麻姑笑桃核難求王母憐君不見秦皇漢武終何益至今海上留遣跡鎬池壁至後宫愁鈎弋宫空少子泣珠襦玉匣總塵封卽爾飘零死亦得羞落陳宫玉樹花臙脂井上無顔色贈吳錦雯兼示同社諸子吾家季重才翩翩身長七尺虬鬚髯投我新詩百餘軸滿牀絹素生雲煙自言里中有三陸長衫拂髁矜豪賢弟先兄舉致身早我亦挾冊游長安其餘諸子俱嶽嶽感時上䇿愁祁連㑹飲痛哭岳祠下聞者大笑驚狂顚臯亭山頭金鼓震萬騎蹴踏東南天貽書訣别士龍死嗚呼吾友非髙官餘或脱身棄妻子西興潮落無歸船我因老親守窮巷買山未得囊無錢息心掩關謝時輩五年不到西溪邊比因訪客過山寺故人文酒相盤桓手君詩篇令我讀使我磊落開心顔豈甘不死愧良友欲使竒字留人間跳刀拍張雖將相有書一巻吾徒傳吾聞其語重歎息平生故舊空茫然不信扁舟偶乘興丁儀吳質追隨歡酒酣對客作長句十紙謖謖松風寒後来此㑹良不易况今海内多艱難安得與君結廬住南山著述北山眠蹉跎此意轉成空自恨愆期負若翁非是雋君辭霍氏終然丁掾感曹公此後相逢輒悲歎秦關何處鄉書斷苦憶江南欲往難覊妻老病無人看三經出塞五専征一巻詩書記姓名奴僕旌旄多甲第親朋兵火剰浮生重向天涯與我别憑闌把酒添淒咽煙水蘆花一雁飛囘頭却望江南月蘆洲行江岸蘆洲不知里積浪吹沙長灘起云是徐常舊賜莊百戰勲名照江水祿給朝家禮數優子孫萬石未云酬西山詔許開煤冶南國恩從賜荻洲江水東流自朝暮蘆花瑟瑟西風渡金戈鐵馬過江來朱門大第誰能顧惜薪司按先朝冊勲産蘆洲追子粒已共田園沒縣官仍收子弟徴租入我家海畔老田荒亦長蘆根豈賜莊州縣逢迎多妄報排年賠累是重糧丈量親下稱蘆政鞭笞需索輕人命胥吏交關横派征差官恐喝難供應江南尺土有人耕踏勘終無豪占情徒起再科民力盡却虧全課國租輕去而定爲蘆課視原額反少減矣甚言害民而又損國其無益如此積年升科老田本漕白重課指爲無糧侵占故有重糧再科後重糧詔書昨下知民病解頭使用今朝定早破城中數百家蘆田白售無人問休嗟百姓困誅求憔悴今看舊五侯只好負薪煨馬矢敢誰伐荻上漁舟君不見舊洲已没新洲出黄蘆收盡江潮白萬束千車運入城草塲馬廐如山積樵蘇猶向鍾山去軍中日日燒陵樹捉船行官差捉船爲載兵大船買脱中船行中船蘆港且潛避小船無知唱歌去郡符昨下吏如虎快槳追風摇急櫓村人露肘捉頭来背似土牛耐鞭苦苦辭船小要何用爭執洶洶路人擁前頭船見不敢行曉事篙師歛錢送船户家家壞十千官司查點候如年發囘仍索常行費另派門攤云雇船君不見官舫嵬峩無用處打鼓揷旗馬頭住馬草行秣陵鐵騎秋風早廐將圉人索芻藁當時磧北報燒荒今日江南輸馬草府帖傳呼點行速買草先差人打束香芻堪秣飽驊騮不數西凉誇苜蓿京營將士導行錢解户公攤數十千長官除頭吏乾沒自將私價僦車船苦差常例須應免需索停留終不遣百里曽行㡬日程十家蚤破中人産半路移文稱不用歸來符取重裝送推車挽上秦淮橋道遇將軍紫騮鞚轅門芻豆髙如山紫髯碧眼看奚官黄金絡頸馬肥死忍令百姓愁飢寒來歸不知我兒何處餵游魚或經略賣遭鞭笞垂頭悌下何纍纍吾欲竟此曲此曲哀且悲茫茫海内風塵飛一身不自保生兒欲何爲君不見堇山兒梅村家藏藁卷弟三終梅村先生年譜卷三五年戊子四十􅀊七月同年楊鳧岫卒先是京師䧟鳧岫投愛女於井趣妻妾縊死已則仰藥自殺爲防守者所覺水灌之大吐復活夫人孔氏懸絶甦乃棄家避兵武塘復徙丹陽金沙終歸毘陵鬱鬱不得志以死有左諭德濟甯楊公墓誌銘八月築舊學庵於梅村西徧先生自爲記按先生所居梅村舊爲王士騏賁園稱莘莊在太倉䘙東中有樂志堂梅花庵交蘆庵嬌雪樓鹿樵溪舍榿亭蒼溪亭諸勝思義攷先方伯松霞公日記甲申正月晤張南垣於吳駿公之居梅村當時申酉間所購後東皋草堂歌先生詩話稼軒由進士爲兵科給事中好􅀡諫爲權相所訐罷歸築室於虞山之下曰東皋極游觀之勝酷嗜石田翁畫購得數百卷爲耕石齋藏之未幾里中兒飛文誣染逮就獄余時在京師所謂東皋草堂歌者贈稼軒於請室也後數年余再至東皋稼軒倡義粤西其子伯升門戸是懼故山别墅皆荒蕪斥賣無復向者之觀余爲作後東皋草堂歌蓋傷之也又二年知以相國留守桂林城䧟不屈與張別山俱死六年已丑四十一􅀊夏願雲師從靈隱來止城西太平菴别先生將遠游廬嶽且期以出世先生作詩贈之婁東耆舊傳王瀚字原達受業於張采爲諸生有名國變爲僧號晦山大師名戒顯字願雲庚寅夏入廬山遂主席江右瀚雖入空門悲憤激烈曾檄討從賊諸臣云春夜宴梨園不思凝碧池頭之泣端陽觀競渡誰弔汨羅江上之魂讀者俱爲扼腕焚餘補筆原達性好佛崇禎甲申之變作詩謝文廟云忝列諸生踐極年義應君父死生連薄言草莽無官責敢缷衣冠哭聖前讀罷捲堂羞國士身同左袓幸敷天􅀌踪願謝宫牆餼甘作山農種石田素心多載想盧能獨係高堂久未曾國事一朝論鼎沸浮名何惜付層冰聊將毀服存吾義從此棲禪學老僧拭取靑山無累眼好淸世事理禪燈遂入山爲僧名戒顯乙酉六月州宦陸遜之自淮歸云淮陽自有德宗上人知未來事陸以太倉問之德宗以州有再來人王和尙庇過再不犯兵革蓋指瀚也竟不被慘禍云按先生後有得廬山願雲師書喜願雲師從廬山歸諸詩黃陶菴文集字興福寺鐵爐銘鴻臚寺序班封兵部武選司主事丹陽荆公墓誌銘七年庚寅四十二􅀊十一月大兵入桂林桂王奔臨桂伯瞿式耜總督張同敞俱死先生詩話稼軒臨難遺表曰庚寅十一月初五日聞警開國公趙印選移營先去衞國公胡一靑甯遠伯王永祚綏甯伯蒲纓武陵侯楊國棟甯武伯馬養麟盡室而行惟督臣張同敞從江東泅水過江相期共死其赴義則閏十一月之十七日也纍囚一月兩人一從容唱和稼軒得詩八首曰二祖江山人盡擲四年精血我偏傷又日願作須臾階下鬼何妨慷􅁣殿中狂其末章日年逾六十復奚求多難頻經渾不愁劫運千年彈指到綱常萬古一身留欲堅道力憑魔力何事俘囚作楚囚了却人間生死業黃冠莫擬故鄉游別山和章有曰稜稜瘦骨不成眠祖德君恩四十年腰膝尙存堪作鬼死生有數肯呼天又曰白刃臨頭惟一笑靑天在上任人狂又曰亡家骨肉皆􅁈鬼多難師生共哭聲又曰此地骨原堪朽腐他時魂不侍招尋二公死有舊給事中後出家號性因者收其骨義士楊碩父藏其稿稼軒孫文昌閒關歸以其詩與表刻之吳中爲浩氣吟云別山死事最烈其未死也受拷掠兩臂俱折目睛出語不爲撓稼軒有初六日紀事一詩曰文山當日猶長揖堪笑狂生禮太疎別山和曰臂先頭斷生堪賤身爲城亡計豈疎銜木焉知舌在否傷睛因笑眼多餘此其被刑時事也稼軒以義命自處從容整暇自警詩曰死豈求名地吾當立命觀又自艾詩日七尺不隨城共殉羞顏何以見中湘藎指何公騰蛟以殉難封中湘王也若兩公者眞可謂殺身成仁者也赴十郡大社毛奇齡駱明府墓誌駱姓諱復旦字叔夜山陰人嘗同會稽姜承烈徐允定蕭山毛甡赴十郡大社連舟數百艘集於嘉興南湖太倉吳偉業長洲宋得宜實穎吳縣沈世英彭瓏尤侗華亭徐致遠吳江計東宜興黃永鄒祇謨無錫顧宸崑山徐乾學嘉興朱茂晭彝尊嘉善曹爾堪德淸章金牧金范杭州陸圻越三日乃定交去八月大風海溢有詩得龔芝麓鼎孶書書載先生詩話至海虞有琴河感舊聽女道士卞玉京彈琴歌宴孫孝若山樓賦贈諸詩先生詩話卞玉京字雲裝白門人善畫蘭能書好作小詩余詩云緣知薄倖逢應恨恰便多情喚却羞此當日情景實語也又過三月爲辛卯初春乃得扁舟見訪共載横塘始將前四詩書以贈之附虞山􅀩叟讀梅村豔體詩有感書後四首并序余觀楊孟載論李養山無題以爲音韻淸婉雖極濃麗皆托於臣不忘君之意因以深悟風人之旨若韓致光遭唐末造流離閩越縱浪香奩蓋亦起興比物申寫託寄非猶夫小夫浪子沈湎流連之云也頃讀梅村豔體詩見其聲律妍秀風懐愴惻於歌禾賦麥之時爲題柳看桃之作旁皇吟賞􅀼有義山致光之遺憾焉雨窗無聊援筆屬和秋蛬寒蟬吟欺囑哳豈堪與間關上下之音希風說響乎河上之歌聽者將同病相矜抑或以爲同牀各㝱囅爾一笑也時庚寅元㝠之小月二十有五日上林珠樹集啼烏阿閣斜陽下碧梧博局不成輸白帝聘錢無籍貰黃姑投壺玉女知天笑竊藥姮娥爲月孤淒斷禁垣芳草地滴殘淸淚到蘼蕪靈璅森沈宮扇􅂞屬車轣轆般輕雷江長海濶欺魚素地老天荒信鴆媒褏上唾看成紺碧懐中泣􅃘化瓊瑰可憐銀燭風前淚留取胡僧認刼灰撾鼓吹簫罷後庭書惟別殿冷流螢宮衣蛺蜨晨風舉畫帳梅花夜月停銜璧金釭憐旖旎翻階紅藥笑娉婷水天閒話天家事傳與人間總淚零銀漢依然界玉淸竹宮香㶳露盤傾石碑銜口誰能語棋局中心自不平禊日更衣成故事秋風紈扇憶前生寒窗擁髻悲啼夜暮雨殘燈識此情嘉議大夫按察司使江公墓誌銘贈李峩居御史八年辛卯四十三􅀊巨㓂劉文秀等踞滇黔吳三桂握重兵屯保甯久無功四川巡撫郝浴劾其縱兵剽掠包藏異心未幾東西川俱陷三桂棄保甯退走綿州浴聞警一晝夜七馳檄邀三桂還賊簿保甯勢張甚浴以忠義激發將士與賊戰大破之卽密陳三桂跋扈狀有雜感詩元旦試筆梅花菴同林若撫話雨聯句德藻稿序九年壬辰四十四嵗館嘉興之萬夀宮輯綏冦紀畧欽定四庫全書總目提要綏冦紀畧十二卷國朝吳偉業撰偉業字駿公號梅村太倉人崇禎辛未進士授翰林院編修入國朝官至國子監祭酒是編專紀崇禎時流冦迄於明亡分爲十二篇曰澠池渡曰車箱困日眞甯恨曰朱陽潰日黑水擒曰穀城變曰開縣敗曰汴渠墊日通城擊日鹽亭誅日九江哀曰虞淵沈每篇後加以論斷其虞淵沈一篇皆紀明末災異與篇名不相應考朱彝尊曝書亭集有此書跋云梅村以順治王辰舍館嘉興之萬夀宮輯綏冦紀畧久之其鄉人發雕是編僅十二卷而止虞淵沈中下二卷未付棗木傳刻明史開局求天下野史盡上史館於是先生足本出予鈔入百六叢書歸田之後爲友人借失云云意者明末降闖勸進諸臣子孫尙存故當時諱而不出與此本爲康熙甲寅鄒式金所刻在未開史局之前故亦闕虞淵沈中下二卷彝尊百六叢書爲人借失者雖稱後十八年從吳興書賈購得今亦不可復見此二卷遂佚之矣彝尊又稱其以三字標題仿蘇鶚杜陽雜編何光遠鑑戒錄之例考文章全以三字標題始於繆襲魏鐃歌詞鶚光遠遂沿以著書偉業敘述時事乃用此例頗不免小說纖仄之體其囘護楊嗣昌左良玉亦涉恩怨之私未爲公論然紀事尙頗近實彝尊所謂聞之於朝雖不及見者之確切而終勝草野傳聞可資國史之采輯亦公論也按近有虞山張氏刻本虞淵沈中下二卷全先生所著有春秋地理志春秋氏族志綏靖紀聞復社紀事秣陵春樂府梅村詩話鹿樵紀聞諸書又有臨春閣通天臺兩種樂府附徐釚詞苑叢談吳祭酒作秣陵春一名雙影記嘗寒夜命小鬟歌演自賦金人捧露盤一詩黃東崖所謂法曲淒涼者正謂此詞也祭酒又自題一律云詞客哀吟石子岡鷓鴣淸怨月如霜西宮舊事餘殘夢南内新詩總斷腸漫濕靑衫陪白傅好吹玉笛問甯王重翻天寶梨園曲減字偷聲柳七郎按詩集中逸又考先生寄房師周芮公詩自注云晉江黄東崖先生和予此詩中一聯曰徵書鄭重眠餐損法曲淒涼涕淚橫知已之言讀之感嘆唐孫華讀鹿樵紀聞有感一旅誰知扼紫荆蜩螗聒耳正分爭腹書競伏狐鳴火手蔗頻驚鶴唳兵􅀡待臨危思翦牧可應先事戮韓彭石頭袁粲眞堪惜自壊邊關萬里城指東莞督師哭朱昭􅉮明鎬有朱昭􅉮墓誌銘與蒼公㑹先生詩話蒼雪師雲南人與維揚汰如師生同年月日相去萬里而法門兄弟氣誼最得蒼住中峯汰住華山人以比無着天親焉蒼公年老有肺疾然好談詩以壬辰臘月過草堂謂余日今世狐禪盛行一大藏教將墜於地矣且無論義學卽求一詩人不可復得迺幸與子遇我襆被來不曾攜詩卷當爲子誦之是夜風雨大作師語音傖重撼動四壁痰動喉間咯咯有聲已呼茶復話不爲倦漏下三鼓得數十篇視階下雪深三尺矣當其得意軒眉抵掌慷􅁣擊案自謂於此證入不二法門禪譏詩學總一參悟其詩之蒼深淸老沉着痛快當爲詩中第一不徒儈中第一也師和余西田賞菊詩有獨擅秋容晚節全全字落韻和者甚多無出師上王士正漁洋詩話近日釋子詩當以滇南讀徹蒼雪爲第一如一夜花開湖上路半春家在雪中山亂流落葉聲兼下聽徹寒扉不上關皆警句也送林衡者佳㙨歸閩有送林衡者還閩序并詩先生詩話衡者少游黃忠烈之門以壬辰二月來婁東所著詩文詞數十卷詩蒼深秀渾古文雅健有法其行也余贈以詩有五月關山樹影圓送君吹􅅇柳陰船之句已而道阻再游吾州則秋深木落郷關烽火南望思親旅懷悲詫有聽鐘鳴悲落葉之風焉得侯朝宗方域書書載壯悔堂集先生懐古兼弔侯朝宗詩死生總􅀒侯嬴諾欲滴椒漿淚滿尊自注云朝宗貽書約終隱不出余爲世所逼有􅀒夙諾故及之梅村先生年譜卷三終

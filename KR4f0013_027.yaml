front:
  text: 梅村家藏藳卷弟二十七文集五
  hash: sha256:7d0ecce17a4dc99431c11ed0f60c3e6cfffac81c67292b12504a93f44a5aaa63
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_027-1a}
body:
  text: 序一黃陶庵文集序黃陶庵先生死忠之五年其門人陸翼王收其遺文得所論著百餘篇屬余為之序嗚呼陶庵之文止於此而已乎當其城陷引決投筆絶命扼吭而死翼王訪求搜購於流離煨燼之中遺編斷爛什不一存此可為流涕歎息者也陶庵深沉好書於學無所不窺居常獨坐一室不交當世遷固以下諸史朱黃鉤貫略皆上口其於考據得失訓詁異同在諸儒不能通其條要陶庵頓五指而數之首尾通涉銖兩歷然雖起古人面與之讐問莫能難也其為人淸剛簡貴言規行矩蚤有得於濂雒之傳嘗謂人曰吾比來為文初無所長然皆折衷大道稱心而立言質之於古驗之於今其不合於理者亦已少矣此其一生讀書之大略也當先皇帝初年海內方鄉古學一二通人儒者將以表章六經修明先王之道為務乃曲學詭行則又起而乘之依光揚聲互相題拂剽取一切堅僻之辭以欺當時而誤流俗論者不察乃比其始事者同類而訾之噫亦不思之甚矣世之降也先王之教化既熄法度既亡人奮其私智家尚其私學粃謬雜揉蟠戾於天下雖有高世之君子欲整齊而分別之其道無繇惟夫忠孝大節皆出於醇正博洽之儒其似是而非者不一見焉然後天下後世瞭然知異學之當誅而大雅之可尚以觀我陶庵非其人耶陶庵為諸生二十年與其弟偉恭其徒侯幾道雲俱晝夜講性命之學晚而後遇不肯就官城破之日師友兄弟同日併命今其書雖不全使讀之者愾然想見其為人益足以徵於今而信於後無疑矣翼王以五年之力掇輯散亡其功於斯道不細固不專為陶庵已也吾故表而出之俾後之人知所習焉何季穆文集序虞山何季穆天下博聞辨智之士也讀書負奇氣以文章志節自豪嘗挾其册走京師欲有所建白會逆璫用事應山楊忠烈公特疏擊之季穆引義慷慨􅐌成其決已而楊公遇害季穆憂時感世發病嘔血曰吾之生則不如其死也死二十年其子璧以能詩聞乃收父平生所為詩古文詞而編輯之得十餘卷余讀之太息日嗟乎古之為士者非公車特徴則宰府交辟次亦屈志州郡耳其有淹頓牢落沒世而無聞者蓋亦少矣當東漢之季閹寺之禍可謂最烈然而岑晊張儉之徒不過以東部督郵南陽功曹收案中官子弟考竟殺之而太學諸生提斧鑕伏闕下請斬十常侍以謝百姓雖繇此得罪夷滅其所發舒已足垂名竹帛今以季穆之才豈出黨錮諸賢下哉本朝不行辟召諸生勿通章表故雖以有為之略敢言之氣而屈折勿效僅以托之於文詞此可為痛惜者也余嘗惟國家當神宗皇帝時天下平治而士大夫風習不能比隆往古者良繇朝廷以科目限天下士士亦敝敝焉束縛於所為應世之時文以吾耳目所聞見如吳中邵茂齊徐汝廉鄭間孟三君子皆號為通人儒者而白首一經穿穴書傳於朝政得失賢姦進退之故則不聞有所論述故其不遇以死也姓氏將泯滅而勿傳當是之時有不好經生章句而談國是人才邊情水利鑿然欲見諸施行者獨有一何季穆耳然且才力無所展議論無所用即其後人所欲鋪揚而稱述之者今止其書在書之傳不傳亦未可知也蓋季穆殁後十餘年天子慨然有意於巖穴之士而士亦危言深論激揚名聲故有匹夫上書詆訶禁近處士抗論裁核公卿浸尋乎東漢矣其有所匡救十不得二三而朝貴側目大考鉤黨終至國禍隨之若使季穆不死忠言異謀必大有益於時而其文章論著足以軼往昔而示來世斷不止於此也而竟不幸蚤死詩有之日人之云亡邦國殄瘁其季穆之謂夫陳百史文集序溧陽陳先生以詩古文詞名海內者二十餘年余也草野放廢未嘗一及先生之門先生顧寓書余曰吾集成子為我序之夫先生之文衣被四海乃於三千里外欲得窮老疏賤者之一言此其通懷好善誠不可及而余則逡巡未敢也今年春始進謁於京師會先生刻其集初就余得受而卒讀凡詩文若干卷不揣為之序曰夫文者古人以陳謨矢訓作命敷告教世化俗者之所為非僅以言辭為工者也有一代之興必有一代之文以為之重當夫禮樂未行紀綱未定得其文以諷諭天下無不翕然從風及其功成而道浹薦之郊廟布之聲歌可謂盛矣乃其學不專一能書不名一家奇邪踳駁之弊無自而起蓋繇垂教之人即其謀國之人故因事立言取其明體適用浮詞勦説不得而入也三代而下人材薄學術廢草昧之功類不始於儒者逮乎升平纍葉文事乃興用以粉飾鋪張而無所緩急不得已借瓌異詭僻之辭以自見其有卓然越於流俗者漢賈誼董仲舒司馬遷劉向之屬皆在高惠以後韓柳則當唐之既衰有宋慶曆嘉祐之間歐曾並起此數君子者各成一代之文聲施後祀余所惜者以彼其才使之生於開創之初親見其行事所著當不止此夫立乎定哀之際以望隱桓孔子難之況其下焉者乎明初宋文憲公以大儒而膺佐命上自詔敕訓令下至於碑銘序記之文援據六經鎔鑄百氏幾與三代比隆今國家鼎新景運皇上親儒重學而先生膺密勿心膂之寄高文大册咸出其手詩有之倬彼雲漢為章于天其先生之謂哉文憲雖典司文章不與機務又得黃溍柳貫之徒倡明婺學適會其成功先生勤勞經國大業能出其餘力為文章且自文憲公後三百年來紹修絶學者不過數家剽竊摹擬抽靑媲白者榛蕪塞路先生慨然起而釐正之此其視文憲為尤難也已余既序先生之文因以正告天下俾知大雅復作斯文不墜士君子務為原本之學扶運會而正人心無矜纂組薈蕞之長弊弊焉從事於所無用此先生之志也白東谷詩集序余少時得交天下士以為三晉者河嶽之奧區也大行王屋之交風氣完密必有巨儒偉人魁壘沉塞者出乎其間吾庶幾一見之然不能往也在南中從張藐姑先生遊先生家晉之陽城年六十餘矣德高而齒宿憂時傷亂有家國飄薄之歎顧奉其經書講誦不輟豫得侍函丈聞緒論心誠服之世故流離名賢抑沒竊慨典型不可復作既而遇白公東谷於京師知為先生之同里攻實學修篤行不役役於富貴不隕穫於流俗沖乎其自下確乎其自持有先正之風焉當世祖皇帝優禮詞臣東觀橫經長楊較獵凡有編摩咨訪飛鞚趣召往往在嚴更之後風雪之中公應詔立成辨言如響同官中咸以大人長德博聞強記推之及乎出二銓衡上參槐棘撤侍從而典邦禁聖主以造邦之初成憲方立文墨法律之吏不足以著潔令惟公經術深厚傳古義定讞法故倚以天下之平焉退而築室於析城底柱之間俯仰河山流連今古取其高深跂蔚盡發之於詩文上以垂竹素潤金石次亦散華落藻沾丐遠近今所謂東谷集者是也伏而觀之豈不盛哉白族大且顯其最以學行著者公之尊人履德先生兄弟明經典邑校講授生徒多所成就學者以比德河汾公有從兄日季文多聞述作高尚不仕昔咎犯之語重耳曰吾不如衰之文也夫三士皆足上人而沾沾於成季之有文何耶春秋聘問之辭晉之卿士為多被廬之搜説禮樂而敦詩書即軍旅亦所不廢千載而後風醇俗厚被服爾雅河東世有高門昭其文德為天下先今以觀白氏履德之有公士會之於范文子也公之有季文叔向之於銅鞮伯華也其原本家學遇會處際乃一出而用之於世容偶然乎金華陳公文吏也舊為公邑宰用治行高擢任吾州刻公之集於吳下以公言徴余辨其首余瀏覽之餘既樂晉之有人又追想藐姑之風流於徂往之後也稱人之善必數其父兄與其卿先哲是用推本書之以為東谷詩序戴滄州定固詩集序余嘗思自古詩人享盛名履高位者代不數見唐人如張曲江高達夫庶足以當之矣曲江晚年憂讒畏事達夫五十始顯佐戎幕歷兵間其登眺諸作類有堙鬱抑塞之感焉先朝如李長沙王弇州皆以絶代之才位至卿相遘際平世雍容歌嘯領衰羣流跌宕騷苑於乎又何盛也余於天下思一見其人不得乃今得之滄州戴公公工文章善書畫為詩深渾奇峭超邁絶倫洊登三事再世侍中父子俱列臺閣賜召見給筆札丹青墨寶照耀殿壁賦詩紀事天子動容甚至親灑宸翰以賜之文人遭逢可謂隆矣公餘豐暇品藻人士殷勤賞接長縑短幅淋漓墨瀋殘膏剩馥沾丐海內風流文采掩映一時嗟乎十餘年來宿素凋謝文事衰歇賓朋之賞會景物之流連誠未有如今日之戴公者也公將刻其詩余得受而讀之乃見其身經喪亂俯仰悲涼蔓草銅駝澘然興感洎乎謫宦南陽中原灌莾千里極目追念昔人戰鬭勝負故處貰酒悲歌撫羊令之遺碑過張衡之故里徘徊憑弔泣數行下然後知公雖席豐履盛而憂危他傺之意未嘗不一發之於詩其所得者蓋已深矣余友合肥龔公孝升與公相知為最其才地名位亦相亞孝升之詩慷慨多楚聲余輒讀輒泣且疑其何以至是今又得公所作乃知文人才士所藴略同而非尋常拘墟之見可得而窺測者也是為序觀始詩集序觀始集者鄗城魏石生先生合海內之詩選之以名其編者也鄗城之自為詩深究本源窮極體要乃以選者弗規於正也京師輶軒之所集遂窮搜博訪朱黃點勘積有嵗月始定為若干卷而授偉業序之曰子知詩所以始乎依古以來世道之汚隆政事之得失皆於詩之正變辨之在昔成周之世上自郊廟宴饗下至委巷謳歌采風肄雅無不隸於樂官王澤既竭矇史失職列國之大夫稱詩聘問乃僅有存者季札適魯觀六代之樂君子日此周之衰也魯雅周公之後得賜備樂顧太師所習夫孰非土風乃季子不之京師而適與國此豈復有升歌象舞之盛哉降及漢魏樂府之首大風重沛宮也古詩之美西園尊鄴下也初唐帝京之篇應制龍池諸什實以開一代之盛明初高楊劉宋諸君子皆集金陵聯鏕接轡唱和之作爛焉夫詩之為道其始未嘗不渟瀠含蓄養一代之元音其後垂條散葉振藻敷華方底於極盛而浸淫以至於衰也自兵興以來後生小儒穿鑿附會剽竊摹擬皆僴然有當世之心甚且亂黑白而誤觀聽識者雖欲慨然釐正未得其道也會國家膺圖受籙文章彪炳思與三代同風一時名賢潤色鴻業歌詠至化繄維詩道是賴於是表閶闔開明堂起長樂修未央聖人出治矞矞皇皇升中告虔引宮命商羽旄濟濟和鸞鏘鏘吾觀乎制度之始將取詩以陳之蒼麟出白鷹至龍之媒充上駟我車既間我兵弗試維彼蠻方厥角受事來享來王同書文字我觀乎聲教之始將取詩以紀之倉庚既鳴時雨既零大田多稼恤此下民蘭臺羣彥著作之庭歌風緼瑟終和且平我觀乎政治之始將取詩以美之若夫淫哇之響側豔之辭哀怒怨誹之作不入於大雅皆吾集所弗載者也余應之日是則然矣抑詩者緣情體物引伸觸類以極其所至者也若子之論其汰之無乃甚乎石生曰聖人刪詩變風變雅處衰季之世不得已而存焉以備勸誡者也且君子觀其始必要其終圖其成將憂其漸吾若是其持之尚憂鄭衛之雜進而正始之不作也可不愼哉子不見夫水乎當其發源涓涓淈淈其淸也可鑿其柔也可玩既而潢汙行潦無不受也平皋廣陸無不至也及乎排巖下瀨淫鬻宓泊於江湖之間則奔突衝決之患已成勢且莫之制矣吾為是選寧使後之君子有以加之踵事增榮殆將俟焉若茲者起尾閭昉濫觴豈可即決防潰間莫知束伏而不早為之所乎凡以愼吾始焉爾余曰善乃書其言以為之序毛卓人詩序昔者先王以詩教天下自祭祀聘饗鄉飲大射無不用詩為登歌故以立之學宫肄習子弟漢遂置博士等官而唐因之設科取士雖先王溫柔敦厚之旨漸已散亡於其教亦可謂之盛矣繇宋以後始改為制舉之文章本意在黜浮華尚經術後人乃沿習苟且躐取世資自守其固陋空疏盡詘諸儒百家之言於弗講一二有志之士厭苦束縛思有以馳騁變化之不免稍戾於法則已為當世之所繩而不克自振蓋唐以詩取士詩有正變不同即士之不遇者猶得為放歌長吟用比物連類之辭發坎壈不平之氣身雖未達而名足以傳近代以文取士文有奇有平其言總無當於用彼不遇者已矣或有遇者以其才偶見排抵則姓名抑沒於兔園故𥿄之中雖有人求而好之何所持以斷其必然拄斯世而奪之議如吾友毗陵毛卓人是也卓人既以文被擯乃益肆力於詩上泝漢魏下探三唐含咀菁華討求聲律不數年而學大就會當事惜其才湔被復用家貧乞祿得吾州之學官頽屋敗椽絃歌不輟其與卓人同時被擯者受殊遇為顯貴人尋不幸以死而卓人獨棲遲一氊婆娑東海之畔默默不自得手一編問序於余嗟乎自舉世相率為制舉義而詩道湮滅無聞十餘年來學宮之子弟稍有習其事者無過修干謁希進取不離時藝者近是縱語以挽近之作者迷瞀不解況於先王比興之羲有得而聞之乎夫吾州素以文獻重海內今再得名賢以為之師誠使卓人盡出所學以詩道訓邦之子弟庶幾元音正始可以復作乃吾觀從遊之衆雖知師之賢而尊事之有能以詩是正於先生者固已少矣然則卓人之窮不徒以其文即所為詩亦聊以自娛若云修其職以行其道猶未也昔西漢毛公為河間獻王博士而詩義在齊魯韓三家為獨傳國家一朝更科舉之法搜揚風雅廣厲學宮求宿儒大材通知四始者主其事先生殆其人乎是又一毛公矣余故為之序不泛稱其詩而舉所以為詩者援先王以為訓此即卓人之教也夫梅村家藏藳卷弟二十七終

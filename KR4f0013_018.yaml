front:
  text: 梅村家藏藁卷弟十八詩後集十
  hash: sha256:cae3b8ac91edfb9a69481200a66f61af548d7f1bf75b73709dbc993c091a7ded
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_018-1a}
body:
  text: 五言排律四首途中遇雪即事言懷雪來榆塞北人去衛河西川隴方瀰漫關山正慘淒短衣吹帶直矯帽壓簷低漁卧舟膠浦樵歸柳斷蹊危灘沙路失廢井草痕齊塔逈埋榱桷臺荒凍鼓鼙襆輕裝易發書重笈難攜久病人貽藥長途友贈綈橫津船渡馬野店屋棲雞家訴兵來破墻嫌客亂題簀牀寧有席葦壁半無泥路遠人呼飯厨空婦乞醯白溲􅘹作餌緑糝韭成􅐽入筯非鮭菜堆柈少棗梨山薪土銼續村釀瓦罌提齕莝驢如怒窺燈鼠似啼旗亭人又起草市路偏擠遇淖前騶唱衝風後騎嘶輿肩幾步換囊糒一夫齎行子誰停轡居人尚掩閨漸逢農荷鍤稍見叟扶藜往事觀車轂浮蹤信馬蹄世應嘲僕僕我亦嘆栖栖赤縣初移社靑門早灌畦餘生隨雁騖壯志失虹蜆築圃千條柳耕田十具犂昔賢長笑傲吾道務提撕得失書新語行藏學古稽詩才追短李畫癖近迂倪室靜間支枕樓高懶上梯老宜稱漫土窮喜備殘黎有道寧徵管無才卻薦嵇北山休誚讓東觀豈攀躋令伯親垂白中郎女及笄離程波渺渺別淚草萋萋憶弟看雲遠思親望樹迷書來盤谷友夢向鹿門妻蹭蹬吾衰矣飄零歸去兮􅐜鱸三泖宅花鳥五湖堤著屐尋廬嶠張帆入剡溪江南春雨足把酒聽黃鸝送吳門李仲木出守寧羌君到南山去興元驛路長孤城當沮口舊俗問華陽稻近磻溪種魚從丙穴嘗殘兵白馬戍廢塢赤亭羌鐵鎖穿天上金牛立道傍隗囂宮尚在諸葛壘應荒往事英雄恨新愁旅客裝七盤遮駱谷十口隔秦倉黑水分榆柳靑泥老鷫鸘不堪巴女曲尚賽武都王贈家園次湖州守五十韻淸切推華省風流擅廣陵俊從江左造賢比濟南徴經學三公薦文章兩府稱北門供奉吏西掖祕書丞月俸鴉翎鈔春衣鳯尾綾賜酺班上膳從獵賦奇鷹粉署勞偏著仙曹迹屢升赤囊條每對黃紙詔親承乞外名都重分符寵命仍爭傳何水部新拜柳吳興城闕晨笳動旌旗瑞靄凝射堂靑嶂合訟閣絳霞蒸教出漁租減詩成紙價增笙歌前隊引賓客後車乘石戶樵輸栗銀塘女採菱水嬉鈎卷幔社飲鼓分堋急雨溪喧碓斜陽岸曬罾宗盟高季札史局慨吳兢官退囊頻澀年侵鏡漸憎鹿皮朝擁卷松火夜挑燈舊業凋林薄殘身瘦石稜彈琴伐木澗荷鍤種瓜塍撥刺魚窺網偷睛鳥避矰已耽耕稼隱幾受黨碑懲寥落依兄弟艱難仗友朋殷勤書一紙離别思千層逸爵斟佳醖綈袍製異繒蠶忙供杼軸茶熟裹緘縢族姓叨三謝詞場繼二應歃宜陪魯衛賦僅半鄒滕謙抑君胡過慚惶我曷勝長緘招鄭重短䇿跂飛騰好士公投轄尋山客擔簦竹溪春淡蕩梅隴雪崚嶒孤館披襟坐危欄送目憑嵐光浮翠黛塔勢界金繩為政崔元亮相逢皇甫曾蘭橈輕共載蠟屐響同登笛冷荒臺妓鐘沉廢寺僧趙碑娟露滴顔壁壯雲崩衰至容吾放狂來敢自矜雄談茗是戰良會酒如澠楚澤投劉表江樓謁庾氷故交當路遍前席幾人曾妄把歡遊數癡將好夢憑懷人吟力健觀物道心澄雅意通毫素間愁託剡藤折花貽杜牧採菊寄王弘瑣屑陳篇蠧欹邪醉墨蠅非云聊以報舍此亦何能賦得西隱寺古松次蒂訒菴韻贈陸翼王誰將東海月挂在一株松偃蓋荒祠暗槎丫蘇石封寒生高士骨瘦入定僧容絶頂危巢鸛奔枝破壁龍盤根供客踞掃葉認仙蹤風寂吹常謖泉枯灑若淙性孤千尺傲材大百年慵葛相堪同卧秦皇耻再逢鹿芝香作供鶴草錦成茸影出層雲外霜天落曉鐘五言絶句八首讀漢武帝紀岱觀東迎日河源西問天晚來雄略盡巫蠱是神仙讀光武紀雷雨昆陽戰風雲赤伏符始知銅馬帝遠勝執金吾蕭何蕭相營私第他年畏勢家豈知未央殿壯麗只棲鴉南苑應制熊館發雲旌春搜告禮成東風吹紫陌千騎暮歸營題畫亂瀑界蒼崖松風吹雨急石廊虛無人高寒不能立偶見二首合歡金縷帶蘇合寶香薰欲展湘文袴微微蕩畫裙其二背影立銀荷瓊肌映綺羅燭花紅淚滿遮莫為心多古意歡似機中絲織作相思樹儂似衣上花春風吹不去六言絶句十二首偶成十二首南山不逢堯舜北窗自有羲皇智如樗里何用窮似黔婁不妨其二張良貌似女子李廣恂恂鄙人祖龍一擊幾中猿臂善射如神其三異錦文繒歌者黃金白璧蒼頭諸生唇腐齒落終嵗華冠敝裘其四賓帳葳蕤雲漾象牀刻鏤花深破盡民間萬室遠踰禁物千金其五韓非傳同老子蘇侯坐配唐堯今古一丘之貉不知誰鳯誰梟其六雍齒且加封爵田橫可誓丹靑願得毋忘堂阜相看寧識神亭其七織薄吹簫豐沛拍張狂呌風雲朝領白衣隊主暮稱黑矟將軍其八雅擅潘文樂旨妙參羊體嵇心畫虎雕龍染翰高山流水彈琴其九東部督郵恣橫北門待詔窮愁莫舉賢良有道且求刀筆封侯其十食其長為説客夷甫自謂談宗著書一篇雋永緩頰四座從容其十一趙一恃才倨傲禰衡作達疏狂計吏恣睢卿相布衣笑罵侯王其十二厨下緑葵紫蓼盤中白奈黃柑冠櫛懶施高枕樵蘇失爨淸談梅村家藏藁卷弟十八終

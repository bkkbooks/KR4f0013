front:
  text: 梅村家藏藁卷弟八詩前集八
  hash: sha256:23f7243f1d895f3e83fd694bb0be626a62e42723094034cee424146ed7ff6dec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_008-1a}
body:
  text: 七言絶句六十一首過魚山曹植墓二首小穀城西子建祠魚山刻石省躬詩君家兄弟空搖落惆悵秋墳采豆枝其二鄴臺坐法公車令災郡憂讒謁者書天使武皇全愛子黃初先已屬蒼舒項王廟戲馬臺前拜魯公興王何必定關中故人子弟多豪傑弗及封侯呂馬童虞美人咸陽宮闕早成塵莫聽歌聲涕淚頻若遇戚姬悲薄命幸無如意勝夫人釣臺少有高名隱富春南陽遊學為亡新高皇舊識屠沽輩何似原陵有故人贈妓郎圓輕靴窄袖柘枝裝舞罷斜身倚玉牀認得是儂偏問姓笑儂花底喚諸郎偶成二首好把蛾睂鬬遠山鈿蟬金鳳緑雲鬟畫堤無限垂垂柳輸與樓頭謝阿蠻其二海棠花發兩三枝燕子呢喃春雨時恰似闌干嬌欲醉當年人説杜紅兒感舊赤欄橋護上陽花翠羽雕籠語絳紗羡殺江州白司馬月明亭畔聽琵琶汴梁二首馮夷擊鼓走夷門銅馬西來風雨昏此地信陵曾養士只八誰解救王孫其二城上黃河屈注來千金堤帚一時開梁園遺迹銷沉盡誰與君王避吹臺題歸玄恭僧服小像四首豈是前身釋道安遇人不著鹿皮冠接罹漉酒科頭坐只作先生醉裏看好酒其二金粟山人道者裝玉山秋盡草堂荒劫灰重作江南夢一曲開元淚萬行能詩顧阿瑛號金粟道人著天寶遺事談庚申君事其三共道淇園長異材風欺雪壓倩誰栽道人掃向維摩壁千尺蒼龍護講臺畫竹其四中山絶技妙空羣智永傳家在右軍為寫頭陀新寺額筆鋒蒸出墨池雲工書戲贈十首窄袖輕衫便洞房何綏新作婦人裝繡囊蘂結同心扣十里風來袴褶香其二梅根冶後一庭幽桃葉歌中兩槳留管是夜深嬌不起隔簾小婢喚梳頭其三香銷寶鴨月如霜欲罷摴蒱故拙行倦倚局邊佯數子暗擡星眼擲兒郎其四仙家五老話驂鸞素女圖經掌上看如共王喬舊相識鍊方從乞息肌丸其五玉叉仍整未銷黃笑看兒郎語太狂翻道玉人心事懶厭將雲雨待襄王其六戒珠琥珀間沉檀弟子班中玉葉冠君是惠休身法喜他年參學贊公壇其七蔬譜曾刪鱔議書一臠鮮菜定何如玉纎下筋無常味珍重虞公數十車其八懶梳雲髻罷蘭膏一幅羅巾紫玉縧不向弓彎問消息誤人詩句鄭櫻桃其九內家紈扇縷金函萬壽花開靑鳥銜贈比乘鸞秦氏女銀泥裙子鳯皇衫其十橫塘西去窈娘還畫出吳山作楚山笑語阿戎休悵望莫愁艇子在溪灣亂後過湖上山水盡矣賦一絶柳榭桃蹊事已空斷槎零落敗垣風莫嗟客鬢重遊改恰有靑山似鏡中聽朱樂隆歌六首少小江湖載酒船月明吹笛不知眠只今憔悴秋風裏白髮花前又十年其二一春絲管唱吳趨得似何戡此曲無自是風流推老輩不須教染白髭鬚其三開元法部按霓裳曾和巫山窈窕娘見説念奴今老大白頭供奉話岐王其四誰畫張家靜婉腰輕綃一幅美人蕉會看記曲紅紅笑喚下丹靑弄碧簫其五長白山頭蘆管聲秋風吹滿雒陽城茂陵底事無消息逤邏檀槽撥不成其六楚雨荆雲雁影還竹枝彈徹淚痕斑坐中誰是沾裳者詞客哀時庾子山觀棋六首和錢牧齋先生深院無人看劇棋三郎勝負玉環知康猧亂局君王笑一道哥舒布算遲其二小閣疏簾枕簟秋晝長無事為忘憂西園近進修宮價博進知難賭廣州其三間向松窗覆舊圖當年國手未全無南風不競君知否抉眼胥門看入吳其四碧殿春深賭翠鈿壽王遊戲玉牀前可憐一子難饒借殺却拋殘到那邊其五玄黃得失有誰憑上品還推國手能公道世人高下在圍棋中正柳吳興其六莫將絶藝向人誇新勢斜飛一角差局罷兒童間數子不知勝負落誰家贈寇白門六首白門故保國朱公所畜姬也保國北行白門被放仍返南中秦淮相遇殊有淪落之感口占贈之南內無人吹洞簫莫愁湖畔馬蹄驕殿前伐盡靈和柳誰與蕭娘鬪舞腰其二朱公轉徙致千金一舸西施計自深今日祗因句踐死難將紅粉結同心其三同時姊妹入奚官挏酒黃羊去住難細馬馱來紗罩眼鱸魚時節到長干其四重點盧家薄薄妝夜深羞過大功坊中山內宴香車入寶髻雲鬟列幾行其五曾見通矦退直遲縣官今日選蛾眉窈娘何處雷塘火漂泊楊家有雪兒其六舊宮門外落花飛俠少同遊並馬歸此地故人騶唱入沉香火暖護朝衣題莊榿菴像四首錦里先生住錦涇百花潭水浣花亭子雲寂寞餘奇字抱膝空山著一經其二相如書信達郫筒入蜀還家意氣雄却憶故人天際遠罷官嚴助在吳中其三把卷無人意惘然故鄉雲樹夢魂邊遙知石鏡山頭影不及當時是少年其四舊朝人地擅簮纓詞賦風流妙兩京盡道阿兄多貴重杜家中弟最知名楚雲八首楚雲字慶娘余以壬辰上已為朱子葵子葆子容兄弟招飮鶴洲同集則道開師沈孟陽張南垣父子妓有畹生者與慶娘同小字而楚雲最明慧可喜口占贈之十二峰頭降玉真楚宮祓禊采蘭辰陳思枉自矜能賦不詠湘娥詠雒神其二白蘋江上送橫波擬唱湘山楚水歌却為襄王催按曲故低紈扇簇雙蛾其三越羅衫子揉紅藍楚玉鸞雛鏤碧簮莫羡鴉頭羅襪好一鈎新月印湘潭其四新篘下若酒頻傾楚潤相看別有情小戶漫糾還一笑衆中觥政自縱橫其五風流太守緑莎廳近水夭桃入畫屏最是楚腰嬌絶處一雙鸂鶒起沙汀其六范蠡湖邊春草長楚天歸去載夷光人間別有朱公子騎鶴吹笙是六郎其七畫梁雙燕舞衣輕楚楚腰肢總削成記得錢塘兩蘇小不知誰箇擅傾城其八廬山攜妓故人留白社流連謁惠休早為朝雲求半偈楚江明日上黃州山塘重贈楚雲四首楚雲故姓陸雲間人宣公橋畔響輕車二月相逢約玩花烏柏著霜還繫馬停鞭重問泰娘家其二家住橫塘小院東門前流水碧簾櫳五茸城外新移到傲殺機雲女侍中其三月夜分攜幾度圓語溪芳草隔雲煙那知閶闔千條柳拋撇東風又一年其四挾彈城南控紫騮葳㽔春鎖玉人留花邊别有秦宮活不數人間有秺侯題殷陟明仙夢圖蕉團桐笠御風行夢裏相逢話赤城自是前身殷七七今生贏得是詩名梅村家藏藁卷弟八終

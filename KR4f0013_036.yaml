body:
  text: 文先生六十序滇南文先生以計偕入太學崇禎十六年天子命為婁人師婁之人不知師道二十年於茲矣自先生至教以君臣父子之禮堯舜周公孔子之道董其怠情誠其凌誶以期於有成於是遠近稱為先生鄉大夫之賢者必之先生謁里中戴白之老不知詩書者咸日先生君子也無何北兵至在先生之義不可以留將行其弟子進日先生行固當雖然先生所居者職也其所事者道也盍謝其職而修吾道乎先生而無為吾道計也其為吾道計先生留先生拂然作色不悅日異哉二三子之為此言也吾比者教汝何若而棄之耶吾之行也不可以過今日其弟子又進日先生行矣滇南去吳萬里過酉陽上灕水若是其險也且又阻兵今傫然儒者也將襆被乎越豺虎之徑而弟子莫隨此棄其師矣先生而行也願請從先生日諸君有親不可以吾故纍且我固非歸也吾將從蒼公遊蒼公者滇人住吳之中峰以佛教重東南者也先是蒼公講法華於婁之海印菴先生以同里而異術竪義相論難婁人之知先生與師最深及是聞之則大喜日先生去我未遠也若亂定滇道未通者當請先生還先生許諾久之迎諸山中有以私舍設都講布函文請者先生放杖而笑自理其鬚髯日吾已僧服矣乃即城南精藍中置木榻命一童子支鼎爨盡謝其生徒杜門不交人事如是耆四年先生年六十弟子請一言夀於先生余日滇南天下饒樂地也丹砂鐘乳土所出珠璣犀象果布之湊其田也畝數鐘千金之裘不貴於市無為惡寒矣且其人以隔絶山海今猶襲冠帶以居而先生獨阻亂不得歸出無車食無肉褐以為暖瓿盎以為儲夫奮國舊都望之纍欷况兄弟親戚之洫焉若有亡乎年齒衰矣道路長矣而鼙鼓之聲日闐闐者先生其獨且奈何哉或日蒼公學道者也捐親黨棄閭里遺世離人而立乎獨以彼視萬里猶尋文也余應之日蒼公之所學者佛也其道如是足爾先生所學者堯舜周公孔子之道其於君臣父子也仕必守其官處必歸其家老有所以養少有所以奉今先生居此四年矣庶幾師弟子之禮存焉其君臣父子之道所不行者蓋亦多矣而謂非先生之窮歟抑吾聞之先生又通卜筮象緯形家者言夫滇南所産輒多高人絶學先生以儒者籠絡萬物不名一德今毁服童髮而遊於世也將得乎儒釋之合而探其原於是乎齊得喪混欣戚浩浩乎靡所津涯其為道也吾又烏足以知之哉噫嘻此真先生也蒼公日嚮者吾論難固自以為勿及也座師李太虛先生夀序偉業嘗讀歐陽文忠公傳見其行事慨然想見其為人以為上下千百年江右儒者學術之盛未有出於歐陽公者也獨疑其致政之後不歸廬陵而買田潁上何歟蓋有宋待臣子之禮為最厚為之臣者亦戀戀君父不忍遠歸故土而於宛雒汝潁之間起居朝請以近於京師韓范杜富諸公皆然不徒歐陽公也自歐陽公後江右士大夫咸被服其遺教凡數百載而有吾師李太翁先生先生入承明典制誥掄文於楚楚之詩人才士夙負重名者裒然為舉首此歐陽之厯二府司兩制以知貢舉得人者也先生性強直為臺諌所中隱居白鹿講授生徒天子再召用決大計爭南遷深當上旨事不果行此歐陽之貽書司諫貶秩夷陵力持濮議為朝論所排者也先生攟拾纍朝故實抄撮成書凡數百卷欲以成一代之良史好古博物訪求金石篆刻遇有所好雖傾囊為之勿吝此歐陽之修唐書紀五代以其餘力為集古録者也盛明之際詞林先達如曾子棨崔後渠諸公皆慷爽闊達有詩酒稱嘉隆而降則齪齪拘謹以為常先生則不屑也居公卿間興酣耳熱朝章國故慷慨極論詩文揮灑援接後進為風雅所宗此又歐陽之目號醉翁與石曼卿蘇子美共其流連者也凡先生之同於歐陽公者如此而歐陽公卜居潁上先生亦僑寓維揚維揚者平山堂在焉歐陽公之所遊處也則疑其無不同而偉業獨有感者歐陽公處全盛之世天下無事雖免而家居猶述其三朝被遇之榮以誇耀於田夫野老而先生流離險阻浮海南還家園烽火禍亂再作僅以其身漂泊於江山風月之間其視歐陽之潁上相去固已遠矣雖然吾師之為人儻朗而曠遠以視人世之危疑患難實不足以動其心而損其意氣其之維揚也與偉業相遇於虎丘別十五六年矣其容加少其髮加鬒握手道故漏下數十刻猶危坐引滿議論衮衮不倦偉業顚毛班白自數其齒少於師二十歲而憂患蹙迫以及於早衰竊仰自慚歎以吾師為不可及歐陽公晚年自號六一居士齊得失忘物我泊然其無憂浩然其自適吾師似深有得於斯者而所遇各殊則歐陽為其易吾師尤為其難也偉業聞之古之至人達生之情識命之理無江海而間不導引而夀其吾師之謂耶彭燕又五十夀序士之能立言者必需之歲月以自驗其學問之所至若夫遭遇亂離而獨以其身超然於塵壒之表則筆之於書者將為天下後世所考正其平生之學尤可重焉往者余偕志衍舉於鄉同年中雲間彭燕又陳卧子以能詩名卧子長余一歲而燕又志衍俱未三十每置酒相與為歡志衍偕燕又好少年蒱博之戲浮白投盧歌呼絶叫而卧子獨據胡床難巨燭刻韻賦詩中夜不肯休兩公者目笑之曰何自苦卧子慨然曰公等以歲月為可恃哉吾每讀終軍賈誼二傳輒繞床夜走撫髀太息吾輩年方隆盛不於此時有所紀述豈能待喬松之夀垂金石之名哉曹孟德不云乎壯盛智慧殊不吾來公等奈何易視之也其後十餘歲志衍不幸殁於成都卧子則以事殉節其遺文卓犖流布海內不負所志余與燕又偷活草間又六七年於此矣自顧平生無可表見將以其餘年肆力於文章顧兵興以來流離奔走神智耗竭每憶少時讀書不至抵滯今手一編者終日覆而按之不能舉其辭蓋余年過四十而髮變齒落志雖盛而其氣亦已衰矣追念卧子疇昔之言未嘗不為之流涕也春初與燕又遇於吳門問其年則已五十去余同舉之歲曾幾何時而遂迫始衰日月如流能不浩歎已而燕又盡出詩文讀之則余又驚其才之壯而意之新博聞辨智有精強少年所不能及者其生平著述之足以服當時而垂後世無疑也昔者吾夫子刪詩書定禮樂自中古以來所推者則惟君家老彭其稱之日述而不作信而好古以此言之其為多聞博洽之儒歟後世乃取神仙詭異之説附著其傳以為彭祖陸終氏之第三子堯時受封至商武丁朝尚存而年且八百其言荒遠不經搢紳者所不道然以吾思之當唐虞之禪讓夏商之興衰故家舊臣無復存者上古譜牒失傳年祀莫紀而彭祖獨以皤皤黃髮綴捨前王之舊聞受其説者見多識往事年踰耆耋而有壯容震而驚之以為此數百歲人耳非實事也老𥅆東周柱下史伯陽父史儋皆先後同官而𥅆之書獨傳後世且合此三人者為一人而謂老𣆀修道養夀壽可百餘歲或云二百歲夫彭祖猶是也今燕又之詩文其在天下者經世代遷改卷帙塵蠧後生之徒覩其姓氏且以為古之賢人而不知其年尚五十若令杜門絶迹不與世通著書三十年書成而所紀皆易世之事日月闊遠見聞綿邈得無有疑其甲子不知何代人耶目古遭兵火而磨滅如卧子志衍者不少而遺民佚叟為造物所留以當文獻者亦往往見焉余既自力於學懼弗克而以勉燕又有以知其必成乃因其門人之請而敘之若此黃觀只五十壽序往余讀碧山集知嘉禾黃葵陽先生以省元取高第入史館回翔宮相幾及大用既而從吾師西銘之門識其孫觀只亦以省元後先踵武浙東西誇為盛事則又吾友大樽所鑒拔而登之者也歲月云邁二十餘年觀只春秋五十其同里虞君談君等徵余一言噫余言何足為觀只重哉昔東漢之世江夏黃瓊偕其孫琬並至宰相封侯直節疆諫彪炳史册運會有盛衰人世有險易遂使再世之內遭遇懸殊君子讀其傳不能無感焉今以近事觀之詞垣宿素世際休明雍雍乎清廟之朱絃明堂之蒼璧詩日鳳凰鳴矣于彼高岡葵陽之謂也藝苑名流憂生坎壈惴惴乎芳蘭之當門冥鴻之在澤詩曰蒹葭蒼蒼白露為霜觀只之謂也觀只之為人能孝友知大節不為巽耎骳俯仰以從時又不肯經奇釣名修跅􅕟非常之行遭逢變故周旋義舊死生急難勿易其心若夫士窮見歸之時有親在不許之義闔門百口纍世卿宗不敢以徇知已刎頸之一言則其自處權之審已名高則嫌無可避地近則義無所辭收者到門曲刃在頸夷神委運詞色不撓誰謂荼苦其甘如薺觀只其甘之矣及其免也不以慮患而刓方為圓不以違俗而尊已忽物或柴門絶客離事自全或浮湛俗間與世不競蓋不夷不惠可否之間觀只之所處不巳優乎夫生於華胄少遇名師家在通都才稱國士當其駒齒未落豫章尚小人便目之以騏驥期之以棟梁今五十之年忽焉已至論者且為觀只惋惜余則以二十年來人材凋落其齎志以往持忠不顧者不必更論乃有乘時取寵據磐石之安而一朝蹉跌要領不全門戶破壤者比比而是矣觀只以窮孝廉優遊家巷關木索不以為辱辭玄纁不以為榮其所以全之者天為之也詎不幸哉家有祕書萬卷皆前人從西清異本手自校讐繕寫成帙而舅家頂氏所藏唐宋名人手迹卷握之物價值千金今悉化為煨燼貪及餘生孜孜搜訪庶幾蕉園蠧簡重出人間玉軸丹青不罹劫火此觀只所以圖令名而垂不朽者也韭溪之上練浦之傍其為辟疆之名園羊曇之別墅亦既蕩於烽煙鞠為茂草矣乃以其暇闢平皋灌蔬壤誅茅避迹伏臘迎賓漁釣自娛絲竹間作弔汨羅之故人談鴟夷之往事望煙波而不見酹杯酒以興懷此觀只所以消壯心而娛晚歲者也西銘之有觀只中郎之於仲宣也大樽之有觀只廬陵之於子瞻也兩賢既沒友道淪亡賴遺逸之尚存庶微言之不墜雖以道喪元龍徒憐意氣猶幸人如叔度足繼風流此觀只所以結平生而申同好者也余也少壯登朝羈栖末路犬馬之齒未填溝壑獲與觀只稱齊年而困厄憂愁頭須盡白其視觀只逍遙乎網羅之外蟬蛻乎塵壒之表不啻醯雞腐鼠仰覩黃鵠之翺翔寥廓也乃因諸君之請而為之辭其以識余之愧而觀只為不可企及也夫蕭孟昉五十壽序今天下士大夫講學者無如吾友少絫愚山施公由服官之暇倡其道於廬陵而青原山中無可大師修出世之教與之相應和於是吉水之黑白二學盛為海內所宗吾意其山川之靈秀亦必有世家名德者流相與鼓舞倡導乎其間欲求其人以識之而不易得也今乃得吾西昌蕭君孟昉孟昉故太常卿伯玉先生之猶子也伯玉舉進士前於余者十五年自余為兒童時則已誦習其文既仕而蹤迹參錯曾同官南中而竟不獲相見惟聞與吾郡虞山宗伯公遊宗伯之言日伯玉之為人孝友於兄弟篤志於友朋淡泊於榮名利祿築春浮園於柳溪之上極雲泉林木之盛有經史萬卷穿穴講貫於弗倦又能闡繹教乘與緇衲往還相扣擊余益想慕其風流而今乃復得之於孟昉孟昉慷慨好義不吝施子嘗蠲田穀數千石具饔飱以活獄囚又為逋賦者完室家贖子女愚山先生倡學湖西也問道者車接轂孟昉為之供罪屨飾廚傅勝流歙集實至如歸退而與無可大師精妍性相疏通證明剎廟之倡施伊蒲之供奉傾囊倒庋惟恐或後甚矣孟昉之為人有似於伯玉也住者神廟盛時吾吳如顧端文公高忠憲公吉水如鄒忠介公紹續微言倡明絶學而憨山紫柏二大師唱演宗風於吳會豫章之間兩地之學者習其義而盛其傳雖千里之遙猶同堂也伯玉之出入必與其弟次公季公偕孟昉漸漬於諸父及父之所講究故西昌蕭氏有家學伯玉嘗以之官便道館於宗伯之拂水山莊流連度嵗率其子弟言志賦詩友朋間極文章性命之樂紫柏刻大藏方册於吳中卷帙未半宗伯之門人毛子晉謀續之伯玉與兩弟發願藏事經營佽助之尤力滄桑而後孟昉扁舟東來商度先公之所未竟宗伯以為續佛慧命作文夀之孟昉其時年甫壯也歲月而往孟昉今已五十追溯舊遊有如昔夢吾吳之宿素凋落講舍榛蕪而龍藏之莊嚴希有者亦漫漶不可復問矣同里許君堯文官於吉水貽書及余述所謂春浮園者嘉樹名卉高臺曲池滋榮而益觀圖書彝鼎庋藏而加富孟昉又能以其餘力搘拄道法為緇素之所歸往噫嘻豈不難哉愚山今巳歸宛陵而龍眠之徒衆有請無可以歸故山者此兩公皆吳人也吾之為孟昉夀者恐不足以盡孟昉夫賢者之以道合其知之必深彼所以重孟昉者詎止於此乎吾將為書以問之焉冒辟疆五十夀序如皋有孝友易直之君子日冒君辟疆能文章善結納知名天下垂三十年其生平蹤迹於金陵於吳郡遍擇其豪長者與遊願於余獨未邂逅然心嚮往之今年辟疆偕其配蘇孺人春秋五十二子穀梁靑若介陽羡陳其年以余言為請其年奇士也其自為之文以夀辟疆者足以張之矣而勤勤余一言何哉雖然余三十年知辟疆未得一見因其年以見於吾文相贈以言亦猶行古之道也往者天下多故江左尚晏然一時高門子弟才地自許者相遇於南中刻壇墠立名氏陽羡陳定生歸德侯朝宗與辟疆為三人皆貴公子定生朝宗儀觀偉然雄懷顧朌辟疆舉止藴藉吐納風流視之雖若不同其好名節持議論一也以此深相結義所不可抗言排之品核執政裁量公卿雖甚強梗不能有所屈撓有皖人者流寓南中故奄黨也通賓客畜聲伎欲以氣力傾東南知諸君子唾棄之也乞好謁以輸平未有間會三人者置酒雞鳴埭下召其家善謳者歌主人所製薪詞則大喜日此諸君欲善我也既而偵客云何見諸君箕踞而嬉聽其曲時亦稱善夜將半酒酣輒衆中大罵日若奄兒媪子乃欲以詞家自贖乎引滿泛白撫掌狂笑達旦不少休於是大恨次骨思有以報之矣申酉之亂彼以攀附驟枋用興大獄以修舊郤定生為所得幾填牢戶朝宗遁之故鄣山中南中人多為辟疆耳目者跳而免尋以大亂奉其父憲副嵩少公歸隱如皋之水繪園誓志不出嗟乎陵谷既遷人事變滅向之炎炎赫赫者捧馬足而乞命顚墜崖谷不知所之矣二三君子幽愁窮蹙定生亡朝宗歸梁宋亦以病沒江南因初附數有收考一時名豪惴惴莫保家族辟疆清羸雞骨藥爐經卷蕭然塵外自奉憲副公諱尺一之問不踰境中與世無害離事圖全如皋辟疆冒氏為右姓家世好行其德年飢為粥於路全活億萬計處患難之際先人後己揮金數千斤脫親知於厄不居其功傳日有陰德者必受其報門戶之無恙有天道焉自其祖玄同先生用方州著績憲副襄漢出入兩都政事學術咸有師授辟疆修祖父之業遭時不仕益發之詩文以及於穀梁伯仲冒氏之集凡四世矣其年者定生子也具舟迎以來俾與兩弟及二子俱刻燭分題唱酬交作每更闌月落追思陳事少年腸肥腦滿感慨激昂思有以效其尺寸日月云邁身世都非覽明鏡以興嗟苦修名之不立未常不中夜而倣徨也青溪白石之勝名姬駿馬之遊百萬纒頭十千置酒自豪習破除依稀昔夢彼美人兮不見折苕華以自思未嘗不流連而三歎也謝安石有言中年以來傷於哀樂政賴絲竹陶寫耳乃有梨園舊工自云向事𤾂司馬為之主謳江上視師之役同輩皆得典兵黃金橫帶夫執千戈以衛社稷付之俳優侏儒而猶與吾黨講恩仇而爭勝負用仕局為兵機等軍容於兒戲不亦可盍然一笑乎辟疆以五十之年俯仰興廢闔門高枕誅茅卜築緑水名園楓柳千章芙蕖百畝子弟皆鸞停鵠峙掞藻敷華蘇孺人含飴弄孫鹿門偕隱中外咸推禮法奴婢亦知詩書厯觀江淮以南有華宗貴胃保世全名令妻夀母嫓美一德如冒氏者概乎未之見也可無賀耶余獲交於賢士大夫不為少矣流離世故十不一存幸與辟疆生長東南年齒相亞君方始衰吾已過二昔人所謂遺種之叟吾兩人足當之耳詩有之日莫往莫來悠悠我思又曰招招舟子人涉卬否人涉卬否卬須吾友夫吳會者辟疆之所常遊而喪亂以後不一過焉將子無怒秋以為期辟疆其許我乎否也其年行請以吾言問之白封君六十夀序吾州白侯林九視事之初年余在京師謁侯之太公雙泉於邸第其容粥然其氣溫然言呐呐不出口余目之此真寬仁長者也越五年侯之報政成而太公六十州人士以其習於余也不可無言余嘗讀萬石君傳見其子孫馴行孝謹而少子慶之治齊也國人慕其家行而大治心竊疑之漢時海內初定而齊又反覆夸詐以為俗其法當以擊豪強清反側而區區離乎父母之側而其君作為詩歌以勞苦之如小雅四牡之章其言不遑將父因人之情而為之咨嗟太息待之如此其厚也今吾州之去長安三千里而侯以六年積勞於外太公又為南陽之故人代北之貴族留宿衛束師不得御車而南從其子於官也人子之念其親者必能念人之親侯於聽政之暇舉吾州之白首耆艾者七人倣周官之意飲酒于序正其齒位名日婁東七老而吾父與焉吾父行年八十其視太公也齒髮加衰太公有賢子足以娛樂余也羈愁旅病不能取給於升斗之祿俾老人輟念而太息中夜而屏營矣侯則式閭以勞之肆筵以綏之其所謂老吾老以及人之老者歟當石慶之相齊也有濟南伏生魯人申公者皆耆碩大儒慶不聞執板到門北面而事之也然則石氏之所知者謹而已矣烏識所謂孝夫孝有不貴德尚齒使民興行者哉白侯經術最深內行醇至異日者進為公卿而太公齒德彌邵天子三雍告成修授几乞言之禮求國老於上庠舍太公其誰乎當以尚德緩刑化民成俗之道再拜而獻之庶幾老成黃髮之一言俾人各親其親長其長而先王以孝治天下者始大備偉業請上其事於東觀以光國之惇史固不僅與閭師黨正效祝嘏之詞以為公夀巳也謹書之以俟是為序梅村家藏藳卷弟三十六終

front:
  text: 梅村家藏藁卷弟二十一詩後集十三詩餘小令中調六十首
  hash: sha256:3548fbf8ea52bbe4cfeb95ad8f6f8a9a8777c8aaf6596d052e852510f6e85162
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_021-1a}
body:
  text: 望江南一十七首江南好聚石更穿池水檻玲瓏簾幕隱杉齋精麗繚垣低木榻紙窗西又江南好翠翰木蘭舟窄袖衩衣持檝女短簫急鼓采菱謳逆槳打潮頭又江南好博古舊家風宣廟乳爐三代上元人手卷四家中厰盒鬬雞鍾又江南好蘭蕙伏盆芽茉莉縷藏新茗椀木瓜香透小窗紗換水膽瓶花又江南好蒱博擅縱橫紅鶴八番金葉子玄盧五木玉楸枰擲采坐人傾又江南好茶館客分棚走馬布簾開瓦肆博羊餳鼓賣山亭傀儡弄參軍又江南好皓月石塲歌一曲輕圓同伴少十反麤細聽人多絃索應雲鑼又江南好黃爵紫車螯雞臛下豉澆苦酒魚羹加芼擣丹椒小吃砌宣窑又江南好櫻笋薦春羞梅豆漸黃探鶴頂芡盤初軟剝雞頭橘柚洞庭秋又江南好機杼奪天工孔翠裝花雲錦爛氷蠶吐鳳霧綃空新様小團龍又江南好獅子法王宮白足禪僧爭坐位黑衣宰相話遭逢拂子塞虛空又江南好閙掃鬬新妝鴉色三盤安鈿翠雲鬟一尺壓蛾黃花讓牡丹王又江南好豔餙綺羅仙百襇細裙金綿柳半裝高屧玉臺蓮故故立風前又江南好繡帥岀鍼神霧髩湘君波窈窕雲幢大士月空明刻畫類天成又江南好巧技棘爲猴髹漆湘筠香墊几戧金螺鈿酒承舟鈒鏤匠心搜又江南好狎客阿儂喬趙鬼揶揄工調笑郭尖儇巧善詼嘲幡綽小兒曹又江南好舊曲話湘蘭薛素彈丸豪士戲王微書卷道人看一樹柳摧殘如夢令鎭日鶯愁燕懶徧地落紅誰管睡起爇沉香小飮碧螺春盌簾捲簾捲一任柳絲風軟又誤信鵲聲枝上幾度樓頭西望薄倖不歸來愁殺石城風浪無恙無恙牢記別時模様又小閣焚香閒坐摵摵紙窗風破女伴有誰來管領春愁一箇無那無那斜壓翠衾還卧又煙鎖畫橋人病燕子玉關歸信報道負情儂屈指還家春盡休聽休聽又是海棠開近又昨夜酒闌人醒移過玉人鴛枕同到瑣窗前照見一簾花影誰肯誰肯不怕月明風泠生查子靑鎖隔紅牆撇下韓嫣彈花底玉驄嘶立在垂楊岸纎指弄東風飛出銀筝雁寄語畫樓人留得春光半又香煖合歡襦花落雙文枕嬌鳥出房櫳人在梧桐井小院賭紅牙輸卻蒲桃錦學寫貝多經自屑泥金粉又旅思一尺過江山萬點長淮樹石上水潺孱流入淸谿去六月北風寒落葉無朝暮度樾與穿雲林黑行人顧點綘唇蕉團細骨珊珊指尖拂處嬌絃語著水撩人點點飛來雨撲罷流螢帳底輕風舉眠無主誤黏玉體印得紅絲縷浣溪沙斷頰微紅眼半醒背人驀地下堦行摘花高處賭身輕細撥薫爐香繚繞嫩塗吟紙墨欹傾慣猜閒事爲聰明又一斛明珠孔雀羅湘裙窄地錦文鞾紅兒進酒雪兒歌石黛有情新月皎玉簪無力暖雲拖見人先唱定風波菩薩鬘江天漠漠寒雲白長橋客醉閒吹笛沙嘴荻花秋垂蘿拂釣舟危峰欹半倚仄徑蒼苔屐欲上最高亭遠山無數橫減字木蘭花題畫藤谿竹路鳥道無人雲獨過鹿柵猿栖布襪靑鞋客杖藜江頭尺鯉展罷生綃天欲雨記得曾游古木包山五月秋又詠足香趺印淺不涴春泥紅一寸羅襪鈎鈎點拍輕匀小鳳頭歸來露滑醉把雙纏微笑脫撥醒檀郞眼底端相白似霜醜奴兒令落紅已拂雕闌近入手枝低莫肻高飛費盡東風著力吹分明燕子啣來到因甚差池墜在汚泥惹動游絲不自知又溪橋雨過看新漲高柳鳴蟬荷葉田田指點兒童放鴨船前村濁酒沽來醉今夜涼天明月初圓一枕西窗自在眼又低頭一霎風光變多大心腸没處參詳做箇生疏故試郎何須抵死推儂去後約何妨郤費商量難得今宵是乍涼淸平樂題雪景江山一泒換岀瓊瑤界凍合灘舟因訪戴沽酒南村誰賣草堂風雪雙扉畫圖此景依稀再𥙷吾廬佳處露橋一笠僧歸浪淘沙題畫蘭枉自苦凝眸腸斷歸舟依然明月舊南樓報道孫郎消息好楊柳風流花意落銀鈎一寸輕柔生綃不剪少年愁看取幽蘭啼露眼心上眉頭又端午纏臂綵絲繩妙手心靈眞珠嵌就一星星五色疊成方勝小巧様丹靑刻玉與裁氷眼見何曾葫蘆如豆虎如蠅旁繫纍絲銀扇子半黍金鈴又枇杷上苑落金丸黃鳥綿蠻曉窗淸露濕雕盤恰似戒珠三百顆琥珀沉檀纎手摘來看香色堪餐羅衣將褪玉漿寒怕共脆圓同薦酒學得些酸柳梢靑紅粉牆高風吹嫩柳露濕夭桃扇薄身輕香多夢弱腸斷吹簫誰能一見相抛動人處詩成彩毫帳底星眸窗前皓腕又是明朝西江月靈巖聽法昔日君王舞榭而今般若經臺千年覇業總成灰只有白雲無礙看取庭前柏樹那些石上靑苔殘山廢塔講堂開明月松間長在又詠別烏鵲橋頭夜話櫻桃花下春愁廉纎細雨綠楊舟畫閣玉人垂手紅袖盈盈粉淚靑山剪剪明眸今宵好夢倩誰收一枕别時殘酒又詠雪塑僧伽像透岀光明眼耳忍來氷雪心膓坐時兩手且收藏揑弄兒童無狀著體生成冷絮開門自在齋糧大千世界儘銀裝到得來朝一様又春思嬌眼斜廻帳底酥胸緊貼燈前匆匆歸去五更天小膽怯誰瞧見臂枕餘香猶膩口脂微印方鮮雲蹤雨跡故依然掉下一牀花片南柯子涼枕頰印紅多暈釵橫響易尋美人一覺在花陰怕是耳珠鈎住鬢雲侵有分投湘簟無緣伴錦衾眼多喞溜爲知音受盡兩頭牽繫像人心又竹夫人玉骨香無汗從教換兩頭受人顚倒被人勾只是更無膓肚便風流嬌小通身滑玲瓏滿眼愁有些情性欠温柔怕的一時抛擲在深秋鵲橋仙園林晚霽池塘新漲明月窺人縹緲萬木陰森穿影過驚噪起一羣山鳥纎雲暗度銀河斜轉露濕桂花香悄少年此夜不須眠把鐵笛橫吹到曉南鄉子新浴皓腕約金環豔質生香浸玉盤曲曲屏山燈近遠偷看一樹梨花露未乾扶起骨珊珊裙􅙳風來怯是單背立梧桐貪避影更闌月轉廻廊半臂寒又春衣玉尺剪裁工鬪色衣衫巧樣縫深淺配來纎手綻重重蒲紫蒲靑雅澹中斜領叩金蟲透肉生香寶袜鬆茜袖半垂鴉襪淺從容百折羅裙細細風又牡丹頭高聳翠雲寒時世新妝喚牡丹豈是玉樓春宴罷金盤頭上花枝鬭合歡著意畫煙鬟用盡玄都墨幾丸不信格陽千萬種爭看魏紫姚黄總一般臨江仙逢舊落拓江湖常載酒十年重見雲英依然綽約掌中輕燈前纔一笑偷解砑羅裙薄倖蕭郎憔悴甚此生終負卿卿姑蘇城外月黄昏綠窗人去住紅粉淚縱横又過嘉定感懷侯研德苦竹編籬茅覆瓦海田久廢重耕相逢還說廿年兵寒潮衝戰骨野火起空城門戸凋殘賓客在淒涼詩酒侯生西風又起不勝情一篇思舊賦故國與浮名醉春風春思門外靑驄騎山外斜陽樹蕭郎何事苦思歸去去去燕子無情落花多恨一天憔悴私語牽衣淚醉眼偎人覷今宵微雨怯春愁住住住笑整鸞衾重添香獸別離還未又眼底桃花媚羅襪鈎人處四肢紅玉軟無言醉醉醉小閣迴廊玉壺茶暖水沉香細重整蘭膏膩偷解羅孺繫知心侍女下簾鈎睡睡睡皓腕頻移雲鬟低擁羞眸斜睇江城子風鳶柳花風急賽淸明小兒擎走傾城一紙身驅便欲上天行千丈游絲收不住纔跌地倐無聲憑誰牽弄再飛鳴御風輕幾人驚江南二月聽呼鷹趙瑟秦箏天外響彈不盡海東靑千秋歲題袁重其侍母弄孫圖吳中佳士獨有袁絲耳營筆墨供甘旨但期慈母笑敢告吾勞矣願只願年年進酒春風裏少婦晨妝起抱得佳兒侍珠一顆駒千里石麟天上送蠟鳳階前戲囘首道待看兒長還如此風入松題和州守楊仲延所寄鷹阿山人戴君晝長松落落蔭南岡亂山橫砌銀塘梅花消息經年夢慢支頣老屋繩牀棐几風吹散帙紙窗雨洗疏篁丹靑㸃染出微茫妙手過倪黄寒雲流水閒憑弔誰能認當利横江翰墨幽人小戴文章太守歐陽永遇樂壽江林有郡丞二水東流千山西擁中有英彦漢重言詩齊推善賦綵筆彤墀薦大堤驄馬五嶺朱幡移向吳雲一片看油幢譚笑丰神紫氣佳哉葱蒨華堂開處楊柳千條拂面玉簫金營茉莉香淸枇杷果熟五月榴花宴黃梅雨足綠野陰濃盡說太平重見願使君長把瑶觴輕揮紈扇紅林檎近春思龜甲屏還掩博山香未焦鸚鵡煖猶睡曉鶯上花梢醒來擡身半晌細雨濕夢無聊女伴戲問春宵笑頰暈紅潮黛眉新月偃羅襪小蓮袎更衣攏髩背人自折櫻桃怨玉郞起早日長倦繡小樓花落吹洞簫金人捧露盤觀演秣陵春記當年曾供奉舊霓裳歎茂陵遺事淒涼酒旗戲鼓買花簪㡌一春狂綠楊池館逢高㑹身在他鄉喜新詞初塡就無限恨斷人腸爲知音仔細思量榆聲減字畫堂高燭弄絲簧夜深風月催檀板顧曲問郎柳初新閨思畫欄深鎖鴛鴦暖照素影花枝軟綠雲斜軃寳釵欲墜倦起日高猶嬾嗔道是風簾捲半擡身慵開嬌眼閣外靑山點點問平疇綠蕪誰糝玉驄嘶去欲窺還避肩倚侍鬟微掩凝望處雙眉歛似不禁燕拘鶯管梅村家藏藁卷弟二十一終

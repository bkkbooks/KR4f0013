front:
  text: 梅村家藏藳卷弟四十三文集二十一墓志銘二
  hash: sha256:aa07ced4b1a429ea54583be2bee1d61f91f3e4ed5121220cb88db048a996dd37
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_043-1a}
body:
  text: 鴻臚寺序班封兵部武庫司主事丹陽荆公墓志銘丹陽之北七十里為黃塘村有荆氏祠堂子孫纍千人喪葬祭享必合其族於祠下有以鴻臚寺序班封奉直大夫兵部武庫司主事葬金壇之麥穗街者為玄初公族人所推為祠正者也公諱文端字肅之玄初其別號卒之歲得年八十有五其以兵部主事封公者曰吾友實君諱廷實崇禎癸未進士其先漢荆王賈也以國為姓元末祥十公徙居珥塘村始為丹陽人纍傳而水南居士諱輅以次子考功郎光裕貴封如其官丹陽之荆始大福建漳州府幕省吾公諱光祚水南長子於考功為兄則公父也公繇諸生入太學授官鴻臚輒去職家居以孝悌聞先人資産推其上腴以與仲叔二弟仲蚤亡子幼公成就之訖於舉進士而實君先是辛酉捷省闈以經義知名當是時金沙婁東負天下望實君最蚤達為共起者所推重海內之士贏糧徒步以趨金沙門巷常滿其為實君所容接者見公無不拜公顧勿色喜曰吾家自水南公以來皆用退素為業爾以經生驟致虛譽若此可不戒哉已而實君棲遲纍上顧視同輩及後舉者皆食祿得顯官親老矣公乃慰之日若以名德重天下於我足矣豈藉一第娛老人耶其雅趣如此公為人強力任事醇謹篤誠性方嚴寡言笑不妄交與好面折人之過其中寬然長者也輕財好施見孤婺矛牙窮餓者傾囊槖毁質劑無幾德色其為祠正也每春秋時享庀爼豆省牲牽具薪蒸視滌濯率羣從子姓執籩祼獻不以年至為讓不以寒暑為解祀畢手料簡酒肉序列長幼飲三行顧視同坐諸老人曰吾族大子弟數犯法不可以無教令乃書二簿明徴其善否召不率教者前責之日某年月日以某事應擲罰雖甚頑梗若撻於市無所容退而相戒莫敢犯恐使我公知也一郡之人咸稱其宗法公以己丑三月十八日卒即以是年十一月十七日偕王宜人合葬宜人王恭簡公之孫涉縣令栗菴公之女有家教年七十有五戊寅七月之三日卒生四子長廷獻仲廷聘兵部主事實君為叔子而廷璧其季也女一諸孫十人丙戌舉人名子周者廷璧出於是實君以其狀來乞銘婁東吳偉業日宗法之不行於天下久矣自大夫不立家廟世族弗設宗老而長幼無所習賢不肖無所勸兵興以來譜牒散失數傳之後將視其祖父不知誰何之人此可為歎息者也余與實君交二十年其間友朋摧折殆盡或親從凋落或家門陷破獨於荆氏名高而德違其禍仕晚而祿逮其親處於邑危民亂搶攘流離之中而能使門戶宴然名位通顯守先人之祠以教養子孫其祖宗之積厚使然歟抑宗法之善足以致之歟君子謂玄初公之處己也惠而勤其教人也肅而寬其事先也敬而有禮是不可無銘為之辭曰公生己丑世宗代日月七紀天地壞先朝逸老古遺愛宜人長當甲子再又十有五祿不待四子十孫福大來叶俊倬修傳建遠邁夔皋及周後未艾龜食其吉筮無害後五千年銘石在嘉議大夫按察司使江公墓志銘按察司使江公病且革執余手流涕曰吾死不可不速葬吾墓有寢室將於此終焉所以窆穸之易也言已哽咽哭哭已復諈諉如前余為失聲長慟其明日公果輿疾載裨而行越十有一日卒先是公葬其原配張宜人遂自草生壙志略於是其子德祉孫紹賢以庚寅六月十五日葬公八里橋之新阡乃即公志略來乞銘余泣曰公未死而欲見余文既病而托余以死也其何忍辭為序而銘焉序曰江氏家世無為軍始祖聚從高皇帝起兵以功授昭信校尉世襲浙江衛所百戶聚子亮升千戶改太倉衛進栺揮僉事亮生懷遠將軍宣宣生指揮同知英英生二子長都襲世爵次山則公王大父也山生復亭公天然始用文學顯復亭子五人長御史亨泉公有源而見泉公有功為第三子見泉子亦五人仲即公也見泉以孝廉通判寶慶府升雲南彌勒州知州謝病歸公始以乙卯舉春秋第五人壬戌成進士選授刑部主事升員外改調兵部車駕司進郎中以忤璫削奪先皇帝即位起原官擢肅州副使丁外艱服除補廣東嶺西道加參政再遷江西按察司使因署驛傳事以微文被譴歸公之族出及閲官次第得於自敘者如此公成進士叔弟翀寰公昌世甲子舉於鄉見泉公年八十公兄弟五人日擊鮮奏酒諸孫帣韝鞠􅛏上壽里人榮之其任嶺南也翀寰謁選亦得廣州一官公兄弟老矣相愛也仕宦得相依里人又以為榮此公之孝弟也其忤璫削奪也族弟雍世者遊長安與里人某某作歌詩刺璫事發駢斬雍世獨亡命得脫邏者大索蹤迹且及公禍不測公正色無恐卒以免先皇帝初詔用摧折諸臣起家輒致津要公僅循舊牒需次一載乃得備兵肅州肅州為西涼絶域人馬踰隴者道上絶水草且十日公以清郎召用棄擲萬里外於人情不能無少望公處之宴如在嶺南日沿海賈舶闌入貨物為姦利長吏坐而操其息以為常公所轄非泛口以颶作漂大艦數百稅之可得十餘萬緡公禁止勿上岸曰庸知非洋冦耶此公之居身服官也公與給諫荆巖許公為同年相得歡甚里中人所稱江許者也從江右歸給諫已前殁矣余兄魯岡初為孝廉公常奉詔以三品官得舉所知疏其名入薦後魯岡成進士稱廉能世以公為知人始余年七嵗讀書公家孰識公公即是年領鄉薦後三十年家居公折輩行與余及魯岡遊當是時同里中如余兄弟最稱蹇落矣公於他雖甚薰赫未嘗少降意此公之居鄉與交友也公五十外便絶房室間好蒱博諸戲里居十餘年起第舍斥園圃窮日并夜唯恐弗及每一屋成張樂置酒無何窗櫺欄楣移就别築浸尋撤瓦椽從之矣公於子弟不欲有所付託槖中裝多為僮奴竊去晚嵗常苦貧顧搜牢廢篋經營如故人或勸止之笑勿應夫人生謀百年莬裘常為算久遠避凶忌公自以旦暮入地手自料簡下里諸物可謂達生知命矣生平嗜好聊用遣放嗟乎其有不自得於中者耶公諱用世字仲行別號鼎寰生於萬曆癸酉九月二十六日卒於順治庚寅六月初四日年七十有八原配張宜人生於萬曆丙子二月二十日卒於崇禎乙亥四月三十日年六十子二長德禎蚤殁次德社國子生孫男四紹賢府庠生德禎出紹祖紹貴紹顯俱德祉出初公以已丑八月先葬張宜人側室李氏祔焉及公之葬也去殁之日僅及旬耳公羊傳日不及時而日渴也不及時而不日慢葬也過時而日隱之也過時而不日謂之不能葬也當時而不日正也當時而日危不得葬也禮大夫三月而葬同位至公其當時者歟不及時者歟余見六七年來士大夫不告喪不會葬兵革殺禮危不得葬者有之矣其子孫或以卜兆請具喪三年矣葬矣乎未可知也夫過時而不日則固已葬矣春秋猶謂之不能葬況過時而不葬者耶公之預作終制氣絶便斂斂訖便葬于孫遵而行之哭泣盡哀送車數十乘渴葬而得其正可不謂之禮歟吾故謹而目之也銘曰吁嗟江公居此室筮言協謀龜食墨後五千年視銘石封徴仕郎翰林院檢討端陽孫公暨鄒孺人合葬墓志銘余所知先達如毗陵尚書孫文介公以理學為名臣偉業初以後進禮請見會公病薨不果恨當吾世失之庶幾得公之子弟及門與聞公之道者傳其緒言餘論則猶之乎見公也乃今操筆而銘我端陽先生端陽文介弟之子今檢討衣月館丈之父也孫氏家世臨濠明初有都督同知繼達者以賜第常州遂為其郡人稱始祖五傳而為山西行太僕卿鑾與從叔益同舉正德辛巳進士太僕生洲洲生臬再世贈禮部尚書臬生文介諱愼行為乙未進士第三人以禮尚書事光熹兩朝爭李可灼紅丸案引春秋斷獄罹璫禍幾不免端皇帝召至京將用以相遇疾薨其事具國史有弟曰北愚公諱愼思由明經授藍山令生三子端陽先生其季也初藍山教授里中與鄒擴菴孝廉為執友孝廉之子憲副澗寬公少從藍山受經既貴而兩家通婚姻當萬曆之季毗陵世家推孫氏鄒氏憲副用文章政術顯而端陽實為之壻以此遊叔父外父間修學行號知名孫氏自太僕以清白起家子孫産復中落文介篤友愛其刻廉類貧諸生端陽雖宦家子鄒孺人于歸乃至不能謀一椽就文介別業以居攻苦食淡恥以干謁進年三十始輔博士弟子員家貧乏絶間出未歸鄒孺人不肯從親戚假貸炊煙中斷者久之先生還喜而歎曰真吾婦也文介家居講學先生蚤有聞於止躬愼獨之訓其所辨曰義利所重曰盡倫文介以盡倫為止至善嘗著困思抄一書其首章曰文王以仁孝敬慈信為能止故曰聖人人倫之至倫盡則道盡斯以謂之實學先生服膺弗敢忘晚年郡太守會諸生論經義於傳是書院先生拱而言曰學以明倫為本不則從事口耳與高談性命非俗學即偽學也坐者皆為聳聽嗚呼文介之爭紅丸也深有感於兩宮慈孝無間而在朝窺菀枯分水火以致不能調護起居可謂不敬故援經義以垂戒人臣其説本乎正心誠意要諸盡倫而止豈有一毫是非輕重於其間哉先生於三十年之後重為舉揚大指良以見先臣居官立朝為君父持論者在此其平日修身力行為子弟誦説者亦在此然後文介一念篤誠不與黨論異同者始明白於天下後之讀三案者知國是不知有家學非先生之言莫得而徴也可弗識歟先生少失父事蔣孺人以孝聞自傷孤露非科第不足娛侍寡母乃益鏃礪於所業五子俾各通一經講論逾夜分乃罷數奇不得志於有司衣月貴後猶兩應省闈試治經生言不少衰既覃恩受貤封益小心謹畏取文介公之學躬行實踐之於義利之辨守之甚嚴一意絶交遊造請臺使者行式廬禮謝弗見撫伯兄兩孫如己出教養之俾皆有成就族人之婚喪不能舉者傾囊槖以行賙救或其人有非義干犯者弗與校也性和易莊敬夙興夜寐終其身不見有惰容修太僕公遺宅以仰崇堂構於舍後闢一圃顔其堂曰寧遠取語録大義題諸牆壁曰吾以觀心養性焉善奕棋然亦非所好惟酷嗜行楷書能得文介筆法嘗少抄陰符道德經指其中曰此與中庸之論未發者合有異泉瀵湧於圃中作亭其上題曰丹泉自為文記之笑曰人以我為好道徵不知此吾儒仁知動靜所發端也其篤志醇正始終不二若此鄒孺人知詩書嫻內訓婉嬺能得其姑心蔣孺人臨革惓惓於賢且孝躬操作佐蒸嘗儉素撙節之操雖貴弗改其遇親舊也以恩其教子女及諸婦也以禮其戒飭傔從也以法凡助先生成德者功居多中年憂勞子女頗善病晚境漸康適矣然每聞衣月辦嚴入都也疾復作其歸也良已以此衣月不樂居京師同輩及門下士多至顯官而衣月久之不謂凡皆以親故也先生諱艅字季楫端陽其别號卒於丁未正月十三日距其生庚子也年六十有九端陽者著所生日也孺人同年生先一年卒子五長自式丁亥進士以其官封先生為徴仕郎翰林院檢討而母孺人暨妻潘氏并受封即衣月也潘殁繼室以高氏次自儀其受婚母氏之女兄也自咸娶於瞿自晟娶於陳自針娶於吳仲叔以貢需次選而二季諸生女七所適多名族諸子各有子自冡適諸生賢以下共十有六其可名者四曰賢曰繩曰振曰謀餘未名也孫女十有三其行者二餘許字未行也曾孫男一殤衣月將以庚戌正月之九日舉襄事於龍蕩之新阡而因吾友鄒訏士來請銘訏士憲副之孫孺人則其姑也故請之尤力余論次孫氏因以追維疇昔當文介公之𬒳召也余奉謁於彰儀門之邸舍既辭以疾其殁也則從而哭之越十六年再至京師則知同官中有衣月為文介子孫一見相勞苦衣月時請外不許又請急余知其為親故耳語之日余實有老親乃不得已於此君固宜其官者也且兩尊人歲方壯即不得請庸何憂衣月喟然曰先文介以盡倫之道教吾父吾父以之教諸子自式之忝此官也戒以書曰若惟弗墜忠孝以從祖及外王父為之師吾父之所期自式者固不在乎一官也今吾母善病而不去吾豈能以官易吾親哉余日善為流涕而起嗟乎日月云邁霜露不居吾兩人之蒙恩歸里者先後十有餘年而罔極之痛亦同致恨於終天矣微訏士之言余淚且澘然承睫而銘又烏可以已乎乃刪取其狀而繫之以詞曰宋有胡公文定儒宗猶子與子籍溪五峰我思先正毗陵忠孝有姪傳家克已守道厥維初生夢彼赤雲再世而昌協於祥徴有汍者泉取之以祭貽爾子孫源違弗替尚書阡左太僕塋東一邱巋然馬鬛新封我刻茲銘其辭昭灼庶幾後生紹修家學中憲大夫太僕寺少卿泰掖徐公暨李恭人合葬墓志銘故太僕寺少卿徐公諱憲卿字九亮别號泰掖婁之沙溪里人也曾文炯祖諱經父為敬思公諱可久嗣父為少恆公諱可大同纍贈中憲大夫如公官敬思生三子長諱榮次即公也公少受書於伯兄榮經義文旨皆出指授其訓公也如子公事之也如父榮材高有聲諸生間已困躓不遇而公宦達為名卿經紀其兄家有無必共視其子如已出故里中稱孝謹者推徐氏公以已酉舉於鄉癸丑成進士丁嗣父憂丙辰起家授行人司行人册封秦益二藩奉光廟登極詔往山右凡三使皆稱職庚申選授南京工科給事中掌計典尋管京營軍務丁卯添注南京光祿寺少卿三載考績始遷南京太僕寺少卿駐滁州視江南北馬政又五年致仕歸久之以病卒年八十有二公為人醇正忠厚推少文所居官好推薦天下賢者其持論能依名節仕宦二十年常居不競之地同列皆尊用過之在人情不無少望公處之泊如也以是履險而不嬰其難處錞而不屈其名富厚寵榮而傳述於士君子之口以吾耳目所見如公者蓋未一二數焉其以工給事在南也逆璫初用事而三案議起公疏論紅丸以李可灼侍疾不謹無論其叵測有不軌心方士冀幸富貴擅進金石藥嘗試至尊按祖宗朝法論死無赦再奏內批詔獄二欵非所以示天下公宜還內閣下廷尉語甚切而朝議僉同一疏則直斥忠賢且罪狀客氏及所用要人是時朝右尚未敢頌言攻奄者公首先摘發遏其機牙姦黨皆側目焉主紅丸者宗伯毗陵孫公為用事者所齮齕乃攈托同議合三案為成書公疏在要典中排擊且日至又為蜚語造黨録詭託稗官小説者家首福唐葉公高邑趙公百二十餘人公與焉其先後公上封事及名在籍中者率檻車膠致都船之獄滿刺剟榜笞數千旁引株逮遍天下或為恫喝怵公者曰收至矣盍一聽我為諛疏頌德者禍且解公曰我可始直而終佞耶不為動嗟乎公疏璫罪時特以為當官而諍職耳其後赤車奔馳深竟黨與即素號婞直者惴惴無人色公長者疑恇不撓乃坐曹廊中治文書自如惟遣妻子歸日行矣無同禍留一童子守邸舍日飲酒襆被待急徵人以是服公大度能愼所守也璫既敗公乃得纍遷官於滁有城守功又久不調引告得請論者惜之以公老成遺直未嘗位交戟之內備顧問為近臣當白發奄姦忠憤激切其不與楊左諸公同填牢戶者特毫髮間耳及召用摧抑諸賢即徒中致位兩府至貴重矣而公猶沿舊牒常調豫散署一卿復以空文佐冏政滁州大好山水用優名賢誠有餘顧視曹輩咸拜公孤而白首任宦不獲一入長安城又輒罷去然公亦浸病不復關世事矣公患風痺數年治良巳甲申乙酉間疾遂甚不起嘗對子弟道上恩泫然流涕曰吾南中時自分死逆奄手乃得歸骨鄉里復上先人邱隴者纖毫皆先帝力也行年八十旦暮入地顧不先驅螻蟻重見此等事哉噫亦可哀矣公配李恭人事姑以孝御下以仁公廢居轉物纍積纎微恭人佐之所贏得過當而教諸子醇謹無與比損車騎減服飾謝遣交遊馴行孝友聞乎郡國惟公生平用功名始終而世其篤行垂示子孫故遠近皆傳其家法公有三子長二階繇明經除永福縣知縣娶於呂再娶於吳次三智增例生娶於黃恭人出次舒邑庠生娶於周側室孫氏出孫八二階出者五長景耀次升耀次晨耀俱庠生次星耀次朂耀三智出者三長耀班庠生次耀珂耀璡舒出者一震耀恭人以崇禎甲申五月二十五日卒後四年為順治戊子閏四月一日而公殁公之子以某年月日奉公與恭人喪合葬於左字墟之新阡為之銘曰貴勿極官九卿譽勿溢稱黨人拙近道介近情非矯訐非浮沉佚以病勞以生壽不辱富不盈昭令德永永存中憲大夫廣東兵備副使王公畹仲墓志銘余同年進士其在無錫者日馬公素修唐公玉乳錢公凝庵王公畹仲吳公永調為五人素修負夙名晚達而唐公尤衰頓凝庵仕宦不大進永調用足疾引休畹仲有弟曰畝季相繼成進士門第通顯伯仲皆少年在同人中最為踔絶矣已而素修殉節唐公以病錢公以兵皆死而畹仲任南韶憲副聞冦難自經余與畝季遇於吳門相向慟哭無何畝季亦死矣今秋永調以書來為畹仲請銘曰此五人者惟吾在耳是不可無見於君之文也余讀之不覺泫然流涕嗟乎二十年間人事變滅知交都盡觀於一邑則海內可知矣觀於王氏一門則他人可知矣嗟乎其何忍弗銘按狀公姓王氏諱孫蘭字畹仲别號雪肝其先河東人也十四世祖福從建炎南渡僑居吳之洞庭其自洞庭遷無錫則自十世祖信始信以辟召官浙江鹽運提舉生三子其季日忠良公其後也忠良生珩珩生伯周伯周生鵬鵬生宙宙生之柱之柱生贈君我知父子皆諸生有志行我知以次子孫蕙知縣考滿恩贈文林郎即晦季也公為贈君仲子少而頴異父子兄弟間自為師友甲子舉賢書三上始第選刑部主事奉敕視江北獄多平反擢員外郎出守成都煩劇號難治蜀府宗人以氣漁食鄉里市人呌歡操白棓逐之且束苣燔其屋公立而撝曰宗人撓天子法宜治爾等小民爇王府如三尺何皆斂手曰惟太守令當是時微公言幾亂居二年奉贈公及太夫人諱歸服闋起補紹興守歲大祲設法賑救所全活甚衆久之以積勞擢廣東南韶兵備副使粵中承平久軍政不修又以去京師遠督府驕蹇用文法束其下監司治一道兵不得視虎符尺籍糧糗鎧仗無所關預以為常公視事欲有所整飭會猺獞反誓師湟川冒瘴癘穿箐銑薄其巢殊有斬獲御史上其功報聞矣尋楚警狎至長沙衡永蹂躪無堅城韶境接比戲下士不滿百公殫力扞圉使十輩請兵得羸卒七百人復以他警一夜撤去連州陷樂昌乳源仁化自潰韶吏民縋而逃手劍當門不可止城中空無人公仰天歎曰事不可為矣再拜自縊死嗟乎以公必死之志使有一月糧率疲弱之卒千餘登陴授甲即力竭城陷嚼齒罵賊而死猶可無憾地下乃公以一身蔽全粵而督府委南韶嚪賊所呼百不應人心瓦解倉皇自縊是公之死不死於賊死於督府也公死而賊不至人有惜公者曰人臣之義城存與存城亡與亡盍從容鎮定待賊至而死之未晚余日不然夫死者人之所難未有不健於決成於果而敗於猶豫者也當京師初陷時道路所傳以先帝為出狩素修將自裁客或止之日君父存亡不可知而先致命萬一君存國復可若何素修毅然就義不顧也素修死其同時稍濡忍者一為賊得即欲自引決且不能彼夫封疆之吏城陷苟免其遲疑不早斷逡巡獲􅖄者往往猶是也而今責南韶以傷勇有是理歟公之必死其心則素修之心也公之死不如素修則地與事為之也公無愧於心足矣死之輕重何足問哉公配華宜人家本巨族能佐公以廉儉方兩親繼殁公宦蜀在萬里外經營喪紀皆宜人力也嗜禪悅好賑豫自奉簡薄寬和逮下待庶出一如所生公亡九年家事益井井教育婚嫁具有成法公生於萬曆己亥九月十二日卒於崇禎癸未之十月享年四十有五宜人生於萬曆己亥九月三十日卒於順治壬辰之三月享年五十有四其孤仁灝等擇日奉公與宜人之喪合葬於徐陶涇之新阡子六長仁灝縣諸生娶申氏宜人出次仁液縣諸生娶馬氏側室嚴氏出仁溢仁演未娶俱側室計氏出仁渥仁澍未聘嚴氏出女六一適縣庠生殷臣庚卒一適郡庠生侯其源一適國子生楊世憲卒一字吳庠生劉履恆一字胡永和俱宜人出一未字計氏出孫男一仁灝出為之銘曰大庾嶄巖武溪水蝮蛇紏蟠瘴母起白虹燭天忠臣死楓林青青魂歸里城郭蒿萊故宮毁高墳巋然君有子萬里迎喪葬於此後千百年視良史梅村家藏藳卷弟四十三終

front:
  text: 梅村家藏藁卷弟十三詩後集五
  hash: sha256:91583c91a93aa94b17d2d859de0d566def0658a3b9cd882f5ac4c48ffd82e17c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_013-1a}
body:
  text: 五言律詩六十一首過中峰禮蒼公塔四首下馬支公塔經聲萬壑松影留吟處石智出定時鐘尚記山中約誰傳海外逢平生詩力健翹足在何峰其二明月心常湛寒泉性不枯鳥啼香積散花落影堂孤道在寧來去名高定有無淒涼看筆冢遺墨滿江湖其三慧業誰能繼宗風絶可哀昔人存馬癖近代薄詩才鹿走談經苑鴉飛説法臺空懸竹如意落日講堂開其四故國流沙近黃金窣堵坡胡僧眉拄地梵夾口懸河傳法靑蓮湧還家白馬馱他年乘願到應認舊山阿蒼公滇人過王庵看梅感興練川城南三十里為王庵學憲王先生著書地也有梅萬株不減鄧尉余以春日過其廢圃學憲所著數種其版籍尚存地僻幽人賞名高拙宦居客來惟老樹花發為殘書斜日空林鳥微風曲沼魚平生貪著述零落意何如獨往王庵看梅沈雨公攜尊道值余已遄返賦此為笑屢負尋山約偶然來此間多君攜酒至愧我放船還雙屐成孤往千林就一間誰知種花叟鎮日不開關送致言上人獨下千峰去蒼溪出樹腰雲生穿磴屐月滿過江瓢一飯從村寺前身夢石橋經行無定著惆悵故山遙過韓蘄王墓四首訪古思天塹江聲戰鼓中全家知轉鬪健婦笑臨戎汗馬歸諸將疲驢念兩宮淒涼嶽少保宿草起秋風其二行在倉黃日提兵過故鄉傳聞同父老流涕説君王石馬心猶壯雲臺迹巳荒一環堪漬酒殘日下平岡其三詔起祁連冢豐碑有賜亭挂弓關塞月埋劍羽林星百戰黃龍艦三江自石銘趙家金碗出山鬼哭冬靑其四丘壟今蕪沒江山竟寂寥松風吹北固碑雨洗南朝細路牛羊上荒岡草木凋肻容樵豎擾遺恨在金焦宿沈文長山館二首一徑草堂偏湖光四壁天焙茶松竈火浴繭竹籬泉玉鼠仙人洞銀鱸釣客船前村呼種樹偶語石橋邊其二遇山思便住此地信堪留謀食因溪碓齋心在石樓漁舟帆六面橘并樹千頭長共鴟夷子翩然結伴遊福源寺去毛公壇三里為攢雲嶺有福源泉寺以泉名羅漢松係梁朝舊物千尺攢雲嶺金銀佛寺開鹿仙吹笛過龍女換珠來泉繞談經苑松依説法臺蕭梁留古樹風雨不凡材包山寺贈古如和尚古木包山寺蒼然曉氣平石毛仙蛻冷近毛公壇雲影佛衣輕咒鉢蛟人聽彈碁鶴子驚相逢茶早熟匡坐説無生過圻村萬壑響鳴蟬湖光樹杪懸雲鬟神女廟雪乳隱君泉山籠櫻桃重溪船菱芡鮮相攜從此住松老不知年湖中懷友渺渺晴波晚靑靑芳草時遠帆看似定獨樹去何遲花落劉根廟雲生柳毅祠香蓴正可擷欲寄起相思七夕即事四首羽扇西王母雲軿薛夜來針神天上落槎客日邊回鵲渚星橋逈羊車水殿開袛今漢武帝新起集靈臺其二今夜天孫錦重將聘雒神黃金裝鈿合寶馬立文茵刻石昆眀水停梭結綺春沉香亭畔語不數戚夫人其三仙醖陳瓜果天衣曝綺羅高臺吹玉笛復道入銀河曼倩詼諧笑延年婉轉歌江南新樂府齊唱夜如何其四花萼高樓逈岐王共輦遊淮南丹未熟緱嶺樹先秋詔罷驪山宴恩深漢渚愁傷心長枕被無意候牽牛大根菜幾葉靑靑古穿泥弗染痕誰人愛高潔留汝厯涼溫輪囷形難老芳辛味獨存古來磐石重不必取深根趵突泉二首似瀑懸何處飛來絶壑風伏流根窈渺跳沫拂虛空石破奔泉上雲埋廢井通錯疑人力巧天地桔橰中其二不信乘空起憑闌直濺衣池平難作勢石隱定藏機曲水金人立凌波玉女歸神魚鱗甲動咫尺白雲飛贈新泰令楊仲延其地為羊叔子故里置邑徂徠下雙槐夾訟堂殘民弓作社遺碣石為莊野繭齊紈美春泉魯酒香歸來羊太傅不用泣襄陽靈巖觀設戒湖山留霸迹花鳥供經臺不信黃池會今看白社開枯潭龍洗出妙塔雁歸來此地關興廢須資法將才遙別故友二首絶域重分路知君萬里餘馬頭辭主淚雁足覆巢書草沒還家夢霜飛過磧車齊諧他日事應記北溟魚其二雪深難見日海盡再逢關野鼠多同穴神魚斷似山只應呼草地都不類人間勉謝從行者他年有箇還秋夜不寐秋多入衆音不寐夜沉沉浩劫安危計浮生久暫心鄰雞殘夢斷窗雨一燈深薄冷披衣起晨烏已滿林七夕感事南飛烏鵲夜北顧鸛鵝軍圍壁鉦傳火巢車劍拄雲江從嚴鼓斷風向祭牙分眼見孫曹事他年著異聞喜願雲師從廬山歸并序願師住雲居十年而歸出其匡廬詩道五老石門九奇三疊諸勝飛泉怪瀑不可思議而尤以御碑亭雲海為第一觀竟似住鏡光白銀二種世界不知滄桑浮塵為何等事矣願公贈子五十初度詩其落句日半百定將前諾踐敢期對坐聽松聲蓋責豫前約會時方喪亂衰病無家顧以高堂垂白不能隨師以去也乃為此詩答之勝絶觀心處天風萬壑聲石門千鏡入雲海一身輕出世悲時事忘情念友生亂離兄弟恨辜負十年盟贈錢受明獨喜營時譽疏通邁等倫地從諸父重性似外家貧裘馬無他好詩書別有神古來傳孝謹非必守前人受明得子柬賀長因故人子往事憶流連曾黍充閭會俄逢拜衮年諸甥今甫爾入抱卻依然吾老猶堪待公卿只眼前宿徐元歎落木庵元歎棄家住故鄣山中亂後歸天池丙舍落木菴竟陵談友夏所題也落木萬山心蕭條無古今棄家歸去晚別業住來深客過松間飯僧留石上琴里成茅屋計枉向白雲尋送王子惟夏以牽染北行四首晚嵗論時輩空羣汝擅能祗疑搮陽逮猶是濟南徵名字供人借文章召鬼僧阿戎才地在到此亦何憑其二二十輕當世愁君門戶難比來狂太減翻致禍無端落木鄉關遠疲驢道路寒敝衣王謝物請勿笑南冠其三客睡愁頻起霜天貫索明此中多將相何事一書生未俗高門賤淸時頌繫輕為文投獄吏歸去就躬耕其四但可寬幽縶從教察孝廉昔人能薦達名士出髠鉗世局胥靡夢生涯季主占定聞收杜篤寧止放江淹虎丘中秋新霽萬籟廣場合道人心地平天留今夜月雨洗去年兵歌管星河動禪燈風露淸淒涼闔閭墓斷壑起松聲哭亡女三首喪亂才生汝全家竄道邊畏啼思便棄得免意加憐見女關餘劫干戈逼小年興亡天下事追感倍淒然其二一慟憐渠幼他鄉失母時止因身未殞每恨見無期白骨投懷抱黃泉訴別離相依三尺土腸斷孝娥碑其三扶病常聞亂漂零實可憂危時難共濟短算亦良謀訣絶頻攜手傷心但舉頭昨宵還勸我不必淚長流中秋看月有感今年京口月猶得杖藜看暫息干戈易重經少壯難江聲連戍鼓人影出漁竿晚悟盈虧理愁君白玉盤支硎山齋聽雨明早晴更宿法螺精舍秋山所宿處指點白雲生故作中宵雨倍添今日晴一峰當止觀萬象逼孤淸更上上方去松風吹玉笙憩趙凡夫所鑿石石骨何年斫蒼然萬態收直從文字變豈止斧斤搜亂瀑垂痕古枯松結體道即今苔蘚剝一一類銀鈎趙凡夫山居為祠堂今改為報恩寺高人心力盡石在道長存古佛同居往名山即子孫飛泉穿樹廢奇字入雲根夜半藤蘿月鐘聲冷墓門靈巖繼起和尚應曹村金相國請住虎丘祖席應佛心無繫觀空老辨才道隨諸佛住山見相公開日出嚴齋鼓天情護講臺居然歌舞地人為放參來王增城子彥罷官哭子留滯不歸近傳口信不得一字詩以歎之二首老徇妻孥意辭家苦萬端關心惟少子失計在微官客夢烏衣巷鄉愁白石灘可憐消息到猶作兩人看其二庚嶺應逢雁章江莫寄魚遙知雙淚盡不遣一行書家在無歸趣途窮失所如故鄉宜早去臨發乃長吁寄懷陳直方四首漢法三冬繫秦關萬里流可憐諸子壯不料闔門收要路冤誰救寬恩病獨留羈栖騎瘦馬風雪阻他州其二百口風波大三生夢寐真膏梁虛早嵗辛苦得前身索米芒鞋雪傭書布帽塵不知公府椽可識路傍人其三萬事偶相值愁中且遣家江山俄轉戰妻子又天涯客酒消殘漏軍書過落花出門翻自笑安穩只龍沙其四時世高門懼似君誠又稀何辜憂并坐郎免忍先歸苦語思持滿勞生羡息機向來兄弟輩裘馬自輕肥咏月長夜淸輝發愁來分外明徘徊新戰骨經過舊臺城秋色知何處江心似不平可堪吹急管重起故鄉情訪商倩郊居有贈花影瘦籬根江平客在門時吟寒入市晚食雨歸村管記看山爽傭書宿火痕西京遊俠傳乃父姓名存假寐得月滅燭貪涼夜窗陰夢不成雲從閉目過月向舉頭生樹黑添深影溪長耐獨行故人多萬里相望祗盈盈三峰秋曉曉色近諸天霜空萬象懸雞鳴松頂日僧語石房煙淸磬秀羣木幽花香一泉欲參黃蘗義便向此中傳偕顧伊人晚從維摩踰嶺宿破山寺樹老不言處秋深無事中雲根僧過白霜信客來紅樵語歸林火茶煙小院風杳然松下路人影石橋東維摩楓林絶勝則公獨閉關結足出新詩見示遇賞只枯坐秋林自著霜道心黃葉淡勝事白雲忘澗水通茶竈山花對石牀靜中幽思足為我出詩囊夜發破山寺別鶴如上人得來松下宿初月淡相親山近住難定僧高別更真暗泉隨去馬急月卷歸人過盡碧雲處我心慚隱淪苦雨響苦滴殘更愁中耳倍明生涯貪舊業天意誤躬耕乞火泥連屋輸租潦滿城誰家歌舞宴徹曉不聞聲梅村家藏藁卷弟十三終

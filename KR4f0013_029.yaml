front:
  text: 梅村家藏藳卷弟二十九文集七序三
  hash: sha256:ee7b91c645c82541bbb95799f2db64314cc554040bceb7fc0390e46853e3036a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_029-1a}
body:
  text: 宋牧仲詩序往余在京師從大司農歸德侯公以盡交宋中諸賢諸賢方以雪園文社相推許公仲子朝宗遇余特厚無何寇事作朝宗以其家南下一再見於金陵於吳門出其文所為二三同志作傳則皆不免於兵余為之噓唏太息不忍竟讀已而酒酣抵掌劇談海內奇士輒又躍然起曰吾雪園近有年少軼才若之所未見者為宋君牧仲牧仲相國太保公之子也相國嚮官御史時識余比余再入京師相國久致政歸中州人稱牧仲者不容口朝宗之言益信余心嚮慕之又十數年牧仲通守黃州文章政事有當官聲因吾弟聖符為蘄水丞裒其詩纍百首以書寓余而朝宗亦巳亡矣嗟乎甚矣余之憊也回首三十餘年舊遊恍如夢寐才如牧仲生平所願見者遠在江山千里之外焉得而與之遊乎牧仲顧猶不棄而索其一言余乃為之序曰春秋魯僖公九年弦子奔黃十二年黃人不共楚職二國尋折而入於楚其地即今黃州之境楚之所以強者以其兼并江黃故能東向以爭盟長自漢以降蘄黃實為江淮門戶明季盜起其民罔有孑遺迄於今流移未復瘡痍未起君子問其俗考其風未有不為之興懷隱惻者也商頌殷武之章曰撻彼殷武奮伐荆楚冞入其阻次章曰維汝荆楚居國南鄉莫敢不來享莫敢不來王夫殷道未衰楚人先二高宗奮六師行撻伐深入其險阻始克有濟余以為此必非荆楚盡叛之也楚昭王十六年庸人率羣蠻麋人率百濮以謀楚楚人出師自廬以往振廪同食七遇皆北而後王卒會於臨呂子越自石溪子貝自仞遂以滅庸然則殷高宗所撻伐者乃羣蠻百濮之屬以其嶔崎林莽非搜討不能成功詩人所謂采入其阻也夫古之庸濮今之鄖房國家光啓南服而西山餘黨連戰乃尅牧仲官於楚將作鐃歌以紀武功庶幾來享來王之盛比諸商頌之詠湯孫罔有加焉雖然楚人以餫餉之艱故紀其振廩同食以見為役之不易今自黃達鄖二千里方事之殷民之轉運而死者不知紀極呻吟痛惜之聲至今未改也牧仲之於詩也其有恤人之心哉余按夫黃人之所豔稱者莫過於蘇子瞻氏當是時宋有天下已踰百年其去用兵之日如孫曹戰爭者蓋已久矣月明星稀烏鵲南飛子瞻所流連興感者乃不在乎江山景物此風人之旨其所寄托者遠也牧仲宰相子生長兵間目擊乎梁宋亂離蘄黃糜爛生民之脫鋒鏑者曾幾何人豈知一旦官於其土江樓嘯詠為今日之勝耶夫勞止之歌瑣尾之歎詩人所不容已者余故舉其流風遺俗以告牧仲庶幾休養生息聲施乎江漢非徒以其登臨才藻媲美昔賢而已若夫臨皋之館快哉之亭風帆沙鳥煙巒雲樹此牧仲攬之有餘而黃亦余所舊遊也雖老尚當隨牧仲之後從而賦之程崑崙文集序吾友新城王貽上為揚州法曹地殷務劇賓客日進早起坐堂皇目覽文書口決訊報呼謈之聲沸耳案牘成於手中已而放衙召客刻燭賦詩淸言霏霏不絶坐客見而詫曰王公真天才也乃貽上盛推程公崑崙不置程公鎮江通守也南徐幕府初開軍國異容主客狎進程公一儒者左支右掣日不暇給顧以其間為詩古文詞與貽上郵筒唱酬於煙江相望之內嘗登焦山披草搜瘞鶴銘遺迹為衝波撼擊缺蝕不完別購善本磨懸崖而刻之拉貽上同遊相視呌絶憑高弔古各賦一章紀其事江干之人豔稱之余因以追溯舊遊蓋識貽上在十年之前而崑崙別去已三十餘載貽上年盛志得一以為趙張一以為終賈其材具誠不可揣量崑崙制舉藝盛為當時東南諸子所推嵗月綿邈知交零落若余之僅存者其衰遲已不足數矣乃崑崙農力耆事克振奮於功名之途吏治文章偕精強少年爭能而度智吾聞山右風完氣密人材之挺生者堅良廉悍譬之北山之異材冀野之上駟嚴霜零不易其柯修坂騁不失其步若程公者真其人乎噫嘻抑何其壯也在昔江左六朝京口廣陵為桓庾王謝名家世胄回翔之地揚州從事北府參軍文采風流至於今未沫貽上之先大司馬有勳德於雲中崑崙大王父大司空公淸修直諫在先朝皆著節老臣今兩家子弟砥礪名行讀書從政綽有令聞覽斯編者能無慨然於世德之顯翼而家學之弘長乎崑崙之於文含咀菁華講求體要雅自命為作者其從吾郡袁重其郵書於余也自以身名晼晚投老一經不克酬其所志視其中若有不舍然者余則以為士君子處世當隨分自效而已自古富貴而名多澌滅唯博聞績學之士垂論著以示來祀雖殘膏賸馥與江山同其永久而又復奚憾焉因敘其集以歸之并以寓貽上何如也和州守楊仲延詩序南和楊仲延為新泰令以余之過其地而問曰吾趙人也而仕於魯魯趙之故足以修文章飭吏治者可得聞乎余曰春秋虢之會晉趙文子魯叔孫穆叔同饗穆叔賦鵲巢又賦采蘩趙孟賦常棣穆叔與曹鄭之大夫皆拜此余所知二國之舊聞也趙孟有文德以宣不諸侯光輔晉君以為盟主而魯實事晉聘問會同非辭令不為功故比物論志於稱詩乎見之今天下一家自百里之宰無不受命於朝非若春秋大夫各仕其土惟強鄰是遵是奉如穆叔所云小國為蘩大國省穡而用之也為吏者苟不能廣教化美風俗漸漬斯民以禮樂詩書使之詠歌先王之道而亟亟焉期會簿書悉索敝賦以從事是穆叔之所羞稱趙孟之所不許也而吾為子願之乎且而邑固泰山之旁縣而汶水所自出也詩曰泰山巖巖魯邦所瞻書日浮於汶逹于濟其山川高廣風氣完密出雲雨潤天下為神皋奧區而聖賢所繇繼起蕞爾邑封域土田周公庸之民人子弟孔子教之吾徒誦法周孔可不想像其遺風哉仲延頷其言曰唯唯越四年仲延擢守江南之和州以其詩寓余凡徂徠新甫歷山孔林諸什具在余既幸仲延知所以為治而其詩又醇雅可誦也再從而正告之日夫和江表之巨州也昔者文王之化先被江漢而吳楚不采於國風江左之稱詩者至晉宋齊梁始盛而人猶謂南音嘽緩不振豈秣陵姑孰土氣痺薄使然歟唯滁和夀泗之間漭決千里北走中原人民闊達而碩厚當南北戰爭之日克夀陽悲彭城之作入於淸商雜部音節諧壯有泰山東武之風焉斯所謂不剛不柔得天地之中者非乎周宣王江漢之詩命召虎以南征而終之以矢其文德洽此四國今國家駐重兵於沿江諸戍而尤重州縣之選欲以輯和羣黎式遏亂略夫江淮其人輕心不能及鄒魯禮義之國苟得其政亦足以致治誠有如楊君者絃歌而理之渢渢乎美哉俾浸潤乎文王之教而服習於周公孔子是治魯者即可移之以治吳雖文德不外是也而猶僅稱其詩乎哉余故序仲延之集始終告之以為治而歸其説於中和以無失乎教化斯民之意嗚呼此即吾説詩之大旨也宋轅生詩序吾吳詩人以元未為最盛其在雲間者莫如楊廉夫袁海叟廉夫築玄圃蓬臺於淞江之上披鶴􅌁吹鐵笛作梅花弄命侍兒奏伎自撥鳯琶和之海叟讀書九峯山背戴方巾倒騎烏犍往來三泖間此兩人者皆高世逸羣曠逹不羈之士也古來詩人自負其才往往緃情於倡樂放意於山水淋漓潦倒汗漫而不收此其中必有大不得已憤悶鬱決焉自放以至於此也廉夫為惟張所蹙迫流離世故晚節以白衣宣召僅得歸全海叟從御史放還數為詗卒所邏察徉狂病廢得免於難至今讀其詩有漂泊顚連之感有沉憂憔殺之音君子論其世未嘗不悲其志焉吾友宋子轅生世為雲開人膏粱世族風流籍甚而能折節讀書其所為詩古風則排宕而壯往近體則妍麗而淸切綽然有大家之風生平好聲伎間作小詞授侍者歌之皆中音節遭遇兵火經營別墅茶鐺酒碗與賓客徜徉其間使得遇楊袁兩君子當推為鐵門巨擘不止與李五峯周易癡錢曲江輩遞相唱和已也轅生昆季皆仕於朝子弟以詩文為四方所推重故得以其身優遊嘯傲有廉夫之樂而不罹其憂無海叟之官而兼享其逸於以騰掉翰墨之林脫落畦徑之外其所詣又寧有量哉遂書數語以歸之嚴修人宜雅堂集序余友吳興嚴子修人繇進士需次里居肆力於古文辭得詩賦序傳若干首名曰宜雅堂集屬偉業序之吳興之族嚴氏為大自余與既方父子定交二十五年今就思以科名重館閣修人則出自永樂中名御史之後祖充涵公恤刑豫中所全活干人二子皆成進士子孫蟬聯不絶修人之從兄孝廉蔚宗隱居著述兄弟間講肄服習以相勉修人深沉好書自六經以下嚅嚌搜討尤濳心於八家之作得其疾徐抗墮罔不中節不數年而所學大就今之學八家者振而矜之挾其繩墨以訾謷一世修人獨褆躬簡靜疑然自遠忘其名地之高年力之富而欿焉若有所不足雖以余之衰老猶諄懇索其一言余乃不辭而為之序曰吾嘗觀乎道術醇駮人才盛衰之故慨然於古制之不作然古之制有復行於今者亦有不行於今而其意適與之相合士君了生於斯時亦遵其制以法其意而已請得而論之昔者孔子既沒異端繁興西漢二三醇儒始號為黜百家尊經術而唐之貞元宋之嘉祐作者又起而力扶其衰敝浸尋乎元季明初諸儒講求條貫於六藝之微言先民之要指亦既彰切著明矣乃三百年來不免汨沒於帖括之時文夫帖括者摘裂經傳破碎道術朱考亭氏早鰓然憂之雖其中非無卓然名家而超軼絶羣之才撥去其筌蹄不害於所為古學然敝一世以趨之而人才之磨耗固已多矣國家興制改令大復乎漢唐之舊而有司之奉行不精體裁之沿襲未化顧亦足以破往時攣曲支離之見而學者之聰明材辨無所復用將一出之於古文於是數年之間操觚立言者相望競起豈非化民成材已然之明驗耶所謂古之制復行於今者此也聞之學於古訓乃可服官鄭公孫僑之言曰學而後入政未聞以政入學蓋先王所以教育人材其漸次如此後代以科目取士於治術大半無所考究乃驟而豫之一官其才者簿領案牘工俗吏之所為次者千利祿以自進有貴至公卿懵不知古今者幾何而不速官謗也今者銓選之格雜而多端從進士起家者率久之不得注授以彼耳目之高廣心志之寬間而又加之以嵗月非特用著述自娛已也盱衡乎政事得失民生利病以發為文章蓋不離乎數卷之書而臨民出政道在是矣然後知壅滯阻抑之中寓長養成就之法所謂古之制不行於今其意適與之合者此也夫以修人之才與學固非因乎其時養之既久而後有所自見然需次里居者亦巳十年余反復於其論著如恨豪猾吏之盤互膠結賢有司輒反為所中而威令格於不行又以農人困苦而商民富貴推漢武之重本抑末均輸鹽鐵摧豪強贍國用而田賦不加於民此二者皆救時篤論修人從十年之中講求其是非參驗其治否然則舉而措之達於從政豈不裕哉余家居鬱鬱無所得是行也將以求友而獲交於修人吳興山水之氣靈秀磅礴非修人不能有以當也余老矣濩落無所成名庶幾遺經絶學賴斯人以不墮故既論次修人之文折衷於古人尤舉其為學之方明體達用可禆於當世者告焉天下定有知之者而非余之言足以重修人也是為序白林九古柏堂詩序三韓白公林九治吾婁之五年政成而化浹乃以其暇敷玩典墳揚扢風雅得所為詩一卷屬余序之余惟公以和平豈弟之德廉正俶儻之才發言成風吐辭垂教豈僅與詩家者流比類而稱其詩則含咀英華考求聲病使讀之者又不知其為循良為勞吏也公初以樂浪名家登碣石望滄海天地泱莽而無垠風雲焱至而畢會聽班馬之聲嚴鼓之節雄情慷慨胥以發之於詩洎乎筮仕柘城其地居梁宋之郊賢豪接迹相如枚皋以後唐之高李明之北地信陽所論交而吟眺者也屬天下新定河洛丘墟公既撫其流移斬蒿萊蓬藋而治之矣間嘗射麋雪苑擊兔繁臺極目平蕪千里灌莽慨前賢之不作庶文獻之可追運𥿄抽毫興懷俯仰此公詩之一變也三吳闤闠詩書人物都麗即吾州褊小而迪功弇州後先壇墠海內重焉曾未百年而其俗傷於呰窳其地逼於舄鹵愁苦焦瘁之聲作而休風不可復見矣公之至也養其善禾拔其稂莠喣濡而休息之抱鼓不鳴民無菜色於是鈴閣蕭間焚香隱几感蘇臺之麋鹿愛吳宮之花草土風墠緩賓客流連抱膝長吟彈琴微嘯此公詩之又一變也余嘗讀循吏傳其見之詩者唯抬河為最著趙中大夫之穿涇水魏鄴令之開漳水相杵之歌刻石之頌傳諸萬世公則劉河之役鼛鼓不興而畚鍤具舉後人過三江之口而賦之者當比之芍陂汴渠而公之臨流有作沈白馬以為文指黃鵠而興詠非足以紀成功昭不朽哉此又不僅於詩也已昔君家樂天流風善政嘉惠於吳民而其詩則與韋應物劉賓客同以姑蘇刺史表著於後世是編也殆與長慶之集並傳焉余故序之俾采風者上其事以為賢刺史楷法蘇小眉山水音序同里江位初歸自京師取其友蘇君小眉所為山水音一卷示余曰小眉南贑中丞公之長子也中丞忠勤廉惠有大功德於南土之人小眉以名公子世其祿位有弟曰次山既得畿輔一州報最聞矣君負盛名有經世之志欲以科第自顯優遊未仕用載籍自娛好結交天下雄駿抱膝吟詠被服如儒生年未三十同輩中已驚為晚達君天性恬淡視人世裘馬玩好歌舞射獵之娛不以屑也與人言盱衡古今考驗得失負意氣徇然諾遇有所合雖揮斥千金無所吝今其詩具在嘗試取而讀之有振衣千仭俯視塵壒之想故其詩巋然而高淵然而深有探幽抉冥刻鏤真宰之心故其詩鋭者削成涓者澄徹有吞吐萬象壯偉不測之觀故其詩嶔崎嶻嶪懸出而奔流舉章門貢水巫閭碣石之奇而盡攬之此小眉所有得於山水以名其編者也願先生一言序之余曰漢有天下至建元太初之間黜百家推孔子而儒術乃興其作五言以繼三百篇之風者典屬國實為之倡則詩固蘇氏所自出也自此以後綽之有威瓌之有頲明允之有軾轍皆以父子再世弗替訖乎近祀有蘇平仲者與宋景濂同史局能文章每一代之興其家必出異才以垂聲聞而典著作忿生之後詎可謂無其人哉自古公侯之子孫涵濡教澤敦詩習禮為天下先而後遐陬蓬蔚之儒始得奮其智能以鳴躍乎當世嗟乎以江生之才苟不遊通都遇知已則抱其殘經抑沒於泥塗之中者固巳多矣然則以小眉之人與其地負有用之資處方剛之年讀書取友覃心經術以為世家表率國家典章文物比隆往古庶幾得博物弘雅之君子立乎交戟之內俾聞者有所興起焉其在斯人乎其在斯人乎余老矣不獲偕蘇君遊從位初之請書以貽之其當以余言為何如也梅村家藏藳卷弟二十九終

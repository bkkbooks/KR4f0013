  text: 梅村家藏藳卷弟四十七文集二十五
  hash: sha256:8acd77516ee4095ebc51bd25878493611516ec87147544f90827e7a450a44427
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_047-1a}
body:
  text: 墓志銘六太僕寺少卿席寧侯墓志銘崇禎十四年江南大祲當事者設法勸分吾郡席君寧侯以太學生捐八千金賑飢者應撫黃公希憲以聞優旨嘉奬豫以官君以親老固辭且上言願助國家討寇請輸所有以佐軍先皇帝以為忠即家授文華殿中書兼太僕寺少卿當是時司農告匱捐助之令屢下貴戚世臣鮮有應者上故驟尊寵之以風厲天下然而時事已不可支矣在搶攘之日君嘗一至留都覃恩褒封祖父如其官巳而副節使慰安唐藩移湯沐於臨汝因其地不受封君盡心藏使事﨑嶇兵間慬而報命歸隱洞庭之東山其地僻處太湖艅艎出沒會大兵南下蘇州初入版圖萑苻亡命倚兩山為窟穴君素得鄉里心掃地盟日此萬分無益徒使吾屬無噍類耳修扞禦申約束聽命於單門以故東山獨不被兵君家居數年病卒其孤啓圖等踏門來告日先子己獲祀於鄉葬有日矣敢以納竁之辭為請余日諾按狀君諱本禎字寧侯别字香林其先安定人以唐禮部尚書豫為始祖五傳為武衛將軍溫避黃巢亂挈三子尚常當以渡江僑居洞庭君則常之後也自常十三世為安邦在明初有一行安邦五世孫曰裎裎生綱綱生旋旋生鈇鈇生贈大夫怡泉公洙著家訓修隱德有四子其季乃贈大夫端攀是為君父右源公右源與其兄左源用廢著起家吳人稱東山者日左右源席氏君生而嶷然露頭角讀書治詩春秋事右源公及吳淑人以孝父殁穿壙舍傍曰吾不忍離也有祖祠在翠峰歲時上享會其宗人立義莊義孰自為文以記彬彬然修士君子之行焉其於治生也任時而知物籠萬貨之情權輕重而取棄之與用事者同苦樂上下戮力咸得其任通都邸閣遠或一二千里未嘗躬自履行主者奉其赫蹄數字凜若繩墨年稽月考銖髮不爽質庫所入不責倍稱之息於人人爭歸之所贏得輒過當繇此其業數蹶又數起云臨清之破也悉亡其資君恐以纍故人之寄槖者將倒庋還之絶去什一弗復事聞者感其意固請乃止未幾盡復其所失且倍焉靛船之獄江使者誣其家客為間諜收執彭考踰二年乃解所市物以稽緩踴貴計其費乃足以償此雖屬有天幸顧其居心持行足以致之豈苟然已哉賑飢由吳以達於傍郡遠而山東臨濟多所全活又月以朔望次日班粟里之貧羸者搘繇役甓道路病者注藥亡者給槥焚劵棄責掩骼埋胔以為常固其天性好施亦因時方傾亂不欲厚自封殖非云輕財將以守富也人謂君素苦肥疾無聲色玩好六博嬉遊之樂終日搰搰然勞身為物晚年始搆一山園又不及見其成就夫富真為君纍耳余則曰不然自變故以來仁人長者坐視親知故舊流離患苦義相收恤而力不副其願倣皇太息者比比然矣君則探囊以應稱心而行之然後知天之豫君獨厚而君平生所快意適志者在此而不在彼也君生於萬曆二十九年十月十三日卒於順治十年七月二十二日年五十有五配吳淑人側室延氏談氏有四子長啓兆延出次啓圖談出啓疆啓寓亦延出女六人孫男一永劻啓疆出孫女二人君殁未一年啓兆卒啓圖善病而少子尚幼其為太學生營葬事者啓疆也墓在東山之陽葬以己亥八月之某日嗟乎當先帝軍興孔亟之日若人人趨令如君未必不足以搘拄萬一挽近藏鏹者既不能仰資國恤又以其間割剝鄉里以自封及難作而緘縢扄鐍亦隨之語日墻高基下其崩必疾賢者以財自衛而愚者多藏厚亡聞少卿之風斯亦可以感矣余於君有一日之雅家大人以幼女字君少子其分誼在師友骨肉之間知君行事為信故不辭而為之銘曰漢拒滎陽任氏乃興景征七國毋鹽代金居奇致羡匪時弗成保己善物終全令名斗軫告災吳飢楚戰毁家佐軍日余是勸功在濟荒守能巳亂白圭計然知退審變莫釐嵯峨去天尺五流水洋洋原田膴膴云誰之封若堂若斧刻石幽宮垂示終古吳郡唐君合葬墓志銘吾郡以孝謹世其家者曰唐氏其先出自荆南宋參知政事質肅公介四世而子孫渡江僑居吳是謂授書郎裕文公自裕文下十有七世海虞牧齋錢先生所志晉陽唐君聚升墓諱映奎則君之父也由聚升而上果世修儒術聚升早孤能以科舉業教其二子而君居長君諱景錢字時若別字容齋與其弟默齋相友愛偕君之子堯勳三人者皆諸生余讀海虞之文固已心儀其為人且曰吾郡之葬其親者好竊公孤名氏以為重唐君獨知牧齋為可傳斯之為好文抑亦足為孝矣今年春堯勳衰服踏門來謁默齋尤助之請曰吾兄之乞銘先墓也將以圖不朽今者吾兄又亡矣微先生孰冝口銘余遜謝不獲乃據堯勳自為狀序而銘之序曰君初治經為應舉學自以往代名賢後無以光耀前人之為乃益攻苦於所習其制藝頗為里中宿儒所稱許既再試鎖院被放而又遭母喪會王師下吳郡既定而湖寇大作老幼爭避匿君不可其父勸之走君號頓匍匐顧謂弟曰父往不可莫之侍也母殯不可莫之守也行矣我必死於此無何寇至投以刃不中中庭柱刃碎於木寇執其樽不能擊愕然阻乃舍之去禮人子居喪殯必用車車必有紼所以備火災戒不虞也其祭也謂之越紼而行事夫祭尚謂之越紼可以柩在堂而不守乎火災尚備而况於兵乎古者三月葬無所用遭兵之禮然謹而防之如此若唐君者斯可謂之知禮矣當是時部使者有徵令於吳中有司上富人籍以典織作而君之父資不中格年老矣名乃在選中私憂之不知所出君奮曰朝廷自發金錢豫服官特以勞使民戶苟吏不乾沒工不情窳而我出私財以彌縫其闕則事亦易辦耳於是辭其父常以身繇部中賦事獻功寧勤弗怠如是者五六年始遇恩詔以免等輩大抵破家矣而君不困君天性精密既棄其經生言則強本節用大修其先業間出於廢舉以相濟太公得以擊鮮奏酒佚樂而終君蚤作夜興攻苦喫淡具酒食以會里黨推資財以恤親知嘗以默齋性簡易不甚治生産曰一家之中有無必共幸處贏餘而可以弗吾告乎平居不苟訾笑從昆弟親戚飲則歡怡竟日愛其子教督之為延經師禮事之唯謹其為人如此君元配黃孺人事舅姑以孝治家以勤知詩書備婦德生子而年不永繼室以鄒氏君疾革而敕其子於喪葬所以處二母者得禮之中焉君殁康熙七年秋距其生乙卯也年五十有四黃孺人同年生先於君三十年卒一子即堯勳黃孺人出也娶鄭太學泰裕君之女君女二長許字于華為進士扶翩公之子次尚幼堯勳以庚戌閏二月之九日合葬君夫婦於友字墟之舊阡從遺命弗他卜也堯勳尚未免君之喪而其於母也生襁褓而見背故哭踊加哀葬之日行道聞而悲之余雖未獲識君而默齋之來速銘也口述君之謦咳語笑若可得其髣佛非其生平相愛不及此鳴呼觀君於兄弟父子之間則躬行孝謹亦可得而推矣法當銘銘曰有宋直臣曰維子方溯彼初授政最平江南渡建炎詔求其後道斷不達除官未授載觀家傳乃遷此邦譜則備矣史應失詳孝謹傳家儒生奇節苦凷弗離格於金鐵長憂兵火少事詩書用其萬一力田廢居杼軸其休徴令以息小試治家有治有則何有何無相賙相救維兄及弟自親逮舊保有令德質諸先公胡不中夀有子亢宗山嶞水旋若堂若斧同穴茲邱爰告終古太學張君季繁墓志銘張君諱介社字季繁吳之長洲人曾大父建旌大父元善兩世皆諸生父宗文有六子其四出元配龔氏君其季也甫十五而孤養寡母以孝恭事伯兄惟謹仲兄有子而殁叔天且無後君所以撫孤姪賙嫠嫂甚備友愛兩弟無間言年三十始入太學歸而大治先人之邱隴母亡合而袝之送車致百乘里人以為榮中年教諸子以發名成業晚乃自營一壞於湖山之間召所親置飲登高望震澤喟然歎曰吾起孤僮不意自立而今將老於此死不恨矣君長身豐下恢啁善笑余衰憊始識君君嘗期余以山梅大放時過其彖舍作信宿留余逡巡不果遽聞君以病沒君之子請以墓中之石纍余余不忍辭也君天性善治生居家好置重堂復屋收陂渠邸閣之利雖纍積纎微以漸致贏餘資用既饒間出於濶達變化以自衛處通都之中瞻宗族賑里閭交諸侯結賓客雍容而修豪長者之行語曰人富而禮義附君之謂也當明季嘗捐囷粟以大償貧民之不能漕者所全濟甚衆在本朝之初關吏以軍興法除馳道用君為植既罷而服官之領織作者又從而檄之君之屬役賦丈頒廩獻功盛為當事所嘉歎此二者君緣不得巳而從事故弗欲自言其勞特以紀邦役則亦行之大者余獨謂君治田一事尤可書夫吾郡之田其賦額古未有也近又加以徵令急而民之不能應者出倍稱之息以貰貸甚且下其直以請諸佃作者粟未登而租耗其七八比入則又糞土棄之唯恐不及於期會蓋有田之患若此吳民數百萬戶大抵皆破矣而君獨以田起家先是君之起家也穀騰踊催比亦不至於甚苛其後也緩者亟貴者賤公私兩被詘而君優裕自如聞一令下則必變其術以相搘拄嘗告於衆曰古設田以養人今設人以養田吾取百畝為之率儲三十金以預滋其潤即田不害矣是言也策未有善於此者也然惟君乃能行之余輒思其故君之産率上腴又能起廬落給牛種以勤耕其輸於官也不待取諸耕而後足每先期趨令雖有里胥邑猾失所挾持以索無名之錢逮夫租登場而君高其廩庚嘗候時而擇利初不緣縣官之緩急為棄取此三者中家以下所共知也而妄冀效君則不能然後知田非不足困君君之資與其術自不至為田所困有司者猥欲人人趣辦如君舉而槩之不亦惑乎周官之首曰本富漢法之善日重農今誠能凖古制以大寬民租徐擇其孝弟力田者録之以官著在令甲庶幾吳民知勸強力而急公上不獨君一家已也余於志君墓舉之為斯世告焉君娶陳氏而賢有五子以諸生祖訓為長次起鵬艾震維同母弟也先後入太學庶出夢麟者最幼君有四女孫七人孫女十三人君諸子進止儒雅文采皆可觀其入太學者仲與季且駸駸嚮用中外淸整所婚嫁皆名族君生己酉六月之三日卒庚戌十月之十三日遺言以踰月葬禮也諸子遵而行之墓在彈山之麓具區之漘去鄧尉先隴不五里吳人之俗歲於山中探梅信傾城出遊張氏兩墓深淺皆直其勝君之葬也余越疆而弔見墓門有垂垂欲發者其親串故人酹酒花下而後去嗟乎古今論人之不同一日勞生一日達生君之自壯逮老其生也可以謂之勞矣營生壙作終制若是乎高人曠士之所為何哉余讀喪禮子思子之言曰有其禮無其財君子弗行也惟君之生計足喪具備早營高燥而敕其子以氣絶便斂斂訖便葬皆出自生平精強心計之餘習豈追慕昔賢之佚事而為之者乎然君於書傳頗能涉獵其大略與人交撫掌歡謔坦易無它腸此亦於道為近未可見其搰搰然役役然謂與古之放達者無一端之合也余自笑足以知君可以銘銘曰有嶞者山有瀰者水歲直降婁月躔星紀彼墓大夫指説妙理早寧體魄後必大起主人康強笑而聊唯爾言果徵余不畏死噫嘻古有輕人不資之軀以自驗其術者乎吾知君之即安於此也請以俟而考諸筮史席處士允來墓志銘余間往洞庭東山則必訪席君允來氏自其父震湖君世居莫釐峰下有茶癖以善種花得養性術年九十五而終席氏系出唐禮部尚書豫由安定遷吳子孫用廢箸為業君以心泉君濡之子出後於叔南濱南濱年亦九十東山稱兩席翁皆長者君為人孝友廉讓中歲棄所學計然術灌花瀹茗以終其身吾郡及雲間士大夫多稱之允來其仲子也孝友似其父養花尤擅家風所居繚垣三楹牀茵几杖位置皆得其處蘭蕙數盆怒芽競茁牆頭有木瓜朱櫞一二株垂實纍纍向人窗前置拳石面勢膚理似長與人同卧起者其下嫩草雜卉疏密可數嚴淨甃潔殆非扱箕縛帚所能及而牡丹數十本尤絶出於吳中余嘗以花時過之其花之妍娟靚艷如笑如迎即葉之向背俯仰有自矜之色觀者神移目奪恍然若與之遇也客訝而問曰養花有術乎曰無術也吾父性愛花見花之榮也則欣然喜其瘁也則梢然憂自壯逮者寢興食息語默醒醉皆以神入於花之中得其陰晴開落而與之俱化吾父亡不敢以改庶幾見之如吾父之存也聞者為之捧手歎息後余每過湖君開門煮茗清談促坐别則落其簷果餉余余彳亍倣徨不忍去蓋洞庭最稱翁氏朱氏有兩樓君之尊彜圖卷不及翁湖山歌舞不及朱而獨以潔勝即君家太僕用萬金起一園乃遊者過之而後訪君皆歎曰若此亦奚用壯麗為也君以其不相當輒笑而不答噫嘻亦異矣哉君年六十有一而殁無子其病也鬱鬱不得志床頭有一杖生平之所愛弄顧視惻愴折而投之日吾不忍以貽他人既篤友人吳亦昭撫之日君死其如花何君張目直視欷歔不能語夫亦可悲也巳自古人達士流連寄托其於花各因其性之相近以名所好深山道流餐落英飲瀣露者往往可以不死震湖之年近百嵗殆似之矣而君僅得中壽何歟震湖君諱棨君諱元泰戊申之八月某日以君末命同時窆於祖塋馬塢石塢之二阡余既與君遊又聞震湖之高風父子以種花終隱故因志君而并及其先德嗚呼此亦君之志也夫為之銘曰昔之傳牡丹者首姚黃次魏紫五侯貴千金市莫釐峰具區水有一人慕黃綺階幽蘭籬芳枳抗煙霞絶塵滓花寒愁花開喜識花性得花理胡弗祀沒猶視其魂魄遊於此我作銘告閭史孝隱士元真子若席君者斯可以死矣朱幼清墓志銘崇禎十有三年吾友雲間宋轅生轅文兄弟葬其先君幼清公偕配楊孺人施孺人於黃歇浦之鶴涇而屬余以書日子固習知我公者也不可以無銘嗚呼公之亡距今十八年矣余生也晚則何由習公之深也初余遊京師從現聞姚先生商榷人物余進曰今天下漸多事矣士大夫顧浮緩養名無一人慷慨俠烈以奇節自許者先生詎有其人乎先生慨然曰吾同年生宋幼清俠烈士也因談幼清生平甚悉先生善持論愼許與與人言者吐如洪鐘其談幼清尤磊落可喜倜儻非常聽者毛髮盡悚起舞擊節嗟乎獨不與此君同遊哉先生又泫然流涕曰幼清亡矣余哭之見其孤藐然也甫四歲聞能傳父業近有聲問來於是聽者又變色興歎以賢者之不竟所志而後必大也公諱懋澄字幼清先世汴人趙氏之苗裔南渡入杭宋亡以國為姓遷吳為巨族高祖諱論成化中鄉進士曾祖諱公望祖諱坤太學生父諱堯俞嘉靖中鄉進士上書張文忠諫奪情不得第著薊門集以卒公其仲子也雲間好濡緩而公獨以俠聞志行果決跅跎不羈嘗以丈夫生世與其隱囊塵尾以送窮年不如犬馬陸博可縻壯志乃益跌蕩於酒以自豪有顧君于君者為異常之交痛飲竟日夜行歌呼道中客或諌之輒曰身自大呼何與他人事不為止公雖放於酒人乎內行修潔事親孝持身廉振人之急家無餘資刻趙虞卿之像就其家設祠堂事之日虞卿烈士棄萬乘之相而徇一人之窮真吾友也久之鬱鬱不得志走京師會光廟及福藩出閣講學議者謂宜有等殺廷爭之勿能得公奮日上以親愛待太子諸王固非羣公所能言言則謂其冀後福固有所輕重也我以布衣勢無覬幸即如是言上意或有動耶或勸之日卿無言責奈有老母何乃即其牘上宗伯羅公書凡數百言言甚剴切神宗皇帝在宥四十餘年士大夫所持國是無如江陵奪情光廟出講一二大事皆通國爭之會暴有所摧折士氣憂不振公父子皆書生先後遊太學持直節發讜論赫然名動京師已歸而舉於鄉凡三上不弟同年白公正蒙精數學能前知嘗為公言我兩人將先後亡不出兩歲具刻時日其卒也公哭之慟嗟乎公為人落拓有壯節好奇計足迹遍天下散財結客嘗欲一旦赴國家之急以就功名聞白公言中夜悲歌自知所志不遂而亦殆將病矣公殁後數年而余得聞公名又三年而得交於轅生兄弟姚先生所謂四歲孤也公初娶楊孺人繼娶施孺人先後以孝聞楊孺人之殁也公在京師不及見為其留侍張太孺人也張太孺人殁公免喪後復遠遊所至必與施孺人偕稱賢助凡後公十五年而卒轅生兄弟工文章交遊遍海內顧出公所為詩文尤豪宕自喜又負奇略規摹九邊形勢親厯險塞與其賢豪長者遊生平居燕者十之五六居吳門者十之三四若齊若秦若汴若豫章若楚越皆居焉其客吳門也夜半取道湖泖間雙槳若飛巨艦中㸐兩樺燭衣冠危坐盜賊望見以為神人不敢犯歲晏從豪家貸百金以餉賓客發之非精鏐大怒投水中日此何以餉人其雅性如此夫以公之才處平世抑鬱無所就以至於死若使至今日如轅生兄弟所遇之時當馳驟一切以取將相何至以孝廉終哉雖然公以布衣上書摩切天子又處朝家骨肉之間而公卿不以為非當㝉不以為罪今罔浸密矣姚先生帷幄近臣用言事故為讒者所中且斥逐放廢以終公而處此其將上有陳東之禍而次不免劇孟之疑不如速營糟邱以自老也是宜為銘銘曰仕俠則剛不硧不芒今之篤行乃古之狂厥施未究始謀永藏湯湯湖水玄石幽房梅村家藏藳卷弟四十七終

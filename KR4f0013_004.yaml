front:
  text: 梅村家藏藳卷弟四詩前集四
  hash: sha256:79c33692c1258f954da633e33db36d6187413e49c04d1c7b77e959ba519c9594
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_004-1a}
body:
  text: 五言律詩一百五首夜泊漢口秋氣入鳴灘鈎簾對影㸔久游鄉語失獨客醉歌難星淡漁吹火風高笛倚闌江南歸自近盡室寄長安送黄子羽之任四首辟爲新都令子羽能詩以徴襄陽始見征途亂十年憂此方君還思聖主何意䇿賢良楚蜀烽烟接江山指顧長袛今龐徳祖不復卧襄陽巫峽高深積氣浮水石怒相求勝絶頻宜顧竒情不易留蒼凉難久立浩蕩復誰收詩思江天好春雲滿益州成都魚鳬開國險花月錦城香巨石當門觀竒書刻渺茫江流人事勝臺榭霸圖荒萬里滄浪客題詩問草堂新都丞相新都後如今復幾人先皇重元老大禮自尊親舊俗科條古前賢風尚醕似君真茂宰白石水潾潾穿山勢削懸崖斷根移怒雨來洞深山轉伏石盡海方開廢寺三盤磴孤雲五尺臺蒼然飛動意末肯卧蒿萊玄墓謁剖公一衲消羣相孤峯占妙香經聲清石骨佛面冷湖光花落承趺坐雲歸識講堂空潭今夜月鐘鼔祝前王過聞果師園居帆影窗中沒鐘聲樹杪移簷依懸果近閣避偃松欹菜甲春來蚤茶槍雨後遲散齋閒獨往應與道人期游西灣斷壁猿投栗荒祠䑕竄藤鐘寒難出樹雲静恰依僧選勝從吾意捫危羡客能生來幾量屐到此亦何曾送友人還楚燈火照殘秋聞君事遠遊客心分暮雨寒夢人江樓酒盡孤峰出詩成衆靄收一帆灘轡急落日滿黃州送繼起和尚入天台振錫西泠渡潮聲定後聞屐侵盤磴雪衣濕渡江雲樹向雙崖合泉經一杖分石林精舍好猿鳥慰離羣蚤起蚤凉成偶游惜爽憩南樓碁響鳥聲動茶烟花氣浮衫輕人影健風細客心柔餘興閒支枕清光淺夢收五月尋山夜寒話雨客衣輕百里長夏惜登臨正爾出門夜忽逢山雨深聊將斗酒樂無作薄寒吟年少追凉好難爲父母心瑜芬有侍兒明慧從江上歸則言去矣江上送君别餘情感侍兒對人先母意生小就儂嬉恃穉偏頻進含嬌託未知今來羅帳底誰解笑微窺讀史雜感十六首吳越黄星見園陵紫氣浮六師屯鵲尾雙闕表牛頭鎮静資安石艱危仗武侯新開都䕶府宰相領揚州其二莫定三分計先求五等封國中惟指馬閫外盡從龍朝事歸諸將軍輸仰大農淮南數州地幕府但歌鐘其三北寺讒成獄西園賄拜官上書休討賊進爵在迎鑾相國争開第將軍罷築壇空餘蘇武節流涕向長安其四御刀周奉叔應敇阮佃夫列㦸當關怒高軒哄道呼監奴右衛率小吏執金吾匍匐車塵下腰間玊鹿盧其五聞築新宮就君王擁麗華尚言虛内主廣欲選良家使者螭頭舫才人豹尾車可憐青塚月已照白門花其六貴戚張公子奄人王寳孫入陪宣室宴出典羽林屯狗馬來西苑俳優待北門不時中㫖召著籍並承恩其七漫說黄龍府須愁朱雀桁三軍朝坐甲十客夜傳觴王氣矜天塹邊書棄御牀江州陳戰艦不肯下潯陽其八偏師過采石突騎滿新林已設牽羊禮難爲刑馬心孤軍摧韋粲百戰死王琳極目蕪城逺滄江暮雨深其九耰棘千夫聚艨衝百里通白衣摇急槳青草伏彊弓塢壁推嚴虎江湖屬管崇丹陽故鄣郡山越土人風其十越絶山河在征人尚錦袍乘風竹箭利狎浪水犀豪恠石千灘險疑城百里高臨江諸將帥委甲甬東逃其十一屢檄知難下全軍壓婺州國亡誰與守城壤復能修喋血雙溪閣焚家入詠樓江東子弟恨伏劍淚長流其十二聽說無諸國南陽佳氣來三軍手詔痛一相誓師哀魯衛交難合黥彭間早開崆峒游不返虚築越王臺其十三再有東甌信城空戰鼓聞靑山頻見騎丹穴尚求君亂水衝村壘殘兵哭嶺雲瘡痍逢故老還說永安軍其十四計出游雲夢雄風羡獨醒連營巴水臼吹角楚天靑五嶽尊衡嶠三江阻洞庭故家多屈宋應勒武岡銘其十五早設沿江戍仍添泝水兵惡灘横贑石急浪打湓城彀騎柴桑督樓船牛渚營江南民力盡幸苦事西征其十六風雨章江路山川感廢興城荒孤鶩遠潮怒老蛟憑止水孤臣盡空坑故鬼增淒涼餘汗簡遺事續廬陵溪橋夜話予偕子俶兄弟臨流比屋異户同橋久雨得月新浴乍凉輙書數語以識幽事竹深斜見屋溪冷不分橋老樹連書幌孤邨共酒瓢茶香消積雨人影話良宵同入幽栖傳他年未寂寥再簡子俶舊識天下盡與君兄弟存異書安廢壁苦酒潑殘樽住處欣同里相依好閉門亂餘仍老屋慟哭故朝恩素馨培隔年舊本賦以誌感亂後道阻無至者友人異地憐培養孤根怨别離清心愁欲瘦獨立畏人知棄置踰吾分聲香與物移名花貪悅巳不攺誤芳時感舊不敢恨離别失君愁我輕新知紛項領久病廢將迎慘澹隨時輩艱難愧老成何時携斗酒涕泣話餘生贈歌者天寶遺音在江東妙舞傳舊人推賀老新曲唱延年白眼公卿貴靑娥弟子妍醉中談往事少小侍平泉兎缺舌在音何􅟌唇亡口半呿病同師伯齴方問仲堪醫露涿從人誚銜碑欲語遲納言親切地補闕是良規織女軋軋鳴梭急盈盈涕淚微懸知新樣錦不理舊殘機天漢期還代河梁事巳非玉箱今夜滿我獨賦無衣感事不事扶風掾難畊好畤田老知三尺法官爲五銖錢築土驚傳箭呼門避櫂船此身非少壯休息待何年贈蒼雪若鏡兩師見訪孤雲所宿處清磬出層隂高座惟斯道扁舟亦此心尋秋逢講樹到海發禪音月色霜天正吾師詩思深謝蒼雪贈葉染道衣娑羅多寳葉煎水衲衣黄不染非真色拈來有妙香足趺僧相滿手綻戒心長一笠支郎許安禪向石傍送李友梅還楚寄題其所居愛吾廬寒雪滿潯陽江程入楚鄉灘逢黄鵠怒嶺界白雲長十里魚蝦市千頭橘柚莊歸人貰村酒彷彿是柴桑黄州杜退之改號蜕斯其音近而義别索詩爲贈述志賦秋蟲孤吟御逺風掇皮忘我相換骨失衰翁畫以通靈妙詩因入悟空少陵更字說不肯效韓公王瓜同摘誰能待離離早滿車弱藤牽碧蒂曲項戀黄花客醉嘗應爽兒凉枕易斜齊民編月令瓜瓞重王家豇豆緑畦過驟雨細束小虹蜺錦帶千條結銀刀一寸齊貧家隨飯熟餉客借餻題五色南山豆幾成桃李蹊莧性嫌同肉食味好伴葵羹辨葉先知種聞香易識名碧甜驕綠茹茜汁亂紅秔却怪成都叟詩篇莧也輕送照如禪師還吳門秋氣肅羣慮衲衣還故栖雲生孤杖逈月出萬山低乞火青楓寺疏泉紫芋畦石床㯶拂子盡說是曹溪曹師姓初冬月夜過子俶月色破林巒貧家共一灘門開孤樹直影逼兩人寒瀹茗誇陽羡論詩到建安亦知談笑久良夜睡應難園居柬許九日迸筍穿茶竈欹花罨釀房曝書移畫几敲筆響琴牀晩食知眠懶輕衫便酒狂翛然吾願足不肯負滄浪晩泊寒鋤依岸直輕槳蕩潮斜樹脫餘殘葉風吹亂晩鴉沙深留豕跡溪静響魚义乞火村醅至炊烟起荻花題心函上人方庵頂相安禪穩圓塵覆鉢銷誰知眠丈室不肯效團焦石鼎支茶竈匡牀挂癭瓢一枝方竹杖夜雨話參寥題儆上人代笠空山無住著就石架孤笻愛雪編茅整愁風剪箬工樹隂休灌叟簔雨滴漁翁要自謀安隱吾師息此中過南屏訪無生上人謂此一公住偶來聞午鐘山容參雪嶠雪師畫無生壁間有佛火隱雷峰路細因留竹雲深好護松精廬人不到相對話南宗簡武康姜明府二首地僻誰聞政如君自不同放衙山色裏聽事水聲中竹稅官橋市茶商客渚篷前溪歌舞在父老習遺風其二花發訟庭香松風夾道涼溪喧因紙貴邑静爲蠶忙魚鳥高人政烟霞仙吏裝知君趨召日取石壓歸航曉妝學母妝應早留花稱小圍爲憐新繡領故著舊時衣性急梳難理衫深力易微素奩猶未斂袛道侍兒非贈徐子能二首徐子聲名早相聞盡故人懶余交太晩知我話偏真道在應非病詩成自不貧拊髀休歎恨纔得保沉淪其二未卜林塘隠還將野興消鶴聲常入市樹勢欲侵橋老病人扶拜狂吟客見招知從甫里近白首共逍遥初春夜坐竒懐室長日誰教睡夜深還擁書一燈殘酒在斜月暗窗虛官退才須减名高懶不除梅花侵曉發蚤得伴閒居新霽喜孫令修至同步後園探梅偶來因客興信歩得吾園雨足山低樹花開日滿軒埽林休石磴劚藥遇泉源絶壑人聲至驚栖聽鳥喧送王子彦因事避吏將入都王以孝亷不仕後失意獨焉往自憐歸計非無家忘别苦多難愛書稀白首投知己青山負布衣秋風秣陵道惆悵素心違遇舊友已過纔追問相看是故人亂離何處見消息苦難真拭眼驚魂定銜杯笑語頻移家就吾住白首兩遺民偶值偶值翻成訝如君不易尋出門因酒癖謝客爲書淫久坐傾愁抱高譚遇爽心明朝風日暇餘興約登臨座主李太虛師從燕都間道北歸尋以南昌兵變避亂廣陵賦呈八首風雪間關道江山故國天還家蘇武節浮海管寍船妻子驚還在交朋淚泫然兩京消息斷離别蚤經年其二白鹿藏書洞青牛採藥翁買山從五老避世棄三公舊德高詞苑長編讀史通十年金馬夢囘首暮雲中其三愛酒陶元亮能詩宗少文桃花忘世事明月望湘君山静聞鼙鼓江空見陣雲不知時漢晉誰起灌將軍其四浩劫知難問秋風天地哀神宮一柱火仙竈五丁雷劍去龍沙改鐘鳴鼉鼔來可憐新戰骨落日獨登臺其五彭蠡初無雁潯陽近有書干戈愁未定骨肉苦離居江渚宵傳柝山城里出車終難致李白卧病在匡廬其六世路長爲客家園况苦兵酒偏今夜醒切新伎笛豈去年聲一病餘孤枕千山送獨行馬當風正緊捩柁下湓城其七莫問投何處輕帆且别家漫栽彭澤柳好種廣陵瓜飲興愁來減詩懐老自誇南齊山色近題語報侯芭其八海内論知己天涯復幾人關山思㑹面戎馬涕沾巾賓客侯嬴老諸生原憲貧相看同失路握手話艱辛嵗暮送穆大苑先往桐廬四首客中貪過嵗又上富春船竹影欹寒枕江聲聽夜眠石高孤岸逈雪重半帆偏明日停橈處山城落木天其二卧病纔囘棹征軺此再游亂山穿鳥道匹馬向嚴州逺水浮沙嶼高楓入郡樓知君風雨夜落葉起鄉愁其三到日欣逢節招尋有故人官厨消綘蠟客舍煖烏薪鎻印槐㕔静頒春柏酒新翩翩杜書記瀟灑得閒身其四知爾貪乘興衝寒蠟屐忙鶴翻松磴雪猿守栗林霜官醖移山榼仙碁響石房嚴光如可作故態客星狂曉發曉發桐廬縣蒼山挿霧中江村荒店月野戍凍旗風衣爲裝綿暖顔因被酒紅日高騎馬滑愁殺白頭翁客路客路驚心裏棲遲苦未能龍移對江塔雷出定龕僧近事武林林黑人譚虎臺荒吏按鷹清波門外宿潮落過西興贈劉虛受二首中嵗交朋盡新知得此翁道因山水合詩向病愁工悟物談功進亡情耳識空眞長今第一兄弟擅宗風其二識面已頭白論心惟草玄孝標三世史摩詰一門禪獨宿高齋晩微吟細雨天把君詩在手相慕十年前苦雨亂烟孤望裏雨色到諸峰野漲餘寒樹江昏失暝鐘夜深溪碓近人語釣船逢愁聽惟支枕艱難媿老農海溢積氣知難極驚濤天地奔龍魚居廢縣人鬼語荒村異國帆檣落新沙島嶼存横流如可救滄海漢東門閬園詩十首并序閬園者李太虛先生所創别墅也廣厦層軒迴廊曲榭門外有修陂百頃堂前列灌木千章采文石於西山導清流於南浦緑蕖被沼紫奈當窗芳枳樹籬修藤作架白鶴文鷴飛翔廣囿鴐鵞黄鵠游泳清池豈止都蔗爲鄉素馨成幄已哉况經傳惠逺厨藏金粟之儀山近麻姑壇擬玊臺之觀果名羅漢花號佛桑紺室聞鐘丹泉洗藥兹爲靈境夫豈塵區而吾師偃仰茂林從容長薄千里致程鄉之酒十年探禹穴之書叔夜銅鎗可容一斗茂先寳劍足值千金焚香而明月滿簾鬬茗而清風入座張華燈而度曲指孤嶼以題詩若將終身焉洵可樂也不謂平原鹿走一柱蛟飛始也子魚已下虞翻之說既而孝頃遽來周廸之軍浪激亭湖兵焚樵舍馬矢積桓伊之墓鼔聲震徐孺之臺將仙人之藥臼車箱俱移天上豈帝子之珠簾畫棟尚出人間雲卿棄藥圃而不歸少陵辭瀼谿而又往放舟采石浪跡雷塘愛子則痛甚元規故園則情同王粲望匡山而不見指章水以爲言嘿嘿依人傷心而已於是稽生授簡趙子抽毫重邀大别之雲再續小園之賦庶幾峯連北固不異香爐潮上䢴溝居然湓口心乎慰矣歎也何如偉業幸遇龍門曾隨兎苑自灌園於海畔將負笈於山中顧兹三逕之荒已近十年之别願依杖屨共肆登臨弟子舁陶令之輿興思彭澤故吏逐謝公之屐寄念東山爰托五言因成十律華林園追陪之宴而今渺然浣花潭話舊之遊於兹在矣先生家住處門泊九江船彭蠡春來水匡廬雨後天芰荷香石浦秔稻熟湖田獨坐憑䦨久虛堂且晏眠其二有客扶藜過空山猿鳥知苔侵蘿逕屐松覆石牀碁楚米炊菰早吳羮斫鱠遲柴門相送罷重定牡丹期其三性僻躭書畫蹉跎遍兩京提携詩巻重笑傲客囊輕小閣尊彛古高人池館清平生無長物端不負虛名其四興極歌還哭狂來醉復醒牀頭傾小榼壁後卧長瓶月出呼漁艇花開置幔亭門前流水急數㸃暮山青其五絶壑非人境丹沙廢井留移家依鶴砦穿水遇龍湫白石心長在黄金藥可求何時棄妻子還伴葛洪遊其六我愛東林好還家學戴顒經臺憑怪石麈尾折青松書巻維摩論溪山曹洞宗欲修居士服持偈問黄龍其七倦䇿登臨減名山坐卧圖避人來栗里投老乞菱湖舊業存榆柳新齋待竹梧亂離知又至安穏故園無其八陶令休官去迎門笑語忙那知三逕菊却怕九秋霜十具牛誰種千頭橘未荒可憐思愛子付託在滄浪其九青史吾徒事先朝忝從臣十年捜典冊萬巻鎖松筠好友須分局竒書肯借人刼灰心力盡牢落感風塵其十早買淮隂棹仍登江上樓曉來看北固何處似南州王謝池臺盡齊梁寢樹秋天涯憂國淚豈爲故鄉流課女漸長憐渠易將衰覺子難晩來燈下立擕就月中看弱喜從師慧貧疑失母寒亦知談往事生日在長安嘉湖訪同年霍魯齋觀察四首官舍鶯聲裏旌旗拂柳堤湖開山勢斷塔逈樹㾗齊世路催青鬢春風到紫泥還看鮑司隷驄馬灞橋西其二踪跡知何處溪山興不孤閑亭供鳥雀仙吏得蓴鱸紅荔涪江樹青楓笠澤圖須教趙承㫖烟雨補南湖其三門外銀塘滿鷗飛入晩衙公田若下酒鄉夢杜陵花水碓筒輸紙溪船簍貢茶看雲堪拄笏幕客莫思家其四羽蓋菰城道春風行部勞長公山郡簡小杜水嬉豪簫鼓催征騎琴書壓畫舠獨憐憔悴客剪燭話同袍贈郡守李隆吉偶值溪山勝相逢太守賢邀人看水閣載酒上菱船鶴料居官俸魚租讌客錢今朝風日好春草五湖煙野望二首京江流自急客思竟何依白骨新開壘青山幾合圍危樓帆雨過孤塔陣雲歸日暮悲笳起寒鴉漠漠飛其二衰病重聞亂憂危往事空殘村秋水外新鬼月明中樹出千帆霧江横一笛風誰將數年淚高處哭塗窮送張學博儒高之官江北薄宦非旁郡孤舟幾日程詩傳沛子弟禮問魯諸生水冽官厨釀城荒射圃耕北來車馬道猶喜簡逢迎冬霽烟盡生寒石山雲不入城船移隔縣雪屋遶半江晴照眼庭花動開顔社酒清渚田飛雁下近喜有人畊松化石受所藏金陵任白高士無凡好常思買一峰如何三逕石却本六朝松老筆應難畫名山不易逢榖城相遇處宜復受秦封嘲張南垣老遇雛妓莫笑韋郎老還堪弄玉簫醉來惟捫腹興極在垂髫白石供高枕青樽出細腰可憐風雨夜折取最長條破山興福寺僧鶴如五十聽法穿雲過傳經泛海來花深山徑違石破講堂開潭出高人影泉流古佛苔長留千嵗鶴聲繞讀書臺得廬山願雲師書同學友也願師婁人子絶頂誅茅處蒼崖怪瀑風書來飛鳥上僧出亂流中世事千峰斷郷心半偈空却將兄弟夢煙雨問江東園居傍城營小築近水挿疎籬岸曲花藏釣窗高鶴聽碁移牀穿磴逺喚茗隔溪遲自領幽居趣無人到此知梅村家藏藳卷弟四終甲憶烏皮重來簪筆承明殿記得揮豪出每遲幕府徵書日夜催宮開碣石待君來歸心更度桑乾水伏櫪重登郭隗臺花萼春迴新侍從風雲氣隱舊蓬萊草年詩賦江關重輸却城南十里梅一樽雨雪坐㝠𪷟人在汪洋千頃中老驥猶傳空冀北春鴻那得久江東榛苓過眼成虛谷禾黍關心拜故宮我亦吹簫向燕市從今敢自惜途窮碧海黄塵事有無此來風雪滿燕都遺京節度新推轂盛世朝廷倍重儒花暗鳯池思劍珮春深虎觀夢江湖悲歌吾道非全泯坐有荆高舊酒徒十一年甲午四十六歲官京師有病中別孚令弟時孚令省先生於京師南歸言别而作及再寄三弟詩前詩意有未盡故出京後再寄之掛冠之志不覺情見乎詞送穆苑先南還夀總憲龔公芝麓送湘陰沈旭輪謫判深州送天台何石湖之官臨晉兼簡蒲州道嚴方公送永城吳令之任送李書雲蔡閬培典試西川送山東耿中丞靑藜送顧蒨來典試東粤十二年乙未四十七嵗贈馮訥生進士教授雲中送隴右道吳贊皇之任十三年丙申四十八歲春上駐蹕南苑閱武行蒐禮召廷臣恭視賜宴行宮先生賦五七言律詩五七言絶句每體一首應制聖駕幸南海子遇雪大獵先生恭紀七律一首午日賜宴瀛臺龍舟海冦犯鎭江有江上詩海甯陳相國謫戍遼陽有贈遼左故人詩哭蒼雪法師有詩宛陵施愚山閏章提學山東送之以詩施閏章夢愚堂銘施子返自粤西載罹憂慼除服北征宿於靑州之官舍庭月皎然酒酣就睡若有見焉頎然而長􅉳然而黑長袖靑衣袒胸跣足持半刺署愚山道人四字時順治乙未三月之望日也至京師以告侍讀學士龍眠方先生答曰嘻殆子之前身也因呼余曰愚山子迄明年拜命督山東學抵靑州駐節於斯開帙視郡志地故有愚公谷乃失笑曰向所夢者其斯人耶馬逢知爲松江提督有茸城行客談雲間帥坐中事詩董含三岡識畧馬逢知初名進寶起家羣盜由浙移鎭雲間貪横僭侈百姓殷實者械至倒懸之以醋灌其鼻人不堪無不罄其所有死者無算復廣佔民廬縱兵四出劫掠時海冦未靖逢知密使往來江上之變先期約降要封王爵反形大露事定科臣成公肇毅特疏紏之朝廷恐生他變温旨徵入繫獄妻女發配象奴未幾與二子伏法東市當逢知之入覲也珍寶二十餘船金銀數百萬他物不可勝紀綿亘百里及死無一存者人皆快之約齋公舉鄉飲大賓州守三韓白公登明遴邑中耆碩七人賓於庠備養老之禮首前浙江布政使松霞顧公燕詒時年七十四歲次約齋公時年七十三歲次前太常寺卿㮒客王公時敏次前嘉湖兵備道魯岡吳公克孝次同官縣知縣梅梁曹公有武次前河間府知府約菴凌公必正次前新都縣知縣攝六黃公翼聖以次爲序爲婁東七老他爵位高而名德弗逮者不與焉白公尊禮婁東七老啟嘗稽養老之典肇自虞庠介夀之詩奏於豳雅蓋敬老近父國雍有醬酳之文而序賓以賢閭里成仁讓之化然而世多涼行商芝徒翼漢儲時際代遷渭璜疇襄周鼎求其鴻㝠儀世一時星聚太􅏀鮐背維祺百世風師大雅蓋其鮮矣睠茲婁東三吳之名州而忠哲之淵藪也鸞翔鳯舉仕版蔚爲聲施豹隱鱗潛川林毓多大老方伯顧公名著价藩心懷肥遯鯉庭之昌後叶其作求塵尾之宗雷讓其領袖封君吳公經啟振麟情怡盟鷺旣儀一而心結更抱沖而揚和太常王公世襲簪纓心棲元淡齊家飭肅雍之範宜爾多賢禮人被光霽之風羣推長者憲副吳公澤咏召棠淸甘原牖朱絃玉尺褆躬無愧直方丹篆靑編好學尙勤切琢邑尹曹公花封解綬門高五柳之風蔗境垂簾宇藹三芝之秀憲副凌公榮謝桂林性耽松壑倘徉自得不緇城市之塵翰墨競珍獨步風華之藴州牧黃公明月入懷淸風振世樂推爲善踵太邱之遺徽心徹禪宗埽辟支之小乘此七老者咸先世之逸民海邦之耆碩也雖行不同軌而齒皆遐齡久心寫於式閭茲身親夫授几十月初吉鄉飮屆期敘請諸老用光大典初歌鹿鳴之詩志乞言也嗣歌南山之詩祝夀考也旣歌淇澳之詩揚進德也考鐘伐鼓圜視聽於橋門崇齒尙賢隆賓僎於杖履大禮旣成列耆載宴瞻斗杓之有七熠熠台光稱達尊之有三巍巍嶽望年日耋而德日劭國有老成之型懦可立而頑可廉風登仁夀之域將見香山之九老不獨擅美千秋而洛社之羣英亦可匹芳百􅥴矣此固一鄉之盛亦有司之光也謹將七老姓氏齒爵錄於左方以詔來茲焉思義攷先方伯松霞公日記云十月朔日乙亥大霽大暖如暮春赴州守鄉飮之席圜橋門而觀聽者萬人共詫以爲盛舉豈知吾胸中黍離麥秀之感也嗣母張太孺人卒於家陳廷敬先生墓表嗣母之䘮南還上親賜丸藥撫慰甚至王崇簡吳母張太孺人墓誌銘先生始生時朱太孺人尙育三歲子太孺人念其勞瘁從襁褓中乳字先生及夫顧復醫禱恩義眞切此太孺人每以無忘撫育恩詔先生也況太孺人之歸文玉公也訓有錢孺人未周歲之遺女以至嫁而殁勤劬周恤人不以爲繼母也殆其性之者與按太孺人世爲婁東望族明經張柏菴公其父也迨歸文玉公爲繼室文玉公入繼太宗爲玉田公後歲時思慕孝祀不衰與朱太孺人事其姑四十年將承恐後而妯娌之間和藹相終始雝雝如也當先生趨召太孺人固康彊無恙也而眷戀若永訣屬先生異日無忘我夫婦之事嗣父母者嗚呼此先生之所以念之而猶悲也太孺人之生明萬厯辛巳年六月二十二日而其卒也順治丙申年十月初十日享年七十有六嗣子偉業卽梅村先生也送何蓉菴出守贑州送何省齋送舊總憲龔孝升以上林苑監出使山東送程太史翼蒼謫姑蘇學博送郭宮贊次菴謫官山西送曹秋岳以少司農遷廣東左轄送王藉茅學士按察浙江送當湖馬覲揚備兵岢嵐送王孝源備兵山西十四年丁酉四十九歲二月歸里王隨菴自訂年譜十四年春吳梅翁以大司成告歸先生剡城曉發詩他鄉已過故鄉遠屈指歸期二月頭州守三韓白公登明濬劉家河先生爲記按記集中逸見縣志有答撫臺開劉河書顧士璉婁江志州守白公督工河上單騎巡行一日值天晩欲借宿民家思民間俗忌不利官府到家徘徊道傍而民亦閉戸不納適金粟菴僧來迎乃止於菴明日以白金一兩酬僧於是民皆願公來宿而公以布帳隨身竟露栖矣張敉菴黃門五十夀序聖恩寺藏經閣記十五年戊戌五十歲科塲事發吳漢槎兆騫孫赤崖晹陸子元慶增俱貸死戎邊有悲歌贈吳季子贈陸生吾谷行程穆衡鞶帨巵談同時如吳江吳漢槎兆騫常熟孫赤崖晹長洲潘逸民隱如桐城方與三育盛皆有高才盛名同以科塲事貸死戌邊子元以機雲家世與彝仲大樽爲輩行轗軻三十年至垂老乃博一舉復遭誣以白首禦窮邊而死一妾挈幼子牽衣袂行路盡爲流涕汪琬堯峯文鈔壬辰權貴人與考官有隙謀因事中之於是科塲之議起指摘進士首名程周量經義被黜科塲之議日以益熾其端發於是科而其禍及於丁酉士大夫糜爛潰裂者殆不可勝計蔣良騏東華錄九年三月大學士范文程等言會試中式第一名舉人程可則文理荒謬首篇尤悖戾經註命革中式並治考官罪十四年十月同考官李振鄴張我樸舉人田耜鄔作霖科臣陸貽吉等俱立斬家產籍没父母兄弟妻子流徙尙陽堡給事中任克溥劾其賄買中式訊實故也十五年二月以賄買情弊覆試丁酉科順天舉人朱漢雯等内蘇洪濬等八名文理不通革去舉人三月諭禮部丁酉科中式江南舉人物議沸騰是以親加覆試今取得吳鳴珂准同會試中式舉人一體覆試其汪溥勛等七十四名仍准作舉人史繼佚等十四名罰停會試二科方域等十四人文理不通着革去舉人十一月刑部審實江南鄉試作弊奉旨主考方猶錢開宗正法同考官葉楚槐等卽處絞夀房師李太虛先生房師李太虛先生夀序黃觀只五十夀序白封君六十夀序贈奉直大夫戸部福建淸吏司員外郎仲常費公墓誌銘張母潘孺人曁金孺人墓誌銘劉母耿淑人墓誌銘十六年已亥五十一歲六月鄭成功陷鎭江七月犯江甯復犯崇明春游石公山秋遊虞山丁石萊七十夀序少保大學士王文通公神道碑銘太僕寺少卿席甯侯墓誌銘謝天童孝廉墓誌銘十七年庚子五十二歲里居以奏銷事議處時邑中如顧伊人湄王惟夏昊黃庭表與堅同以奏銷詿誤堅瓠集江南奏銷之獄起於巡撫朱國治欲陷考功員外郞顧予咸株連一省人士無脫者蘇州府志庚子十二月吳縣知縣任唯初出西石樓人選貢生涖任卽逼倉總吳行之私糶漕糧七百石婪賄虐刑口碑騰刺十八年二月章皇帝遺詔下府堂哭臨第三日生員倪用賓等列款具呈巡撫朱國治發蘇松常道王紀卽提吳行之等嚴訊供實覆院諸生發知府余廉徵覊候府治花亭唯初囘縣次日生員金人瑞丁瀾等哭府學文廟教授程邑申報六案朱始摘任印着本府看守土地祠唯初逢人說朱撫院要我銀子故此糶糧朱遂以諸生驚擾哭臨意在謀叛具疏銜在籍吏部考功員外郎顧予咸株連之適差滿大臣至江甯審金壇叛招并訊題覆部議覆准倪用賓沈玥顧偉業薛爾張姚剛丁瀾金人瑞王重儒八人典刑家産入官妻孥流徙張韓來獻祺丁觀生朱時若朱章培周江徐玠葉琪唐堯治馮郅十人太身典刑其顧予咸㑹議得疏中有諸生送揭予咸擲地不觀之語所擬革職籍没罪絞奉旨俱免唯初復任後因白糧經費遲延部議降調國治復糾其貪勘實絞決於省城未幾國治解任八月至無錫訪同年吳永調其馴有有感賦贈詩哭亡女亡女權厝志淸涼山讚佛詩七夕感事七夕卽事送王子惟夏以牽染北行冒辟疆五十夀序十八年辛丑五十三歲雲南平康熙元年四月由榔死於雲南有滇池鐃吹本生母朱太淑人卒文學博歸道病殁於桃源縣送張玉甲憲長之官卭雅康熙元年壬寅五十四歲巡撫韓公世琦請撤蘇州駐防兵按先生有大中丞心康韓公九月還自罹南生日爲夀詩蘇州府志名宦韓世琦字心康本蒲州人明大學士爌曾孫世琦隸旗籍爲遼人康熙元年由順天巡撫移撫江南懲前政之弊加意拊循日進士民詢以利弊次第舉行崇明瀕海居民遷内地者安輯不令失業所棄界外田三千八百餘頃爲奏免額賦萬九千餘石折銀萬六千餘兩蘆課八千餘兩國初年之江南吳中特駐重兵以防冦盜北來軍士素驕橫爲民患至是世琦奏言江南甯謐力請調囘及撤囘之日慮其擾民與統兵者約令嚴加禁戢躬率文武將吏往來巡視無一人敢于令者三年夏瀕海太倉等州縣颶風大作漂沒民田廬舍萬計親往勘實奏蠲其稅七年吳中大水餓殍載途世琦繪圖入告始得蠲賑嘗疏請減免蘇松浮糧詳賦田類事雖不行民甚德之居八年以各屬逋賦被議去子暻生字元朗號西齋康熙戊辰進士由戸部主事遷兵科給事中入直武英殿充書畫譜纂修官著有西齋集左司筆記錦溪小集太倉州志吳駿公偉業連舉十三女而子暻始生時唐東江孫華爲名諸生年已及强立矣赴湯餅宴居上坐駿公戲曰是子當與君爲同年唐意怫後戊辰暻舉禮部唐果同榜贈蘇郡副守涪陵陳三石贈松郡司李内江王擔四贈彭郡丞益甫敕贈大中大夫盧公神道碑銘二年癸卯五十五歲本生父約齋公卒子暽生字中麗能詩早卒白漊沈公受宏受詩法於先生見外高祖白漊詩集自註僉憲梁公西韓先生墓誌銘三年甲辰五十六歲子暄生字少融增監生薦充武英殿纂修厯知夀光夀張縣有政績著花韻軒集退盦詩集攷先生三子俱側室朱安人出顧西巘侍御招集虎􅏀有夜游虎􅏀顧西巘侍御同沈友聖虎􅏀卽事西巘顧侍御招同沈山人友聖虎􅏀夜集作圖記事因賦長句諸詩香山白馬寺巨治禪師教公塔銘顧母陳孺人八十夀序四年乙巳五十七歲錢臣扆五十夀序監察御史王君慕吉墓誌銘五年丙午五十八歲魯謙菴使君以雲間山人陸天乙所畫虞山圖索歌成二十七韻江西巡撫韓公奏議序兵科給事中天愚謝公墓誌銘六年丁未五十九歲三月二十四日從山後過湖宿福源精舍二十五日偕穆苑先孫浣心葉予聞允文游石公山盤龍石梁寂光歸雲諸勝游石公歸是夜驟雨明晨微霽同諸君天王寺看牡丹沈文長雨過福源寺七年戊申六十歲吳園次綺以書招先生先生之吳興上已過吳興家園次太守招飮郡圃之愛山臺座客十人同修禊事余分韻得苔字立夏日陪園次郡伯過孫山人太白亭落成置酒分韻得人字贈湖州守家園次五十韻修孫山人墓記雲起樓記湖州峴山九賢祠碑記席處士允來墓誌銘蔣母陳安人墓誌銘靈隱具德和尙塔銘編詩文集四十卷成同里周子俶肇王維夏昊許九日旭顧伊人湄校讐付梓陳確菴瑚爲之序御製題吳梅村集梅村一卷足風流往復搜尋未肯休秋水精神香雪句西崑幽思杜陵愁裁成蜀錦應慚麗細比春𧖟好更抽寒夜短檠相對處幾多詩興爲君收欽定四庫全書總目提要梅村集四十卷國朝吳偉業撰偉業有綏冦紀畧已著錄此集凡詩十八卷詩餘二卷文二十卷其少作大抵才華豔發吐納風流有藻思綺合淸麗芊眠之致及乎遭逢䘮亂閱厯興亡激楚蒼涼風骨彌爲遒上暮年蕭瑟論者以庾信方之其中歌行一體尤所擅長格律本乎四傑而情韻爲深敘述類乎香山而風華爲勝韻協宮商感均頑豔一時尤稱絶調其流播詞林仰邀睿賞非偶然也至於以其餘技度曲倚聲亦復接跡屯田嗣音淮海王士楨詩稱曰白髮塡詞吳祭酒亦非虛美惟古文每參以儷偶旣異齊梁又非唐宋殊乖正格黃宗羲嘗稱梅村集中張南垣柳敬亭二傳張言其藝而合於道柳言其參甯南軍事比之魯仲連之排難解紛此等處皆失輕重爲倒却文章家架子其糾彈頗當蓋詞人之作散文猶道學之作韻語雖强爲學步本質終存焉然少陵詩冠千古而無韻之文率不可讀人各有能有不能固不必一一求全矣按先生詩有程穆衡吳詩箋七卷靳榮藩吳詩集覽二十卷吳翌鳳吳詩箋注十八卷八年已酉六十一歲楚蘄盧綋爲先生丙子典試所取士來爲蘇松常鎭參政及門諸子屬序先生詩文集沈德潛書梅村集後蓬萊宮裏舊仙卿自別靑山悔遠行擬作栩陽離別賦江南愁殺庾蘭成吳祖修書梅村詩後夢囘龍尾醒猶殘重入春明興轉闌宣去何能如老鐵放歸未許戴黃冠悲歌自覺高官誤讀史應知名士難今日九泉逢故友西臺涕涙幾時乾附婁東耆舊傳梅村公得瑯琊賁園稱莘莊改搆廓然堂甫竟而卒門人楚人盧綋來爲蘇松巡道升堂公母朱太淑人不時出盧詢之公對以後樓未建故去内舍甚遙盧卽建樓其後翼然與堂稱斯亦非近今人所能也思義攷王書城瑞國爲士騏傳云性喜多費興作無虛日然考是園不爲侈廓然堂則其長子慶長瑞庭俗呼大癡者爲之慶長性似父而汰尤甚剏廓然旣搆矣不當意立命拽毁之再搆又然至三始成有楊某者度其不能繼也乃竊量堂之規模搆一樓於已宅覬王急則購以移焉閱二十餘年王果敗而楊亦破家是堂及園遂爲吳有然樓猶屬楊也又幾年梅村門生某或云糧儲道盧綋爲買之置堂後果稱無爽造物之幻如是今堂與樓皆爲瓦礫場矣九年庚戌六十二歲探梅鄧尉有梅信日雨過鄧尉哭剖石和尙遇大雪夜宿還元閣詩京江送遠圖歌龔芝麓詩序吳郡唐君合葬墓誌銘太學張君季繁墓誌銘封徵仕郎翰林院檢討端陽孫公曁鄒孺人合葬墓誌銘錢母譚太君六十夀序十年辛亥六十三歲感舊贈蕭明府十二月二十四日先生卒門人顧湄譔行狀先生元旦夢至一公府主者王侯冠服降階迎揖出片紙非世間文字不可識謂先生日此位屬公矣十二月朔復夢數人來迎先生書期日示之王土正池北偶談吳駿公辛亥元旦夢上帝召爲泰山府君是歲病革有絕命詞云忍死偷生廿載餘而今罪孽怎消除受恩欠債須塡補縱比鴻毛也不如時浙西僧水月年百餘歲能前知先生病亟始拏舟迎之至則日公元旦夢告之矣何必更問老僧遂卒先生屬疾時作令書乃自敘事畧曰吾一生遭際萬事憂危無一刻不厯艱難無一境不嘗辛苦實爲天下大苦人吾死後歛以僧裝葬吾於鄧尉靈岩相近墓前立一圓石曰詩人吳梅村之墓先生病中有感詞調寄賀新郎萬事催華髮論龔生天年竟天高名難没吾病難將醫藥治耿耿胸中熱血待灑向西風殘月剖却心肝今置地問華陀解我腸千結追往事倍淒咽故人慷慨多奇節爲當年沈吟不斷草間偷活艾灸眉頭瓜噴鼻今日須難訣絕早患苦重來千疊脫屣妻孥非易事竟一錢不值何須說人世事幾完缺沈受宏白漊集哭梅村師茫茫滄海劫餘身遺恨心肝抱苦辛自迫三徵蒙聖代未輕一死爲衰親南朝宮闕悲瓊樹北極衣冠記紫宸留得茂陵末命在西山題墓作詩人四首錄一五十二年癸巳葬蘇州郡治西南二十里西山之麓澤州陳廷敬譔墓表蘇州府志國朝祭酒吳偉業墓在靈巖山麓按墓在蘇州府吳縣元墓山之北袁簡齋太史稱婁東詩人前有弇州後有梅村向見錢竹汀宮詹譔弇州山人年譜獨梅村先生年譜闕如軾不揣固陋謬爲續貂之舉讀先生詩輒取程迓亭靳介人吳枚菴諸箋註凡有年月可稽者一一劄記釐次前後復於汎覽之下事涉先生編年比附自壬辰迄已亥八閱寒暑槀凡十數易輯爲年譜四卷中有家仁仲參訂處今巳墓門宿草並爲標明非敢比郭象注莊之例也所恨管窺蠡測掛漏尙多舛訛亦不免惟冀博雅君子匡以不逮幸甚道光庚子春二月顧師軾識是書刻以問世三十餘年矣庚申之亂板片盡毁近年覓得原本欲謀重刻適先生裔孫子掄茂才守元見之謀諸羣從力任剞劂爰共相商榷釐訂一二付梓光緒二年臘月師軾又識梅村先生年譜卷四終

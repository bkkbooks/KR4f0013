front:
  text: 梅村家藏藁卷弟十六詩後集八
  hash: sha256:be46c20db9c68803e121934480557f861f7ce0352d2a366e8c918c2acc8a4149
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_016-1a}
body:
  text: 七言律詩七十八首長安雜咏四首玉泉秋散鼎湖龍世廟立都閟御容絳節久銷金竈火靑詞長護石壇松運移梅福身難去道向麻姑使未逢重過竹宮聞夜祭徐無仙客話乾封其二石門秋聳妙高臺慈聖金輪寺榜開龍苑樹荒香界壞鹿園花盡塔鈴哀燈傳初地中峰變經過流沙萬里來代有異人爲教出鳩摩天付不凡材其三鼓角鳴鞘下建章平明獵火照咸陽黃山走馬開新埓靑海求鷹出大荒事轡射生新宿衞帶刀行炙舊名王侍臣獻賦思遺事指點先朝說豹房其四百戰關山馬槊高恥將階級鬭蕭曹兩河子弟能談劍一矢君王已賜袍此日大家親較武他時年少定分茅功成老將無人識看取征南帶血刀哭蒼雪法師二首憶昔穿雲到上方飛泉夾路筍輿忙孤峰半榻霜顚白情磬一聲山葉黃得道好窮詩正變觀心難遣世興亡汰公塔在今同傳無著天親共影堂汰如住華山與師爲法侣最相得滅度已十六載矣其二說法中峰語句眞滄桑閲盡剩閑身宗風實處都成教慧業通來不礙塵白社老應空世想靑山我自哭詩人總教落得江南夢萬樹梅花孰比鄰送友人出塞門人杜登春日此詩送泰興季掌科作也季名開生字天中以言事觸先帝怒徙尙陽言官之遣始此上書有意不忘君竄逐還將諫草焚聖主起居當日愼心臣忠愛本風聞玉關信斷機中錦金谷園空畫裏雲塞馬一聲親舊哭焉支少婦欲從軍海警龍驤開府集戈船不數昆明教戰年刋木止因裝大艦習流眞豈募空弮越工樓櫓偏風利楚失餘皇尙晝眠潮落春申灘上望虛縻十萬水衡錢即事擊鼓迎神太乙壇越巫吐火舞珊珊露臺月上調絲管禁苑霜凋挾彈丸赤驥似龍徠萬里白廌如雪致三韓栢梁焚後宜春起只有西山作舊看送同官出牧門人杜登春日乙未之秋先帝出朝臣四十有一人爲外任翰林讀學楊猶龍以下皆忤安丘故有是命露掌明河玉漏寒侍中岀宰據征鞍君王此日親除吏臣子何心道換官壯士驪山秋送戌豪家渭曲夜探丸扶風馮翊皆難治努力諸公奏最看寄周子俶中州聞道周郎數酒悲中原極目更依誰雲遮二室關山在河奪三門風雨移銅狄紀年何代恨石經傳字幾人知狂歌落日登臨罷殘醉歸來信馬遲懐古蒹弔侯朝宗河洛烽煙萬里昏百年心事向夷門氣傾市俠收奇用䇿動宮娥報舊恩多見攝衣稱上客幾人刎頸送王孫死生總負侯嬴諾欲滴椒漿淚滿樽朝宗歸德人貽書約終隱不出余爲世所逼有負夙諾故及之送曹秋岳以少司農遷廣東左轄四首江東才子漢平陽身厯三臺拜侍郞五管淸秋懸使節百蠻風靜據胡牀珠官作貢通滄海象郡休兵奉朔方早晩酇侯能薦達鋒車好促舍人裝其二秋風匹馬尉佗城銅鼓西來正苦兵萬里虞翻空遠宦十年楊僕自專征山連鳥道天應盡日落蠻江浪未平此去好看宣室召漢皇前席問蒼生其三銅柱天南起暮笳蒼山不斷火雲遮羅浮客到花爲夢庾嶺書來雁是家五月蠻村供白越千年仙竇訪丹砂炎州百口堪同住莫遣閒愁感鬢華其四懸瀑丹崖萬仞流越王臺上月輪秋江湖家在堪囘首京國人多獨倚樓海外文章龍變化日南風俗鳥軥輈知君此地登臨罷追憶平生話少游送楊猶龍學士按察山西二首碧山學士起嚴裝新把牙旌下太行玉麈開尊從將吏銀毫判牒喜文章三關日落凝笳吹千騎風流岀射堂憶賜錦袍天上煖西遊早拂雁門霜其二一天涼影散鳴珂落木平沙雁渡河北地詩名三輔少西風客思五原多紫貂被酒雲中火鐵笛吟秋塞上歌囘首禁城從獵處千山殘雪滿滹沱送王藉茅學士按察浙江二首始興門第故人稀才子傳家典北扉畫省日移花更發御溝春過柳成圍江湖宦跡飄蓬轉嵩少鄉心旅雁飛重到冶城開㦸地豈堪還問舊烏衣其二訟堂閒嘯聽流鶯十載東南憶避兵江左湖山多故吏王家書畫豈虛名從容簿領詩還就料理煙霞政自成欲過會稽尋禊事斷碑春草曲池平送當湖馬覲揚備兵岢嵐絕塞驅車出定羗洗兵空磧散牛羊黃河盡處無征戰紫燕飛時敢望鄉獨客登臨傷廢壘前人心力困危疆君恩不遣邊臣苦高卧荒城對夕陽送王孝源備兵山西秋盡黃河氣欲收千山雪色照并州鵰盤落木蒼崖壯馬蹴層冰斷澗流父老壺關迎節使將軍廣武恥封侯雍容賓佐資譚笑吹笛城南月夜樓送同年江右朱遂初憲副固原四首銜杯落日指雕鞍渭北燕南兩地看士馬河湟征戰罷弟兄關塞別離難荒祠黑水龍湫暗絕坂丹崖鳥道盤錯認故京還咫尺幾人遷客近長安其二淸秋柳陌響朱輪帳下班聲到近臣萬里河源通大夏七盤山勢控新秦北庭將在黃驄老西海僧來白象馴最喜安邊眞節使君恩深處少風塵其三白草原頭驛路微十年踪跡是耶非月明函谷朝雞遠木落蕭關塞馬肥便道江城鄉思急故人京洛諌書稀一官漂泊知何恨老大匡山未拂衣其四長將詩酒付奚囊此去征途被急裝苜蓿金鞍調白馬梅花鐵笛奏靑羗涼州水草軍營盛漢代亭臺獵火荒往事功名歸衞霍書生垂老玉門霜七夕感事天上人間總玉京今年牛女倍分明畫圖紅粉深宮恨砧杵金閨瘴海情南國綠珠辭故主北邙黃鳥送傾城憑君試問雕陵鵲一種銀河風浪生和楊鐵崖天寶遺事詩二首漢主秋宵宴上林延年供奉漏沉沉給來妙服裁文錦賞就新聲賜餅金鳷鵲風微清笛逈蒲萄月落畫絃深明朝曼倩思言事日午君王駕未臨其二複道笙歌幾處通博山香裊綺疏中檀槽豈出龜茲伎玉笛非關于闐工浩唱扇低槐市月緩聲衫動石頭風霓裳本是人間曲天上吹來便不同送少司空傅夢禎還嵩山高卧千峰鎖暮霞洛城春盡自飛花銅仙露冷宮門草玉女臺荒洞口沙被褐盧鴻仍拜詔賜金疏受早還家西巡擬上登封頌抱犢山荘候翠華夜宿蒙陰客行杖䇿魯城邊訪俗春風百里天蒙嶺岀泉茶辨性龜田加火榖占年野蠶養就都成繭村酒沽來不費錢我亦山東狂李白倦游好覓主家眠郯城曉發匹馬孤城望眼愁雞聲喔喔曉煙收魯山將斷雲不斷沂水欲流沙未流野戌淒涼經喪亂殘民零落困誅求他鄉已過故鄉遠屈指歸期二月頭聞台州警四首高灘響急峭帆收橘柚人煙對鬱洲天際燕飛黃石嶺雲中犬吠赤城樓投戈將士逍遥卧橫笛漁翁縹緲愁聞說天台踰萬丈可容長嘯碧峰頭其二野火山深呌杜鵑閬風臺畔羽書傳軍捫絕磴松根火士接飛流馬上泉雁積稻粱池萬頃猿知擊刺劍千年桃花好㮔今誰種從此人間少洞天其三天門中斷接危梁玉館金庭跡渺茫石鼓響來開峭壁干將飛去出滄浪仙家壘是何年築刺史丹無不死方亂後有人還采藥越王餘算禹餘糧其四三江木落海天西華頂風高聽鼓鼙瀑布洗兵靑嶂險石橋通馬白雲齊途窮鄭老身何竄春去劉郞路總迷最是孤城蕭瑟甚斷虹殘雨子規啼遣嫁蘸水寒堤百里風扁舟裝送月明中但教兒女輕諸累一任兵戈誤此翁故友蘋蘩生死寄貧家棗栗亂離空歸來往事關心在不寐愁看燭影紅江城遠眺幕府山前噪乳鴉嚴城煙樹隱悲笳柳條徧拂將軍馬燕子難求百姓家東海奔濤連北固西陵傳火走南沙江臯戰鬼無人哭橫笛聲聲怨落花贈遼左故人八首詔書切責罷三公千里驅車向大東曾募流移畊塞下豈遷豪傑實關中桑麻亭障行人斷松杏山河戰骨空此去纍臣聞鬼哭可無杯酒酹西風其二短轅一哭暮雲低雪窖氷天路慘悽靑史幾年朝玉馬白頭何日放金雞燕支塞遠春難到木葉山高鳥亂啼百口總行君莫歎免敎少婦憶遼西其三傷心書斷玉關秋使者收鷹北海頭共事故人誰賜告别來諸將幾封侯風霜磧裏眞難受瘴癘天邊不易求莫信古稱卑濕地南中猶有逐臣愁其四潦倒南冠顧影慚殘生得失懴瞿曇君恩未許誇前席世路誰能脫左驂雁去雁來空塞北花開花落自江南可憐庾信多才思關隴鄉心已不堪其五貫索天邊動使星赭衣羸馬夕陽亭胥靡憔悴傷圖畫巷伯牽連累汗靑減死朔方誰考騐徙家合浦竟漂零故園無限東風柳蘆管吹來不忍聽其六浮生踪跡總茫然兩拜中書再徙邊儘有温湯堪療疾恰逢靈藥可延年垂來文鼠裝綿暖射得寒魚入饌鮮只少江南好春色孤山梅樹罨溪船其七路岀河西望八城保宮老母淚縱橫重圍屢困孤身在垂死翻悲絕塞行盡室可憐逢將吏生兒眞悔作公卿蕭蕭夜半玄莬月鶴唳歸來夢不成其八齊女門前萬里臺傷心砧杵北風哀一官悞汝高門累半子憐渠快婿才失母况經關塞別從夫只好夢魂來摩挲老眼千行淚望斷寒雲凍不開春日心園卽席次白林九明府韻小築疏籬占綠灣釣竿斜出草堂間柳因見日頻舒眼花爲迎風早破顔地是廉泉連讓水人如退谷遇香山新詩片石留題在探蕨烹葵數往還題畫芍藥花到春深爛熳紅香來士女踏歌中風知相謔吹芳蒂露恨將離浥粉叢漬酒穩教顔色異調羹誤許姓名同内家彩筆新成頌肯讓玄暉句自工石榴碧雲翦翦月鈎鈎狼藉珊瑚露未收絳樹憑闌看獨笑綠衣傳火照梳頭深房莫倚含苞固多子還僯齲齒羞種得菖蒲堪漬酒劉郎花底拜紅侯洛陽花綠窗昨夜長輕莎玉作欄杆錦覆窠丹纈好描秦氏粉墨痕重點石家螺翦同翠羽來金谷織並紅羅岀絳河千種洛陽名卉在不知須讓此花多茉莉翦雪裁氷莫浪猜玉人纎手摘將來新泉浸後香恒滿細縷穿成蘂半開愛玩晩涼宜小立䕶持隔嵗爲親栽一枝點就東風裏好與新妝報鏡臺芙蓉細雨橫塘白鷺拳竊紅婀娜向風前千絲衣薄荷同製三醉顔酡柳共眠水殿曉涼妝徙倚玉河春淺共遷延涉江好把芳名認錯讀陳王賦一篇菊花夜深銀燭最分明翠葉金鈿認小名故著黄絁貪入道却翹紫袖擅傾城生來豔質何消瘦移近高人怡老成幾度看花花耐久可知花亦是多情繭虎南山五日鏡奩開綵索春蔥縛軼材奇物巧從蠶館製内家親見豹房來越巫辟惡鏤金勝漢將擒生畫玉臺最是繭絲添虎翼難將續命訴牛哀茄牛擊豉喧闐笑未休泥車瓦狗岀同游生成豈比東鄰犢觳􅑌何來孺子牛老圃盤飡誇特殺太牢滋味入常羞看它諸葛貪游戯苦鬭兒曹巧運籌鮝鶴丁令歸來寄素書羽毛零落待何如雲霄豈有餔糟計飲啄甯關逐臭餘雪比撒鹽堆勁翮蟻旎封垤附專車秦皇跨鶴思仙去死骨何因葬鮑魚蟬猴仙蛻誰傳不死方最高枝處憶同行移將吸露迎風意做就輕軀細骨妝薄鬢影如逢越女斷膓聲豈怨齊王内家近作通侯相賜出貂蟬傲粉郎蘆筆採箬編蒲課筆畊織簾居士擅書名掃來魯壁枯難用焚就秦灰煮不成飛白夜窗花入夢草玄秋閣雁銜横中山本是盧郎宅錯認移對號管城橘燈掩暎蘭膏葉底尋玉盤纎手岀無心花開槐市枝枝火霜滿江潭樹樹金繡佛傳燈珠錯落洞仙爭奕漏深沉饒他丁緩施工巧不及生成在上林桃核船漢家水戰習昆明曼倩偷來下瀨横三士漫成齊相計五湖好載越姝行桑田核種千年久河渚槎浮一葉輕從此武陵漁問渡胡麻飯裏棹歌聲蓮蓬人獨立平生重此翁反裘雙袖倚東風殘身顚倒憑誰戯亂服麤疏恥便工共結苦心諸子散早拈香粉美人空莫嫌到老絲難斷總在汚泥不染中戲詠不倒翁掉首浮生半紙輕一丸封就任縱横何妨失足貪游戲不耐安眠欠老成儘受推排偏倔强敢煩扶策自支撑却遭桃梗妍皮誚此内空空浪得名海虞孫孝維三十贈言四首法護僧彌並絕倫聽經蕭寺紫綸巾高齋點筆依紅樹畫檝徵歌轉綠蘋一榻茶香專供佛五湖鰕菜待留賓丈夫早嵗輕名宦鄧禹無爲苦笑人其二招眞臺下讀書莊總角知名已老蒼何氏三高推小隱荀家羣從重中郎鬬茶客話千山雨寄橘人歸百顆霜太未聖官孝若其兄也地產橘最佳麈尾執來思𥪡養旻公同飯贊公房其三始立何容滅宦情法曹有弟尙諸生松窗映火茗芽熟貝葉研朱梵夾成金谷酒空消冶習曲江花落悟浮名花落者爲扶桑志感也年來恥學王懷祖初辟中兵捧檄行其四高柳長風六月天靑鞋白韈尙湖邊輕舟掠過破山寺橫笛邀來大石仙孫氏之先遇仙干烏目山之大石王儉拜公猶昨歲張充學易在今年種松記取合圎後樹下著書堪醉眠贈錢臣戾同年給諫公弟杜家中弟擅閒身處士風流折角巾花萼一樓圖史遍竹梧三徑管絃新東都賔客多同輩西息田園有主人酒熟好從君取醉脊令原上獨傷神贈荆州守袁大韞玉四首袁爲吳郡佳公子風流才調詞曲擅名遭亂北都佐藩西楚尋以失職空囊僑离白下扁舟歸里惆悵無家爲作此詩贈之曉日珠簾半上鉤少年走馬過紅樓五陵烽火窮途恨三峽雲山遠地愁盧女門前烏桕樹昭君村畔木蘭舟相逢莫唱思歸引故國傷心恐淚流其二霓裳三疊遍天涯浪跡巴丘度嵗華賴有狂名堪作客誰知拙宦巳無家西州士女章臺柳南國江山玉樹花正遇秋風蕭索甚淒涼賀老撥琵琶其三詞客開元擅盛名蕭條鶴髮可憐生劉郎浦口潮初長伍相祠邊月正明擊筑悲歌燕市恨彈絲法曲楚江情袁西樓樂府中有楚江情一齣善才已死秋娘老溼盡靑衫調不成其四湘山木落洞庭波杜宇聲聲喚奈何千騎油幢持虎節扁舟鐵笛換漁簑使君灘急風濤阻神女臺荒雲雨多楚相歸來惟四壁故人優孟早高歌送楊懷湄擢臨安令聽松鈴閣放衙陰飛瀑穿階入室琴許椽仙居丹井在謝公游策碧雲深山農虎善樵微徑溪女蠶忙採遠林此地何王誇衣錦錦城人起故鄉心令成都人臨安乃錢鏐衣錦城也登縹緲峰絶頂江湖放眼明飄然如欲御風行最高尙有魚龍氣半嶺全無鳥雀聲芳草靑蕪迷近遠夕陽金碧變隂晴夫差覇業銷沉盡楓葉蘆花釣艇横過席允來山居碧梧門巷亂山邊灑埽雖頻得自然石筍一林雲活活藥欄千品雨娟娟養花性爲先人好種樹經從伯氏傳社酒已濃茶巳熟客來長繫五湖船贈武林李笠翁笠翁名漁能爲唐人小說兼以金元詞曲知名家近西陵住薜蘿十郎才調嵗蹉跎江湖笑傲誇齊贅雲雨荒唐憶楚娥海外九州書志怪坐中三疊舞廻波前身合是玄眞子一笠滄浪自放歌贈崑令王莘雲尊人杏翁永平人半載江南客未深玉山秋靜夜沉吟九邊田牧思班壹三輔交遊識季心快馬柳城常命酒軟與花縣蹔聞琴白頭閒說西京事曾記循良久賜金莘雲有能名未半載以錢糧報罷客譚雲間帥坐中事五茸絲管妓堂秋奪得蛾眉付主謳豈是絕纓諸將㑹偶因行酒故人留靑尊有恨攀他手白削無情笑者頭若遇季倫西市日可宜還墮綠珠樓別維夏惆悵書生萬事非赭衣今抵舊烏衣六朝門第鴉啼遶九月關河木葉飛庚嶺故人猶未别維夏叔增城公子彦燕山游子早應歸正逢漉酒登高會執手西風歎落暉梅村家藏藁卷弟十六終

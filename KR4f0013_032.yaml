body:
  text: 序六古文彙鈔序古文之名何昉乎蓋後之君子論其世思以起其衰不得已而強名之者也先儒謂三代無文人春秋以降始有子産叔向用文詞為功而莊周列禦寇遂以名其家西京以下班班矣其時有古文尚書古文孝經者以六書難字為考正而已初非以其文名之也自魏晉六朝工於四六駢偶唐宋巨儒始為黜浮崇雅之學將力挽斯世之頽靡而軌之於正古文之名乃大行蓋以自名其文之學於古耳其於古人之日經目史者未敢遽以文名之南宋後經生習科舉之業三百年來以帖括為時文人皆趨今而去古間有援古以入今古文時文或離或合離者病於空疏合者病於剽竊彼其所謂古文與時文對待而言者也蓋古學之亡久矣吳郡蔣新又吾友韜仲僉憲公之孫也刻其古文彙鈔成問序於余日此吾祖所以教於家者也願得一言以識勿忘余取其目觀之則自周禮檀弓家語以下左國公穀國策三史八家之言皆在而其書不過數帙噫嘻是何其取之之博而用之之約乎夫周禮河間獻王所得與儀禮同上之祕府然僕禮有逸經三十九篇已亡而周禮冬官一篇亦闕小戴氏增損禮書曲禮檀弓以下共四十三篇馬氏又益以月令明堂位樂記篇第苦其錯雜故論禮者以為不如春秋三傳之為全書然漢儒多尊公榖抑左氏至東京以後始顯而國語亦輔之以行名日春秋外傳戰國策劉向所定三十三篇崇文總目稱十一篇宋時再命儒臣訂定乃完夫士生於古學廢絶之後區區掇拾整齊於煨燼屋壁之餘亡者澌滅而不傳存者混淆而無次有識者咨嗟太息恨後生不見古人之大全良以此也詎肯厭遺經為難竟又從而摘裂破碎之哉三史唯孟堅為蘭臺定本史記已有闕文蔚宗所刪取者謝承袁山松諸家今已莫可參訂若夫韓歐大家之文後人尊而奉之業已家昌黎而戶廬陵然君子以為元末諸儒所為婺學者其於八家講求各有本原所當博稽以要其歸未可於尺幅之內規規而趨之也蓋讀書之難如此蔣氏自清流公以春秋起家余交於僉憲最深知能世其家學今新又年甚少才甚高將以其學遊京師而刻所鈔以無忘先志傳日學猶殖也不殖將落新又之所殖不既多乎夫韓宣子適魯見易象與春秋司馬遷涉江淮探禹穴而世本楚漢春秋參之以訪求而後大備京師者文人學士之所集羽翼經傳之書在焉然則新又其繹於所已聞以進乎所未聞可也彼夫探托薈蕞之書豈足為新又重哉余既慨世人之不悅學而新又好古又表揚其祖父之教有合於昔人讀書之大指乃因其請而敘以歸之云梁水部玉劍尊聞序往余客京師好攟拾古人嘉言軼行散見於他籍流傳於故老者以增益其所未聞乃有笑余者日甚矣子之勞也今以子一日之內出入禁闥公庭之論列私家之晤語誠筆而存之皆足以為書乃必舉數世或數十世闊遠而荒忽者整齊而補輯焉雖用意之勤其人與其事則固已往而不可追矣不亦難乎余心韙其語退而為歲抄日記有成帙矣久之朋黨之論作士大夫所聚訟而爭持者黑白同異糾紛厖雜既不足取信而飛言微辭咸目之以怨謗余之書雖藏在篋衍不以示人恐招忌而速禍則盡取而焚之未幾天下大亂公卿故人死亡破滅其幸而存如余者流離疾苦精神昏塞或於疇人廣坐間徵一二舊事都不復記憶於是始悔其書之亡而不可復及也已水部真定梁公愼可別十八年矣今年春再相見於京師出所著玉劍尊聞集以示余日子為我序之夫古之立言者取其講道論德用口語相傳授自典謨以降至於孔孟左丘明穀梁公羊諸書皆是也聖人不作諸子迭興乃務為文章競著作假借緣飾不必其中之所欲言即得失無考正家乘野史則又屬之稗官史家之所不取遭兵火易世代散亡放佚百不一存兔園之小儒據事直書罔識顧避病在僻陋而寡聞其稍有聞者忌諱疑畏輒逡巡勿敢出無怪乎書之不就可勝歎耶梁公之祖貞敏公為名太宰大司馬致政里居者二十年自公為兒童時習聞先朝掌故長而與趙夢白先生遊先生一代偉人其緒言遺論可指數而述也既而子弟位卿二備法從出入兩朝百餘年來中外之軼事皆耳聞目擊若坐其人而與之言無不可以取信而公為人又慷爽軒豁少年好畋獵聲酒馳逐燕趙之郊折節謮書官禁林被黨錮志氣不少挫歸所居雕橋莊杜門著述且十年家世貴盛修飭醇謹踰於素門寒士而聽其論辨則恢奇厯落滚滚不休噫公之書其本於為人者如是是足以傳矣余既論次是編而因以告後之人使知一書之成於斯世不為無助各宜愛惜其所聞遵公之所以得而母蹈余之所以失也宛平王氏家譜序吾觀周禮大宗伯之職以嘉禮親萬民以飲食之禮親宗族兄弟以脹膰之禮親兄弟之國而其屬小宗伯則掌三族之別以辨親疏小史則奠繫世辨昭穆蓋古者天子賜姓命氏諸侯命族而所以訓之敦睦使之親親尊祖敬宗收族無侵凌悖亂之患者則皆大宗伯之事也自宗伯之職不修而天下之人始有疏棄本支而視其至親無異秦越者於是乎常棣之風微而角弓之刺作宗法之不講其害可勝道哉惟敬哉王公以碩德巨望為時名卿且父子相繼為大宗伯當世尤豔稱之推其孝友施於有政既以佐天子敦敘五典諴和萬民其於古宗伯之職已無不舉矣又念始祖來自任丘以羈旅至京師再世滋大及公父子益貴盛不出長安國門而躋崇班登副相此固興朝知遇之恩而非祖宗以來纍世種德無以致此使譜牒不修世系失序數典而忘其祖非所以闡揚先德昭示子孫者也是故作為家譜有名紀焉所謂別子為祖繼別為宗繼禰為小宗者可考而知也有內傳焉自祖德以及壼儀凡嘉言懿行在人耳目者可述而志也有外傳焉蓋倣古內宗外宗之制以廣親親之誼詩所謂問我諸姑遂及伯姊者也吾聞王氏有姬姓有媯姓有子姓姫姓曰太原琅琊京兆河間媯姓曰北海陳留子姓曰天水東平新蔡山陽中山章武河東汲郡其他共有四十餘望而唐室宰相表王氏十三人定著為琅邪太原京兆三族繇宋迄明公孤宰執不可勝數今宛平王氏方伯公由進士起家敡厯中外著有政績垂條布葉施及後人先生之為斯譜自曾祖以前世遠無徵者寧闕而不書蓋昔人所謂膏粢盛門爵位蟬聯文才相繼者吾自有之春秋之義在乎傳信此其作書大指也夫京師者先王所以優禮元臣錫之湯沐而世家巨室聚族而居焉者也成周之甘原鞏汜分卿士之采邑而長安鄠杜櫟陽公侯列邸相望其纂食有堂其薦饗有廟其教子孫有家孰然則王氏之遭風雲處輦轂子子孫孫弗替引之者豈獨為其一家已乎觀於其譜而孝悌慈愛之心油然以生推之天下使人皆知愛親敬長彝倫攸敘而萬物靡不得其所雖古大宗伯之職所以佐王和邦國者盡在此矣公之為意豈不深且遠歟先生辱與余遊四十年當其早歲擅名為海內人士所推服乃藴隆之久而後遇天之所以佑王氏而光大其堂構誠有非偶然者余晚與司空公同事禁苑先生嘗過邸中相勞苦其交在紀羣之間王氏孝友敦睦之教余深知之故先生家譜成不遠三千里屬序於余而先生之壻陳君來二吾州與余故有世誼其門第在王氏外傳中禮有之大臣三命以孝行著於州里鄉黨者兄弟親戚僚友執友以及交遊備稱其慈弟仁信余雖不敏竊自附於交遊之末而先生之孝弟在乎此書不可以莫之徵也爰述其意以為之序楊氏遺宗録序自後世宗法之不修而譜系不可復考其幸而生太平之世知所講求者蓋已鮮矣不幸而遭遇亂離越在草莽曠宗闕祀能復痛其既衰而拯其將墜乎余年家閬州楊君爾緒諱繼生以鄉貢士司教吾州集州之子弟於明倫堂而告之曰爾亦知徼福於天者之厚乎而不思愛敬禮讓以報之也生長江南不見兵革于于而居衎衎而食乃猶箕帚誶語擾鋤德色競其刀雖而棄其姻戚是因生蕃齒殖狃安蹈習以為固然而不知其德也余蜀人也家門崩析絓禍於賊蓋顚白創罹矢鏑無可紀極而破骸折骨何所求索惟有西望長號頓首於邑而已求如諸生恩相援而愛相恤以恬嬉乎故國又胡可得耶於是聞者色動或為之泣下皆知有楊先生之教云踰五年楊君遷去為連江令出其亂後遺宗録授今日其為我序之閬州為蜀之西門踔遠險固其民得以保涪江走棧道在今日猶為完郡其中賊禍也以視全川不及十五六而楊氏之宗所及已如此嗚呼何其酷也先王之世里有孰黨有庠日教民以父兄宗族孝友姻睦之道有不率教者以法制訓齊之雖有強獷暴鷙之人猶可不至於禽獸以故盜賊之源息後世禮讓衰攘竊起即其肺腑支屬數傳之後且不知誰何之人而相爭相奪之風日甚其究也嗜殺而好鬭屠肝碎腦斫人手足流血盈前而談笑自若以是為樂而已矣而非先王之仁義禮樂澌滅殆盡而洪水蛇龍之毒中於人心不如是其烈也楊君流離奔竄之中能追溯本支以教吾州之子弟其為令也又將推而及之於民欲以救厄運而化末俗可謂知所本矣若云楊氏之宗不至於隕越此猶其小者余故推其意為之序焉李貞女傳序事有不見於禮經先王不以訓世而君子稱之以其過於制而合於道也禮於人子之養親也雞鳴而起日入而息請席袵奉敦匜治饘􅓞潔瀡瀡其事至煩且勤矣而獨於女子之孝不甚著內則日婦事舅姑如事父母蓋惟恐其不如父母也婦人內夫家外父母家先王垂家法於天下故於其事父母則略言之而特舉婦德以為訓女子之嫁也父母祝而送之其得於舅姑貽父母令名不得於舅姑貽父母羞辱女子之事舅姑凡以孝父母也舍事舅姑無以孝父母乎女子二十而嫁出於襁褓之中離於保傅之手其去施襟結帨也近矣事舅姑之日長事父母之日淺矣然則有終身不嫁以事父母者乎日有之子之娶婦事宗廟繼後世也古之孝子有不娶以養其親者矣不孝有三無後為大以孝子之心蹈不孝之罪猶且為之而女子無是也威后之對齊使日北宫之女嬰兒子無恙乎撤其環瑱至老不嫁以養父母古固有不嫁之女矣而列女不書內儀不載異常之事不可以教世而訓俗是以著其實於記而沒其文於經固未嘗不深與之也今嘉禾女子李鳳以事父不嫁父病籲天感召靈藥有鳥銜果投厥鼎中飲之乃瘳年四十七以沒猶以不終養其父為恨里人懼其後之軟傳也諡之日李貞女屬余文序其事易日女子貞不字不字其果為貞歟有聘而不字者矣既納采問名以身許人矣而夫亡斷髮𠢐耳誓志不行此其為貞從其夫言之也今李氏之志知有吾父焉爾斯可謂之孝不可謂之貞夫女子之事夫猶人臣之事君也得吾君而事之有死而無二不得吾君而事之潔身守志其道亦有死而無二也君臣之義無所逃於天地之間而男女有别自其為女子而居室之倫巳備斯可為孝也而獨非貞歟編年考序編年者何以事繫日以日繫月以月繫歲此所謂編年也編年考之為書者何以歲繫人以人繫事而日月不必考則不可謂之編年然以人之盛衰始卒貴賤賢不肖皆分繫之乎年雖謂之編年亦可也雲間沈坤仙氏實成此書其子麟字友聖以詩名則余友也友聖之言日吾父名不出里巷躬耕十年而成此書顧請先生一言序其簡端且吾父嘗以謂麟日吾之為此書蓋以自警且教爾也吾見古人之生而神靈少而頴異則未嘗不蚤望爾之成也其或年未強仕位至三公揭莭垂組立功立事則未嘗不望爾之顯且有所建樹也若夫鹿裘帶索之叟或荷鋤終身或鈔書千卷吾蓋以此自勗而默數其齒則吾固已衰矣麟也再拜受教今以遭時不偶父子負耒長隱於田間而吾之壯盛日已過吾父之篤癃日已及將其平生著述無以傳示乎來世願以是屬之先生余應之日子知古人編年之道乎夫紀載之存疑傳聞之失實未有不始於年者也三皇之前皆萬有餘歲其言荒遠不經即其後言之外丙二年仲王四年一以為改元一以為紀歲則失之訛文王百歲武王九十五歲而謂文以五歲子武則失之誣且以孔子之生年卒月而三傳史記所載已酉庚戌已卯之異其年十月十一月四月五月之異其月己丑乙丑之異其日其不可考者一也老𣆀莫知其所終或言百有六十歲或言二百餘歲其不可考者二也長狄桀如死于魯桓十六年而其兄焚如以宣公十五年見獲於朱相去百有三歲其不可考者三也以家語按之伯魚之卒宜在顔淵後而論語説謂在其前其不可考者四也夫春秋者編年之書也史記者繼編年而作者也今以二書參互徴考而其訛舛乃至於此安知後之史家繼千百年而作者其紀元年表無傳間異辭者乎又安知名人巨儒私門紀載弟子傳述所謂年譜者其説果可盡信乎而沈氏獨能佃漁百氏錯綜萬家以成此書其道固非以為編年也誠以書簡脫誤傳寫乖錯有見乎編年之難而特借一端搜羅考索以輔其所不及且又父子二人帶經而鋤窮居著書樂道不倦後之人考其年月敦謂是書之無所禆益乎余所以謂之編年者董以此歟其可傳也已秣陵春序客有問於余日秣陵春何為而作也自華山畿紀於樂府而幽婚冥媾厯見稗官後世猶疑其事今子之説非形非影為有為無此恢諧滑稽所不談而虞初諾臯所不載者也得母乃誕之乎余笑日是所謂夏蟲不可語冰知宋人之刻楮葉而不識木鳶能飛者也今夫阿房閣道巨麗之極觀也咸陽三月劫灰具燼而海中有三神山以金銀為宮闕二者吾不能定天下之居處鄭女曼姬嫻都嫽冶章華宮中十年不能望幸而巫山之神女高唐入夢得薦寢於君王二者吾不能定天下之美麗魚龍曼衍之戲西域幼人吞刀吐火而月中天樂紫雲一曲唐玄宗以玉笛吹之名日霓裳羽衣二者吾又安能定天下之聲音哉彼夫文人才士放誕窮愁怨女貞姫憂思鬱結倘兮若有所亡恍兮若有所見杳矣冥矣縹眇無所不之矣况乎侯王則陵廟丘墟妃主既容華消歇蕭條乎原野漻栗乎悲風魈之與鄰狐兔之與居其平生圖書玩好歌舞戰鬪之娛雖化為飄塵灌莾不能有以磨滅也於是神僧異人從而取之以出其變化李少君之悵中佛圖澄之掌上皆是物也而又何疑於余之説乎余端居無憀中心煩悶有所倣徨感慕髣佛庶幾而將遇之而足將從之若真有其事者一唱三歎於是乎作焉是編也果有託而然耶果無託而然耶即余亦不得而知也客乃聽然而笑日善梅村家藏藳卷弟三十二終

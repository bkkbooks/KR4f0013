front:
  text: 梅村家藏藳卷弟二十五文集三
  hash: sha256:1b8d11e53b3813696ff2f23bd335b343fdfb1d4ae962f03ec3d3de26a6d79aa3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_025-1a}
body:
  text: 雜文三梁宮保壯猷紀洪惟我世祖章皇帝大統既集王公卿士勳在盟府武成告類四海攸同地大物盛其或有先服後叛則命將出師往征之繄熊罷不二心之臣是賴時有若關陜梁公西定雲中南平江海咨於有衆嘉乃丕績則天子以褒崇之禮答焉公既拜揚休命躋上將列孤卿居安思勞懋修厥職輒以其間追溯功次而籍記之曰臣化鳯待罪行間奉神靈效任使常懼濫膺賞率以不免於戾庸敢伐當時事以自言勳夫兵者國之大事當為後世法苟不著我師之所以得敵人之所以失此非朝廷昭示武功與微臣訓勵將士之深意也謂臣偉業曾忝史官頗習其行事而屬紀之以文既辭不獲命則謹書提督軍務總兵官太子太保左都督梁公諱化鳳字沖天一字澧源陜西西安長安縣人也中順治三年進士四年授山西大同府陽和高山衛守備五年十二月初三日薑瓖據大同反陽和居大同東百二十里道臣郡丞主兵餉兩衛及城守凡三將兵不多城小多震恐而公獨自如率其下繕完固守時天下新定山西為京師右臂而大同被邊不早擊恐有它應者故諸王亟請行自反書聞七日而前驅巳抵城下羽檄徴諸道兵需全軍至而後擊公聞之喜日兵鋭且速賊不暇成計擒之易耳會王命發取陽和火器城中謀可使軍前者公請往乃抽守兵及道臣中權卒合邊人子弟千人與俱既謁見軍門公長身倜儻口畫進兵狀甚悉軍中目而偉之即以其日從攻許堡許堡者真定宣府蔚州三路轉糧所取道賊用五萬人扼險餉且斷其城三面臨濠而下礧木師焉多死二十日不能克王召諸將計事日城堅莫如穿地道用火攻崩之軍中曉習者誰乎莫應公班在後王再問公念為兒童時諸老人説其事遂越次對曰微臣耳妄聞臣鄉用兵時誠有之顧未試以目若王命使臣者臣不敢愛其死王喜即命以行用其法城之倒塌者十餘丈徑馬入賊猶苦戰不休日暮其將郭二及五千人束手縛餘皆死道遂開軍食以給王大喜賞袍服帽靴牛馬者再用便宜授大同掌印都司倚重在諸將右矣六年正月大軍部署諸將所擊賊之反也以大同阻山而帶桑乾其支附厄塞有渾源州左右衛為聲援它若蜂起之盜架巉嵓穿溪谷者日寨日洞纍令辟貫木譙者日樓曰臺築垣墉團鄉井者日堡日莊雉堞居三之一雖郊堡而實自為一城以扞蔽者日關千里之內纍纍不絶公之克許堡也王見公能用少擊衆厚遇公配之以各路奔命之兵成一軍矣大同城北破窰溝者有二洞山溝巉削且深東西長十里中界兩垣而洞在其巖腹南北對歭兵至則拒石戶而穿隙互火攻擊我大軍遊騎為所傷公以十九日遇賊出即與鬬賊敗緑仄徑走入壁上下皆莫得窺公於其顚懸索垂枯槎宿草乘風爇之賊薰急突而逸我師遮其隘斃三百人生得李義張豹則大同偵騎將狙伺我軍者也遂營於蕭家莊之西南蕭莊西瀕河河去大同東門三里我師駐莊就河外穿三濠困賊賊望見來爭公三日七戰皆克塹乃就二十七日以王命從攻大同北關彼我用炮交相擊公攻其西它將攻其東城將隳矣賊潛伏地雷於其衡俄而機發我師大􅑒賊開門犯我營奪炮時帳落延燒雖火所不至咸若震裂公提刀冒煙燎直進賊愕乃衄而去薄暮天大風軍士十指皸瘃公獨身搘賊不動雪甚大如升沒馬牛目人舉足蹈坑穽公以五鼓還營不食者二日夜矣是役也火軍營攻具百有四十微公力戰幾盡二月大軍既重圍守賊諸王以一軍軍大同之東一軍軍大同之西分擊州縣之不下者公以初二日受命攻渾源州州十里為白河即桑乾水也河之北有韓村玉合張家三堡我營左距河右距堡逼處其中間堡舉炮城上聲相應王日師仰攻而堡人或蹈吾背危道也盍先諸命公攜飛梯往遂以初十日夜半攻韓村詰朝未日中而玉合張家三堡皆下凡一堡必兩戰共殺三千餘人渾源州開門來救巳不及公與戰再覆其衆我師三日息以十四日三鼓進攻渾源西關賊背關城陳而待破之乘勝挺戈先登賊巷戰短兵接數合殺三千人我師既得關州人出衆來奪又敗之王賞金貂文幣帉礪弓刀之物畢備并以及所部將劉應第云賊自西關陷收其卒退州城拒守二十九日公以其間破賈莊城先鏖於城下尸相屬既上賊巷戰生得賊帥王平并其徒三千無噍類奪還我馬之前失亡於賊者四十匹馬王馬也三月之四日王以公可專任集諸營之驍果者以授公并將之搜卒簡仗而臨渾源下令曰今日必拔公急攻賊悉其衆再出戰公再破之先登斬級二萬城平戮其帥方三唐虎渾大州也既下則我師以東略為不足憂十三日趣其兵攻左衛左衛居大同西百二十里道上有雲岡高山二城雲岡去大同二十里又四十里為高山強宗黠姓保其上王既過雲岡而舍下馬顧諸將日此城脅於賊非真叛可招而下也公請行王日幾何人而往公日二十人足矣雲岡北背山城在山麓而南臨河公䇿馬隃呼其陴諭之以善意則詭諾而潛舉火殆欲擊公覺曳馬首分之不能中賊出騎五百步倍之來追公嫌道追狹引之至平地返而奮斫殺五十人奪其火器弓刀孶畜明日王視戰處嗟歎之日若勇未易當也公知賊恇懼身從一騎徑鞭其闔曰堅子今又何故不服賊望拜日如死何公為之誓而後下高山聞之亦降二對山者當左衛之西北兩山夾立下為深溪有洞二以抄我遊騎故往擊公先戰而後破之殪千人既凱歸豬兒窪敵臺者賊五百輒敢半道邀我公逆擊乃敗而入守遂掀其臺滅之雙山澗石洞有二亦以抄我遊騎往擊公先戰後攻其破之一如二對山云惟吳家窰者最險雜寧武雁門偏頭及右衛之孔道山氓穿其中搜石炭嵗久㟏岈曲折賊竄處分九洞我師取火器於關中經其地被奪公往擊路過刁窩寨賊有張目思逞者即破平之而吳家窑則用巨炮碎石門既入而猶死戰其屈強如此公自十五日至二十二日凡三舉翦諸溪洞先後斬級四千於雙山獲偽守備楊林林吳家窑獲偽總兵王元泰皆以徇二十九日從大軍圍左衛賊背城致死公陷陳斬首五千賊潰收其卒入城我師進搏其堞賊縋而下鬬公瞋目持矛衝突匹馬縈萬衆中鍪牟為炮所碎身中三矢不動賊大潰乘勝入其城將吏俘斬蓋二萬云衛東南敵樓高十丈上容千人雉堞與大城等餘黨阻之不下四月之二日公取賊將周議李千梟懸之殱其衆五百人左衛遂平右衛偽師張某自請於軍門曰願得梁公一言即稽服巳而説之果降蓋憚公威信也最公之績以取渾源拔左衛為第一自細口衣物下及畜産所賚無算由都司進三級為遊擊又進副總兵都督僉事皆軍中便宜除拜已而定功得旨以副將缺推用矣當是時大同巳屢挫大困唯是關中之響應者兵敗過河竄於永寧石樓之間以入我汾州汾望郡既破賊大恣太原雖未受圍屬城多陷汾州之賊以十萬人保晉祠晉祠去太原五十里薑瓖遙與合遣其親信薑建勳者為偽巡撫扇動習人心以搖省會我師之援太原者當繇三關以入時山西闔境反有突圍終不能出乃中夜相混戰我乘間先奪其城質明而賊改計則已無所歸矣於是中外合擊賊大潰我長刀之殺賊者日光激石壁以返注視之如龍繞電躍的爍驚閃數萬之賊瞬息盡矣公之斬馘以萬計建勳及其所置監軍以下官皆死公亦鎗中其左臂右髀中一矢傷然聞平陽之亟也往救二十九日賊以數萬衆方合圍公陷陳殺五千人圍乃解平陽吏民爭出牛酒醳兵公引去為且用事汾州汾州賊帥沈海恃其同惡者衆我師以六月之二日至而海遂開門出戰公擊敗之海走保其城不下公以王命行略地收諸塢壁曰近同堡曰呂家堡曰張家堡曰馬鎮堡公以十五日十七日再用兵殺千三百人皆下之其攻馬鎮堡也孝義偽總兵張爾德者來爭孝義去汾州三十里沈海倚德為左右手故欲以示武於衆公怒曰我不汝擊而撓我乎逆與戰殺千人亟躡之遂薄其城下爾德匿不出還二十日以其間攻蘇家堡殺五百人下之王命再攻諸堡公曰攻堡不如攻縣國家所重在得地而愚民避死以保其壁彼見邑城下且自服庸足多治乎遂以七月十七日復進薄孝義先與戰於北關城殺五百人遂得關明日進攻邑城陷執爾德及偽署平陽道張偉殺五千人孝義賊巢憂反覆王自營於瀕河之八十里而命公入據其城扼頭領以專進取九月之八日沈海潛師出城以遠襲大營王覺之持滿待公聞信亟躡其後為夾擊賊大敗輿傷痍入復固守十四日王益發兵環攻公力戰先得其北關馘二千遂門於北門賊突圍以擊門者公與戰殺三千人先登汾州潰賊多從西門出奔葫蘆峪以復還永寧石樓海則由東門遁去收亡合散尋破潞安即其衆也蓋海徑賊致必死賴公力戰斬殺萬計始克汾城故軍賞不與它將比凡衣物馬匹鞍轡者再加金鑱箭一以為寵云當賊之在汾也諸民塞率與之通汾既平則以其間爬梳塢壁之攜二者二十三日攻曹家堡殺八百人二十五日攻記古寨善信堡共殺五百人皆下之於是介休平遙祁縣徐溝皆降惟太谷長子為沈海所委將堅設守十月之四日公去攻太谷賊將蘇升者出城戰公手斬其前鋒梟雄者十數所將卒鼓譟乘之殺千人賊入城守公蹙之賊宵而突我公踣其鋭卒三百賊氣奪明日公先登馘五千生得升十五日王命公引其軍下潞安東南出盤陀口由沁州虒亭驛長天關屯留縣賊先於數地皆置兵聞大軍至罔敢弗佚其人民率望風附公駐馬勞來之沈海聞之褫魂魄遁去遂復潞安匝月迅掃兩大郡全晉震讋而山民之深險者猶為梗公以二十一二十二日連拔馬蘇趙民寨者三皆先與戰後破平之計三寨共殺二千一百人郭家寨即日開門降看寺寨者有賊千人與同守恃其險不服二十五日公進攻賊出戰殺五百人遂圍之攻急賊復出戰公右髀中一矢裹創力鬬殺千人始克王日山寨既平亟引其軍攻長子公病創卧先所部將同光英談忠往擊既數日不下公嚄唶日我當自行耳十一月之四日晨而至夕而入其城所殺五千人光英忠用力戰賞於是諸將皆服九仙臺者山斗壁我騎不得上太谷長子既下潞安餘黨無所歸率奔臺以拒險沈海在焉公以二十一日訖十二月之二日火攻晝夜弗休誅其渠率郭天佑郭加友羅真崔海川武二劉某等鑱厄狹而平之沈海窮蹙降傳詣之王軍中得不死於是從大軍定平陽又定澤州澤父老以公賢將寬厚願得之以安集百姓公平關梁嚴候望通商旅輯流移間討平陽陵川殘寇令所過弗得有所侵暴居四月澤民大悅七年三月王命公獨以所步兵攻賊將田虎於牛鼻寨寨踞大山居齊豫晉三省之交有多河里者去寨五十里在山半賊壁一軍為拒守公進擊馘三百破之賊還山增兵復戰又破之馘五百乘夜襲我公設伏於山澗又大破之斬獲以無算傍寨有西山賊將袁忠者來救公與戰馘百人生得忠又次日山東賊將李虎者亦來救馘五百公單騎手弓親射之虎矢貫其脛幾被獲伏草間入山溝中得脫走田虎自謂援巳絶知必斃乞降弗許四月之二日平其巢焚之餘衆尚有一千五百人殱滅之殆盡還報晉城悉定軍罷歸公功凡下三郡一州五縣二衛八城十堡八寨三臺十五洞五從諸王分地進兵大小七十七戰斬級以纍萬擒偽總兵以下二十人偽巡撫一人偽平陽道一人公初以孤生起裨校乘沿邊一小障所將不過二三百騎非有豐沛之舊爪牙之重以為之藉也猛氣憤踊思以效其尺寸常身自決鬬斬將艾旗趍利深入崛起下僚在諸將之後特以勇聞今公之功名著於東南貴重矣間酒酣談其山西時事解衣指視諸將日吾常攻某城某堡矢著我之臂與兩髀流血至踵褁而復進今其瘢固在也噫嘻觀朝廷所以用公與公所以自致者豈偶然哉八年二月論平晉之賞詔補公都督僉事副將管參將事治兵於蕪湖采石自河東底定中原無風塵之警而閩海方用兵我南征之師絡繹於江上蕪湖采石實江之鎖鑰廷議思公成效乃不留於西北而輒移之東南良以簡練形勢厯試其材而用之也公所轄寧國太平為山郡其間石臼鷺鷀二湖亦一逋逃藪也有楊萬科管有縉楊天生者恣甚撡江李中丞以屬公公因嚮導授指蹤不兩月而三人授首昔人謂以王師討水寇則難以水寇討水寇則易出權制變用我短以制彼長此雖於公為小事識者固有以推之矣當是時江寧居重御輕控引南北固山額真石公滿兵提督哈公漢兵提督管公皆以元勳重臣任保釐領宿衛視古之大都護而制府有馬公鳴珮中丞有張公中元撡撫有李公日芃以文臣典機宜餫餉自安慶以至於揚州鎮帥碁置而江南特設一大將兼制四郡治松江又設一別將專備海口治姑蘇後移治崇明蓋以海寇鄭成功張名振圖自閩窺浙自浙以窺江南故先事修完分地以為之備也天子既用撡撫請謂公東南再著成績宜其官即拜公為寧國副將視事一載十二年秋張名振犯崇明之平洋沙蘇州總兵王燝不警於職守既報罷發代未至而賊急制府謂此任非公不可謀請之上真以屬公而用便宜俾公攝理為漸先是大司馬以七月啓事仍以副將換任公於浙東谷口以牽制我師張名掁自率親兵數萬攻圍高橋土城公日此要害地不可落賊手飛馬而馳之揮雙刀左衝右突衆乘之賊大潰殺甲首一千七百三十有五生俘李七等八人奔還蹂躪不及舟而溺者纍萬賊氣大沮制府馬公以聞有詔録其勞而浙撫緣定海需公急趍檄日至浙撫秦公世禎向固按江南有聲者也秦公之言曰吾非不兼念江浙舉足便有輕重然官有局守不可違也地有封圻不可越也將軍受命寧海而為江南所留豈有詔許將軍乎將軍速裝無稽簡命馬公之言曰江南與浙中唇齒賊精鋭盡向姚劉吾巳摧其前鋒便可乘勝疾擊此豈有兩賊而可以分地誤之乎公亦自以得賊要領思遂其前勞召諸將告之日吾了此不過旬朔若以浙中簡書舍之他去是為便文自營緩追佚獲非吾與諸君力戰意也馬公聞之大喜於是搜勦平洋之策始定計崇明見兵三千有餘又益以撫臣親將及劉河福山分撥之兵數僅及千它馬之選以佐軍者亦不過百匹而鄭成功聲言挾其三十六鎮從舟山北犯幕府深以為憂公則曰施翹河戰艦逼城賊不能直前跳蕩小洪水柵無慮三百餘艘吾遣人偵其幢牙浸尋乎分䑸南指是殆將走也急擊勿失馬公誡之以書日賊或見嬴示譎伺我之空壁逐利而潛師卷甲從它道趍城即崇明危矣公曰吾不一舉掃滅待彼泥居穴處怖而主計賊且何時定哉於是分兵斷後晨炊蓐食徑造平陽小洪見賊連檣置柵首尾相銜萑菼之間易為風火爰施巨炮擊之須臾煙焰漲天延燒灼爛公親跨馬櫟陳生擒賊首許奇潘忠等餘衆倉黃欲走風帆纍咽未行我中軍遊擊李廷棟統水師突入其中大呼奮斫裝竿施拍敵五舟應手糜碎大潰而去平洋之人攜負老弱觀於道周若崩厥角喜復其所公乃拊循疾苦咨諏險塞以為是沙也上通於郊牧中隔於小洪以潮汐為進退若因水波恬緩填而為堤俾我方軌齊轡應援時至賊舟雖有窺者到而稀矣諸將皆應日諾或日此大事當與制府謀之公日公家之事知無不為職也必報可而後舉乎於是李廷棟等率其將士距躍受功公親屬役賦丈以為成命當是時鄭成功遇颶風於羊山舟船漂沒遁回島中江南之人賴公之力得以安堵無恙制府既條上前後戰功因言舟山見為賊巢崇明咫尺虎口求其功效白著人地調習舍化鳳無可安全吳者願即用為蘇州總兵官且日化鳳向在雲中血戰數十曩時行間諸臣今與臣共事者多稱其奇積資酬庸宜班上將非徒以一戰而邀不次也上既下之所司先是蘇州總兵樞臣早奏用張承恩故於制府所上持其章弗許世祖時方以海上為憂察公忠勇可任見部議却之日將如化鳳何故弗用而別求之耶乃命改補承恩於它任而公升都督僉事鎮守蘇州繇特簡也十三年之正月新將立號於軍中自候奄以下無敢不庀其職戎事修舉而平洋沙堤功亦屈於成神相厥勞人無怨讟又於其壖灌田千頃收薪芻以作軍費吏民刻石誦德其詳在碑記中馬公時巳徵入京師新制府郎公廷佐開濟多大略一見公重之先以堤成入告言公所建於地方甚便既而親巡海上遍視墩臺布置中夜烽堠分明太息言日吾國家九圍有截區區小豎弄兵所恃舟楫之利耳今誠採江浙諸山之材大修鬪艦募江湖習流以充柂工棹卒得如公者整齊而用之我豈復憂賊哉遂繕疏以請日漢武鑿昆明而南越蕩平王濬造樓船而江表歸命水戰固西北之所長也况東吳乎臣至海上見蘇州總兵梁化鳳戰守具有成畫大將材也願練水師一萬五千人拜化鳳為大帥統之其下分立兩協十營應用水艍船五十大沙船二百兩協各設一副將一將領二千五百人十營各設一遊擊一遊擊領千人水艍一載兵五百沙船一載兵五十總以受化鳯節度崇明既形便之地吳淞相望六十里化鳯即舊地建牙而兩副將就近聲援成輔車之勢計無便於此者天子可其奏訪之所司許練水師一萬置帥與副如所請而減遊擊為六員水艍為二十沙船為六十挑各營將士之趫勇者配之搜贏羡捐贖鍰主給都船工作有不足則大司空斥水衡錢以贍用公仍原官進都督同知改蘇州水師總兵於十五年二月之十日禡牙誓衆講求技擊收召蒸徒將以修伏波之壯圖勒龍驤之徑旅然而越舼吳舫問諸有司蛋卒鮫人求諸蠻隸自非足其金錢假之歲月橫海一軍未易以猝集也鄭成功張名振自平洋創於火攻羊山錢其風鷁魚逃鳥竄伏處經年無復過南沙一步是歲也軍候詗知其復謀內犯公既盛為之防八月之十有二日賊前驅巳過界上已而颶風大作輜重再於羊山覆沒賊渠妻子俱死視前嵗失亡為多公乃大饗諸軍告以本朝福祐自天海若風師咸為國效順而知賊之滅亡不久也乃蠢茲小腆猶未悔於厥心十六年五月之十有二日鄭成功親率海鶻三千蟻徒數十萬擊鼓呌噪及於稗沙意在直窺江寧畏公必特其後用其黠數詐遺間諜以疑衆公立梟其使焚書於門將士聞之無不賈勇遊擊同光英把總高攀先俘賊候丁秀宮龍二人以徇把總潘大才護委輸於七丫口遇遊艇而鬬遂奪之生得陳義等二十四人守備高士英出兵近港追賊獲其犁􅙔手斬賊將陳楨生得曾進等十有一人崇明沙洲演迤如循衣裾緣岸為曲折公察其可登者埋竹落而鋭其上賊負舟跣足觸之輒傷公又倣古巢車之制創木臺二百有二十於其顚建三徽授瞭者以升而令之日海䑸近者揚一徽泊沙洲者揚二徽將登岸者揚三徽亟傳烽告警我應援之兵亦且至若無事則休其兵去海十里而舍傳餐解甲息其力而後用之百姓有羲勇自效者公為之聯步伍申訓令收得五六萬人俾各持一幟視兵所駐又遠三五里藉其聲勢為疑軍教之日吾非令若輩親自格鬬賊至但譁扣而鼓鈞聲以助吾戰耳忽恐諸將入言事公固示整暇方與客圍碁談笑手巵酒以賜之日若主守吾主戰有急吾以中軍策應毋為先自擾也賊雖自恃其強終莫能測以此留屯浹日移其舟泝江北引公矯首歎日使吾艅艎巳辦當盡殲之洪波之中今以有司征繕之不時雖擁水師虛名仍於陸地逐賊故所效若此豈我志耶尋聞瓜洲鎮江失守賊別將徇九江姑孰者吏民私相影響姑蘇一日數驚江寧告急之使馬皆有汗同時大將之擁兵者按甲猶豫據分地為解公則投𬒮起曰賊烏合亡命掩吾不意故得逞其狂狡耳吾地方磐牙根固諸鎮林立賊入其中跳踉妄作何能為耶兵志有之日將驕必敗今彼驕矣逆徒自送死而可弗之擊乎會中丞蔣公國柱巡按御史馬公騰升各以其檄趣往救而御史則以兼固根本語不甚堅蘇松道宮公家璧盛言都會之與海隅孰重孰輕退舍之與救國孰得孰失其指尤切公小心參詳遂拜表決行先是制府下虎符副將袁誠岑應元者公吳淞水師部曲也以四千人往矣公帳下親校六營營千人是行也左前營陳定同光英留之居守中營曰李廷棟右營曰劉國玉後營曰周垣奇營曰王龍公傳令辦嚴六月二十八日率四千人渡海與中丞會於吳門時丹陽以上賊候充斥中丞謀之公曰彼盡鋭前攻纍重在後吾收京口奪金焦焚敵舟而西上則嚴城之圍不戰以解此救江寧一奇也七月十四日次於丹陽中丞居前李廷棟王龍率兵從公以二將殿晡刻四得制府羽書公憂會城危迫法當先捍頭目京口又居其次顧謂劉國玉曰汝從中丞保丹陽塞奔牛之口遏賊東下而廷棟龍撤以自從日且入部署中後奇三將之兵銜枚夜進十五日遲旦過句容句容丘陵曼衍草木蒙蘢公疑此必有伏搜於溪谷之間戒左右整仗乃過既過舉鞭笑謂其下日賊何知反使有數千人蔽林扼險則吾能安行無恐哉速驅之賊巳在吾目中矣是夕漏下三十刻抵江寧守陴者傳籌入報制府命開正陽門以進師都人皆喜賊據白土山以駐軍取行栗毀屋材櫛比而栽視版築為加固置旃以為門張幕以為舍立表以為𣙗名曰木城大小七十餘處其鬬士兜牟重鎧鐵面具者三萬人長鈹前蕩者次之用矛用火懸􅚛挽強者次之海師習流其水軍贏糧私從者為下分其兵屬二總統五提督一提督所轄有五總兵而鄭成功左右自立五護衛每護衛一總兵其中軍掌五府印兼制諸提督號親將江寧之西北獅子山視之若狻猊之蹲踞鑱其根而甓之以為城其門日儀鳯去門十餘里為江江之內闠聯闤比又襟之以長河有石橋翼然其上直儀鳳之馳道當馳道北旁逹於河口又一橋鎖之此走白土山要路也鄭成功以形勢視儀鳳為可攻則遣偽總統余自新暨二總兵結五大營於門外後皆據街前距河而自新則斷石橋以樹木寨塞要衝絶樵采向城闔而置陳又恐我騎兵之或突其背也則設橫枑於市之中繞而連柵之出入者弓刀轚互焉重鎧鐵人之從者一萬造雲梯七百高十丈自新聽卜云月日不利按甲便時而後攻公之至也登獅子山以望賊曰此地前厄後阻不可以用衆逆徒雖盛其當吾不過數千但一處摧敗勢必自散草竊烏合臨陳而囂以吾料之可一戰擒也遂以二十三日獨將所屬三千人又提標左營徐登第等分為三道出擊漢兵苦不得多馬公亦思徒步逐賊無所事騎乃命戎旗遊擊朱鴻祚郝進孝率馬兵五百專堵北道之橋口曰我戰而白土山有一騎過此者汝死之中軍李廷棟從南路過河賊遇於隘不得逞則裨將常春等身先壯士以登民屋用強弓注矢下射所部卒皆登騎危大呌撤瓦甓以投賊多中而周垣亦以後營之士瀕河漘向北殺賊戰甚力公則率奇營王龍等從中路指自新而直進爭橋龍素膽決輕身若飛戰急回顧而公提刀逼其後遂挺而大呼踊於枑而騰捷躍入其所樹木城兩營士之破賊者亦會皆帶甲泗水亂流而趣橋賊五營畢潰鴻祚進孝分其騎偕督標遊擊白士元以鈔斷賊舟賊以無舟既不能濟而其營東西連柵數十事急適足以自斃我師從而燒之因焚屋之勢以行屠滅五六萬人又手麋爛無或脫者陳獲偽總統余自新一人偽總兵二人斬馘以萬計枕尸填籍俘執者反接纍纍收其資仗甚夥此儀鳯門之第一功也我軍聲既振制府及滿漢大臣議以詰朝滿兵出城而西漢兵出城而東期至白土山而大戰白土山蜿蜒有率然之勢鄭成功結大營於東山之首而用張文達為中軍賊營稱張五府是也所謂偽提督五者前營黃某後營翁某而左營馬信則我叛將也右營萬里中營甘輝唯馬信統水軍於江餘皆連營西注鄭成功當我神策門張文達結屯在近次為翁又次為萬而甘輝最西當我金川門它小營數十星羅攢布自余自新被獲固已人人惴恐矣公之分地而出也以五鼓開神策門李廷棟周垣王龍徐登第朱鴻祚郝進孝皆從又益以副將吳淞袁誠九江薑騰蛟參將金山張國俊誠故公戲下前所云先至江寧者也已進軍而滿洲大兵之出金川門者以檄至誠與國俊隨奉調往公乃率七將之兵循山後抄出已登山公回顧賊船之檥江津者岸上列有營落軍人或起或卧呼周垣指示之日此皆其老弱柁工楫土居半吾擊之必走走而束苣以燒其船此斷賊後距也汝山相埒賊舟初連栟閭大紲繫矴江津火至抽刀斷纜欲走惶急間奔還之卒遊涌攀號乘船屋者用戈矛撞擊不受我提督管公又從而躡之辟易滿洲大軍畢會數十萬之賊席卷雲散矣公捷書先賀平賊幸以三千人破賊十萬此皆皇上威靈滿漢大臣指授非臣愚怯之所能及末乃詩進軍曲折極言諸將勤勞其略曰臣本不武謬叨顯授得展銖兩之報不足酬恩唯是將士之從臣者登鋒履刃出萬死以立微效臣敢不為皇上陳之乎二十三日儀鳯門之戰南出冒圍乘屋檁憑高射賊者中軍遊擊李廷棟守備常春以下則劉大受張撫民張國傑張廣土提標遊擊徐登第以下則馬之驤王永禎劉定法姚順孫世堯也循南岸瀕河向北殺賊者後營遊擊周垣以下則高士英張光先閔溪陳舉趙通國武文煌也中路陷堅身先躍入木城者奇營遊擊王龍為首功餘將乘之入則楊懋經談忠任九玉楊起龍劉虎陳子龍董得伏謝有成方震乾梅占魁王顯明王加貴也别路主擊賊船以分其勢者戎旗遊擊未鴻祚郝進孝以下則戴存張奇馬崇德梁忠劉孟忠劉世虎張明路良輔劉應魁牛得水王義鄧雲王世望王應登也二十四日神策門之戰以臣意分軍從李廷棟王龍於觀音門殺賊者有王大成楊世昌劉福周垣登山復下抄斷賊船所與偕方震乾為隨征守備而李英王虎王明觀曹良郝虎路良輔張自龍牛得水又震乾所將高士英張光先任九玉趙通國則後營之將以垣故畢從臣領屬朱鴻祚郝進孝徐登第等以大戰當賊徑處有功將吏尤多自中軍守備常春楊懋經以下有劉大受張撫民閔溪談忠張國傑張廣土陳舉劉虎等而隨征官梁鼎李尚文陳嘉福梁忠鄧雲武文煌戴存單岐山張奇馬崇德談全王明魁張明張雄潘淸劉世虎劉應魁王加貴王義沈燧李光榮劉一才童光代黨鼎昌梁虎劉應第張繼禎耿如掄梁彪等皆以材官搏鬭效力前行滿漢大臣立軍門以驗所獲李廷棟身得偽總兵張祿王永禎身得偽中軍提督甘輝王龍身得偽總兵郭良玉謹分條以上功簿世祖省章大悅以公連戰獨克宣捷書以告遠近於時江上諸城皆以盡為國守公以二十六日追賊至金山而劉國玉早從中丞蔣公收復京江矣噫嘻賊本沮洳么麼之人萬分何慮然苟將牢不擊屈強江湖之間以詿誤吏民譬諸爝火濫延疽癕內食浸淫未有攸底朝廷不得已而至於用兵則我東南之民勞費巨億肝腦塗地者又不知其幾何矣然則今日江湖生齒煙火晏然誰之賜也公之德豈不大哉公之在京口也念崇明城守庳薄賊雖新敗其退而過海上也將必致疾於我謀諸蔣公以往救日吾將士與馬半留會城惟劉國玉恨不與江寧之戰思自奮而王龍徑捷即奔命不為疲乃召二將拊背而遣之曰汝與福山遊擊陳國隆先行我即趣餘兵踵發八月之七日龍國玉渡海甫入其城所將卒及國隆未及濟而賊舟大至登岸柵木為城由天妃宮石家灣達於城闉寨以十數我城中諸門設守三鼓賊於西北陬下土囤挨牌列紅衣炮而舉火轟聲震裂不休明日日中西城傾圯百十步賊擁梯衝過塹將登劉國玉同光英拔戟與爭炮碎其城堞弗為動王龍同心扞備賊之攀堞上者皆為白棓所擊國玉手所格殺尤多久之引卻光英國玉亟乘其疲率裨校王宗出戰殺偽將五人兵千人大奪軍資火炮邑令陳愼收民扉築土以補壞處城守復完十二日諸將共出天妃宮燒屯斫賊賊乃過河焚橋拒我不敢復至城下矣公既遣二將而懼弗及已則乘遽而馳以初八日至於海口登敵臺以望氛聞攻圍之聲心營往救苦從兵少而無船公收得民舟八十艘就見將張登揚高士英楊𢡟經劉應第而激厲之日如不以少擊衆吾江寧何以破賊是日中丞蔣公亦至乃以十三日於七丫出海白茆港有賊伏艦百餘見之來邀沙葦中斜出如箭我長年捩柁向賊中流呼日鬭來公與蔣公聞相持而近知其遇賊別部且戰且前已而我師舉炮碎其四舟殺五百人追奔三十餘里日已晡遂不及達於邑岸崇明早巳瞭帆影聽炮聲守者乘堙歡呌施翹河之賊相顧錯愕日救至矣亟拔帆起行守者出奮挺要遮鈎止其走舸盡奪所棄木寨鄭成功方踞牀在岸歸衆擁之入舟僅得脫大為追師之所詬本圖刷耻而又甚之蓋江寧之戰膽落氣􅳝固料其不能持久然非公預添防將權遣救軍則何以倉黃呼吸之頃變瑕成堅用聲為實如是其神歟初賊之敗也切齒歸怨毒於公謂此邑諸將之所并帑率奔徒致死以期必舉巳而再挫垂翅思歸遂絶意於內向知者謂崇明墨守永奠江惟不徒在於一城也公再疏奏聞先帝以公功兼纍勝守更萬全寬朕南顧之憂掌我東門之管特下璽書勞公并將士之與干掫者奬勵備至尋以制府定勳招司馬按國典天子再有加命授公三等阿達咍咍番世職進左都督太子太保賜公錽金盈甲一副蠎面貂裘及貂帽貂短挂各一并擦面靴襪錽金玲瓏寶刀其鞓帶所佩紛礪之物皆具上廄馬一匹鞍鞦轡皆用錽金玪瓏鞬服插弓矢者亦如之它若副將以下進勇爵班袍帽克敵者上等扞圉者次等所以為賞賜不資無何公擢江南提督綏懷簡束大得軍民之和又踰年今皇帝即位念公功大賞薄加投三等阿思哈哈番襲替八次特諭公統轄全省重其事權公拜受敕書於庭建幢棨列笳吹大陳尚方服物以彰君寵軍吏杖刀立直靺鞈而前趨者萬人公慨然顧其賓客日吾山西一裨校耳蒙恩以至於此當江寧轉戰時身膏原野勿惜豈知綰上將之綬金貂文駟馳驅於九峰三泖間哉惟翼翼小心敬恭弗替庶效涓埃以無隕越願與諸將同之也偉業厯覽史傳因成敗以審用兵竊見為將之道山川險易異宜風俗剛柔異習西北則主乎堅悍東南則利在剽輕故廉頗謂趙人吾思復用曹公欺猘子難與爭鋒蓋人材地勢之不同使之然也求其短長迭施奇正錯互者詎有幾人乎今公山西之功專於攻江南之功專於戰為裨挍名出大將之右為大將身在士卒之先用革與用木而俱長將騎與將步而兩善斯所謂智勇有餘而略不世出者也誠編之典册表以丹靑匪僅無愧乎昔人抑且有光于前烈請得比而論之當其渡桑乾下勾注揚武乎靑陂白道之間張耳之禽夏説絳侯之斬陳豨也定西河平上黨耀兵雀鼠之谷振旅天井之關武安君之走馮亭淮陰侯之襲魏豹也大航教至東府城開白石錢其空屯赭圻掃其餘燼陶士行之誅蘇峻李藥師之破輔公祏也龍江戰氣鴉浦軍聲窮寇逞五火之攻孤城保三沙之固楊越國之追高智慧王少保之取邵靑也偉業嘗簪筆侍世祖於西苑仰窺睿算得御將之道善任知人寬銜策以求干城厚寵祿以收心膂其論賞也不以親近而或溢其率不以踈遠而稍絀其科用允孚於折衝無大無小罔不用命若夫受脹專征之臣能以肺腑勳賢同心一力計功之日得皇甫不伐之風全宣子皆讓之美傳曰師克在和以公事徵之尤信夫王師江漢之滸召虎也詩人本諸宣王元和淮蔡之平李訴也史臣歸之裴相鋪陳主德推揚股肱此載筆之責而居功者之心也偉業承公之命敢備著其事俟他日上請以藏諸故府昭示於無極康熙四年月日縣官吳偉業紀梅村家藏藳卷弟二十五終

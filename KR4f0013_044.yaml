  text: 梅村家藏藳卷弟四十四文集二十二
  hash: sha256:9f2d179017854e7a9163c7139abf7914c202c0fd613075ecc1664b34df1def2c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_044-1a}
body:
  text: 墓志銘三贈奉直大夫戶部福建淸吏司員外郎仲常費公墓志銘今上在宥之十四年以郊祀大典推恩臣下寵及其世生封沒贈具如詔書於是溧陽費仲常先生以其子古心公貴得贈奉直大夫戶部福建清吏司員外郎配史氏贈宜人先是學使者以溧陽士民之請既爼豆公於學宮而璽書之下也古心榷關吳會得以便道過家上冡而獨恨公之不及見乃最公生平之行迹涕泣來諗曰先大夫為諸生祭酒三十年齎志以沒不孝孤服膺遺訓以濫邀今日之寵而隧間之石未有刻辭若吾子卑之一言則以彰君賜而揚先德先大夫其不湮鬱於九原也偉業既拜而敬諾乃即古心所為事述序而銘之序曰溧陽費氏故江右鉛山徙也以宋參知政事諱士寅為始祖參政在開禧中同知國用使以言利不便忤韓托胄落職從鉛山徙溧陽之春雨橋五傳而為元國子助教諱子潤助教之子為明太醫院判諱仲淵仲淵之後纍世皆以醫顯其後有育齋公諱某心育公諱某父子擅其術稱專門名家心育公即公父也公生而穎異心育公奇之慨然曰活千人者必有封吾祖宗為此業以救世者二百年矣其當在此子乎乃盡屏青囊方技之書呼公而屬之曰此不足學子當識其大者有吾家參政故實在公乃感激刻勵經史百家之言無不畢覽溧陽故山城風俗朴厚其人修士君子之節而公從其賢者遊立然諾砥名行寡忤而少可務為嶄然特立以不詭隨於世居家內行淳備持喪哀毁創立祠堂勤修時祭事寡嫂以禮勸宗人以學與人交責備行誼磨切強直有古人之風屢試於有司收其最等羔雁日盈其門邑子弟經其指授者皆通經服古見者知之輒曰此費氏學也嘗拾遺金於逆旅守而不去待其人還之邑令試諸生傳呼稍倨擲其卷去同事皆隨之出主者為謝過焉里中兒獻計設逆璫祠面呵斥之且貽書數其罪有怵以禍患勿為動其守正不撓如此生平與同里宋如園先生以功名相期許方天下多事如園以孝廉參軍謀油幢笳鼓出入於巖關絶塞得以專制四道為名臣公則屈首一經屢踏省門不利乃至太丘之講授不及伯休之賣藥以此恆邑邑不樂如園之子其武才而能文公見之喟然太息日吾老矣不能偕如園從事馬蹄間他日其武貴吾兒其聯轡起乎已而言皆驗嗚呼其可感也已公諱良佐字忠卿別字仲常生於某年某月卒於某年某月史宜人為其邑巨姓閫德中外所稱生於某年某月卒於某年某月合葬在溧陽城外之某阡子二長逵終於邑庠生次達即古心也舉順治壬辰進士女二孫四人鉉鑑釗皆逵出而達所出則鈺也鑑與鈺皆庠生吳偉業曰楚黃州杜退思雅負知人鑒常司訓溧陽為余言費仲常名行不置也宋如園從塞上納節歸相遇於金陵屈指海內人物笑謂余日君未覩其不鳴不躍者耳吾友費仲常真有用士也余雖未獲親炙仲常而遊宋氏父子間不知其人視其友徴於宋氏則可以知費氏矣嗟乎參政不肯以言利進閲數百載而子孫始復為司農郎語曰不為良相則為良醫費氏之所積既已深矣公之績學砥行不能得之身而得之子豈偶然哉是宜銘銘曰山則三山江九派盤岡支水投金瀨處士高墳見者拜石闕巋然昭帝賚松柏丸丸勿翦敗龜云襲吉筮無害子孫繩繩綏未艾贈內翰林國史院檢討鄧公墓志銘夀春城南二十里地曰東陡澗有林木鬱然者是為贈文林郎國史院檢討鄧公之墓夀春故四戰地在明季分淮南北於通侯為四大鎮而夀春以控帶楚豫宿重兵將不戢士鈔掠隳突發邱隴焚廬舍猋火屬天枯胔蔽地而府君之叢宮近焉孤子旭守而號哭身推喪車及諸河幾不克濟乃得所謂東陡澗者夜穿竁穴畫伏原野若有物相之者而墳立嗚呼此公羊傳所云渴葬也渴葬奈何以亂故不及時不備禮將以俟乎大葬大葬者遷也其因乎東陡澗則奈何曰天之相之也以不及時不備禮危不克葬之日而早卑之以吉壤其遷也足迹遍乎千餘里之郊而卜惟夀春為食祗就形家者言相陰陽正方位以戊戌正月九日改玄房而下繂焉君子有善乎其卒事故謹而日之也鄧氏蓋高密侯苗裔宋建炎中有右正言諱肅者渡江入吳歸隱於洞庭其後道常公在明初以富民徙實鳳陽之臨淮道常公三世曰濠湄公諱璁濠湄之子曰景陽公諱洲再從臨淮徙夀州即公父也公諱讓字汝謙別字咄泉為景陽公次子孝友篤誠不苟訾笑事長惟謹接物惟和雖遇童孺勿簡勿倨柔而不犯儉而中節規言矩行尺寸無爽當景陽公見背年甫十有八兄敬前母出也公獨身搘拄腆洗以時事母張孺人克盡其養娶於沈早殁繼配蔡孺人朝虀暮鹽黽勉佽助公少負才好學家貧母病經營醫藥母亡廢書流涕乃棄去轉轂梁楚間精強有心計蔡孺人機杼操作以克相於成稍贏則以修橋梁甓道路散施故舊親黨婚乎於我成喪乎於我殯惸獨乎於我養焉性好潔築室八公山下種蒔花藥絶去塵坌東阡西陌父老相存是非質成讜言裁正雖以一布衣家居人望以大人長德邦君加禮推為鄉祭酒其未舉子也遍禱於山川夢日而生故名之日旭字以元昭厚修脯延經師以為教孺人篝燈佐讀嘗顧而歎曰爾父有志不遂鄧氏世有隱德其興在此子乎元昭今丁亥進士由翰林檢討升洮岷道副使贈公以其官者也嗚呼公與孺人之志可無負矣而豈知不及見哉公生於庚午八月十九日終於辛巳正月初六日年七十有二孺人少於公五歲乙亥六月十八日以生而其卒亦辛巳為五月之晦當張孺人病也孺人齋而籲天欲以身代公殁而又號呼躃踊相隨入地若孺人者可謂難矣元昭與余同官其從檢討乞假歸葬也山嶞水旋經營重繭余遇之南中談其兩親生平未嘗不涕下既以檄催北行不果中遭齮齕遷洮岷道以去余相送出都門慨然太息曰自夀春去秦川二千餘里而洮州又僻在大夏屆皋蘭山南一官絶塞何以為先人壞土計哉今得請而歸歸而克蕆葬事以余之習其先行也故用御史劉公之狀來謁銘余嘗讀東漢樊重傳善農稼好貨殖賑贍宗族恩加鄉閭身沒之日削劵棄責者以百萬其後一宗五侯貴盛無與為比心嘗善之比志公墓知公之好施而喟然於仁人之必有後也元昭在館閣中師資氣誼在生死流離之間營護其妻子不以存沒易心不以鉤黨避禍天下聞而壯之接援同志問遺故人急難周旋窮愁慰薦先人後已終始勿移嗟乎友道衰矣求其扶義倜儻未有如元昭者也豈非府君之風類哉公止一子而元昭有六人曰焮曰燏曰煒曰煐日熺曰炳女二人鄧氏之興未艾天故卑以吉壤發祥而公與元昭其賢有以致之也法當銘銘曰謂公為隱兮處乎市謂公為俠兮近乎儒誰其與遊兮鴟夷子皮左春申之臺兮右期思之陂中封三尺兮後千百年其奚悲胡五世之返葬而不歸骨兮具區噫嘻唯魂氣無不之兮吾將以問之包山丈人而已矣南京福建道監察御史葉公瞻山偕配嚴孺人合葬墓志銘崇禎十有七年吾友南京福建道監察御史葉公瞻山於其家聞國變慟哭嘔血手足攣蹶仆地弗省少間張目語子弟平生僚友在京師者某某必死已聞數公者果殉難則又大哭自為文祭馬文忠公得半紙筆落於手閉口不復食子弟強之已食又不肯治病明年正月竟卒其子選貢生彰吉以某年月日舉公原配嚴孺人合葬於所居喜鵲斟之麗字坦而乞余以銘余與公同年進士又同官南中其知公最深然則銘之莫如余宜何敢辭按公諱樹聲字瞻山世為湖州烏程人有副一公者元末避兵從嘉善再徙長興乃定家焉副一生華三華三生暹暹生明明生蕙蕙生伯浤以還金贖婦人稱為長者有七子其季熙寰公萃即公父也公少而嚴凝不苟訾笑以獨行聞里中事同鄉丁公長孺講理學丁卯舉於鄉為黃石齋先生所知益自負清苦修立不干請郡縣辛未成進士官行人當是時烏程相柄國事以聲勢氣力熏燎天下其黨盤牙轇轕有異已者排而去之唯恐弗力公以後起孤生不趨其門數為同里所指目將申之以事會考選以公論弗能屈乃僅得南臺以去先是山東成公寶慈考極清官第一不容於朝廷授南御史而公拜命之日江右詹公月如亦為同官三君子者天下聞而稱之公至南中則成公早以疏刻大臣為所搆下獄公與詹公視事伉直自如不為動先後五年所上數十疏請講學論起廢肅軍政恤屯災活飢民平冤獄清理鳳陽倉儲汰補京營行伍條畫左兵止其南下皆經國大計厯見施行本朝內計大典在南則淸論為尤重顧官此者率骫骳不任職巽愞觀望不肯顯有所抨擊擇一二篤癃間廢者用故事塞詔書而已公獨奮筆為之所劾十數大僚皆招權顧金錢海內搖手咋舌莫得而抵牾公以一疏力抵其􅖄士論快焉人或以後患怵公笑弗應報滿入京師時秦冦糜沸將渡河天下事已大壞九卿會東朝堂舉廉幹臺臣單騎到軍前督戰辦賊廷議咸屬公公亦慨然請行會熙寰公訃至出都門與范質公倪鴻寶凌茗柯馬素修諸公流涕訣別相誓以必死素修亦同年生以殉難故諡文忠公病中預料為必死其言悉驗凡此數公即其人也公以中原板蕩南都根本重地料理兵食可為後圖中興初庶事草創公雖不在位諸大僚猶奉公成畫以此欲重用公遇病弗果未幾馬阮暴用事亂日甚公風緩竒右指顧牀頭索邸鈔見之摶胸嚼齒作勢而起似欲為朝廷吐一言者已困殆復臥病浸劇平生號知人前此馬阮俱已罪謫僑居南中阮為人多端造請公卿無虛日公罵之弗與通常從余宿祖堂山中夜半蹶然起歎曰此人不死必亂天下其通識早見若此公長余十餘年而詹公與余同歲三人共談國事詹公少年沾沾自喜坐起跳躍抵掌極論公正容端膝引大體多持重吾兩人退而心服以長兄禮事之今公以哭君病死詹公厄於兵亦死其不死者如余則亦窮愁顚頓頭鬚種種白矣顧今猶得以後死志公俯仰今昔所為長歎而啜泣者也公性至孝熙寰公為諸生不遇以公貴封行人司行人祿養十餘年金孺人早世贈太孺人公每念未常不涕泣公原配嚴孺人能相夫以廉潔公常斥千金贖鍰犒鳯陽陵軍管錢厰不名一錢孺人無幾微見顔色以織絍佐家政中外井井人稱其賢公生丙戌二月初八日卒於乙酉正月十三日孺人生於辛卯十一月初二日卒於乙酉七月初一日子二長彰吉也次申錫早夭孫男四人孫女二人語曰活千人者必有封又曰廉吏有後公以歲大青為粥施南中飢者所全活萬計人有持數千金求中怨家以危法公具朝服拜天焚其所誣叱使去公之殁也家無餘資長公能讀父書恂恂循禮讓君子以此信之天也乃為之銘銘曰公之哭友乃以哭君六七君子翱翔上征公返其宅後至踵迹常山廬陵英風毅魄公於斯時魂氣何之昔從汝友今從汝師乘彼霓車導以雲旗詄蕩天門法宮玉墀嗚呼我公其當知所以歸內閣中書舍人經筵正字官衡齋劉公墓志銘無錫故經筵正字官中書舍人衡齋劉公以某月日卒將以某月日葬其子雷恆率諸弟踏門請曰吾祖光祿公之葬也同里高忠憲公實錫之銘今吾父得沒於地無愧前人銘非先生孰宜為之余遜謝不敢雷恆請至再排纂公族出行治以告曰吾劉中山夢得所自出也元季有諱理者始遷常州為常州人而石泉翁宗海定居無錫石泉翁兩世為完孺公升壬午舉人授績溪教諭其贈光祿寺少卿則以子本孺公貴本孺公諱元珍乙未進士以南職方爭萬曆乙巳察典紏刑給事外轉錢夢皋緣阿附四明相中旨得留非國體當是時忤上意幾豫杖不測歸而與顧端文高忠憲兩先生講學天啓初即家起光祿少卿卒於京師有四子吾父其仲子也吾父於二十一舉乙卯賢書出曹石倉先生門凡七上不利考授知縣遇定永二王出閣詔舉孝廉有學行者充經筵官特恩改中書舍人補翰林正字甲申二月逆冦勢且逼拜疏請東宮二王南遷上常手其奏召對閣部大臣廷論不能決上怒曰小臣尚有為國者卿等碌碌首鼠云何小臣指吾父也城陷將死之有以母在為勸者乃止賊縛去搒掠幾斃得間南歸見吾祖母投身大慟遂以病病浸革執祖母手曰兒不獲終事吾母矣願勿為兒戚戚重兒罪召雷恆輩告之日爾其善事祖母謹守遺訓無墜先光祿門戶此吾志也簡付書籍自為終制戒家人以勿哭君子以為能篤終焉吾父平生友愛兄弟周恤鄉黨非公事不入公府其他細行不能殫述蓋雷恆之言如此於戲自三王同時出講東林之君子引大體爭之小人則以其計為搖動如四明相及夢皋輩其尤者也乙巳察典相㴶以中旨留用原其故乃為妖書一案護持權黨欲危東宮光祿一疏詎非有功國本哉先皇帝以十年太子行冠禮其明年講學又三年二王出閣等殺有禮可無前日之懼矣當太子出講也偉業備員講讀自三四詞臣外見正字一官職親地近故事用閣中書而閣中書皆入資為郎揣摩要結能得閣臣意旨慢職掌傲儕列不能舉其官識者憂焉及從田間聞朝廷推擇科目以重其選如公則又東林子孫有意於國本而保持之者蓋當時大臣為藩邸長久計無復交搆之虞也已公南遷一疏以留中故其事不大著又京師自二月後邸鈔斷絶其國變紀略諸書皆矯誣錯誤即南遷一事召對諸語言人人殊公小臣孤忠無所考信故備述其子孫之語俾後之人搜野史而徴家乘有所參互焉公諱明翰字羽戢號清溪晚更以衡齋自稱生於萬曆乙未四月二十八日去其卒年五十有三所著尚論編勾吳名賢録行於世其詩古文諸集藏於家元配孫孺人子五長即雷恆也次霖恆靄恆璥恆皆諸生女二孫男五人孫女一人雷恆娶於張外父為大司農靜涵先生先生悟臨濟宗旨與公深相得公家世講學稟承道脈即末命數言無不出於書院語録臨逝口占有日心似菩提皈大乘身留故國作山河若於釋氏有參解者蓋公之學蚤年受之端文忠憲晚乃合於靜㴠也偃蹇一第屈志就官遭值主知旋逢國難南還見母孝養不終公之銷歸寄托其志雖不衰而其遇良足悲也若公者可以見光祿公於地下矣為之銘曰忠也而不行其言孝也而不有其年其蚤達也乃詘於一第家學也又輔以兩賢豈其道之難用學之能專而坎坷不遇乃厯試於貞堅吾將以問之於天封中書舍人石公乾籙墓志銘今國家以漕事為重其以道臣轉運上京師者即有父母之訃不得見星而行於是江南糧儲道參議關中石公雲門奉其父封中書乾籙公之諱祖括髮徒跣以請例格不允則墨縗從事既而得代以行涕泣以告偉業日在閶淹息一官幸告無罪以哭先府君於苫次則皆主上之賜也唯是先府君抱德弗顯施及後人以幸邀一日之寵命今者至於大故其得能言之君子銘月日而鑱諸幽庶幾表君恩以圖不朽其用此纍吾子矣偉業遜謝不敢退而思待罪史職內外制詞於中書均有代言之任為同官石氏為父請封副在史館與聞其略今納竁之石其何敢辭乃受參議公所自為狀序而銘焉序曰公諱孕玉字乾籙陜西西安府富平縣人高祖諱朝用繇力田起家朝用生文文生四子長曰炯字雙溪輸粟賑飢賜冠帶次曰煥煥生太學公塝而出後於炯即公父也太學公嘗讀書華山絶頂深造有得公習家學負才名數踏省門不收年七十猶能作細書講貫不輟拜中書命日無喜色恨其身不遇無以上報太學公也太學公性至孝事雙溪公克盡其養雙溪後舉二子既析箸異居數以敖蕩破其資性多齟齬遇從子尤無恩公父子盡心收即割所有以奉遭急難力為之解亡則經紀其喪焉與人交恂恂退讓訓諸子必以嚴言動皆有成法就養營平也數以潔已愛民為教誠有庶母弟三人天性篤志病巳革幼弟從宦在南拊牀太息顧其次子曰汝兄為官吾之不得見分也顧安得汝叔至一訣乎嗚呼若我公者可謂孝友篤誠之君子矣余嘗讀禹貢及詩知成周漆沮之水為天下饒又鄭國開秦渠漢中大夫白公復穿之民食其利今石氏世居富平頻山之陽即其地也水經注曰沮水厯土門以東注鄭渠頻陽即後魏土門廢縣其田膏腴灌溉畝收一鍾漢唐雖轉漕河渭而秦人務稼穡土之所入衣食京師不專取足於江淮故天下不困如石氏之先讀書躬耕以力田發迹猶有當時之遺風也近代漕挽全仰東南而京畿水利廢置不講參議初備兵營平也嘗欲復商人墾邊之制大興屯田其法以河北視關中以路沽灤涿諸水視涇渭舉其高曾以來農商畜牧行之於家而效者進施之於國足燕薊之粟以漸紓東南策未及就適有漕儲之命爬梳利弊亦既見諸行事矣誠能久於其任將使屯種可興漕挽勞費得以漸省而會值公之喪以去偉業吳人也其能無太息矣乎雖然兵與漕並重也父母之喪金革變禮而君之待臣有三年不呼門之義聖主録勞閔孝不以王事奪私恩參議釋重任越重關歸而發喪持服偉業嘗以鉛槧侍左右纂輯孝經仰見皇上明倫敷教俯恤羣情以孝治天下之大道故今日志公之墓表而出之用告萬世不專稱𫐠公一家已也公原配李氏繼王氏皆封孺人四子長在閶參議公也李孺人出次在扆邑諸生次在序又次虎娃出為叔父後俱王孺人出女四人孫三人曾孫三人公生於癸未卒於戊戌年七十有六李孺人早殁以某年月日合葬於其縣之某原禮也為之銘曰頻之山其松丸丸隴回谷盤我公戾止終吉且安頻之水其流瀰瀰潤及千里我公歸來式衎且喜相彼頻陽寶鼎所藏黼黻雕戈紀於太常我作銘詩百世勿忘其斯為萬石之阡而長在五陵之傍者歟梅村家藏藳卷弟四十四終

front:
  text: 梅村家藏藁卷弟十五詩後集七
  hash: sha256:dc2ec61c480c4b4f76677e43430956c5c0a47a4abde8d6c1dd4884f853e7ca1d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_015-1a}
body:
  text: 七言律詩六十四首江樓别幼弟孚令野色滄江思不竆登臨傑閣倚虛空雲山兩岸傷心裏雨雪孤城淚眼中病後生涯同落木亂來身計逐飄蓬天涯兄弟分攜苦明日扁舟聽曉風揚州四首疊鼓鳴笳發棹謳㮄人高唱廣陵秋官河楊柳誰新種御苑鶯花豈舊游十載西風空白骨廿橋明月自朱樓南朝枉作迎鑾鎭難博雷塘土一丘其二野哭江邨百感生鬭雞㙜憶漢家營將軍甲第櫜弓臥丞相中原拜表行白面談邊多入幕赤眉求印却翻城當時只有黃公覆西上偏隨阮步兵其三盡領通侯位上卿三分淮蔡各專征東來處仲無它志北去深源有盛名江左衣冠先解體京西豪傑竟投兵只今八月觀濤處浪打新塘戰鼓聲其四撥盡琵琶馬上絃玉鈎斜畔泣嬋娟紫駞人去瓊花院靑塚魂歸錦纜船荳􅞦梢頭春十二茱萸灣口路三千隋堤璧月珠簾夢小杜曾游記昔年過維揚弔衞少司馬紫岫衛韓城人與余同年同官後以少司馬死揚州難畫省連牀止論文天涯書劍忽離羣非關衞瓘需開府欲下高昻在護軍高杰秦人朝議以紫岫同鄉拜兵部侍郎典其軍事葬骨九原江上月思家百口隴頭雲故人摇落䢴溝暮爲酹椒漿一慟君過淮陰有感二首落木淮南雁影高孤城殘日亂蓬蒿天邊故舊愁聞笛市上兒童笑帶刀世事眞成反招隱吾徒何處續離騷昔人一飯猶思報廿載恩深感二毛其二登高悵望八公山琪樹丹崖未可攀莫想陰符遇黃石好將鴻寶駐朱顔浮生所欠止一死塵世無繇識九還我本淮王舊雞犬不隨仙去落人間贈淮撫沈公淸遠秋風杖節賜金貂高會嚴更響麗譙去國丁年遼海月還家甲第浙江潮書生禮樂修玄雁諸將弓刀掣皂鵰最是東南資轉餉功成蕭相未央朝淮上贈嵇叔子湖海相逢一俊英風流中散舊家聲琴因調古須防怨詩爲才多莫近名濁酒如淮歌慷慨蒼髯似㦸論縱橫慚余亦與山公札抱病推遷累養生過宿遷極樂庵明日晤陸紫霞年兄詁舊有感同時知已曲江游縱酒高歌玉腕騮黃葉渾隨諸子散白頭猶幸故人留雲堂下榻逢僧飯雪夜聽鐘待客舟如此衝寒綠底事相逢無計訴離愁白鹿湖陸墩詩在宿遷縣東爲紫霞年兄避兵處招提東望柳堤深雁浦魚莊買棹尋墩似謝公堪賭墅湖如賀監早抽簪雲遮老屋容君臥月落空潭照此心百頃荷花千尺水夜涼兄弟好披襟自信自信平生懶是眞底須辛苦踏春塵每逢墟落愁戎馬卻聽風濤話鬼神濁酒一杯今夜醉好花明日故園春長安冠蓋知多少頭白江湖放散人新河夜泊百尺荒岡十里津夜寒微雨溼荆榛非關城郭炊煙少自是河山戰鼓頻倦客似歸因望樹遠天如夢不逢人扁舟蕭瑟知無計獨倚篷牕暗愴神將至京師寄當事諸老四首柴門秋色草蕭蕭幕府驚傳折簡招敢向煙霞堅笑傲却貪畊鑿久逍遥楊彪病後稱遺老周黨歸來話聖朝自是壐書修盛舉此身只合伴漁樵其二莫嗟野老倦沉淪領略靑山未是貧一自弓旌來退谷苦將行李累衰親田因買馬頻書劵屋爲牽船少結鄰今日巢由車下拜淒涼詩卷乞閒身其三匹馬天街對落暉蕭條白髪悵誰依北門待詔賓朋盛東觀趨朝故舊稀雪滿關河書未到月斜宮闕雁還飛赤松本是留侯志早放商山四老歸其四平生蹤跡儘繇天世事浮名總棄捐不召豈能逃聖代無官敢卽傲高眠匹夫志在何難奪君相恩深白見憐記送鐡崖詩句好白衣宣至白衣還讀楊文驄舊題走馬詩于郵壁漫次其韻二首數卷殘編兩石弓書生摇筆壯懷空南朝子弟誇諸將北固軍營畏阿童江上化龍圖割據國中指鹿詫成功可憐曹覇丹靑手銜䇿無人付朔風其二君是黃驄最少年驊騮凋喪使人憐當時只望勳名貴後日誰知書畫傳十載鹽車悲道路一朝天馬蹴風煙軍書已報韓擒虎夜半新林早著鞭過鄚州馬滑霜蹄路又長鴉鳴殘雪古城荒河氷雨入車難過野岸沙崩樹半僵邢邵文章埋斷碣公孫樓櫓付斜陽只留村酒雞豚社香火年年賽藥王恭紀聖駕幸南海子遇雪大獵君王羽獵近長安龍雀刀環七寳鞍立馬山川千騎擁賜錢父老萬人看賑飢霜林白鹿開金彈春酒黃羊進玉盤不向囘中逢大雪無因知道外邊寒聞撤織造志喜春日柔桑士女歌東南杼軸待如何千金織綺花成市萬歳廻文月滿梭恩詔只今憐赤子貢船從此罷黃河尙方玉帛年來盛早見西川濯錦多上駐蹕南苑閲武行蒐禮召廷臣㳟視賜宴行宮賦五七言絶句毎體一首應制露臺吹角九天聞射獵黃山散馬羣練甲曉懸干鏡日翠旗晴轉一鞭雲奇鷹出架雕弓動新兔登盤玉饌分最是小臣慚獻賦屬車叨奉羽林軍送無錫堵伊令之官厯城攬轡朱輪起壯圖遺民喜得管夷吾城荒户少三男子名重人看五大夫畫就煙雲連泰岱詩成書札滿江湖茶經水傳平生事第二泉如趵突無元夕諸王花萼奉宸游淸路千門照夜騮長信玉杯簪戴勝昭陽銀燭擘箜篌傳柑曲裏啼鶯到爆竹光中戰馬收刦憶征南人望月金閨燈火别離愁讀鄗城魏石生懷古詩長安雪後客心孤畫省論交折簡呼家近叢㙜推意氣出開全趙見平蕪憂時危論書千卷懷古高歌酒百壺自是漢廷眞諫議蕭王陌上賦東都送永城吳令之任春風驛樹早聞鶯馬過梁園候吏迎山縣尹來三月雨人家兵後十年耕鴉啼粉堞河依岸草没旗亭路入城曾見官軍收賊壘時淸今已重儒生送安慶朱司李之任到官春水畫橈輕天柱峰高卽郡城百里殘黎半商賈十年同㮄盡公鄉雞豚塢壁山中稅鼓角帆檣江上兵亂後莫言無吏治此方朱邑最知名送胡彦遠南還河渚匹馬春風返故林松杉書屋晝陰陰猿愁客倦晨投果鶴喜人歸夜聽琴我有田廬難共隱君今朋友獨何心還家早便更名姓只恐靑山尙未深江土鐡馬新林戰鼓休十年軍府笑諮謀但虞荘蹻爭南郡不信孫恩到蔡州江過濡須誰築壘潮通滬瀆在今上海總安流蘆花一夜西風起兩點金焦萬里愁送願舊來典試東粤客路梅花嶺外飄江山才調屬車招石成文字兵須定珠出風雷瘴自消使者干旌開五管諸生禮樂化三苗憑君寄語征南將誰勒炎天銅柱標送李書雲蔡閬培典試西川柳陌征衫錦帶鈎詔書西去馬卿游棧縈秦嶺千盤細水落巴江萬里流兵火才人覊旅合山川奇字亂離搜莫愁沃野猶難問取得揚雄勝益州送山東耿中丞靑藜三經持節領諸侯好畤家風指顧收岱頂磨崖看出日海邊吹角對淸秋幕中壯士爭超距稷下髙賢共唱酧北道主人東郡守丹靑剖策本營丘送友人之淮安管餉高牙鼓角雁飛天估舶千帆落照懸使者自徴滄海粟將軍輒費水衡錢中原河患魚龍窟江左官租稉稻年聞道故鄉烽火急淮南幾日下樓船送隴右道吴贊皇之任笳鼓千人度隴頭使君斜控紫驊騮城高赤坂魚鹽塞日落黃河鳥鼠秋移檄北庭收屬國閲兵西海取封侯請傾百斛葡萄酒玉笛關山緩帶游恭遇聖節次安丘劉相國韻興慶樓前捧玉觴金張岐薛儼分行龍生大漠雲方起河出崑崙日正長節過放燈開禁苑春將射柳幸平陽燕公上壽天顔喜親定甘泉賜宴章朝日壇次韻曉日曈曨萬象鋪六龍銜燭下平蕪石壇爟火燔玄牡露掌華漿飮渴鳥不夜城傳宣夜漏王宮朝奉竹宮符卽今東汜西崐處盡入銅壺倒景殊李退庵侍衛奉使湖南從兵間探衡山洞壑諸勝歸省還吳詩以送之一官之楚復游燕歸去還乘笠澤船戎馬千山尋洞壑鶯花三月羨神仙路穿江底聞雞犬家在湖中接水天侍御吾吳洞庭人不似少陵長作客祝融峰下住年年得蒲州道嚴方公信郤寄西風對酒夢魂勞聞道蒲津著錦袍山遶塞垣長坂峻河分天地斷崖高登樓楚客看雲樹隔岸秦人拜節旄囘首舊游飛雁遠書來嚴助問枚臯送趙友沂下第南歸秋風匹馬試登臨此日能無感慨心趙氏只應完自璧燕臺今已重黃金鄉關兵火傷王粲京國才名識杜欽最是淮南遇摇落相思千里暮雲深懷王奉常煙客把君詩卷問南鴻憔悴看成六十翁老去祗應添髩雪愁來那得愈頭風田園蕪没支笻懶書畫蕭條隱几空猶喜梅花開遶屋臘醅初熟草堂中送友人從軍閩中二首客中書劍愴離羣貰酒新豐一送君絕嶠烽煙看草檄高齋風雨記論文中宵淸角猿啼月百道飛泉馬入雲詔諭諸侯同伐越可知勞苦有終軍其二平生不識李輕車被詔揮鞭白鼻騧簫鼓濟江催落木旌旗衝雪冷梅花胡牀對客招虞寄羽扇麾軍逐呂嘉自是風流新制府王孫何事苦思家紀事鄠杜山南起直廬從禽載筆有相如秋風講武臨熊館乙夜横經勝石渠七萃車徒堪討習百家圖史可佃漁上林獸簿何曾問叩馬無煩諫獵書送汪均萬南歸扁舟春草五湖寛歸去酴醿架未殘撥刺錦鱗初上筯團枝珠實已堆盤癭瓢量水僧燒筍拳石分泥客貿蘭四月山塘風景好知君端不憶長安壽座師李太虛先生四首放懷天地總浮鷗客裏風光爛熳收一斗濁醪還太白二分明月屬揚州錦箏士女觴飛夜鐡笛關山劍舞秋猶有壯心消未得欲從何處訪丹丘其二好客從無二頃田勝游隨地記平泉解衣白日消碁局岸幘靑山入釣船故國風塵驚晩嵗天涯歌舞惜流年篋中別有龍沙記不許傍人喚謫仙其三讀易看山愛息機閉門芳草雁還飛江湖有夢爭南幸滄海無家記北歸煙木一竿思舊隱兵戈十口岀重圍杜陵豈少安危志老大飄零感布衣其四廬頂談經破碧苔十年不到首重囘風淸鐘鼓吳山出雲黑帆檣楚雨來痛飲長江看自注異書絶壁訪應開芒鞋歸去身差健白鹿諸生掃講臺寄房師周芮公先生四首并序偉業以庚午受知於晉江周芮公師進謁潤州官舍維時上流無恙京口晏然吾師以陸生入雒之年弟子亦終軍棄襦之崴南徐月夜北固江聲揮塵論文登樓置酒笑譚甚適賓從皆賢已而入主銓衡地當淸切周旋禁近提挈聲華拜別河梁十有八載滄桑兵火萬事都非偉業負耒躬畊誓終没齒不謂推遷塵事潦倒浮生病苦窮愁羈縻煎迫師以同徵獨得不至方推周黨共羨管甯而家居窮海身受重圍羽檄時聞音塵莫及雖然江南近信已泊樓船京峴舊游皆非樂土何必無諸㙜上始接烽煙歐冶城邊纔開壁壘也旣知援師南下山郡依然鄭樵居第可保圖書楊僕軍營惟聞笳吹欣故人之杖履致遠道之郵筒爰作短章聊存微尙抒平生於慷慨寫盡日之覊愁庶幾同經喪亂識此襟情雖隔山川無殊會面云爾惆倀平生負所知尺書難到雁來遲桄榔月暗嚴城閉鶗鴂風高畫角悲湖裏逢仙占昔夢洞中遇叟看殘碁脫身衰白干戈際筍屐尋山話後期其二北府風流坐嘯淸蕭郎白帢愛將迎蒜山望斷江干月荔浦愁看海上城劉寄關河雖險塞盧循樓艦正縱横莫嫌戰鼓鄉園急瓜步年來已用兵其三但若盤桓便見收詔書趨迫敢淹留始知處士靑門里須傍仙人白石樓晉室衣冠依嶺嶠越王刀劍閉林丘少微卻照南天遠榕樹峰高隱故侯其四白鶴靑猿呌晩風苦將身世訴飄蓬千灘水惡盤渦險九曲雲迷絕磴空廣武登臨狂阮籍承明寂寞老揚雄巨源舊日穪知已誤玷名賢啟事中卽事十首交城朝日漸臺風玉樹靑蔥起桂宮時乾清宮成謁者北衙新掌節初設内監郎官西府舊乘驄新選部郎爲巡方叔孫禮在終應復蕭相功成固不同百戰可憐諸將帥幾人高會未央中其二六龍初幸晾鷹臺千騎從官悵殿開南苑車聲穿碧柳西山馳道夾靑槐繙書夜半移燈召教射樓頭走馬來聞道上林親試士卽今誰是長卿才其三元僚白髪領槐㕔風度須看似九齡疏乞江湖陳老病詔傳容貌寫丹靑曹村相公乞休不允畫其像賜之從游西苑花初放侍宴南臺酒半醒最是御書房下過賜茶清燕共談經其四列卿嚴譴赴三韓貰酒悲歌行路難妻子幾隨關外去都人爭擁路旁看樂浪有吏崔亭伯遼海無家管幼安盡說日南多瘴癘如君絕域是流官其五黄河東注出潼關本濟漕渠竟北還淮水獨流空到海淮水爲黄河所逼始于淸日濟漕河去則淮竟入海此淸江閘所以涸也汴堤横嚙不逢山天心豈爲投圭璧民力何堪棄草菅瓠子未成淇竹盡龍門遠掛白雲間金龍口決用柳梢作土牛塞河功竟不就悼兩河民力之盡也其六西山盗賊尙縱橫臼畫畿南桴鼓鳴誰道盡提龍武將翻教遠過闔閭城軍需苦給嫖姚騎節制難逢僕射營斥堠但嚴三輔靖願銷兵甲罷長征其七新傳使者岀皇都十道飛車算國租故事已除將作監他年須尙執金吾主持朝論垂魚袋料理軍書下虎符始信蕭曹務休息太平良策未全無其八柳營江上羽書傳白馬三郎被酒眠無意漫提歐冶劍有心長放呂嘉船金錢北去緣求印鐵劵南來再控弦廟算只今勤遠略伏波橫海已經年其九秋盡黃陵對落暉長沙西去不能歸甘甯舊壘潮初落陶侃新營樹幾圍五嶺烽煙城郭改三湘征謂吏人稀老臣裹革平生志往事傷心尙鐡衣其十巴山千丈擘雲根節使征西入劍門蜀相軍營猶石壁漢高原廟自江村駐兵南鄭分閫閬州兩地皆有高祖廟全家故國空從難異姓眞王獨拜恩囘首十年成敗事笛聲哀怨起黃昏梅村家藏藁卷弟十五終

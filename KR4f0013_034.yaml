front:
  text: 梅村家藏藳卷弟三十四文集十二序八
  hash: sha256:5dd44a5b1bdc136720ff80104b86208e7af4511ec537a5f5d82b0adab18a2572
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_034-1a}
body:
  text: 兩郡名文序君子之為學期於明道而已不以得失為毁譽也其以得失為毁譽者莫甚於世之時文得而譽之則已加信失而毁之則已加疑毁譽變於外而疑信更乎中故下無不易之見而上無一成之格特以其才之所至適然相遭於數焉爾且名成之後又盡舉而棄之此積輕之勢也今者公卿大臣亟亟焉以正人心明教化為急務敦尚典雅簡黜浮華限以必定之章程而嚴其進取有不合格者舉而汰之猶末也州縣之循良入為侍從朝廷之耳目出典文章皆取決於制藝之工拙以為可否蓋唐宋之世召用館閣諌議等官進其平日所為文字及試以詞賦論策詔誥箋表今盡歸之於時文朝野中外一道同風興教易俗所喁喁而想望者舍是無繇也自熙寧定科舉之法以墨義帖括取士行之數百年至今日而其重固已極矣雖然昔也優遊縱弛聽之舉世之風習而醇駁名半今也束縛之整齊之可謂密矣而紕戾抵牾乃間出於法制之外則又何也豈天下之才智固不可得而齊一歟抑揣摩迎合之心盛而轇轕紛糾之見生反有以致之歟余不得而解也先王之道載在六經者百世不改士君子既誦法先王即無功名誘之於前利祿禁之於後當知夫大雅之可尚而奇邪之必黜以余所聞宋儒如呂東萊陳止齋兩先生其制舉義號為極工致政家居猶以之教其子弟彼蓋不以鎖廳一日之遇合有動其心而特就平日之文積之厚而養之完使沛然其有餘則詖淫邪遁之詞無自而入此即個日所為社刻是也王子惟夏偕同社諸子選兩郡名文問序於余余唯吾州自西銘先生以教化興起雲間夏彝仲陳卧子從而和之兩郡之文遂稱述於天下人止見其享盛名掇高第奉其文為金科玉條不知西銘之書羽翼經博固非沾沾於一第已也十餘年來吾郡之士日落至今歲環百里之內南宮之士無一人焉惟夏諸子之有此選也不專用希世決科而以修明先王講求六藝務合乎大儒之旨險棘邪僻固所弗收拘牽附會規摩迎合者尤為大道所不用此余所謂君子之學不以得失為毁譽者也其於西銘之教不為無助是為序二宋稿序余觀古之為士者雖其窮鄉僻壤之遠苟才之可用為鄉里所推擇則必之乎京師而遊太學其有兄弟朋友齊名並駕如三張二陸之流或恪中為之語或鄴下為之頌皆赫然名重於長安而中才下士朴陋無聞者不得而與焉自科舉之法行盡天下之材無不試於有司其為有司所格者無繇以自達於上雖公卿大臣鰓鰓焉以收人材明教化為急務而士亦窮經好古自力於先民之章程逎為有司所格者亦已多矣此無他太學之法未具而士不遊京師故也吾郡宋既庭疇三兩君以貢同入太學登賢書尤子展成彭子雲客定其稿而屬余序其簡端疇三與其兄右之為吾同年侍御公之子而既庭則其同宗右之先鳴而既庭與疇三為同舉故遠近之人翕然稱之日二宋也初吾與侍御同舉進士而侍御之兄以政成上考進為給事中侍御則繇禮部郎用特旨改授兄弟居兩省為諌官情塗華貫貴重於朝廷每過直騶哄滿道當世榮之宋氏之以兄弟稱者自給事侍御始也侍御之使山東也右之方數歲早慧能文侍御召之出拜而置疇三於膝上余見而竒之日此復為二宋矣無何侍御死於兵給事不得志於仕宦其後乃以文章氣誼傾東南而既庭疇三用科第知名余不自知其衰落猶頽然處諸子間俯仰二十年交於宋氏者兩世矣既庭家貧好學早負物望而天性醇謹不以行能高人其為文也深厚詳雅有度有則疇三少孤夙成器實不凡而雅志刻苦不自門第自許其為文也聰明穎拔朗悟絶倫此兩君者終當大至而吾所尤喜者以其遊京師而觀太學名動衣冠為後進之秀其登賢書也使天下知東南之多才而士之通經好古者亦有以自信不挫其志氣於以敦經術重科舉必自二宋始矣以二宋之才其所就不止於一第而吾之望於二宋者亦豈沾沾焉於所為應試之時文誠見人材之遇不遇其盛衰有闕於風俗故於是編也而及之固不專為二宋已也是為序孫孝若稿序余初以制藝起家常然自以為不足好從諸先達考求故實以增益其所聞見其之虞山也獲與孫子喬先生遊先生年已六十餘嘗為余言少時猶及見皇甫司勳王弇州兩公云蓋先生之父三川公以能詩名海內兩公親與定交先生侍函文聞緒論追敘其事歎詫為不可復得余聞語亦慨然者久之當是時先生之二子恭甫居顯官而光甫與余同舉進士先生不以為榮好舉往賢之流風軼事以相諷勉余以知先生之不可及而其澤深且長也已後十餘年恭甫之長君孝若舉進士衰所為文若干首問序於余孝若之為人也風流醖藉機神警速實顚倒於余余亦心折之甚其天才之所軼發家學之所纘承足以囊括古今貫穿經史出入古文詩歌之間制藝乃其餘事即而求之所造固已如此矣嗟乎今之為制藝者咸哆然有自大之心其中初無所得而欲以輕侮當世凌忽老成邀結黨類詆娸儕輩以余耳目所見比比而是也夫以孝若之人才之門第不欲沾沾於一日之名捨本業而追時好及其捷南官懸國門天下翕然稱之京師三公貴人無不援孝若以為重者而亟得余之一言豈文章道誼朋友之投分固有數歟抑余之蹇拙無似齟齬於世孝若因以取之歟若謂世經變亂人物凋喪雖朴陋如余者猶遺民佚老之僅存可以徵舊聞而道掌故則余且震懼不敢當而孝若固進而益請者蓋亦乃祖之風類也以是辭不獲而為之序德藻稿序吾弟德藻以今年舉於鄉去志衍與余同薦之日則已二十年矣余深喜吾宗之有人而德藻慊焉不自以為足挾其行卷是正於余余將何以為吾弟告哉無已舉平日讀書之道為吾弟言之可乎初吾與志衍少而同學於經術無所師授特厭苦俗儒之所為而輒取古人之書攟托其近似者櫽括之為時文年壯志得不規規於進取乃益騁其無涯之詞以極其意之所至初謂遲之十年析理匠心刋華就實庶底於有成不意遽為主司所收而世人遂謬許而過採之以其言為該貫夫學力深淺內自驗之吾心余兩人之於文實未有所得也自入仕以後得宿儒大人為之講論約其指要而分其條流退而視吾之文則膠葛漫衍無當於古之立言者於是慚憤竊歎盡發篋中之書而讀之將上以酬知遇而下以厭觀聽者之心比年以來稍有證入雖不敢妄謂有得而視吾始舉之歲其相去固已遠矣雖然吾之致力於應舉一二年耳至今山陬窮邑知吾名字尚以制科之時文吾為詩古文詞二十年矣而閭巷之小生以氣排之而詆吾空言為無用蓋天下之士止知制義之可貴而不思古學之當復其為日也久矣今德藻之才其雄深似志衍其雅健似余又能取法先民蚤自納於繩墨蓋兼乎兩人之長而無其病此其取一第有餘而吾獨有見於科名之易而讀書之難不敢以一日之遇為吾弟喜而進之以終身之所學且君子之為學所以扶氣類明志節弘道而教俗者也每念吾志衍奬許同人以文章志氣相砥礪賓客滿座吐屬如流圖史滿前議論鋒起單門寒畯被其容接者噓枯吹生寡聞淺識之徒旁行側視不敢出氣今吾黨日落而悠悠者相趨成風世衰俗薄非當世之賢人君子莫得而搘拄舍吾德藻更誰屬耶德藻之為人才氣宏放志度凝遠自其少時便有頴異之目與兄聖符俱有聲於藝苑而德藻先鳴此其弘奬風流長於氣誼必復如志衍時余窮且老矣浮湛俗間無復有以自振夫不能見之於身者猶庶幾見之於兄弟朋友凡吾所謂讀書之道以此而已德藻其勉乎哉王茂京稿序吾里以春秋舉者是科得二人其一則通家王子茂京也初余早歲忝太常公執友而端士從余問道以此交於王氏者最深今端士成進士十餘年又見其子貴方與太常少子藻儒同計偕而太常期頤克壯自如也蓋世家之不振者江南比比相望王氏父子兄弟獨且日顯重而余頽然衰以老矣茂京稿行端士取首簡屬余余將何以長茂京哉端士之意不在乎敘門第之盛交遊之雅謂余老於文學庶幾讀書行誼有以相黽勉也夫文有文有質質以原本經術根極理要文以發皇當世之人才是道也孰有大於春秋者乎自易之精微詩之溫厚書之渾噩禮之廣博至春秋一變為記事之書其為言也簡矣而不詳直矣而不肆可以謂之質矣然而董仲舒賈誼劉向皆以閎覽博物之才從而推演其説各自名家務折中於孔子不徒規規焉守章句而已豈春秋之質者即其所為文歟今天下之文日趨於質矣其為教總不離乎傳注吾以為宋人傳注之學其稱詞也約其取義也遠非夫篤學深思確乎有得者不足以求之乃觀今之論文者若是乎悉其才智運機軸於毫芒而六藝博洽之言先儒平實之論概而絶之弗使得入吾不知其沖虛淡漠果有得於中抑猥隨流俗為風尚也然則學者將安從亦求其不謬於聖人不悖於先正如是足矣王氏自文肅公以經術至宰相緱山先生相繼掇上第負重名其於春秋父子各有所講貫凡以推崇醇正抑退浮華風厲一世之人文而表章絶學上者施於訏謨政事之間次者見諸館閣之論著誠所謂經世大儒彬彬質有其文者哉余向從故老竊聞相公謝政里居猶以制舉藝為人論説諸生以文字贄者鑒刖其窮達十不爽一而課孫諸作盛為海內所傳誦蓋大臣心事嘉惠後學尤思以經術世其子孫王氏淵源弗替高曾規矩寤寐在前不待取諸外而足也太常好藏其先公之手迹經史鈎貫庋置如新而百年闈墨得諸兵火散佚之餘人皆以為王氏之祥其後當有興者不數年而藻儒茂京後先鵲起噫嘻詎偶然哉藻儒秀外惠中標舉俊異茂京雄駿閎達二者望而識其遠器余老矣無以長茂京盍舉舊聞於王氏者還以告之夫以茂京之才出其餘技詩歌翰墨卓絶出乎流輩他年讀書行誼定有過於所期是編也揣摩匠心卒根本乎家學其以度越當世之君子則已遠矣此余所以重茂京而序之之意也梅村家藏藳卷弟三十四終

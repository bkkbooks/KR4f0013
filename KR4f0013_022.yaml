front:
  text: 梅村家藏藁卷弟二十二詩後集十四
  hash: sha256:89179c7798627e45bd7843ef9e1d452d7fd7d3e3bd8c50cc69c989d9f2358db9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_022-1a}
body:
  text: 詩餘長調三十六首意難忘山家村塢雲遮有蒼藤老幹翠竹明沙溪堂連石穩苔徑逐籬斜文木几小窗紗是好事人家啓北扉移牀待客百樹梅花衰翁健飯堪誇把癭尊茗碗高話桑麻穿池還種柳汲水自澆瓜霜後橘雨前茶這風味清佳喜去年山田大熟爛熳生涯滿江紅題畫夀總憲龔芝麓楚尾吳頭僅斗大孤城山縣正遇著靑絲白馬西風傳箭歸去秦淮花月好召登省閣江山換更風波黨籍總尋常思量遍文史富才名擅交與盛聲華健正三公開府張燈高宴緑鬢功名杯在手靑山景物圖中見待它年㨂取碧雲峰歸來義又白門感舊松栝凌寒挂鍾阜玉龍千尺記那日永嘉南渡蔣陵蕭瑟羣帝翔翔騎白鳳江山縞素觚稜碧屣麻鞋血淚灑氷天新亭客雲霧鎖臺城戟風雨送昭丘柏把梁園宋寢燒殘赤壁破衲重遊山寺冷天邊萬點神鴉黑羡漁翁沽酒一簑歸扁舟笛又過虎丘申文定公祠相國祠堂看古樹蒼崖千尺聽斷澗轆轤聲緊闌干吹笛士女嬉遊燈火亂君臣際會松杉直任年年急雨打荒碑兒童識今古恨興亡迹白社飲靑門客歎三公舊事吾徒蕭瑟歌舞好隨時世改溪山到處還堪憶儘浮生風月倒金尊千人石又讀史顧盼雄姿數馬矟當今誰比論富貴刀頭取辦只應如此十載詩書何所用如吾老死溝中耳願君侯誓志掃秦關如江水烽火靜淮淝壘甲第起長安裏尚輕它絳灌何知程李揮麈休談邊塞事封侯拂袖歸田里待公卿置酒上東門功成矣又感舊滿目山川那一帶石城東冶記舊日新亭高會人人王謝風靜旌旗瓜步壘月明鼓吹秦淮夜算北軍天塹隔長江飛來也暮雨急寒潮打蒼鼠竄宮門瓦看雞鳴埭下射雕盤馬庾信哀時惟涕淚登高郤向西風灑問開皇將相復何人亡陳者又詩酒溪山足笑傲終焉而已回首處亂雲殘葉幾篇靑史昔日兒童俱老大同時賓客今亡矣看道傍爭羡錦衣郎曾如此遭際盛聲名起跨燕許追蘇李苟不知一事吾之深耻年少即今何所得孝廉聞一當知幾論功名消得許多才偶然耳又贈南中余淡心緑草郊原此少俊風流如畫儘行樂溪山佳處舞亭歌榭石子岡頭聞奏伎瓦官閣外看盤馬問後生領袖復誰人如卿者雞籠館靑溪社西園飲東堂射捉松枝麈尾做些聲價賭墅好尋王武子論書不減蕭思話聽淸談舋亹逼人來從天下又重陽感舊把酒登高望北固崩濤中斷還記得寄奴西伐彭城高宴飲至凌歊看馬射秋風落木堪傳箭歎黃花依舊故宮非江山換獨酌罷微吟倦斜照下東籬眸念柴桑居士高風誰見佳節又逢重九日明年此會知誰健論人生富貴本浮雲非吾願又賀孫本芝夀兼得子老矣君謨曾日啖荔枝三百拂袖去筍輿芒屩彈琴吹笛九日登高黃菊酒五湖放棹靑山宅論君家住處本桃源仙翁石門第盛芝蘭集五福滿雙珠出看龍文驥子鳳毛殊特竹馬鳩車階下繞朱顔緑鬢尊前立問今朝誰捧碧霞觴同年客又感興老子平生雅自負交遊然諾今已矣結茅高隱溪雲生閣暇日好尋鄰父飲歸來一枕松風覺但拖條藤杖笋鞋輕湖山樂也不赴公卿約也不慕神仙學任優遊散誕斷雲孤鶴健飯休嗟容鬢改此翁意氣還如昨笑風塵勞攘少年場安耕鑿又蒜山懷古沽酒南徐聽夜雨江聲千尺記當年阿童東下佛貍深入白面書生成底用蕭郎裙履偏輕敵笑風流北府好談兵參軍客人事改寒雲白舊壘廢神鴉集儘沙沉浪洗斷戈殘戟落日樓船鳴鐡鎖西風吹盡王侯宅任黃蘆苦竹打荒潮漁樵笛又壽金豈凡相國七十雒社耆英高會處門前雙戟風景好沙堤花柳錦堂琴瑟北叟甫翁須健在東封西禪何時畢羡蒼生濟了衮衣歸神仙客法醖美雕薪炙燈火照笙歌席正朱樓雪滿早梅消息矍鑠靑山霜鐙馬歡娛紅粉春泥屐願百年父老進霞觴升平日又壽顧吏部松交五十拂袖歸來間管領煙霞除目算得是與人無競高飛黃鵠眼底羊腸逢九坂天邊鰐浪愁千斛脫身時還剩辟疆園浮生足樽酒在殘書讀拳石小滄洲緑有風亭月榭醉彈絲竹嫩籜雨抽堂下筍蒼皮霜洗窗前木倩丹靑寫出虎頭癡山公屋滿庭芳孫太初太白亭落成分韻得林字鐡笛橫腰鶴瓢在手烏巾白夾行吟仙蹤恍惚埋玉舊煙林多少唐陵漢寢王孫夢一樣銷沉殘碑在高人韻士留得到而今雲深來此地相逢五隱白石同心喜今朝吾輩酹酒登臨忽聽松風驟響蘇門嘯髣佛遺音歸來晚峰頭斜景明日約重尋六么令詠桃一枝稷豔蘸破垂楊色到處倚牆臨水裝點清明陌障袖盈盈粉面獨倚斜柯立深紅淺白無言忽笑鬬盡鉛華半無力年年間步過此柳下人家識煙臉嫩霧鬟斜腸斷東風客燕子欲來還去滿地愁狼藉芳姿難得韶光一片囑付東君再三惜獨影搖紅山塘即事踏翠尋芳柳條二月春風半泰娘家在畫橋西有客金錢宴道是留儂可便細沉吟回眸顧盼繡簾深處茗碗爐煙一牀絃管惜别匆匆明朝約會新亭館扁舟載酒問嬋娟驀地風吹散此夜相思豈慣孤枕宿黃蘆斷岸嚴城鐘鼓凍雨殘燈披衣長歎倦尋芳春雨欺梅黯淡弄柳迷離一幅煙水醉墨糢糊淡插浮屠天際捲湘簾憑畫閣白鷗點點飛還起視吾廬如掀翻一葉空江深處記今朝南湖禊飲士女嬉遊此景佳麗細馬輕車不到斷橋西路雙屐衝泥憎喚渡一瓢沽酒柴門閉料今宵對殘燈客情憔悴念奴嬌東籬殘醉過溪來間訪黃花消息小院高樓門半掩細雨欄干吹笛側帽狂呼搊箏緩唱翠袖偎人立欲前還止此中何處佳客卻是許掾王郎風流年少爛醉金叉側十載揚州春夢斷薄幸靑樓贏得遍插茱萸山公老矣顧影顚毛白憑高惆悵暮雲千里凝碧木蘭花慢過濟南天淸華不注搔首望白雲齊想尚父夷吾雪宮柏寢衰草長堤松耶柏耶在否祇斜陽七十二城西石窖功名何處鐵籠籌算都非儘牛山涕淚沾衣極目雁行低歎鮑叔無人魯連未死憔悴南歸依然洋洋東海看諸生奏玉簡金泥誰問碻磝戰骨秋風老樹成圍又話舊西湖花月地櫻筍熟鱖魚肥記粉袖銀箏靑簾畫舫煙柳春堤驚風一朝吹散歎面興兵火渡人稀白髮龜年尚在靑山賀監重歸恰相逢紫蟹黃雞猶唱縷金衣奈狂客愁多秋娘老去木落烏栖無情斷橋流水把年光流盡付斜暉世事浮生急景道人抱膝忘機又夀嘉定趙侍御舊巡滇南仰頭看皓魄切莫放酒杯空記六詔飛書百蠻馳傳萬里乘驄天南碧雞金馬把枯棊殘局付兒童雞黍鹿門高隱衣冠鶴髮衰翁歎干戈滿地飄蓬落日數歸鴻喜歇浦寒潮練塘新霽投老從容菊花滿頭須插向東籬狂笑醉顔紅高館靑尊紅燭故園黃葉丹楓又中秋詠月水輪誰碾就千尺起嘯臺東記白傅堤邊庾公樓上幾度曾逢今宵廣寒高處問嫦娥環珮在何峰天上銀河珠斗人一玉露金風聽江樓鶴唳橫空人影立梧桐有宮錦袍緋綸巾頭白鐡笛仙翁欲乘月明飛去過嚴城下界打霜鐘醉卧三山絶頂倒看萬箇長松又夀汲古閣主人毛子晉尚湖高隱處校漆簡定遺經正伏勝加餐楊雄強飯七略縱橫爭傳殺青奇字更五千餘偈叩南能夜雨蒲團佛火春風菌閣書聲卧荒江投老遺民兵後海田耕喜柳塢堂開月泉詩就貰酒行吟高談九州風雅問開元以後屬何人百嵗顚毛斑白千年翰墨丹靑水龍吟送孫浣心之真定無諸臺上春風燕南魏北聲名起金戈鐡馬神州沉陸幅巾歸里種柳門前藝瓜陂下北窗煙雨遇天涯故舊貽書到一鞭行李滹沱水挾瑟高堂趙女問叢臺幾人珠履靑史紛爭干戈談笑陳餘張耳漢壘秦軍季龍宮苑銷沉何處向孤城但有寒鴉落木暮天羈旅風流子為鹿城李三一夀靑山當戶牖秋光霽明月倒壺觴羡金粟道人草堂松竹靑蓮居士藜閣文章傳家久朱門開纍葉畫省付諸郎緑酒黃花淵明高卧紅顔白髮樊素新妝登高頻回首江南舊恨在鐵笛滄浪十載故園兵火三徑都荒待山園再葺讀書萬卷湖田晚熟縱博千場老子婆娑不淺儘意疏狂又送張編修督學河南中原人物盛征驂過花發洛陽街羡嚴助承明連城建節茂先機近好士掄才賔徒滿賦成誇投簡鐘鼓繞繁臺嵩嶽出雲鬱䓤千仭濁河天際屈注西來憑高披襟處千觴引􅌬醁意氣佳哉回首日邊臚唱御筆親裁待尚書尺一趨歸視草門盈桃李學士高齋領取玉堂佳話黃閣重開又掖門感舊咸陽三月火新宮起傍鎖舊莓牆見殘甓廢磚何王遺構荒薺衰草一片斜陽記當日文華開講幄寶地正焚香左相按班百官陪從執經橫卷奏對明光至尊微含笑尚書問大義共退東廂忽命紫貂重召天語琅琅賜龍團月片甘瓜脆李從容晏笑拜謝君王十八年來如夢萬事淒涼沁園春贈柳敬亭客也何為十八之年天涯放遊正高談拄頰淳于曼倩新知抵掌劇孟曹丘楚漢縱橫陳隋遊戲舌在荒唐一笑收誰真假笑儒生誑世定本春秋眼中幾許王侯記珠履三千宴畫樓歎伏波歌舞淒涼東市征南士馬慟哭西州只有敬亭依然此柳雨打風吹絮滿頭關心處且追陪少壯莫話間愁又午朝遇雨十里紅牆樹色陰濃銅扉洞開見觚稜日炫金銀照耀朱霞天半避暑樓臺忽起奇雲琉璃萬頃燕雀罘罳風動來西山上有龍迎返照急雨驚雷涼生殿閣佳哉但瀟灑瑤階絶點埃聽御河流水琤琮雜珮黃滋細柳翠逼宮槐玉管銀毫氷桃雪藕枚馬詩成應制才承恩久待歸鞭晚霽步月天街又雲間張靑雕從中州南還索調夀母極目中原慷慨平生濁醪一杯念高堂老母桓釐志行窮途遊子仲蔚蒿萊雅負經綸文章小技三尺遺孤何壯哉辭家久到燕南趙北赤日黃埃吾徒造物安排且布襪靑鞋歸去來有蓴羹鱸鱠能供蔬膳魚村蟹舍可葺茅齋貧賤安親詩書養志世上機雲少棄才成名後把懷淸築起百嵗高臺又觀潮八月奔濤千尺崔嵬砉然欲驚似靈妃顧笑神魚進舞馮夷擊鼓白馬來迎伍相鴟夷錢王羽箭怒氣強於十萬兵崢嶸甚訝雪山中斷銀漢西傾孤舟鐵笛風淸待萬里乘槎問客星歎鯨鯢未翦戈船滿岸蟾蜍正吐歌管傾城狎浪兒童橫江士女笑指漁翁一葉輕誰知道是觀湖枚叟論水莊生又丁酉小春海棠與水仙並開王廉州為豫寫秋林圖𥘉成因取瓶花作供輒賦此詞有美人兮宛在中央仙乎水哉似藐姑神女凌波獨步瀟湘極浦洗盡塵埃忽遇東鄰彼姝者子紅粉胭脂笑靨開須知道是兩家妝束一種人材東君著意安排蚤羯鼓催成巧樣裁豈陳王賦就新添女伴太真睡起共倚妝臺玉骨氷肌豔梳濃裹妙手黃荃未見來霜天晚對膽瓶雙絶點染幽齋又吳興愛山臺禊飲分韻得關字妍景銷愁輕衫乘興扁舟往還遇使君倒屣銀牀枕簟羣賢傾蓋玉珮刀鐶下若新醅前溪妙舞落日樓臺雨後山雕闌外有名花婀娜嬌鳥綿蠻衰翁天放疏頑况草載重來詎等間歎此方嚴虎靑絲白馬孫吳時山寇嚴白虎與呂蒙戰於吳興之石城山當年宋態緑鬢紅顔唐李涉有贈吳興妓宋態詩所謂解語花枝在眼前也春色依然舊遊何處剩得東風柳一灣吾堪老傍鷗汀雁渚石戶松關賀新郎送杜將軍韜武雙鬢愁來白數威名西州豪杰玉關沙磧家世通侯黃金印馬矟當年第一磨盾鼻懸毫飛檄雅吹投壺詩萬首舊當陽虎帳春秋癖思往事頓成昔天涯寂寞靑門客念平生鞭箠萬里布衣之極滿地江湖漁歌起誰弄扁舟鐡笛正柳色依依南陌日暮鄉關何處是故人書草沒摩崖石漫回首淚沾臆又病中有感萬事催華髮論龔生天年競天高名難沒吾病難將醫藥治耿耿胸中熱血待灑向西風殘月剖郤心肝今置地問華他解我腸千結追往恨倍淒咽故人慷慨多奇節為當年沉吟不斷草間偷活艾灸眉頭瓜噴鼻今日須難訣絶早患苦重來千疊脫屣妻孥非易事竟一錢不值何須説人世事幾完缺梅村家藏藳卷弟二十二終

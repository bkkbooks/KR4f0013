  text: 梅村家藏藳卷弟三十八文集十六序十二
  hash: sha256:a4af30cfa940e405e0c8cc331a1294082c0d0379153ac2435498a9458f2543e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_038-1a}
body:
  text: 吳母徐太夫人七十序吾友吳幼洪以先朝給事中奉其母徐太夫人家居里門今年太夫人七十吳中鄉先達謀所以爲夀少司農申公靑門侍御李公灌谿以余之習于幼洪也徴余一言余日人子之顯其親者其大端有二日富貴日名節此二者雖甚賢智未可得而兼也其幸而遇極盛之世忠於事君孝於事親可以無憾卽其間稍有齟齬身退而名立位卑而行尊不足爲父母憂也其不幸而遭衰亂之季外之干戈日尋内之禍難日結賢人君子卽出身爲國不得復顧父母其父母亦以大義勉之如漢唐之末史傳所書者十無一二得全幸而全則一時之人必爲之咨嗟慶幸以爲此門戸之福雖處極亂終能保其身以事其親凢皆天爲之也故家庭之際可以觀世變焉太夫人初以侍御之女歸贈君孟登公孟登之尊人日虛臺公繇都給事中抗疏爭國本爲名世蓋神宗皇帝以忠孝福澤養天下士大夫敢言之氣太夫人親見其舅若父居要津持物望道重於朝廷身安於畎畝從容俯仰受國恩而娯晩節此余所謂極盛之世蓋幸而遇焉者也孟登公讀書好修不竟厥志太夫人攻苦食淡教三子以成立長洪二洪爲時聞人孝著鄉黨幼洪復弱冠成進士選授衢州司李浙有重獄會鞫事連大僚主者骫骳不敢決幼洪奮筆定爰書天下聞而壯之及北京大變留都新立幼洪入爲給諫當是時權倖竊位藩鎭擅兵幼洪尙冀國勢可爲正色言事向所謂大僚者則驟躋政地修舊郄用它事下幼洪詔獄而北兵已浸浸江上矣蓋邊疆之勢愈蹙則恩讐之報復愈急而其是非亦愈亂自十餘年來士大夫以黨魁被罪刋章逮治無慮數十人而幼洪遂爲氣運之究極不旬日而遇國禍此余所謂衰亂之季不幸遭焉者也而幼洪則當之初先皇帝時余於大僚曾有所彈劾幼洪所持浙獄卽其人也當幼洪爲給諌余亦官南中以母老歸養請急東還聞幼洪之及也余自知不免雖然不敢以吿吾母也無何江南大亂余奉吾母奔竄山中幼洪亦自獄所脫歸母子相見倉皇避兵皆慬而後免今太夫人康强夀考諸子拜堂下進七十之觴而吾母亦健飯無恙兩家母子同以危苦得全此非天爲之耶其能不爲咨嗟而慶幸耶余旣應兩公之請以不腆之詞爲夀詩日孝子不匱永錫爾類夫太夫人則猶吾母也顧母陳孺人八十序余及門顧伊人居州之鳳里事母陳孺人以孝聞其先君麟士長於毛鄭之學稽經緝傳自名一家海内所稱織簾先生也余常訪伊人於其里茅齋三楹衡門兩版庭階潔治地無纎塵散步至後圃見嘉樹文石則日此吾父在日某先生所嘗過而憇焉者也丹黃遺帙挿架如新蘚壁舊題漫漶可識噫嘻麟士可謂有子矣爲子具伏雌之饗茶香酒冽􅳔醬調美中置余笑而日昔茅季偉殺雞進母自以菜茹與客同飯郭林宗稱其賢至爲下拜子有老母無乃不給於鮮而顧爲我設可乎伊人日自吾先人講學荒江門外嘗有四方車轍今以某之無似夫子惠然臨之吾母帷而聽客日是兒能致長者且復如其父時矣故喜而爲魚菽之獻非某意也且日吾母明年八十以熟聞先人所論說知文章爲可重願夫子不吝而賜之一言余應日諾當先朝啟禎之際吾州文社擅天下先師張西銘偕受先讀書七録齋相繼取科第而麟士與子常談經講藝於江邨寂寞之濱遠近目之日兩張日楊顧初不以出處隱顯有所軒輕也西銘早世無後門緒式微賴吾師母獨身搘拄横爲强奴胠篋者之所侵奪余嘗比之庶其竊邑黑肱逃奔稍正厥罰以還其盜帑訖不能有所禆益受先兩子其少者尙存貧不能自聊盡撤先人之廬以償井稅嫂夫人寄止鄰邑壻家間一歸故居廼至無席可坐大慟而去嗟乎當兩先生致賓客授生徒輜軿接跡巷舍爲滿升堂拜母上夀奉觴誓以結死生託妻子曾幾何時西門南郭之間無復過而存者觀乎兩母之盛衰而友道得失之故亦可得而推已子常家本素封以明經試守令不之官失明里居晚而抱子不獲見其成立伊人毎過余爲之經營瞻䕶有漂揺風雨之歎麟士名第不如張先業不如楊其子伊人也亦未得與子常受先爲比廼十餘年來刻其遺集俎豆之學宮田疇廬舍有加於舊用以娛侍寡母臻於上壽孺人之所得不旣多乎伊人之誦母也辟績佐養以著其孝卜媵視寢以著其仁教誨式榖以著其慈簡飾僕御以著其法尤大者東陽張大司馬奉書幣迎致麟士賓席嘗念時方多故謀破格得文武士用濟劻勷草奏將薦於朝孺人聞而力止之日君孺者非應變才今豈進用時耶其安貧賤識道理如此故能受此大年享有遐福豈偶然哉鳳里名跡最古歴宋迄元多高人隱君子及貞姬淑楥備載邑乘其軼乃時時見於織簾之私志可考而知也自織簾存日閒居樂道孺人庀中饋以相成一時倡隨之樂已威知有顧家婦距今松筠晚節齒彌高而行彌劭而伊人學殖益富爲世鴻生有以躋親之令名於無窮行見茂德令儀増徽彤管且與孺仲賢妻龎公嘉耦並垂千􅥴豈止一里之光榮也哉余雖老尙能奮筆以傳其事敢卽以當春酒之獻而區區人間祝釐不足爲孺人道也顧母施太恭人七十序顧氏蓋世有賢母云吳丞相澧陵侯雍以黃武七年迎母於吳其主親拜之於庭公卿大臣畢會蓋自有吾郡以來虞魏張陸英英門戸彼有人焉位宰相爵通侯莫先於顧氏家人尊老女宗母師起居六宮賓禮萬乘亦未有踰顧氏者已吾友吏部考功朗顧君蒨來天下精彊開濟駿雄闊達之君子也舉進士年才二十餘起家廷評銜天子之命以取士於嶺表五管號稱得人其𥙷吏部也甚爲時宰之所倚重在諸曹中特以爲能已而用請急歸坐公事以免家居四五年以今嵗春正月壽其母施太恭人七十君之年適亦屑於强仕稽諸譜牒其先出自陳黄門侍郎野王固灃陵之苗裔也野王十七世孫占名數於長洲入先朝有自兵都諫爲通政司參議者而族始大蒨來則從通政介弟處士公而分處士之子訒菴公以才名雄諸生中累舉不遇積書萬卷以貽其子是爲仲晉公卽贈君也贈君中歲多病猶及見蒨來成進士而恭人則當其子之出使嶺嶠簜節還家入典銓曹板輿迎養堅彊暇豫白首而無恙詩日令妻夀母傳日公侯子孫必復其始噫嘻豈不盛哉蒨來之爲人也負意氣巳然諾元老重臣寓公邑子無不躧履到門迎閤握手以相爲引重有幼弟日斯玉雖年少官薄而敏給過人能以連郡國豪傑公府雋材故顧氏有聲吳越間在諸公莫與爲比其上夀也幢牙旌纛交錯於路皮幣玩好充仭於庭餼牽體薦之物駢羅而疊陳揳擊吹鼓之音族居而遞奏里人以爲榮雖然世家大族邦之楨幹里之儀型其有嘉好燕樂國人於此觀禮焉四方於此問俗焉固非焜耀一時之望已也盍相與据見聞猨故實以頌我太恭人可乎往者吾郡風醕俗厚家給人足凡仕而歸者得有具秔稻桑麻陂池邸閤之利通政起家清卿有賢子與孫及四世而衰矣而介弟一門復振第宅園林尊彜書畫至今指數於吳中施氏雖通顯不及顧氏白冶公以一孝廉用治生素封兩家皆爲方雅之族子孫恂恂退讓比於石君之有建慶桓氏之有郁焉孝謹不衰明經篤行此太恭人之生世承平傳家肅穆孝友順祥本諸先德者也運之季也末流始於濫觴良苗不無秕稗廼有三四大君子者清剛不撓峭覈爲方嚴取與以遏絕苞苴持臧否以痛繩流俗訒菴公以貴公子熟聞道誼雅負風裁屬當黨錮異同是非倒置好是正直感槩不平其所與游者文文肅是中從婣婭相得甚驩而周忠介之忤奄急徵也出囊中金庀槖饘屝履之用居恆慕孔文舉孫賓石之爲人不肯詭隨碌碌此太恭人詩書嫻習才智通明前哲令聞得之舅氏者也自租調更繇之日急則有虎吏市魁乘意氣以陵出衣冠之上士大夫杜門嗛退苦身自約者漸不爲閭巷之所尊禮至與黔首無異有識傷之蒨來姿容瓌偉涉獵傳記辨智從橫自以贈君貲産中㣲受人侵侮得志之後雅自發舒不欲敝車羸馬以爲里見之所簡易約結英俊賑施窮急知名當世取重諸侯行誼出袁絲鄭莊之間文詞居莊助枚皐之亞此太恭人以世會艱難家門貴盛持盈戒滿保其福祉者也子讀書至潁考叔之告鄭莊曰小人有母未嘗君之羹趙宣子所食翳桑餓人舍壺飱請以遺母不覺爲之掩卷而三歎今以吾吳廉吏之家名父之子托于木門賃春織屨以事其親者多有之矣爲其親者躬親操作黽勉虀鹽亦嘗有一日之養如斯讌者乎然君子之孝遇則鼎食擊鐘不遇則唅菽飲水南陔白華期不失守身之正已耳茅季偉庾子平於道豈有憾哉在昔澧陵之先世爲著姓元歎尤以幕府親信君臣母子講布衣骨肉之禮古今之罕見史稱其不飲酒寡言語舉措時當獨能恩禮始終斯眞羔羊素絲富貴而不失其身者也豈非吾郡之先正而顧氏之家法也乎予衰退不獲以時追陪蒨來然當其服官也與之同朝及其坐公事以免也又嘗與之同患故今日祝釐之詞不以諛而以莊庶幾太恭人聞之喜日是言也其能相吾子於義者也公父文伯之母誡其子曰瘠土之民莫不嚮義勞也計當日吾徒之所坐實以災荒凋瘵之餘雖率先奉公猶不免於吏議彼魯語所云聖王之處民也擇瘠土而處之勞其民而用之誠吳民今日之謂乎自今以後上之人寬租薄賦以恤其下之窮下之人修行守分以奉其上之法竭蹷輸將保持鄉里以相安其爲瘠土之民而已君子曰季氏婦之言此卽太恭人之教也遂書之以爲序秦母于太夫人七十序梁谿秦留仙館丈以侍從積勞之三牢上恩許賜洗沐而王母于太夫人以明年正月爲攬揆之辰於時封公以新先生春秋甫彊仕也先是天子開南苑親試天下士而梁谿兩搒克勤公由南宮第一賜上第於留仙則再從祖以同日被遇已而遷除休澣又同時入里門其當太夫人之夀也先生緌纓束帶爵韠偕介弟西向立候夫人纚笄綃衣侈袂偕介婦東向立諸孫從子之次稍退負牆其少者劍其侍孫婦從婦之次退亦如之太夫人出於房皆接武上堂北面再拜諸姑伯姊率子姓彌甥各以次肅拜宗人之長者先以其屬由阼階上侯于屏内宗禮畢盛服致賀其尊者太夫人答拜卑幼則頷之庭實維旅棗栗暇修重錦加璧樂作盥洗揚觶前爲夀終宴無一人偝立踰言者鄉之人觀禮焉秦與于江南鉅姓也秦望於梁谿于望於金沙梁谿之秦自大司馬端敏公始大其别有中丞以才力開濟譽重諌垣篤生贈公爲之愛子以光啟於來裔金沙之干自都御史公始大其後有憲副以理學醕正績著外臺爰及再世廼誕淑女以作嬪於高門太夫人實憲副之子太學褒甫女也當神宗皇帝時褒甫之從兄中甫以鉤黨摧抑爲海内表的諸君子過金沙者無不與其兄弟定交矜然諾重節槪而褒甫則能刻畫爲新詩家世貴盛自以高才不遇益跌蕩極意於聲酒園池歌舞之樂江南莫及而秦氏夙以儉撲傳家中丞捐館舍門戸寢落贈公善病早殁太夫人辛勤荼苦以玉三子於成詩日何有何亡黽勉求之太夫人生長豪門而能自修持以敬儉人止知今茲福澤之非常而不知其中更孔艱保嗇調䕶之不易也夫爲人子孫而能事其王父母幸矣爲人子孫能以富貴事其王父母此人倫所難卽古純孝者以爲不可倖致留仙之乞言于余也紋其在襁褓之中爲太夫人所鍾愛推乾就濕恩勤備至吾因留仙之言而喟然有感於余祖母湯淑人也衰門貧約吾母操作勤苦以營舅姑􅎵􅔱之養湯淑人憐其多子代爲鞠育余自少多病由衣服飲食保抱提攜唯祖母之力是賴憶自早歲通籍祖母年七十有三及以南都恩貤封三世湯淑人期屆九􅐆笄珈白首視聽不衰里人至今以爲太息雖以余今日之潦倒萬不足以追陪留仙而迴思往事三世一堂莊强悅豫何其有類於太夫人也乎吾母朱淑人精心事佛嘗於鄧尉山中創搆傑閣䖍奉一大藏教而于太夫人實有同心信施重疊像設莊嚴俾願力克有所成就夫人子事親身則思其所安性則思其所嗜牲牢酒醴之奉珠玉纂組之華雖吾力所不能致而親好焉計猶且圖之也若二母之清淨澹漠擺落穢濁其所需者固已少矣而余之貧至使吾母伊蒲之供出於損衣節食之所存廼太夫人獨可以充然而無憾迄今兩山之間鐘魚浩浩皆誦太夫人之福德而又能以其餘力甓橋梁賑㷀獨留仙父子竭其力以悅親心者至矣而余則不能其能無愧色矣乎余友周子俶爲留仙所知實請余言以夀太夫人夫子俶知吾兩家之深者也乃就兩家祖孫父子之際質言之稱其禮言乎長幼有序也稱其儉言乎盛滿不溢也稱其善而好施言乎仁慈有恩也古之孝子事友人之母猶吾母余之夀太夫人也無諛辭無勦說庶幾有合於朋友之道焉子俶善其言遂書之以爲升堂之獻王母徐太夫人夀序吾友王太常煙客王郡伯元照爲余道其宗盟之長額駙王公長安之賢而盛推其能孝也日公爲人敦尙儒雅好古博物深自折節以交天下之英俊其爲賢也藉甚君子以爲此不足以盡公也夫百行莫先乎孝孝莫大乎事之以禮今年春公之母徐太夫人來自汾陽先期公飾其翟車設容蓋駕騏騮躬執轡而迎於郊旣入帣鞲鞠􅎽旦晡自上食於是公之客習聞其内行甚謹將以是秋太夫人設帨之辰相率前爲夀某等則宗人也宜一言以贊衆賓輒用屬諸偉業日吾子通達往代之典訓而號能言敢唯子也請余遜謝固陋弗獲則從而爲之辭曰昔者先王選建親賢以藩屏王室旣繼體其子弟又推而及諸昏媾甥舅恩禮有加焉所以聯肺腑樹腹心也惟我國家剖符定功封親王以鎭撫南夏其尊寵人臣莫比獨太原王氏於親爲睦揆厥所自蓋王氏之先公同官爲寮在軍中用氣誼相推重比王貴而公先以封疆著忠節王是以惠顧前人之好而施及其子孫申以昏婣厚其湯沐嗟乎先王親親仁厚之道余蓋未之見也上下數百年其有結平生之分定骨肉之親分之以寵祿被之以文章和之以聲音鎭之以彝器如王氏之所遭者乎雖然家門當荼苦之日藐諸在襁褓之中㣲太夫人辛勤黽勉鞠育教誨則不足以及此是舉也王爲遣萬里之使奉咫尺之書家丞發嘉幣廐人出良馬旣具而後命之於庭及郊張幕告至執庭實以將命魚軒重錦玉斚瑶甕載以筐篚列諸兩階主人曲躬磬折入以告太夫人立於房中使人及階再拜史讀書家老展幣太夫人受之俠拜遂入主人肅使者而退饗之日外賓席於堂内賓席於室薦以房烝折俎佐以鉶羹加豆其用玉則璧羡肉好温潤清越有夏后氏之璜魯侯之雙琥焉其陪鼎則雲螭雷紋丹青斑駁有商癸父之尊周孟姜之敦焉其陳圖則縹緗玉軸摹寫裝褫有唐昭陵之遺蹟宋御府之秘本焉爵行樂作歌鐘二肄簫管備舉魚龍曼衍之戲迭奏而遞進君子觀之歎曰美哉何其備物而多儀也世衰俗敝束修之問不行於境中滫􅔱之珍或闕於堂上卿士大夫嘉好燕飲之不講蓋巳久矣詩有之日我有旨酒亦有嘉殽洽比其鄰婚姻孔云又日魯侯燕喜令妻夀母旣多受祉黄髮兒齒王氏之宴取其彰王之賜揚母之德而貽子孫無疆之休也先王制禮因時世而爲之節文其在斯乎其在斯乎抑吾聞之禮者所以崇退讓弘止足也自古世禄之家鮮不怙其勢位以公才地托屬王家上可以筦樞機次可以奉帷幄乃優游不進者二十年於茲矣風流􅈺雅舉止如儒生世之赫然要近者視之漠如非其好也家居盛治風亭月榭嘗具數百人之餼扁舟過江載其圖書萬卷清商兩郡修承平王孫之樂天下聞而慕之母夫人追念先公生長艱難與兵終始不及見其家富貴喟然於車馬威僕之盛以爲吾提三尺之孤以入關竊不自料賴朝廷厚德克有今日吾母子善自抑損庶不負國家推恩藩邸施寵綏以垂諸永久賓客聞之咸謂我公之賢皆其母有以成之也昔晉京陵公王渾之子濟以中書郎備戚屬逸才俊爽負盛名史稱其母鍾夫人琰賢明有法度不恃其貴陵人夫公侯鉅室婦儀母德子孫當奉爲永式歷觀載籍䋲䋲弗替孰有踰於王氏者乎旣吾州兩王出宰相名公卿之後舊德博聞多識其先世故實若長安公之事其母者此誠一門之光輝而傳紀所不得而畧也余老史官也旣聞公之賢又知兩先生爲可信故備而書之以著王氏一代之家法是爲序吳孺人五十壽序余門人王周臣旣官中書舍人用覃恩封其母吳太君爲孺人而謂余日先生知挺之爲此官乎凡以爲吾母也吾父自神宗皇帝以來拜璽書之命有五而吾母以例不及封吾父謂吾母日此以待爾子今國家新造皇上於舊京嗣位推恩羣臣甚盛典也挺不以此時邀一命之賞其謂吾母何於是周臣奉命歸里拜其尊人奉常公於堂下而太君受珩璜禕翟之錫里人以爲榮又五年孺人五十周臣乞予言爲夀蓋予交於太原者兩世矣奉常治家四十年婚宦祠葬大小畢舉中外宗親無閒言僅指千人蹀縮奉成法主人左顧而咳則不時之需糈醪槃勺應手立辦其整且密如此又自以其間治園圃好書畫請謝賓客跌宕文史見者驚焉旣而問之此固奉常之才抑亦吳孺人之助也自奉常服官奉使孺人未嘗不從雞鳴盥頮呼役夫戒行李奉常不知有辦嚴也奉常有十子七女孺人撫異出之子衣服供用必使與吾子同諸女輒厚其裝送以爲之嫁不以累奉常奉常燕處甚嚴子弟或小過面加譙讓孺人視顔色婉轉之輒解卽婢僕亦多所寛貸一家之人咸歸心焉其以覃恩封也猶抑然自下日吾佐簉於王氏二十牢矣今以子貴得見文肅相公之廟雖然詎敢當尊乎退而與諸娣齒未嘗稍以自異則豈非恭勤慈惠賢明識大體者哉太原自相國朱夫人後奉常生母周宜人及孺人其婦德最爲可紀宜人當緱山旣没家祚中㣲扶其子於危疑臲卼之中其拮据也似難孺人値門緒再昌諸子鼎立相其夫於精明綜覈之時其調劑也似易然奉常仕宦通顯宜人優游晚福而周臣自中書一命旋偪亂離搘捂絲役其爲母夫人憂者多矣卒能從容擘畫維持門戸以此知孺人雖易而尤難也予因周臣之請不敢貌言以夸廼質舉平日所聞俾周臣還夀其親也如此錢母譚太君六十序吾郡與浙之禾中爲比境其世家舊族燕饗慶勞之禮相接也庚戍之春正月禾有又鶴亦駿兩錢君爲其母夫人譚太君六十壽太君者登萊道監軍贈太僕凡同先生之女孫而明經誾仲之長女誾仲太僕之仲子也其歸於錢爲松溪令孚于公之冡婦而孝廉雍仲之元配錢與譚旣邑之望姓而夫人以貞愼專一之操婉嫕莊静之德辛勤黽勉者三十年用能持其家教其子而又鶴亦駿方以文行有聲於時自其邑之人無大小莫不賢之於是兩錢君謀於父榜之執友日平湖倪公伯屏母黨之懿戚日同里黄公觀只以祝嘏之辭爲請伯屏之言日予之舉於鄉也同年生雍仲爲少子監叨一第雍仲齎志以殁天下聞而惜之予之坎壈末路深以弗從雍仲爲不幸而錢氏獲保其家以趾美於後人則嫂夫人力也雍仲爲不亡矣夫女子而節也難女子之節經滄桑兵火爲尤難此有事於史者所當紀也其節可書也觀只之言日我宗與錢氏譚氏世通婚姻先給諌之女乃某之姑歸於松溪公而生雍仲雍仲又與余同娶於譚爲中表爲僚壻其悉夫人之内行加詳先姑性嚴顧嘗語余雍仲雖亡賴孤婺矛牙以扶持將順吾以此知夫人之爲婦也誾仲公於余爲外父行今夫婦八十無恙而洗腆甘旨兩甥實分其勞吾以此知夫人之爲女也此其孝可書也余日是則然矣抑太君之爲孝若節者有本焉蓋嘗反覆於懷宗端皇帝之初紀方大憝始拔羣邪黨據莫肯正言其辜有從草莽中伏闕上書歷數璫十大罪且顯詆在位媕阿爲失職則浙西太學錢生卽松溪公也踵松溪而起者逡巡數百奏獨松溪言於主上孤立宮府危疑之日自宰執臺諫左右近侍諸司皆奄私人所布置思剸刃一二言者以拄天下之口松溪一疏實首中其陰伏其不爲陳東續者厪耳至今言之心悸然則錢氏之保門戸長子孫帣鞲鞠􅎽上壽於此堂者微君父神聖不及此又鶴兄弟可不思其故乎或日艱難時布衣上封事往往授中朝官松溪沿嘗調得一令以去有子而貴又中道奪之謂天道何哉余日是不然夫松溪之正直其得官不得官非所計也以彼父子天性忠孝使雍仲而在目擊淪胥板蕩有不搤掔流涕棄妻孥而弗顧者乎天之奪雍仲者正所以全之俾太君得以提攜孤稚於家門零落之中兩錢君終能光啟宗祧於身名發聞之後傳日天道遠未可以目睫測也且夫消息盈虛古今常理吾不暇遠論請卽譚氏觀之太僕之在登萊焦心極力拄島帥定譁兵卒以勤其官而身殞有子六人虞衡早貴禮部用五經得舉則已遭逢末造﨑嶇奔走没於兵間誾仲在兄弟之中可謂不遇矣而優游晚福顧乃過之然則雍仲留其不盡以俟諸子孫正未有艾也太君之所得不旣多乎夫太僕起家賢書第一而伯屏觀只先後首冠浙闈以科名相亞者也宿老耆德其見聞言詞皆可信浙西之文獻徵焉今以故舊婣婭爲太君夀而固以屬余余忝聲氣於雍仲而早歲曾一識松溪於譚氏則太僕諸子仕路所定交也故不辭而壽太君屏棄尋常祝釐之詞而標舉其大節庶幾太君聞之日是人也熟於近代之史必能紀吾家之事而圖其傳則錢氏譚氏之子姓足以吿成茲讌而余亦可無負於兩公之請也已趙母張太夫人六十序御史大夫趙公膺天子再命將大用而其子孝廉君奉母張夫人居於維揚之邸舍今年夏孝廉爲書而乞言於當世曰吾母夀且六十矣古有言備物致養非孝也顯親揚名乃孝也顧某幸厠賢書齟齬未遇安所得夀吾母乎惟是名公鉅儒鳩茲内德而賜之一言以垂金石則其夀也無窮不庸愈於顯且揚耶余嘉孝廉之意竊以爲孝而有禮也且余與趙公後先出李太虛夫子門下往來嚮慕故知夫人事尤詳夫人出自名門爲父母所奇愛常拍額日是兒殊慧必得一讀書出頭地者巳而果歸於公公方食貧卒業羅湘間而家有踐更胥吏臨門而瞋夫人上勞姑嫜下完繇役翁日新婦良苦矣而夫人顧自若也則公之無内顧恐而單精以成其學者夫人也湘南地鹵濕而俗樸愿亡它修息公自爲博士弟子爲名孝廉前後十有六年廩廩飭廉隅家益落常糊其口於四方夫人爲挫鍼治繲烹魚炙肉奉高堂辦游槖則公之不貽親憂而藉甚以成其名者夫人也公起家武定旋遘外艱夫人飯含祖免以身代公人無間然及起補趙州流氛孔肆公單騎之官仰天吁嘻日吾安忍離吾母乎夫人進日妾任也母何患遂戒舟楫泝江漢涉淮濟及抵廨舍母子如初巳申酉變起虺牙虎吻驚濤狂燹瀕危無恙則公之能全其孝以保其身者夫人也公旣宦燕都批鱗抗疏事最奇偉幾蹈不測而驟躋副相禍福倚伏夫人則無幾微見於顔面孝廉客漳閩有留滯周南之感夫人千里移書備極勸誠不刺刺作兒女子態則公之能立其節以教其後人者夫人也凡此約畧孝廉君所述而合余傳聞者如此余觀近世有外矯名節内執狐疑言不盡其懷貌不副其欲媕阿軟密希圖寵利高官大俸如衣裏弓弭之不能暫捨因是嬉於家驕於室者比比然也以視疆直自遂舉不避親利害進退置若度外而内無怍色相視泊如者不且霄壤哉今趙公危言直節烜赫人耳目顧以謇伉故休沐暫免而天子思之隨賜環召孝廉以英才愽學有稱於時不久役大其業亦豈必與世庸庸多福保無蹉跌者同類而稱耶在夫人笄珈偕老黃髮兒齒雖風波震蕩之後轉徙流寓之中而孝廉方致九曲之木蘭種蕃釐之瓊樹和江都金帶之羮採甓湖白雪之藕蕪城燈火平山詩酒皆以娛母夫人而進一觴焉則何必星沙雲母浮丘丹砂爲足以夀而故鄉之是樂也耶禮有之樂其心不違其志孝廉又奚必嗛嗛爲此可書而賀以歸之也遂爲序梅村家藏藳卷弟三十八終

front:
  text: 梅村家藏藁卷弟十四詩後集六
  hash: sha256:d73ab436baa45c6b2c5ea0dd7fc3351317b56fdddaf89b0e66d8b305b089caa2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_014-1a}
body:
  text: 五言律詩六十六首茸城客樓大風曉寒吟眺以示友聖九日玉符諸子偶作扁舟興偏逢旅夜窮鴉啼殘夢樹客話曉樓風月落三江外城荒萬馬中空持一尊酒歌哭與誰同遇宋子建話故友有感對酒徐君劍披襟宋玉秋蕭條當晚嵗生死隔炎洲萬里書難到三山夢可求子建學仙傷心南去雁老淚只交流樓聞晩角霜角麗譙聞天邊横海軍旗翻當落木馬動切寒雲風急城烏亂江昏野燒分何年鼙鼓急倚枕向斜曛送錢子璧赴大名一騎衝寒雪孤城呌晩鴉叅軍雄鎭地上客相公家酒盡河聲合燈殘劍影斜信陵方下士旅思莫興嗟過諸乾一細林山館興極期偏誤名山識旅愁橋痕穿谷口亭影壓溪頭霞爛丹山鼎松鳴白石樓居然華燭夜先爲一峰留神山夜宿贈諸乾一高士能調鶴仙人得卧龍穿雲三徑杖聽月五聲鐘管樂名堪亞彭佺道自濃獨來天際住嘯詠赤城松過徐文在西佘山莊已棄藍田第還來灞水濱煙開孤樹逈霜淨一峰眞路曲山迎杖廊空月就人始知蕭相計留此待沉淪細林夜集送別倩扶女郞遠翠入嚬眉輕寒袖半垂花生神女廟月落影娥池深竹微風度晴沙細履移囘看下山路紅燭爲誰遲天馬山過鐵崖墓有感天馬龍爲友雲山鳥自飛定愁黃紙召獨羡白衣歸長卷心同苦狂歌謂已非悲來吹鐵笛莫笑和人稀其四訪俗曾經亂車過大澤鄉殘民談勝廣舊國記江黄廿載流移復三湘轉運長正逢休息後温詔重循良暑夜舟過溪橋示顧伊人深岸聽微風江淸不寐中舟行人影動橋語月明空寺樹侵門黑漁燈颭水紅誰家更吹笛歸思澱湖東佘山遇姚翁岀所畫花鳥見贈七十忘機叟空山羨獨行只今來白石當日住靑城一斗開顔笑千花洗筆成那知牙齒落忽發浩歌聲贈靑溪蔡羽明家傍山城住前賢定可追一經傳漢相八法繼秦碑仙是麻姑降才非唐舉知逃名因賣藥不愧鹿門期橘莫設西山戍蕭條是橘官時洞庭初增兵將果從今嵗少樹爲去年寒昨冬大寒橘大半枯死一絹輸將苦千頭翦伐難茂陵消渴甚只向上林看蛤蜊彊飯無良法全憑適口湯食經高此族酒客得誰方水斷車螯味厨空牡蠣房江南沈昭略苦嗜不能嘗膾殘棄擲誠何細夫差信老饕微芒經匕箸變化入波濤風俗銀盤薦江湖玉饌高六千殘卒在脫網總秋毫石首採鮮諸俠少打鼓伐藏氷五月三江去千金一網能尾黄荷葉蓋腮赤柳條勝笑殺兒童語烹來可飯僧燕窩梅燕無家苦爭啣白小魚卻供人採食未卜汝安居味入金韲美巢營玉疊虛大官求遠物早獻上林書海參預使燂湯洗遲纔入鼎鐺禁猶寛北海饌可佐南烹産東萊海中故無禁莫辨蟲魚族休疑草木名但將滋味補勿藥養餘生比目比目誠何恨滄波作伴游幸逃網罟厄可免別離愁小市時珍改殘書士物收若逢封禪詔定向海邊求得東海比目魚可封禪見管子鮝舊俗漁鹽賤貧家入饌輕自慚非肉食毎飯望休兵餘骨羶何附長餐臭有情腐儒嗟口腹屬饜負昇平過吳江有感落日松陵道堤長欲抱城塔盤湖勢動橋引月痕生市靜人逃賦江寛客避兵廿年交舊散把酒歎浮名莫釐峰始信一生誤未來天際看亂峰經數轉遠水忽千盤獨立久方定孤懷驟已寛亦知歸徑晚老續此游難送沈友聖漢川哭友詩四首并序漢川顧西巘侍御與雲間沈山人友聖爲布衣交使吳深自折節友聖長揖就坐箕踞狂嘯無所不敢當所居田坳蓬蔚衡門兩版侍御岀郊枉訪停車話舊一郡皆驚西巘亡友聖徒步三千里哭之糧盡道寒直前不顧子與友聖交厚侍御亦以友聖之故厚予嘗三人虎丘夜飲其鄭重之意形諸圖畫見於歌詩漢川之行惜子不能從也爰作詩寓其悲焉士有一知已無須更不平世翻嫌鮑叔人竊罵侯生置飮忘形踞停驂廢禮迎柴門車轍在感舊淚縱橫其二得信俄狂走千山一哭中棄家芒屩雪爲位草亭風兩水江聲合三生友道空祗留黃鶴夢相見話詩翁其三貧賤誰曾託相逢許此身論文靑眼客漬酒白衣人丘壠松楸泠江山薤露新一杯傾漢水不肯負春申其四徒步愁糧盡傷心是各天雲埋大别樹雪暗小孤船死友今朝見狂名到處傳范張千里約重補入晴川秦留仙寄暢園三詠同姜西溟嚴蓀友顧伊人作山池塔影黛色常疑雨溪堂正早秋亂山來衆響倒影漾中流似有一帆至何因半塔留眼前通妙理斜日在峰頭惠井支泉石斷源何處涓涓樹底生遇風流乍急入夜響尤淸枕可穿雲聽茶頻帶月烹只因愁水遞到此暫逃名宛轉橋斜月掛銀河虹橋樂事多花欹當曲檻石礙折層波客子沉吟去佳人窈窕過玉簫知此意宛轉采蓮歌慧山酒樓遇蔣翁桑苎誰來繼名泉屬賣漿價應誇下若味豈過程鄉故老空山裏高樓大道㫄我同何水部漫說撥醅香家園次罷官吳興有感四首世路嗟誰穩栖遲可奈何官隨殘夢短客比亂山多閉閣凝香坐行厨載酒過卻聽漁唱響落日有風波其二勝事難忘處陰晴檻外峰高臺爭出水曲塢自栽松失志花還放離程鶴未從白雲長澹澹猶作到時容其三枉殉千金諾空酧一飯恩只今求國士誰與報王孫强悶裁詩卷長歌向酒尊古人高急難歎息在夷門其四劇郡非吾好蕭條去國身幾年稱傲吏此日作詩人京洛虛名誤江湖懶病眞一官知已愧所得是長貧許九日顧伊人和元人齋中雜詠詩成持示戲效其體焦桐流落中郎怨薰風意乍開響因知巳出歌爲逐臣哀一曲尊前奏千金爨下材漢家忘厝火絶調過江來蠧簡飽食終何用難全不朽名秦灰招鼠盜魯壁竄鯫生刀筆偏無害神仙豈易成卻留殘闕處付與豎儒爭殘畫原自無多筆年深色更凋茶煙衝雨過竹粉過風飄童懶犀從墮兒頑墨誤描六朝金粉地落木更蕭蕭舊劍此豈封侯日摩挲憶往年恩仇當酒後關塞卽燈前解去將誰贈輸來弗値錢不逢張壯武辜負寶刀篇破硯一擲南唐恨抛殘剩石頭江山形半截寳玉氣全收洗墨池成玦窺書月仰鈎記曾疏闕失望斷紫雲愁廢檠憶曾同不寐棄置亦何心喜伴疏窗冷愁添老屋深書將隣火映夢共佛燈沉莫嘆蘭膏燼應無黠鼠侵塵鏡舉目風塵暗全遮皓魄輝休嗟靑鏡改憐我白頭非秦女妝猶在陳宮淚乍揮不知徐孺子負局幾時歸斷碑妙蹟多完闕天然反失眞銷亡關世代洗刷見精神搨處懸崖險裝來斷墨新正從毫髮辨半字亦先秦過東山朱氏畫樓有感并序東洞庭以山後爲尤勝有碧山里朱君築樓教其家姬歌舞君每歸自湖中不半里令從者據船屋作鐡笛數弄家人聞之皆出樓西有赤欄干累丈餘諸姫十二人豔妝凝睇指點歸舟於煙波杳靄間既至卽洞簫鈿鼓諧笑並作見者初不類人世也君以布衣畜妓晚而有指索其所愛者以是不樂遣去無何竟卒余偶以春日過其里雖簾幙凝塵而湖山晴美樓頭有紅杏一株傍簷欲笑客爲余言君生平愛花病困猶扶而瀝酒再拜致别諸伎中有紫雲者爲感其意至今守志不嫁嗟乎由此足以得君之爲人矣爲題五言詩於壁上盡說凝眸望東風徙倚身如何踏歌處不見看花人舊曲抛紅豆新愁長白蘋傷心關盻盻又是一年春葉君允文偕雨叔及余兄弟游寒山深處投足疑無地逢泉細聽來松顚湖影動峰背夕陽開客過攜山榼傖歸掃石臺狂呼聲撼木麋鹿莫驚猜查灣西望屢折纔成望山窗插石根湮雲低染徑老樹半侵門漁直看疑岸沙横欲抱村湖光猶在眼燈火動黃昏拜王文恪公墓舊德豊碑冷湖天敞寂寥勳名高故相經術重前朝致主惟堯舜憂時在監刁百年人世改野唱起漁樵胥王廟伍相丹靑像鬚眉見老臣三江籌楚越一劍答君親雲壑埋忠憤風濤訴苦辛生平家國恨偏遇故鄉人查灣過友人飯碧螺峰下去宛轉得山家橘市人沽釀桑村客焙茶溪橋逢樹轉石路逐灘斜莫負籃輿興夭桃已著花寒山晚眺驟入初疑誤沿源興不窮穿林人漸小攬葛道微通湖出千松杪鐘生萬壑中晩來山月吐遥指斷巖東翠峰寺遇友卧疾峰腰寺欹危脚步勞松聲侵殿冷花勢擁樓高薄俗詩書賤空山將吏豪時有戍將居寺中不堪從置酒白髪自蕭騷登寒山高處䇿杖行崖谷中側視峰形轉空蒼萬象陰斷巖湖數尺絶澗樹千尋日透玲瓏影煙生窈靄心忽逢天際廣始覺所來深沙嶺亂峰當面立反憩得平丘坐卧此云適歌呼不自由支頣蒼鹿過坦腹白雲留笑指鳥飛處有人來上頭飯石峰半空鳴杵臼狼藉甑山傍莫救黔黎餓誰開白帝倉養芝香作粒煑石露爲漿飯顆相逢痩詩翁詎飽嘗柳毅井其地即橘社仙井鹿盧音原泉瀉橘林寒添玉女恨淸見柳郎心短䌁書難到雙魚信豈沉波瀾長不起千尺爲情深雞山夫差養鬪雞處飲啄丹山小長鳴澤畔雲錦冠虛恃氣金距耿超羣歛翅雌猶守專場勝未分西施眠正熟啼報越來軍廏里在武山吳王養馬處夫差芻秣地遺跡五湖傳柳葉靑絲鞚桃花赤汗韉武山桃花爲東洞庭一勝降王羞執轡豔妾笑垂鞭老驥哀鳴甚西風死骨捐仙掌樓留别衆友杯酒鏡湖平持來送客行可憐高㑹處偏起故園情煙鳥窗中滅風帆樹杪生遥看沙渡口明日是離程登東山雨花臺白雲去何處我步入雲根一水圍山閣千花夾寺門日翻深谷影煙抺遠天痕變滅分晴晦悠然道已深留洞庭二十日歸自水東小港漸覺雲天改扁舟曲曲行野橋誰繫姓村樹亦知名晚市魚蝦賤煙汀菰米生偶逢空濶處重起舊灘聲武山本名虎山夫差於其地養虎李唐諱虎爲武至今仍之霸略誇擒縱君王置虎牢至今從震澤疑是射成臯土俗無機穽山風少怒號千秋遺患處誰始翦蓬蒿題郁靜巖齋前壘石就石補奇雲潭幽亂石文貞堅應有性高下亦惟君鳥雀因人亂松杉我獨聞苔階含古色落落自同羣梅村家藏藁卷弟十四終

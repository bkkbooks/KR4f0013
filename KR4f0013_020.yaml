front:
  text: 梅村家藏藁卷弟二十詩後集十二
  hash: sha256:f7226969a7fecd243a0c903542529640a19fa0de613936ccfffdd26a82f45984
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_020-1a}
body:
  text: 七言絶句八十一首靈巖寺放生雞四首芥羽狸膏早擅場爭雄身屬鬬雞坊從今喚醒夫差夢粉蝶低飛過講堂其二縛柵開籠敢自專雲中誰許作神仙如來為放金雞赦飮啄浮生又幾年其三敢效山雞惜羽毛卑栖風雨自三號湯泉夜半蓮花湧佛號鐘聲日未高其四雞足峰頭夜雨靑花冠錦臆影亭亭老莊談罷疏窗冷間向山僧學聽經口占贈蘇崑生四首樓船諸將碧油幢一片降旗出九江獨有龜年卧吹笛暗潮打枕泣篷窗其二有客新經墮淚碑武昌官柳故垂垂扁舟夜半聞蘆管猶把當年水調吹其三西興哀曲夜深聞絶似南朝汪水雲回首嶽侯墳下路亂山何處葬將軍其四故國傷心在寢丘蒜山北望淚交流饒它劉毅思鵝炙不比君今憶蔡州蘇生固始人即楚相寢丘也讀史有感八首彈罷薰絃便薤歌南巡翻似為湘娥當時早命雲中駕誰哭蒼梧淚點多其二重璧臺前八駿蹄歌殘黃竹日輪西君王總有長生術忍坰瑶池不並棲其三昭陽甲帳影嬋娟慚愧深恩未敢前催道漢皇天上好從容恐殺李延年其四茂陵芳草惜羅裙靑鳥殷勤入暮雲從此相如羞薄幸錦衾長守卓文君其五玉靶輕弓月樣開六宮走動射雕才黃山院裏長生鹿曾鴐昭儀翠輦來其六為掣瓊窗九子鈴君王晨起婕妤醒長楊獵罷離宮閉放去天邊玉海靑其七上林花落在芳尊不死鉛華只死恩金屋有人空老大任它無事拭啼痕其八銅雀空施六尺牀玉魚銀海自茫茫不如先拂西陵枕扶下君王到便房為楊仲延題畫册厯陽山下訪潛夫指點雲峰入畫圖為讀劉郎廳壁記過江煙雨作姑蘇偶得三首莫為高資畏告緡百金中産未全貧只因程鄭吹求盡卻把黔婁作富人其二家居柳市匿亡逃輕俠為生舊鼓刀一自赤車收趙李探丸無復五陵豪其三金城少主欲還家油犢車輕御苑花望斷龍堆無雁字黑河秋雨弄琵琶題畫四首澤路千山繞訟堂江程到日海城荒王郎妙手驅名勝廳壁雲生見太行其二八詠樓頭翠萬重使君家傍洞門松不知尺許蒼茫裏誰是雙溪第一峰其三臺池蕭瑟故園秋庾嶺朱輪感昔遊文采尚存先業廢紙窗風雨寫滄洲其四太守囊惟賣畫錢琴書長在釣魚船長官近欲知名姓築屋江村擬種田夜遊虎丘入首次顧西巘侍御韻試劍石石破天驚出匣時中宵氣共斗牛期魚腸葬後應飛去神物沉埋未足奇王珣故宅捨宅風流尚可追王郎别墅幾人知即今誰令桓公喜正是山花欲笑時千人石碧樹朱欄白足僧相攜劉尹與張憑廣場月出貪趺坐天半風搖講院燈顔書石刻魯公戈法勝吳鈞決石錐沙莫與儔火照斷碑山鬼出劍潭月落影悠悠劍池百尺靈湫風雨氣星星照出魚腸字轆轤夜半語空中無人解議奧亡意可中亭白石參來共此心一亭矯立碧潭深松間微月窺人淡似識高賢屐齒臨悟石軒築居縹眇北良常有客逢僧話石廊仙佛共參惟此石白蓮花發定中香後山月黑不見畫燭燒來入翠微更邀微月映淸輝欲窮千里登臨眼笑約重遊興不違戲題士女圖十二首一舸霸越亡吳計巳行論功何物賞傾城西施亦有弓藏懼不獨鴟夷變姓名虞兮千夫辟易楚重瞳仁謹居然百戰中博得美人心肯死項王此處是英雄出塞玉關秋盡雁連天磧裏明駝路幾千夜半李陵臺上月可能還似漢宮圓歸國董逃歌罷故園空腸斷悲笳付朔風贖得蛾眉知舊事好修佳傳報曹公當壚四壁蕭條酒數升錦江新釀玉壺氷莫教詞賦逢人買愁把黃金聘茂陵墮樓金谷妝成愛細腰避風臺上五銖嬌身輕好向君前死一樹穠花到地消奔拂歌無侯門一見難侍兒何得脫長安樂昌破鏡翻新唱換取楊公作舊官盜綃令公高戟妓堂開黃耳金鈴護緑苔博浪功成倉海使緣何輕為美人來取盒銅雀高懸漳水流月明飛去女咨謀何因不取田郎首報與官家下魏州夢鞋玉叉𫾣斷紫鸞雛消息聲華滿帝都能致黃衫偏薄幸死生那得放狂夫驪宮天上人間恨豈消雙星魂斷碧雲翹成都亦有支機石烏鵲難填萬里橋蒲東背解羅𥜗避月明乍涼天氣為多情紅娘欲去喚鐘動扶起玉人叉半橫題寒香徑節圖夀袁重其節母八十東籬漉酒泛芳樽處士傳家湛母恩傲盡霜花長不落籜龍風雨夜生孫烏棲曲沉香為笮錦為牽白玉池塘翡翠船芙蓉翻水鴛鴦浴盧郎今夜船中宿讀陳其年𨝍江白下新詞四首漫寫新詞付管絃臨春奏妓巳何年笑它狎客無才思破費君王十萬箋其二鈿轂珠簾燕子忙宮人斜畔酒徒狂阿嬤枉奏平陳曲水調風流屬窈娘其三落日靑溪載酒時靈和垂柳自絲絲沈郎莫作齊宮怨唱殺南朝老妓師其四冶習春來興未除豔情還作過江書長頭大鼻陳驚坐白夾諸郎總不如題思翁倣趙承旨筆佘山雲接辨山遙苕霅扁舟景色饒羡殺當時兩文敏一般殘墨畫金焦李靑城七十有六以自夀詩積閏平分已耋年之句索和余題一絶贈之詞家老宿號山農移得靑城八九峰細數餘分添甲子黃楊千嵗敵喬松偶成關河蕭索暮雲酣流落鄉心太不堪書劒尚存君且住世間何物是江南題冒辟疆名姬董白小像八首并序夫笛步麗人出賣珠之女弟雉臯公子類側帽之參軍名士傾城相逢未嫁人諧嬿婉時遇漂搖則有白下權家蕪城亂帥阮佃夫刋章置獄高無賴爭地稱兵奔迸流離纒綿疾苦支持藥裹慰勞羈愁苟君家免乎勿復相顧寧吾身死耳遑恤其勞已矣夙心終焉薄命名留琬琰迹寄丹靑嗚呼針神繡罷寫春蚓於烏絲茶癖香來滴秋花之紅露在軼事之流傳若此奈餘哀之惻愴如何鏡掩鸞空絃摧雁冷因君長恨發我短歌詒以八章聊當一慨爾射雉山頭一笑年相思千里草芊芊偷將樂府窺名姓親擊雲璈第幾仙其二珍珠無價玉無瑕小字貪看問妾家尋到白隄呼出見月明殘雪映梅花其三鈿轂春郊鬬畫裙捲簾都道不如君自門移得絲絲柳黃海歸來步步雲其四京江話舊木蘭舟憶得郎來繫紫騮殘酒未醒驚睡起曲闌無語笑凝眸其五靑絲濯濯額黃懸巧樣新妝恰自然入手三盤幾梳掠便攜明鏡出花前其六念家山破定風波郎按新詞妾唱歌恨殺南朝阮司馬纍儂夫壻病愁多其七亂梳雲髻下妝樓盡室倉黃過渡頭鈿合金叉渾拋郤高家兵馬在揚州其八江城細雨碧桃村寒食東風杜宇魂欲弔薛濤憐夢斷墓門深更阻侯門又題董君畫扇二首過江書索扇頭詩簡得遺香起夢思金鎖澀來衣疊損空箱須記自開時其二湘君浥淚染琅玕骨細輕勻二八年半折秋風還入袖任他明月自團圓古意六首爭傳婺女嫁天孫才過銀河拭淚痕但得大家千萬嵗此生那得恨長門其二豆􅞦梢頭二月紅十三初入萬年宮可憐同望西陵哭不在分香賣履中其三從獵陳倉怯馬蹄玉鞍扶上郤東西一經輦道生秋草説著長楊路總迷其四玉顔憔悴幾經秋薄命無言祗淚流手把定情金合子九原相見尚低頭其五銀海居然妬女津南山仍錮愼夫人君王自有它生約此去惟應禮玉真其六珍珠十斛買琵琶金谷堂深護絳紗掌上珊瑚憐不得郤教移作上陽花倣唐人本事詩四首聘就蛾眉未入宮待年長罷主恩空旌旗月落松楸冷身在昭陵宿衛中其二錦袍珠絡翠兜鍪軍府居然王子侯自寫赫蹄金字表起居長信閣門頭其三藤梧秋盡瘴雲黃銅鼓天邊歸旐長遠愧木蘭身手健替耶征戰在他鄉其四新來夫壻奏兼官下直更衣禮數寬昨日校旗初下令笑君不敢舉頭看題錢黍谷畫蘭為袁重其禖祝謝家燕子鬱金堂玉樹東風繞砌長帶得宜男春鬬草衆中推讓杜蘭香其二北堂萱草戀王孫膝下含飴阿母恩錯認淸郎貪卧雪生兒強比魏蘭根題王石谷畫二首緑樹參差倚碧天波光瀲灩尚湖船煙巒自繞王維墅不必重參畫裏禪其二初冬景物未蕭條紅葉靑山色尚嬌一幅天然圖畫裏維摩僧寺破山橋臨終詩四首忍死偷生草載餘而今罪孽怎消除受恩欠債應填補總比鴻毛也不如其二豈有才名比照鄰發狂惡疾總傷情丈夫遭際須身受留取軒渠付後生其三胸中惡氣久漫漫觸事難平任結蟠磈壘怎消醫怎識惟將痛苦付汍瀾其四姦黨刋章謗告天事成糜爛豈徒然聖朝反坐無冤獄縱死深恩荷保全梅村家藏藁卷弟二十終

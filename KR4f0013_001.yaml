front:
  text: 梅村家藏藁卷弟一詩前集一
  hash: sha256:ec9247e5264eea34c79a56c5200210504c836a52d22378cbbaafe4551210b2fd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0013_SBCK_001-1a}
body:
  text: 五言古詩三十八首贈蒼雪我聞昆明水天花散無數躡足凌髙峰了了見佛土法師滇海来植杖渡湘浦藤鞋負貝葉葉葉青蓮吐法航下匡廬講室臨玄圃忽聞金焦鐘過江救諸苦中峰古道塲浮圖出平楚通泉繞堦除疏巖置廊廡同學有汰公兩山聞法鼓天親偕無著一朝亡其伍獨游東海上從者如墻堵迦文開十誦廣舌演四部設難何衡陽答疑劉少府人我将毋同是非空諸所即今四海内道路多豺虎師於髙座上瓣香祝君父欲使菩提樹徧䕃諸國土洱水與蒼山佛教之齊魯一屐遊中原五嶽問諸祖稽首香花嚴玅義足今古塗松晚發孤月傍一村寒潮自来去人語出短篷䌫没溪橋樹冒霜發輕舠披衣聽雞曙籪響若鳴灘蘆洲疑驟雨漁因入浦喧農或呼門懼居然見燈火市聲雜翁嫗水改村店移一帆今始遇生涯問菰蒲世事隔沮洳終當謝親朋刺舟從此住臨江㕘軍以兵部贊畫叅督師盧象昇軍事楊公廷麟字伯祥臨江人崇禎中臨江髯㕘軍負性何貞栗上書請賜對髙語爭得失左右爲流汗天子知質直公卿有闕遺廣坐憂指摘鷹隼伏指爪其氣嘗突兀同舍展歡謔失語輒面斥萬仞削蒼崖飛鳥不得立予與交十年弱節資扶植忠孝固平生吾徒在真實去年羽書来中樞失籌策桓桓尚書公提兵戰力疾将相有纎介中外爲危慄君拜極言疏夜半片紙出贊畫樞曹郎遷官得左秩天子欲用人何必厯顯職所恨持祿流垂頭氣黙塞主上憂山東無能恃緩急投身感至性不敢量臣力受詞長安門走馬桑乾側但見塵滅没不知風慘慄四野多悲笳十日無消息蒼頭草中来整暇見紙墨唯説尚書賢與語材挺特次見諸大帥驕懦固無匹逗撓失事機倐忽不相及變計趣之去直云戰不得成敗不可知生死予所執予時讀其書對案不能食一朝敗問至南望爲於邑忽得别地書慰藉告親識云與副都䕶㑹師有月日顧恨不同死痛憤填胸臆先是在軍中我師已孔亟剽略斬亂兵掩面對之泣我法爲三軍汝實飢寒極諸營勢潰亡羣公意敦逼公獨顧而笑我死則塞責老母隔山川無繇寄悽惻作書與兒子無復收吾骨得歸或相見且復慰家室别我顧無言但云到順徳犄角竟無人親軍惟數百是夜所乘馬嘶鳴氣蕭瑟椎鼓鼓聲哀㧞刀刀芒澀公知爲我故悲歌壯心溢當爲諸将軍揮戈誓深入日暮箭鏃盡左右刀鋋集帳下勸之走叱謂吾死國官能制萬里年不及四十詔下詰死狀疏成紙爲溼引義太激昻見者憂䜛疾公既先我亡投跡復奚恤大節苟弗明後世謂吾筆此意通鬼神至尊從薄謫生還就畊釣志願自此畢匡廬何嶻嶪大江流不測君看磊落士艱難到蓬蓽猶見㕘軍船再訪征東宅風雨懐友生江山爲社稷生死無媿辭大義照顔色讀史雜詩四首東漢昔云季黄門擅權勢積忿召外兵癰决身亦斃雖自撥本根庶㡬蕩殘穢誰云承敝起仍出刑餘裔孟徳沾丐養門資列朝貴憑藉盗弄兵豈日唯才智追王故長秋無鬚而配帝鈎黨諸名賢子孫爲皂隷其二商君刑師傅徙木見威約范叔誣涇陽折脇吐謇諤地疎主恩深法輕主權削苟非用刻深何以膺付託功成或倖退禍至終難度屈伸變化間即事多斟酌談笑遷種人吾思王景略其三蕭何虚上坐故矦城門東曹參避正堂屈已事蓋公咄咄兩布衣不仕隆凖翁其術總黄老閲世浮沉中所以輔兩人俱以功名終出處雖有異道義将毋同何必致兩生彼哉叔孫通其四竇融昔布衣任俠家扶風翟公初舉事海内知其忠融也受漢恩大義宜相從低頭就新莾顧入其軍中轉戰槐里下盡力爲摧鋒後来擁衆降仍以當時功忝竊居河西蜀漢方相攻一朝决大計佐命蕭曹同吁嗟翟太守爲漢傾其宗劉氏已再興白骨無人封徒合千載後流涕平陵東避亂六首我生江湖邉行役四方早所厯皆關河故園跡偏少歸去已亂離始憂天地小從人訪幽棲居然逢浩渺百頃礬清湖煙清入飛鳥沙石晴可數鳬鷖亂青草主人柴門開鷄聲綠楊曉花路若夢中漁歌出杳杳白雲䕶仙源劫灰應不擾定計浮扁舟於焉得終老其二長日頻云亂臨時信孰傳愁看小兒女倉卒恐紛然緩急知難定身輕始易全預将襁褓寄忍使道塗捐天意添漂泊孤舟雨不前途長從妾怨風急喜兒眠水市灣頭見溪門屋後偏終當湻樸處不作畏途看未得更名姓先教禮數寛因人拜村叟自去榜漁船多累心常苦遭時轉自憐干戈猶未作已自出門難其三驟得江頭信龍關已不守繇来嗤早計此日盡狂走老穉爭渡頭篙師露兩肘屢喚不肯開得錢且沽酒予也倉皇歸一時携百口兩槳速若飛扁舟戢来久路近忽又遲依稀認楊栁居人望帆立入門但需帚依然具盤飡相依賴親友却話来途中所見俱八九失散追尋間啼呼挽兩手屢休又急歩獨行是衰朽村女亦何心揷花尚盈首其四此方容跡便止爲過来稀一自人爭避溪山客易知有心髙酒價無計掩漁扉已見東郭叟全家又别移總無髙枕地祗道故園非爲客貪蝦菜逢人厭鼓鼙兵戈千里近隱遯十年遲唯羡無家雁滄江他自飛其五月出前村白溪光炤澄練放檝浮中流臨風浩歌㫁天塹非不雄哀哉日荒燕嗟爾謀國徒坐失江山半長年篙起舞扁舟疾如箭可惜兩河士技擊無人戰孤篷鐵笛聲聞之淚流霰我生亦何爲遭時渉憂患昔也游九州今来五湖畔麻鞋習奔走淪落成愚賤其六曉起譁兵至戈船泊市橋草草十數人登岸沽村醪結束雖非常零落無弓刀使氣撾市翁怒色殊無聊不知何将軍到此貪逍遥官軍昔催租下令嚴秋毫盡道征夫苦不惜畊人勞江東今䘮敗千里空蕭條此地村人居不足容旌旄君見大敵勇莫但驚吾曹毛子晉齋中讀吳匏庵手抄宋謝翺西臺慟哭記扁舟訪竒書夜月南湖宿主人開東軒磊落三萬軸别庋加收藏前賢矜手錄北堂學士鈔南宋遺民牘言過富春渚登望文山哭子陵留髙臺西面滄江綠婦翁爲神仙天子共游學攜家就赤城髙舉凌黄鵠尚笑君房癡寜甘子雲辱七里溪光清千仞松風謖廬陵赴急難幕府從覊僕運去須武侯君存即文叔臣心誓勿諼漢祚憂難復昆陽大雨風虎豹如蝟縮詭譎滹沱水倉卒蕪亭粥所以恢黄圖無乃資赤伏即今錢塘潮莫救厓山麓空坑戰士盡柴市孤臣戮一死之靡它百身其奚贖龔生夭天年翟公湛家族㑹稽處士星求死得亦足安能期故人共卧容加腹巢許而蕭曹遭遇全髙躅文山竟以殉趙社終爲屋海上悲田横國中痛王蠋門人蒿里歌故吏平陵曲彼存君臣義此製朋友服相國誠知人舉事何顛蹙丈夫失時命無以辭碌碌看君書一編俾我愁千斛禹績荒煙霞越臺走麋鹿不圖疊山傳再向嚴灘續配食從方干豐碑繼梅福主人更命酒哀吟同擊筑四坐皆涕零霜風激羣木嗟乎誠義士已矣不忍讀松鼠衝颷飄頽瓦壊墻樷廢棘謖然見松鼯摶樹向人立側目仍盱睢奉頭似悚惕簷牙偃卧髙屋角欹斜疾倒擁弱枝危迅躡修柯直已墮復驚趨将藏又旁突去遠且蹔留迴顧再迸逸前逃赴已駛後竄追旋及剽輕固天性儇狡因衆習兩木夾清漳槎牙㫁尋尺攀緣所絶處排空自騰擲足知萬物機飛走不以力嗟爾適何来鳥鼠忽而一本是居嶄巖無端被覊縶兒曹初玩弄種類漸充斥黠彼憑社徒技窮耻晝匿銜尾共呼鳴異穴爲主客吾廬枕荒江垂死倚病柏雷雨撥其根慘裂蒼皮濕空腹鴟鴞蹲殘身螻蟻食社鬼不復慿乘間恣出入庭中玉蘂枝怒茁遭狼藉非敢念摧殘於君奚損益屈指五六年不遣一花白苞筍抽新芽編籬察行跡免彼鎌鉏侵值爾齒牙厄反使盗者心笑睨生歎息貧賤有此園謂可資溉植春蔬晚猶種夏果晨自摘鳥雀羣飛鳴啁啾滿阡陌婦子懶驅除傳藁加臺笠我亦顧而笑自信無長策焉能避穿墉㑹須憂入室茅齋雖云陋一一經翦葺曉起看埽除仰視輒詫惜尋繩透簾幕掉尾来几席倒庋傾圖書窺厨啖漿炙空倉喧夜鬬忘疲竟遺粒早幸官吏租督責無餘積邂逅開虛堂羣怒扼險塞地逼起衆呼拍手撼四壁捕此曷足多欲以觀其急􅎉户既嚴扄欒櫨若比櫛瞥眼倐遁逃一巧先百宻窮追信非算冘豫不早擊忍令智弗如變計思與敵機深勇夫駭勢屈兒童獲舉世貴目前快意相促迫比讀莊生書退守愚公術撲棗聽鄰家搔瓜任邉邑溪深獺趁魚果熟猿偷栗天地所長養於已何得失嗟理則誠然自古戒鼠泣仙豈學淮南腐難嚇梁國舞應京房占磔按張湯律終當就羅網不如放山澤永絶焚林風用全飲河徳贈王鑑明五十伏勝謝生徒開壁藏卷軸桓榮抱詩書拾梠逃巖谷古來兩經生遭亂躭講讀後皆保耆頤或乃致鼎足當世數大儒如君號名宿通識曉世變早計駭愚俗一朝載妻子推車入天目經營志不遂退乃就田牧十畝種桑麻一溪蒔花木果茹飴兒孫樵蘇課僮僕以代子陵釣無媿君平卜俯視悠悠人愁苦對金玉下士豈聞道世事如轉轂五十知天命養生在無欲全家就白雲避地驅黄犢無以侑君觴知足則不辱吳門遇劉雪舫出門遇髙㑹雜坐皆良朋排閤一少年其氣爲幽并羌裘雖裹膝目逎無諸傖忽然笑語合與我談生平亡姑備宮掖吾父天家婚先皇在信邸降禮如諸甥長兄進徹侯次兄拜将軍先皇早失恃寤寐求音形太廟奉睿容流涕朝羣臣新樂初受封搢笏登王廷至尊亦豐頤一見驚公卿兩宮方貴重通籍長安門周侯累纎㣲鄙哉無令名田氏起輕俠賔客多縱横不比先后家天語頻諄諄獨見新樂朝上意偏殷勤愛其子弟謹憂彼俸給貧每開三十庫手賜千黄金長戈指北闕鼙鼓来西秦寗武止一戰各帥皆投兵漁陽股肱郡千里無堅城嗚呼四海主此際惟一身彷彿萬嵗山先后輜軿迎辛苦十七年欲訴知何因今纔識母面同去朝諸陵我兄聞再拜慟哭髙皇靈烈烈鞏都尉揮手先我行寗同英國死不作襄城生我㓜獨見遺貧賤今依人當時聽其語剪燭忘深更長安昔全盛曽記朝元正道逢五侯騎頎晳爲卿兄即君貌酷似豐下而㣲黔貴戚諸舊游追憶戀難真依稀李與郭流落今誰存君曰欲我譚清酒須三升舊時白石莊萬栁餘空根海淀李侯墅秋雁飛沙汀博平有别業乃在西湖濵恵安蓄名花牡丹天下聞富貴一朝盡落日浮寒雲走馬南海子射兔西山隂路傍一寢園御道居人侵碑鐫孝純字僵石莓苔青下馬向之拜見者疑王孫詢是先后姪感歎増傷心落魄游江湖踪跡嗟飄零傾嚢縱蒱博劇飲甘沉淪不圖風雨夜話舊同諸君已矣勿復言涕下沾衣襟贈願雲師并序願雲二十而與予游甲申聞變常相約入山予牽帥不果而師已悟道受法於雲門具和尚今夏從靈隱来止城西之太平菴云将逺游廬嶽貽書别予以兩人年踰不惑衰老漸至世法夢幻惟出世大事乃爲眞實學道一著不可不勉予感其言因作此詩贈之并識予媿也亂後棄儒冠入道先大夫同學友也師名戒顯字願雲姓王氏少爲州諸生曉雨西山来松風滿溪閣忽得吾師書别予訪廬嶽分攜出苦語􅎋勤謂同學兄弟四十餘衰遲已非昨寄身蒼崖巔危苦愁失脚萬化皆虛空大事惟一著再拜誦其言心顔抑何怍末運初迍邅達人先大覺勸吾非不早執手生退却流連白社期慚負青山約君親既有媿身世将安託今觀吾師行四海一芒屩大道本面前即是真極樂他年趺深巖白雲養寂寞一偈出千山下界鐘磬作故人叩松關匡床坐酬酢不負吾師言十年踐前諾西田詩隱詩四首奉常别墅西田王煙客穿築倦人事田野得自然偶来北郭外學住西溪邉道大習隱難地僻起衆傳而我忽相訪棹入菰蒲天落日浮遠樹桑柘生徽煙逕轉蹊路迷鳬鴨引我船香近聞芰荷卧入花鮮妍人語出垂栁曲岸漁槎偏執手顧而笑此乃吾西田長得君輩客野興同流連藉草傾一壺聊以娛餘年其二到此身世寛息心事樵牧舍南一團焦云以飯黄犢入門沿長廊虚堂敞心目把卷倚新桐持杯泛南菊曲處通簾櫳茶香具含蓄俄穿宻室暗倐遇清溪綠碧水開紅蕖娟娟媚幽獨有鳥立層波垂翅清如玉對此不能去溪光好留宿月照寒潭深經聲入寒竹徙倚良有悟閒房道書讀其三别業多幽處探源更不窮堤沿宻篠盡路細竹扉通石罅枯泉過菖蒲間碧叢一亭壓溪頭魚藻如游空扁舟更不繫出没栁隂風小閣收平蕪良苖何雍容此綠詎可畫變化隂晴中隔岡見村舍曲背驅牛翁苦言官長峻未敢休㣲躬樸陋矜詩書無乃與我同日落掩扉去滿地桃花紅其四常言愛茅齋投老纔剪葺創置依舊圖新意出彷彿蒼然一笠寒能添夕陽色細影懸晨光一一清露滴卞生工丹青妙手固誰匹山村貪無人取意先自適想像生雲煙爲我開素壁了了見千峰可以攜手入道人十年夢惆悵平生屐此地足卧游不負幽人室願以求長生芝草堪采食哭志衍予始年十四與君蚤同學君獨許我文謂侔古人作長揖謝時軰自比管與樂彊記矜絶倫讀書取大略家世攻春秋訓詁苦穿鑿君撮諸家長弗受専門縛即子之太公亦未相然諾髙譚羣兒驚健筆小儒怍長途馭二龍崇霄翔一鶚遂使天下士咸奉吾徒約詞塲忝兩吳相與爲犄角煌煌張夫子斯文紹濓洛五經叩鐘鏞百家埀矩矱海内走其門鞍馬填城郭雲間數陳夏餘子多磊落反騷擬三湘作賦誇五柞君也游其間才大資磨斵詩篇口自哦書記手頻削冠蓋傾東南虚懐事酬酢射策長安城驄馬黄金絡年少交公卿才智森噴薄㑹值里中兒飛文肆謡諑要路示指蹤黨人罹矰繳君也念急難疏通暗籌度隂落其機牙用意于莫覺逡巡白衣奏停止黄門獄叶解褐未赴官歸来卧林壑賔客益輻輳聲華日昭灼生徒丏談論文史供揚㩁貧賤諸故人慰存餽衣藥躡履修起居小心見誠恪重氣狥長者往往捐嚢槖君家夙貴盛朱門飾華桷壘石開􅎉軒張燈透簾幕唱曲李延年俳弄黄旛綽舞席間毬塲池館花漠漠兄弟四五人㑹讌騰觚爵鹽䜴下魚羮椒蘭糝鳬臛每具十人饌中厨炊香穱客從逺方来咄嗟辦脾臄昨宵已中酒命飲仍大釂叶而我過其家性不勝杯杓小户不足紏引滿狂笑噱卷波喝遣輸射覆猜須着狎侮座上人闘捷貪諧謔警速誰能酬自喜看跳躍堅坐聽其言乃獨無差錯親疏與長㓜語語存斟酌性厭禮法儒拘忌何齷齪風儀甚瓌偉衣冠偏落拓有時不篸巾散髪忘盥濯中夜闘歌呼分曹縱蒱博百萬一擲輸放意長自若絶呌忽成盧衆年忽歛却男兒須作健清談兼馬矟犯雪披輕衫笑予爾何弱嘗登黄山顛飛歩臨峭崿下有萬仭潭徒侶愁失脚搔首凌雲煙翹足傲衡霍顧予石城頭横覽浮大白叶慷慨天下事風塵慘河朔諸将擁重兵養㓂飽鹵掠背後若有節此輩急斬斮自請五千騎一舉殱首惡餘黨皆吾人散使歸畊穫即今朝政亂舉錯混清濁君父切邉疆羣臣私幃幄當官不彈治何以司封駁對仗劾三公正色吐謇諤此志竟迍邅天道何窮剝六載養丘園一官落卭筰大盜竊江黄兇徒塞荆鄂間道攜妻孥改途走蠻貉瘴黑箐林行颶作瀘溪泊驛路出桄榔候吏疑猿玃歇鞍到平地倐逢錦城樂問士先嚴楊恤民及程卓白鹽古戍烽赤脚嚴關柝再拜蜀王書流涕傾葵藿請府發千金三軍賜酺醵賓旅給犀渠叟兵配騮駱此地俯中原巨靈司鎻鑰水櫃扼涪江石門防劍閣我謀適不用岷峨氣蕭索黒山起張燕青城突莊蹻積甲峨眉平飲馬瞿塘涸生民爲葅臡醜類恣啖嚼徒行值虎豹同事皆燕雀孤城遂摧陷狂刀乃屠膊有子踰十齡艱難孰顧託閤門竟同殉覆卵無完殻一弟漏刃歸兩踝見芒屩三峽奔荆門魚龍食魂魄叶夢斷落滄江毋乃遭搏攫郫筒千日酒泉路無寂寞追計平生歡一一猶如昨壁間所懸琴臨行彈别鶴玉子文楸枰尚記爭殘着百架藏圖書千金入卷握刻意工丹青雲山共綿邈篋中白團扇玉墜魚瀺灂阿兄風流盡萬事俱零落我欲收君骨茫茫隔山嶽後来識死事良史曽誰確此詩傳巴中磨崖書卓犖石剝蒼藤纒姓氏猶捫摸庶㡬千載後悲風入寥廓閬州行四坐且勿喧聽吾歌閬州閬州天下勝十二錦屏樓歌舞巴渝盛江山士女游我有同年翁閬州舊鄉縣送客蒼溪船讀書玉臺觀忽乘相如車謂受文翁薦游宦非不歸十載成都亂只君爲愛子相思不相見相見隔長安干戈徒歩難金牛盤七坂鐵馬㫁千山敢辭道路艱早向妻兒訣一身上鳥道全家傍虎穴君自爲尊章豈得顧妻子分攜各努力妾當爲君死淒淒復切切苦語不能答好寄武昌書莫買秦淮妾巴水急若箭巴船去如葉兩岸蒼崖髙孤帆望中没二月到漢口三月下揚州揚州花月地烽火似邉頭驛路逢老親遷官向閩越謂逼公車期蚤看長安月再拜不忍去趣使嚴裝發河山一朝異復作他鄉别别後竟何如飄零少定居愁中鄉信㫁不敢望来書盡道是葭萌殺人滿川陸積屍峨嵋平千村惟鬼哭客有自秦關傳言且悲喜来時聞君婦貞心視江水江水流不極猿聲哀豈聞将書封㫁指血淚染羅裙五内爲崩摧買舟急迎取相逢惟一慟不料吾見汝拭眼問舅姑雲山復何處淚盡日南天死生不相遇汝有親弟兄提攜思共濟姊妹四五人扶持結衣袂懐裏孤雛癡啼呼不知避失散倉皇間骨肉都抛棄悠悠彼蒼天於人抑何酷城中十萬户白骨滿崖谷官軍收成都千里見榛莾設官尹猿猱半以飼豺虎尚道是閬州此地差安堵民少官則多莫恤蜀人苦淒涼漢祖廟寂寞滕王臺子規呌夜月城郭生蒿萊只有嘉陵江江聲自浩浩我欲竟此曲流涕不復道讀端清鄭世子傳昭代無遺憾萬事光史册惜哉金川門神聖有慙徳天誘其子孫救之以讓國賢如鄭世子宗盟堪表率當璧辭真王累疏誠懇惻天子詔勿許流涕守所執敝屣視千乘謝之以長揖灑埽覃懐宮躬迓新王入夷齊既死後曠代仍間出築屋蘇門山深心事經術明興二百年廟樂猶得失以之輯羣書十載成卷帙候氣推黄鐘攷風定六律嶰谷當南山伐竹製琴瑟爲圖獻太常作之文世室遂使溱洧間一洗萬古習我行漳河南懐古思遺澤好學漢東平髙風吳泰伯道傍立豐碑讓爵存月日彼爲一卷書能輕萬家邑大雅欽遺風誠哉不可及遇南廂園叟感賦八十韻寒潮衝廢壘火雲燒赤岡四月到金陵十日行大航平生游宦地踪跡都遺忘道遇一園叟問我来何方猶然認舊役即事堪心傷開門延我坐破壁低圍墻却指灌莾中此即爲南廂衙舍成丘墟佃種輸租糧謀生改衣食感舊存園莊艱難守茲土不敢之它鄉我因訪故基歩歩添思量面水背蒼崖中爲所居堂四海羅生徒六館登文章松檜皆十圍鐘筦聲鏘鏘百頃摇澄潭夾岸栽垂楊池上臨華軒菡萏吹芬芳譚笑盡貴游花月傾壺觴其南有一亭梧竹生㣲凉囘頭望鷄籠廟貌諸侯王左李右鄧沐中坐徐與常霜髯見鋒骨老将東甌湯配食十六侯劍珮森成行得之爲将相甯復憂封疆北風江上急萬馬朝騰驤重来訪遺跡落日唯牛羊吁嗟中山孫志氣胡勿昻生世苟如此不如死道傍惜哉祼體辱仍在功臣坊蕭條同泰寺南枕山之陽當時寶誌公妙塔天花香改葬施金棺手詔追褒揚袈裟寄靈谷製度由蕭梁千尺觀象臺太史書禎祥北望占旄頭夜夜愁光芒髙帝遺衣冠月出修蒸嘗圖書盈玉几弓劍堆金床承乏忝兼官再拜陳衣裳南内因灑埽銅龍啓未央幽花生御榻苔澀青倉琅離宫須望幸執㦸衛中郎萬事今盡非東逝如長江鍾陵十萬松大者參天長根節猶青銅屈曲蒼皮僵不知何代物同日遭斧創前此千百年豈獨無興亡况自百姓伐孰者非畊桑羣生與草木長養皆吾皇人理已澌滅講舍宜其荒獨念四庫書卷軸誇縹緗孔廟銅犠尊斑剝塡青黄棄擲草莾間零落誰收藏老翁見話久婦子私相商人倦馬亦疲剪韭炊黄粱慎莫笑貧家一一羅酒漿從頭訴兵火眼見尤悲愴叶大軍從北来百姓聞驚惶下令将入城傳箭需民房里正持府帖僉在御賜廊挿旗大道邉驅遣誰能當但求骨肉完其敢攜筐箱扶持雜㓜稚失散呼耶孃江南昔未亂閭左稱阜康馬阮作相公行事偏猖狂髙鎮爭揚州左兵来武昌積漸成亂離記憶應難詳下路初定来官吏踰貪狼按籍縛富人坐索千金装以此爲才智豈曰惟私嚢今日解馬草明日修官塘誅求却到骨皮肉俱生瘡野老讀詔書新政求循良瓜畦亦有畔溝水亦有防始信立國家不可無紀綱春来雨水足四野欣農忙父子力畊耘得粟輸官倉遭遇重太平窮老其何妨薄暮難再留暝色猶青蒼策馬自此去悽惻摧中腸顧羡此老翁負耒歌滄浪牢落悲風塵天地徒茫茫詠史十二首浹旬至台司三日遍華省慈明與中郎豈不念朝菌王良御奔車勢逼崦嵫景急策度太行馬足殆而騁富貴若嵗時過則生災疹草木冬先華經春輒凋殞桓桓梁将軍赫赫蕭京尹一朝遇差跌未得全要領人生百年内飽食與美寢毋以藜藿糲羡彼鐘與鼎毋以毛褐敝羡彼紈與錦進固非伊周退已無箕潁薄祿從下僚末俗居中品寂寥子雲㦸從容歩兵飲其二西州杜伯山北海鄭康成季孟将舉事本初方用兵脱身有追騎輿疾猶從征何胤絶婚宦遯跡東籬門受逼崔慧景語黙難爲情網疏免刑戮道大全身名時命苟不佑千載無完人入山山易淺飲水水不清一身累妻子動足皆荆榛自非焦孝先何以逃黄巾庶㡬詹尹卜足保幽人貞其三我思秦繆公再觀趙簡子兩人皆上天其事著信史秦趙本一姓始祖爲蜚廉三后在帝側不克誅神姦逎俾其子孫一氣俱乘權造殳御日車後且致萬乘并使汧渭間竟以馬受命祖龍好巡狩六飛日千里不謁東王公其轡猶未已一以主房星一以行水德黃虵垂自天碧雞獲如石運啓犬丘馬數終鎬池璧神人告滅虢祉鬼方謀曹驪山刼火盛井絡天風搖爲君一何愚爲鬼一何智歌舞走秦巫異哉秦二世其四楚人沉昭王鄱君殺義帝千秋江漢間同下蒼梧涙小白問膠舟漫以水濱對當漢縞素時謂出魯公意歸獄他諸矦可以謝海内何獨無一言重瞳信非智其後衡山王楚亡獨親貴攺封在長沙乃居故君地不知江中時誰擊之半濟若此而不誅丁公有何罪郴陽一坏士守冢無人置視彼牧羊兒劉項總游戲發䘮雖袒哭事出權宜計遮馬負董公區區守名義其五兵在速與遲不在巧與拙干將頓不用强弩彀不發猛虎有猶豫北士無勇決樂生濟上軍迎刃踰數節巳下七十城欲使齊人悦五載功未成變起因間諜以此資田單莫僅尤騎刼後來戲下將區區守聊攝干載魯連書讀者爲悲咽其六孝惠非不男內嬖姫姜盛少帝及諸王故是高皇胤呂后貪家權無意移天命戀戀魯元女欲久宮闡政立子殺所生禍出牝鷄性負圓乃辟陽國本焉能定臨朝再廢立流言誤物聽祿產又弄兵海內因疑信文帝從代來易置天人順淸宮遽剪除此事慙堯舜班史親王表絕使殊同姓欲以尊朝廷俾勿滋餘論干秋龍種冤屬籍誰能正其七古来有烈士軹里與易水慶卿雖不成其事已並美専諸弑王僚朱亥殺晉鄙惜哉博浪椎何如圯橋屨公孫擅西蜀可謂得死士連刺兩大将探囊取物耳皆從百萬軍夜半入帳裏匙首中要害絶跡復千里若論劒術精前人莫能比胡使名弗傳無以著青史誰修俠客傳闕疑存二子其四髙宻未佐命早共京師游弱冠拜司徒杖策功名收靈臺畫少年萬古誰能儔興王諸将相足使風雲羞鄧芝遇先主七十才封矦位至大将軍矍鑠髙春秋英雄初未遇垂老猶窮愁祖孫漢功臣年齒胡不侔我讀新野傳慷慨思炎劉其九管仲升盜卿後八習其傳黃巾賢良師矯託非誠然異哉黑山賊詔得舉孝廉夏商制刑鼎唐虞畫衣冠湻樸以之漓無乃非羲軒莊生齊萬物譽跖詆聖賢晚來讀眞誥始悟南華篇吳人嚴白虎位巳登上仙豈獨矦與王顧盻豪人間眞宰無不容小儒徒呫呫漆圍窺其微所以爲知天其十遭時固不易推心尤獨難景略王佐才臣主真交歡天意不佑秦中道奪之年苻堅有大度豁達知名賢獨㫁未爲失興毁寍非天賊萇寔弑君聞者爲衝冠鎮惡丞相孫流落来江南西伐功冠軍力戰收長安手劍縛姚泓俘之出潼關張良爲劉氏雅志在報韓能以家國耻詘申兩主間其地皆西秦功亦堪比肩區區一李方報恩何足言其十一宜城酒家保北海賣餅師千金懸賞購萬里刋章追途窮變名姓勢急投親知漢法重亡命保舍加誅夷破家相存濟百口同安危虞卿捐相印恨未脱魏齊惜哉燕太子流涕樊於期瀨水一女子魯國一小兒今也無其人已矣其安歸廣栁可以置置當猛虎蹊複壁可以藏藏憂黠䑕窺古道不可作太息将何爲其十二深林有惡木盤曲沮洳間荆棘傷人衣幸受蕭斧寛交柯蔭且黑下根修蛇蟠蒸出爲靈􅌲五色絢且斕釆之登明堂薦以白玉盤旁置博山罏其上刻鳳鸞洗濯天露漿錯列金琅玕東隣聘姣女其母爲無鹽厲而能生子才也足拜官盜跖保令終檮杌啓後賢麟趾世所羨躉尾何必嫌天道不可信世德良復難梅村家藏藳卷弟一終梅村先生世系里人顧師軾景和氏纂里人顧思義仁仲氏訂先生姓吳氏諱偉業字駿公晩號梅村江南太倉州人七世祖子才名無考河南人元末避兵始遷蘇州崑山之積善鄉配費氏六世祖埕字公式以字行明正統元年贈承德郎行在刑部雲南司主事配陳氏封太安人攷又字式周五世祖凱字相虞號冰蘖卒祀鄉賢祠配沈氏繼沈氏再繼陳氏蘇州俯志吳凱字相虞父公式早亡遺腹生凱能力學養母里胥嘗召之役詣縣自陳有母不能遠離竊有志於學縣令芮翀異其言立遣就學後充貢京師中順天鄉試宣德中授刑部主事改行在雲南司再改禮部主客司以母老乞歸遂不復仕凱精敏有治劇才平生以禮自律言行不苟風儀嚴峻人望而畏之家居四十年非公事不至公府葉盛尤重之嘗曰鄉里作官前軰當法吳丈後軰當法孫藴章及卒鄉人私諡貞孝先生藴章名瓊葉文莊公盛相虞公墓誌銘祖才父式周母陳氏公在姙而父亡旣生公家復被菑母年尙少甘貧守約育而教之公晚得子而連得三子卒成化七年七月十四日夀八十有五配沈氏先卒子三人長恩輸粟於官授承事郎次悳次愈女二人婿顧恂龔綬銘曰孰完五福惟善日不足孰永終譽名不必公與卿吁嗟乎公後有考於茲銘恂先文康公鼎臣父高祖愈字惟謙號遯菴配夏氏蘇州府志吳愈字惟謙凱子成化乙未進士授南七刑部主事厯員外郎中初凱起家刑曹毎爲愈言折獄之道愈在部繙閱舊牘遂精法律一時奏讞咸倚以决出知敘州府慶符盜劫縣治令捕得二十七人已誣服愈疑之乃詣縣辨審釋二十五人未幾果獲眞盜土官安鰲以馬湖叛衆議用兵愈䇿曰鰲無遠謀然其甲兵精利未易敵也彼中無水當重圍以困之議未决而鰲忽棄城走衆慮其糾諸夷爲亂愈日彼以郡守將兵接戰勝負未可知旣離巢穴一窮冦耳諸夷皆其仇又何能爲因遣人襲之不血刃而獲自是馬湖改置流官後其黨復劫府印爲亂愈親扺其巢諭之遂獻印解散在敘九年遷河南參政致仕歸卒年八十四王弇州世貞吳遯菴贊在郡九年課農桑興學校戸口滋殖風俗醇美爲諸郡最而業已倦游矣里居優游自奉養喜賓客和謹得後進心有女三人歸陸伸文徵明皆名士而歸王氏者有子同祖以才入中秘皆侍公周旋以是寛樂於其身贊曰仕不九卿日上大夫夀不九秩日八十餘宅相所貽蘭㽔玉枝父子耆喆爲鄉閭師先文康公鼎臣吳公惟謙墓表卒於嘉靖丙戌五月十九日年八十四子男四長東浦江縣縣丞次南國子生公仲弟悳無嗣推以爲後次西次守中國子生孫男詩訪許誌嗣高祖惪宇維明號靜菴配陳氏無子以愈次子南爲嗣曾祖南字明方號方塘賜内閣中書後官鴻臚寺序班以使事過家爲御史所論謫江西建昌府幕官配鄭氏繼袁氏先生先伯祖玉田公墓表余家世鹿城人自禮部公以下大參鴻臚三世皆葬於鹿城公爲鴻臚長子次卽贈嘉議大夫少詹事諱議余祖也又次則諱誥偉業四五嵗曾見及之老且貧衣食於卜肆余祖嘗抱偉業於膝顧叔祖而歎日爾知我宗之所以衰乎三世仕宦廉吏之槖固足以傳子孫爾伯祖實主其帑用之爲飮食裘馬費産遂中落余與爾叔祖庶出也少狐故皆貧余祖亡後祖母湯孺人毎談及鴻臚公時事輒言嘉隆中鹿城倭難伯祖自以私財募兵十餘人轉戰湖泖間兵敗左右皆沒得一健卒負之免家遂以破祖議字子禮號竹臺以先生貴贈嘉議大夫詹事府少詹事幼贅於瑯琊王氏遂居太倉副室湯氏封太叔人先生秦母于太夫人七十夀序衰門貧約吾母操作勸苦以營舅姑􅎵瀡之養湯淑人憐其多子代爲鞠育余自少多病由衣服飮食保抱提攜惟祖母之力是賴惰自早嵗通籍祖母年七十有三及以南都恩貤封三世湯淑人期屈九秩笄珈白首視聽不衰里人至今以爲太息父琨字禺玉又字藴玉號約齋又號約叟諸生以經行稱鄉里先生貴封嘉議大夫詹事府少詹事國朝舉鄉飲大賓卒祀鄉賢祠配陸氏繼朱氏封淑人鈕琇觚賸江右李太虛爲諸生時嗜酒落拓而家甚貧太倉王岵雲司馬備兵九江校士列郡拔太虛第一引見之謂曰吾固多子擇師無若子者顧遠在婁東子能一往乎李許諾次日卽遣使送至其家時王氏二長于巳受業同里吳藴玉先生藴玉者梅村先生父也而太虛教其第四五諸郎兩人共晨夕甚歡梅村甫齠齡亦隨課王氏塾中李奇其文卜爲異日偉器歲將闌主家設具讌兩師出所藏玉巵侑酒李醉揮而碎之王氏子面加譙讓李亦盛氣不相下席罷後謂吳日我安可復留此遂拂衣去吳知其不能行也翼日早起追於城闉出館俸十金爲贈乃附賈舶歸然所贈貲大半耗於酒及抵家垂槖蕭然亟呼婦治具婦日吾絶糧巳久安所得粟憶君去後猶存故人酒一􅎆請佐君軟飽可乎婦往鄰家覓薪李卽發􅎆􅎆内産一芝如盤紫光煜煜喜且愕曰此瑞徴也顧酒敗不可飲柰何挹之則淸洌異常乃浮白獨斟婦負薪歸則罌巳罄矣是秋登鄉薦明年成進士入詞館數載後以典試復命過吳門王氏子謁於舟次李急詢吳先生近狀是時梅村亦登賢書因購吳行卷攜以北上爲延譽京師辛未梅村遂爲太虛所薦登南宮第一及第第二人年僅弱冠藴玉先生亭榮養者三十年可爲疏財敦友之報而岵雲諸子自司馬沒後家漸替矣先生于太夫人壽序吾母朱淑人精心事佛嘗于鄧尉山中創搆傑閣䖍奉一大藏教嗣祖諌字子猷號玉田官福安縣縣丞葬梅灣配某氏繼查氏再繼陛氏子一查氏出天本宛平王敬哉崇簡青箱堂集吳母張太孺人墓誌銘詳後順治丙申年先生玉田公墓表於吳門遇三山鄭君曰余姻也詢之則三山之兄曰某者爲伯祖婿余姑尙在也偉業乃具禮幣拜見則年已七十三泫然泣曰猶憶會鴻臚公葬時曾到鹿城見二叔今巳六十年不通家問二叔謂吾祖也歸而告我祖母湯孺人孺人泣吾世父與吾父知之亦泣泣年六十始知有伯姊也相率至梅灣墓下再拜哭且加封樹焉吾姑後三年以卒有二子以其一從吳姓主梅灣之祭嗣父瑗字文玉號蘧菴禮部冠帶儒士配王氏繼張氏本靑箱堂集詳後順治丙申年梅村先生世系終梅村文補遺序宋玉叔詩文集序余嘗觀古今文人才士之興而知天之生材甚艱其成就之尤不易也夫世習榛蕪絶學隕墜卽有儁異非常之資猶難卓然自拔天於其先必生數人焉爲之導湮宣鬱光啟前徽然後俊哲挺生從漸漬擩染之内薈萃融液獨自名家而此一人者或生於高門世胄地望通顯性靈恐伏而未發天於是又使之中厯艱虞洊更塪壈以激爲要眇之音乃始解駮其沉滯而致之亨途益昌厥辭軼邁作者世徒服其材之度越而不知天之篤若人以底於成良不偶然矣若萊陽宋子玉叔殆其人也當萬厯之中葉海内文氣衰􅚿古道寢頓士爭緝拾躛語繆詡逢年之技而萊陽宋氏獨以學古攻文辭鳴鴻生畯儒後先輩望翕然金舂而玉應也三齊科第大都一姓爲多因而陟巍資躋貴仕者珪重組襲何其盛哉而吾友故司空九靑在其間尤稱絶出詩文踔厲廉悍雄視漢唐以來諸家遭時兵火篇章蕩爲煙壒弗果信今而傳後後九靑而起者又得吾友玉叔玉叔天才􅖡上接聞父兄典訓胚胎前光甘嗜文學自九靑之存駸駸乎欲連鑣而競爽弱冠南踰大江薄遊吳㑹日尋英儒酌酒倡和長歌短賦舂容寂寥他文皆厖蔚炳朗濯濯其英曄曄其光盛年值際興運綰綬登朝羽儀京國不可謂不遭時也而仍見疐跲用誣浮繫於理凡浹月而獲湔袚還官郎署踐敡計銓僅循年出調外省遠跡窮邊絶徼人咸謂非所宣而玉叔不然當夫履幽憂乗亭障覊纍憔悴浮沉遷次之感一假詩文以發之其才情雋麗格合聲諧明豔如華温潤如璧而撫時觸事類多淒淸激宕之調又如秋隼盤空嶺猨啼夜境事旣極亦復不盭於和平庶幾乎備文質而兼雅怨者今被簡命來長臬於浙浙爲東南都會湖山秀美由來風月之奥區而廉憲古觀察也官以采風爲職驂騑所過㪺耶溪之水瀹鑑湖之蕺探天姥石梁之嵌巖崱屴其足資吟哦紀述者又可勝道耶然則天之善成玉叔與玉叔之所自得爲何如哉玉叔旣之官郵示其所刻前後集俾余序之余幼執經張西銘先生門卽知萊陽之文與東吳豫章壎箎應和洎通籍入都交玉叔尊人吏部公於邸舍守官京師從九靑遊奉使同視楚闈登黃鶴樓俛眺荆江鄂渚間拊楹慷慨九靑題詠甚夥余愧未能成章亦勉賡以紀名勝九靑不鄙而進余謂可深造於斯事嘗示余掖中數詩能諳誦其佳句每念時移勢謝先友云徂并其遺文銷蝕糞土悲未嘗去於心也乃今得扣玉叔之􅌢袠而卒業焉竊幸典刑之未淪希大雅之復作其不在斯人歟其不在斯文歟何能無一言以弁諸簡首因爲推本其所自來有得於天之成就者如此欲使世之習讀者知統繫在斯相與珍重而䖍奉之也是爲序田髴淵詩序余初識孝廉田子髴淵於京師時南士之從計者甚衆田子才辨器議有以絶出於流輩讀書穿穴經傳落筆爲詩歌古文衮衮不能自休與人交好傾身爲之盡窮達盛衰誓不得而移也試南宮旣不第有勸之歸者田子日居鄉里抑鬱無所得姑留邸中一交天下長者於是宛平王公柏鄉魏公合肥襲公眞定梁公以大臣折節好士名天下田子與之游用詩文學藝相切劘一時三四公之門無出田子右者天子拔才俊結筆札於中書由布衣諸生爲超授人皆曰田子宜在選中禮部依故典䇿名者再用詔書舉行者一主者思收知名士以重格今從闈牘揣摩捫索以庶幾得田子爲喜不能識田子爲愧然自余歸里十年屈指耳目所見其才與地出田子下遠甚又無此三四公者爲之知乃先後躡淸塗掇上第者踵相接田子獨寥落不得一官此孰爲之而孰止之耶家在泖東扁舟觸風濤而過我中夜置酒高談無幾微不豫之色發其囊出詩文數百篇才氣坌涌詞色敷腴若蒸雲霞而戞金石余因以知田子於世故物變皆以磨鍊其所長而識詣益至雖淹蹇不合而疏通豁達之氣未嘗少挫一以發之於文章自如也嗟乎交道之難久矣當余初識田子固巳在賓客旣衰之後比歸卧海濱雖親知故舊棄我如遺跡而田子獨有過於曩時余不知何以得之於田子然觀其雅志期待不肯自同疇人所以取重於三四大君子者端在於此余欲槪以望之悠悠之徒不亦過乎田子之別也謀僦屋就余尋朝夕過從之樂追溯平生所與游者魏公躋政地握化權王公以公孤居府父子顯重龔公梁公名位在股肱心膂之間天下士經其題拂者望塵弗及天或者留田子而使之窮以慰余於荒江寂寞之畔未可知也然余觀田子之才之識非久屈抑者則余又安得而與之居歟聊記其語言往還足徵知交之厚而已田子名茂遇髴淵其字松江之華亭人魏貞庵兼濟堂文集序目古一代之興必有名世鉅人出而弘濟蒼生潤色鴻業然而長於政事者未必工於文章工於文章者未必優於理學求其兼備無遺者不數見也當西漢之隆蕭曹丙魏號爲賢相然所長者止於政事無論理學卽文章且無聞焉而司馬遷相如枚臯揚雄之流又徒以文章著稱而不及施於政事其於理學則亦未能窺其萬一也所謂兼備無遺者求之古而不得今乃得之於柏鄉魏公公稟鴻駿魁杰之才遭逢聖朝廻翔禁近值世祖章皇帝興治右文招延俊乂數舉經筵命儒臣講論大義或時巡游南苑應制賦詩一時文學侍從之臣無不掞藻摛華對揚休命而公實巋然爲冠首其後厯諫垣躋柏府密勿論思綱紀庶政封章數十上如請開日講頒孝經錄遺忠闢異端諸疏皆關天下國家大計蓋非當宁知公之深不能盡用公之言以興致太平而非公之才與公之學亦不能輔導以成至治聖主良臣相得益彰於以調元贊化經國庇民千載一時也今上御極公以銓衡重望入居政府於時重熙累洽海内晏安從容於黃扉綸閣之間得以留心述作博游才藝而公又邃於關閩濓雒之旨其學以性善爲本以致知爲要所輯聖學知統錄及大全纂要學規彚編諸書皆足以闡繹微言紹明聖緖而以其餘間作爲詩歌則又能籠挫萬物匠心獨妙至於悲鼎湖之莫逮痛子期之云亡其忠孝氣節於君父友朋之間尤惓惓乎三致意焉所謂理學文章政事公殆兼而有之蓋公之才與學其積之也有本而出之也不窮今夫江河之水灝溔潢漾雖疏而爲川注而爲瀆而其源則一也公之蓄於中者停泓演迤雖試之於政見之於文而其本則一也公之弘致遠識固非若漢之輔相醕謹樸遫者可擬而亦豈僅如賦上林誇長楊者以翰墨爲勳績詞賦爲君子而已哉公爲高邑趙忠毅公之甥忠毅與公同主銓政世傳爲美談然忠毅值黨議紛呶群言謠諑之日枋用未乆而公之功名在日月之旁筦樞軸之任以視忠毅其所遇之幸不幸何如也公所著詩文甚多中州彭子士報謀之吳君冉渠楊君仲延撮其尤要者鋟板以行蓋公之學與公之才其所以開物成務者雖不盡於此而於此亦足以見其大者焉故不揣而爲之序鴻雪園詩集序堯文將往廬陵出一編示余則其在樟亭由拳流連登眺之作而溯淮入都懷人贈答居其半焉堯文之才開敏樂易於讀書能采掇其菁華而出之以杼軸故其詩貫串三唐姸秀典麗聲律穩貼雖專門名家莫或過之余與堯文少同里長同學老而灌園連墻比屋槐柳之陰相映草堂燈火相望於池塘林木之間余樵蘇不給而堯文時出斗酒吟詩篇歌呼相應和今將舍我而遠去余撫是編而沉吟若有不釋然者夫廬陵天下之名郡也昔者有先正文章節義著在累朝之冊今干戈久息賢人君子接踵而起者流風餘習居然可見堯文過匡山涉馬當以達乎此也江山登臨賓客交游之盛收攬以滋詩笈者且盈緗溢縹膾炙天下此豈吾窮谷之叟抱甕作息帶索而行吟者能窺測其涯涘乎抑吾聞之舊國舊都望之暢然當堯文在樟亭由拳相去不過數舍今江天寥廓之外其於故園竹梧杉檜滋生而拱把芙蕖芍藥芳郁而紛披未嘗不如杜氏之四松陶家之五柳彷徨而想像也閭井日已荒親朋日巳耗雖衰遲如余者間與江右士大夫追舊游而話宿好未嘗不如漢濱之老人滄浪之漁父寤寐而興懷也然則其見之於詩者又烏得而已耶他日政成垂組揭節以還鄉里余且盡出其田夫野老之作以是正於堯文得毋從而嗤之曰固哉是夫之爲詩也身窮才退足不出里巷何足與於此乎亦相與爲一笑而已於其行也遂書之以贈崇川邑侯王孝伯夀序河汾王公以解元登進士擢知吾吳之崇川崇壯縣也東連閩粤南達江淮鎭兵萬騎星羅碁布儼然有塞上之風邑長於斯者欲使兵民兩安文武輯睦實難其人吾王公父母是邦百姓之顚危悉起什伍之風鶴無驚治行遂爲江左冠督撫臺省交列薦剡輙署上考朝廷嘉其亷善例得誥封褒贈將出殊典猗歟休哉可謂榮矣嘗觀漢之寵循吏者多以璽書奬勸増秩賜金而使之久其任今法亦猶行古之道也公門下士有郁子靑南名棠以學行受知雅爲武城所禮重於是邑之薦紳先生及諸父老諗之於郁子曰甘棠之蔭於今三年考功如是其已最也恩綸如是其將渥也今九日令辰龍山高會値岳降之期朋酒之享實在於茲其能忘兕觥之獻盍乞言於大君子以侑一觴乎郁子頷之以爲非偉業言不足當吉甫之誦淸風天保之歌南山也介邦人之書造門伏謁余亟應之曰某之食德鄰封舊矣居恒熟其治譜章章在人耳目蓋可得而言焉東沙瀉鹵以漲海爲城郭養兵秣馬取足賦稅稍不如期則庚癸輙聞不可以常法治者公爲之垂簾勸課以深仁厚澤相固結士民服其教化孝弟力田無復向時出沒波濤之習牛車襁負不煩桁楊之議其後而至誠所感鱷鯨遠徙昔之地接蓬萊與海市蜃樓相隱見者今則廬落如林煙火相望此漢唐循良之書所未有也公性狷潔澹泊明志鳴琴退食酌水自甘瀚衣濯冠行止率如寒士其耿介大節超出倫等春秋循行郊野輙引老農問其佳麥良繭察民疾苦而補助之簿書期會之睱數接賢士大夫談經講藝上下古今而扶風掾史京兆功曹則屏息重足不敢少望顔色其興㑹所寄獨嗜圖籍當河陽花煖靑箱萬卷如置身石渠天祿中而北苑南宮之筆右軍太傅之書靡不割淸俸以佐琴鶴紛紛俗好都不入其胸次墨莊之外蕭然無辨其赤文綠字卽公之鬱林片石也雖昌黎之在潮東坡之在杭流風遺韻如同一轍蓋公之廉能得諸天授而家學實有淵源自文中子紹法孔孟代出眞儒公之俯君諱萬基由明經司訓西河䖍奉太上一編甲申間避難石州城將䧟府君夢白衣人自稱太上垂救甚力卒免於難爲善之報此其一騐積厚流光篤生吾公掇巍科作廉吏而文中之績學府君之砥行亦藉以弘閥閱而祚民社則公之由司牧而登卿貳由强壯而躋期頤也宜哉行見玉堂紫誥金馬朱綸纍纍若若將與彭咸甲子並進無彊也已某之祝公異曰者甯有涯量哉海濱僻壤薦更湯火自公來涖茲士工虞禮樂漸以修明夫里征徭漸以休息旣富方穀物無天札絳縣有復陶之老人康衢多鼓腹之野叟琴堂大年有不與百姓共之者乎請爲之歌豳風曰九月肅霜十月縧塲稱彼兕觥萬夀無疆公可以進一觴矣謹拜手而爲之序孫母郭儒人夀序余嘗觀世家巨姓其爵位之蟬聯閥閱之光寵旣以誇耀於遐邇矣而家庭燕喜猶勤勤於知已之一言誠欲宣昭令德而淑問施於無窮也雖然非其鄉有魁壘耆宿之大儒則不足知其門以外俾崔盧世牒著於閭史非其家有孝友慤誠之君子則不足知其門以内俾鍾郝禮法吿之國人斯二者未易一二遇也吾友孫孝若以進士假歸省母而郭孺人屆期五十侑爵之詞鄉先達則請諸宗伯錢牧齋先生諸父則請諸光甫光甫余同年進士舊泉州守也而又以其言屬余夫牧齋以文章重海内而光甫孝謹聞於郡國孝若之夀其母也於二者已兼之矣牧齋之言曰孫氏自世節先生父子以詩文節俠起家齊之雄長詞壇二子競爽恭甫兄弟名行烜赫此余所謂門以外之事唯宗伯足以知之者也光甫之言曰孺人方雅名家閨門之内不妄言笑伯氏卽世修内政禦外侮保持門戸以有今日者翳維儒人是賴此余所謂門以内之事微光甫何以知之余齒德不如牧齋㦤親不如光甫其何以夀孺人無已就余之得於孝若者以夀孺人可乎孝若姿神吐納警速風流好屬文工詞翰交天下賢豪長者以名節氣誼相砥礪吾以知孺人之賢而能教也吾谷有喬木于章楓林赭葉賓客之來遊者樽俎雜陳絲肉競作餦餭粔籹臛炙糒醪左顧而欬應手立辦吾以知孺人之勤而有禮也家有􅪖尊于金刻鏤龍文丁公癸父摩挲欵識而唐人所圖應眞十有六像絹素筆墨皆絶代珍翫孝若博物君子雅擅收藏而於先世所遺尤能護持手澤吾以知孺人之敬而能守也體自華宗長於富厚一門中從不下數百其成進士也無彊植兼并之風無名豪武斷之習無蒼頭綠鞲衣絲履縞之出入無後房袨服鈿車寶馬之行游吾以知孺人之義而有制也余門人孝維爲孝若之異母弟在孺而孤迄乎成立友于篤至扶掖恩勤廬舍田園推肥取瘠諸妹裝送皆一情不異中外親黨殆無間然吾以知孺人之仁而有恩也爲孝亷十年中遭世變郡縣虎冠之吏肉視大家其桀黠監奴酒食通關因縁乾沒交結魁宿以爲俠里中主人持之以體臨之以威慴伏而彈壓之卒莫敢動吾以知孺人之嚴而有法也凡此六者微孝若不足以揚孺人之德微孺人不足以成孝若之名傳日非此母不生此子其是之謂歟余猶記通籍之歲以年家子弟拜謁恭甫之尊人子喬先生當是時孝若未就外傅而孝維始生先生喜恭甫以得孫而憂光甫之無子也今兩家子弟蘭芽玉茁而孝若掇上第就顯官過家休沐拜母上觴鄉里聚觀以爲盛事蓋孫氏之福澤如日升川至正未有艾而遡其再世發祥實啟自孺人孺人其可以輾然而舉此觴矣余所以隨牧齋光甫兩公之後敢具不腆之詞進者實以交於孝若者深知於孺人者悉故不憚靦縷以致其頌且禱也是爲夀補道碑銘勅贈大中大夫盧公神道碑銘丙子歲偉業被命偕給諫萊陽宋公九靑典校湖廣鄉試時中原已憂冦盛彌漫豫楚之交流氛四出羽檄交道謬以一介䖍奉簡書揚旍馳驟巖疆轉徙金革幸得畢使以鉛黃甲乙多士鎻院三試所弋獲皆爲俊民而蘄州盧大夫綋在選徹棘捧雉來謁匑匑然君子人也旣而詢知其家世以儒業發聞尊人呂侯公經行犖犖爲儒林長德余嘉其學有淵源稱嘆者久之迄今兩閱星終而大夫來爲叅藩董儲偫於茲士一再過存具呂侯公素履及奉諱始末以視泣而請曰先子生平好古篤行阨於時數潛德弗耀重以冦禍滔天毒流方嶽闔門抗節竟殞非命孤毎念此日夜悼心今幸蒙恩聖朝榮施泉壤告第納書秩登三品於令得樹碣隧道以紀休昭烈而徵辭摩勒尙竢載筆惟夫子辱知最深又前職記注若不鄙而賜之光闡孤實假寵以報所天微直成我而已敢固以請余衰薾不任脂澤之言何足爲公增重顧念公績學純行法宜備書其死事一節尤奇且處大夫父子間契分特厚采錄懿媺傳信惇史固其所也容敢以不文辭謹掇大夫自狀與虞山錢先生所爲傳而繫之左方公姓盧氏諱如鼎呂侯其字其先吳人遷楚之梅川勝國永樂間始占籍于蘄四世而爲南槐公諱楷卽公之考也用孫貴贈大中大夫妣宋氏繼李氏皆贈淑人公生而奇穎承傳家學丱歲屬文有聲南槐公義方甚嚴營丙舍於濠上引泉植竹疏窗閒靚以爲公肄業之所延里中少俊讀書談藝其中公挾冊唫諷鞠曛究明不問家人生產淵涵淳滀霈爲文辭弱冠游博士宮頻受知督學使者試輙雄其儕伍數踏省門不售中間危得之而更抑置人皆爲搤掔公一意修學著書以造進後昆爲巳任抗顔家塾說經鏗鏗疏疑釋難教施如雨至者虛往實歸充然意得去由是負笈雲集江黄間推爲大師嘗手箋尙書四子書科別同異丹粉狼藉成就子若從子多列鴻生畯儒比大夫以丙子名薦書英譽鵲起公遂撞弦息機不復事榮進爲人厚重質直不苟訾笑服勤孝弟内行修勅南槐公治家嚴公應唯伺顔色惟謹少有不懌或形譙讓彌益􆄙蹜起敬執内外喪毁瘠踰禮分財產能適長兄田廬取湫萊者僮奴取羸拙者撫兄子如已子同仁均愛有鳴鳩之心辛已凶札橫道多殣公倒囷賑瞻視致醫藥宗黨卒倚以全閭閻有爭相率就公平决片言折衷愧屈過於要質其爲時所信嚮如此異時鄉里子弟不悅學公用形家言請於當事增壘江中石磯閣祠梓潼神其上埤助文風自此雋兩闈者蟬聯不絶蘄人士至今頌德焉公之卒也劇寇自廣濟乘夜襲蘄公被執賊中有識者曰彼善士縱諸冦退舍公勒習里中人分布關隘爲死守計自守南城冦盡銳來攻公督勵守陴殊死鬬賊垂卻而他樓堞隳從公後肉薄而入刄及於背公拒不及遂遇害時癸未春也子姪從孫及諸婦楊氏袁氏同時死者八九人嗟乎自盜起中原生靈塗地大城名藩相繼䧟沒其間義夫淑媛就煨塵而不稱者何限而堂堂身都將相擁强兵牧伯正長覆師失守委而去之色甚安者多矣公進趨退怯眇然儒者又老困呫嗶未登仕版無預封略人民之任而能臨難賈勇授兵登陴力屈則鈹交胸腹横屍原野而不惜可不謂議取舍列丈夫乎况於雞斯弱質聲不出捆赴蹈如歸者成羣乎公生萬曆戊寅四月下距癸未壽六十有六娶淑人羅氏生男子二長卽大夫綋次紱公卒後三日羅淑人屍於江滸焚而殮之五閱月大夫歸自公車以殉節狀鳴於所司將拜章請旌未及上會改物而止丙戌冬大夫卜新阡葬公土門珠樹林已丑第進士由邑令累官藩臬廉辨肅給善政流聞凡三報最推恩得贈公自文林郎三命至大中大夫壬寅歲今上紀元之載奉命督糧蘇松而俾余書其隧道之石公可謂有子矣雖不獲光顯其身而洊受哀榮於後天之報忠義不爲無意也在禮死冦之士旌之日兵戰於郞重汪踦死魯人欲勿殤子日能執干戈以衞社稷雖欲勿殤也不亦可乎如公精忠大節有光冊書無疑也昔魯共姬待火而殞者春秋賢之書日宋災伯姬卒盧氏貞姬競烈玉碎不污曾何愧焉余不揣固陋採摭遺芳牽聯書之比於春秋禮傳之義以詔來者狀又稱公邑子暴卒攝至㝠途冥王命屬盧某保任而後釋歸正直之人鬼神所是哉事涉恍惚故從附見然世所喜傳者在此則亦莫得而略也銘曰卓哉盧公儒宗文師幼閑庭詶悅禮惇詩法律䋲已名教夙資嚅嚌道眞克昌厥詞進思經世有物隘之退淑諸徒南面臯比敷陳聖謨牛毛繭絲疏理滯礙如結得觽躚躚媚學陶鑄靡遺方領矩步好仁樂施閭里質成彥方愧知運鍾百六天狼失維巨冦狂猘帕首朱眉羣飛海水潰隄莫搘若火燎原撲滅詎期祝融郊甸魚爛則悲我公孱者武奮熊羆部勒壯士率用始鉟丁甯振鐸擐甲登陴戈衝賊喉日舍欲移環城百礮三板突隳戰鼓不楊渠門火旗身膏草野刳腹折頣志均馬革義遂死綏婉婉彼姝頩爾自持淸泉虐熖視甘如飴號無茅絰哀動出譆一門忠烈前行後隨似川卬浦啓佑本支巍科洊陟熙朝羽儀位崇嶽牧絳節金龜禮備哀榮鸞書紫緌旌幢棨戟邦委來尸停驂訪舊南史是咨徵文篆刻徽㦤眧垂佳城鬱葱贔􅸻豐碑松楸馬鬛傳信在斯於千萬世式瞻慕思墓誌銘姚胤華墓誌銘憶乙巳歲余所親王子惟夏語余云有新安姚君胤華者僑寓吾婁爲某比鄰能傾財以舒人之急昏夜叩亦輒應其它仁心質行足以聳善扶誼雖騶魯士君子有弗逮非更僕不能盡也余聞其言而疑之以爲王子所與􅉨還其亦博矣内而宗黨姻連外而當世豪傑賢公卿大夫見其窮阨折挫號鳴大吒夫豈無助而張之者耶而爲余稱說不離口乃僅姚君一人以余所覩今世之擁厚貲埓封君者大約善積居之術精舉廢之方其於利也目營而足赴仰取而俯拾每視貲業益穰則益緘縢而固守之設有毛髮緩急坐視不一援手者比比然耳爾姚君所篇乃若是是烏足信哉已而念王子名知人能自植立恥隨俗浮湛其言又似可信蓋余之意中久矣有一姚君矣今年秋姚君沒已五載君之仲子震介王子來謁余接之容蹙而辭哀詢其所欲言則已厯繫君生平善行再拜而請日先子之蚤廢舉子業不獲沾一命思用詩書亢厥宗也唯寐始忘之而震兄弟不敏尙未克以儒成名今先子體魄將入土儻徼惠於大人君子實卑矜之錫以片言鑱諸窆石則先子猶不殁也余感其意之甚誠而言之有禮因􅋏然深有動於中焉古云爲善者譬若藝禾能令嘉種世世不絶其姚君之謂乎以君子躬備純德謂宜優游自適享有五福迺身旣隱約於布衣而復嗇其年俾志業弗得盡展是豈天意果難臆測哉夫亦篤於姚氏欲其必久積而後大發俾嘉種之堅好穎栗迄再世而是任是負也余蓋卽震之摭行焯能急於不泯其親益知爲善者自必有後方以佹識其子先失其父爲憾而又何能以不文牢讓也耶按狀君諱葉胤華其字系出饒州至明膺宣公始遷蓀溪又傳十一世爲文學蓀谷公君卽蓀谷公第五子幼警敏不肯躡庸人後蓀谷公器之命庀闔宗事事胥就理其治生不牟纎細而先業日充拓值鼎革劇盜相挺而起君身率羣從子姪保聚捍衞鈴􅢎之聲徹晝夜罔息冦烽不敢近蓀谷公捐舍館躃踊幾不欲生有兄遭非意災多耗費君慨然共任之曰兄若弟同氣也何較爲里閈間或以曲直來質鬭爭齗齗然君出片言輙中肯綮與人交有本末其遘疾將殆婚友爭醵錢爲禱神殁之日無貴賤少長莫不悼惜或澘然出涕嗚呼觀君之所得於人如是則君之立心制行可知已君少而好學長彌篤嗜能通經史大義時談論古今人物治道政術語纚纚如貫珠嘗謂諸子日讀書以明聖賢理道爲先徒呻吟佔畢汨沒章句間非所貴也尤喜蓄古書購求不下數千卷擬構一樓貯藏之而未果今仲子震偕其兄升收捃益富方將成其先志而惜乎君已不得見矣吾友金陵九煙黃公官戸部遭世變後隱於講授震兄弟特延諸家塾同敬事之相與發箧中書取所疑而質問焉凡狀中所述曁余所聞於王子者亦徵諸黃公之言而益信嗟夫宿儒遺老其見重於當代也罕矣而二子獨爲之不少阻謂非得於家庭淑艾者深而能遽然耶夫亦愈可以知君已君生於明天啓甲子九月二十三日卒於康熙丁未二月二十一日享年四十有四元配孫孺人繼配吳孺人丈夫子三長升太學生娶汪氏孫孺人出次卽震太學生初娶戴氏繼娶吳氏又次霦幼業儒未聘俱吳孺人出女一適邑庠生戴儁孫孺人出孫女一幼未字震出君葬地在蓀溪之某待卜吉某年某月歸窆今以某年月日權攢於首山之陽而余爲之銘銘曰重華苗裔宗姓爲姚支派蟬嫣鍾祥於饞教諭諸孫宋室參政源鴻流長門閥滋盛疇以貲贏懋遷化居擇人任時深藏若虛日惟府君最賢且智不競錐刀而競仁義雖嗇爾年實崇爾基乃經乃史爲裘爲箕爰啟象賢以膺福祚胄監蜚英天衢高步嗣後億禩善宏慶綿追遡自始首山新阡有崔者岡勒斯貞石過者式焉君子之澤梅村集補遺終昔人謂少陵之詩詩史也讀其詩而天寶以後興亡治亂之蹟具在其爲史之所同者可以相證明焉其爲史之所遺者可以相參考焉詩之所以貴有爲而作也雖然少陵之集編體不編年讀其詩而不得其旨更求其年譜讀之而其詩之與新舊兩書相出入者乃條分件繫粲然而無所疑甚矣年譜之有功於詩也吾鄉梅村先生之詩亦世之所謂詩史也先生負曠世之才爲風雅總持其所交游多魁奇俊偉之士而又當明季百六之運故其集中之作類皆感慨時事悲謌掩抑銅駝石馬故宮禾黍之痛往往而在惟其詩編體而不編年當時有爲之作讀者或恨其不能盡詳孟子曰誦其詩讀其書不知其人可乎是以論其世也然則非年譜不足以知先生之詩之世非論先生之詩之世不足以知先生之詩之果爲詩史也先生之集有集覽有箋註而年譜闕如同里顧雪堂茂才劬學好古篤嗜先生之詩暇日求里中前輩程迓亭先生所箋編年之本爲年譜一書而又徧考其家牒雜識以附益之積數年之力成書如千卷雪堂以同里後進爲先生編年之譜其蒐采尙易爲力故其書之贍洽視前人之編杜詩者有加焉蓋其體之詳畧各有所由來而要其用心之勤爲功於前人之詩以靳致其知人論世之意未嘗不一致也書旣成深佩雪堂之篤雅好事能補前人之所未逮遂不辭而爲之序道光二十四年歲次甲辰同里徐元潤書梅村先生年譜卷一故明萬厯三十七年已酉五月二十日先生生母朱太淑人姙先生時夢朱衣人送鄧以讚㑹元坊至遂生先生三十八年庚戌二歲三十九年辛亥三歲四十年壬子四歲熊學院科試先生尊人約齋公補博士弟子員四十一年癸丑五歲仲弟偉節生四十二年甲寅六歲四十三年乙卯七歲讀書江公用世家塾先生按察司使江公墓誌銘始余年七歲讀書公家塾識公公卽是年領鄉薦後三十年家居公折輩行與余及魯岡游八月祖竹臺公卒四十四年丙辰八歲四十五年丁已九歲四十六年戊午十歲四十七年巳未十一歲就穆苑先雲桂家中讀書先生穆苑先墓誌銘自余生十一始識君居同巷學同師出必偕宴必共如是者五十年君爲先大夫執經弟子余兄弟三人君所以爲之者無有不盡余雖交滿天下其相知莫如君余之初就君齋讀書也有同時游處者四人志衍純祐爲兄弟魯岡與之共事其軰行差少皆吳氏余宗也鄰舍生孫令修亦與焉季弟偉光生四十八年庚申是年八月後改元泰昌十二歲天啟元年辛酉十三歲二年壬戌十四歳隨父約肅公讀書志衍繼善家之五桂樓先生志衍傳余年十四識志衍長於余三歲兩人深相得哭志衍詩余始年十四與君蚤同學蚤起詩惜爽憇南樓送志衍八蜀詩我昔讀書君南樓程穆衡箋先生幼隨父約齋公讀書志衍家之五桂樓詩中所咏甫樓是也能屬文西銘張公溥見而嘆日文章正印在此子矣因留受業於門相率爲通今博古之學程穆衡婁東耆舊傳江右李太虛明睿落魄客授州王大司馬所與公父善見公於髫鬌奇之一日飲於王氏太虛被酒碎其玉巵主有詬言憤怒去約叟追而贐之太虚日君子奇才也天如將以古學興東南盍令從游乎約叟如其言三年癸亥十五歲四年甲子十六嵗西銘肇舉復社先生爲入室弟子楊彝復社事實文社始於天啟甲子合吳郡金沙檇李僅十有一人張溥天如張采來章楊廷樞維斗楊彝子常顧夢麟麟士朱隗雲子王啟榮惠常局銓簡臣周鍾介生吳昌時來之錢旃彥林分主五經文字之選而效奔走以襄厥事者嘉興府學生孫淳孟樸也是日應社當其始取友尙隘來之彥林謀推大之訖於四海於是有廣應社貴池劉城伯宗吳應箕次尾涇縣萬應隆道吉蕪湖沈士柱崑銅宣城沈夀民眉生咸來會聲氣之孚先自應社始也五年乙丑十七歲六年丙寅十八嵗七年丁卯十九歲崇禎元年戊辰二十歲陳學院歲試入州庠二年已巳二十一歲西銘與同里張南郭采舉復社成先生名重復社復社事實崇禎之初嘉魚熊開元宰吳江進諸生而講藝於時孫淳孟樸結吳䎖扶九吳允夏去盈沈應瑞聖符等肇舉復社於時雲間有幾社浙西有聞社江北有南社江西有則社又有厯亭席社崑山雲簪社而吳門別有羽朋社匡社武陵有讀書社山左有大社僉㑹於吳統合於復社復社始於戊辰成於已巳其盟書日學不殖將落毋蹈匪彝毋讀匪聖書毋違老成人毋矜已長毋形彼短毋以辨言亂政毋干進䘮乃身嗣今以往犯者小用諌大者擯僉曰諾是役也孟樸渡淮泗厯齊魯以逹於京師賢士大夫必審擇而定衿契然後進之於社故天如之言曰忘其身惟取友是急義不辭難而千里必應三年之間若無孟樸則其道幾廢蓋先後大㑹者三復社之名動朝野孟樸勞居多然而歛怨深矣先生有致雲間同杜諸子書致孚社請子書西銘爲尹山大㑹陸世儀復社紀畧吳江令楚人熊魚山以文章經術爲治慕天如名迎致邑館於是爲尹山大會苕霅之間名彥畢集遠自楚之蘄黄豫之梁宋上江之宣城甯國浙東之山陰四明輪蹄日至比年而後秦晉閩廣多有以文郵置者三年庚午二十二嵗李學院科試一等三名補廩膳生員舉鄉試十二名座主庶子姜日廣江西新建人萬厯已未進士編修陳演四川井研人天啟壬戌進士春秋房房師鎭江府推官周延福建晉江人天啟乙丑進士按先生有寄房師周苪公先生詩西銘爲金陵大會復社紀畧崇禎庚午諸賓興者咸集天如又爲金陵大會是科主裁爲江西姜居之曰廣榜發解元楊廷樞而張溥吳偉業皆魁選四年辛未二十三歲舉㑹試第一名座主内閣周延儒宜興人内閣何如寵桐城人房師李明睿江西南昌人天啟壬戌進士按先生有閬園詩座主李太盧師從燕都間道北歸尋以南昌兵變避亂廣陵賦呈八首諸詩思義攷李少司馬繼貞萍槎年譜辛未㑹試同考得士二十有一人是年榜元爲吳偉業世通家也塡榜止餘第二第一尙有推敲首揆周諱延儒偶思吳卷爲太倉人係余同里因招余首問家世以及年貌文望余一一答之甚悉且云行文直似王文肅公首揆喜大聲徧語同考更首肯文肅公一語於是遂定吳卷爲第一余因筆記云憶吳之祖竹臺公與先君子爲筆硯交白首相歡其父禹玉受業於余余子又受業於禹玉蓋三世通家矣今日闈中推轂之語雖捧土增山要亦添花著錦余豈貪天功以爲已私耶李繼貞與門人吳禹玉書去秋得鹿鳴報爲之起舞今春在闈中親見塡榜得令郎首冠多士益喜躍不自禁兩相國知不佞同里卽詢家世來厯一一置對兩相國亦自喜慰無量思令先尊與家大夫筆硯一生不得鄉校乃不佞三入闈得賭桃李之盛而令嗣一飛沖天又不似鄙薄苟然而已此豈非造物之嗇前豐後亦爲善者之必有餘慶與門下自此可收郤書本打帳做大封君若復戀戀雞肋恐作第二人將不免爲令郎所笑善刀藏之何如殿試一甲第二名授翰林院編修復社紀畧是科延儒欲收羅名宿密囑諸分房於呈卷之前取中式封號竊相窺伺明睿頭卷卽偉業也延儒喜其爲禹玉之子明睿亦知爲舊交之子偉業由此得冠多士烏程之黨薛國觀洩其事於朝御史袁鯨將具疏參論延儒因以㑹元卷進呈御覽莊烈帝批其卷曰正大博雅足式詭妝并倩仙郎畫元是春風第一花先行人陳垿抱桐集祭酒恆言吾一生快意無過三聲臚唱占雲宮袍曜日帶酲初上奏節戞然錦晝御輪綺宵郤扇流蘇朋下放鈎鏗然海果生遲石麟夢遠珠胎初脫墮地呱然河決金龍口滕縣沈焉有悲滕城詩李學院歲試先生仲弟偉節入州庠字淸臣五年壬申二十四歲西銘假歸爲虎邱大會刋國表社集行世復社紀畧偉業以溥門人聯捷會元鼎甲欽賜歸娶天下榮之遠近謂士子出天如門下者必速售比溥吿假歸途中艗首所至挾䇿者無虛日及抵里四遠學徒羣集癸酉春溥約社長爲虎邱大會先期傳單四出至日山左江右晉楚閩浙以舟車至者數千餘人大雄寶殿不能容生公臺千人石鱗次布席皆滿往來絲織游人聚觀無不詫欺以爲三百年來未嘗有也按復社紀畧總綱壬申張溥給假葬親歸爲虎邱大會六年癸酉二十五歲約齋公五十初度張溥有吳年伯母湯太夫人壽序載西銘集七年甲戌二十六歲城隍廟正殿災有重修太倉州城隍廟碑記八年乙亥二十七歲入都補原官充實錄纂修官李繼貞送吳文玉入京師太史駿公所詩長安名利地君行獨無求隨身一敝篋附舟若輕鷗累心旣云盡別家了不愁惟念太史公京洛多貴游名高衆所集道廣慮難周君到雖坐鎭時復佐老謀切劘公輔器伫俟協金甌當思伯氏庸割俸營莬裘勿謂余戲言三公今黑頭倪學院歲試季弟偉光入州庠字孚令九年丙子二十八歲奸民陸文聲訐復社事太倉州志時有奸民首告復社事當軸陰主之欲盡傾東南名士偉業疏論無少避明史張溥傳里人陸文聲者輸資爲監生求入社不許采又嘗以事抶之文聲詣闕言溥采爲主盟倡復社亂天下温體仁方柄國嚴旨窮究不已至十風俗之弊皆原於士子庶吉士張溥知臨川縣事張采倡立復社以亂天下思陵下提學御史倪元珙察覈倪公言諸生誦法孔子引其徒談經講學互相切劘文必先正品必賢良實非樹黨文聲以私憾妄訐宜罪閣臣以公䝉飾降光祿寺錄事蘇州推官周之夔者與溥同年舉進士初亦入社至是希閣臣意墨絰詣闕復訐奏溥等樹黨挾持案久未結䜛言罔極至有草檄以伸復社十罪者大約謂派出婁東吳下雲間學則天如維斗卧子上搖國柄下亂羣情行殊八俊三君迹近八關五鬼外乎黨者雖房杜不足言事業異吾盟者雖屈宋不足言文章或呼學究知囊或號行舟太保傳檄則星馳電發宴會則酒池肉林至十五年御史金毓峒給事姜埰各上疏白其事始奉旨朝廷不以語言文字罪人復社一案准註銷後福藩稱制阮大鋮怨戊寅秋南國諸生顧杲等一百四十八之具防亂公揭也日思報復爰有王實鼎東南利孔久湮復社巨魁聚歛一疏大鋮語馬士英云孔門弟子三千而維斗等聚徒至萬不反何待至欲陳兵於江以爲防禦心知無是事而意在盡殺復社之主盟者時崑銅曁宜興貞慧定生軰皆就逮繫獄桐城錢秉鐙宣城沈夀民亡命得脫假令王師下江南少緩則復社諸君子難乎免於白馬之禍矣朱彝尊靜志居詩話復社雖太倉二張主之實引次尾扶九相助當其時烏程温相君有子求入社扶丸堅持不可於是有徐懐丹之檄陸文聲之疏周之夔之彈事又繼以王實鼎之飛章而復社禍機旣發扶九亦日在憂患中秋典湖廣試刑科給事中宋玫爲副與熊魚山開元鄭淡石友元禽先生書宋九靑逸事九靑以刑右給事副余使楚兩人相得甚蓋其時天下巳多事楚日岌岌而武昌阻大江固無恙楚之賢士大夫爲魚山熊公淡石鄭公乃九靑同年生又皆吏於吾土聞兩人之至也拏舟來酧酒江樓敘述往昔商棱文史夜半耳熱談天下事流涕繼横先生宋玉叔詩文集序守官京師從九靑游奉使同事楚闈登黄鶴樓俛眺荆江鄂渚間拊楹慷慨九靑題咏甚夥余愧未能成章亦勉賡以紀名勝九靑不鄙而進余謂可深造於斯事先生梅村詩話九靑年十九登乙丑進士任吏科給事陞太常進戸部侍郎以枚卜遇譴歸嘗與余同使楚竟陵鄭淡石贈什曰剖斗折衡爲文章天下婁東與萊陽謂吾兩人也張溥跋宋九靑送熊魚山文手卷熊魚山鄭淡石兩先生之爲諫官也一以三月去一以十月去顧其令吾吳則皆六年也蘇松財賦甲天下吳江華亭殷大尤冠二郡兩先生以德鎭之六年之内無逋賦無罷人百姓稱爲至平迺天子再命大吏稽錢穀時淡石行矣文書往來高下者久之獨兩先生調他職徵其說則曰以賦故也都人士目睽睽益不知所謂嗟乎苟不得所謂讀兩先生封事司矣苟不及讀兩先生封事讀宋九靑一篇送行文其亦可矣夜泊漢口送黄子羽之任十年丁丑二十九歲充東宮講讀官陳子龍贈吳太史充東宮講官詩蒼茛開震域靑殿接文昌霞氣騰元圃瓊條拂畫堂選端周典禮拜傅漢元良史職移仙省宮僚總帝郷金貞儲后重玉立侍臣莊羽䈁傳秋實詩書出尙方夏侯經術茂皇甫素懐芳雞㦸靑槐䕃龍泉碧藻香珠簾參晚燕璧月照春坊下賦情文稱王箴忠愛長一時推碩德萬國仰重光媿我羊裘側思君象輅旁臨風疏館靜遙夕可相望劾張至發直聲動朝右明史萬厯中申時行王錫爵先後枋政大旨相紹述謂之傳衣鉢張至發代温體仁一切守其所爲而才智機變遜之嘗簡東宮講官擯黃道周爲給事中馮元颷所刺至發兩疏詆道周而極頌美温體仁孤執不欺爲編修吳偉業所劾七月次女生後適海甯陳直方容永相國之遴子先生遣悶詩一女血淚啼闌干舅姑嶺表無書傳一女家破歸間關良人在北愁戌邊更有一女憂風煙圍城六月江風寒按先生長女適王天植陳生增城令瑞國子又有女適桐城何某贑州守應璜子又考婁東書舊傳張塤娶梅村吳公第六女塤宿遷訓導蒿園之子給諫王治之孫又按先生行狀及墓表女九人郁淑人出四側室浦孺人出三側室朱安人出二攷延陵家譜一適諸生王陳立增城令瑞國子一適海甯孝廉陳容永相國之遴子一適江甯監生何棠贛州守應璜子一適胡金門一字宜興諸生周申祺未嫁卒郁淑人出一適吳縣錢鏡徵一適崑山監生李昶側室浦氏出一適監生張塤一適常熟國子監助教封翰林院庶吉士席永恂惻室朱安人出梅村先生年譜卷一終梅村詩補遺五言古詩縹緲峰茲峰非云高高與衆山別其下多嵌空天風吹不折插根虛無際縹緲爲險絶細徑緣山腰人聲來木末籃輿雜徒步佳處欣屢歇躋嶺路倍艱往往攬垂葛灝氣凌泬寥一身若氷雪輕心出天地羽翮生髣髴杖底撥殘雲了了見吳越曜靈燭滄浪滉瀁金光發陰霞俄已變慘澹玄雲結歸笻破暝靄半嶺值虹蜆始知淸境杳跡共人鳥滅丹砂定可求苦爲妻子奪看君衣上雲飛過松間月七言律詩題王端士北歸草讀罷新詩萬感興夜深挑盡草堂燈玉河嗚咽聞嘶馬金殿凄凉見按鷹南内舊人逢庾信北朝文士識崔㥄蹇驢風雪蘆溝道一慟昭陵恨未能秣陵口號車馬垂楊十字銜河橋燈火舊秦淮放衙非復通侯第中山賜宅改作公署廢圃誰知博士齋易餅市傍王殿瓦換魚江上孝陵柴無端射取原頭鹿收得長生苑内牌同孫浣心郁靜巖家純祜過福城觀華嚴會不求身世不求年二六時中小有天今日雲門纔喫棒多生山谷少安禪茶鐺藥臼隨時供蒲笠蕉團到處眠撒手懸崖無一事經聲燈火覺王前七言絶句下相懷古戲馬臺前拜魯公興王何必定關中故人子弟多豪傑弗及封侯呂馬童無爲州雙烈詩爲嘉定學博沈陶軒賦濡須城下起干戈二女芳魂葬汨羅安得米顚書大字井邊刻石比曹娥爲李灌谿侍御題高澹游畫煙雨扁舟放五湖自甘生計老菰蒲誰將白馬西臺客寫作靑牛道士圖題釣隱圖贈陳鴻文綠波春水釣魚槎縮項雙鯿付酒家忘却承明曾待詔武陵溪上醉桃花詩餘望江南江南好五色錦鱗肥反舌巧偷紅嘴慧畫眉羞傍白頭棲翡翠逐金衣
